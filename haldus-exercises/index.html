const EX_TYPES = {

// ── HELPERS ───────────────────────────────────────────────────
function FileChip({file}) {
  const ext = (file.name||'').split('.').pop().toLowerCase();
  const bg  = EXT_COLORS[ext]||'#42536A';
  return (
    <a href={file.url} target="_blank" rel="noreferrer" className="file-chip">
      <span className="fi-ext" style={{background:bg}}>{ext.slice(0,3).toUpperCase()}</span>
      <span style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{file.name}</span>
      <i className="fa-solid fa-arrow-up-right-from-square" style={{fontSize:'.65rem',opacity:.5}}/>
    </a>
  );
}

// ── UPLOAD ────────────────────────────────────────────────────
function FileUploader({onUpload, uploading, setUploading}) {
  const inputRef = useRef();
  const [progress, setProgress] = useState(0);

  const handleFiles = async(files) => {
    if(!files || !files.length) return;
    setUploading(true);
    const results = [];
    for(const file of files) {
      const ref = storage.ref(`curriculum/${Date.now()}_${file.name}`);
      const task = ref.put(file);
      await new Promise((res,rej) => {
        task.on('state_changed',
          snap => setProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100)),
          rej,
          async () => {
            const url = await ref.getDownloadURL();
            results.push({name:file.name, url, size:file.size, type:file.type});
            res();
          }
        );
      });
    }
    setUploading(false);
    setProgress(0);
    onUpload(results);
  };

  const onDrop = e => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
  const onDragOver = e => e.preventDefault();

  return (
    <div className="upload-zone" onDrop={onDrop} onDragOver={onDragOver} onClick={()=>inputRef.current?.click()}>
      <input ref={inputRef} type="file" multiple onChange={e=>handleFiles(e.target.files)}/>
      {uploading
        ? <div>
            <div className="spinner" style={{margin:'0 auto 10px'}}/>
            <div style={{fontSize:'.82rem',color:'#42536A'}}>Laadimine... {progress}%</div>
          </div>
        : <div>
            <i className="fa-solid fa-cloud-arrow-up" style={{fontSize:'1.6rem',color:'#42536A',marginBottom:8,display:'block'}}/>
            <div style={{fontWeight:700,color:'#1C2B3A',marginBottom:4}}>Lohista failid siia</div>
            <div style={{fontSize:'.78rem',color:'#42536A'}}>PDF, Word, PowerPoint, pildid — kõik sobib</div>
          </div>
      }
    </div>
  );
}

  const [title, setTitle]     = useState(lesson?.title||'');
  const [type, setType]       = useState(lesson?.type||'lesson');
  const [desc, setDesc]       = useState(lesson?.description||'');
  const [files, setFiles]     = useState(lesson?.files||[]);
  const [order, setOrder]     = useState(lesson?.order||0);
  const [uploading, setUploading] = useState(false);
  const [saving, setSaving]   = useState(false);

function parseFillText(raw) {
  const blanks=[];let idx=0;
  const parts=raw.split(/\[([^\]]+)\]/g);
  let result=[];
  for(let i=0;i<parts.length;i++){
    if(i%2===0){result.push({type:'text',value:parts[i]});}
    else{result.push({type:'blank',answer:parts[i],index:idx++});blanks.push({answer:parts[i],index:idx-1});}
  }
  return{parts:result,blanks};
}

function FillPlayer({exercise,onDone}){
  const parsed=useMemo(()=>parseFillText(exercise.text||''),[exercise.text]);
  const[answers,setAnswers]=useState({});const[checked,setChecked]=useState(false);const[score,setScore]=useState(null);
  const check=()=>{let correct=0;parsed.blanks.forEach(b=>{if(normalizeText(answers[b.index]||'')===normalizeText(b.answer))correct++;});setScore({correct,total:parsed.blanks.length});setChecked(true);onDone&&onDone({correct,total:parsed.blanks.length});};
  const reset=()=>{setAnswers({});setChecked(false);setScore(null);};
  return(<div style={{display:'flex',flexDirection:'column',gap:16}}><div style={{fontSize:'1rem',lineHeight:2}}>{parsed.parts.map((p,i)=>{if(p.type==='text')return<span key={i}>{p.value}</span>;const val=answers[p.index]||'';const isCorrect=checked&&normalizeText(val)===normalizeText(p.answer);const isWrong=checked&&!isCorrect;return(<span key={i} style={{display:'inline-flex',alignItems:'center',gap:4}}><input className={'blank-input'+(isCorrect?' correct':isWrong?' wrong':'')} value={val} disabled={checked} onChange={e=>setAnswers(prev=>({...prev,[p.index]:e.target.value}))} style={{width:Math.max(80,(p.answer.length+2)*12)+'px'}}/>{isWrong&&checked&&<span style={{fontSize:'.75rem',color:'#166534',fontWeight:700}}>({p.answer})</span>}</span>);})}</div>{score&&<div className={score.correct===score.total?'result-correct':'result-wrong'}>{score.correct===score.total?'✓ Suurepärane! Kõik '+score.total+' vastust õiged!':score.correct+'/'+score.total+' vastust õiged. Proovi uuesti!'}</div>}{!checked?<button onClick={check} className="btn btn-pine">Kontrolli vastuseid</button>:<button onClick={reset} className="btn btn-ghost">Proovi uuesti</button>}</div>);
}

function ChoicePlayer({exercise,onDone}){
  const questions=exercise.questions||[];
  const[current,setCurrent]=useState(0);const[selected,setSelected]=useState({});const[checked,setChecked]=useState({});const[done,setDone]=useState(false);
  const q=questions[current];
  const pick=(qi,ci)=>{if(checked[qi])return;setSelected(prev=>({...prev,[qi]:ci}));};
  const checkCurrent=()=>setChecked(prev=>({...prev,[current]:true}));
  const next=()=>{if(current<questions.length-1){setCurrent(c=>c+1);}else{const correct=questions.filter((q,i)=>selected[i]===q.correct).length;setDone(true);onDone&&onDone({correct,total:questions.length});}};
  const reset=()=>{setCurrent(0);setSelected({});setChecked({});setDone(false);};
  if(done){const correct=questions.filter((q,i)=>selected[i]===q.correct).length;return(<div style={{display:'flex',flexDirection:'column',gap:12}}><div className={correct===questions.length?'result-correct':'result-wrong'}>{correct===questions.length?'✓ Suurepärane! '+correct+'/'+questions.length:correct+'/'+questions.length+' vastust õiged'}</div><button onClick={reset} className="btn btn-ghost">Alusta uuesti</button></div>);}
  if(!q)return null;
  const isChecked=checked[current];const sel=selected[current];
  return(<div style={{display:'flex',flexDirection:'column',gap:12}}><div style={{fontWeight:700,fontSize:'1rem',marginBottom:8}}>{q.question}</div>{(q.options||[]).map((opt,ci)=>{let cls='choice-btn';if(isChecked){if(ci===q.correct)cls+=' correct';else if(ci===sel)cls+=' wrong';}else if(ci===sel)cls+=' selected';return<button key={ci} className={cls} onClick={()=>pick(current,ci)}>{opt}</button>;})} {!isChecked?<button onClick={checkCurrent} className="btn btn-pine" disabled={sel===undefined}>Kontrolli</button>:<button onClick={next} className="btn btn-pine">{current<questions.length-1?'Järgmine →':'Lõpeta'}</button>}</div>);
}

function OrderPlayer({exercise,onDone}){
  const correct=useMemo(()=>(exercise.sentence||'').split(' ').filter(Boolean),[exercise.sentence]);
  const shuffled=useMemo(()=>[...correct].sort(()=>Math.random()-.5),[correct]);
  const[placed,setPlaced]=useState([]);const[avail,setAvail]=useState(()=>shuffled.map((w,i)=>({w,i,used:false})));const[checked,setChecked]=useState(false);const[result,setResult]=useState(null);
  const addWord=item=>{if(item.used||checked)return;setPlaced(prev=>[...prev,item]);setAvail(prev=>prev.map(a=>a.i===item.i?{...a,used:true}:a));};
  const removeWord=item=>{if(checked)return;setPlaced(prev=>prev.filter(p=>p.i!==item.i));setAvail(prev=>prev.map(a=>a.i===item.i?{...a,used:false}:a));};
  const check=()=>{const pw=placed.map(p=>p.w);const ok=pw.join(' ')===correct.join(' ');setResult({isCorrect:ok,correct:correct.join(' ')});setChecked(true);onDone&&onDone({correct:ok?1:0,total:1});};
  const reset=()=>{setPlaced([]);setAvail(shuffled.map((w,i)=>({w,i,used:false})));setChecked(false);setResult(null);};
  return(<div style={{display:'flex',flexDirection:'column',gap:14}}><div><div style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Sinu vastus:</div><div className={'drop-zone'}>{placed.length===0&&<span style={{fontSize:'.82rem',color:'#9ca3af'}}>Klõpsa sõnadel allpool...</span>}{placed.map((item,i)=><span key={i} className="word-chip placed" onClick={()=>removeWord(item)}>{item.w} <span style={{marginLeft:4,opacity:.5,fontSize:'.72rem'}}>✕</span></span>)}</div></div><div><div style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Sõnad:</div><div style={{display:'flex',flexWrap:'wrap',gap:4}}>{avail.map((item,i)=><span key={i} className={'word-chip'+(item.used?' used':'')} onClick={()=>addWord(item)}>{item.w}</span>)}</div></div>{result&&<div className={result.isCorrect?'result-correct':'result-wrong'}>{result.isCorrect?'✓ Suurepärane!':'✗ Õige vastus: "'+result.correct+'"'}</div>}{!checked?<button onClick={check} className="btn btn-pine" disabled={placed.length===0}>Kontrolli</button>:<button onClick={reset} className="btn btn-ghost">Proovi uuesti</button>}</div>);
}

              <span style={{fontSize:'.72rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.05em'}}>{v.label}</span>
            </div>
            <div style={{fontSize:'1.5rem',fontWeight:700,color:'#1C2B3A'}}>{exercises.filter(e=>e.type===k).length}</div>
          </div>
        ))}
        <div style={{background:'#fff',border:'1px solid rgba(28,43,58,.08)',borderRadius:12,padding:'14px 16px'}}>
          <div style={{fontSize:'.72rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:5}}>Kokku määratud</div>
          <div style={{fontSize:'1.5rem',fontWeight:700,color:'#2F5D50'}}>{exercises.reduce((a,e)=>a+(e.assignCount||0),0)}</div>
        </div>
      </div>

      {/* Filters */}
      <div style={{background:'#fff',border:'1px solid rgba(28,43,58,.08)',borderRadius:14,padding:14,marginBottom:16}}>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center',justifyContent:'space-between'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Otsi harjutust..."
            style={{width:240,padding:'9px 14px'}}/>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {SUBJECTS.map(s=>(
              <button key={s.key} onClick={()=>setSubjectFilter(subjectFilter===s.key?'all':s.key)}
                className={'btn btn-sm '+(subjectFilter===s.key?'btn-dark':'btn-ghost')}>
                {s.emoji}
              </button>
            ))}
            <div style={{width:1,background:'rgba(28,43,58,.12)',margin:'0 4px'}}/>
            <button onClick={()=>setTypeFilter('all')} className={'btn btn-sm '+(typeFilter==='all'?'btn-dark':'btn-ghost')}>Kõik</button>
            {Object.entries(EX_TYPES).map(([k,v])=>(
              <button key={k} onClick={()=>setTypeFilter(k)} className={'btn btn-sm '+(typeFilter===k?'btn-dark':'btn-ghost')}>
                <i className={'fa-solid '+v.icon}/> {v.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginTop:10,fontSize:'.82rem',color:'#42536A'}}>{filtered.length} harjutust</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(430px,1fr))',gap:14}}>
        {filtered.map(ex=>(
          <ExerciseCard key={ex.id} ex={ex} isTeacher={isTeacher} students={students} user={user}
            onEdit={isTeacher?e=>window.location.href='/haldus-exercises-edit?id='+e.id:null}
            onDelete={isTeacher?async(e)=>{if(!window.confirm('Kustuta?'))return;await db.collection('exercises').doc(e.id).delete();notify('✓ Kustutatud');}:null}
            onAssign={null}
          />
        ))}
        {filtered.length===0&&<div className="empty-state" style={{gridColumn:'1/-1'}}>
          <i className="fa-solid fa-magnifying-glass"/><p>Harjutusi ei leitud.</p>
        </div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════
function LoginScreen({onLogin}) {
  const[email,setEmail]=useState('');const[pass,setPass]=useState('');const[err,setErr]=useState('');const[busy,setBusy]=useState(false);
  const go=async()=>{if(!email||!pass){setErr('Täida kõik väljad');return;}setBusy(true);setErr('');
    try{const res=await auth.signInWithEmailAndPassword(email,pass);const snap=await db.collection('users').doc(res.user.uid).get();
      if(snap.exists)onLogin({uid:res.user.uid,...snap.data()});else onLogin({uid:res.user.uid,email,role:'teacher'});
    }catch(e){setErr('Vale e-post või parool');}setBusy(false);};
  const googleLogin=async()=>{setBusy(true);setErr('');
    try{const res=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());const snap=await db.collection('users').doc(res.user.uid).get();
      if(snap.exists)onLogin({uid:res.user.uid,displayName:res.user.displayName,...snap.data()});
      else onLogin({uid:res.user.uid,displayName:res.user.displayName,email:res.user.email,role:'teacher'});
    }catch(e){setErr('Google sisselogimine ebaõnnestus');}setBusy(false);};
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'linear-gradient(135deg,#1C2B3A 0%,#2F5D50 100%)'}}>
      <div style={{background:'#FBFAF8',borderRadius:24,padding:36,width:'100%',maxWidth:380,boxShadow:'0 32px 80px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.9rem',fontWeight:600}}>Keele<span style={{color:'#C9882A'}}>Sepp</span></div>
          <div style={{fontSize:'.82rem',color:'#42536A',marginTop:4}}>Õppekava & Harjutused</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-post" onKeyDown={e=>e.key==='Enter'&&go()}/>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Parool" onKeyDown={e=>e.key==='Enter'&&go()}/>
        </div>
        {err&&<div style={{background:'#fee2e2',color:'#991b1b',borderRadius:9,padding:'9px 12px',fontSize:'.84rem',marginBottom:12}}>{err}</div>}
        <button onClick={go} disabled={busy} className="btn btn-dark" style={{width:'100%',marginBottom:10,borderRadius:12,padding:12}}>{busy?'Laeb…':'Sisene'}</button>
        <button onClick={googleLogin} disabled={busy} style={{width:'100%',padding:11,borderRadius:12,border:'1.5px solid rgba(28,43,58,.15)',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontWeight:600,fontSize:'.88rem'}}>
          <svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
          Sisene Google'iga
        </button>
        <div style={{textAlign:'center',marginTop:14}}><a href="/haldus/" style={{fontSize:'.8rem',color:'#42536A',textDecoration:'none'}}>← Tagasi haldussüsteemi</a></div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState('curriculum'); // 'curriculum' | 'exercises'
  const[notif,setNotif]=useState('');

  const notify=msg=>{setNotif(msg);setTimeout(()=>setNotif(''),3000);};
  const isTeacher=user?.role==='teacher'||user?.role==='admin'||user?.email==='zakutailo.pavel@gmail.com';

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        const snap=await db.collection('users').doc(fbUser.uid).get();
        if(snap.exists)setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,...snap.data()});
        else setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,email:fbUser.email,role:'student'});
      }else{setUser(null);}
      setLoading(false);
    });
    return unsub;
  },[]);

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}><div className="spinner"/></div>;
  if(!user)return<LoginScreen onLogin={setUser}/>;

  return(
    <div style={{minHeight:'100vh',background:'#F4F2EE'}}>
      {notif&&<div className="notif-toast">{notif}</div>}

      {/* Header */}
      <header className="top-header">
        <div style={{display:'flex',alignItems:'center',gap:20}}>
          <div className="logo">Keele<span>Sepp</span></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{color:'rgba(255,255,255,.5)',fontSize:'.82rem'}}>{user.displayName||user.email}</span>
          <a href="/haldus/" style={{color:'rgba(255,255,255,.6)',fontSize:'.8rem',textDecoration:'none',padding:'6px 12px',border:'1px solid rgba(255,255,255,.15)',borderRadius:8}}>
            ← Haldus
          </a>
          <button onClick={()=>auth.signOut().then(()=>setUser(null))}
            style={{background:'none',border:'1px solid rgba(255,255,255,.15)',color:'rgba(255,255,255,.6)',cursor:'pointer',borderRadius:8,padding:'6px 12px',fontSize:'.8rem'}}>
            Logi välja
          </button>
        </div>
      </header>

      {/* Mode tabs */}
      <div className="mode-bar">
        <button className={'mode-tab'+(tab==='curriculum'?' active':'')} onClick={()=>setTab('curriculum')}>
          <i className="fa-solid fa-layer-group" style={{marginRight:7}}/>Õppekava
        </button>
        <button className={'mode-tab'+(tab==='exercises'?' active':'')} onClick={()=>setTab('exercises')}>
          <i className="fa-solid fa-dumbbell" style={{marginRight:7}}/>Harjutused
        </button>
      </div>

      {/* Content */}
      {tab==='curriculum'&&<CurriculumView isTeacher={isTeacher} user={user} notify={notify}/>}
      {tab==='exercises'&&<ExercisesView isTeacher={isTeacher} user={user} notify={notify}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
