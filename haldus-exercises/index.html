<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:#EEECE7;color:#1C2B3A;min-height:100vh;}

/* HEADER */
.top-header{background:#1C2B3A;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.logo{font-family:'Fraunces',Georgia,serif;font-size:1.45rem;font-weight:700;color:#fff;letter-spacing:-.01em;}
.logo span{color:#C9882A;}

/* TOP NAV TABS */
.top-tabs{background:#fff;border-bottom:1px solid rgba(28,43,58,.1);display:flex;padding:0 28px;gap:2px;}
.top-tab{padding:0 24px;height:52px;font-size:.88rem;font-weight:700;cursor:pointer;border:none;background:none;color:#718096;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:8px;}
.top-tab:hover{color:#1C2B3A;}
.top-tab.active{color:#1C2B3A;border-bottom-color:#C9882A;}
.top-tab .tab-count{background:rgba(28,43,58,.08);color:#42536A;font-size:.68rem;padding:2px 7px;border-radius:20px;font-weight:800;}
.top-tab.active .tab-count{background:#C9882A;color:#fff;}

/* BREADCRUMB */
.bc{max-width:1300px;margin:0 auto;padding:18px 28px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.bc-link{font-size:.8rem;color:#718096;cursor:pointer;font-weight:600;transition:color .12s;}
.bc-link:hover{color:#2F5D50;}
.bc-sep{color:rgba(28,43,58,.2);font-size:.72rem;}
.bc-cur{font-size:.8rem;color:#1C2B3A;font-weight:700;}

/* SUBJECT CARDS */
.subject-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;max-width:1000px;margin:0 auto;padding:40px 28px 60px;}
@media(max-width:900px){.subject-grid{grid-template-columns:1fr;}}
.subj-card{border:0.5px solid transparent;border-radius:20px;overflow:hidden;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;}
.subj-card:hover{transform:translateY(-4px);box-shadow:0 14px 44px rgba(28,43,58,.11);}
.subj-head{padding:36px 30px 26px;flex:1;}
.subj-icon-wrap{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:22px;}
.subj-name{font-size:1.35rem;font-weight:600;margin-bottom:8px;color:#1C2B3A;}
.subj-sub{font-size:.81rem;color:#7A7167;line-height:1.6;margin-bottom:20px;}
.subj-pills{display:flex;gap:6px;flex-wrap:wrap;}
.subj-pill{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px;}
.subj-bar{height:4px;}
.subj-foot{padding:16px 30px;display:flex;align-items:center;justify-content:space-between;font-size:.78rem;}
.subj-foot-count{color:#7A7167;}
.subj-foot-link{font-weight:600;display:flex;align-items:center;gap:4px;}

/* LEVEL CHIPS */
.level-wrap{max-width:1000px;margin:0 auto;padding:32px 28px 60px;}
.level-title{font-size:1.1rem;font-weight:600;margin-bottom:22px;display:flex;align-items:center;gap:10px;color:#7A7167;}
.level-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.level-chip{padding:28px 24px 24px;border-radius:18px;border:0.5px solid rgba(28,43,58,.1);background:#fff;cursor:pointer;font-weight:600;font-size:1.1rem;color:#1C2B3A;transition:all .2s;display:flex;flex-direction:column;align-items:flex-start;gap:10px;}
.level-chip:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(28,43,58,.11);}
.lc-cnt{font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:8px;}

/* CONTENT SHELL */
.content-shell{max-width:1300px;margin:0 auto;padding:0 28px 60px;display:grid;grid-template-columns:250px minmax(0,1fr);gap:22px;align-items:start;}
@media(max-width:960px){.content-shell{grid-template-columns:1fr;}}

/* SIDEBAR */

.sidebar-section{padding:14px 14px 10px;}
.sidebar-label{font-size:.68rem;font-weight:800;color:#718096;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding:0 4px;}
.sidebar-btn{width:100%;text-align:left;padding:9px 12px;border-radius:10px;border:none;background:none;cursor:pointer;font-size:.84rem;font-weight:600;color:#1C2B3A;display:flex;align-items:center;justify-content:space-between;transition:all .12s;margin-bottom:2px;}
.sidebar-btn:hover{background:rgba(47,93,80,.07);}
.sidebar-btn.active{background:rgba(47,93,80,.12);color:#2F5D50;font-weight:800;}
.sidebar-btn .sb-count{font-size:.7rem;font-weight:700;color:#718096;background:rgba(28,43,58,.06);padding:2px 7px;border-radius:6px;}
.sidebar-btn.active .sb-count{color:#2F5D50;background:rgba(47,93,80,.15);}
.sidebar-divider{height:1px;background:rgba(28,43,58,.07);margin:6px 0;}
.sidebar-btn:hover+.topic-actions,.topic-actions:hover,.sidebar-btn:focus-within+.topic-actions{opacity:1!important;}
div:hover>.topic-actions{opacity:1!important;}

/* EXAM SECTION IN SIDEBAR */
.exam-sidebar-btn{width:100%;text-align:left;padding:9px 12px;border-radius:10px;border:none;cursor:pointer;font-size:.84rem;font-weight:700;display:flex;align-items:center;gap:9px;transition:all .12s;margin-bottom:2px;}
.exam-sidebar-btn:hover{filter:brightness(.95);}
.exam-sidebar-btn.active{filter:brightness(.9);}

/* MAIN CONTENT */
.main-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.main-title{font-size:1.25rem;font-weight:800;font-family:'Fraunces',serif;}
.main-sub{font-size:.8rem;color:#718096;margin-top:3px;}

/* LESSON CARD */
.lesson-card{background:#fff;border:0.5px solid rgba(28,43,58,.09);border-radius:14px;padding:18px 20px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:all .15s;}
.lesson-card:hover{border-color:rgba(28,43,58,.18);box-shadow:0 4px 18px rgba(28,43,58,.07);}
.lesson-icon{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.lesson-body{flex:1;min-width:0;}
.lesson-title{font-size:.96rem;font-weight:700;margin-bottom:3px;}
.lesson-desc{font-size:.8rem;color:#718096;line-height:1.45;margin-bottom:8px;}
.lesson-actions{display:flex;gap:6px;flex-shrink:0;align-items:flex-start;}

/* FILE CHIPS */
.file-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.file-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:8px;border:1px solid rgba(28,43,58,.1);background:#F9F8F6;font-size:.76rem;font-weight:600;color:#42536A;cursor:pointer;text-decoration:none;transition:all .12s;}
.file-chip:hover{border-color:#C9882A;color:#A96E1A;background:rgba(201,136,42,.06);}
.fi-ext{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;color:#fff;flex-shrink:0;}

/* EXAM CARDS */
.exam-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:16px;}
@media(max-width:700px){.exam-grid{grid-template-columns:1fr;}}
.exam-part-card{border-radius:16px;overflow:hidden;border:0.5px solid rgba(28,43,58,.1);cursor:pointer;transition:all .18s;background:#FAFAF8;}
.exam-part-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(28,43,58,.1);}
.exam-part-head{padding:22px 22px 14px;}
.exam-part-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:14px;}
.exam-part-title{font-size:1rem;font-weight:600;margin-bottom:4px;color:#1C2B3A;}
.exam-part-sub{font-size:.76rem;color:#7A7167;line-height:1.4;}
.exam-part-body{padding:0 22px 20px;display:flex;flex-direction:column;gap:8px;}
.exam-item{background:#fff;border-radius:10px;padding:10px 14px;border:0.5px solid rgba(28,43,58,.09);cursor:pointer;transition:all .12s;}
.exam-item:hover{border-color:rgba(28,43,58,.18);box-shadow:0 2px 8px rgba(28,43,58,.06);}
.exam-item-name{font-size:.84rem;font-weight:700;color:#1C2B3A;margin-bottom:2px;}
.exam-item-meta{font-size:.73rem;color:#718096;}
.exam-item-files{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}

/* EMPTY */
.empty{text-align:center;padding:56px 20px;color:#718096;}
.empty i{font-size:2.2rem;margin-bottom:12px;opacity:.25;display:block;}
.empty p{font-size:.86rem;max-width:260px;margin:0 auto 14px;line-height:1.5;}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed rgba(28,43,58,.16);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:all .15s;background:rgba(28,43,58,.015);}
.upload-zone:hover{border-color:#C9882A;background:rgba(201,136,42,.04);}
.upload-zone input{display:none;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(28,43,58,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200;backdrop-filter:blur(5px);}
.modal-box{background:#FBFAF8;border-radius:20px;max-width:600px;width:100%;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column;}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid rgba(28,43,58,.08);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#FBFAF8;z-index:2;}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
.modal-foot{padding:14px 24px;border-top:1px solid rgba(28,43,58,.08);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#FBFAF8;}

/* EXERCISE STYLES */
.ex-card{background:#fff;border:1px solid rgba(28,43,58,.08);border-radius:14px;padding:18px 20px;transition:all .18s;}
.ex-card:hover{border-color:#C9882A;transform:translateY(-1px);box-shadow:0 4px 16px rgba(28,43,58,.08);}
.blank-input{border:none;border-bottom:2px solid #C9882A;background:transparent;padding:2px 6px;font-size:1rem;font-family:inherit;min-width:80px;outline:none;text-align:center;}
.blank-input.correct{border-bottom-color:#166534;background:rgba(22,101,52,.07);}
.blank-input.wrong{border-bottom-color:#991b1b;background:rgba(153,27,27,.07);}
.choice-btn{width:100%;text-align:left;padding:11px 15px;border-radius:10px;border:1.5px solid rgba(28,43,58,.12);background:#fff;cursor:pointer;font-size:.88rem;font-family:inherit;transition:all .15s;margin-bottom:7px;}
.choice-btn:hover{border-color:#C9882A;background:rgba(201,136,42,.05);}
.choice-btn.selected{border-color:#C9882A;background:rgba(201,136,42,.1);font-weight:600;}
.choice-btn.correct{border-color:#166534;background:rgba(22,101,52,.08);color:#166534;font-weight:700;}
.choice-btn.wrong{border-color:#991b1b;background:rgba(153,27,27,.07);color:#991b1b;}
.result-ok{background:#dcfce7;color:#166534;border-radius:10px;padding:13px 17px;font-weight:700;}
.result-fail{background:#fee2e2;color:#991b1b;border-radius:10px;padding:13px 17px;font-weight:700;}
.word-chip{display:inline-flex;align-items:center;padding:6px 11px;border-radius:8px;border:1.5px solid rgba(28,43,58,.14);background:#fff;cursor:grab;font-size:.86rem;font-family:inherit;margin:3px;user-select:none;transition:all .12s;}
.word-chip:hover{border-color:#C9882A;}
.word-chip.used{opacity:.32;cursor:not-allowed;}
.word-chip.placed{background:rgba(47,93,80,.1);border-color:#2F5D50;cursor:pointer;}
.drop-zone{min-height:42px;border:2px dashed rgba(28,43,58,.16);border-radius:10px;padding:6px 10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;background:rgba(28,43,58,.02);}
.type-badge-fill{background:rgba(37,99,235,.1);color:#1d4ed8;}
.type-badge-choice{background:rgba(124,58,237,.1);color:#6d28d9;}
.type-badge-order{background:rgba(47,93,80,.1);color:#2F5D50;}
.type-badge-writing{background:rgba(201,136,42,.12);color:#A96E1A;}
.type-badge-reading{background:rgba(14,116,144,.1);color:#0e7490;}
.type-badge-match{background:rgba(5,150,105,.1);color:#047857;}
.type-badge-translate{background:rgba(219,39,119,.1);color:#be185d;}

/* UTILITIES */
.spinner{width:30px;height:30px;border:3px solid rgba(28,43,58,.1);border-top-color:#2F5D50;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.notif{position:fixed;top:18px;right:18px;background:#1C2B3A;color:#fff;padding:11px 18px;border-radius:12px;z-index:500;font-weight:600;font-size:.86rem;box-shadow:0 8px 28px rgba(0,0,0,.22);}
.sec-lbl{font-size:.7rem;font-weight:800;color:#718096;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;}
select,input:not([type=radio]):not([type=checkbox]),textarea{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid rgba(28,43,58,.12);background:#fff;font-family:inherit;font-size:.88rem;color:#1C2B3A;outline:none;}
select:focus,input:focus,textarea:focus{border-color:#2F5D50;box-shadow:0 0 0 3px rgba(47,93,80,.1);}
textarea{resize:vertical;line-height:1.5;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:10px;font-family:inherit;font-weight:700;font-size:.83rem;cursor:pointer;border:none;transition:all .14s;}
.btn-pine{background:#2F5D50;color:#fff;}
.btn-pine:hover{background:#265048;}
.btn-pine:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:rgba(28,43,58,.07);color:#42536A;border:1px solid rgba(28,43,58,.1);}
.btn-ghost:hover{background:rgba(28,43,58,.12);}
.btn-dark{background:#1C2B3A;color:#fff;}
.btn-sm{padding:6px 12px;font-size:.77rem;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:.71rem;font-weight:700;}

/* WORKSHEET PREVIEW MODAL */
.ws-prev-ov{position:fixed;inset:0;background:rgba(28,43,58,.6);display:flex;align-items:center;justify-content:center;padding:16px;z-index:300;backdrop-filter:blur(5px);}
.ws-prev-box{background:#E8E6E1;border-radius:20px;max-width:900px;width:100%;max-height:94vh;overflow-y:auto;display:flex;flex-direction:column;}
.ws-prev-head{padding:16px 22px;background:#1C2B3A;border-radius:20px 20px 0 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:2;}
.ws-prev-body{padding:24px;display:flex;justify-content:center;}
.ws-a4{width:100%;max-width:720px;background:#fff;border-radius:12px;box-shadow:0 4px 32px rgba(0,0,0,.12);padding:48px 56px 56px;font-family:'IBM Plex Sans',sans-serif;color:#1C2B3A;}
.ws-sheet-hdr{margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #1C2B3A;display:flex;justify-content:space-between;align-items:flex-start;}
.ws-sheet-title{font-size:1.4rem;font-weight:700;margin-bottom:4px;}
.ws-sheet-meta{font-size:.75rem;color:#718096;display:flex;gap:12px;flex-wrap:wrap;}
.ws-score-box{border:1px solid #1C2B3A;border-radius:5px;padding:4px 11px;font-size:.76rem;font-weight:600;white-space:nowrap;}
.ws-pb{margin-bottom:20px;}
.ws-pb-num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#1C2B3A;color:#fff;font-size:.58rem;font-weight:800;margin-right:6px;}
.ws-pb-lbl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#718096;}
.ws-fill-line{font-size:.9rem;line-height:2.3;}
.ws-blank{display:inline-block;min-width:70px;border-bottom:1.5px solid #1C2B3A;margin:0 3px;vertical-align:bottom;}
.ws-choice-q{font-size:.88rem;font-weight:600;margin-bottom:4px;}
.ws-choice-opt{display:flex;align-items:center;gap:7px;font-size:.84rem;margin:2px 0 2px 10px;}
.ws-circle{width:12px;height:12px;border-radius:50%;border:1.5px solid #1C2B3A;flex-shrink:0;}
.ws-wr-task{font-size:.86rem;margin-bottom:8px;line-height:1.5;}
.ws-wr-line{height:24px;border-bottom:1px solid rgba(28,43,58,.15);}
.ws-match-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.ws-match-item{padding:5px 9px;border:1px solid rgba(28,43,58,.15);border-radius:5px;font-size:.83rem;margin-bottom:4px;}
.ws-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.ws-chip{padding:4px 10px;border:1.5px solid rgba(28,43,58,.18);border-radius:6px;font-size:.84rem;}
.ws-table{width:100%;border-collapse:collapse;font-size:.83rem;}
.ws-table th{background:#F0EEE9;padding:6px 8px;border:1px solid rgba(28,43,58,.15);text-align:left;font-weight:700;}
.ws-table td{padding:6px 8px;border:1px solid rgba(28,43,58,.15);height:26px;}
.ws-passage{background:#F9F8F6;border:1px solid rgba(28,43,58,.1);border-radius:6px;padding:10px 12px;margin-bottom:10px;font-size:.85rem;line-height:1.65;white-space:pre-wrap;}
.ws-divider{border:none;border-top:1px dashed rgba(28,43,58,.12);margin:16px 0;}

/* ── LESSON BUILDER ──────────────────────────────────────────── */
.lb-ov{position:fixed;inset:0;background:rgba(28,43,58,.55);display:flex;align-items:center;justify-content:center;padding:12px;z-index:200;backdrop-filter:blur(5px);}
.lb-box{background:#FBFAF8;border-radius:20px;max-width:720px;width:100%;height:92vh;overflow:hidden;display:flex;flex-direction:column;}
.lb-box.wide{max-width:1100px;}
.lb-split{display:grid;grid-template-columns:1fr 380px;flex:1;min-height:0;overflow:hidden;}
.lb-split-left{overflow-y:auto;padding-bottom:100px;min-height:0;}
.lb-split-right{background:#F4F2EE;border-left:1px solid rgba(28,43,58,.08);overflow-y:auto;display:flex;flex-direction:column;min-height:0;}
.lp-head{padding:14px 18px 10px;border-bottom:1px solid rgba(28,43,58,.08);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.lp-head-lbl{font-size:.68rem;font-weight:700;color:#B0A898;text-transform:uppercase;letter-spacing:.09em;}
.lp-body{padding:16px 18px;flex:1;overflow-y:auto;}
.lp-phase-card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px;border:0.5px solid rgba(28,43,58,.08);}
.lp-phase-card.current{border-color:rgba(28,43,58,.2);box-shadow:0 2px 8px rgba(28,43,58,.07);}
.lp-pc-badge{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.07em;display:inline-flex;margin-bottom:7px;}
.lp-pc-name{font-size:.88rem;font-weight:700;color:#1C2B3A;margin-bottom:6px;font-family:'Fraunces',serif;}
.lp-pc-time{font-size:.68rem;color:#B0A898;margin-bottom:8px;}
.lp-pc-field{margin-bottom:6px;}

function FileChip({file}){
  const ext=(file.name||'').split('.').pop().toLowerCase();
  return(
    <a href={file.url} target="_blank" rel="noreferrer" className="file-chip">
      <span className="fi-ext" style={{background:EXT_COLORS[ext]||'#42536A'}}>{ext.slice(0,3).toUpperCase()}</span>
      <span style={{maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{file.name}</span>
      <i className="fa-solid fa-arrow-up-right-from-square" style={{fontSize:'.6rem',opacity:.45,marginLeft:2}}/>
    </a>
  );

function FileUploader({onUpload,uploading,setUploading}){
  const ref=useRef();
  const[progress,setProgress]=useState(0);
  const handle=async files=>{
    if(!files||!files.length)return;
    setUploading(true);
    const results=[];
    for(const file of files){
      const r=storage.ref(`curriculum/${Date.now()}_${file.name}`);
      const task=r.put(file);
      await new Promise((res,rej)=>task.on('state_changed',
        s=>setProgress(Math.round(s.bytesTransferred/s.totalBytes*100)),rej,
        async()=>{const url=await r.getDownloadURL();results.push({name:file.name,url,size:file.size,type:file.type});res();}
      ));
    }
    setUploading(false);setProgress(0);onUpload(results);
  };
  return(
    <div className="upload-zone" onDrop={e=>{e.preventDefault();handle(e.dataTransfer.files);}} onDragOver={e=>e.preventDefault()} onClick={()=>ref.current?.click()}>
      <input ref={ref} type="file" multiple onChange={e=>handle(e.target.files)}/>
      {uploading
        ?<div><div className="spinner" style={{margin:'0 auto 8px'}}/><div style={{fontSize:'.8rem',color:'#718096'}}>Laadimine... {progress}%</div></div>
        :<div><i className="fa-solid fa-cloud-arrow-up" style={{fontSize:'1.5rem',color:'#718096',marginBottom:7,display:'block'}}/><div style={{fontWeight:700,color:'#1C2B3A',marginBottom:3}}>Lohista failid siia</div><div style={{fontSize:'.76rem',color:'#718096'}}>PDF, Word, PPT, pildid, helifailid</div></div>}
    </div>
  );

// ── LESSON MODAL (SMART BUILDER) ──────────────────────────────
function LessonModal({lesson,subject,level,topic,examPart,onClose,onSave}){
  const isEdit=!!lesson?.id;
  // If editing existing simple lesson — show simple form
  const[builderMode,setBuilderMode]=useState(!examPart&&(!isEdit||!!(lesson?.phaseData)));
  const[step,setStep]=useState(0); // 0=type, 1=meta, 2=phases, 3=files
  const[lessonTypeDef,setLessonTypeDef]=useState(
    lesson?.lessonTypeDef
      ? LESSON_TYPE_DEFS.find(t=>t.key===lesson.lessonTypeDef)||null
      : null
  );

  // Simple form state
  const[title,setTitle]=useState(lesson?.title||'');
  const[type,setType]=useState(lesson?.type||'lesson');
  const[desc,setDesc]=useState(lesson?.description||'');
  const[files,setFiles]=useState(lesson?.files||[]);
  const[order,setOrder]=useState(lesson?.order||0);
  const[uploading,setUploading]=useState(false);
  const[saving,setSaving]=useState(false);

  // Builder state — phase content keyed by phase.key → field index → value
  const[phaseData,setPhaseData]=useState(lesson?.phaseData||{});
  const[builderTitle,setBuilderTitle]=useState(lesson?.title||'');
  const[builderObjectives,setBuilderObjectives]=useState(lesson?.builderObjectives||'');
  const[builderDuration,setBuilderDuration]=useState(lesson?.builderDuration||60);
  const[builderNotes,setBuilderNotes]=useState(lesson?.builderNotes||'');

  const setPhaseField=(phaseKey,fieldIdx,val)=>setPhaseData(p=>({...p,[phaseKey]:{...(p[phaseKey]||{}),[fieldIdx]:val}}));

  const STEPS=['Tunni tüüp','Üldinfo','Tunni käik','Eelvaade'];

  // Build description from phases
  const buildDescription=()=>{
    if(!lessonTypeDef) return builderObjectives;
    const parts=[builderObjectives&&('Eesmärgid: '+builderObjectives)];
    lessonTypeDef.phases.forEach(ph=>{
      const data=phaseData[ph.key]||{};
      const filled=ph.fields.map((f,i)=>data[i]?(f+': '+data[i]):'').filter(Boolean);
      if(filled.length) parts.push('\n'+ph.name+' ('+ph.time+'):\n'+filled.map(f=>'• '+f).join('\n'));
    });
    if(builderNotes) parts.push('\nMärkused: '+builderNotes);
    return parts.filter(Boolean).join('\n');
  };

  const saveSimple=async()=>{
    if(!title.trim()){alert('Sisesta pealkiri');return;}
    setSaving(true);
    await onSave({...(lesson||{}),title:title.trim(),type,description:desc.trim(),files,order:Number(order)||0,subject,level,topic,examPart:examPart||null,updatedAt:new Date().toISOString()});
    setSaving(false);onClose();
  };

  const saveBuilder=async()=>{
    if(!builderTitle.trim()){alert('Sisesta tunni pealkiri');return;}
    setSaving(true);
    await onSave({
      ...(lesson||{}),
      title:builderTitle.trim(),
      type:'lesson',
      description:buildDescription(),
      lessonTypeDef:lessonTypeDef?.key||'',
      lessonTypeLabel:lessonTypeDef?.name||'',
      phaseData,
      builderObjectives,
      builderDuration,
      builderNotes,
      files,
      order:Number(order)||0,
      subject,level,topic,
      examPart:examPart||null,
      updatedAt:new Date().toISOString()
    });
    setSaving(false);onClose();
  };

  // ── SIMPLE MODAL (edit/exam) ───────────────────────────────
  if(!builderMode||examPart) return(
    <div className="modal-ov">
      <div className="modal-box">
        <div className="modal-head">
          <h2 style={{fontSize:'1rem',fontWeight:800}}>{isEdit?'✏️ Muuda kirjet':'➕ Lisa kirje'}</h2>
          <button onClick={onClose} className="btn btn-ghost btn-sm">✕</button>
        </div>
        <div className="modal-body">
          {!isEdit&&!examPart&&<button onClick={()=>setBuilderMode(true)} className="btn btn-pine btn-sm" style={{marginBottom:4}}>
            <i className="fa-solid fa-wand-magic-sparkles"/> Kasuta tunni koostajat
          </button>}
          {examPart&&<div style={{padding:'9px 13px',borderRadius:10,background:EXAM_PARTS.find(p=>p.key===examPart)?.bg||'#f5f5f5',fontSize:'.82rem',fontWeight:600}}>
            Eksami osa: {EXAM_PARTS.find(p=>p.key===examPart)?.label}
          </div>}
          <div><div className="sec-lbl">Pealkiri *</div><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="nt. Eksami kirjutamisosa — variant 1"/></div>
          <div>
            <div className="sec-lbl">Tüüp</div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
              {Object.entries(LESSON_TYPES).map(([k,v])=>(
                <button key={k} onClick={()=>setType(k)} className="btn btn-sm"
                  style={{border:'1.5px solid '+(type===k?v.color:'rgba(28,43,58,.12)'),background:type===k?v.color+'18':'#fff',color:type===k?v.color:'#42536A'}}>
                  <i className={'fa-solid '+v.icon}/> {v.label}
                </button>
              ))}
            </div>
          </div>
          <div><div className="sec-lbl">Kirjeldus</div><textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={3} placeholder="Lühike kirjeldus..."/></div>
          <div><div className="sec-lbl">Järjekord</div><input type="number" value={order} onChange={e=>setOrder(e.target.value)} style={{width:100}}/></div>
          <div>
            <div className="sec-lbl">Failid</div>
            <FileUploader onUpload={f=>setFiles(p=>[...p,...f])} uploading={uploading} setUploading={setUploading}/>
            {files.length>0&&<div className="file-row" style={{marginTop:10}}>
              {files.map((f,i)=><span key={i} style={{display:'flex',alignItems:'center',gap:3}}>
                <FileChip file={f}/><button onClick={()=>setFiles(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#dc2626',cursor:'pointer',fontSize:'.7rem',padding:'0 3px'}}>✕</button>
              </span>)}
            </div>}
          </div>
        </div>
        <div className="modal-foot">
          <button onClick={onClose} className="btn btn-ghost">Tühista</button>
          <button onClick={saveSimple} disabled={saving||uploading} className="btn btn-pine">{saving?'Salvestab…':'✓ Salvesta'}</button>
        </div>
      </div>
    </div>
  );

  // ── BUILDER MODAL ────────────────────────────────────────
  return(
    <div className="lb-ov">
      <div className={'lb-box'+(step===2?' wide':'')}>
        {/* Head */}
        <div className="lb-head">
          <div>
            <div style={{fontWeight:800,fontSize:'1rem'}}>
              {step===0?'Vali tunni tüüp':step===1?'Üldinfo':step===2?'Tunni käik':'Eelvaade'}
            </div>
            <div style={{fontSize:'.74rem',color:'#7A7167',marginTop:1}}>
              {lessonTypeDef?lessonTypeDef.emoji+' '+lessonTypeDef.name:'Uue tunni koostaja'}
            </div>
          </div>
          <button onClick={onClose} className="btn btn-ghost btn-sm">✕</button>
        </div>

        {/* Step indicator */}
        <div className="lb-steps">
          {STEPS.map((s,i)=>(
            <React.Fragment key={i}>
              <div className={'lb-step'+(i===step?' active':i<step?' done':'')}>
                <div className="lb-step-num">{i<step?'✓':i+1}</div>
                {s}
              </div>
              {i<STEPS.length-1&&<div className="lb-step-sep">›</div>}
            </React.Fragment>
          ))}
        </div>

        {/* Body */}
        <div className="lb-body" style={step===2&&lessonTypeDef?{padding:0,display:'flex',flexDirection:'column',overflow:'hidden'}:{}}>

          {/* STEP 0: Lesson type */}
          {step===0&&(
            <div className="lt-grid">
              {LESSON_TYPE_DEFS.map(ltd=>(
                <div key={ltd.key} className={'lt-card'+(lessonTypeDef?.key===ltd.key?' selected':'')}
                  style={{borderColor:lessonTypeDef?.key===ltd.key?ltd.color:'rgba(28,43,58,.1)',background:lessonTypeDef?.key===ltd.key?ltd.bg:'#fff'}}
                  onClick={()=>setLessonTypeDef(ltd)}>
                  <div className="lt-icon" style={{background:ltd.bg}}>{ltd.emoji}</div>
                  <div className="lt-name" style={{color:lessonTypeDef?.key===ltd.key?ltd.color:'#1C2B3A'}}>{ltd.name}</div>
                  <div className="lt-desc">{ltd.desc}</div>
                </div>
              ))}
              <div className={'lt-card'+(lessonTypeDef===null&&step>0?' selected':'')}
                style={{borderColor:'rgba(28,43,58,.1)',borderStyle:'dashed'}}
                onClick={()=>{setLessonTypeDef(null);setStep(1);}}>
                <div className="lt-icon" style={{background:'rgba(28,43,58,.06)',fontSize:'1.4rem'}}>📝</div>
                <div className="lt-name">Vaba vorm</div>
                <div className="lt-desc">Loo kirje ilma struktureeritud mallita — lihtsalt pealkiri, kirjeldus ja failid.</div>
              </div>
            </div>
          )}

          {/* STEP 1: General info */}
          {step===1&&(
            <div className="modal-body" style={{padding:'16px 24px'}}>
              {lessonTypeDef&&<div style={{padding:'10px 14px',borderRadius:10,background:lessonTypeDef.bg,border:'1px solid '+lessonTypeDef.color+'33',marginBottom:14,fontSize:'.84rem'}}>
                <span style={{fontSize:'1.1rem',marginRight:7}}>{lessonTypeDef.emoji}</span>
                <strong>{lessonTypeDef.name}</strong> — {lessonTypeDef.desc}
              </div>}
              <div><div className="sec-lbl">Tunni pealkiri *</div>
                <input value={builderTitle} onChange={e=>setBuilderTitle(e.target.value)} placeholder={`nt. ${topic||'Minu pere'} — ${lessonTypeDef?.name||'tund'}`}/>
              </div>
              <div><div className="sec-lbl">Õpieesmärgid — "Tunni lõpuks õpilane oskab..."</div>
                <textarea value={builderObjectives} onChange={e=>setBuilderObjectives(e.target.value)} rows={3}
                  placeholder="nt. kasutada oleviku pööramisvormi, rääkida oma perekonnast 5–7 lauses, mõista kuulamisteksti põhiideed"/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><div className="sec-lbl">Tunni kestus (min)</div>
                  <input type="number" value={builderDuration} onChange={e=>setBuilderDuration(+e.target.value)} min={20} max={180}/>
                </div>
                <div><div className="sec-lbl">Järjekord</div>
                  <input type="number" value={order} onChange={e=>setOrder(e.target.value)} min={0}/>
                </div>
              </div>
              <div><div className="sec-lbl">Üldmärkused õpetajale (valikuline)</div>
                <textarea value={builderNotes} onChange={e=>setBuilderNotes(e.target.value)} rows={2}
                  placeholder="Rühma tase, eripärad, mida arvestada..."/>
              </div>
            </div>
          )}

          {/* STEP 2: Phases — split with live preview */}
          {step===2&&lessonTypeDef&&(
            <div className="lb-split">
              {/* LEFT: editor */}
              <div className="lb-split-left">
              <div style={{paddingTop:8,paddingBottom:8}}>
              {lessonTypeDef.phases.map((ph,pi)=>{
                const phFiles=(phaseData[ph.key]||{}).files||[];
                const phUploading=(phaseData[ph.key]||{}).uploading||false;
                return(
                  <div key={ph.key} className="ph-section" style={{borderLeftColor:ph.color,marginBottom:12}}>
                    <div className="ph-head">
                      <span className="ph-badge" style={{background:ph.color+'18',color:ph.color}}>{pi+1}</span>
                      <span className="ph-title">{ph.name}</span>
                      <span className="ph-time">{ph.time}</span>
                    </div>
                    <div className="ph-hint">{ph.hint}</div>
                    {ph.fields.map((field,fi)=>(
                      <div key={fi} style={{marginBottom:8}}>
                        <div className="sec-lbl">{field}</div>
                        <textarea
                          value={(phaseData[ph.key]||{})[fi]||''}
                          onChange={e=>setPhaseField(ph.key,fi,e.target.value)}
                          rows={2}
                          placeholder="Kirjuta oma plaan siia..."/>
                      </div>
                    ))}
                    {/* Per-phase file upload */}
                    <div className="ph-files">
                      <div className="ph-files-lbl">
                        <i className="fa-solid fa-paperclip" style={{fontSize:'.65rem'}}/>
                        Materjalid sellele faasile
                        {phFiles.length>0&&<span style={{background:'rgba(47,93,80,.12)',color:'#2F5D50',borderRadius:5,padding:'1px 6px',fontSize:'.64rem'}}>{phFiles.length}</span>}
                      </div>
                      {phFiles.length>0&&(
                        <div className="ph-file-row">
                          {phFiles.map((f,fi2)=>(
                            <span key={fi2} style={{display:'flex',alignItems:'center',gap:3}}>
                              <FileChip file={f}/>
                              <button onClick={()=>{
                                const newFiles=phFiles.filter((_,j)=>j!==fi2);
                                setPhaseData(p=>({...p,[ph.key]:{...(p[ph.key]||{}),files:newFiles}}));
                              }} style={{background:'none',border:'none',color:'#dc2626',cursor:'pointer',fontSize:'.68rem',padding:'0 2px'}}>✕</button>
                            </span>
                          ))}
                        </div>
                      )}
                      <label className="ph-add-file" style={{marginTop:phFiles.length>0?6:0}}>
                        <input type="file" multiple style={{display:'none'}} onChange={async e=>{
                          const newUploaded=[];
                          setPhaseData(p=>({...p,[ph.key]:{...(p[ph.key]||{}),uploading:true}}));
                          for(const file of e.target.files){
                            try{
                              const r=storage.ref('curriculum/'+Date.now()+'_'+file.name);
                              await r.put(file);
                              const url=await r.getDownloadURL();
                              newUploaded.push({name:file.name,url,size:file.size});
                            }catch{
                              // fallback base64
                              await new Promise(res=>{
                                const rd=new FileReader();
                                rd.onload=ev=>{newUploaded.push({name:file.name,url:ev.target.result,size:file.size});res();};
                                rd.readAsDataURL(file);
                              });
                            }
                          }
                          setPhaseData(p=>({...p,[ph.key]:{...(p[ph.key]||{}),files:[...(p[ph.key]?.files||[]),...newUploaded],uploading:false}}));
                          e.target.value='';
                        }}/>
                        {phUploading?<><div className="sp-dark" style={{width:12,height:12,borderWidth:2}}/> Laeb...</>
                          :<><i className="fa-solid fa-plus" style={{fontSize:'.65rem'}}/> Lisa fail</>}
                      </label>
                    </div>
                  </div>
                );
              })}
            </div>
              </div>

              {/* RIGHT: live conduct preview */}
              <div className="lb-split-right">
                <div className="lp-head">
                  <i className="fa-solid fa-eye" style={{fontSize:'.72rem',color:'#B0A898'}}/>
                  <span className="lp-head-lbl">Tunni käigu eelvaade</span>
                </div>
                <div className="lp-body">
                  {/* Title */}
                  {builderTitle&&(
                    <div style={{marginBottom:14}}>
                      <div style={{fontFamily:'Fraunces,serif',fontSize:'1rem',fontWeight:700,color:'#1C2B3A',marginBottom:2}}>{builderTitle}</div>
                      {builderObjectives&&<div style={{fontSize:'.74rem',color:'#2F5D50',lineHeight:1.4}}>{builderObjectives.slice(0,80)}{builderObjectives.length>80?'...':''}</div>}
                    </div>
                  )}
                  {/* Phase cards */}
                  {lessonTypeDef.phases.map((ph,pi)=>{
                    const data=phaseData[ph.key]||{};
                    const phFiles=data.files||[];
                    const hasContent=ph.fields.some((_,fi)=>data[fi])||phFiles.length>0;
                    return(
                      <div key={ph.key} className={'lp-phase-card'+(hasContent?' current':'')}>
                        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
                          <div className="lp-timer-mock" style={{color:ph.color}}>{String(ph.time).padStart(2,'0')}:00</div>
                          <div style={{flex:1}}>
                            <div className="lp-timer-bar-mock">
                              <div className="lp-timer-fill-mock" style={{width:'0%',background:ph.color}}/>
                            </div>
                          </div>
                        </div>
                        <span className="lp-pc-badge" style={{background:ph.color+'15',color:ph.color}}>{pi+1}/{lessonTypeDef.phases.length}</span>
                        <div className="lp-pc-name">{ph.name}</div>
                        {hasContent
                          ?<>
                            {ph.fields.map((fieldName,fi)=>{
                              const val=data[fi]||'';
                              if(!val) return null;
                              return(
                                <div key={fi} className="lp-pc-field">
                                  <div className="lp-pc-field-lbl">{fieldName}</div>
                                  <div className="lp-pc-field-val">{val.slice(0,80)}{val.length>80?'...':''}</div>
                                </div>
                              );
                            })}
                            {phFiles.length>0&&<div style={{fontSize:'.72rem',color:'#2F5D50',marginTop:4}}>
                              <i className="fa-solid fa-paperclip" style={{marginRight:4,fontSize:'.65rem'}}/>{phFiles.length} fail{phFiles.length>1?'i':''}
                            </div>}
                          </>
                          :<div className="lp-pc-empty">Täitmata</div>
                        }
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
          {step===2&&!lessonTypeDef&&(
            <div className="modal-body" style={{padding:'16px 24px'}}>
              <div><div className="sec-lbl">Kirjeldus</div>
                <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={6} placeholder="Tunni kirjeldus..."/>
              </div>
              <div>
                <div className="sec-lbl">Failid</div>
                <FileUploader onUpload={f=>setFiles(p=>[...p,...f])} uploading={uploading} setUploading={setUploading}/>
                {files.length>0&&<div className="file-row" style={{marginTop:8}}>
                  {files.map((f,i)=><span key={i} style={{display:'flex',alignItems:'center',gap:3}}>
                    <FileChip file={f}/><button onClick={()=>setFiles(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#dc2626',cursor:'pointer',fontSize:'.7rem',padding:'0 3px'}}>✕</button>
                  </span>)}
                </div>}
              </div>
            </div>
          )}

          {/* STEP 3: Preview for student */}
          {step===3&&lessonTypeDef&&(
            <div style={{padding:'16px 24px'}}>
              <div style={{padding:'10px 14px',borderRadius:10,background:'rgba(47,93,80,.08)',border:'0.5px solid rgba(47,93,80,.2)',marginBottom:16,fontSize:'.82rem',color:'#2F5D50',fontWeight:600}}>
                <i className="fa-solid fa-eye" style={{marginRight:6}}/>
                Nii näeb tunni ülesehitust õpilane
              </div>

              {/* Student view header */}
              <div style={{background:'#fff',borderRadius:14,padding:'18px 20px',marginBottom:12,border:'0.5px solid rgba(28,43,58,.08)'}}>
                <div style={{fontFamily:'Fraunces,serif',fontSize:'1.2rem',fontWeight:700,marginBottom:4}}>{builderTitle||'Tunni pealkiri'}</div>
                <div style={{fontSize:'.78rem',color:'#7A7167',marginBottom:builderObjectives?8:0}}>{subject} · {level} · {topic}</div>
                {builderObjectives&&<div style={{fontSize:'.84rem',color:'#2F5D50',background:'rgba(47,93,80,.07)',padding:'8px 11px',borderRadius:8,lineHeight:1.5}}>
                  <strong>Tunni lõpuks oskad:</strong> {builderObjectives}
                </div>}
              </div>

              {/* Phases as student sees them */}
              {lessonTypeDef.phases.map((ph,pi)=>{
                const data=phaseData[ph.key]||{};
                const phFiles=data.files||[];
                const hasContent=ph.fields.some((_,fi)=>data[fi]);
                if(!hasContent&&phFiles.length===0) return null;
                return(
                  <div key={ph.key} style={{background:'#fff',borderRadius:14,padding:'16px 20px',marginBottom:10,border:'0.5px solid rgba(28,43,58,.08)',borderLeftWidth:3,borderLeftColor:ph.color}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                      <span style={{fontSize:'.68rem',fontWeight:700,padding:'2px 8px',borderRadius:5,background:ph.color+'15',color:ph.color,textTransform:'uppercase',letterSpacing:'.07em'}}>{ph.name}</span>
                      <span style={{fontSize:'.72rem',color:'#B0A898'}}>{ph.time}</span>
                    </div>
                    {ph.fields.map((fieldName,fi)=>{
                      const val=data[fi]||'';
                      if(!val) return null;
                      return(
                        <div key={fi} style={{marginBottom:8}}>
                          <div style={{fontSize:'.7rem',fontWeight:700,color:'#B0A898',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:3}}>{fieldName}</div>
                          <div style={{fontSize:'.88rem',color:'#1C2B3A',lineHeight:1.55,whiteSpace:'pre-wrap'}}>{val}</div>
                        </div>
                      );
                    })}
                    {phFiles.length>0&&(
                      <div style={{marginTop:10,paddingTop:8,borderTop:'1px solid rgba(28,43,58,.06)'}}>
                        <div style={{fontSize:'.68rem',fontWeight:700,color:'#B0A898',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>Materjalid</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                          {phFiles.map((f,fi2)=>(
                            <a key={fi2} href={f.url} target="_blank" rel="noreferrer" className="sp-file-chip">
                              <i className="fa-solid fa-paperclip" style={{fontSize:'.65rem',color:'#2F5D50'}}/>
                              {f.name}
                            </a>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
              {lessonTypeDef.phases.every(ph=>{
                const data=phaseData[ph.key]||{};
                return !ph.fields.some((_,fi)=>data[fi])&&!(data.files||[]).length;
              })&&<div style={{textAlign:'center',padding:'30px 0',color:'#B0A898',fontSize:'.84rem'}}>
                Täida tunni käigu väljad et näha eelvaadet
              </div>}
            </div>
          )}
          {step===3&&!lessonTypeDef&&(
            <div className="modal-body" style={{padding:'16px 24px'}}>
              <div style={{fontSize:'.82rem',color:'#7A7167',marginBottom:12}}>Tund on valmis salvestamiseks.</div>
              <div style={{background:'#fff',borderRadius:12,padding:'14px 16px',border:'0.5px solid rgba(28,43,58,.08)'}}>
                <div style={{fontWeight:700,fontSize:'.9rem',marginBottom:4}}>{title||'Pealkiri puudub'}</div>
                <div style={{fontSize:'.78rem',color:'#7A7167'}}>{subject} · {level} · {topic}</div>
                {desc&&<div style={{fontSize:'.84rem',color:'#42536A',marginTop:8,lineHeight:1.5}}>{desc}</div>}
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="lb-foot">
          <button onClick={()=>{if(step===0)onClose();else setStep(s=>s-1);}} className="btn btn-ghost">
            {step===0?'Tühista':'← Tagasi'}
          </button>
          <div style={{display:'flex',gap:8}}>
            {step<3
              ?<button onClick={()=>{
                  if(step===0&&!lessonTypeDef&&lessonTypeDef!==null){alert('Vali tunni tüüp');return;}
                  setStep(s=>s+1);
                }} className="btn btn-pine" disabled={step===0&&lessonTypeDef===undefined}>
                {step===2?'Eelvaade →':'Järgmine →'}
              </button>
              :<button onClick={lessonTypeDef?saveBuilder:saveSimple} disabled={saving||uploading} className="btn btn-pine">
                {saving?'Salvestab…':'✓ Salvesta tund'}
              </button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── EXAM VIEW ─────────────────────────────────────────────────
function ExamView({subject,level,lessons,isTeacher,onAdd,onEdit,onDelete}){
  const[activeExamPart,setActiveExamPart]=useState(null);
  const examLessons=lessons.filter(l=>l.subject===subject.key&&l.level===level&&l.examPart);

  if(activeExamPart){
    const part=EXAM_PARTS.find(p=>p.key===activeExamPart);
    const partLessons=examLessons.filter(l=>l.examPart===activeExamPart).sort((a,b)=>(a.order||0)-(b.order||0));
    return(
      <div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18,flexWrap:'wrap'}}>
          <button onClick={()=>setActiveExamPart(null)} className="btn btn-ghost btn-sm">
            <i className="fa-solid fa-arrow-left"/> Tagasi eksamite juurde
          </button>
          <div style={{padding:'6px 14px',borderRadius:10,background:part.bg,border:'1px solid '+part.border,fontSize:'.84rem',fontWeight:700,color:part.color}}>
            {part.icon} {part.label}
          </div>
        </div>
        <div className="main-head">
          <div>
            <div className="main-title">{part.label} — {level}</div>
            <div className="main-sub">{subject.key} · {partLessons.length} kirjet</div>
          </div>
          {isTeacher&&<button onClick={()=>onAdd(activeExamPart)} className="btn btn-pine btn-sm"><i className="fa-solid fa-plus"/> Lisa kirje</button>}
        </div>
        {partLessons.length===0
          ?<div className="empty"><i className="fa-solid fa-folder-open"/><p>Lisa {part.label.toLowerCase()} ülesandeid ja variante.</p>
             {isTeacher&&<button onClick={()=>onAdd(activeExamPart)} className="btn btn-pine btn-sm"><i className="fa-solid fa-plus"/> Lisa kirje</button>}
           </div>
          :partLessons.map(lesson=>{
            const lt=LESSON_TYPES[lesson.type]||LESSON_TYPES.lesson;
            return(
              <div key={lesson.id} className="lesson-card">
                <div className="lesson-icon" style={{background:lt.bg}}><i className={'fa-solid '+lt.icon} style={{color:lt.color}}/></div>
                <div className="lesson-body">
                  <div className="lesson-title">{lesson.title}</div>
                  {lesson.description&&<div className="lesson-desc">{lesson.description}</div>}
                  {lesson.files?.length>0&&<div className="file-row">{lesson.files.map((f,i)=><FileChip key={i} file={f}/>)}</div>}
                </div>
                {isTeacher&&<div className="lesson-actions">
                  <button onClick={()=>onEdit(lesson)} className="btn btn-ghost btn-sm"><i className="fa-solid fa-pen"/></button>
                  <button onClick={()=>onDelete(lesson)} className="btn btn-ghost btn-sm" style={{color:'#dc2626'}}><i className="fa-solid fa-trash"/></button>
                </div>}
              </div>
            );
          })}
      </div>
    );
  }

  return(
    <div>
      <div className="main-head">
        <div>
          <div className="main-title">Eksamid — {level}</div>
          <div className="main-sub">{subject.key} · eksamimaterjalid osade kaupa</div>
        </div>
      </div>
      <div className="exam-grid">
        {EXAM_PARTS.map(part=>{
          const cnt=examLessons.filter(l=>l.examPart===part.key).length;
          const items=examLessons.filter(l=>l.examPart===part.key).sort((a,b)=>(a.order||0)-(b.order||0)).slice(0,2);
          return(
            <div key={part.key} className="exam-part-card" onClick={()=>setActiveExamPart(part.key)}>
              <div className="exam-part-head">
                <div className="exam-part-icon" style={{background:part.nudeBg}}>{part.icon}</div>
                <div className="exam-part-title">{part.label}</div>
                <div className="exam-part-sub">{part.desc}</div>
              </div>
              <div className="exam-part-body">
                {items.length===0
                  ?<div className="exam-item" style={{textAlign:'center'}}>
                     <div style={{fontSize:'.78rem',color:'#718096'}}>Materjale pole veel lisatud</div>
                     {isTeacher&&<div style={{fontSize:'.74rem',color:part.color,fontWeight:700,marginTop:4}}>+ Lisa kirje</div>}
                   </div>
                  :items.map(item=>(
                    <div key={item.id} className="exam-item">
                      <div className="exam-item-name">{item.title}</div>
                      {item.description&&<div className="exam-item-meta">{item.description}</div>}
                      {item.files?.length>0&&<div className="exam-item-files">{item.files.slice(0,2).map((f,i)=><FileChip key={i} file={f}/>)}</div>}
                    </div>
                  ))}
                {cnt>2&&<div style={{fontSize:'.76rem',color:part.color,fontWeight:700,padding:'4px 8px'}}>+{cnt-2} rohkem...</div>}
                <div style={{textAlign:'right',marginTop:4}}>
                  <span style={{fontSize:'.74rem',color:part.color,fontWeight:800,opacity:.7}}>{cnt} kirjet  →</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── TOPIC VIEW ────────────────────────────────────────────────
function TopicView({subject,level,activeTopic,topics,allLessons,isTeacher,onSelectTopic,onAdd,onEdit,onDelete,onRenameTopic,onDeleteTopic,onAddTopic,onPreviewWorksheet,onConductLesson}){
  const topicLessons=allLessons
    .filter(l=>l.subject===subject.key&&l.level===level&&l.topic===activeTopic&&!l.examPart)
    .sort((a,b)=>(a.order||0)-(b.order||0));
  const counts={};
  topics.forEach(t=>{counts[t]=allLessons.filter(l=>l.subject===subject.key&&l.level===level&&l.topic===t&&!l.examPart).length;});

  // Inline rename state
  const[renamingTopic,setRenamingTopic]=useState(null);
  const[renameVal,setRenameVal]=useState('');
  const[addingTopic,setAddingTopic]=useState(false);
  const[newTopicVal,setNewTopicVal]=useState('');
  const renameInputRef=useRef();
  const newTopicRef=useRef();

  const startRename=t=>{setRenamingTopic(t);setRenameVal(t);setTimeout(()=>renameInputRef.current?.select(),50);};
  const commitRename=()=>{if(renameVal.trim()&&renameVal.trim()!==renamingTopic){onRenameTopic(renamingTopic,renameVal.trim());}setRenamingTopic(null);};
  const commitAdd=()=>{if(newTopicVal.trim()){onAddTopic(newTopicVal.trim());}setAddingTopic(false);setNewTopicVal('');};

  return(
    <div className="content-shell">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-section">
          <div className="sidebar-label">Teemad — {level}</div>
          {topics.map(t=>(
            <div key={t} style={{position:'relative',marginBottom:2}}>
              {renamingTopic===t
                ?<div style={{display:'flex',gap:5,alignItems:'center',padding:'3px 4px'}}>
                   <input ref={renameInputRef} value={renameVal} onChange={e=>setRenameVal(e.target.value)}
                     onKeyDown={e=>{if(e.key==='Enter')commitRename();if(e.key==='Escape')setRenamingTopic(null);}}
                     style={{flex:1,padding:'6px 9px',fontSize:'.82rem',borderRadius:8,border:'1.5px solid #2F5D50'}}/>
                   <button onClick={commitRename} className="btn btn-pine btn-sm" style={{padding:'5px 9px'}}>✓</button>
                 </div>
                :<div style={{display:'flex',alignItems:'center',gap:2}}>
                   <button onClick={()=>onSelectTopic(t)} className={'sidebar-btn'+(activeTopic===t?' active':'')} style={{flex:1}}>
                     <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,textAlign:'left'}}>{t}</span>
                     <span className="sb-count">{counts[t]||0}</span>
                   </button>
                   {isTeacher&&<div style={{display:'flex',gap:2,opacity:0,transition:'opacity .15s'}} className="topic-actions">
                     <button onClick={()=>startRename(t)} title="Nimeta ümber"
                       style={{background:'none',border:'none',cursor:'pointer',color:'#718096',padding:'4px 5px',borderRadius:6,fontSize:'.72rem'}}>
                       <i className="fa-solid fa-pen"/>
                     </button>
                     <button onClick={()=>onDeleteTopic(t)} title="Kustuta teema"
                       style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',padding:'4px 5px',borderRadius:6,fontSize:'.72rem'}}>
                       <i className="fa-solid fa-trash"/>
                     </button>
                   </div>}
                 </div>}
            </div>
          ))}
          {isTeacher&&(
            addingTopic
              ?<div style={{display:'flex',gap:5,alignItems:'center',padding:'3px 4px',marginTop:4}}>
                 <input ref={newTopicRef} value={newTopicVal} onChange={e=>setNewTopicVal(e.target.value)}
                   placeholder="Uue teema nimi..."
                   onKeyDown={e=>{if(e.key==='Enter')commitAdd();if(e.key==='Escape'){setAddingTopic(false);setNewTopicVal('');}}}
                   style={{flex:1,padding:'6px 9px',fontSize:'.82rem',borderRadius:8,border:'1.5px solid #2F5D50'}}
                   autoFocus/>
                 <button onClick={commitAdd} className="btn btn-pine btn-sm" style={{padding:'5px 9px'}}>✓</button>
               </div>
              :<button onClick={()=>setAddingTopic(true)}
                 style={{width:'100%',textAlign:'left',padding:'8px 12px',border:'1px dashed rgba(47,93,80,.3)',borderRadius:9,background:'none',cursor:'pointer',color:'#2F5D50',fontSize:'.82rem',fontWeight:600,marginTop:4,display:'flex',alignItems:'center',gap:6}}>
                 <i className="fa-solid fa-plus" style={{fontSize:'.7rem'}}/> Uus teema
               </button>
          )}
          <div className="sidebar-divider" style={{margin:'10px 0'}}/>
          <div className="sidebar-label">Eksamid</div>
          {EXAM_PARTS.map(p=>{
            const cnt=allLessons.filter(l=>l.subject===subject.key&&l.level===level&&l.examPart===p.key).length;
            return(
              <button key={p.key} onClick={()=>onSelectTopic('__exam__'+p.key)}
                className={'sidebar-btn'+(activeTopic==='__exam__'+p.key?' active':'')}
                style={{color:activeTopic==='__exam__'+p.key?p.color:'#1C2B3A',background:activeTopic==='__exam__'+p.key?p.nudeBg:'none'}}>
                <span style={{display:'flex',alignItems:'center',gap:7,flex:1}}>
                  <span>{p.icon}</span>
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.label}</span>
                </span>
                <span className="sb-count">{cnt}</span>
              </button>
            );
          })}
        </div>
      </aside>

      {/* Main */}
      <main>
        {activeTopic&&activeTopic.startsWith('__exam__')
          ?<ExamView
              subject={subject} level={level}
              lessons={allLessons}
              isTeacher={isTeacher}
              onAdd={part=>onAdd(activeTopic.replace('__exam__',''),true,part)}
              onEdit={onEdit}
              onDelete={onDelete}
            />
          :<>
            <div className="main-head">
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                <div>
                  <div className="main-title" style={{display:'flex',alignItems:'center',gap:8}}>
                    {activeTopic}
                    {isTeacher&&<button onClick={()=>startRename(activeTopic)} title="Nimeta ümber"
                      style={{background:'none',border:'none',cursor:'pointer',color:'#B0A898',padding:'2px 5px',borderRadius:6,fontSize:'.75rem'}}>
                      <i className="fa-solid fa-pen"/>
                    </button>}
                  </div>
                  <div className="main-sub">{subject.key} · {level} · {topicLessons.length} kirjet</div>
                </div>
              </div>
              {isTeacher&&<button onClick={()=>onAdd(activeTopic,false,null)} className="btn btn-pine btn-sm"><i className="fa-solid fa-plus"/> Lisa kirje</button>}
            </div>
            {topicLessons.length===0
              ?<div className="empty">
                 <i className="fa-solid fa-folder-open"/>
                 <p>See teema on veel tühi. Lisa esimene tunnikirje!</p>
                 {isTeacher&&<button onClick={()=>onAdd(activeTopic,false,null)} className="btn btn-pine btn-sm"><i className="fa-solid fa-plus"/> Lisa kirje</button>}
               </div>
              :topicLessons.map(lesson=>{
                 const lt=LESSON_TYPES[lesson.type]||LESSON_TYPES.lesson;
                 return(
                   <div key={lesson.id} className="lesson-card">
                     <div className="lesson-icon" style={{background:lt.bg}}><i className={'fa-solid '+lt.icon} style={{color:lt.color}}/></div>
                     <div className="lesson-body">
                       <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                         <div className="lesson-title">{lesson.title}</div>
                         {lesson.lessonTypeLabel&&<span style={{fontSize:'.7rem',fontWeight:700,padding:'2px 8px',borderRadius:5,background:'rgba(47,93,80,.1)',color:'#2F5D50'}}>{lesson.lessonTypeLabel}</span>}

// ── CURRICULUM ────────────────────────────────────────────────
function CurriculumView({isTeacher,user,notify,onPreviewWorksheet,onConductLesson}){
  const[lessons,setLessons]=useState([]);
  const[loading,setLoading]=useState(true);
  const[nav,setNav]=useState(null); // null | {subject} | {subject,level,topic}
  const[modal,setModal]=useState(null);

  useEffect(()=>{
    const u=db.collection('curriculumLessons').onSnapshot(
      s=>{setLessons(s.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);},
      ()=>setLoading(false)
    );
    return u;
  },[]);

  const subject=nav?.subject?SUBJECTS.find(s=>s.key===nav.subject):null;
  const level=nav?.level||null;
  const activeTopic=nav?.topic||null;

  const topics=subject?[...new Set([...(subject.topics||[]),...lessons.filter(l=>l.subject===subject.key&&l.level===nav.level&&!l.examPart).map(l=>l.topic).filter(Boolean)])]:[];

  const saveLesson=async data=>{
    if(data.id){await db.collection('curriculumLessons').doc(data.id).update({...data});}
    else{await db.collection('curriculumLessons').add({...data,authorUid:user.uid,authorName:user.displayName||user.email||'',createdAt:today()});}
    notify('✓ Salvestatud');setModal(null);
  };
  const deleteLesson=async lesson=>{
    if(!window.confirm('Kustuta "'+lesson.title+'"?'))return;
    await db.collection('curriculumLessons').doc(lesson.id).delete();
    notify('✓ Kustutatud');
  };

  if(loading)return<div style={{display:'flex',justifyContent:'center',padding:60}}><div className="spinner"/></div>;

  return(
    <>
      {/* Breadcrumb */}
      <div className="bc">
        <span className="bc-link" onClick={()=>setNav(null)}>Kõik ained</span>
        {subject&&<><span className="bc-sep">›</span>
          <span className={level?'bc-link':'bc-cur'} onClick={()=>setNav({subject:subject.key})}>{subject.emoji} {subject.key}</span></>}
        {level&&<><span className="bc-sep">›</span>
          <span className={activeTopic?'bc-link':'bc-cur'} onClick={()=>setNav({subject:subject.key,level,topic:topics[0]||''})}>
            {level}
          </span></>}
        {activeTopic&&<><span className="bc-sep">›</span>
          <span className="bc-cur">{activeTopic.startsWith('__exam__')?'Eksamid — '+EXAM_PARTS.find(p=>p.key===activeTopic.replace('__exam__',''))?.label:activeTopic}</span></>}
      </div>

      {/* Level 0: subject cards */}
      {!subject&&(
        <div className="subject-grid">
          {SUBJECTS.map(s=>{
            const cnt=lessons.filter(l=>l.subject===s.key).length;
            return(
              <div key={s.key} className="subj-card"
                style={{background:s.cardBg,borderColor:s.cardBorder}}
                onClick={()=>setNav({subject:s.key})}>
                <div className="subj-head">
                  <div className="subj-icon-wrap" style={{background:s.iconBg}}>{s.emoji}</div>
                  <div className="subj-name">{s.key}</div>
                  <div className="subj-sub">{s.levels.length} taset · {s.topics.length} teemat · {EXAM_PARTS.length} eksami osa</div>
                  <div className="subj-pills">
                    {s.levels.slice(0,s.levels.length<=6?s.levels.length:4).map(lv=>(
                      <span key={lv} className="subj-pill" style={{background:s.pillBg,color:s.pillColor}}>{lv}</span>
                    ))}
                    {s.levels.length>6&&<span className="subj-pill" style={{background:s.pillBg,color:s.pillColor}}>+{s.levels.length-4}</span>}
                  </div>
                </div>
                <div className="subj-bar" style={{background:s.grad}}/>
                <div className="subj-foot">
                  <span className="subj-foot-count">{cnt} kirjet raamatukogus</span>
                  <span className="subj-foot-link" style={{color:s.color}}>Ava <i className="fa-solid fa-arrow-right" style={{fontSize:'.7rem'}}/></span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Level 1: levels */}
      {subject&&!level&&(
        <div className="level-wrap">
          <div className="level-title">{subject.emoji} {subject.key} — vali tase</div>
          <div className="level-row">
            {subject.levels.map(lv=>{
              const cnt=lessons.filter(l=>l.subject===subject.key&&l.level===lv).length;
              const topicCnt=[...new Set(lessons.filter(l=>l.subject===subject.key&&l.level===lv).map(l=>l.topic).filter(Boolean))].length;
              const examCnt=lessons.filter(l=>l.subject===subject.key&&l.level===lv&&l.examPart).length;
              const hasMat=cnt>0;
              return(
                <button key={lv} className="level-chip"
                  style={{
                    borderColor:hasMat?subject.cardBorder:'rgba(28,43,58,.09)',
                    background:hasMat?subject.cardBg:'#FAFAF8',
                  }}
                  onClick={()=>{const t=topics[0]||subject.topics[0]||'';setNav({subject:subject.key,level:lv,topic:t});}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%'}}>
                    <span style={{fontSize:'1.4rem',fontWeight:700,color:hasMat?subject.color:'#B0A898'}}>{lv}</span>
                    <span className="lc-cnt" style={{background:hasMat?subject.pillBg:'rgba(28,43,58,.06)',color:hasMat?subject.pillColor:'#AAA098',fontSize:'.68rem'}}>
                      {cnt}
                    </span>
                  </div>
                  <div style={{fontSize:'.74rem',color:hasMat?'#7A7167':'#B0A898',lineHeight:1.5,marginTop:2}}>
                    {hasMat
                      ?<>{topicCnt>0&&<span>{topicCnt} teemat</span>}{examCnt>0&&<span style={{marginLeft:6}}>· {examCnt} eksamit</span>}</>
                      :<span>Tühi</span>
                    }
                  </div>
                  <div style={{fontSize:'.76rem',fontWeight:600,color:hasMat?subject.color:'#C0B8B0',marginTop:6,display:'flex',alignItems:'center',gap:4}}>
                    Ava <i className="fa-solid fa-arrow-right" style={{fontSize:'.62rem'}}/>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Level 2: topics + lessons/exams */}
      {subject&&level&&(
        <TopicView
          subject={subject} level={level}
          activeTopic={activeTopic||topics[0]||''}
          topics={topics}
          allLessons={lessons}
          isTeacher={isTeacher}
          onSelectTopic={t=>setNav({subject:subject.key,level,topic:t})}
          onAdd={(topicOrExamKey,isExam,examPart)=>{
            const t=isExam?topicOrExamKey:topicOrExamKey;
            setModal({topic:isExam?null:t,examPart:examPart||null});
          }}
          onEdit={lesson=>setModal({lesson,topic:lesson.topic,examPart:lesson.examPart||null})}
          onDelete={deleteLesson}
          onAddTopic={async newName=>{
            const exists=topics.includes(newName);
            if(exists){notify('See teema on juba olemas');return;}
            await db.collection('curriculumLessons').add({
              subject:subject.key,level,topic:newName,title:'—',type:'material',
              description:'',files:[],order:0,examPart:null,
              authorUid:user.uid,authorName:user.displayName||user.email||'',
              createdAt:today(),updatedAt:new Date().toISOString(),
              __placeholder:true
            });
            setNav({subject:subject.key,level,topic:newName});
            notify('✓ Uus teema lisatud');
          }}
          onRenameTopic={async(oldName,newName)=>{
            const toUpdate=lessons.filter(l=>l.subject===subject.key&&l.level===level&&l.topic===oldName);
            await Promise.all(toUpdate.map(l=>db.collection('curriculumLessons').doc(l.id).update({topic:newName})));
            if(activeTopic===oldName)setNav({subject:subject.key,level,topic:newName});
            notify('✓ Teema ümber nimetatud');
          }}
          onDeleteTopic={async topicName=>{
            const toDelete=lessons.filter(l=>l.subject===subject.key&&l.level===level&&l.topic===topicName);
            if(toDelete.length>0&&!window.confirm('Kustuta teema "'+topicName+'" koos kõigi '+toDelete.length+' kirjega?'))return;
            await Promise.all(toDelete.map(l=>db.collection('curriculumLessons').doc(l.id).delete()));
            const remaining=topics.filter(t=>t!==topicName);
            setNav({subject:subject.key,level,topic:remaining[0]||''});
            notify('✓ Teema kustutatud');
          }}
          onPreviewWorksheet={onPreviewWorksheet}
          onConductLesson={onConductLesson}
        />
      )}

      {modal&&(
        <LessonModal
          lesson={modal.lesson||null}
          subject={subject?.key||''}
          level={level||''}
          topic={modal.topic||activeTopic||''}
          examPart={modal.examPart||null}
          onClose={()=>setModal(null)}
          onSave={saveLesson}
        />
      )}
    </>
  );
}

// ── EXERCISE PLAYERS ──────────────────────────────────────────
function parseFillText(raw){const blanks=[];let idx=0;const parts=raw.split(/\[([^\]]+)\]/g);let result=[];for(let i=0;i<parts.length;i++){if(i%2===0){result.push({type:'text',value:parts[i]});}else{result.push({type:'blank',answer:parts[i],index:idx++});blanks.push({answer:parts[i],index:idx-1});}}return{parts:result,blanks};}

function FillPlayer({exercise,onDone}){const parsed=useMemo(()=>parseFillText(exercise.text||''),[exercise.text]);const[answers,setAnswers]=useState({});const[checked,setChecked]=useState(false);const[score,setScore]=useState(null);const check=()=>{let c=0;parsed.blanks.forEach(b=>{if(normalizeText(answers[b.index]||'')===normalizeText(b.answer))c++;});setScore({correct:c,total:parsed.blanks.length});setChecked(true);onDone&&onDone({correct:c,total:parsed.blanks.length});};const reset=()=>{setAnswers({});setChecked(false);setScore(null);};return(<div style={{display:'flex',flexDirection:'column',gap:16}}><div style={{fontSize:'1rem',lineHeight:2}}>{parsed.parts.map((p,i)=>{if(p.type==='text')return<span key={i}>{p.value}</span>;const val=answers[p.index]||'';const isC=checked&&normalizeText(val)===normalizeText(p.answer);const isW=checked&&!isC;return(<span key={i} style={{display:'inline-flex',alignItems:'center',gap:4}}><input className={'blank-input'+(isC?' correct':isW?' wrong':'')} value={val} disabled={checked} onChange={e=>setAnswers(p2=>({...p2,[p.index]:e.target.value}))} style={{width:Math.max(80,(p.answer.length+2)*12)+'px'}}/>{isW&&checked&&<span style={{fontSize:'.72rem',color:'#166534',fontWeight:700}}>({p.answer})</span>}</span>);})}</div>{score&&<div className={score.correct===score.total?'result-ok':'result-fail'}>{score.correct===score.total?'✓ Suurepärane! Kõik '+score.total+' vastust õiged!':score.correct+'/'+score.total+' vastust õiged.'}</div>}{!checked?<button onClick={check} className="btn btn-pine">Kontrolli</button>:<button onClick={reset} className="btn btn-ghost">Proovi uuesti</button>}</div>);}

function ChoicePlayer({exercise,onDone}){const qs=exercise.questions||[];const[cur,setCur]=useState(0);const[sel,setSel]=useState({});const[chk,setChk]=useState({});const[done,setDone]=useState(false);const q=qs[cur];const pick=(qi,ci)=>{if(chk[qi])return;setSel(p=>({...p,[qi]:ci}));};const checkC=()=>setChk(p=>({...p,[cur]:true}));const next=()=>{if(cur<qs.length-1){setCur(c=>c+1);}else{const c=qs.filter((q,i)=>sel[i]===q.correct).length;setDone(true);onDone&&onDone({correct:c,total:qs.length});}};const reset=()=>{setCur(0);setSel({});setChk({});setDone(false);};if(done){const c=qs.filter((q,i)=>sel[i]===q.correct).length;return(<div style={{display:'flex',flexDirection:'column',gap:10}}><div className={c===qs.length?'result-ok':'result-fail'}>{c===qs.length?'✓ '+c+'/'+qs.length:c+'/'+qs.length+' vastust õiged'}</div><button onClick={reset} className="btn btn-ghost">Alusta uuesti</button></div>);}if(!q)return null;const isChk=chk[cur];const s=sel[cur];return(<div style={{display:'flex',flexDirection:'column',gap:10}}><div style={{fontWeight:700,fontSize:'.96rem',marginBottom:6}}>{q.question}</div>{(q.options||[]).map((opt,ci)=>{let cls='choice-btn';if(isChk){if(ci===q.correct)cls+=' correct';else if(ci===s)cls+=' wrong';}else if(ci===s)cls+=' selected';return<button key={ci} className={cls} onClick={()=>pick(cur,ci)}>{opt}</button>;})} {!isChk?<button onClick={checkC} className="btn btn-pine" disabled={s===undefined}>Kontrolli</button>:<button onClick={next} className="btn btn-pine">{cur<qs.length-1?'Järgmine →':'Lõpeta'}</button>}</div>);}

function LoginScreen({onLogin}){
  const[email,setEmail]=useState('');const[pass,setPass]=useState('');const[err,setErr]=useState('');const[busy,setBusy]=useState(false);
  const go=async()=>{if(!email||!pass){setErr('Täida kõik väljad');return;}setBusy(true);setErr('');try{const r=await auth.signInWithEmailAndPassword(email,pass);const s=await db.collection('users').doc(r.user.uid).get();if(s.exists)onLogin({uid:r.user.uid,...s.data()});else onLogin({uid:r.user.uid,email,role:'teacher'});}catch(e){setErr('Vale e-post või parool');}setBusy(false);};
  const gLogin=async()=>{setBusy(true);setErr('');try{const r=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());const s=await db.collection('users').doc(r.user.uid).get();if(s.exists)onLogin({uid:r.user.uid,displayName:r.user.displayName,...s.data()});else onLogin({uid:r.user.uid,displayName:r.user.displayName,email:r.user.email,role:'teacher'});}catch(e){setErr('Google sisselogimine ebaõnnestus');}setBusy(false);};
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'linear-gradient(135deg,#1C2B3A 0%,#2F5D50 100%)'}}>
      <div style={{background:'#FBFAF8',borderRadius:24,padding:36,width:'100%',maxWidth:380,boxShadow:'0 32px 80px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:28}}><div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.9rem',fontWeight:700}}>Keele<span style={{color:'#C9882A'}}>Sepp</span></div><div style={{fontSize:'.8rem',color:'#718096',marginTop:4}}>Õppekava & Harjutused</div></div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-post" onKeyDown={e=>e.key==='Enter'&&go()}/><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Parool" onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        {err&&<div style={{background:'#fee2e2',color:'#991b1b',borderRadius:9,padding:'9px 12px',fontSize:'.82rem',marginBottom:12}}>{err}</div>}
        <button onClick={go} disabled={busy} className="btn btn-dark" style={{width:'100%',marginBottom:10,borderRadius:12,padding:12,justifyContent:'center'}}>{busy?'Laeb…':'Sisene'}</button>
        <button onClick={gLogin} disabled={busy} style={{width:'100%',padding:11,borderRadius:12,border:'1.5px solid rgba(28,43,58,.15)',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontWeight:600,fontSize:'.86rem'}}>
          <svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
          Sisene Google'iga
        </button>
        <div style={{textAlign:'center',marginTop:14}}><a href="/haldus/" style={{fontSize:'.78rem',color:'#718096',textDecoration:'none'}}>← Tagasi haldussüsteemi</a></div>
      </div>
    </div>
  );
}


// ── WORKSHEET PREVIEW MODAL ───────────────────────────────────
function parseFillWs(text){
  const parts=[];
  text.split(/\[([^\]]+)\]/g).forEach((c,i)=>parts.push(i%2===0?{t:'text',v:c}:{t:'blank'}));
  return parts;
}

// ── LESSON CONDUCT MODE ───────────────────────────────────────

       {key:'kinnistamine',name:'Kinnistamine',emoji:'🔁',color:'#1d4ed8'},
