<script type="text/babel" data-presets="exercises-react">
const {useState,useEffect,useCallback,useMemo,useRef} = React;
const db   = window._db;
const auth = window._auth;

const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => d ? new Date(d).toLocaleDateString('et-EE',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
const normalizeText = t => String(t||'').toLowerCase().trim()
  .replace(/[àáâãäå]/g,'a').replace(/[èéêë]/g,'e').replace(/[ìíîï]/g,'i')
  .replace(/[òóôõö]/g,'o').replace(/[ùúûü]/g,'u').replace(/[ñ]/g,'n');

// ── ТИПЫ УПРАЖНЕНИЙ ───────────────────────────────────────────
const EX_TYPES = {
  fill:      { label:'Täida lünk',        icon:'fa-pen-line',      badge:'type-badge-fill',      color:'#1d4ed8' },
  choice:    { label:'Vali vastus',        icon:'fa-list-check',    badge:'type-badge-choice',    color:'#6d28d9' },
  order:     { label:'Koosta lause/sõna',  icon:'fa-shuffle',       badge:'type-badge-order',     color:'#2F5D50' },
  truefalse: { label:'Õige/Vale',          icon:'fa-circle-half-stroke', badge:'type-badge-tf',   color:'#0891b2' },
  match:     { label:'Sobita',             icon:'fa-code-compare',  badge:'type-badge-match',     color:'#7c3aed' },
  insert:    { label:'Lisa lause',         icon:'fa-arrow-right-to-bracket', badge:'type-badge-insert', color:'#b45309' },
  writing:   { label:'Kirjutamine',          icon:'fa-feather',               badge:'type-badge-writing',  color:'#be185d' },
};

// ── УТИЛИТЫ СОЗДАНИЯ ─────────────────────────────────────────
// Парсинг fill: "Ma ___ koolis [käin]" → {text, blanks:[{pos,answer}]}
function parseFillText(raw) {
  const blanks = [];
  let idx = 0;
  const parts = raw.split(/\[([^\]]+)\]/g);
  // parts: ["Ma ___ koolis ", "käin", ""]
  let result = [];
  for(let i=0;i<parts.length;i++){
    if(i%2===0){ result.push({type:'text',value:parts[i]}); }
    else { result.push({type:'blank',answer:parts[i],index:idx++}); blanks.push({answer:parts[i],index:idx-1}); }
  }
  return {parts:result, blanks};
}

// ── ПЛЕЕР: FILL ───────────────────────────────────────────────
function FillPlayer({exercise, onDone}) {
  const parsed = useMemo(()=>parseFillText(exercise.text||''),[exercise.text]);
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);
  const [score, setScore] = useState(null);

  const check = () => {
    let correct = 0;
    parsed.blanks.forEach(b=>{
      if(normalizeText(answers[b.index]||'')===normalizeText(b.answer)) correct++;
    });
    setScore({correct, total:parsed.blanks.length});
    setChecked(true);
    onDone&&onDone({correct, total:parsed.blanks.length, answers});
  };

  const reset = () => { setAnswers({}); setChecked(false); setScore(null); };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{fontSize:'1rem',lineHeight:2,fontFamily:'IBM Plex Sans,sans-serif'}}>
        {parsed.parts.map((p,i)=>{
          if(p.type==='text') return <span key={i}>{p.value}</span>;
          const val = answers[p.index]||'';
          const isCorrect = checked && normalizeText(val)===normalizeText(p.answer);
          const isWrong   = checked && normalizeText(val)!==normalizeText(p.answer);
          return(
            <span key={i} style={{display:'inline-flex',alignItems:'center',gap:4}}>
              <input
                className={'blank-input'+(isCorrect?' correct':isWrong?' wrong':'')}
                value={val}
                disabled={checked}
                onChange={e=>setAnswers(prev=>({...prev,[p.index]:e.target.value}))}
                style={{width:Math.max(80,(p.answer.length+2)*12)+'px'}}
              />
              {isWrong&&checked&&<span style={{fontSize:'.75rem',color:'#166534',fontWeight:700}}>({p.answer})</span>}
            </span>
          );
        })}
      </div>
      {exercise.hint&&!checked&&<div style={{fontSize:'.82rem',color:'#42536A',padding:'8px 12px',background:'rgba(201,136,42,.07)',borderRadius:9}}>💡 {exercise.hint}</div>}
      {score&&(
        <div className={score.correct===score.total?'result-correct':'result-wrong'}>
          {score.correct===score.total
            ? '✓ Suurepärane! Kõik '+score.total+' vastust õiged!'
            : score.correct+'/'+score.total+' vastust õiged. Proovi uuesti!'}
        </div>
      )}
      <div style={{display:'flex',gap:8}}>
        {!checked
          ? <button onClick={check} className="btn btn-pine" style={{flex:1}}>Kontrolli vastuseid</button>
          : <button onClick={reset} className="btn btn-ghost" style={{flex:1}}>Proovi uuesti</button>}
      </div>
    </div>
  );
}

// ── ПЛЕЕР: CHOICE ─────────────────────────────────────────────
function ChoicePlayer({exercise, onDone}) {
  const questions = exercise.questions||[];
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState({});
  const [checked, setChecked] = useState({});
  const [done, setDone] = useState(false);

  const q = questions[current];

  const pick = (qi, ci) => {
    if(checked[qi]) return;
    setSelected(prev=>({...prev,[qi]:ci}));
  };

  const checkCurrent = () => {
    setChecked(prev=>({...prev,[current]:true}));
  };

  const next = () => {
    if(current<questions.length-1){ setCurrent(c=>c+1); }
    else {
      const correct = questions.filter((q,i)=>selected[i]===q.correct).length;
      setDone(true);
      onDone&&onDone({correct, total:questions.length, selected});
    }
  };

  const reset = () => { setCurrent(0); setSelected({}); setChecked({}); setDone(false); };

  if(done){
    const correct = questions.filter((q,i)=>selected[i]===q.correct).length;
    return(
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div className={correct===questions.length?'result-correct':'result-wrong'}>
          {correct===questions.length
            ? '✓ Suurepärane! '+correct+'/'+questions.length+' — kõik õiged!'
            : correct+'/'+questions.length+' vastust õiged'}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {questions.map((q,qi)=>(
            <div key={qi} style={{padding:'10px 14px',borderRadius:10,background:selected[qi]===q.correct?'rgba(22,101,52,.06)':'rgba(153,27,27,.05)',border:'1px solid '+(selected[qi]===q.correct?'rgba(22,101,52,.2)':'rgba(153,27,27,.2)')}}>
              <div style={{fontWeight:700,marginBottom:6}}>{qi+1}. {q.question}</div>
              <div style={{fontSize:'.84rem',color:selected[qi]===q.correct?'#166534':'#991b1b'}}>
                {selected[qi]===q.correct?'✓ ':' ✗ '}{q.options[selected[qi]||0]}
              </div>
              {selected[qi]!==q.correct&&<div style={{fontSize:'.82rem',color:'#166534',marginTop:4}}>→ {q.options[q.correct]}</div>}
            </div>
          ))}
        </div>
        <button onClick={reset} className="btn btn-ghost">Alusta uuesti</button>
      </div>
    );
  }

  if(!q) return null;
  const isChecked = checked[current];
  const sel = selected[current];

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontSize:'.78rem',color:'#42536A',fontWeight:600}}>Küsimus {current+1} / {questions.length}</span>
        <div style={{display:'flex',gap:4}}>
          {questions.map((_,i)=>(
            <div key={i} style={{width:8,height:8,borderRadius:'50%',background:i<current?'#2F5D50':i===current?'#C9882A':'rgba(28,43,58,.15)'}}/>
          ))}
        </div>
      </div>
      <div style={{fontWeight:700,fontSize:'1rem',marginBottom:8}}>{q.question}</div>
      {(q.options||[]).map((opt,ci)=>{
        let cls = 'choice-btn';
        if(isChecked){
          if(ci===q.correct) cls+=' correct';
          else if(ci===sel) cls+=' wrong';
        } else if(ci===sel) cls+=' selected';
        return <button key={ci} className={cls} onClick={()=>pick(current,ci)}>{opt}</button>;
      })}
      {exercise.hint&&!isChecked&&<div style={{fontSize:'.82rem',color:'#42536A',padding:'8px 12px',background:'rgba(201,136,42,.07)',borderRadius:9}}>💡 {q.hint||exercise.hint}</div>}
      {!isChecked
        ? <button onClick={checkCurrent} className="btn btn-pine" disabled={sel===undefined}>Kontrolli</button>
        : <button onClick={next} className="btn btn-pine">{current<questions.length-1?'Järgmine →':'Lõpeta'}</button>}
    </div>
  );
}

// ── ПЛЕЕР: ORDER ──────────────────────────────────────────────
function OrderPlayer({exercise, onDone}) {
  const correct = useMemo(()=>(exercise.sentence||'').split(' ').filter(Boolean),[exercise.sentence]);
  const shuffled = useMemo(()=>[...correct].sort(()=>Math.random()-.5),[correct]);
  const [placed, setPlaced]   = useState([]);
  const [avail, setAvail]     = useState(()=>shuffled.map((w,i)=>({w,i,used:false})));
  const [checked, setChecked] = useState(false);
  const [result, setResult]   = useState(null);

  const addWord = (item) => {
    if(item.used || checked) return;
    setPlaced(prev=>[...prev,item]);
    setAvail(prev=>prev.map(a=>a.i===item.i?{...a,used:true}:a));
  };

  const removeWord = (item) => {
    if(checked) return;
    setPlaced(prev=>prev.filter(p=>p.i!==item.i));
    setAvail(prev=>prev.map(a=>a.i===item.i?{...a,used:false}:a));
  };

  const check = () => {
    const placedWords = placed.map(p=>p.w);
    const isCorrect = placedWords.join(' ')===correct.join(' ');
    setResult({isCorrect, correct:correct.join(' ')});
    setChecked(true);
    onDone&&onDone({correct:isCorrect?1:0, total:1, answer:placedWords.join(' ')});
  };

  const reset = () => {
    setPlaced([]);
    setAvail(shuffled.map((w,i)=>({w,i,used:false})));
    setChecked(false);
    setResult(null);
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {exercise.instruction&&<div style={{fontSize:'.88rem',color:'#42536A',fontStyle:'italic'}}>{exercise.instruction}</div>}
      <div>
        <div style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Sinu vastus:</div>
        <div className={'drop-zone'+(placed.length===0?' active':'')}>
          {placed.length===0&&<span style={{fontSize:'.82rem',color:'#9ca3af'}}>Klõpsa sõnadel allpool...</span>}
          {placed.map((item,i)=>(
            <span key={i} className="word-chip placed" onClick={()=>removeWord(item)}>
              {item.w} <span style={{marginLeft:4,opacity:.5,fontSize:'.72rem'}}>✕</span>
            </span>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Sõnad:</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {avail.map((item,i)=>(
            <span key={i} className={'word-chip'+(item.used?' used':'')} onClick={()=>addWord(item)}>
              {item.w}
            </span>
          ))}
        </div>
      </div>
      {exercise.hint&&!checked&&<div style={{fontSize:'.82rem',color:'#42536A',padding:'8px 12px',background:'rgba(201,136,42,.07)',borderRadius:9}}>💡 {exercise.hint}</div>}
      {result&&(
        <div className={result.isCorrect?'result-correct':'result-wrong'}>
          {result.isCorrect?'✓ Suurepärane! Täpselt õige!':'✗ Ei ole päris õige. Õige vastus: "'+result.correct+'"'}
        </div>
      )}
      <div style={{display:'flex',gap:8}}>
        {!checked
          ? <button onClick={check} className="btn btn-pine" style={{flex:1}} disabled={placed.length===0}>Kontrolli</button>
          : <button onClick={reset} className="btn btn-ghost" style={{flex:1}}>Proovi uuesti</button>}
      </div>
    </div>
  );
}


// ── ПЛЕЕР: TRUE/FALSE ─────────────────────────────────────────
function TrueFalsePlayer({exercise, onDone}) {
  const statements = exercise.statements||[];
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);
  const [score, setScore] = useState(null);

  const pick = (i, val) => { if(checked) return; setAnswers(prev=>({...prev,[i]:val})); };

  const check = () => {
    let correct = 0;
    statements.forEach((s,i)=>{ if(answers[i]===s.correct) correct++; });
    setScore({correct, total:statements.length});
    setChecked(true);
    onDone&&onDone({correct, total:statements.length});
  };

  const reset = () => { setAnswers({}); setChecked(false); setScore(null); };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {statements.map((s,i)=>{
        const ans = answers[i];
        const isRight = checked && ans===s.correct;
        const isWrong = checked && ans!==undefined && ans!==s.correct;
        const unanswered = checked && ans===undefined;
        return(
          <div key={i} style={{padding:'12px 14px',borderRadius:11,border:'1.5px solid '+(isRight?'#166534':isWrong||unanswered?'#991b1b':'rgba(28,43,58,.1)'),background:isRight?'rgba(22,101,52,.05)':isWrong||unanswered?'rgba(153,27,27,.04)':'#fff'}}>
            <div style={{fontWeight:500,marginBottom:10,fontSize:'.92rem'}}>{i+1}. {s.text}</div>
            <div style={{display:'flex',gap:8}}>
              {[true,false].map(val=>{
                const isSelected = ans===val;
                const isCorrectOption = checked && s.correct===val;
                const isWrongOption   = checked && isSelected && s.correct!==val;
                return(
                  <button key={String(val)} onClick={()=>pick(i,val)}
                    style={{flex:1,padding:'8px',borderRadius:9,border:'1.5px solid '+(isCorrectOption?'#166534':isWrongOption?'#991b1b':isSelected?'#0891b2':'rgba(28,43,58,.12)'),
                      background:isCorrectOption?'rgba(22,101,52,.1)':isWrongOption?'rgba(153,27,27,.08)':isSelected?'rgba(8,145,178,.1)':'#fff',
                      cursor:checked?'default':'pointer',fontWeight:isSelected||isCorrectOption?700:500,fontSize:'.84rem',
                      color:isCorrectOption?'#166534':isWrongOption?'#991b1b':isSelected?'#0e7490':'#42536A'}}>
                    {val?'✓ Õige':'✗ Vale'}
                  </button>
                );
              })}
            </div>
            {checked&&unanswered&&<div style={{fontSize:'.76rem',color:'#991b1b',marginTop:6}}>Vastamata · Õige: {s.correct?'Õige':'Vale'}</div>}
          </div>
        );
      })}
      {exercise.hint&&!checked&&<div style={{fontSize:'.82rem',color:'#42536A',padding:'8px 12px',background:'rgba(201,136,42,.07)',borderRadius:9}}>💡 {exercise.hint}</div>}
      {score&&<div className={score.correct===score.total?'result-correct':'result-wrong'}>
        {score.correct===score.total?'✓ Suurepärane! Kõik '+score.total+' väidet õiged!':score.correct+'/'+score.total+' väidet õiged'}
      </div>}
      <div style={{display:'flex',gap:8}}>
        {!checked
          ? <button onClick={check} className="btn btn-pine" style={{flex:1}} disabled={Object.keys(answers).length===0}>Kontrolli vastuseid</button>
          : <button onClick={reset} className="btn btn-ghost" style={{flex:1}}>Proovi uuesti</button>}
      </div>
    </div>
  );
}

// ── ПЛЕЕР: MATCH ──────────────────────────────────────────────
function MatchPlayer({exercise, onDone}) {
  // statements: [{text, target}], targets: [{id, label, content}]
  const statements = exercise.statements||[];
  const targets    = exercise.targets||[];
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);
  const [score, setScore]     = useState(null);

  const check = () => {
    let correct = 0;
    statements.forEach((s,i)=>{ if(answers[i]===s.target) correct++; });
    setScore({correct, total:statements.length});
    setChecked(true);
    onDone&&onDone({correct, total:statements.length});
  };
  const reset = () => { setAnswers({}); setChecked(false); setScore(null); };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>

  );
}

// ── ПЛЕЕР: INSERT ─────────────────────────────────────────────
// Текст с [N] — места для вставки. options = [{id:'A',text:'...'}, ...]  one extra
function InsertPlayer({exercise, onDone}) {
  const options    = exercise.options||[];
  const answers_correct = exercise.answers||{}; // {1:'A', 2:'C', ...}
  const slots      = Object.keys(answers_correct).map(Number).sort((a,b)=>a-b);
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);
  const [score, setScore]     = useState(null);

  // Parse text: replace [N] with slot markers
  const textParts = useMemo(()=>{
    const raw = exercise.text||'';
    const parts = [];
    let last = 0;
    const re = /\[(\d+)\]/g;
    let m;
    while((m=re.exec(raw))!==null){
      if(m.index>last) parts.push({type:'text',value:raw.slice(last,m.index)});
      parts.push({type:'slot',num:Number(m[1])});
      last = m.index+m[0].length;
    }
    if(last<raw.length) parts.push({type:'text',value:raw.slice(last)});
    return parts;
  },[exercise.text]);

  const usedOptions = Object.values(answers);

  const check = () => {
    let correct = 0;
    slots.forEach(n=>{ if(answers[n]===answers_correct[n]) correct++; });
    setScore({correct, total:slots.length});
    setChecked(true);
    onDone&&onDone({correct, total:slots.length});
  };
  const reset = () => { setAnswers({}); setChecked(false); setScore(null); };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* Text with inline slot dropdowns */}
      <div style={{fontSize:'1rem',lineHeight:2,fontFamily:'IBM Plex Sans,sans-serif'}}>
        {textParts.map((p,i)=>{
          if(p.type==='text') return <span key={i}>{p.value}</span>;
          const n = p.num;
          const ans = answers[n];
          const isRight = checked && ans===answers_correct[n];
          const isWrong = checked && ans!==answers_correct[n];
          return(
            <span key={i} style={{display:'inline-flex',alignItems:'center',gap:4,verticalAlign:'middle'}}>
              <span style={{fontSize:'.72rem',fontWeight:700,color:'#9ca3af',marginRight:2}}>{n}.</span>
              <select value={ans||''} onChange={e=>{ if(!checked) setAnswers(p=>({...p,[n]:e.target.value})); }}
                style={{padding:'3px 8px',borderRadius:8,border:'2px solid '+(isRight?'#166534':isWrong?'#991b1b':'#C9882A'),
                  fontSize:'.84rem',background:isRight?'rgba(22,101,52,.08)':isWrong?'rgba(153,27,27,.06)':'#fff',cursor:checked?'default':'pointer',fontWeight:600}}>
                <option value="">—</option>
                {options.map(o=><option key={o.id} value={o.id} disabled={checked?false:usedOptions.includes(o.id)&&answers[n]!==o.id}>{o.id}</option>)}
              </select>
              {isWrong&&checked&&<span style={{fontSize:'.72rem',color:'#166534',fontWeight:700}}>→{answers_correct[n]}</span>}
            </span>
          );
        })}
      </div>
      {/* Options panel */}
      <div style={{background:'rgba(28,43,58,.03)',borderRadius:12,padding:'12px 14px'}}>
        <div style={{fontSize:'.72rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Laused (üks jääb üle)</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {options.map(o=>{
            const used = usedOptions.includes(o.id);
            const isCorrectAns = checked && Object.values(answers_correct).includes(o.id);
            return(
              <div key={o.id} style={{display:'flex',gap:8,padding:'8px 10px',borderRadius:9,border:'1px solid rgba(28,43,58,.08)',background:used&&!checked?'rgba(201,136,42,.06)':'#fff',opacity:used&&!checked?.7:1}}>
                <span style={{fontWeight:800,color:'#C9882A',minWidth:20,fontSize:'.84rem'}}>{o.id}</span>
                <span style={{fontSize:'.86rem',color:'#1C2B3A'}}>{o.text}</span>
              </div>
            );
          })}
        </div>
      </div>
      {exercise.hint&&!checked&&<div style={{fontSize:'.82rem',color:'#42536A',padding:'8px 12px',background:'rgba(201,136,42,.07)',borderRadius:9}}>💡 {exercise.hint}</div>}
      {score&&<div className={score.correct===score.total?'result-correct':'result-wrong'}>
        {score.correct===score.total?'✓ Suurepärane! Kõik laused õigetes kohtades!':score.correct+'/'+score.total+' lauset õigesti paigutatud'}
      </div>}
      <div style={{display:'flex',gap:8}}>
        {!checked
          ? <button onClick={check} className="btn btn-pine" style={{flex:1}} disabled={Object.keys(answers).length===0}>Kontrolli vastuseid</button>
          : <button onClick={reset} className="btn btn-ghost" style={{flex:1}}>Proovi uuesti</button>}
      </div>
    </div>
  );
}


// ── ПЛЕЕР: WRITING ───────────────────────────────────────────
function WritingPlayer({exercise, onDone}) {
  const [text, setText]       = useState('');
  const [feedback, setFeedback] = useState('');
  const [wordCount, setWordCount] = useState(0);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const [done, setDone]       = useState(false);

  const targetWords = exercise.targetWords || 140;
  const liveCount   = text.trim().split(/\s+/).filter(Boolean).length;
  const pct         = Math.min(100, Math.round(liveCount / targetWords * 100));
  const barColor    = pct < 60 ? '#991b1b' : pct < 85 ? '#C9882A' : '#166534';

  const check = async () => {
    if (liveCount < 20) { setError('Kirjuta vähemalt 20 sõna enne kontrollimist.'); return; }
    setLoading(true); setError(''); setFeedback('');
    try {
      const res = await fetch('/api/check-writing', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          studentText: text,
          task: exercise.task || exercise.title || '',
          level: exercise.level || 'B2',
          criteria: exercise.criteria || '',
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Viga');
      setFeedback(data.feedback);
      setWordCount(data.wordCount || liveCount);
      setDone(true);
      onDone && onDone({ correct: 1, total: 1, wordCount: data.wordCount || liveCount });
    } catch (e) {
      setError('Kontrollimine ebaõnnestus: ' + e.message);
    }
    setLoading(false);
  };

  const reset = () => { setText(''); setFeedback(''); setDone(false); setError(''); setWordCount(0); };

  // Render markdown-like feedback (bold, newlines)
  const renderFeedback = (text) => {
    return text.split('\n').map((line, i) => {
      const parts = line.split(/\*\*([^*]+)\*\*/g);
      return (
        <div key={i} style={{ marginBottom: line === '' ? 8 : 3 }}>
          {parts.map((p, j) => j % 2 === 1
            ? <strong key={j} style={{ color: '#1C2B3A' }}>{p}</strong>
            : <span key={j}>{p}</span>
          )}
        </div>
      );
    });
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      {/* Задание */}
      <div style={{ padding: '12px 14px', borderRadius: 10, background: 'rgba(190,24,93,.05)', border: '1px solid rgba(190,24,93,.15)' }}>
        <div style={{ fontSize: '.72rem', fontWeight: 700, color: '#9d174d', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 6 }}>Ülesanne</div>
        <div style={{ fontSize: '.88rem', color: '#1C2B3A', lineHeight: 1.6, whiteSpace: 'pre-wrap' }}>{exercise.task || exercise.title}</div>
        {exercise.criteria && (
          <div style={{ marginTop: 8, fontSize: '.8rem', color: '#42536A', borderTop: '1px solid rgba(190,24,93,.1)', paddingTop: 8 }}>
            <strong>Kriteeriumid:</strong> {exercise.criteria}
          </div>
        )}
        <div style={{ marginTop: 6, fontSize: '.78rem', color: '#9d174d', fontWeight: 600 }}>
          Nõutav pikkus: umbes {targetWords} sõna
        </div>
      </div>

      {/* Текстовое поле */}
      {!done && (
        <>
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            placeholder="Kirjuta oma vastus siia..."
            rows={10}
            style={{ fontFamily: 'IBM Plex Sans, sans-serif', fontSize: '.92rem', lineHeight: 1.7, resize: 'vertical' }}
          />
          {/* Счётчик слов */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ flex: 1, height: 6, borderRadius: 4, background: 'rgba(28,43,58,.1)', overflow: 'hidden' }}>
              <div style={{ width: pct + '%', height: '100%', background: barColor, borderRadius: 4, transition: 'width .3s' }} />
            </div>
            <span style={{ fontSize: '.8rem', fontWeight: 700, color: barColor, minWidth: 70 }}>
              {liveCount} / {targetWords} sõna
            </span>
          </div>
          {error && <div style={{ background: '#fee2e2', color: '#991b1b', borderRadius: 9, padding: '9px 12px', fontSize: '.84rem' }}>{error}</div>}
          <button onClick={check} disabled={loading || liveCount < 20} className="btn btn-pine" style={{ width: '100%', padding: 13 }}>
            {loading
              ? <span><i className="fa-solid fa-spinner fa-spin" style={{ marginRight: 8 }} />Claude kontrollib...</span>
              : <span><i className="fa-solid fa-robot" style={{ marginRight: 8 }} />Kontrolli Claude'iga</span>}
          </button>
        </>
      )}

      {/* Фидбек */}
      {done && feedback && (
        <>
          <div style={{ padding: '14px 16px', borderRadius: 12, background: 'rgba(47,93,80,.05)', border: '1px solid rgba(47,93,80,.2)' }}>
            <div style={{ fontSize: '.72rem', fontWeight: 700, color: '#2F5D50', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 8 }}>
              <i className="fa-solid fa-robot" /> Claude'i tagasiside · {wordCount} sõna
            </div>
            <div style={{ fontSize: '.88rem', color: '#42536A', lineHeight: 1.7 }}>
              {renderFeedback(feedback)}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={reset} className="btn btn-ghost" style={{ flex: 1 }}>Kirjuta uuesti</button>
          </div>
        </>
      )}
    </div>
  );
}

// ── РЕДАКТОР: CHOICE ──────────────────────────────────────────
function ChoiceEditor({value, onChange}) {
  const questions = value.questions||[{question:'',options:['','','',''],correct:0,hint:''}];
  const update = (qi, patch) => onChange({...value, questions:questions.map((q,i)=>i===qi?{...q,...patch}:q)});
  const addQ = () => onChange({...value, questions:[...questions,{question:'',options:['','','',''],correct:0,hint:''}]});
  const delQ = (qi) => onChange({...value, questions:questions.filter((_,i)=>i!==qi)});

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {questions.map((q,qi)=>(
        <div key={qi} style={{padding:'14px',borderRadius:12,border:'1px solid rgba(28,43,58,.1)',background:'#F9F8F6'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontWeight:700,fontSize:'.84rem',color:'#42536A'}}>Küsimus {qi+1}</span>
            {questions.length>1&&<button onClick={()=>delQ(qi)} className="btn btn-ghost btn-sm" style={{color:'#991b1b'}}>✕</button>}
          </div>
          <input value={q.question} onChange={e=>update(qi,{question:e.target.value})} placeholder="Küsimus *" style={{marginBottom:8}}/>
          {(q.options||[]).map((opt,ci)=>(
            <div key={ci} style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
              <input type="radio" name={'correct-'+qi} checked={q.correct===ci} onChange={()=>update(qi,{correct:ci})} style={{width:16,height:16,cursor:'pointer',flexShrink:0}}/>
              <input value={opt} onChange={e=>update(qi,{options:q.options.map((o,oi)=>oi===ci?e.target.value:o)})} placeholder={'Variant '+(ci+1)+(ci===q.correct?' (õige)':'')} style={{flex:1,borderColor:ci===q.correct?'#2F5D50':'rgba(28,43,58,.12)'}}/>
            </div>
          ))}
          <input value={q.hint||''} onChange={e=>update(qi,{hint:e.target.value})} placeholder="Vihje selle küsimuse jaoks (valikuline)" style={{marginTop:4}}/>
        </div>
      ))}
      <button onClick={addQ} className="btn btn-ghost btn-sm" style={{alignSelf:'flex-start'}}>
        <i className="fa-solid fa-plus"/> Lisa küsimus
      </button>
    </div>
  );
}

        Kirjuta lause/fraas õiges järjestuses. Õpilane peab sõnad õigesse järjekorda panema.
      </div>
      <input
        value={value.sentence||''}
        onChange={e=>onChange({...value,sentence:e.target.value})}
        placeholder="Ma armastan eesti keelt väga"
      />
      <input
        value={value.instruction||''}
        onChange={e=>onChange({...value,instruction:e.target.value})}
        placeholder="Juhis õpilasele (nt. 'Pane sõnad õigesse järjekorda')"
      />
      <input
        value={value.hint||''}
        onChange={e=>onChange({...value,hint:e.target.value})}
        placeholder="Vihje (valikuline)"
      />
      {value.sentence&&(
        <div style={{padding:'10px 12px',borderRadius:9,background:'#F9F8F6',fontSize:'.82rem'}}>
          <strong>Sõnad (segamini):</strong> {[...(value.sentence.split(' ').filter(Boolean))].sort(()=>Math.random()-.5).join(' · ')}
        </div>
      )}
    </div>
  );
}


// ── РЕДАКТОР: TRUE/FALSE ──────────────────────────────────────
function TrueFalseEditor({value, onChange}) {
  const statements = value.statements||[{text:'',correct:true}];
  const update = (i, patch) => onChange({...value, statements: statements.map((s,si)=>si===i?{...s,...patch}:s)});
  const addS   = () => onChange({...value, statements:[...statements,{text:'',correct:true}]});
  const delS   = (i) => onChange({...value, statements:statements.filter((_,si)=>si!==i)});

  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      <div style={{fontSize:'.78rem',color:'#42536A',padding:'10px 12px',borderRadius:9,background:'rgba(8,145,178,.06)',border:'1px solid rgba(8,145,178,.15)'}}>
        Kirjuta väited ja märgi, kas need on <strong>õige</strong> (✓) või <strong>vale</strong> (✗).
      </div>
      {statements.map((s,i)=>(
        <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'10px 12px',borderRadius:10,border:'1px solid rgba(28,43,58,.1)',background:'#F9F8F6'}}>
          <span style={{fontSize:'.78rem',fontWeight:700,color:'#42536A',minWidth:18}}>{i+1}.</span>
          <input value={s.text} onChange={e=>update(i,{text:e.target.value})} placeholder={'Väide '+(i+1)} style={{flex:1,margin:0}}/>
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            <button onClick={()=>update(i,{correct:true})}
              style={{padding:'5px 12px',borderRadius:8,border:'1.5px solid '+(s.correct?'#166534':'rgba(28,43,58,.12)'),background:s.correct?'rgba(22,101,52,.1)':'#fff',cursor:'pointer',fontWeight:s.correct?700:400,fontSize:'.8rem',color:s.correct?'#166534':'#42536A'}}>
              ✓ Õige
            </button>
            <button onClick={()=>update(i,{correct:false})}
              style={{padding:'5px 12px',borderRadius:8,border:'1.5px solid '+(!s.correct?'#991b1b':'rgba(28,43,58,.12)'),background:!s.correct?'rgba(153,27,27,.08)':'#fff',cursor:'pointer',fontWeight:!s.correct?700:400,fontSize:'.8rem',color:!s.correct?'#991b1b':'#42536A'}}>
              ✗ Vale
            </button>
          </div>
          {statements.length>1&&<button onClick={()=>delS(i)} className="btn btn-ghost btn-sm" style={{color:'#991b1b',padding:'4px 8px'}}>✕</button>}
        </div>
      ))}
      <input value={value.hint||''} onChange={e=>onChange({...value,hint:e.target.value})} placeholder="Vihje õpilasele (valikuline)"/>
      <button onClick={addS} className="btn btn-ghost btn-sm" style={{alignSelf:'flex-start'}}>
        <i className="fa-solid fa-plus"/> Lisa väide
      </button>
    </div>
  );
}

// ── РЕДАКТОР: MATCH ───────────────────────────────────────────
function MatchEditor({value, onChange}) {
  // statements: [{text, target}], targets: [{id, label, content}]
  const statements = value.statements||[{text:'',target:'A'}];
  const targets    = value.targets||[{id:'A',content:''},{id:'B',content:''},{id:'C',content:''}];

  const updateStmt = (i,patch) => onChange({...value, statements:statements.map((s,si)=>si===i?{...s,...patch}:s)});
  const updateTgt  = (i,patch) => onChange({...value, targets:targets.map((t,ti)=>ti===i?{...t,...patch}:t)});
  const addStmt    = () => onChange({...value, statements:[...statements,{text:'',target:targets[0]?.id||'A'}]});
  const delStmt    = (i) => onChange({...value, statements:statements.filter((_,si)=>si!==i)});
  const addTgt     = () => {
    const ids='ABCDEFGHIJK';
    const next = ids[targets.length]||String(targets.length+1);
    onChange({...value, targets:[...targets,{id:next,content:''}]});
  };
  const delTgt = (i) => onChange({...value, targets:targets.filter((_,ti)=>ti!==i)});

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{fontSize:'.78rem',color:'#42536A',padding:'10px 12px',borderRadius:9,background:'rgba(124,58,237,.06)',border:'1px solid rgba(124,58,237,.15)'}}>
        <strong>Tekstilõigud (A, B, C...):</strong> lisa lõigud, millega väited sobitada. <br/>
        <strong>Väited:</strong> kirjuta väide ja vali õige tekstilõik.
      </div>

      <div>
        <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Tekstilõigud</div>
        {targets.map((t,i)=>(
          <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:8}}>
            <span style={{fontWeight:800,color:'#7c3aed',minWidth:22,paddingTop:10,fontSize:'.86rem'}}>{t.id}</span>
            <textarea value={t.content} onChange={e=>updateTgt(i,{content:e.target.value})} placeholder={'Tekstilõik '+t.id} rows={2} style={{flex:1,resize:'vertical'}}/>
            {targets.length>2&&<button onClick={()=>delTgt(i)} className="btn btn-ghost btn-sm" style={{color:'#991b1b',marginTop:4}}>✕</button>}
          </div>
        ))}
        <button onClick={addTgt} className="btn btn-ghost btn-sm" style={{alignSelf:'flex-start'}}>
          <i className="fa-solid fa-plus"/> Lisa tekstilõik
        </button>
      </div>

      <div>
        <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Väited</div>
        {statements.map((s,i)=>(
          <div key={i} style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:'.78rem',fontWeight:700,color:'#42536A',minWidth:18}}>{i+1}.</span>
            <input value={s.text} onChange={e=>updateStmt(i,{text:e.target.value})} placeholder={'Väide '+(i+1)} style={{flex:1,margin:0}}/>
            <select value={s.target} onChange={e=>updateStmt(i,{target:e.target.value})} style={{width:70,margin:0}}>
              {targets.map(t=><option key={t.id} value={t.id}>{t.id}</option>)}
            </select>
            {statements.length>1&&<button onClick={()=>delStmt(i)} className="btn btn-ghost btn-sm" style={{color:'#991b1b',padding:'4px 8px'}}>✕</button>}
          </div>
        ))}
        <button onClick={addStmt} className="btn btn-ghost btn-sm">
          <i className="fa-solid fa-plus"/> Lisa väide
        </button>
      </div>
    </div>
  );
}

// ── РЕДАКТОР: INSERT ──────────────────────────────────────────
// text contains [1] [2] ... as slot markers; options are A,B,C... (one extra); answers = {1:'C',2:'A',...}
function InsertEditor({value, onChange}) {
  const options = value.options||[{id:'A',text:''},{id:'B',text:''},{id:'C',text:''}];
  const answers = value.answers||{};

  const updateOpt   = (i,patch) => onChange({...value, options:options.map((o,oi)=>oi===i?{...o,...patch}:o)});
  const addOpt      = () => {
    const ids='ABCDEFGHIJK';
    const next=ids[options.length]||String(options.length+1);
    onChange({...value, options:[...options,{id:next,text:''}]});
  };
  const delOpt      = (i) => onChange({...value, options:options.filter((_,oi)=>oi!==i)});
  const updateAns   = (slot,val) => onChange({...value, answers:{...answers,[slot]:val}});

  // Detect slots in text
  const rawText = value.text||'';
  const slots = [...new Set([...rawText.matchAll(/\[(\d+)\]/g)].map(m=>Number(m[1])))].sort((a,b)=>a-b);

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{fontSize:'.78rem',color:'#42536A',padding:'10px 12px',borderRadius:9,background:'rgba(180,83,9,.06)',border:'1px solid rgba(180,83,9,.15)'}}>
        Kirjuta tekst lünkadega <code>[1]</code>, <code>[2]</code>... Seejärel lisa lausevalikud (A, B, C...) ja märgi õige vastus igale lüngale. <strong>Üks lause jääb üle.</strong>
      </div>
      <textarea value={rawText} onChange={e=>onChange({...value,text:e.target.value})}
        placeholder={"Tekst lünkadega: ...esimene lause. (0) X Järgmine lõik. [1] Niisiis..."}
        rows={5} style={{fontFamily:'monospace',fontSize:'.86rem'}}/>

      <div>
        <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Lausevalikud (üks jääb üle)</div>
        {options.map((o,i)=>(
          <div key={i} style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
            <span style={{fontWeight:800,color:'#b45309',minWidth:22,fontSize:'.86rem'}}>{o.id}</span>
            <input value={o.text} onChange={e=>updateOpt(i,{text:e.target.value})} placeholder={'Lause '+o.id} style={{flex:1,margin:0}}/>
            {options.length>2&&<button onClick={()=>delOpt(i)} className="btn btn-ghost btn-sm" style={{color:'#991b1b',padding:'4px 8px'}}>✕</button>}
          </div>
        ))}
        <button onClick={addOpt} className="btn btn-ghost btn-sm"><i className="fa-solid fa-plus"/> Lisa valik</button>
      </div>

      {slots.length>0&&(
        <div>
          <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Õiged vastused lünkadele</div>
          {slots.map(n=>(
            <div key={n} style={{display:'flex',gap:10,alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:'.84rem',fontWeight:700,color:'#b45309',minWidth:32}}>Lünk {n}:</span>
              <select value={answers[n]||''} onChange={e=>updateAns(n,e.target.value)} style={{width:90,margin:0}}>
                <option value="">—</option>
                {options.map(o=><option key={o.id} value={o.id}>{o.id}</option>)}
              </select>
            </div>
          ))}
        </div>
      )}
      <input value={value.hint||''} onChange={e=>onChange({...value,hint:e.target.value})} placeholder="Vihje (valikuline)"/>
    </div>
  );
}

// ── МОДАЛКА СОЗДАНИЯ/РЕДАКТИРОВАНИЯ ──────────────────────────
function ExerciseModal({exercise, onClose, onSave, levels, subjects}) {
  const isEdit = !!exercise?.id;
  const [type, setType]       = useState(exercise?.type||'fill');
  const [title, setTitle]     = useState(exercise?.title||'');
  const [level, setLevel]     = useState(exercise?.level||'');
  const [subject, setSubject] = useState(exercise?.subject||'Eesti keel');
  const [topic, setTopic]     = useState(exercise?.topic||'');
  const [tags, setTags]       = useState((exercise?.tags||[]).join(', '));
  const [data, setData]       = useState(exercise||{});
  const [saving, setSaving]   = useState(false);

  const save = async() => {
    if(!title.trim()){alert('Sisesta pealkiri');return;}
    setSaving(true);
    await onSave({
      type, title: title.trim(), level, subject, topic: topic.trim(),
      tags: tags.split(',').map(t=>t.trim()).filter(Boolean),
      ...data,
      updatedAt: new Date().toISOString()
    });
    setSaving(false);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.6)',display:'flex',alignItems:'center',
      justifyContent:'center',padding:16,zIndex:200,backdropFilter:'blur(4px)'}}>
      <div className="card scroll" style={{padding:0,maxWidth:620,width:'100%',maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{padding:'20px 24px 16px',borderBottom:'1px solid rgba(28,43,58,.08)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:'1.15rem'}}>{isEdit?'✏️ Muuda harjutust':'➕ Uus harjutus'}</h2>
          <button onClick={onClose} style={{background:'rgba(28,43,58,.07)',border:'none',cursor:'pointer',borderRadius:9,width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',color:'#42536A'}}>✕</button>
        </div>
        <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:14}}>
          {/* Тип */}
          <div>
            <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Harjutuse tüüp</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {Object.entries(EX_TYPES).map(([k,v])=>(
                <button key={k} onClick={()=>setType(k)}
                  style={{padding:'9px 14px',borderRadius:10,border:'1.5px solid '+(type===k?v.color:'rgba(28,43,58,.12)'),
                    background:type===k?v.color+'15':'#fff',cursor:'pointer',fontWeight:type===k?700:500,
                    fontSize:'.84rem',color:type===k?v.color:'#42536A',display:'flex',alignItems:'center',gap:6}}>
                  <i className={'fa-solid '+v.icon}/> {v.label}
                </button>
              ))}
            </div>
          </div>
          {/* Мета */}
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Harjutuse pealkiri *"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <select value={level} onChange={e=>setLevel(e.target.value)}>
              <option value="">Tase (valikuline)</option>
              {(levels||['A1','A2','B1','B2','C1']).map(l=><option key={l}>{l}</option>)}
            </select>
            <select value={subject} onChange={e=>setSubject(e.target.value)}>
              {(subjects||['Eesti keel','Vene keel','Inglise keel','Matemaatika']).map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Teema: Tutvumine, Numbrid, Verbid... (valikuline)"/>
          <input value={tags} onChange={e=>setTags(e.target.value)} placeholder="Sildid: verbid, olevik, A2 (komaga eraldatud)"/>
          {/* Редактор по типу */}
          <div style={{borderTop:'1px solid rgba(28,43,58,.07)',paddingTop:14}}>
            <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Harjutuse sisu</div>
            {type==='fill'      &&<FillEditor      value={data} onChange={setData}/>}
            {type==='choice'    &&<ChoiceEditor    value={data} onChange={setData}/>}
            {type==='order'     &&<OrderEditor     value={data} onChange={setData}/>}
            {type==='truefalse' &&<TrueFalseEditor value={data} onChange={setData}/>}
            {type==='match'     &&<MatchEditor     value={data} onChange={setData}/>}
            {type==='insert'    &&<InsertEditor    value={data} onChange={setData}/>}
            {type==='writing'   &&<WritingEditor   value={data} onChange={setData}/>}
          </div>
          <button onClick={save} disabled={saving} className="btn btn-pine" style={{width:'100%',padding:13,marginTop:4}}>
            {saving?'Salvestab…':'✓ '+(isEdit?'Salvesta muudatused':'Lisa harjutus raamatukogusse')}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── МОДАЛКА НАЗНАЧЕНИЯ УЧЕНИКУ ────────────────────────────────

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.6)',display:'flex',alignItems:'center',

        <div style={{padding:'18px 22px',display:'flex',flexDirection:'column',gap:10}}>

            {EX_TYPES[exercise.type]?.label}: {exercise.title}

          <select value={stuId} onChange={e=>setStuId(e.target.value)}>

// ── ПРОСТОЙ ЛОГИН ─────────────────────────────────────────────
function LoginScreen({onLogin}) {
  const [email, setEmail] = useState('');
  const [pass, setPass]   = useState('');
  const [err, setErr]     = useState('');
  const [busy, setBusy]   = useState(false);

  const go = async() => {
    if(!email||!pass){setErr('Täida kõik väljad');return;}
    setBusy(true);setErr('');
    try{
      const res = await auth.signInWithEmailAndPassword(email,pass);
      const snap = await db.collection('users').doc(res.user.uid).get();
      if(snap.exists) onLogin({uid:res.user.uid,...snap.data()});
      else onLogin({uid:res.user.uid,email,role:'teacher'});
    }catch(e){
      setErr('Vale e-post või parool');
    }
    setBusy(false);
  };

  const googleLogin = async() => {
    setBusy(true);setErr('');
    try{
      const res = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      const snap = await db.collection('users').doc(res.user.uid).get();
      if(snap.exists) onLogin({uid:res.user.uid,displayName:res.user.displayName,...snap.data()});
      else onLogin({uid:res.user.uid,displayName:res.user.displayName,email:res.user.email,role:'teacher'});
    }catch(e){setErr('Google sisselogimine ebaõnnestus');}
    setBusy(false);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16,
      background:'linear-gradient(135deg,#1C2B3A 0%,#2F5D50 100%)'}}>
      <div style={{background:'#FBFAF8',borderRadius:24,padding:'36px',width:'100%',maxWidth:380,boxShadow:'0 32px 80px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.9rem',fontWeight:600}}>
            Keele<span style={{color:'#C9882A'}}>Sepp</span>
          </div>
          <div style={{fontSize:'.82rem',color:'#42536A',marginTop:4}}>Harjutuste raamatukogu</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-post"
            onKeyDown={e=>e.key==='Enter'&&go()}/>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Parool"
            onKeyDown={e=>e.key==='Enter'&&go()}/>
        </div>
        {err&&<div style={{background:'#fee2e2',color:'#991b1b',borderRadius:9,padding:'9px 12px',fontSize:'.84rem',marginBottom:12}}>{err}</div>}
        <button onClick={go} disabled={busy} className="btn btn-dark" style={{width:'100%',marginBottom:10,borderRadius:12,padding:12}}>
          {busy?'Laeb…':'Sisene'}
        </button>
        <button onClick={googleLogin} disabled={busy} style={{width:'100%',padding:'11px',borderRadius:12,border:'1.5px solid rgba(28,43,58,.15)',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontWeight:600,fontSize:'.88rem'}}>
          <svg width="17" height="17" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
            <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
            <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
            <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
          </svg>
          Sisene Google'iga
        </button>
        <div style={{textAlign:'center',marginTop:14}}>
          <a href="/haldus/" style={{fontSize:'.8rem',color:'#42536A',textDecoration:'none'}}>← Tagasi haldussüsteemi</a>
        </div>
      </div>
    </div>
  );
}

// ── ДЕРЕВО НАВИГАЦИИ ─────────────────────────────────────────
function TreeNav({exercises, selection, onSelect}) {
  const [openSubjects, setOpenSubjects] = React.useState({});
  const [openLevels, setOpenLevels]     = React.useState({});

  const tree = React.useMemo(() => {
    const t = {};
    exercises.forEach(e => {
      const subj  = e.subject || 'Muu';
      const level = e.level   || 'Muu';
      const topic = e.topic   || 'Muu';
      if(!t[subj]) t[subj] = {};
      if(!t[subj][level]) t[subj][level] = {};
      if(!t[subj][level][topic]) t[subj][level][topic] = 0;
      t[subj][level][topic]++;
    });
    return t;
  }, [exercises]);

  const subjectCount = (s) => exercises.filter(e=>(e.subject||'Muu')===s).length;
  const levelCount   = (s,l) => exercises.filter(e=>(e.subject||'Muu')===s&&(e.level||'Muu')===l).length;

  const isSubjOpen  = (s) => openSubjects[s] !== undefined ? openSubjects[s] : selection.subject===s;
  const isLevelOpen = (s,l) => openLevels[s+'|'+l] !== undefined ? openLevels[s+'|'+l] : (selection.subject===s&&selection.level===l);

  const selectAll   = () => onSelect({subject:null,level:null,topic:null});
  const selectSubj  = (s) => { onSelect({subject:s,level:null,topic:null}); setOpenSubjects(p=>({...p,[s]:true})); };
  const selectLevel = (s,l) => { onSelect({subject:s,level:l,topic:null}); setOpenLevels(p=>({...p,[s+'|'+l]:true})); };
  const selectTopic = (s,l,t) => onSelect({subject:s,level:l,topic:t});

  const allActive = !selection.subject;

  return(
    <div className="tree-nav" style={{background:'#fff',borderRight:'1px solid rgba(28,43,58,.08)',padding:'16px 10px',borderRadius:'14px 0 0 14px',minHeight:300}}>
      <div style={{fontSize:'.7rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.1em',padding:'0 8px',marginBottom:10}}>Struktuur</div>
      <div className={'tree-item'+(allActive?' active':'')} onClick={selectAll}>
        <i className="fa-solid fa-layer-group" style={{fontSize:'.78rem',width:14}}/>
        Kõik harjutused
        <span className="tree-count">{exercises.length}</span>
      </div>
      {Object.keys(tree).sort().map(subj=>{
        const isOpen   = isSubjOpen(subj);
        const isActive = selection.subject===subj && !selection.level;
        return(
          <div key={subj}>
            <div className={'tree-item subject'+(isActive?' active':'')} onClick={()=>{selectSubj(subj);setOpenSubjects(p=>({...p,[subj]:!isOpen}));}}>
              <i className={'fa-solid '+(isOpen?'fa-chevron-down':'fa-chevron-right')} style={{fontSize:'.65rem',width:10,color:'#9ca3af'}}/>
              <i className="fa-solid fa-book-open" style={{fontSize:'.75rem',color:'#C9882A',width:14}}/>
              <span style={{flex:1}}>{subj}</span>
              <span className="tree-count">{subjectCount(subj)}</span>
            </div>
            {isOpen && Object.keys(tree[subj]).sort().map(lvl=>{
              const isLvlOpen   = isLevelOpen(subj,lvl);
              const isLvlActive = selection.subject===subj && selection.level===lvl && !selection.topic;
              const lvlKey      = subj+'|'+lvl;
              return(
                <div key={lvl}>
                  <div className={'tree-item level'+(isLvlActive?' active':'')} onClick={()=>{selectLevel(subj,lvl);setOpenLevels(p=>({...p,[lvlKey]:!isLvlOpen}));}}>
                    <i className={'fa-solid '+(isLvlOpen?'fa-chevron-down':'fa-chevron-right')} style={{fontSize:'.6rem',width:10,color:'#d1d5db'}}/>
                    <span style={{flex:1}}>{lvl==='Muu'?'Tase määramata':lvl}</span>
                    <span className="tree-count">{levelCount(subj,lvl)}</span>
                  </div>
                  {isLvlOpen && Object.keys(tree[subj][lvl]).sort().map(top=>{
                    const isTopActive = selection.subject===subj && selection.level===lvl && selection.topic===top;
                    return(
                      <div key={top} className={'tree-item topic'+(isTopActive?' active':'')} onClick={()=>selectTopic(subj,lvl,top)}>
                        <i className="fa-solid fa-file-lines" style={{fontSize:'.65rem',width:14,color:'#9ca3af'}}/>
                        <span style={{flex:1}}>{top==='Muu'?'Teema määramata':top}</span>
                        <span className="tree-count">{tree[subj][lvl][top]}</span>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── ГЛАВНОЕ ПРИЛОЖЕНИЕ ────────────────────────────────────────
function App() {
  const [user, setUser]         = useState(null);
  const [loading, setLoading]   = useState(true);
  const [exercises, setExercises] = useState([]);
  const [students, setStudents]   = useState([]);
  const [notif, setNotif]         = useState('');
  const [modal, setModal]         = useState(null); // null | {type:'create'|'edit'|'assign', data}
  const [search, setSearch]       = useState('');
  const [typeFilter, setTypeFilter] = useState('all');
  const [levelFilter, setLevelFilter] = useState('all');
  const [treeSelection, setTreeSelection] = useState({subject:null,level:null,topic:null});

  const notify = msg => { setNotif(msg); setTimeout(()=>setNotif(''),3000); };

  const isTeacher = user?.role==='teacher'||user?.role==='admin'||user?.email==='zakutailo.pavel@gmail.com';

  // AUTH
  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(async fbUser => {
      if(fbUser){
        const snap = await db.collection('users').doc(fbUser.uid).get();
        if(snap.exists) setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,...snap.data()});
        else setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,email:fbUser.email,role:'student'});
      } else { setUser(null); }
      setLoading(false);
    });
    return unsub;
  },[]);

  // DATA
  useEffect(()=>{
    if(!user) return;
    const u1 = db.collection('exercises').orderBy('createdAt','desc').onSnapshot(s=>
      setExercises(s.docs.map(d=>({id:d.id,...d.data()}))),
      err=>{console.warn('exercises listener failed:',err); setExercises([]);}
    );
    const u2 = db.collection('students').onSnapshot(s=>
      setStudents(s.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.active!==false)),
      err=>{console.warn('students listener failed:',err); setStudents([]);}
    );
    return ()=>{u1();u2();};
  },[user]);

  const levels  = useMemo(()=>[...new Set(exercises.map(e=>e.level).filter(Boolean))]  ,[exercises]);
  const subjects = ['Eesti keel','Vene keel','Inglise keel','Matemaatika'];

  const filtered = useMemo(()=>{
    const q = search.toLowerCase();
    return exercises.filter(e=>{
      if(typeFilter!=='all'&&e.type!==typeFilter) return false;
      if(levelFilter!=='all'&&e.level!==levelFilter) return false;
      // tree selection filter
      if(treeSelection.subject){
        if((e.subject||'Muu')!==treeSelection.subject) return false;
      }
      if(treeSelection.level){
        if((e.level||'Muu')!==treeSelection.level) return false;
      }
      if(treeSelection.topic){
        if((e.topic||'Muu')!==treeSelection.topic) return false;
      }
      if(!q) return true;
      return (e.title||'').toLowerCase().includes(q)
        || (e.tags||[]).some(t=>t.toLowerCase().includes(q))
        || (e.subject||'').toLowerCase().includes(q)
        || (e.topic||'').toLowerCase().includes(q);
    });
  },[exercises,typeFilter,levelFilter,treeSelection,search]);

  const saveExercise = useCallback(async(data) => {
    if(data.id){
      await db.collection('exercises').doc(data.id).update({...data, updatedAt:new Date().toISOString()});
      notify('✓ Harjutus uuendatud');
    } else {
      await db.collection('exercises').add({
        ...data,
        authorUid: user.uid,
        authorName: user.displayName||user.email||'',
        createdAt: today(),
        assignCount: 0
      });
      notify('✓ Harjutus lisatud raamatukogusse!');
    }
    setModal(null);
  },[user]);

  const deleteExercise = useCallback(async(ex) => {
    if(!window.confirm('Kustuta harjutus "'+ex.title+'"?')) return;
    await db.collection('exercises').doc(ex.id).delete();
    notify('✓ Harjutus kustutatud');
  },[]);

  const assignExercise = useCallback(async({exerciseId,exerciseTitle,exerciseType,studentId,due,note}) => {
    const stu = students.find(s=>s.id===studentId);
    await db.collection('homework').add({
      studentId, studentName:stu?.name||'',
      task: exerciseTitle,
      exerciseId, exerciseType,
      due: due||'',
      note: note||'',
      status: 'Ootel',
      date: today(),
      fileUrl:'', fileName:'', attachments:[],
      isExercise: true
    });
    await db.collection('exercises').doc(exerciseId).update({
      assignCount: firebase.firestore.FieldValue.increment(1)
    });
    notify('✓ Harjutus määratud: '+stu?.name);
  },[students]);

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}><div className="spinner"/></div>;
  if(!user)   return <LoginScreen onLogin={setUser}/>;

  return(
    <div style={{minHeight:'100vh',background:'#F4F2EE'}}>
      {/* Шапка */}
      <header style={{background:'#1C2B3A',padding:'0 28px',height:58,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:20}}>
          <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.4rem',fontWeight:600,color:'#fff'}}>
            Keele<span style={{color:'#C9882A'}}>Sepp</span>
          </div>
          <span style={{color:'rgba(255,255,255,.35)',fontSize:'.8rem'}}>Harjutuste raamatukogu</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{color:'rgba(255,255,255,.5)',fontSize:'.82rem'}}>{user.displayName||user.email}</span>
          <a href="/haldus/" style={{color:'rgba(255,255,255,.6)',fontSize:'.8rem',textDecoration:'none',padding:'6px 12px',border:'1px solid rgba(255,255,255,.15)',borderRadius:8}}>
            ← Haldus
          </a>
          <button onClick={()=>auth.signOut().then(()=>setUser(null))}
            style={{background:'none',border:'1px solid rgba(255,255,255,.15)',color:'rgba(255,255,255,.6)',cursor:'pointer',borderRadius:8,padding:'6px 12px',fontSize:'.8rem'}}>
            Logi välja
          </button>
        </div>
      </header>

      <div style={{maxWidth:1100,margin:'0 auto',padding:'28px'}}>
        {notif&&<div style={{position:'fixed',top:20,right:20,background:'#1C2B3A',color:'#fff',padding:'11px 18px',borderRadius:12,zIndex:300,fontWeight:600,fontSize:'.88rem',boxShadow:'0 8px 28px rgba(0,0,0,.25)'}}>{notif}</div>}

        {/* Заголовок + создать */}
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:14,flexWrap:'wrap',marginBottom:24}}>
          <div>
            <h1 style={{fontSize:'1.7rem'}}>📚 Harjutuste raamatukogu</h1>
            <div style={{color:'#42536A',fontSize:'.88rem',marginTop:4}}>
              {exercises.length} harjutust · {isTeacher?'Loo, muuda ja määra õpilastele':'Proovi harjutusi'}
            </div>
          </div>
          {isTeacher&&(
            <button onClick={()=>setModal({type:'create'})} className="btn btn-pine" style={{flexShrink:0}}>
              <i className="fa-solid fa-plus"/> Uus harjutus
            </button>
          )}
        </div>

        {/* Статистика */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:24}}>
          {Object.entries(EX_TYPES).map(([k,v])=>(
            <div key={k} className="card" style={{padding:'16px 18px'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <div style={{width:30,height:30,borderRadius:9,background:v.color+'18',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <i className={'fa-solid '+v.icon} style={{color:v.color,fontSize:'.8rem'}}/>
                </div>
                <span style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.06em'}}>{v.label}</span>
              </div>
              <div style={{fontSize:'1.6rem',fontWeight:700,color:'#1C2B3A'}}>{exercises.filter(e=>e.type===k).length}</div>
            </div>
          ))}
          <div className="card" style={{padding:'16px 18px'}}>
            <div style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Kokku määratud</div>
            <div style={{fontSize:'1.6rem',fontWeight:700,color:'#2F5D50'}}>{exercises.reduce((a,e)=>a+(e.assignCount||0),0)}</div>
          </div>
        </div>

        {/* Основной layout: дерево + контент */}
        <div className="library-layout" style={{display:'flex',gap:0,background:'#fff',borderRadius:14,border:'1px solid rgba(28,43,58,.08)',overflow:'hidden'}}>

          {/* Дерево навигации */}
          <TreeNav exercises={exercises} selection={treeSelection} onSelect={setTreeSelection}/>

          {/* Правая панель */}
          <div style={{flex:1,minWidth:0,padding:'20px 20px'}}>

            {/* Breadcrumb */}
            {treeSelection.subject&&(
              <div style={{display:'flex',alignItems:'center',gap:6,fontSize:'.8rem',color:'#42536A',marginBottom:14,flexWrap:'wrap'}}>
                <span style={{cursor:'pointer',textDecoration:'underline'}} onClick={()=>setTreeSelection({subject:null,level:null,topic:null})}>Kõik</span>
                {treeSelection.subject&&<><span style={{color:'#d1d5db'}}>/</span><span style={{cursor:'pointer',textDecoration:'underline'}} onClick={()=>setTreeSelection({subject:treeSelection.subject,level:null,topic:null})}>{treeSelection.subject}</span></>}
                {treeSelection.level&&<><span style={{color:'#d1d5db'}}>/</span><span style={{cursor:'pointer',textDecoration:'underline'}} onClick={()=>setTreeSelection({subject:treeSelection.subject,level:treeSelection.level,topic:null})}>{treeSelection.level}</span></>}
                {treeSelection.topic&&<><span style={{color:'#d1d5db'}}>/</span><span style={{fontWeight:700,color:'#1C2B3A'}}>{treeSelection.topic}</span></>}
              </div>
            )}

            {/* Фильтры */}
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16,alignItems:'center'}}>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="🔍 Otsi harjutust, silti..."
                style={{width:220,padding:'8px 12px'}}/>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                <button onClick={()=>setTypeFilter('all')} className={'btn btn-sm '+(typeFilter==='all'?'btn-dark':'btn-ghost')}>Kõik</button>
                {Object.entries(EX_TYPES).map(([k,v])=>(
                  <button key={k} onClick={()=>setTypeFilter(k)} className={'btn btn-sm '+(typeFilter===k?'btn-dark':'btn-ghost')}>
                    <i className={'fa-solid '+v.icon}/> {v.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Список упражнений */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(420px,1fr))',gap:14}}>
              {filtered.map(ex=>(
                <ExerciseCard
                  key={ex.id} ex={ex}
                  isTeacher={isTeacher}
                  students={students}
                  onEdit={isTeacher?e=>setModal({type:'edit',data:e}):null}
                  onDelete={isTeacher?deleteExercise:null}
                  onAssign={isTeacher?e=>setModal({type:'assign',data:e}):null}
                />
              ))}
              {filtered.length===0&&(
                <div style={{gridColumn:'1/-1',textAlign:'center',padding:'48px 0',color:'#42536A'}}>
                  {search||typeFilter!=='all'||treeSelection.subject?'Harjutusi ei leitud.':
                    isTeacher?'Harjutusi pole veel lisatud. Vajuta "Uus harjutus"!':'Harjutusi pole veel saadaval.'}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* Модалки */}
      {modal?.type==='create'&&(
        <ExerciseModal exercise={null} levels={['A1','A2','B1','B2','C1']} subjects={subjects}
          onClose={()=>setModal(null)} onSave={saveExercise}/>
      )}
      {modal?.type==='edit'&&(
        <ExerciseModal exercise={modal.data} levels={['A1','A2','B1','B2','C1']} subjects={subjects}
          onClose={()=>setModal(null)} onSave={saveExercise}/>
      )}
      {modal?.type==='assign'&&(
        <AssignModal exercise={modal.data} students={students}
          onClose={()=>setModal(null)} onAssign={assignExercise}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
