<script type="text/babel" data-presets="exercises-react">
const {useState,useEffect,useCallback,useMemo,useRef} = React;
const db   = window._db;
const auth = window._auth;

const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => d ? new Date(d).toLocaleDateString('et-EE',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
const normalizeText = t => String(t||'').toLowerCase().trim()
  .replace(/[àáâãäå]/g,'a').replace(/[èéêë]/g,'e').replace(/[ìíîï]/g,'i')
  .replace(/[òóôõö]/g,'o').replace(/[ùúûü]/g,'u').replace(/[ñ]/g,'n');

const cleanExerciseData = data => {
  const cleaned = {...data};
  if(Array.isArray(cleaned.pairs)){
    cleaned.pairs = cleaned.pairs.filter(pair=>(pair.left||'').trim() && (pair.right||'').trim());
  }
  if(Array.isArray(cleaned.questions)){
    cleaned.questions = cleaned.questions
      .map(q=>{
        const originalOptions = q.options||[];
        const correctText = String(originalOptions[q.correct]||'').trim();
        const options = originalOptions.map(o=>String(o||'').trim()).filter(Boolean);
        return {
          ...q,
          options,
          correct:Math.max(0, options.indexOf(correctText)),
          question:String(q.question||'').trim()
        };
      })
      .filter(q=>q.question && q.options.length);
  }
  return cleaned;
};

const validateExerciseContent = (type, data) => {
  const cleaned = cleanExerciseData(data);
  const validChoiceQuestions = (data.questions||[]).filter(q=>{
    const options = q.options||[];
    const correctText = String(options[q.correct]||'').trim();
    const filledOptions = options.map(o=>String(o||'').trim()).filter(Boolean);
    return String(q.question||'').trim() && correctText && filledOptions.length>=2;
  });
  if(type==='writing'){
    if(!String(cleaned.task||cleaned.prompt||'').trim()) return 'Kirjuta kirjutamisülesande juhis.';
    return '';
  }
  if(type==='fill'){
    if(!parseFillText(cleaned.text||'').blanks.length) return 'Täida lünk vajab vastuseid nurksulgudes, näiteks: Ma [käin] koolis.';
  }
  if(type==='choice'){
    if(!validChoiceQuestions.length) return 'Vali vastus vajab vähemalt ühte küsimust ja õige vastuse valikut.';
    if(validChoiceQuestions.length!==(data.questions||[]).length) return 'Igal valikvastuse küsimusel peab olema küsimus, vähemalt kaks varianti ja märgitud õige vastus.';
  }
  if(type==='reading'){
    if(!String(cleaned.passage||cleaned.text||'').trim()) return 'Lugemine vajab lugemisteksti.';
    if(!validChoiceQuestions.length) return 'Lugemine vajab vähemalt ühte küsimust koos õige vastusega.';
  }
  if(type==='match'){
    if((cleaned.pairs||[]).length<2) return 'Sobita paarid vajab vähemalt kahte valmis vastusepaari.';
  }
  if(type==='translate'){
    if(!String(cleaned.sourceText||cleaned.prompt||cleaned.text||'').trim()) return 'Tõlkimine vajab teksti, mida tõlkida.';
    if(!String(cleaned.targetText||cleaned.answer||'').trim()) return 'Tõlkimine vajab ette kirjutatud õiget vastust.';
  }
  if(type==='order'){
    if((cleaned.sentence||'').split(' ').filter(Boolean).length<2) return 'Koosta lause/sõna vajab ette kirjutatud õiget lauset või sõnajärge.';
  }
  return '';
};

// ── ТИПЫ УПРАЖНЕНИЙ ───────────────────────────────────────────
const EX_TYPES = {
  fill:   { label:'Täida lünk',        icon:'fa-pen-line',      badge:'type-badge-fill',   color:'#1d4ed8' },
  choice: { label:'Vali vastus',        icon:'fa-list-check',    badge:'type-badge-choice', color:'#6d28d9' },
  order:  { label:'Koosta lause/sõna',  icon:'fa-shuffle',       badge:'type-badge-order',  color:'#2F5D50' },
  writing:{ label:'Kirjutamine',        icon:'fa-wand-magic-sparkles', badge:'type-badge-writing', color:'#A96E1A' },
  reading:{ label:'Lugemine',           icon:'fa-book-open-reader', badge:'type-badge-reading', color:'#0e7490' },
  match:  { label:'Sobita paarid',       icon:'fa-link',          badge:'type-badge-match', color:'#047857' },
  translate:{ label:'Tõlkimine',        icon:'fa-language',      badge:'type-badge-translate', color:'#be185d' },
};

const SUBJECT_TREE = {

    label:'Eesti keel',
    short:'EST',
    levels:['A1','A2','B1','B2','C1'],
    topics:['Grammatika','Sõnavara','Lugemine','Kirjutamine','Kuulamine','Rääkimine']
  },
  'Inglise keel': {
    label:'Inglise keel',
    short:'ENG',
    levels:['A1','A2','B1','B2','C1'],
    topics:['Grammar','Vocabulary','Reading','Writing','Listening','Speaking']
  },
  'Matemaatika': {
    label:'Matemaatika',
    short:'MAT',
    levels:Array.from({length:12},(_,i)=>`${i+1}. klass`),
    topics:['Arvud','Algebra','Geomeetria','Võrrandid','Funktsioonid','Tekstülesanded']
  }
};
const SUBJECTS = Object.keys(SUBJECT_TREE);
const getSubjectConfig = subject => SUBJECT_TREE[subject] || SUBJECT_TREE['Eesti keel'];
const getLevelLabel = subject => subject==='Matemaatika' ? 'Klass' : 'Tase';
const getExerciseTopic = ex => ex.topic || (Array.isArray(ex.tags) ? ex.tags[0] : '') || 'Muu';

// ── УТИЛИТЫ СОЗДАНИЯ ─────────────────────────────────────────
// Парсинг fill: "Ma ___ koolis [käin]" → {text, blanks:[{pos,answer}]}
function parseFillText(raw) {
  const blanks = [];
  let idx = 0;
  const parts = raw.split(/\[([^\]]+)\]/g);
  // parts: ["Ma ___ koolis ", "käin", ""]
  let result = [];
  for(let i=0;i<parts.length;i++){
    if(i%2===0){ result.push({type:'text',value:parts[i]}); }
    else { result.push({type:'blank',answer:parts[i],index:idx++}); blanks.push({answer:parts[i],index:idx-1}); }
  }
  return {parts:result, blanks};
}

// ── ПЛЕЕР: FILL ───────────────────────────────────────────────
function FillPlayer({exercise, onDone}) {
  const parsed = useMemo(()=>parseFillText(exercise.text||''),[exercise.text]);
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);
  const [score, setScore] = useState(null);

  const check = () => {
    let correct = 0;
    parsed.blanks.forEach(b=>{
      if(normalizeText(answers[b.index]||'')===normalizeText(b.answer)) correct++;
    });
    setScore({correct, total:parsed.blanks.length});
    setChecked(true);
    onDone&&onDone({correct, total:parsed.blanks.length, answers});
  };

  const reset = () => { setAnswers({}); setChecked(false); setScore(null); };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{fontSize:'1rem',lineHeight:2,fontFamily:'IBM Plex Sans,sans-serif'}}>
        {parsed.parts.map((p,i)=>{
          if(p.type==='text') return <span key={i}>{p.value}</span>;
          const val = answers[p.index]||'';
          const isCorrect = checked && normalizeText(val)===normalizeText(p.answer);
          const isWrong   = checked && normalizeText(val)!==normalizeText(p.answer);
          return(
            <span key={i} style={{display:'inline-flex',alignItems:'center',gap:4}}>
              <input
                className={'blank-input'+(isCorrect?' correct':isWrong?' wrong':'')}
                value={val}
                disabled={checked}
                onChange={e=>setAnswers(prev=>({...prev,[p.index]:e.target.value}))}
                style={{width:Math.max(80,(p.answer.length+2)*12)+'px'}}
              />
              {isWrong&&checked&&<span style={{fontSize:'.75rem',color:'#166534',fontWeight:700}}>({p.answer})</span>}
            </span>
          );
        })}
      </div>
      {exercise.hint&&!checked&&<div style={{fontSize:'.82rem',color:'#42536A',padding:'8px 12px',background:'rgba(201,136,42,.07)',borderRadius:9}}>💡 {exercise.hint}</div>}
      {score&&(
        <div className={score.correct===score.total?'result-correct':'result-wrong'}>
          {score.correct===score.total
            ? '✓ Suurepärane! Kõik '+score.total+' vastust õiged!'
            : score.correct+'/'+score.total+' vastust õiged. Proovi uuesti!'}
        </div>
      )}
      <div style={{display:'flex',gap:8}}>
        {!checked
          ? <button onClick={check} className="btn btn-pine" style={{flex:1}}>Kontrolli vastuseid</button>
          : <button onClick={reset} className="btn btn-ghost" style={{flex:1}}>Proovi uuesti</button>}
      </div>
    </div>
  );
}

// ── ПЛЕЕР: CHOICE ─────────────────────────────────────────────
function ChoicePlayer({exercise, onDone}) {
  const questions = exercise.questions||[];
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState({});
  const [checked, setChecked] = useState({});
  const [done, setDone] = useState(false);

  const q = questions[current];

  const pick = (qi, ci) => {
    if(checked[qi]) return;
    setSelected(prev=>({...prev,[qi]:ci}));
  };

  const checkCurrent = () => {
    setChecked(prev=>({...prev,[current]:true}));
  };

  const next = () => {
    if(current<questions.length-1){ setCurrent(c=>c+1); }
    else {
      const correct = questions.filter((q,i)=>selected[i]===q.correct).length;
      setDone(true);
      onDone&&onDone({correct, total:questions.length, selected});
    }
  };

  const reset = () => { setCurrent(0); setSelected({}); setChecked({}); setDone(false); };

  if(done){
    const correct = questions.filter((q,i)=>selected[i]===q.correct).length;
    return(
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div className={correct===questions.length?'result-correct':'result-wrong'}>
          {correct===questions.length
            ? '✓ Suurepärane! '+correct+'/'+questions.length+' — kõik õiged!'
            : correct+'/'+questions.length+' vastust õiged'}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {questions.map((q,qi)=>(
            <div key={qi} style={{padding:'10px 14px',borderRadius:10,background:selected[qi]===q.correct?'rgba(22,101,52,.06)':'rgba(153,27,27,.05)',border:'1px solid '+(selected[qi]===q.correct?'rgba(22,101,52,.2)':'rgba(153,27,27,.2)')}}>
              <div style={{fontWeight:700,marginBottom:6}}>{qi+1}. {q.question}</div>
              <div style={{fontSize:'.84rem',color:selected[qi]===q.correct?'#166534':'#991b1b'}}>
                {selected[qi]===q.correct?'✓ ':' ✗ '}{q.options[selected[qi]||0]}
              </div>
              {selected[qi]!==q.correct&&<div style={{fontSize:'.82rem',color:'#166534',marginTop:4}}>→ {q.options[q.correct]}</div>}
            </div>
          ))}
        </div>
        <button onClick={reset} className="btn btn-ghost">Alusta uuesti</button>
      </div>
    );
  }

  if(!q) return null;
  const isChecked = checked[current];
  const sel = selected[current];

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontSize:'.78rem',color:'#42536A',fontWeight:600}}>Küsimus {current+1} / {questions.length}</span>
        <div style={{display:'flex',gap:4}}>
          {questions.map((_,i)=>(
            <div key={i} style={{width:8,height:8,borderRadius:'50%',background:i<current?'#2F5D50':i===current?'#C9882A':'rgba(28,43,58,.15)'}}/>
          ))}
        </div>
      </div>
      <div style={{fontWeight:700,fontSize:'1rem',marginBottom:8}}>{q.question}</div>
      {(q.options||[]).map((opt,ci)=>{
        let cls = 'choice-btn';
        if(isChecked){
          if(ci===q.correct) cls+=' correct';
          else if(ci===sel) cls+=' wrong';
        } else if(ci===sel) cls+=' selected';
        return <button key={ci} className={cls} onClick={()=>pick(current,ci)}>{opt}</button>;
      })}
      {exercise.hint&&!isChecked&&<div style={{fontSize:'.82rem',color:'#42536A',padding:'8px 12px',background:'rgba(201,136,42,.07)',borderRadius:9}}>💡 {q.hint||exercise.hint}</div>}
      {!isChecked
        ? <button onClick={checkCurrent} className="btn btn-pine" disabled={sel===undefined}>Kontrolli</button>
        : <button onClick={next} className="btn btn-pine">{current<questions.length-1?'Järgmine →':'Lõpeta'}</button>}
    </div>
  );
}

// ── ПЛЕЕР: READING ────────────────────────────────────────────
function ReadingPlayer({exercise, onDone}) {
  const readingExercise = {...exercise, questions:exercise.questions||[]};
  return(

      </div>
      <ChoicePlayer exercise={readingExercise} onDone={onDone}/>
    </div>

}

// ── ПЛЕЕР: MATCHING ───────────────────────────────────────────
function MatchPlayer({exercise, onDone}) {
  const pairs = exercise.pairs||[];
  const rightOptions = useMemo(()=>[...pairs.map(p=>p.right||'')].filter(Boolean).sort(()=>Math.random()-.5),[exercise.id, pairs.length]);
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);
  const correct = pairs.filter((p,i)=>answers[i]===p.right).length;

  const check = () => {
    setChecked(true);
    onDone&&onDone({correct,total:pairs.length,answers});
  };
  const reset = () => { setAnswers({}); setChecked(false); };

  if(!pairs.length) return <div style={{color:'#42536A'}}>Paarid puuduvad.</div>;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {pairs.map((pair,i)=>(
        <div key={i} style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) minmax(0,1fr)',gap:10,alignItems:'center'}}>
          <div style={{padding:'10px 12px',borderRadius:9,background:'#F9F8F6',fontWeight:700}}>{pair.left}</div>
          <select
            value={answers[i]||''}
            disabled={checked}
            onChange={e=>setAnswers(prev=>({...prev,[i]:e.target.value}))}
            style={{borderColor:checked?(answers[i]===pair.right?'#166534':'#991b1b'):undefined}}>
            <option value="">Vali paar...</option>
            {rightOptions.map(opt=><option key={opt} value={opt}>{opt}</option>)}
          </select>
          {checked&&answers[i]!==pair.right&&(
            <div style={{gridColumn:'2',fontSize:'.78rem',color:'#166534',fontWeight:700}}>Õige: {pair.right}</div>
          )}
        </div>
      ))}
      {checked&&<div className={correct===pairs.length?'result-correct':'result-wrong'}>{correct}/{pairs.length} paari õiged</div>}
      {!checked
        ? <button onClick={check} className="btn btn-pine" disabled={Object.keys(answers).length<pairs.length}>Kontrolli</button>
        : <button onClick={reset} className="btn btn-ghost">Proovi uuesti</button>}
    </div>
  );
}

// ── ПЛЕЕР: TRANSLATE ──────────────────────────────────────────
function TranslatePlayer({exercise, onDone}) {
  const [answer, setAnswer] = useState('');
  const [checked, setChecked] = useState(false);
  const expected = exercise.answer || exercise.targetText || '';
  const ok = expected ? normalizeText(answer)===normalizeText(expected) : answer.trim().length>0;

  const check = () => {
    setChecked(true);
    onDone&&onDone({correct:ok?1:0,total:1,answer});
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{padding:'12px 14px',borderRadius:10,background:'#F9F8F6',border:'1px solid rgba(28,43,58,.08)'}}>
        <div style={{fontSize:'.74rem',fontWeight:800,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Tõlgi</div>
        <div style={{fontSize:'1rem',lineHeight:1.55}}>{exercise.sourceText||exercise.prompt||exercise.text||'Tekst puudub.'}</div>
      </div>
      <textarea value={answer} onChange={e=>setAnswer(e.target.value)} disabled={checked} rows={4} placeholder="Kirjuta tõlge siia..."/>
      {checked&&(
        <div className={ok?'result-correct':'result-wrong'}>
          {ok?'✓ Sobib!': expected ? 'Õige vastus: '+expected : 'Vastus salvestatud õpetaja kontrolliks.'}
        </div>
      )}
      {!checked
        ? <button onClick={check} className="btn btn-pine" disabled={!answer.trim()}>Kontrolli</button>
        : <button onClick={()=>{setAnswer('');setChecked(false);}} className="btn btn-ghost">Proovi uuesti</button>}
    </div>
  );
}

// ── ПЛЕЕР: ORDER ──────────────────────────────────────────────
function OrderPlayer({exercise, onDone}) {
  const correct = useMemo(()=>(exercise.sentence||'').split(' ').filter(Boolean),[exercise.sentence]);
  const shuffled = useMemo(()=>[...correct].sort(()=>Math.random()-.5),[correct]);
  const [placed, setPlaced]   = useState([]);
  const [avail, setAvail]     = useState(()=>shuffled.map((w,i)=>({w,i,used:false})));
  const [checked, setChecked] = useState(false);
  const [result, setResult]   = useState(null);

  const addWord = (item) => {
    if(item.used || checked) return;
    setPlaced(prev=>[...prev,item]);
    setAvail(prev=>prev.map(a=>a.i===item.i?{...a,used:true}:a));
  };

  const removeWord = (item) => {
    if(checked) return;
    setPlaced(prev=>prev.filter(p=>p.i!==item.i));
    setAvail(prev=>prev.map(a=>a.i===item.i?{...a,used:false}:a));
  };

  const check = () => {
    const placedWords = placed.map(p=>p.w);
    const isCorrect = placedWords.join(' ')===correct.join(' ');
    setResult({isCorrect, correct:correct.join(' ')});
    setChecked(true);
    onDone&&onDone({correct:isCorrect?1:0, total:1, answer:placedWords.join(' ')});
  };

  const reset = () => {
    setPlaced([]);
    setAvail(shuffled.map((w,i)=>({w,i,used:false})));
    setChecked(false);
    setResult(null);
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {exercise.instruction&&<div style={{fontSize:'.88rem',color:'#42536A',fontStyle:'italic'}}>{exercise.instruction}</div>}
      <div>
        <div style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Sinu vastus:</div>
        <div className={'drop-zone'+(placed.length===0?' active':'')}>
          {placed.length===0&&<span style={{fontSize:'.82rem',color:'#9ca3af'}}>Klõpsa sõnadel allpool...</span>}
          {placed.map((item,i)=>(
            <span key={i} className="word-chip placed" onClick={()=>removeWord(item)}>
              {item.w} <span style={{marginLeft:4,opacity:.5,fontSize:'.72rem'}}>✕</span>
            </span>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Sõnad:</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {avail.map((item,i)=>(
            <span key={i} className={'word-chip'+(item.used?' used':'')} onClick={()=>addWord(item)}>
              {item.w}
            </span>
          ))}
        </div>
      </div>
      {exercise.hint&&!checked&&<div style={{fontSize:'.82rem',color:'#42536A',padding:'8px 12px',background:'rgba(201,136,42,.07)',borderRadius:9}}>💡 {exercise.hint}</div>}
      {result&&(
        <div className={result.isCorrect?'result-correct':'result-wrong'}>
          {result.isCorrect?'✓ Suurepärane! Täpselt õige!':'✗ Ei ole päris õige. Õige vastus: "'+result.correct+'"'}
        </div>
      )}
      <div style={{display:'flex',gap:8}}>
        {!checked
          ? <button onClick={check} className="btn btn-pine" style={{flex:1}} disabled={placed.length===0}>Kontrolli</button>
          : <button onClick={reset} className="btn btn-ghost" style={{flex:1}}>Proovi uuesti</button>}
      </div>
    </div>
  );
}

// ── ПЛЕЕР: WRITING / CLAUDE CHECK ─────────────────────────────
function WritingPlayer({exercise, onDone}) {
  const [studentText, setStudentText] = useState('');
  const [feedback, setFeedback] = useState('');
  const [wordCount, setWordCount] = useState(0);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const checkWriting = async() => {
    if(!studentText.trim()){setErr('Kirjuta tekst enne kontrollimist');return;}
    setBusy(true);
    setErr('');
    setFeedback('');
    try{
      const res = await fetch('/api/check-writing', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          studentText,
          task: exercise.task || exercise.prompt || exercise.instruction || exercise.title || '',
          level: exercise.level || 'B2',
          criteria: exercise.criteria || ''
        })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Kontroll ebaõnnestus');
      setFeedback(data.feedback || '');
      setWordCount(data.wordCount || 0);
      onDone&&onDone({correct:1,total:1,feedback:data.feedback,wordCount:data.wordCount});
    }catch(e){
      setErr(e.message || 'Kontroll ebaõnnestus');
    }
    setBusy(false);
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {(exercise.task||exercise.prompt||exercise.instruction)&&(
        <div style={{padding:'12px 14px',borderRadius:10,background:'rgba(201,136,42,.07)',fontSize:'.9rem',lineHeight:1.5}}>
          {exercise.task||exercise.prompt||exercise.instruction}
        </div>
      )}
      {exercise.criteria&&(
        <div style={{fontSize:'.8rem',color:'#42536A',whiteSpace:'pre-wrap',padding:'10px 12px',borderRadius:9,background:'#F9F8F6'}}>
          {exercise.criteria}
        </div>
      )}
      <textarea
        value={studentText}
        onChange={e=>setStudentText(e.target.value)}
        rows={8}
        placeholder="Kirjuta vastus siia..."
        style={{resize:'vertical',lineHeight:1.55}}
      />
      {err&&<div style={{background:'#fee2e2',color:'#991b1b',borderRadius:9,padding:'9px 12px',fontSize:'.84rem'}}>{err}</div>}
      <button onClick={checkWriting} disabled={busy} className="btn btn-pine">
        <i className="fa-solid fa-wand-magic-sparkles"/> {busy?'Kontrollib Claude...':'Kontrolli Claude abil'}
      </button>
      {feedback&&(
        <div style={{border:'1px solid rgba(47,93,80,.18)',borderRadius:12,padding:14,background:'rgba(47,93,80,.05)'}}>
          <div style={{fontSize:'.78rem',fontWeight:700,color:'#2F5D50',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>
            Claude tagasiside · {wordCount} sõna
          </div>
          <div style={{whiteSpace:'pre-wrap',fontSize:'.88rem',lineHeight:1.55,color:'#1C2B3A'}}>{feedback}</div>
        </div>
      )}
    </div>
  );
}

// ── КАРТОЧКА УПРАЖНЕНИЯ (превью + плеер) ──────────────────────
function ExerciseCard({ex, isTeacher, onEdit, onDelete, onAssign, students, defaultOpen=false, user}) {
  const [open, setOpen]             = useState(defaultOpen);
  const [result, setResult]         = useState(null);
  const [savedResult, setSavedResult] = useState(null);
  const type    = EX_TYPES[ex.type]||EX_TYPES.fill;
  const cardRef = useRef(null);

  useEffect(()=>{
    if(defaultOpen && cardRef.current){
      setTimeout(()=>cardRef.current?.scrollIntoView({behavior:'smooth',block:'center'}),300);
    }
  },[]);

  useEffect(()=>{
    if(!user?.uid||!ex?.id) return;
    db.collection('exerciseResults')
      .where('exerciseId','==',ex.id)
      .where('studentUid','==',user.uid)
      .orderBy('completedAt','desc')
      .limit(1)
      .get()
      .then(snap=>{ if(!snap.empty) setSavedResult(snap.docs[0].data()); })
      .catch(()=>{});
  },[user?.uid, ex.id]);

  const saveResult = async(r, extra={}) => {
    if(!user?.uid) return;
    const pct = r.total>0 ? Math.round(r.correct/r.total*100) : 100;
    const params = new URLSearchParams(window.location.search);
    const homeworkId = params.get('hw')||null;
    const payload = {
      exerciseId: ex.id,
      exerciseTitle: ex.title||'',
      exerciseType: ex.type||'',
      studentUid: user.uid,
      studentName: user.displayName||user.email||'',
      homeworkId,
      score: {correct:r.correct||0, total:r.total||1},
      pct,
      completedAt: new Date().toISOString(),
      ...extra
    };
    try{
      await db.collection('exerciseResults').add(payload);
      setSavedResult(payload);
      if(homeworkId && pct>=60){
        await db.collection('homework').doc(homeworkId).update({
          status:'Tehtud',
          doneAt: new Date().toISOString().split('T')[0]
        });
      }
    }catch(e){ console.warn('saveResult:', e); }
  };

  return(
    <div ref={cardRef} className="ex-card" style={{display:'flex',flexDirection:'column',gap:12,outline:defaultOpen?'2px solid #C9882A':'none',outlineOffset:2}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:6}}>
            <span className={'badge '+type.badge} style={{display:'inline-flex',alignItems:'center',gap:5}}>
              <i className={'fa-solid '+type.icon} style={{fontSize:'.7rem'}}/> {type.label}
            </span>
            {ex.level&&<span className="badge" style={{background:'rgba(201,136,42,.1)',color:'#A96E1A'}}>{ex.level}</span>}
            {ex.subject&&<span className="badge" style={{background:'rgba(28,43,58,.06)',color:'#42536A'}}>{ex.subject}</span>}
            {ex.topic&&<span className="badge" style={{background:'rgba(47,93,80,.09)',color:'#2F5D50'}}>{ex.topic}</span>}
          </div>
          <h3 style={{fontSize:'1rem',marginBottom:4}}>{ex.title||'Pealkirjata harjutus'}</h3>
          <div style={{fontSize:'.78rem',color:'#42536A'}}>
            Autor: {ex.authorName||'—'} · {fmtDate(ex.createdAt)}
            {ex.assignCount>0&&<span style={{marginLeft:8,color:'#2F5D50',fontWeight:600}}>· {ex.assignCount}× määratud</span>}
          </div>
          {savedResult&&(
            <div style={{marginTop:6,display:'inline-flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:999,
              background:savedResult.pct>=60?'rgba(22,101,52,.1)':'rgba(153,27,27,.08)',
              border:'1px solid '+(savedResult.pct>=60?'rgba(22,101,52,.2)':'rgba(153,27,27,.2)')}}>
              <i className="fa-solid fa-circle-check" style={{fontSize:'.65rem',color:savedResult.pct>=60?'#166534':'#991b1b'}}/>
              <span style={{fontSize:'.72rem',fontWeight:700,color:savedResult.pct>=60?'#166534':'#991b1b'}}>
                {savedResult.exerciseType==='writing'
                  ? 'Kirjutatud · '+new Date(savedResult.completedAt).toLocaleDateString('et-EE')
                  : savedResult.score.correct+'/'+savedResult.score.total
                    +' ('+savedResult.pct+'%) · '
                    +new Date(savedResult.completedAt).toLocaleDateString('et-EE')}
              </span>
            </div>
          )}
        </div>
        <div style={{display:'flex',gap:6,flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
          <button onClick={()=>setOpen(o=>!o)} className="btn btn-ghost btn-sm">
            {open?'Peida':'Proovi'}
          </button>
          {isTeacher&&onAssign&&(
            <button onClick={()=>onAssign(ex)} className="btn btn-pine btn-sm">
              <i className="fa-solid fa-paper-plane"/> Määra
            </button>
          )}
          {isTeacher&&onEdit&&(
            <button onClick={()=>onEdit(ex)} className="btn btn-ghost btn-sm">
              <i className="fa-solid fa-pen"/>
            </button>
          )}
          {isTeacher&&onDelete&&(
            <button onClick={()=>onDelete(ex)} className="btn btn-ghost btn-sm" style={{color:'#991b1b'}}>
              <i className="fa-solid fa-trash"/>
            </button>
          )}
        </div>
      </div>

      {open&&(
        <div style={{borderTop:'1px solid rgba(28,43,58,.07)',paddingTop:14}}>
          {result&&<div style={{marginBottom:12,padding:'8px 12px',borderRadius:9,background:'rgba(47,93,80,.07)',fontSize:'.82rem',color:'#2F5D50',fontWeight:600}}>
            Viimane tulemus: {result.correct}/{result.total}
          </div>}
          {ex.type==='fill'     &&<FillPlayer      exercise={ex} onDone={r=>{setResult(r);saveResult(r);}}/>}
          {ex.type==='choice'   &&<ChoicePlayer    exercise={ex} onDone={r=>{setResult(r);saveResult(r);}}/>}
          {ex.type==='reading'  &&<ReadingPlayer   exercise={ex} onDone={r=>{setResult(r);saveResult(r);}}/>}
          {ex.type==='match'    &&<MatchPlayer     exercise={ex} onDone={r=>{setResult(r);saveResult(r);}}/>}
          {ex.type==='translate'&&<TranslatePlayer exercise={ex} onDone={r=>{setResult(r);saveResult(r);}}/>}
          {ex.type==='order'    &&<OrderPlayer     exercise={ex} onDone={r=>{setResult(r);saveResult(r);}}/>}
          {ex.type==='writing'  &&<WritingPlayer   exercise={ex} onDone={r=>{setResult(r);saveResult(r,{writingWordCount:r.wordCount||0});}}/>}
        </div>
      )}
    </div>
  );
}

// ── РЕДАКТОР: CHOICE ──────────────────────────────────────────
function ChoiceEditor({value, onChange}) {
  const questions = value.questions||[{question:'',options:['','','',''],correct:0,hint:''}];
  const update = (qi, patch) => onChange({...value, questions:questions.map((q,i)=>i===qi?{...q,...patch}:q)});
  const addQ = () => onChange({...value, questions:[...questions,{question:'',options:['','','',''],correct:0,hint:''}]});
  const delQ = (qi) => onChange({...value, questions:questions.filter((_,i)=>i!==qi)});

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {questions.map((q,qi)=>(
        <div key={qi} style={{padding:'14px',borderRadius:12,border:'1px solid rgba(28,43,58,.1)',background:'#F9F8F6'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontWeight:700,fontSize:'.84rem',color:'#42536A'}}>Küsimus {qi+1}</span>
            {questions.length>1&&<button onClick={()=>delQ(qi)} className="btn btn-ghost btn-sm" style={{color:'#991b1b'}}>✕</button>}
          </div>
          <input value={q.question} onChange={e=>update(qi,{question:e.target.value})} placeholder="Küsimus *" style={{marginBottom:8}}/>
          {(q.options||[]).map((opt,ci)=>(
            <div key={ci} style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
              <input type="radio" name={'correct-'+qi} checked={q.correct===ci} onChange={()=>update(qi,{correct:ci})} style={{width:16,height:16,cursor:'pointer',flexShrink:0}}/>
              <input value={opt} onChange={e=>update(qi,{options:q.options.map((o,oi)=>oi===ci?e.target.value:o)})} placeholder={'Variant '+(ci+1)+(ci===q.correct?' (õige)':'')} style={{flex:1,borderColor:ci===q.correct?'#2F5D50':'rgba(28,43,58,.12)'}}/>
            </div>
          ))}
          <input value={q.hint||''} onChange={e=>update(qi,{hint:e.target.value})} placeholder="Vihje selle küsimuse jaoks (valikuline)" style={{marginTop:4}}/>
        </div>
      ))}
      <button onClick={addQ} className="btn btn-ghost btn-sm" style={{alignSelf:'flex-start'}}>
        <i className="fa-solid fa-plus"/> Lisa küsimus
      </button>
    </div>
  );
}

  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>

            disabled={pairs.length<=2}
            style={{color:'#991b1b',minWidth:42}}>
            <i className="fa-solid fa-trash"/>

        color:active?'#fff':done?'#2F5D50':'#42536A'}}>
        {done?<i className="fa-solid fa-check" style={{fontSize:'.65rem'}}/>:number}
      </span>
      {label}
    </div>
  );
}

// ── МОДАЛКА СОЗДАНИЯ/РЕДАКТИРОВАНИЯ ──────────────────────────
function ExerciseModal({exercise, onClose, onSave, topicsBySubjectLevel}) {
  const isEdit = !!exercise?.id;
  const [step, setStep]       = useState(0);
  const [type, setType]       = useState(exercise?.type||'fill');
  const [title, setTitle]     = useState(exercise?.title||'');
  const [subject, setSubject] = useState(exercise?.subject||SUBJECTS[0]);
  const subjectConfig = getSubjectConfig(subject);
  const [level, setLevel]     = useState(exercise?.level||subjectConfig.levels[0]||'');
  const topicOptions = useMemo(()=>{
    const saved = topicsBySubjectLevel?.[subject]?.[level] || [];
    return [...new Set([...(subjectConfig.topics||[]), ...saved])];
  },[topicsBySubjectLevel, subject, level, subjectConfig]);
  const [topic, setTopic]     = useState(exercise?.topic||topicOptions[0]||'');
  const [tags, setTags]       = useState((exercise?.tags||[]).join(', '));
  const [data, setData]       = useState(exercise||{});
  const [saving, setSaving]   = useState(false);
  const steps = ['Kategooria','Tüüp ja pealkiri','Sisu'];

  useEffect(()=>{
    const nextConfig = getSubjectConfig(subject);
    if(!nextConfig.levels.includes(level)){
      setLevel(nextConfig.levels[0]||'');
    }
  },[subject]);

  useEffect(()=>{
    if(topicOptions.length && !topicOptions.includes(topic)){
      setTopic(topicOptions[0]);
    }
  },[topicOptions]);

  const nextStep = () => {
    if(step===0 && (!subject || !level || !topic.trim())){alert('Vali õppeaine, tase/klass ja teema');return;}
    if(step===1 && !title.trim()){alert('Sisesta pealkiri');return;}
    if(step===2){
      const contentError = validateExerciseContent(type, data);
      if(contentError){alert(contentError);return;}
    }
    setStep(s=>Math.min(steps.length-1,s+1));
  };

  const save = async() => {
    if(!title.trim()){alert('Sisesta pealkiri');return;}
    if(!subject){alert('Vali õppeaine');return;}
    if(!level){alert('Vali '+getLevelLabel(subject).toLowerCase());return;}
    if(!topic.trim()){alert('Vali või sisesta teema');return;}
    const contentError = validateExerciseContent(type, data);
    if(contentError){alert(contentError);return;}
    setSaving(true);
    await onSave({
      ...cleanExerciseData(data),
      type, title: title.trim(), level, subject, topic: topic.trim(),
      tags: tags.split(',').map(t=>t.trim()).filter(Boolean),
      updatedAt: new Date().toISOString()
    });
    setSaving(false);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.6)',display:'flex',alignItems:'center',
      justifyContent:'center',padding:16,zIndex:200,backdropFilter:'blur(4px)'}}>
      <div className="card scroll" style={{padding:0,maxWidth:620,width:'100%',maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{padding:'20px 24px 16px',borderBottom:'1px solid rgba(28,43,58,.08)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:'1.15rem'}}>{isEdit?'✏️ Muuda harjutust':'➕ Uus harjutus'}</h2>
          <button onClick={onClose} style={{background:'rgba(28,43,58,.07)',border:'none',cursor:'pointer',borderRadius:9,width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',color:'#42536A'}}>✕</button>
        </div>
        <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'flex',gap:16,flexWrap:'wrap',padding:'4px 0 10px',borderBottom:'1px solid rgba(28,43,58,.07)'}}>
            {steps.map((label,i)=><StepBadge key={label} label={label} number={i+1} active={step===i} done={step>i}/>)}
          </div>

          {step===0&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em'}}>Kuhu harjutus kuulub</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,minmax(0,1fr))',gap:10}}>
                <select value={subject} onChange={e=>setSubject(e.target.value)}>
                  {SUBJECTS.map(s=><option key={s}>{s}</option>)}
                </select>
                <select value={level} onChange={e=>setLevel(e.target.value)}>
                  {subjectConfig.levels.map(l=><option key={l}>{l}</option>)}
                </select>
                <input value={topic} onChange={e=>setTopic(e.target.value)} list="exercise-topic-options" placeholder="Teema *"/>
                <datalist id="exercise-topic-options">
                  {topicOptions.map(t=><option key={t} value={t}/>)}
                </datalist>
              </div>
              <div style={{fontSize:'.82rem',color:'#42536A',padding:'10px 12px',borderRadius:9,background:'#F9F8F6'}}>
                Valitud: <strong>{subject}</strong> · <strong>{level}</strong> · <strong>{topic||'teema puudub'}</strong>
              </div>
            </div>
          )}

          {step===1&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Harjutuse pealkiri *"/>
              <div>
                <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Harjutuse tüüp</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:8}}>
                  {Object.entries(EX_TYPES).map(([k,v])=>(
                    <button key={k} onClick={()=>setType(k)}
                      style={{padding:'12px 14px',borderRadius:10,border:'1.5px solid '+(type===k?v.color:'rgba(28,43,58,.12)'),
                        background:type===k?v.color+'15':'#fff',cursor:'pointer',fontWeight:type===k?800:600,
                        fontSize:'.84rem',color:type===k?v.color:'#42536A',display:'flex',alignItems:'center',gap:8}}>
                      <i className={'fa-solid '+v.icon}/> {v.label}
                    </button>
                  ))}
                </div>
              </div>
              <input value={tags} onChange={e=>setTags(e.target.value)} placeholder="Sildid: verbid, olevik, A2 (komaga eraldatud)"/>
            </div>
          )}

          {step===2&&(
            <div style={{borderTop:'1px solid rgba(28,43,58,.07)',paddingTop:14}}>
              <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Harjutuse sisu</div>
              {type==='fill'  &&<FillEditor   value={data} onChange={setData}/>}
              {type==='choice'&&<ChoiceEditor value={data} onChange={setData}/>}
              {type==='reading'&&<ReadingEditor value={data} onChange={setData}/>}
              {type==='match'&&<MatchEditor value={data} onChange={setData}/>}
              {type==='translate'&&<TranslateEditor value={data} onChange={setData}/>}
              {type==='order' &&<OrderEditor  value={data} onChange={setData}/>}
              {type==='writing'&&<WritingEditor value={data} onChange={setData}/>}
            </div>
          )}

          <div style={{display:'flex',gap:10,justifyContent:'space-between',alignItems:'center',borderTop:'1px solid rgba(28,43,58,.07)',paddingTop:14}}>
            <button onClick={()=>step===0?onClose():setStep(s=>s-1)} className="btn btn-ghost">
              {step===0?'Tühista':'Tagasi'}
            </button>
            {step<steps.length-1
              ? <button onClick={nextStep} className="btn btn-pine">Järgmine</button>
              : <button onClick={save} disabled={saving} className="btn btn-pine" style={{padding:'10px 18px'}}>
                  {saving?'Salvestab…':'✓ '+(isEdit?'Salvesta muudatused':'Lisa harjutus raamatukogusse')}
                </button>}
          </div>
        </div>
      </div>
    </div>
  );
}

function LibraryTree({exercises, selection, onSelect}) {
  const count = (subject='', level='', topic='') => exercises.filter(ex=>{
    if(subject && (ex.subject||'Eesti keel')!==subject) return false;
    if(level && (ex.level||'')!==level) return false;
    if(topic && getExerciseTopic(ex)!==topic) return false;
    return true;
  }).length;

  const topicsFor = (subject, level) => {
    const saved = exercises
      .filter(ex=>(ex.subject||'Eesti keel')===subject && (ex.level||'')===level)
      .map(getExerciseTopic)
      .filter(Boolean);
    return [...new Set([...(getSubjectConfig(subject).topics||[]), ...saved])];
  };

  const treeButton = (active, onClick, label, amount, depth=0) => (
    <button
      onClick={onClick}
      style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,
        border:'1px solid '+(active?'rgba(47,93,80,.35)':'rgba(28,43,58,.08)'),
        background:active?'rgba(47,93,80,.1)':'#fff',color:active?'#2F5D50':'#1C2B3A',
        borderRadius:8,padding:`8px 10px 8px ${10+depth*14}px`,cursor:'pointer',fontWeight:active?800:600,fontSize:'.84rem',textAlign:'left'}}>
      <span style={{minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{label}</span>
      <span style={{fontSize:'.72rem',color:active?'#2F5D50':'#718096',fontWeight:800}}>{amount}</span>
    </button>
  );

  return(
    <aside style={{background:'#fff',border:'1px solid rgba(28,43,58,.08)',borderRadius:14,padding:14,alignSelf:'start',position:'sticky',top:74}}>
      <div style={{fontSize:'.78rem',fontWeight:800,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>
        Kataloog
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {treeButton(!selection.subject,()=>onSelect({subject:'',level:'',topic:''}),'Kõik ained',count())}
        {SUBJECTS.map(subject=>{
          const subjectActive = selection.subject===subject;
          const cfg = getSubjectConfig(subject);
          return(
            <div key={subject} style={{display:'flex',flexDirection:'column',gap:6}}>
              {treeButton(subjectActive && !selection.level,()=>onSelect({subject,level:'',topic:''}),`${cfg.short} · ${subject}`,count(subject))}
              {subjectActive&&cfg.levels.map(level=>{
                const levelActive = selection.level===level;
                return(
                  <div key={level} style={{display:'flex',flexDirection:'column',gap:5}}>
                    {treeButton(levelActive && !selection.topic,()=>onSelect({subject,level,topic:''}),level,count(subject,level),1)}
                    {levelActive&&topicsFor(subject,level).map(topic=>
                      <React.Fragment key={topic}>
                        {treeButton(selection.topic===topic,()=>onSelect({subject,level,topic}),topic,count(subject,level,topic),2)}
                      </React.Fragment>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </aside>
  );
}

// ── ПРОСТОЙ ЛОГИН ─────────────────────────────────────────────
function LoginScreen({onLogin}) {
  const [email, setEmail] = useState('');
  const [pass, setPass]   = useState('');
  const [err, setErr]     = useState('');
  const [busy, setBusy]   = useState(false);

  const go = async() => {
    if(!email||!pass){setErr('Täida kõik väljad');return;}
    setBusy(true);setErr('');
    try{
      const res = await auth.signInWithEmailAndPassword(email,pass);
      const snap = await db.collection('users').doc(res.user.uid).get();
      if(snap.exists) onLogin({uid:res.user.uid,...snap.data()});
      else onLogin({uid:res.user.uid,email,role:'teacher'});
    }catch(e){
      setErr('Vale e-post või parool');
    }
    setBusy(false);
  };

  const googleLogin = async() => {
    setBusy(true);setErr('');
    try{
      const res = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      const snap = await db.collection('users').doc(res.user.uid).get();
      if(snap.exists) onLogin({uid:res.user.uid,displayName:res.user.displayName,...snap.data()});
      else onLogin({uid:res.user.uid,displayName:res.user.displayName,email:res.user.email,role:'teacher'});
    }catch(e){setErr('Google sisselogimine ebaõnnestus');}
    setBusy(false);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16,
      background:'linear-gradient(135deg,#1C2B3A 0%,#2F5D50 100%)'}}>
      <div style={{background:'#FBFAF8',borderRadius:24,padding:'36px',width:'100%',maxWidth:380,boxShadow:'0 32px 80px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.9rem',fontWeight:600}}>
            Keele<span style={{color:'#C9882A'}}>Sepp</span>
          </div>
          <div style={{fontSize:'.82rem',color:'#42536A',marginTop:4}}>Harjutuste raamatukogu</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-post"
            onKeyDown={e=>e.key==='Enter'&&go()}/>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Parool"
            onKeyDown={e=>e.key==='Enter'&&go()}/>
        </div>
        {err&&<div style={{background:'#fee2e2',color:'#991b1b',borderRadius:9,padding:'9px 12px',fontSize:'.84rem',marginBottom:12}}>{err}</div>}
        <button onClick={go} disabled={busy} className="btn btn-dark" style={{width:'100%',marginBottom:10,borderRadius:12,padding:12}}>
          {busy?'Laeb…':'Sisene'}
        </button>
        <button onClick={googleLogin} disabled={busy} style={{width:'100%',padding:'11px',borderRadius:12,border:'1.5px solid rgba(28,43,58,.15)',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontWeight:600,fontSize:'.88rem'}}>
          <svg width="17" height="17" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
            <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
            <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
            <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
          </svg>
          Sisene Google'iga
        </button>
        <div style={{textAlign:'center',marginTop:14}}>

// ── ГЛАВНОЕ ПРИЛОЖЕНИЕ ────────────────────────────────────────
function App() {
  const [user, setUser]         = useState(null);
  const [loading, setLoading]   = useState(true);
  const [exercises, setExercises] = useState([]);
  const [students, setStudents]   = useState([]);
  const [notif, setNotif]         = useState('');
  const [modal, setModal]         = useState(null); // null | {type:'create'|'edit'|'assign', data}
  const [search, setSearch]       = useState('');
  const [typeFilter, setTypeFilter] = useState('all');
  const [treeSelection, setTreeSelection] = useState({subject:'', level:'', topic:''});
  const focusedExId = useMemo(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get('ex') || params.get('exercise') || params.get('exerciseId') || null;
  }, []);

  const notify = msg => { setNotif(msg); setTimeout(()=>setNotif(''),3000); };

  const isTeacher = user?.role==='teacher'||user?.role==='admin'||user?.email==='zakutailo.pavel@gmail.com';

  // AUTH
  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(async fbUser => {
      if(fbUser){
        const snap = await db.collection('users').doc(fbUser.uid).get();
        if(snap.exists) setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,...snap.data()});
        else setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,email:fbUser.email,role:'student'});
      } else { setUser(null); }
      setLoading(false);
    });
    return unsub;
  },[]);

  // DATA
  useEffect(()=>{
    if(!user) return;
    const u1 = db.collection('exercises').orderBy('createdAt','desc').onSnapshot(s=>
      setExercises(s.docs.map(d=>({id:d.id,...d.data()}))),
      err=>{console.warn('exercises listener failed:',err); setExercises([]);}
    );
    const u2 = db.collection('students').onSnapshot(s=>
      setStudents(s.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.active!==false)),
      err=>{console.warn('students listener failed:',err); setStudents([]);}
    );
    return ()=>{u1();u2();};
  },[user]);

  const topicsBySubjectLevel = useMemo(()=>{
    const map = {};
    exercises.forEach(ex=>{
      const subject = ex.subject || 'Eesti keel';
      const level = ex.level || '';
      const topic = getExerciseTopic(ex);
      if(!map[subject]) map[subject] = {};
      if(!map[subject][level]) map[subject][level] = [];
      if(topic && !map[subject][level].includes(topic)) map[subject][level].push(topic);
    });
    return map;
  },[exercises]);

  const filtered = useMemo(()=>{
    const q = search.toLowerCase();
    if(focusedExId) return exercises.filter(e=>e.id===focusedExId);
    return exercises.filter(e=>{
      if(typeFilter!=='all'&&e.type!==typeFilter) return false;
      if(treeSelection.subject && (e.subject||'Eesti keel')!==treeSelection.subject) return false;
      if(treeSelection.level && (e.level||'')!==treeSelection.level) return false;
      if(treeSelection.topic && getExerciseTopic(e)!==treeSelection.topic) return false;
      if(!q) return true;
      return (e.title||'').toLowerCase().includes(q)
        || (e.tags||[]).some(t=>t.toLowerCase().includes(q))
        || (e.subject||'').toLowerCase().includes(q)
        || (e.topic||'').toLowerCase().includes(q);
    });
  },[exercises,typeFilter,treeSelection,search,focusedExId]);

  const focusedExercise = focusedExId ? exercises.find(e=>e.id===focusedExId) : null;

  const saveExercise = useCallback(async(data) => {
    if(data.id){
      await db.collection('exercises').doc(data.id).update({...data, updatedAt:new Date().toISOString()});
      notify('✓ Harjutus uuendatud');
    } else {
      await db.collection('exercises').add({
        ...data,
        authorUid: user.uid,
        authorName: user.displayName||user.email||'',
        createdAt: today(),
        assignCount: 0
      });
      notify('✓ Harjutus lisatud raamatukogusse!');
    }
    setModal(null);
  },[user]);

  const deleteExercise = useCallback(async(ex) => {
    if(!window.confirm('Kustuta harjutus "'+ex.title+'"?')) return;
    await db.collection('exercises').doc(ex.id).delete();
    notify('✓ Harjutus kustutatud');
  },[]);

  const assignExercise = useCallback(async({exerciseId,exerciseTitle,exerciseType,studentId,due,note}) => {
    const stu = students.find(s=>s.id===studentId);
    await db.collection('homework').add({
      studentId, studentName:stu?.name||'',
      task: exerciseTitle,
      exerciseId, exerciseType,
      due: due||'',
      note: note||'',
      status: 'Ootel',
      date: today(),
      fileUrl:'', fileName:'', attachments:[],
      isExercise: true
    });
    await db.collection('exercises').doc(exerciseId).update({
      assignCount: firebase.firestore.FieldValue.increment(1)
    });
    notify('✓ Harjutus määratud: '+stu?.name);
  },[students]);

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}><div className="spinner"/></div>;
  if(!user)   return <LoginScreen onLogin={setUser}/>;

  return(
    <div style={{minHeight:'100vh',background:'#F4F2EE'}}>
      {/* Шапка */}
      <header style={{background:'#1C2B3A',padding:'0 28px',height:58,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:20}}>
          <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.4rem',fontWeight:600,color:'#fff'}}>
            Keele<span style={{color:'#C9882A'}}>Sepp</span>
          </div>
          <span style={{color:'rgba(255,255,255,.35)',fontSize:'.8rem'}}>Harjutuste raamatukogu</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{color:'rgba(255,255,255,.5)',fontSize:'.82rem'}}>{user.displayName||user.email}</span>
          <a href="/haldus/" style={{color:'rgba(255,255,255,.6)',fontSize:'.8rem',textDecoration:'none',padding:'6px 12px',border:'1px solid rgba(255,255,255,.15)',borderRadius:8}}>
            ← Haldus
          </a>
          <button onClick={()=>auth.signOut().then(()=>setUser(null))}
            style={{background:'none',border:'1px solid rgba(255,255,255,.15)',color:'rgba(255,255,255,.6)',cursor:'pointer',borderRadius:8,padding:'6px 12px',fontSize:'.8rem'}}>
            Logi välja
          </button>
        </div>
      </header>

      <div style={{maxWidth:1100,margin:'0 auto',padding:'28px'}}>
        {notif&&<div style={{position:'fixed',top:20,right:20,background:'#1C2B3A',color:'#fff',padding:'11px 18px',borderRadius:12,zIndex:300,fontWeight:600,fontSize:'.88rem',boxShadow:'0 8px 28px rgba(0,0,0,.25)'}}>{notif}</div>}

        {/* Заголовок + создать */}
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:14,flexWrap:'wrap',marginBottom:24}}>
          <div>
            <h1 style={{fontSize:'1.7rem'}}>{focusedExId?'📝 Määratud harjutus':'📚 Harjutuste raamatukogu'}</h1>
            <div style={{color:'#42536A',fontSize:'.88rem',marginTop:4}}>
              {focusedExId
                ? (focusedExercise ? focusedExercise.title : 'Laen harjutust...')
                : exercises.length+' harjutust · '+(isTeacher?'Loo, muuda ja määra õpilastele':'Proovi harjutusi')}
            </div>
          </div>
          {focusedExId&&(
            <a href="/haldus-exercises" className="btn btn-ghost" style={{flexShrink:0,textDecoration:'none'}}>
              <i className="fa-solid fa-arrow-left"/> Kõik harjutused
            </a>
          )}
          {!focusedExId&&isTeacher&&(
            <button onClick={()=>setModal({type:'create'})} className="btn btn-pine" style={{flexShrink:0}}>
              <i className="fa-solid fa-plus"/> Uus harjutus
            </button>
          )}
        </div>

        {/* Статистика */}
        {!focusedExId&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:24}}>
          {Object.entries(EX_TYPES).map(([k,v])=>(
            <div key={k} className="card" style={{padding:'16px 18px'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <div style={{width:30,height:30,borderRadius:9,background:v.color+'18',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <i className={'fa-solid '+v.icon} style={{color:v.color,fontSize:'.8rem'}}/>
                </div>
                <span style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.06em'}}>{v.label}</span>
              </div>
              <div style={{fontSize:'1.6rem',fontWeight:700,color:'#1C2B3A'}}>{exercises.filter(e=>e.type===k).length}</div>
            </div>
          ))}
          <div className="card" style={{padding:'16px 18px'}}>
            <div style={{fontSize:'.74rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Kokku määratud</div>
            <div style={{fontSize:'1.6rem',fontWeight:700,color:'#2F5D50'}}>{exercises.reduce((a,e)=>a+(e.assignCount||0),0)}</div>
          </div>
        </div>}

        <div className={focusedExId?'':'library-shell'}>
          {!focusedExId&&<LibraryTree exercises={exercises} selection={treeSelection} onSelect={setTreeSelection}/>}

          <main style={{minWidth:0}}>
            {!focusedExId&&<div style={{background:'#fff',border:'1px solid rgba(28,43,58,.08)',borderRadius:14,padding:14,marginBottom:16}}>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center',justifyContent:'space-between'}}>
                <input value={search} onChange={e=>setSearch(e.target.value)}
                  placeholder="🔍 Otsi harjutust, silti..."
                  style={{width:260,padding:'9px 14px'}}/>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <button onClick={()=>setTypeFilter('all')} className={'btn btn-sm '+(typeFilter==='all'?'btn-dark':'btn-ghost')}>Kõik</button>
                  {Object.entries(EX_TYPES).map(([k,v])=>(
                    <button key={k} onClick={()=>setTypeFilter(k)} className={'btn btn-sm '+(typeFilter===k?'btn-dark':'btn-ghost')}>
                      <i className={'fa-solid '+v.icon}/> {v.label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{marginTop:10,fontSize:'.82rem',color:'#42536A'}}>
                {treeSelection.subject
                  ? [treeSelection.subject,treeSelection.level,treeSelection.topic].filter(Boolean).join(' / ')
                  : 'Kõik ained'} · {filtered.length} harjutust
              </div>
            </div>}

            <div style={{display:'grid',gridTemplateColumns:focusedExId?'minmax(0,760px)':'repeat(auto-fill,minmax(430px,1fr))',gap:16,justifyContent:focusedExId?'center':'stretch'}}>
              {filtered.map(ex=>(
                <ExerciseCard
                  key={ex.id} ex={ex}
                  isTeacher={isTeacher}
                  students={students}
                  user={user}
                  defaultOpen={focusedExId===ex.id}
                  onEdit={isTeacher?e=>setModal({type:'edit',data:e}):null}
                  onDelete={isTeacher?deleteExercise:null}
                  onAssign={isTeacher?e=>setModal({type:'assign',data:e}):null}
                />
              ))}
              {filtered.length===0&&(
                <div style={{gridColumn:'1/-1',textAlign:'center',padding:'48px 0',color:'#42536A'}}>
                  {focusedExId?'Määratud harjutust ei leitud.':
                    search||typeFilter!=='all'||treeSelection.subject?'Harjutusi ei leitud.':
                    isTeacher?'Harjutusi pole veel lisatud. Vajuta "Uus harjutus"!':'Harjutusi pole veel saadaval.'}
                </div>
              )}
            </div>
          </main>
        </div>
      </div>

      {/* Модалки */}
      {modal?.type==='create'&&(
        <ExerciseModal exercise={null} topicsBySubjectLevel={topicsBySubjectLevel}
          onClose={()=>setModal(null)} onSave={saveExercise}/>
      )}
      {modal?.type==='edit'&&(
        <ExerciseModal exercise={modal.data} topicsBySubjectLevel={topicsBySubjectLevel}
          onClose={()=>setModal(null)} onSave={saveExercise}/>
      )}
      {modal?.type==='assign'&&(
        <AssignModal exercise={modal.data} students={students}
          onClose={()=>setModal(null)} onAssign={assignExercise}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
