// ── UTILS ─────────────────────────────────────────────────────
function FileChip({file}){
  const ext=(file.name||'').split('.').pop().toLowerCase();
  return(
    <a href={file.url} target="_blank" rel="noreferrer" className="file-chip">
      <span className="fi-ext" style={{background:EXT_COLORS[ext]||'#42536A'}}>{ext.slice(0,3).toUpperCase()}</span>
      <span style={{maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{file.name}</span>
      <i className="fa-solid fa-arrow-up-right-from-square" style={{fontSize:'.6rem',opacity:.45,marginLeft:2}}/>
    </a>
  );
}

function FileUploader({onUpload,uploading,setUploading}){
  const ref=useRef();
  const[progress,setProgress]=useState(0);
  const handle=async files=>{
    if(!files||!files.length)return;
    setUploading(true);
    const results=[];
    for(const file of files){
      const r=storage.ref(`curriculum/${Date.now()}_${file.name}`);
      const task=r.put(file);
      await new Promise((res,rej)=>task.on('state_changed',
        s=>setProgress(Math.round(s.bytesTransferred/s.totalBytes*100)),rej,
        async()=>{const url=await r.getDownloadURL();results.push({name:file.name,url,size:file.size,type:file.type});res();}
      ));
    }
    setUploading(false);setProgress(0);onUpload(results);
  };
  return(

            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>

  );

// ── EXERCISE PLAYERS ──────────────────────────────────────────
function parseFillText(raw){const blanks=[];let idx=0;const parts=raw.split(/\[([^\]]+)\]/g);let result=[];for(let i=0;i<parts.length;i++){if(i%2===0){result.push({type:'text',value:parts[i]});}else{result.push({type:'blank',answer:parts[i],index:idx++});blanks.push({answer:parts[i],index:idx-1});}}return{parts:result,blanks};}

function FillPlayer({exercise,onDone}){const parsed=useMemo(()=>parseFillText(exercise.text||''),[exercise.text]);const[answers,setAnswers]=useState({});const[checked,setChecked]=useState(false);const[score,setScore]=useState(null);const check=()=>{let c=0;parsed.blanks.forEach(b=>{if(normalizeText(answers[b.index]||'')===normalizeText(b.answer))c++;});setScore({correct:c,total:parsed.blanks.length});setChecked(true);onDone&&onDone({correct:c,total:parsed.blanks.length});};const reset=()=>{setAnswers({});setChecked(false);setScore(null);};return(<div style={{display:'flex',flexDirection:'column',gap:16}}><div style={{fontSize:'1rem',lineHeight:2}}>{parsed.parts.map((p,i)=>{if(p.type==='text')return<span key={i}>{p.value}</span>;const val=answers[p.index]||'';const isC=checked&&normalizeText(val)===normalizeText(p.answer);const isW=checked&&!isC;return(<span key={i} style={{display:'inline-flex',alignItems:'center',gap:4}}><input className={'blank-input'+(isC?' correct':isW?' wrong':'')} value={val} disabled={checked} onChange={e=>setAnswers(p2=>({...p2,[p.index]:e.target.value}))} style={{width:Math.max(80,(p.answer.length+2)*12)+'px'}}/>{isW&&checked&&<span style={{fontSize:'.72rem',color:'#166534',fontWeight:700}}>({p.answer})</span>}</span>);})}</div>{score&&<div className={score.correct===score.total?'result-ok':'result-fail'}>{score.correct===score.total?'✓ Suurepärane! Kõik '+score.total+' vastust õiged!':score.correct+'/'+score.total+' vastust õiged.'}</div>}{!checked?<button onClick={check} className="btn btn-pine">Kontrolli</button>:<button onClick={reset} className="btn btn-ghost">Proovi uuesti</button>}</div>);}

function ChoicePlayer({exercise,onDone}){const qs=exercise.questions||[];const[cur,setCur]=useState(0);const[sel,setSel]=useState({});const[chk,setChk]=useState({});const[done,setDone]=useState(false);const q=qs[cur];const pick=(qi,ci)=>{if(chk[qi])return;setSel(p=>({...p,[qi]:ci}));};const checkC=()=>setChk(p=>({...p,[cur]:true}));const next=()=>{if(cur<qs.length-1){setCur(c=>c+1);}else{const c=qs.filter((q,i)=>sel[i]===q.correct).length;setDone(true);onDone&&onDone({correct:c,total:qs.length});}};const reset=()=>{setCur(0);setSel({});setChk({});setDone(false);};if(done){const c=qs.filter((q,i)=>sel[i]===q.correct).length;return(<div style={{display:'flex',flexDirection:'column',gap:10}}><div className={c===qs.length?'result-ok':'result-fail'}>{c===qs.length?'✓ '+c+'/'+qs.length:c+'/'+qs.length+' vastust õiged'}</div><button onClick={reset} className="btn btn-ghost">Alusta uuesti</button></div>);}if(!q)return null;const isChk=chk[cur];const s=sel[cur];return(<div style={{display:'flex',flexDirection:'column',gap:10}}><div style={{fontWeight:700,fontSize:'.96rem',marginBottom:6}}>{q.question}</div>{(q.options||[]).map((opt,ci)=>{let cls='choice-btn';if(isChk){if(ci===q.correct)cls+=' correct';else if(ci===s)cls+=' wrong';}else if(ci===s)cls+=' selected';return<button key={ci} className={cls} onClick={()=>pick(cur,ci)}>{opt}</button>;})} {!isChk?<button onClick={checkC} className="btn btn-pine" disabled={s===undefined}>Kontrolli</button>:<button onClick={next} className="btn btn-pine">{cur<qs.length-1?'Järgmine →':'Lõpeta'}</button>}</div>);}

function ExerciseCard({ex,isTeacher,onDelete,students,user}){
  const[open,setOpen]=useState(false);const[result,setResult]=useState(null);
  const type=EX_TYPES[ex.type]||EX_TYPES.fill;
  return(<div className="ex-card" style={{display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap',marginBottom:6}}>
          <span className={'badge '+type.badge}><i className={'fa-solid '+type.icon} style={{fontSize:'.68rem'}}/> {type.label}</span>
          {ex.level&&<span className="badge" style={{background:'rgba(201,136,42,.1)',color:'#A96E1A'}}>{ex.level}</span>}
          {ex.subject&&<span className="badge" style={{background:'rgba(28,43,58,.06)',color:'#42536A'}}>{ex.subject}</span>}
          {ex.topic&&<span className="badge" style={{background:'rgba(47,93,80,.09)',color:'#2F5D50'}}>{ex.topic}</span>}
        </div>
        <h3 style={{fontSize:'.95rem',marginBottom:3}}>{ex.title||'Pealkirjata harjutus'}</h3>
        <div style={{fontSize:'.76rem',color:'#718096'}}>Autor: {ex.authorName||'—'} · {fmtDate(ex.createdAt)}</div>
      </div>
      <div style={{display:'flex',gap:5,flexShrink:0}}>
        <button onClick={()=>setOpen(o=>!o)} className="btn btn-ghost btn-sm">{open?'Peida':'Proovi'}</button>
        {isTeacher&&onDelete&&<button onClick={()=>onDelete(ex)} className="btn btn-ghost btn-sm" style={{color:'#dc2626'}}><i className="fa-solid fa-trash"/></button>}
      </div>
    </div>
    {open&&<div style={{borderTop:'1px solid rgba(28,43,58,.07)',paddingTop:13}}>
      {ex.type==='fill'&&<FillPlayer exercise={ex} onDone={setResult}/>}
      {ex.type==='choice'&&<ChoicePlayer exercise={ex} onDone={setResult}/>}
      {!['fill','choice'].includes(ex.type)&&<div style={{color:'#718096',fontSize:'.86rem',padding:'10px 0'}}>Ava täisvaates harjutuse sooritamiseks.</div>}
    </div>}
  </div>);}

// ── EXERCISES TAB ─────────────────────────────────────────────
function ExercisesView({isTeacher,user,notify}){
  const[exercises,setExercises]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[typeFilter,setTypeFilter]=useState('all');
  const[subjectFilter,setSubjectFilter]=useState('all');

  useEffect(()=>{
    const u=db.collection('exercises').orderBy('createdAt','desc').onSnapshot(
      s=>{setExercises(s.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);},
      ()=>setLoading(false)
    );
    return u;
  },[user]);

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return exercises.filter(e=>{
      if(typeFilter!=='all'&&e.type!==typeFilter)return false;
      if(subjectFilter!=='all'&&(e.subject||'Eesti keel')!==subjectFilter)return false;
      if(!q)return true;
      return(e.title||'').toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q));
    });
  },[exercises,typeFilter,subjectFilter,search]);

  if(loading)return<div style={{display:'flex',justifyContent:'center',padding:60}}><div className="spinner"/></div>;

  return(
    <div style={{maxWidth:1100,margin:'0 auto',padding:'22px 28px 60px'}}>
      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:22}}>
        {Object.entries(EX_TYPES).map(([k,v])=>(
          <div key={k} style={{background:'#fff',border:'1px solid rgba(28,43,58,.08)',borderRadius:12,padding:'13px 16px',cursor:'pointer',borderBottomWidth:3,borderBottomColor:typeFilter===k?v.color:'transparent',transition:'all .15s'}}
               onClick={()=>setTypeFilter(typeFilter===k?'all':k)}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
              <div style={{width:26,height:26,borderRadius:7,background:v.color+'18',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <i className={'fa-solid '+v.icon} style={{color:v.color,fontSize:'.72rem'}}/>
              </div>
              <span style={{fontSize:'.68rem',fontWeight:700,color:'#718096',textTransform:'uppercase',letterSpacing:'.05em'}}>{v.label}</span>
            </div>
            <div style={{fontSize:'1.45rem',fontWeight:700,color:'#1C2B3A'}}>{exercises.filter(e=>e.type===k).length}</div>
          </div>
        ))}
        <div style={{background:'#fff',border:'1px solid rgba(28,43,58,.08)',borderRadius:12,padding:'13px 16px'}}>
          <div style={{fontSize:'.68rem',fontWeight:700,color:'#718096',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:5}}>Kokku määratud</div>
          <div style={{fontSize:'1.45rem',fontWeight:700,color:'#2F5D50'}}>{exercises.reduce((a,e)=>a+(e.assignCount||0),0)}</div>
        </div>
      </div>

      {/* Filters */}
      <div style={{background:'#fff',border:'1px solid rgba(28,43,58,.08)',borderRadius:14,padding:'13px 16px',marginBottom:16}}>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center',justifyContent:'space-between'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Otsi harjutust..." style={{width:230,padding:'8px 13px'}}/>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
            {SUBJECTS.map(s=>(
              <button key={s.key} onClick={()=>setSubjectFilter(subjectFilter===s.key?'all':s.key)}
                className={'btn btn-sm '+(subjectFilter===s.key?'btn-dark':'btn-ghost')}
                title={s.key}>{s.emoji}</button>
            ))}
            <div style={{width:1,height:22,background:'rgba(28,43,58,.12)',margin:'0 3px'}}/>
            {Object.entries(EX_TYPES).map(([k,v])=>(
              <button key={k} onClick={()=>setTypeFilter(typeFilter===k?'all':k)}
                className={'btn btn-sm '+(typeFilter===k?'btn-dark':'btn-ghost')}>
                <i className={'fa-solid '+v.icon}/> {v.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginTop:9,fontSize:'.78rem',color:'#718096'}}>{filtered.length} harjutust</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(420px,1fr))',gap:13}}>
        {filtered.map(ex=>(
          <ExerciseCard key={ex.id} ex={ex} isTeacher={isTeacher} user={user}
            onDelete={isTeacher?async e=>{if(!window.confirm('Kustuta?'))return;await db.collection('exercises').doc(e.id).delete();notify('✓ Kustutatud');}:null}
          />
        ))}
        {filtered.length===0&&<div className="empty" style={{gridColumn:'1/-1'}}>
          <i className="fa-solid fa-magnifying-glass"/><p>Harjutusi ei leitud.</p>
        </div>}
      </div>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const[email,setEmail]=useState('');const[pass,setPass]=useState('');const[err,setErr]=useState('');const[busy,setBusy]=useState(false);
  const go=async()=>{if(!email||!pass){setErr('Täida kõik väljad');return;}setBusy(true);setErr('');try{const r=await auth.signInWithEmailAndPassword(email,pass);const s=await db.collection('users').doc(r.user.uid).get();if(s.exists)onLogin({uid:r.user.uid,...s.data()});else onLogin({uid:r.user.uid,email,role:'teacher'});}catch(e){setErr('Vale e-post või parool');}setBusy(false);};
  const gLogin=async()=>{setBusy(true);setErr('');try{const r=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());const s=await db.collection('users').doc(r.user.uid).get();if(s.exists)onLogin({uid:r.user.uid,displayName:r.user.displayName,...s.data()});else onLogin({uid:r.user.uid,displayName:r.user.displayName,email:r.user.email,role:'teacher'});}catch(e){setErr('Google sisselogimine ebaõnnestus');}setBusy(false);};
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'linear-gradient(135deg,#1C2B3A 0%,#2F5D50 100%)'}}>
      <div style={{background:'#FBFAF8',borderRadius:24,padding:36,width:'100%',maxWidth:380,boxShadow:'0 32px 80px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:28}}><div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.9rem',fontWeight:700}}>Keele<span style={{color:'#C9882A'}}>Sepp</span></div><div style={{fontSize:'.8rem',color:'#718096',marginTop:4}}>Õppekava & Harjutused</div></div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-post" onKeyDown={e=>e.key==='Enter'&&go()}/><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Parool" onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        {err&&<div style={{background:'#fee2e2',color:'#991b1b',borderRadius:9,padding:'9px 12px',fontSize:'.82rem',marginBottom:12}}>{err}</div>}
        <button onClick={go} disabled={busy} className="btn btn-dark" style={{width:'100%',marginBottom:10,borderRadius:12,padding:12,justifyContent:'center'}}>{busy?'Laeb…':'Sisene'}</button>
        <button onClick={gLogin} disabled={busy} style={{width:'100%',padding:11,borderRadius:12,border:'1.5px solid rgba(28,43,58,.15)',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontWeight:600,fontSize:'.86rem'}}>
          <svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
          Sisene Google'iga
        </button>
        <div style={{textAlign:'center',marginTop:14}}><a href="/haldus/" style={{fontSize:'.78rem',color:'#718096',textDecoration:'none'}}>← Tagasi haldussüsteemi</a></div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState('curriculum');
  const[notif,setNotif]=useState('');
  const[exCount,setExCount]=useState(0);

  const notify=msg=>{setNotif(msg);setTimeout(()=>setNotif(''),3000);};
  const isTeacher=user?.role==='teacher'||user?.role==='admin'||user?.email==='zakutailo.pavel@gmail.com';

  useEffect(()=>{
    const u=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){const s=await db.collection('users').doc(fbUser.uid).get();if(s.exists)setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,...s.data()});else setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,email:fbUser.email,role:'student'});}
      else setUser(null);
      setLoading(false);
    });
    return u;
  },[]);

  useEffect(()=>{
    const u=db.collection('exercises').onSnapshot(s=>setExCount(s.docs.length),()=>{});
    return u;
  },[]);

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}><div className="spinner"/></div>;
  if(!user)return<LoginScreen onLogin={setUser}/>;

  return(
    <div style={{minHeight:'100vh',background:'#F0EEE9'}}>
      {notif&&<div className="notif">{notif}</div>}

      <header className="top-header">
        <div className="logo">Keele<span>Sepp</span></div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{color:'rgba(255,255,255,.45)',fontSize:'.8rem'}}>{user.displayName||user.email}</span>
          <a href="/haldus/" style={{color:'rgba(255,255,255,.55)',fontSize:'.78rem',textDecoration:'none',padding:'6px 12px',border:'1px solid rgba(255,255,255,.14)',borderRadius:8}}>← Haldus</a>
          <button onClick={()=>auth.signOut().then(()=>setUser(null))} style={{background:'none',border:'1px solid rgba(255,255,255,.14)',color:'rgba(255,255,255,.55)',cursor:'pointer',borderRadius:8,padding:'6px 12px',fontSize:'.78rem'}}>Logi välja</button>
        </div>
      </header>

      <div className="top-tabs">
        <button className={'top-tab'+(tab==='curriculum'?' active':'')} onClick={()=>setTab('curriculum')}>
          <i className="fa-solid fa-layer-group"/> Õppekava
        </button>
        <button className={'top-tab'+(tab==='exercises'?' active':'')} onClick={()=>setTab('exercises')}>
          <i className="fa-solid fa-dumbbell"/> Harjutused
          <span className="tab-count">{exCount}</span>
        </button>
      </div>

      {tab==='curriculum'&&<CurriculumView isTeacher={isTeacher} user={user} notify={notify}/>}
      {tab==='exercises'&&<ExercisesView isTeacher={isTeacher} user={user} notify={notify}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
