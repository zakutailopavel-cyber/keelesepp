      {key:'esitlus',name:'Uue materjali esitlus',color:'#1d4ed8',time:12,hint:'Esitage uus materjal kontekstis. Näited, pildid, laused.',fields:['Grammatika/sõnavara selgitus','Näitelaused','Visuaalne materjal']},
      {key:'harjutamine',name:'Kontrollitud harjutamine',color:'#6d28d9',time:12,hint:'Struktureeritud harjutused. Lüngad, valikvastused, paaristöö.',fields:['Harjutused','Paaristöö ülesanne','Vigade parandamine']},
      {key:'tootmine',name:'Vaba kasutamine',color:'#047857',time:12,hint:'Kommunikatiivne ülesanne. Rollimäng, diskussioon, kirjutamine.',fields:['Kommunikatiivne ülesanne','Rollimäng/diskussioon','Grupi/paaristöö']},
      {key:'kokkuvote',name:'Kokkuvõte',color:'#A96E1A',time:4,hint:'Kinnitage õpitut. Exit ticket.',fields:['Kokkuvõte','Exit ticket','Kodutöö']},
    ],
    kinnistamine:[
      {key:'org',name:'Organisatsiooniline osa',color:'#718096',time:2,hint:'Tervitus.',fields:['Mida kordame']},
      {key:'soojendus',name:'Kordamine',color:'#0e7490',time:8,hint:'Kiire kordamine.',fields:['Kordamisülesanne','Mäng sõnavaraga']},
      {key:'harjutamine',name:'Suunatud harjutamine',color:'#6d28d9',time:15,hint:'Struktureeritud harjutused.',fields:['Peamised vead','Harjutused','Paaristöö']},
      {key:'kommunik',name:'Kommunikatiivne harjutamine',color:'#047857',time:20,hint:'Autentsed situatsioonid.',fields:['Rollimäng','Rühmatöö','Loovülesanne']},
      {key:'kokkuvote',name:'Kokkuvõte',color:'#A96E1A',time:3,hint:'Mis läks hästi?',fields:['Enesehindamine','Kodutöö']},
    ],
    suuline:[
      {key:'org',name:'Organisatsiooniline osa',color:'#718096',time:2,hint:'Häälestamine rääkimisele.',fields:['Tunni fookus']},
      {key:'soojendus',name:'Kõnesoojendus',color:'#0e7490',time:5,hint:'Soojendusküsimused, fraasid.',fields:['Soojendusküsimused','Kasulikud fraasid']},
      {key:'kuulamine',name:'Kuulamine',color:'#1d4ed8',time:10,hint:'Autentne sisend: dialoog, video.',fields:['Kuulamistekst/video','Ennustamine','Kontroll']},
      {key:'harjutamine',name:'Juhendatud rääkimine',color:'#6d28d9',time:15,hint:'Struktureeritud dialoogid.',fields:['Mudeldialoogi harjutamine','Fraasimallid','Paaristöö']},
      {key:'vaba',name:'Vaba rääkimine',color:'#047857',time:20,hint:'Autentne suhtlus.',fields:['Rollimäng','Diskussiooni teema','Rühmatöö']},
      {key:'kokkuvote',name:'Tagasiside',color:'#A96E1A',time:5,hint:'Positiivne tagasiside.',fields:['Tagasiside','Uued fraasid']},
    ],
    kirjalik:[
      {key:'org',name:'Organisatsiooniline osa',color:'#718096',time:2,hint:'Kirjatüübi tutvustus.',fields:['Kirjatüüp ja eesmärk']},
      {key:'soojendus',name:'Ideekorje',color:'#0e7490',time:7,hint:'Brainstorming, mindmap.',fields:['Brainstorming','Sõnavara']},
      {key:'mudel',name:'Tekstimudeli analüüs',color:'#1d4ed8',time:10,hint:'Hea näidistekst.',fields:['Näidistekst','Struktuur','Kasulikud fraasid']},
      {key:'kirjutamine',name:'Kirjutamine',color:'#6d28d9',time:20,hint:'Iseseisvalt kirjutamine.',fields:['Ülesanne','Maht','Abivahendid']},
      {key:'tagasiside',name:'Eakaaslaste tagasiside',color:'#047857',time:10,hint:'Paarid vahetavad tekste.',fields:['Tagasiside küsimused','Parandamise fookus']},
      {key:'kokkuvote',name:'Kokkuvõte',color:'#A96E1A',time:3,hint:'Mida õppisime?',fields:['Levinumad vead','Järgmine samm']},
    ],
    kordamine:[
      {key:'org',name:'Organisatsiooniline osa',color:'#718096',time:2,hint:'Eksami formaat.',fields:['Kordamise teemad','Eksami formaat']},
      {key:'enesehindamine',name:'Enesehindamine',color:'#0e7490',time:8,hint:'Mis läheb hästi, mis ei lähe.',fields:['Enesehindamise küsimused','Lünkade kaart']},
      {key:'kordamine',name:'Kordamine',color:'#1d4ed8',time:25,hint:'Mängud, viktoriin, paaristöö.',fields:['Teema 1','Teema 2','Mäng/viktoriin','Levinumad vead']},
      {key:'eksami_harj',name:'Eksami ülesanded',color:'#6d28d9',time:15,hint:'Päris eksami formaadis.',fields:['Eksami näidisülesanded','Ajapiirang','Strateegiad']},
      {key:'kokkuvote',name:'Nõuanded',color:'#A96E1A',time:5,hint:'Eksamisoovitused.',fields:['Eksamipäeva nõuanded','Viimased soovitused']},
    ],
    projekt:[
      {key:'org',name:'Projekti tutvustus',color:'#718096',time:5,hint:'Eesmärk, tulemused, hindamine.',fields:['Projekti teema','Lõpptulemus','Hindamiskriteeriumid']},
      {key:'planeerimine',name:'Planeerimine',color:'#0e7490',time:10,hint:'Rühmad, rollid, ajakava.',fields:['Rühmade moodustamine','Rollid','Ajakava']},
      {key:'too',name:'Töö',color:'#1d4ed8',time:25,hint:'Iseseisvalt töötamine.',fields:['Töövahendid','Õpetaja tugi','Vahetulemused']},
      {key:'esitlus',name:'Esitlemine',color:'#047857',time:15,hint:'Rühm jagab tulemust.',fields:['Esitlemise formaat','Tagasiside struktuur','Eakaaslaste hindamine']},
      {key:'reflektsioon',name:'Refleksioon',color:'#A96E1A',time:5,hint:'Mis läks hästi?',fields:['Refleksiooniküsimused','Õpitu kokkuvõte']},
    ],
  };

  const phases = lesson.lessonTypeDef && PHASE_DEFS[lesson.lessonTypeDef]
    ? PHASE_DEFS[lesson.lessonTypeDef]
    : [{key:'main',name:'Tunni sisu',color:'#2F5D50',time:lesson.builderDuration||60,hint:'',fields:['Tunni sisu']}];

  const phaseData = lesson.phaseData || {};
  const[openWs,setOpenWs]=useState(null); // worksheet to show in overlay
  // Collect worksheets linked to phases
  const phaseWorksheets=useMemo(()=>{
    const map={};
    phases.forEach(ph=>{
      const pf=(phaseData[ph.key]||{}).files||[];
      if(pf.length) map[ph.key]=pf;
    });
    return map;
  },[phaseData,phases]);
  const totalMin = phases.reduce((a,p)=>a+p.time,0);

  const[curPhase,setCurPhase] = useState(0);
  const[timerSec,setTimerSec] = useState(phases[0]?.time*60||0);
  const[running,setRunning] = useState(false);
  const[finished,setFinished] = useState(false);
  const timerRef = useRef(null);

  const ph = phases[curPhase];
  const phTime = ph?.time*60||0;
  const elapsed = phTime - timerSec;
  const pct = phTime>0 ? Math.min(100,(elapsed/phTime)*100) : 0;
  const isWarning = timerSec > 0 && timerSec <= 60;
  const isDone = timerSec <= 0;

  useEffect(()=>{
    setTimerSec(phases[curPhase]?.time*60||0);
    setRunning(false);
    if(timerRef.current) clearInterval(timerRef.current);
  },[curPhase]);

  useEffect(()=>{
    if(running){
      timerRef.current=setInterval(()=>{
        setTimerSec(s=>{
          if(s<=0){clearInterval(timerRef.current);setRunning(false);return 0;}
          return s-1;
        });
      },1000);
    } else {
      clearInterval(timerRef.current);
    }
    return()=>clearInterval(timerRef.current);
  },[running]);

  const fmt=s=>{
    const m=Math.floor(Math.abs(s)/60);
    const sec=Math.abs(s)%60;
    return (s<0?'-':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  };

  const goNext=()=>{
    if(curPhase<phases.length-1){setCurPhase(c=>c+1);}
    else{setFinished(true);}
  };
  const goPrev=()=>{if(curPhase>0)setCurPhase(c=>c-1);};

  const barColor = isDone?'#EF4444':isWarning?'#F59E0B':'#2F5D50';

  return(
    <div className="lc-ov">
      {/* Top bar */}
      <div className="lc-top">
        <div>
          <div className="lc-title">{lesson.title}</div>
          <div className="lc-meta">
            {lesson.subject} · {lesson.level} · {lesson.topic}
            {typeDef&&<span style={{marginLeft:8}}>{typeDef.emoji} {typeDef.name}</span>}
            {lesson.builderDuration&&<span style={{marginLeft:8}}>⏱ {lesson.builderDuration} min</span>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {lesson.builderObjectives&&(
            <div style={{maxWidth:340,fontSize:'.74rem',color:'#B0A898',lineHeight:1.4,textAlign:'right'}}>
              {lesson.builderObjectives.slice(0,80)}{lesson.builderObjectives.length>80?'...':''}
            </div>
          )}
          <button onClick={onClose} style={{background:'rgba(28,43,58,.07)',border:'none',color:'#42536A',cursor:'pointer',borderRadius:8,padding:'7px 14px',fontSize:'.78rem',fontWeight:700}}>
            ✕ Lõpeta
          </button>
        </div>
      </div>

      {finished?(
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
          <div style={{fontSize:'3rem'}}>🎉</div>
          <div style={{color:'#1C2B3A',fontSize:'1.6rem',fontWeight:700,fontFamily:'Fraunces,serif',marginTop:8}}>Tund on läbi!</div>
          <div style={{color:'#B0A898',fontSize:'.84rem',marginTop:4}}>Kõik {phases.length} faasi läbitud · {totalMin} minutit</div>
          <button onClick={onClose} className="lc-btn-next" style={{marginTop:8}}>Sulge</button>
        </div>
      ):(
        <div className="lc-body">
          {/* Sidebar — phases */}
          <div className="lc-sidebar">
            <div style={{fontSize:'.64rem',fontWeight:700,color:'#C0B8B0',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:14}}>
              Tunni käik
            </div>
            {phases.map((p,i)=>(
              <div key={p.key} className={'lc-phase-item'+(i===curPhase?' active':i<curPhase?' done':'')}
                onClick={()=>setCurPhase(i)}>
                <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                  <div className="lc-ph-dot" style={{background:i<curPhase?'#2F5D50':i===curPhase?p.color:'rgba(255,255,255,.2)',marginTop:4}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="lc-ph-name" style={{color:i<curPhase?'#B0A898':i===curPhase?p.color:'#1C2B3A'}}>{p.name}</div>
                    <div className="lc-ph-time">{p.time} min</div>
                  </div>
                  {i<curPhase&&<span style={{color:'#2F5D50',fontSize:'.7rem'}}>✓</span>}
                </div>
              </div>
            ))}

            {/* Overall progress */}
            <div style={{marginTop:16,padding:'10px 0 0',borderTop:'1px solid rgba(255,255,255,.07)'}}>
              <div style={{fontSize:'.64rem',color:'#C0B8B0',marginBottom:6}}>{curPhase+1} / {phases.length} faasi</div>
              <div className="lc-progress">
                {phases.map((_,i)=>(
                  <div key={i} className={'lc-prog-dot'+(i<curPhase?' done':i===curPhase?' active':'')}/>
                ))}
              </div>
            </div>

            {/* Notes */}
            {lesson.builderNotes&&(
              <div style={{marginTop:14,padding:10,borderRadius:8,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.07)'}}>
                <div style={{fontSize:'.64rem',fontWeight:700,color:'rgba(255,255,255,.3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5}}>Märkused</div>
                <div style={{fontSize:'.78rem',color:'rgba(255,255,255,.55)',lineHeight:1.45}}>{lesson.builderNotes}</div>
              </div>
            )}
          </div>

          {/* Main content */}
          <div className="lc-main">
            {/* Timer */}
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24,flexWrap:'wrap',gap:12}}>
              <div>
                <div style={{display:'flex',alignItems:'baseline',gap:10}}>
                  <div className={'lc-timer'+(isWarning?' warning':isDone?' done-t':'')}>{fmt(timerSec)}</div>
                  <div style={{color:'#D0C8BC',fontSize:'.78rem',marginLeft:4}}>/ {ph?.time} min</div>
                </div>
                <div className="lc-timer-label">{running?'Kulgeb...':isDone?'Aeg on läbi!':'Paus'}</div>
                <div className="lc-timer-bar" style={{width:240}}>
                  <div className="lc-timer-fill" style={{width:pct+'%',background:barColor}}/>
                </div>
              </div>
              <div style={{display:'flex',gap:7}}>
                <button onClick={()=>setRunning(r=>!r)}
                  style={{padding:'9px 18px',borderRadius:9,border:'none',background:running?'rgba(28,43,58,.1)':'#1C2B3A',color:running?'#42536A':'#fff',cursor:'pointer',fontFamily:'inherit',fontSize:'.84rem',fontWeight:700,display:'flex',alignItems:'center',gap:6}}>
                  {running?<><i className="fa-solid fa-pause"/> Peata</>:<><i className="fa-solid fa-play"/> Käivita</>}
                </button>
                <button onClick={()=>setTimerSec(ph?.time*60||0)}
                  style={{padding:'9px 14px',borderRadius:9,border:'1px solid rgba(28,43,58,.1)',background:'transparent',color:'#B0A898',cursor:'pointer',fontFamily:'inherit',fontSize:'.82rem'}}>
                  <i className="fa-solid fa-rotate-left"/>
                </button>
              </div>
            </div>

            {/* Phase name */}
            <div>
              <span className="lc-phase-badge" style={{background:ph?.color+'25',color:ph?.color}}>
                {curPhase+1}/{phases.length} · {ph?.time} min
              </span>
              <div className="lc-phase-name">{ph?.name}</div>
            </div>

            {/* Hint */}
            {ph?.hint&&(
              <div className="lc-hint-box">
                <div className="lc-hint-lbl">💡 Didaktiline nõuanne</div>
                <div className="lc-hint-text">{ph.hint}</div>
              </div>
            )}

            {/* Fields content */}
            <div className="lc-fields">
              {ph?.fields.map((fieldName,fi)=>{
                const val=(phaseData[ph.key]||{})[fi]||'';
                return(
                  <div key={fi} className="lc-field-card">
                    <div className="lc-field-lbl">{fieldName}</div>
                    {val
                      ?<div className="lc-field-val">{val}</div>
                      :<div className="lc-field-empty">Pole täidetud</div>
                    }
                  </div>
                );
              })}
            </div>

            {/* Phase files / worksheets */}
            {phaseWorksheets[ph?.key]&&phaseWorksheets[ph.key].length>0&&(
              <div style={{marginTop:16}}>
                <div style={{fontSize:'.68rem',fontWeight:700,color:'#B0A898',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>
                  <i className="fa-solid fa-paperclip" style={{marginRight:4}}/>Materjalid
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                  {phaseWorksheets[ph.key].map((f,fi)=>{
                    const ext=(f.name||'').split('.').pop().toLowerCase();
                    const isImg=['jpg','jpeg','png','gif','webp'].includes(ext);
                    return(
                      <div key={fi}>
                        {isImg
                          ?<div className="lc-ws-card" style={{padding:0,overflow:'hidden',maxWidth:200}} onClick={()=>setOpenWs(f)}>
                             <img src={f.url} alt={f.name} style={{width:'100%',maxHeight:120,objectFit:'cover',display:'block'}}/>
                             <div style={{padding:'6px 10px',fontSize:'.72rem',color:'#42536A',fontWeight:600}}>{f.name}</div>
                           </div>
                          :<a href={f.url} target="_blank" rel="noreferrer"
                             style={{display:'flex',alignItems:'center',gap:7,padding:'10px 14px',background:'#fff',borderRadius:10,border:'0.5px solid rgba(28,43,58,.1)',textDecoration:'none',color:'#1C2B3A',fontSize:'.84rem',fontWeight:600,boxShadow:'0 1px 4px rgba(28,43,58,.06)'}}>
                             <div style={{width:28,height:28,borderRadius:7,background:'rgba(47,93,80,.1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                               <i className="fa-solid fa-file" style={{color:'#2F5D50',fontSize:'.72rem'}}/>
                             </div>
                             {f.name}
                           </a>
                        }
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Image overlay */}
            {openWs&&(
              <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={()=>setOpenWs(null)}>
                <div style={{position:'relative',maxWidth:'90vw',maxHeight:'90vh'}}>
                  <img src={openWs.url} alt={openWs.name} style={{maxWidth:'100%',maxHeight:'85vh',objectFit:'contain',borderRadius:12}}/>
                  <button onClick={()=>setOpenWs(null)} style={{position:'absolute',top:-12,right:-12,width:32,height:32,borderRadius:'50%',background:'#fff',border:'none',cursor:'pointer',fontSize:'.9rem',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px rgba(0,0,0,.3)'}}>✕</button>
                  <div style={{color:'rgba(255,255,255,.7)',fontSize:'.78rem',textAlign:'center',marginTop:8}}>{openWs.name}</div>
                </div>
              </div>
            )}

            {/* Nav */}
            <div className="lc-nav">
              {curPhase>0&&(
                <button onClick={goPrev} className="lc-btn-prev">
                  ← {phases[curPhase-1]?.name}
                </button>
              )}
              <button onClick={goNext} className={'lc-btn-next'+(curPhase===phases.length-1?' lc-btn-finish':'')}>
                {curPhase===phases.length-1
                  ?<><i className="fa-solid fa-flag-checkered"/> Lõpeta tund</>
                  :<>{phases[curPhase+1]?.name} →</>
                }
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SEARCH VIEW ────────────────────────────────────────────────
function SearchView({lessons,subjects,onSelectLesson,onClose}) {
  const[q,setQ]=useState('');
  const inpRef=useRef();
  useEffect(()=>{inpRef.current?.focus();},[]);

  const results=useMemo(()=>{
    if(!q.trim()) return [];
    const lq=q.toLowerCase();
    return lessons.filter(l=>{
      return (l.title||'').toLowerCase().includes(lq)
        ||(l.description||'').toLowerCase().includes(lq)
        ||(l.topic||'').toLowerCase().includes(lq)
        ||(l.subject||'').toLowerCase().includes(lq)
        ||(l.builderObjectives||'').toLowerCase().includes(lq);
    }).slice(0,30);
  },[lessons,q]);

  const highlight=(text,query)=>{
    if(!query||!text) return text;
    const idx=text.toLowerCase().indexOf(query.toLowerCase());
    if(idx===-1) return text.slice(0,60);
    const start=Math.max(0,idx-20);
    const end=Math.min(text.length,idx+query.length+40);
    const pre=text.slice(start,idx);
    const match=text.slice(idx,idx+query.length);
    const post=text.slice(idx+query.length,end);
    return <span>{start>0?'...':''}{pre}<mark>{match}</mark>{post}{end<text.length?'...':''}</span>;
  };

  const SUBJECT_COLORS={'Eesti keel':'#2F5D50','Inglise keel':'#1d4ed8','Matemaatika':'#A96E1A'};
  const LESSON_TYPE_ICONS={lesson:'fa-book',test:'fa-clipboard-check',hw:'fa-house',material:'fa-file-lines'};

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div className="search-bar">
        <button onClick={onClose} className="btn btn-ghost btn-sm">
          <i className="fa-solid fa-arrow-left"/>
        </button>
        <div className="search-input-wrap">
          <i className="fa-solid fa-magnifying-glass"/>
          <input ref={inpRef} className="search-inp" value={q} onChange={e=>setQ(e.target.value)}
            placeholder="Otsi tundide, teemade, kirjelduste järgi..."/>
        </div>
        {q&&<button onClick={()=>setQ('')} style={{background:'none',border:'none',color:'#B0A898',cursor:'pointer',fontSize:'.82rem'}}>✕</button>}
      </div>

      <div style={{flex:1,overflowY:'auto'}}>
        {!q&&(
          <div style={{textAlign:'center',padding:'60px 0',color:'#B0A898'}}>
            <i className="fa-solid fa-magnifying-glass" style={{fontSize:'2rem',marginBottom:12,display:'block',opacity:.25}}/>
            <div style={{fontSize:'.88rem'}}>Alusta trükkimist et otsida kõigi tundide hulgast</div>
            <div style={{fontSize:'.78rem',marginTop:6,color:'#C0B8B0'}}>{lessons.length} kirjet kokku</div>
          </div>
        )}
        {q&&results.length===0&&(
          <div style={{textAlign:'center',padding:'60px 0',color:'#B0A898'}}>
            <div style={{fontSize:'.88rem'}}>Tulemusi ei leitud: "{q}"</div>
          </div>
        )}
        {results.length>0&&(
          <div className="search-results">
            <div style={{fontSize:'.76rem',color:'#7A7167',marginBottom:12}}>{results.length} tulemust</div>
            {results.map(lesson=>{
              const sc=SUBJECT_COLORS[lesson.subject]||'#718096';
              const icon=LESSON_TYPE_ICONS[lesson.type]||'fa-book';
              return(
                <div key={lesson.id} className="search-hit" onClick={()=>onSelectLesson(lesson)}>
                  <div className="search-hit-icon" style={{background:sc+'15'}}>
                    <i className={'fa-solid '+icon} style={{color:sc}}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="search-hit-title">{highlight(lesson.title||'',q)}</div>
                    <div className="search-hit-path">
                      {lesson.subject} › {lesson.level} › {lesson.topic}
                    </div>
                    {lesson.description&&(
                      <div className="search-hit-desc">{highlight(lesson.description||'',q)}</div>
                    )}
                  </div>
                  <div style={{flexShrink:0,display:'flex',gap:5,alignItems:'center'}}>
                    {lesson.phaseData&&<span style={{fontSize:'.68rem',padding:'2px 7px',borderRadius:5,background:'rgba(47,93,80,.1)',color:'#2F5D50',fontWeight:700}}>Tund</span>}
                    {lesson.files?.length>0&&<span style={{fontSize:'.68rem',color:'#B0A898'}}><i className="fa-solid fa-paperclip"/> {lesson.files.length}</span>}
                    <i className="fa-solid fa-chevron-right" style={{fontSize:'.65rem',color:'#B0A898'}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── STATISTICS VIEW ────────────────────────────────────────────
function StatisticsView({allLessons}) {
  const SUBJECT_COLORS={'Eesti keel':'#2F5D50','Inglise keel':'#1d4ed8','Matemaatika':'#A96E1A'};
  const LEVEL_COLORS={A1:'#047857',A2:'#0e7490',B1:'#1d4ed8',B2:'#6d28d9',C1:'#be185d'};

  // Total stats
  const total = allLessons.length;
  const withWorksheet = allLessons.filter(l=>l.worksheetData).length;
  const withPhases = allLessons.filter(l=>l.phaseData).length;
  const conducted = allLessons.filter(l=>l.conductedAt).length;

  // By subject
  const bySubject = {};
  allLessons.forEach(l=>{
    const s=l.subject||'Määramata';
    bySubject[s]=(bySubject[s]||0)+1;
  });

  // By level
  const byLevel = {};
  allLessons.forEach(l=>{
    const lv=l.level||'—';
    byLevel[lv]=(byLevel[lv]||0)+1;
  });

  // Topics coverage — how many lessons per topic
  const byTopic = {};
  allLessons.forEach(l=>{
    if(!l.topic) return;
    const key=`${l.subject||''}|${l.level||''}|${l.topic}`;
    if(!byTopic[key]) byTopic[key]={subject:l.subject,level:l.level,topic:l.topic,count:0,hasWorksheet:false};
    byTopic[key].count++;
    if(l.worksheetData) byTopic[key].hasWorksheet=true;
  });
  const topicList=Object.values(byTopic).sort((a,b)=>b.count-a.count);
  const maxTopicCount=Math.max(...topicList.map(t=>t.count),1);

  // Lesson types distribution
  const byType={};
  allLessons.forEach(l=>{
    const t=l.lessonTypeLabel||l.lessonTypeDef||'Vaba vorm';
    byType[t]=(byType[t]||0)+1;
  });
  const typeList=Object.entries(byType).sort((a,b)=>b[1]-a[1]);

  // Topics without worksheet — need attention
  const needsWorksheet=topicList.filter(t=>!t.hasWorksheet&&t.count>0).slice(0,5);

  // Recent lessons
  const recent=allLessons
    .filter(l=>l.updatedAt)
    .sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt))
    .slice(0,8);

  if(total===0) return(
    <div style={{textAlign:'center',padding:'80px 0',color:'#B0A898'}}>
      <i className="fa-solid fa-chart-bar" style={{fontSize:'2.5rem',opacity:.2,display:'block',marginBottom:12}}/>
      <div style={{fontSize:'.9rem'}}>Statistika ilmub kui oled loonud esimesed tunnid</div>
    </div>
  );

  return(
    <div style={{padding:'24px 28px',maxWidth:1100,margin:'0 auto'}}>

      {/* Summary cards */}
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-num">{total}</div>
          <div className="stat-lbl">Kirjet kokku</div>
          <div className="stat-sub">{withPhases} tunniplaaniga</div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{withWorksheet}</div>
          <div className="stat-lbl">Töölehega</div>
          <div className="stat-sub">{total-withWorksheet} ilma tööleheta</div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{topicList.length}</div>
          <div className="stat-lbl">Teemat kaetud</div>
          <div className="stat-sub">{Object.keys(byLevel).length} taset</div>
        </div>
        <div className="stat-card">
          <div className="stat-num" style={{color:'#2F5D50'}}>{withPhases}</div>
          <div className="stat-lbl">Struktureeritud tundi</div>
          <div className="stat-sub">PPP / TBL / CLT</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        {/* Left column */}
        <div>
          {/* Topics coverage */}
          <div className="stats-section">
            <div className="stats-section-title">Teemade katvus</div>
            {topicList.slice(0,10).map((t,i)=>(
              <div key={i} className="topic-bar-wrap">
                <div style={{flex:'0 0 auto',minWidth:0}}>
                  <div className="topic-bar-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:140}}>{t.topic}</div>
                  <div style={{fontSize:'.68rem',color:'#B0A898'}}>{t.subject} · {t.level}</div>
                </div>
                <div className="topic-bar-track">
                  <div className="topic-bar-fill" style={{width:(t.count/maxTopicCount*100)+'%',background:SUBJECT_COLORS[t.subject]||'#2F5D50'}}/>
                </div>
                <div className="topic-bar-count">{t.count}</div>

                <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 14px',background:'rgba(201,136,42,.06)',borderRadius:10,border:'1px solid rgba(201,136,42,.2)',marginBottom:6}}>
                  <div>

                    <div style={{fontSize:'.7rem',color:'#7A7167'}}>{t.subject} · {t.level} · {t.count} kirjet</div>

        </div>

        <div>
          {/* By level */}

            <div className="stats-section-title">Tasemed</div>
            <div className="level-pill-row">
              {['A1','A2','B1','B2','C1'].map(lv=>(
                <div key={lv} className="level-pill" style={{
                  background:byLevel[lv]?((LEVEL_COLORS[lv]||'#718096')+'15'):'rgba(28,43,58,.04)',
                  borderColor:byLevel[lv]?(LEVEL_COLORS[lv]||'#718096'):'rgba(28,43,58,.1)',
                  color:byLevel[lv]?(LEVEL_COLORS[lv]||'#718096'):'#B0A898'
                }}>
                  <div style={{fontSize:'1.1rem',fontWeight:800}}>{byLevel[lv]||0}</div>
                  <div style={{fontSize:'.7rem',opacity:.8}}>{lv}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Lesson types */}
          <div className="stats-section">
            <div className="stats-section-title">Tunni tüübid</div>
            {typeList.map(([type,count],i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'#fff',borderRadius:9,border:'0.5px solid rgba(28,43,58,.08)',marginBottom:5}}>
                <span style={{fontSize:'.84rem',fontWeight:600,color:'#1C2B3A'}}>{type}</span>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:60,height:5,background:'rgba(28,43,58,.07)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{width:(count/total*100)+'%',height:'100%',background:'#2F5D50',borderRadius:3}}/>
                  </div>
                  <span style={{fontSize:'.78rem',fontWeight:700,color:'#7A7167',minWidth:20,textAlign:'right'}}>{count}</span>
                </div>
              </div>
            ))}
          </div>

          {/* Recent */}
          <div className="stats-section">
            <div className="stats-section-title">Viimati lisatud</div>
            {recent.map((l,i)=>(
              <div key={i} className="conduct-row">
                <div className="conduct-dot" style={{background:SUBJECT_COLORS[l.subject]||'#718096'}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'.83rem',fontWeight:700,color:'#1C2B3A',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.title}</div>
                  <div style={{fontSize:'.7rem',color:'#B0A898'}}>{l.subject} · {l.level} · {l.topic}</div>
                </div>
                {l.worksheetData&&<i className="fa-solid fa-file-lines" style={{color:'#2F5D50',fontSize:'.72rem',flexShrink:0}}/>}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState('curriculum');
  const[wsPreview,setWsPreview]=useState(null);
  const[conductLesson,setConductLesson]=useState(null);
  const[showSearch,setShowSearch]=useState(false);
  const[allLessons,setAllLessons]=useState([]);
  const[notif,setNotif]=useState('');
  const[exCount,setExCount]=useState(0);

  const notify=msg=>{setNotif(msg);setTimeout(()=>setNotif(''),3000);};
  const isTeacher=user?.role==='teacher'||user?.role==='admin'||user?.email==='zakutailo.pavel@gmail.com';

  useEffect(()=>{
    const u=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){const s=await db.collection('users').doc(fbUser.uid).get();if(s.exists)setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,...s.data()});else setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,email:fbUser.email,role:'student'});}
      else setUser(null);
      setLoading(false);
    });
    return u;
  },[]);

  useEffect(()=>{
    const u=db.collection('exercises').onSnapshot(s=>setExCount(s.docs.length),()=>{});
    const u2=db.collection('curriculumLessons').onSnapshot(s=>setAllLessons(s.docs.map(d=>({id:d.id,...d.data()}))),()=>{});
    return()=>{u();u2();};
  },[]);

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}><div className="spinner"/></div>;
  if(!user)return<LoginScreen onLogin={setUser}/>;

  return(
    <div style={{minHeight:'100vh',background:'#F0EEE9'}}>
      {notif&&<div className="notif">{notif}</div>}
      {showSearch&&<SearchView lessons={allLessons} onClose={()=>setShowSearch(false)}
        onSelectLesson={l=>{setShowSearch(false);setWsPreview(l);}}/>}
      {conductLesson&&<LessonConductModal lesson={conductLesson} onClose={()=>setConductLesson(null)}/>}
      {wsPreview&&<WorksheetPreviewModal lesson={wsPreview} onClose={()=>setWsPreview(null)} onConduct={l=>{setWsPreview(null);setConductLesson(l);}}/>}

      <header className="top-header">
        <div className="logo">Keele<span>Sepp</span></div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{color:'rgba(255,255,255,.45)',fontSize:'.8rem'}}>{user.displayName||user.email}</span>
          <a href="/haldus/" style={{color:'rgba(255,255,255,.55)',fontSize:'.78rem',textDecoration:'none',padding:'6px 12px',border:'1px solid rgba(255,255,255,.14)',borderRadius:8}}>← Haldus</a>
          <button onClick={()=>auth.signOut().then(()=>setUser(null))} style={{background:'none',border:'1px solid rgba(255,255,255,.14)',color:'rgba(255,255,255,.55)',cursor:'pointer',borderRadius:8,padding:'6px 12px',fontSize:'.78rem'}}>Logi välja</button>
        </div>
      </header>

      <div className="top-tabs">
        <button className={'top-tab'+(tab==='curriculum'?' active':'')} onClick={()=>setTab('curriculum')}>
          <i className="fa-solid fa-layer-group"/> Õppekava
        </button>
        <button className={'top-tab'+(tab==='exercises'?' active':'')} onClick={()=>setTab('exercises')}>
          <i className="fa-solid fa-dumbbell"/> Harjutused
          <span className="tab-count">{exCount}</span>
        </button>
        <button className="top-tab" onClick={()=>setShowSearch(true)} style={{color:'#718096'}}>
          <i className="fa-solid fa-magnifying-glass"/> Otsi
        </button>
        <button className={'top-tab'+(tab==='stats'?' active':'')} onClick={()=>setTab('stats')} style={{color:'#718096'}}>
          <i className="fa-solid fa-chart-bar"/> Statistika
        </button>
        {tab==='curriculum'&&isTeacher&&(
          <button onClick={()=>window.open('/haldus-worksheet/','_blank')} className="top-tab"
            style={{marginLeft:'auto',color:'#A96E1A',borderBottomColor:'transparent',background:'none',border:'none',cursor:'pointer'}}>
            <i className="fa-solid fa-file-pen"/> Koosta tööleht
          </button>
        )}
      </div>

      {!showSearch&&tab==='curriculum'&&<CurriculumView isTeacher={isTeacher} user={user} notify={notify} onPreviewWorksheet={setWsPreview} onConductLesson={setConductLesson}/>}
      {!showSearch&&tab==='exercises'&&<ExercisesView isTeacher={isTeacher} user={user} notify={notify}/>}
      {!showSearch&&tab==='stats'&&<StatisticsView allLessons={allLessons}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
