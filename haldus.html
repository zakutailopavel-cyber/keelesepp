        </div>
      </div>
    </div>
  );
}

// ── РЕДАКТИРОВАНИЕ И УДАЛЕНИЕ УЧЕНИКА ────────────────────────
function EditStudentModal({student,onClose,onSave,onDelete,db,notify,isAdmin}) {
  const [name,    setName]    = React.useState(student.name||'');
  const [email,   setEmail]   = React.useState(student.email||'');
  const [phone,   setPhone]   = React.useState(student.phone||'');
  const [level,   setLevel]   = React.useState(student.level||'A1');
  const [target,  setTarget]  = React.useState(student.targetLevel||'B1');
  const [subject, setSubject] = React.useState(student.subject||'Eesti keel');
  const [grade,   setGrade]   = React.useState(student.grade||'');
  const [group,   setGroup]   = React.useState(student.group||'');
  const [teacher, setTeacher] = React.useState(student.teacher||'Pavel');
  const [contactStatus,setContactStatus] = React.useState(student.contactStatus||'new');
  const [contactOwner,setContactOwner] = React.useState(student.contactOwner||'');
  const [contactLastAt,setContactLastAt] = React.useState(student.contactLastAt||'');
  const [contactNotes,setContactNotes] = React.useState(student.contactNotes||'');
  const [pkg,     setPkg]     = React.useState(String(student.packageTotal||0));
  const [used,    setUsed]    = React.useState(String(student.packageUsed||0));
  const [saving,  setSaving]  = React.useState(false);
  const [confirm, setConfirm] = React.useState(false);

  const save = async()=>{
    if(!name.trim()){notify('⚠ Sisesta nimi');return;}
    setSaving(true);
    await db.collection('students').doc(student.id).update({
      name,email,phone,level,targetLevel:target,
      subject,grade,group,teacher,
      contactStatus,contactOwner,contactLastAt,contactNotes,
      packageTotal:parseInt(pkg)||0,
      packageUsed:parseInt(used)||0,
      updatedAt: new Date().toISOString().split('T')[0]
    });
    notify('✓ Muudatused salvestatud!');
    onSave();
    setSaving(false);
  };

  const deleteStudent = async()=>{
    setSaving(true);
    // Кудалем ученика и связанные данные
    await db.collection('students').doc(student.id).delete();
    // Удаляем уроки
    const lessons = await db.collection('lessons').where('studentId','==',student.id).get();
    for(const doc of lessons.docs) await doc.ref.delete();
    // Удаляем домашние задания
    const hw = await db.collection('homework').where('studentId','==',student.id).get();
    for(const doc of hw.docs) await doc.ref.delete();
    // Удаляем счета
    const inv = await db.collection('invoices').where('studentId','==',student.id).get();
    for(const doc of inv.docs) await doc.ref.delete();
    notify('✓ Õpilane kustutatud');
    onDelete();
    setSaving(false);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.6)',display:'flex',alignItems:'center',
      justifyContent:'center',padding:16,zIndex:210,backdropFilter:'blur(4px)'}}>
      <div className="card scroll" style={{padding:0,maxWidth:520,width:'100%',maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{padding:'20px 24px 16px',borderBottom:'1px solid rgba(28,43,58,.08)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:'1.2rem'}}>✏️ Muuda õpilase andmeid</h2>
          <button onClick={onClose} style={{background:'rgba(28,43,58,.07)',border:'none',cursor:'pointer',borderRadius:9,
            width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',color:'#42536A'}}>✕</button>
        </div>

        <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div style={{gridColumn:'1/-1'}}>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Täisnimi *</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Täisnimi *"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>E-post</div>
              <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="E-post"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Telefon</div>
              <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+372…"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Õppeaine</div>
              <select value={subject} onChange={e=>setSubject(e.target.value)}>
                <option>Eesti keel</option>
                <option>Inglise keel</option>
                <option>Muu</option>
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Klass / vanus</div>
              <select value={grade} onChange={e=>setGrade(e.target.value)}>
                <option value="">Määramata</option>
                {["1. klass","2. klass","3. klass","4. klass","5. klass","6. klass","7. klass","8. klass","9. klass","10. klass","11. klass","12. klass","Täiskasvanu"].map(g=><option key={g}>{g}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Grupp</div>
              <input value={group} onChange={e=>setGroup(e.target.value)} placeholder="Nt. B1 õhtu"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Hetketase</div>
              <select value={level} onChange={e=>setLevel(e.target.value)}>
                {['A1','A2','B1','B2','C1'].map(l=><option key={l}>{l}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Eesmärk</div>
              <select value={target} onChange={e=>setTarget(e.target.value)}>
                {['A2','B1','B2','C1'].map(l=><option key={l}>{l}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Õpetaja</div>
              {isAdmin
                ? <select value={teacher} onChange={e=>setTeacher(e.target.value)}>
                    {[...new Set([...TEACHERS, teacher].filter(Boolean))].map(t=><option key={t}>{t}</option>)}
                  </select>
                : <input value={teacher} readOnly style={{opacity:.7}}/>
              }
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Kontaktistaatus</div>
              <select value={contactStatus} onChange={e=>setContactStatus(e.target.value)}>
                {CONTACT_STATUSES.map(status=><option key={status.id} value={status.id}>{status.label}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Kes suhtleb</div>
              <input value={contactOwner} onChange={e=>setContactOwner(e.target.value)} placeholder="Nt. Pavel / Admin"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Viimane kontakt</div>
              <input value={contactLastAt} onChange={e=>setContactLastAt(e.target.value)} type="date"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Paketi maht</div>
              <input value={pkg} onChange={e=>setPkg(e.target.value)} type="number" placeholder="10"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Kasutatud tunde</div>
              <input value={used} onChange={e=>setUsed(e.target.value)} type="number" placeholder="0"/>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Kontaktimärkmed</div>
              <textarea value={contactNotes} onChange={e=>setContactNotes(e.target.value)} placeholder="Mida lapsevanem ütles, millal tagasi helistada, mis huvi tundis…" rows={4}/>
            </div>
          </div>

          <button onClick={save} disabled={saving} className="btn btn-pine" style={{width:'100%',marginTop:4}}>
            {saving?'Salvestab…':'✓ Salvesta muudatused'}
          </button>

          {isAdmin&&(
            <div style={{borderTop:'1px solid rgba(239,68,68,.15)',paddingTop:14,marginTop:4}}>
              {!confirm
                ? <button onClick={()=>setConfirm(true)} className="btn btn-red" style={{width:'100%'}}>
                    <i className="fa-solid fa-trash"/> Kustuta õpilane jäädavalt
                  </button>
                : <div style={{background:'#fee2e2',borderRadius:12,padding:16}}>
                    <div style={{fontWeight:600,color:'#991b1b',marginBottom:8,fontSize:'.9rem'}}>
                      ⚠ Oled kindel? See kustutab ka kõik tunnid, kodutööd ja arved!
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={deleteStudent} disabled={saving} className="btn btn-red" style={{flex:1}}>
                        {saving?'Kustutab…':'Jah, kustuta'}
                      </button>
                      <button onClick={()=>setConfirm(false)} className="btn btn-ghost" style={{flex:1}}>Tühista</button>
                    </div>
                  </div>
              }
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── PEAMINE APP ───────────────────────────────────────────────
function App() {
  const [user,setUser]         = useState(null);
  const [loading,setLoading]   = useState(true);
  const [bootError,setBootError] = useState('');
  const [tab,setTab]           = useState('dashboard');
  const [selStu,setSelStu]     = useState(null);
  const [editStu,setEditStu]   = useState(null);
  const [filterT,setFilterT]   = useState('');
  const [modalEv,setModalEv]   = useState(null);
  const [search,setSearch]     = useState('');
  const [stuFilter,setStuFilter]= useState('active');
  const [groupFilter,setGroupFilter]= useState('all');
  const [contactFilter,setContactFilter]= useState('all');
  const [notif,setNotif]       = useState('');
  const [mobileNav,setMobileNav]=useState(false);

  const [students,setStu] = useState([]);
  const [lessons,setLes]  = useState([]);
  const [homework,setHw]  = useState([]);
  const [schedule,setSch] = useState([]);
  const [invoices,setInv] = useState([]);

  // Add student
  const [nName,setNName]   = useState('');
  const [nEmail,setNEmail] = useState('');
  const [nPhone,setNPhone] = useState('');
  const [nLevel,setNLevel] = useState('A1');
  const [nTarget,setNTarget]=useState('B1');
  const [nPkg,setNPkg]     = useState('10');
  const [nSubject,setNSubject] = useState('Eesti keel');
  const [nGrade,setNGrade] = useState('');
  const [nGroup,setNGroup] = useState('');
  const [nTeach,setNTeach] = useState('Pavel');
  // Lesson
  const [lTopic,setLTopic]   = useState('');
  const [lGrade,setLGrade]   = useState('5');
  const [lStatus,setLStatus] = useState('Toimunud');
  const [lComment,setLComment]=useState('');
  const [lDur,setLDur]       = useState('60');
  // Homework
  const [hwTask,setHwTask] = useState('');
  const [hwDue,setHwDue]   = useState('');
  // Schedule
  const [schStu,setSchStu]   = useState('');
  const [schDate,setSchDate] = useState(today());
  const [schTime,setSchTime] = useState('09:00');
  const [schTeach,setSchTeach]=useState('Pavel');
  const [schRecurring,setSchRecurring]=useState(false);
  // Invoice
  const [invAmt,setInvAmt]   = useState('');
  const [invDesc,setInvDesc] = useState('');
  const [invStu,setInvStu]   = useState('');

  // AUTH
  useEffect(()=>{
    if(!auth || !db){
      console.error('Firebase init missing', { hasAuth: !!auth, hasDb: !!db });
      setBootError('Firebase ei laaditud. Kontrolli internetiuhendust ja proovi lehte uuesti avada.');
      setLoading(false);
      return;
    }

    const unsub=auth.onAuthStateChanged(async fbUser=>{
      try{
        if(fbUser){
          const snap=await db.collection('users').doc(fbUser.uid).get();
          if(snap.exists){
            const d=snap.data();
            const profile = {uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,...d};
            await ensureStudentRecord(fbUser, profile);
            await ensureParentStudentRecords(fbUser, profile);
            setUser(profile);
            if(d.role==='teacher') setFilterT(canonicalTeacherName(fbUser.displayName||''));
            if(d.role==='admin') setFilterT('Kõik');
          }else{
            setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,email:fbUser.email,role:'parent'});
          }
        }else{
          setUser(null);
        }
      }catch(err){
        console.error('Auth bootstrap failed:', err);
        setBootError('Sisselogimise andmeid ei olnud voimalik laadida. Proovi lehte uuendada.');
      }finally{
        setLoading(false);
      }
    });
    return unsub;
  },[]);

  // FIRESTORE
  useEffect(()=>{
    if(!user) return;
    const u1=db.collection('students').onSnapshot(s=>setStu(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=db.collection('lessons').onSnapshot(s=>setLes(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3=db.collection('homework').onSnapshot(s=>setHw(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u4=db.collection('schedule').onSnapshot(s=>setSch(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u5=db.collection('invoices').onSnapshot(s=>setInv(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{u1();u2();u3();u4();u5();};
  },[user]);

  const notify=msg=>{setNotif(msg);setTimeout(()=>setNotif(''),3500);};
  const goTab=t=>{setTab(t);setSelStu(null);setMobileNav(false);};

  const isAdmin = user?.email==='zakutailo.pavel@gmail.com'||user?.displayName==='Pavel'||user?.displayName?.startsWith('Pavel Z');
  const isStaff = user?.role==='teacher' || user?.role==='admin';
  const canAssignTeacher = isAdmin || user?.role==='admin';

  useEffect(()=>{
    if(user?.role==='teacher'&&!canAssignTeacher) setNTeach(user.displayName||'');
  },[user,canAssignTeacher]);

  const myStudents = useMemo(()=>{
    if(!user) return [];
    if(user.role==='teacher') return isAdmin?students:students.filter(s=>canonicalTeacherName(s.teacher)===canonicalTeacherName(user.displayName));
    if(user.role==='admin')   return students;
    if(user.role==='parent'){
      const linkedNames = parseLinkedNames(user.childName);
      const userEmail = normalizeText(user.email);
      return students.filter(s=>{
        const studentName = normalizeText(s.name);
        const studentEmail = normalizeText(s.email);
        const parentEmail = normalizeText(s.parentEmail || s.contactEmail || s.guardianEmail);
        return linkedNames.includes(studentName) || (!!userEmail && (studentEmail===userEmail || parentEmail===userEmail));
      });
    }
    return students.filter(s=>s.name?.toLowerCase()===user.displayName?.toLowerCase());
  },[user,students,isAdmin]);

  const groupOptions = useMemo(()=>
    [...new Set(myStudents.map(s=>(s.group||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'et'))
  ,[myStudents]);

  const filteredStudents = useMemo(()=>
    myStudents
      .filter(s=>stuFilter==='active'?s.active!==false:stuFilter==='inactive'?s.active===false:true)
      .filter(s=>groupFilter==='all'?true:(s.group||'').trim()===groupFilter)
      .filter(s=>contactFilter==='all'?true:((s.contactStatus||'new')===contactFilter))
      .filter(s=>{
        const q=search.toLowerCase();
        return (s.name||'').toLowerCase().includes(q)
          || (s.teacher||'').toLowerCase().includes(q)
          || (s.email||'').toLowerCase().includes(q)
          || (s.phone||'').toLowerCase().includes(q)
          || (s.subject||'').toLowerCase().includes(q)
          || (s.grade||'').toLowerCase().includes(q)
          || (s.group||'').toLowerCase().includes(q)
          || (s.contactOwner||'').toLowerCase().includes(q)
          || (s.contactNotes||'').toLowerCase().includes(q);
      })
  ,[myStudents,stuFilter,groupFilter,contactFilter,search]);

  const currentStu = useMemo(()=>
    selStu ? students.find(s=>s.id===selStu.id)||selStu : user?.role!=='teacher'?myStudents[0]:null
  ,[selStu,students,user,myStudents]);

  useEffect(()=>{
    if(!isStaff) return;
    if(schStu) return;
    const firstActiveStudent = myStudents.find(s=>s.active!==false);
    if(firstActiveStudent) setSchStu(firstActiveStudent.name);
  },[isStaff,myStudents,schStu]);

  const stuLessons = useMemo(()=>currentStu?lessons.filter(l=>l.studentId===currentStu.id||l.studentName?.toLowerCase()===currentStu.name?.toLowerCase()):[]
  ,[currentStu,lessons]);
  const stuHw  = useMemo(()=>currentStu?homework.filter(h=>h.studentId===currentStu.id):[]  ,[currentStu,homework]);
  const stuInv = useMemo(()=>currentStu?invoices.filter(i=>i.studentId===currentStu.id):[] ,[currentStu,invoices]);

  // ACTIONS
  const addStudent=useCallback(async()=>{
    if(!nName.trim()){notify('⚠ Sisesta õpilase nimi');return;}
    const t=canAssignTeacher?nTeach:canonicalTeacherName(user.displayName);
    await db.collection('students').add({name:nName,level:nLevel,targetLevel:nTarget,teacher:t,phone:nPhone,email:nEmail,active:true,packageTotal:parseInt(nPkg)||0,packageUsed:0,subject:nSubject,grade:nGrade,group:nGroup,contactStatus:'new',contactOwner:user?.displayName||'',contactLastAt:'',contactNotes:'',createdAt:today()});
    setNName('');setNPhone('');setNEmail('');setNGroup('');
    notify('✓ Õpilane '+nName+' lisatud!');
  },[nName,nLevel,nTarget,nTeach,nPhone,nEmail,nPkg,nSubject,nGrade,nGroup,canAssignTeacher,user]);

  const addSchedule=useCallback(async()=>{
    if(!schStu||!schDate){notify('⚠ Vali õpilane ja kuupäev');return;}
    const t=canAssignTeacher?schTeach:canonicalTeacherName(user.displayName);
    const jsDay=new Date(schDate).getDay();
    const dayId=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][jsDay];
    const payload = schRecurring
      ? {teacher:t,studentName:schStu,day:dayId,time:schTime,status:'Planeeritud',recurring:true,startDate:schDate,createdAt:today()}
      : {teacher:t,studentName:schStu,date:schDate,day:dayId,time:schTime,status:'Planeeritud',createdAt:today()};
    await db.collection('schedule').add(payload);
    notify(schRecurring?'✓ Korduv tund lisatud!':'✓ Tund broneeritud!');
  },[schStu,schDate,schTime,schTeach,schRecurring,canAssignTeacher,user]);

  const saveLesson=useCallback(async()=>{
    if(!modalEv||!lTopic.trim()){notify('⚠ Sisesta tunni teema');return;}
    const stu=students.find(s=>s.name.toLowerCase()===modalEv.studentName.toLowerCase());
    const now=new Date();
    const lessonPayload = {
      studentId:stu?stu.id:'ext',studentName:modalEv.studentName,
      scheduleId: modalEv.id||'',
      scheduleTime: modalEv.time||'',
      topic:lTopic,grade:lStatus==='Toimunud'?parseInt(lGrade):0,
      duration:parseInt(lDur),status:lStatus,comment:lComment,
      date:modalEv.date||today(),submittedAt:now.toLocaleString('et-EE'),teacher:user.displayName,
      updatedAt: now.toISOString()
    };

    let existingLessonDoc = null;
    let existingLessonRef = null;
    let existingLessonData = null;
    if(modalEv.lessonEntryId){
      existingLessonRef = db.collection('lessons').doc(modalEv.lessonEntryId);
      const existingSnap = await existingLessonRef.get();
      if(existingSnap.exists) existingLessonData = existingSnap.data();
      if(existingSnap.exists) existingLessonDoc = existingSnap;
    }else if(modalEv.id){
      const existingSnap = await db.collection('lessons').where('scheduleId','==',modalEv.id).limit(1).get();
      if(!existingSnap.empty){
        existingLessonDoc = existingSnap.docs[0];
        existingLessonRef = existingLessonDoc.ref;
        existingLessonData = existingLessonDoc.data();
      }
    }

    if(existingLessonRef){
      await existingLessonRef.update(lessonPayload);
    }else{
      await db.collection('lessons').add({
        ...lessonPayload,
        createdAt: today()
      });
    }

    if(stu){
      const wasCounted = existingLessonData?.status==='Toimunud';
      const isCounted = lStatus==='Toimunud';
      if(!existingLessonRef && isCounted){
        await db.collection('students').doc(stu.id).update({packageUsed:firebase.firestore.FieldValue.increment(1)});
      }else if(existingLessonRef && !wasCounted && isCounted){
        await db.collection('students').doc(stu.id).update({packageUsed:firebase.firestore.FieldValue.increment(1)});
      }else if(existingLessonRef && wasCounted && !isCounted){
        await db.collection('students').doc(stu.id).update({packageUsed:firebase.firestore.FieldValue.increment(-1)});
      }
    }

    setLTopic('');setLComment('');setModalEv(null);
    notify(existingLessonRef?'✓ Aruanne uuendatud!':'✓ Aruanne salvestatud!');
  },[modalEv,lTopic,lGrade,lStatus,lComment,lDur,students,user]);

  const addHw=useCallback(async()=>{
    if(!selStu||!hwTask.trim()){notify('⚠ Sisesta ülesanne');return;}
    await db.collection('homework').add({studentId:selStu.id,studentName:selStu.name,task:hwTask,due:hwDue,status:'Ootel',date:today()});
    setHwTask('');setHwDue('');notify('✓ Kodutöö saadetud!');
  },[selStu,hwTask,hwDue]);

  const toggleHw=useCallback(async(id,cur)=>await db.collection('homework').doc(id).update({status:cur==='Tehtud'?'Ootel':'Tehtud'}),[]);

  const delSchedule=useCallback(async(id,e)=>{
    e.stopPropagation();
    if(window.confirm('Kustuta tund?')) await db.collection('schedule').doc(id).delete();
  },[]);

  const toggleStudentActive=useCallback(async(id,cur)=>{
    await db.collection('students').doc(id).update({active:!cur});
    notify(cur?'✓ Õpilane arhiveeritud':'✓ Õpilane aktiveeritud');
  },[]);

  const deleteLesson=useCallback(async(lesson)=>{
    if(!lesson?.id) return;
    if(!window.confirm('Kustuta see päeviku sissekanne?')) return;
    await db.collection('lessons').doc(lesson.id).delete();
    if(lesson.studentId && lesson.studentId!=='ext' && lesson.status==='Toimunud'){
      await db.collection('students').doc(lesson.studentId).update({packageUsed:firebase.firestore.FieldValue.increment(-1)});
    }
    notify('✓ Tunni sissekanne kustutatud');
  },[]);

  const openLessonEditor=useCallback((lesson)=>{
    if(!lesson) return;
    setLTopic(lesson.topic||'');
    setLGrade(String(lesson.grade||'5'));
    setLStatus(lesson.status||'Toimunud');
    setLComment(lesson.comment||'');
    setLDur(String(lesson.duration||'60'));
    setModalEv({
      lessonEntryId: lesson.id,
      id: lesson.scheduleId||'',
      scheduleId: lesson.scheduleId||'',
      studentName: lesson.studentName,
      teacher: lesson.teacher||user.displayName,
      date: lesson.date||today(),
      occurrenceDate: lesson.date||today(),
      time: lesson.scheduleTime||'09:00',
      status: lesson.status||'Toimunud'
    });
  },[user]);

  const addInvoice=useCallback(async(stuId)=>{
    const sid=stuId||invStu;
    if(!invAmt||!sid){notify('⚠ Vali õpilane ja sisesta summa');return;}
    const stu=students.find(s=>s.id===sid);
    const num=`KS-${new Date().getFullYear()}-${String(invoices.length+1).padStart(3,'0')}`;
    const due=new Date(Date.now()+PAYMENT_DETAILS.paymentTermDays*864e5).toISOString().split('T')[0];
    await db.collection('invoices').add({
      studentId:sid,
      studentName:stu?.name||'—',
      amount:parseInt(invAmt),
      desc:invDesc||'Keeletunnid',
      num,
      status:'Ootel',
      date:today(),
      due,
      parentPaymentStatus:'pending',
      parentPaymentMethod:'',
      parentPaymentSubmittedAt:'',
      paymentReference:num
    });
    setInvAmt('');setInvDesc('');setInvStu('');
    notify('✓ Arve '+num+' loodud!');
  },[invStu,invAmt,invDesc,invoices,students]);

  const markPaid=useCallback(async id=>{
    await db.collection('invoices').doc(id).update({status:'Makstud',paidAt:today(),parentPaymentStatus:'confirmed'});
    notify('✓ Märgitud makstud!');
  },[]);

  const unmarkPaid=useCallback(async id=>{
    await db.collection('invoices').doc(id).update({
      status:'Ootel',
      paidAt:firebase.firestore.FieldValue.delete(),
      parentPaymentStatus:'pending',
      parentPaymentSubmittedAt:'',
      parentPaymentMethod:''
    });
    notify('✓ Makse tühistatud');
  },[]);

  const submitParentPayment=useCallback(async(id,method)=>{
    await db.collection('invoices').doc(id).update({
      parentPaymentStatus:'submitted',
      parentPaymentMethod:method||'bank',
      parentPaymentSubmittedAt:today()
    });
    notify('✓ Maksest teatatud!');
  },[]);

  const resetParentPayment=useCallback(async(id)=>{
    await db.collection('invoices').doc(id).update({
      parentPaymentStatus:'pending',
      parentPaymentSubmittedAt:'',
      parentPaymentMethod:''
    });
    notify('✓ Makseteavitus lähtestatud');
  },[]);

  const printInvoice=useCallback(inv=>{
    const stu=students.find(s=>s.id===inv.studentId);
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Arve ${inv.num}</title>
    <style>body{font-family:Georgia,serif;padding:60px;color:#1C2B3A;max-width:700px;margin:0 auto}
    .logo{font-size:2rem;font-weight:700}b{color:#C9882A}
    h1{font-size:1.4rem;border-bottom:2px solid #C9882A;padding-bottom:12px;margin:30px 0 20px}
    .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
    .total{font-size:1.3rem;font-weight:700;color:#2F5D50}
    .footer{margin-top:50px;font-size:.8rem;color:#666;text-align:center}
    </style></head><body>
    <div class="logo">Keele<b>Sepp</b></div>
    <div style="font-size:.85rem;color:#666">${PAYMENT_DETAILS.company} · Reg. kood ${PAYMENT_DETAILS.regCode}</div>
    <div style="font-size:.85rem;color:#666">${PAYMENT_DETAILS.address}</div>
    <div style="font-size:.85rem;color:#666">${PAYMENT_DETAILS.iban} · ${PAYMENT_DETAILS.bank} · SWIFT ${PAYMENT_DETAILS.swift}</div>
    <h1>ARVE ${inv.num}</h1>
    <div class="row"><span>Arve number:</span><span>${inv.num}</span></div>
    <div class="row"><span>Kuupäev:</span><span>${fmtDate(inv.date)}</span></div>
    <div class="row"><span>Tähtaeg:</span><span>${fmtDate(inv.due)}</span></div>
    <div class="row"><span>Maksetingimus:</span><span>${PAYMENT_DETAILS.paymentTermDays} kalendripäeva</span></div>
    <div class="row"><span>Viivis:</span><span>${PAYMENT_DETAILS.lateFeePerDay} päevas</span></div>
    <div class="row"><span>Õpilane:</span><span>${inv.studentName}</span></div>
    ${stu?.email?`<div class="row"><span>E-post:</span><span>${stu.email}</span></div>`:''}
    <div class="row"><span>Kirjeldus:</span><span>${inv.desc}</span></div>
    <div class="row"><span>Selgitus:</span><span>${inv.paymentReference||inv.num}</span></div>
    <div class="row total"><span>KOKKU:</span><span>${inv.amount} €</span></div>
    <p style="margin-top:30px;font-size:.85rem;color:#666">Palun tasuda arve tähtajaks ${fmtDate(inv.due)}.</p>
    <div class="footer">Koostaja: ${PAYMENT_DETAILS.issuer}</div>
    </body></html>`);
    w.document.close();setTimeout(()=>w.print(),500);
  },[students]);

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}><div className="spinner"/></div>;
  if(bootError) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'#F4F2EE'}}>
      <div className="card" style={{maxWidth:520,padding:28,textAlign:'center'}}>
        <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.8rem',marginBottom:12}}>Keele<span style={{color:'#C9882A'}}>Sepp</span></div>
        <div style={{fontWeight:600,fontSize:'1.05rem',marginBottom:10}}>Haldussusteemi ei saanud kaivitada</div>
        <p style={{color:'#42536A',marginBottom:18}}>{bootError}</p>
        <button className="btn btn-dark" onClick={()=>window.location.reload()}>Proovi uuesti</button>
      </div>
    </div>
  );
  if(!user) return <AuthScreen onLogin={u=>{setUser(u);if(u.role==='teacher')setFilterT(canonicalTeacherName(u.displayName||''));if(u.role==='admin')setFilterT('Kõik');}}/>;

  const navItems=[
    {id:'dashboard',icon:'fa-chart-pie',label:'Töölaud'},
    {id:'calendar', icon:'fa-calendar-days',label:'Tunniplaan'},
    {id:'students', icon:'fa-graduation-cap',label:isStaff?'Õpilased':'Minu progress',
      badge:isStaff&&homework.filter(h=>h.status==='Ootel'&&myStudents.some(s=>s.id===h.studentId)).length>0?
        homework.filter(h=>h.status==='Ootel'&&myStudents.some(s=>s.id===h.studentId)).length:0},
    ...(isStaff?[{id:'database',icon:'fa-table',label:'Andmebaas'}]:[]),
    ...(isStaff?[{id:'invoices',icon:'fa-file-invoice',label:'Arved',
      badge:invoices.filter(i=>i.status==='Ootel').reduce((a,i)=>a+i.amount,0)>0?invoices.filter(i=>i.status==='Ootel').reduce((a,i)=>a+i.amount,0)+'€':0}]:[]),
  ];

  const Sidebar=()=>(
    <>
      <div style={{borderBottom:'1px solid rgba(255,255,255,.1)',paddingBottom:16,marginBottom:8}}>
        <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.55rem',fontWeight:600,color:'#fff'}}>
          Keele<span style={{color:'#C9882A'}}>Sepp</span>
        </div>
        <div style={{fontSize:'.7rem',color:'rgba(255,255,255,.35)',marginTop:2,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase'}}>
          {user.role==='teacher'?'Õpetaja':user.role==='admin'?'Administraator':user.role==='parent'?'Lapsevanem':'Õpilane'}
        </div>
      </div>
      <div style={{fontSize:'.82rem',color:'rgba(255,255,255,.45)',padding:'0 14px 12px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        {user.displayName}
      </div>
      <nav style={{flex:1,display:'flex',flexDirection:'column',gap:2}}>
        {navItems.map(item=>(
          <button key={item.id} onClick={()=>goTab(item.id)} className={`sidebar-link ${tab===item.id?'active':''}`}>
            <i className={`fa-solid ${item.icon}`} style={{width:18,textAlign:'center'}}/>
            <span style={{flex:1}}>{item.label}</span>
            {item.badge>0&&<span style={{background:tab===item.id?'rgba(255,255,255,.25)':'#C9882A',color:'#fff',borderRadius:999,fontSize:'.7rem',fontWeight:700,padding:'1px 7px'}}>{item.badge}</span>}
          </button>
        ))}
      </nav>
      <div style={{borderTop:'1px solid rgba(255,255,255,.08)',paddingTop:12,marginTop:8}}>
        <button onClick={async()=>{await auth.signOut();setUser(null);}} className="sidebar-link" style={{color:'#fca5a5'}}>
          <i className="fa-solid fa-right-from-bracket" style={{width:18,textAlign:'center'}}/>
          Logi välja
        </button>
      </div>
    </>
  );

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <aside id="desktop-sidebar" style={{width:234,background:'#1C2B3A',display:'flex',flexDirection:'column',padding:'20px 12px',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}}>
        <Sidebar/>
      </aside>
      <aside id="mobile-sidebar" style={{position:'fixed',left:mobileNav?0:-240,top:0,width:234,height:'100vh',background:'#1C2B3A',display:'none',flexDirection:'column',padding:'20px 12px',zIndex:50,transition:'left .25s ease',overflowY:'auto',boxShadow:mobileNav?'4px 0 24px rgba(0,0,0,.3)':'none'}} className="scroll">
        <Sidebar/>
      </aside>

      <main style={{flex:1,overflowY:'auto',background:'#F4F2EE'}} className="scroll">
        <div id="mobile-header" style={{display:'none',alignItems:'center',justifyContent:'space-between',padding:'14px 20px',background:'#fff',borderBottom:'1px solid rgba(28,43,58,.08)',position:'sticky',top:0,zIndex:30}}>
          <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.3rem',fontWeight:600}}>Keele<span style={{color:'#C9882A'}}>Sepp</span></div>
          <button onClick={()=>setMobileNav(!mobileNav)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'1.3rem',color:'#1C2B3A',padding:'4px 8px'}}>{mobileNav?'✕':'☰'}</button>
        </div>

        <div style={{padding:'28px',maxWidth:1100,margin:'0 auto'}}>
          {notif&&<div style={{position:'fixed',top:20,right:20,background:'#1C2B3A',color:'#fff',padding:'12px 20px',borderRadius:12,zIndex:300,fontWeight:600,fontSize:'.9rem',boxShadow:'0 8px 28px rgba(0,0,0,.25)'}}>{notif}</div>}

          {tab==='dashboard'&&<Dashboard user={user} myStudents={myStudents} lessons={lessons} schedule={schedule} invoices={invoices} homework={homework}
            nName={nName} setNName={setNName} nEmail={nEmail} setNEmail={setNEmail} nPhone={nPhone} setNPhone={setNPhone}
            nLevel={nLevel} setNLevel={setNLevel} nTarget={nTarget} setNTarget={setNTarget}
            nPkg={nPkg} setNPkg={setNPkg} nSubject={nSubject} setNSubject={setNSubject} nGrade={nGrade} setNGrade={setNGrade} nGroup={nGroup} setNGroup={setNGroup} nTeach={nTeach} setNTeach={setNTeach}
            addStudent={addStudent} isAdmin={isAdmin} isStaff={isStaff}/>}

          {tab==='calendar'&&<CalendarView user={user} myStudents={myStudents} schedule={schedule} isAdmin={canAssignTeacher}
            filterT={filterT} setFilterT={setFilterT}
            schStu={schStu} setSchStu={setSchStu} schDate={schDate} setSchDate={setSchDate}
            schTime={schTime} setSchTime={setSchTime} schTeach={schTeach} setSchTeach={setSchTeach}
            schRecurring={schRecurring} setSchRecurring={setSchRecurring}
            addSchedule={addSchedule} setModalEv={setModalEv} delSchedule={delSchedule}/>}

          {tab==='students'&&isStaff&&!selStu&&<StudentsList filteredStudents={filteredStudents} lessons={lessons} isAdmin={canAssignTeacher}
            search={search} setSearch={setSearch} stuFilter={stuFilter} setStuFilter={setStuFilter} setSelStu={setSelStu}/>}

          {tab==='students'&&(!isStaff||(isStaff&&selStu))&&<StudentCard
            setEditStu={setEditStu}
            user={user} currentStu={currentStu} stuLessons={stuLessons} stuHw={stuHw} stuInv={stuInv}
            isAdmin={canAssignTeacher} setSelStu={setSelStu} toggleStudentActive={toggleStudentActive}
            hwTask={hwTask} setHwTask={setHwTask} hwDue={hwDue} setHwDue={setHwDue} addHw={addHw} toggleHw={toggleHw}
            invAmt={invAmt} setInvAmt={setInvAmt} invDesc={invDesc} setInvDesc={setInvDesc}
            addInvoice={addInvoice} markPaid={markPaid} unmarkPaid={unmarkPaid} printInvoice={printInvoice} submitParentPayment={submitParentPayment} resetParentPayment={resetParentPayment} deleteLesson={deleteLesson} openLessonEditor={openLessonEditor}/>}

          {tab==='database'&&isStaff&&<StudentsDatabaseView
            filteredStudents={filteredStudents}
            lessons={lessons}
            invoices={invoices}
            isAdmin={canAssignTeacher}
            search={search}
            setSearch={setSearch}
            stuFilter={stuFilter}
            setStuFilter={setStuFilter}
            groupFilter={groupFilter}
            setGroupFilter={setGroupFilter}
            groupOptions={groupOptions}
            contactFilter={contactFilter}
            setContactFilter={setContactFilter}
            openStudent={student=>{setSelStu(student);setTab('students');}}
            setEditStu={setEditStu}
            user={user}
            nName={nName}
            setNName={setNName}
            nEmail={nEmail}
            setNEmail={setNEmail}
            nPhone={nPhone}
            setNPhone={setNPhone}
            nLevel={nLevel}
            setNLevel={setNLevel}
            nTarget={nTarget}
            setNTarget={setNTarget}
            nSubject={nSubject}
            setNSubject={setNSubject}
            nGrade={nGrade}
            setNGrade={setNGrade}
            nGroup={nGroup}
            setNGroup={setNGroup}
            nPkg={nPkg}
            setNPkg={setNPkg}
            nTeach={nTeach}
            setNTeach={setNTeach}
            addStudent={addStudent}
          />}

          {tab==='invoices'&&isStaff&&<InvoicesView invoices={invoices} myStudents={myStudents}
            invStu={invStu} setInvStu={setInvStu} invAmt={invAmt} setInvAmt={setInvAmt}
            invDesc={invDesc} setInvDesc={setInvDesc} addInvoice={addInvoice} markPaid={markPaid} unmarkPaid={unmarkPaid} printInvoice={printInvoice}/>}
        </div>
      </main>

      {editStu&&<EditStudentModal student={editStu} onClose={()=>setEditStu(null)} onSave={()=>{setEditStu(null);}} onDelete={()=>{setEditStu(null);setSelStu(null);}} db={db} notify={notify} isAdmin={isAdmin}/>}
      {modalEv&&<LessonModal modalEv={modalEv} setModalEv={setModalEv}
        lTopic={lTopic} setLTopic={setLTopic} lGrade={lGrade} setLGrade={setLGrade}
        lStatus={lStatus} setLStatus={setLStatus}        lComment={lComment} setLComment={setLComment}
        lDur={lDur} setLDur={setLDur} saveLesson={saveLesson}/>}
    </div>
  );
}

window.__haldusBooted = true;
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<style>
@media(min-width:768px){#desktop-sidebar{display:flex!important}#mobile-sidebar{display:none!important}#mobile-header{display:none!important}}
@media(max-width:767px){#desktop-sidebar{display:none!important}#mobile-sidebar{display:flex!important}#mobile-header{display:flex!important}}
</style>
</body>
</html>
