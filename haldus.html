/* Lihtsustatud progressigraafik (SVG, ei vaja recharts) */
function ProgressChart({lessons}){
  const data=[...lessons].reverse().slice(-10).map(l=>l.grade);
  if(data.length<2) return <div className="py-8 text-center text-xs text-gray-300">Graafikuks vajatakse vähemalt 2 tundi</div>;
  const W=300,H=100,P=20;
  const xs=data.map((_,i)=>P+i*((W-2*P)/(data.length-1)));
  const ys=data.map(v=>H-P-((v-1)/4)*(H-2*P));
  const pts=data.map((_,i)=>`${xs[i]},${ys[i]}`).join(' ');
  return(
    <div className="overflow-hidden">
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
        {[1,2,3,4,5].map(v=>{
          const y=H-P-((v-1)/4)*(H-2*P);
          return <line key={v} x1={P} y1={y} x2={W-P} y2={y} stroke="#f3f4f6" strokeWidth="1"/>;
        })}
        <text x={P-2} y={P+2} fontSize="8" fill="#9ca3af" textAnchor="end">5</text>
        <text x={P-2} y={H-P+3} fontSize="8" fill="#9ca3af" textAnchor="end">1</text>
        <polyline points={pts} fill="none" stroke="#f59e0b" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((_,i)=><circle key={i} cx={xs[i]} cy={ys[i]} r="4" fill="#f59e0b"/>)}
      </svg>
    </div>
  );
}

/* Oskuste tulpgraafik */
function SkillBars({lessons}){
  const skills=["Lugemine","Kirjutamine","Kuulamine","Rääkimine","Grammatika"];
  const recent=lessons.slice(0,3);
  if(!recent.length) return null;
  const avg=sk=>Math.round(recent.reduce((a,l)=>a+(l.skills?.[sk]||l.grade||3),0)/recent.length);
  return(
    <div className="grid grid-cols-5 gap-2 mt-2">
      {skills.map(sk=>{const v=avg(sk);return(
        <div key={sk} className="text-center">
          <div className="text-xs text-gray-400 mb-1 leading-tight" style={{fontSize:"10px"}}>{sk}</div>
          <div className="h-16 bg-gray-100 rounded-lg overflow-hidden flex items-end">
            <div className="w-full bg-amber-400 rounded-b-lg transition-all" style={{height:`${v/5*100}%`}}/>
          </div>
          <div className="text-xs font-bold text-gray-500 mt-1">{v}/5</div>
        </div>
      );})}
    </div>
  );
}

        </div>
        <div className="px-5 py-4 space-y-3">{children}</div>

          <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-500 py-2.5 rounded-xl text-sm hover:bg-gray-50">Tühista</button>
          <button onClick={onSave} className="flex-1 bg-gray-900 text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-gray-700">{saveLabel}</button>
        </div>
      </div>
    </div>
  );
}

          <button onClick={()=>{setNh(p=>({...p,by:s.teacher}));setMH(true);}} className="py-2.5 rounded-xl text-xs font-semibold bg-violet-50 text-violet-700 hover:bg-violet-100">+ Kodutöö</button>

        </div>
        <div className="flex gap-1 bg-gray-100 rounded-xl p-1 mb-4">
          {[{id:"diary",l:"Päevik"},{id:"progress",l:"Progress"},{id:"hw",l:`Kodutöö (${sh.length})`},{id:"inv",l:"Arved"}].map(t=>(
            <button key={t.id} onClick={()=>setDtab(t.id)} className={`flex-1 py-2 rounded-lg text-xs font-semibold transition-colors ${dtab===t.id?"bg-white text-gray-900 shadow-sm":"text-gray-400"}`}>{t.l}</button>

        </div>
        {dtab==="diary"&&<div className="bg-white rounded-xl border border-gray-100 shadow-sm">
          {sl.length===0?<div className="py-8 text-center text-gray-300 text-sm">Tunnid puuduvad</div>:sl.map(l=>(

                <span className="text-sm font-medium text-gray-800">{l.topic}</span>
                <div className="flex items-center gap-1.5"><Stars g={l.grade}/>{l.paid?<Ic n="check" s={12} c="#4ade80"/>:<Ic n="alert" s={12} c="#fbbf24"/>}</div>

        {dtab==="progress"&&<div className="space-y-3">
          <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">

      </div>

  /* — Kalender — */
  const CalView=()=>{
    const COLS=["E, 9.","T, 10.","K, 11.","N, 12.","R, 13."];
    const HOURS=["09","10","11","12","13","14","15","16","17","18"];
    const cc={Pavel:"bg-blue-100 text-blue-700",Jelena:"bg-emerald-100 text-emerald-700",Elizaveta:"bg-violet-100 text-violet-700"};
    return(
      <div className="p-5">
        <div className="flex items-center justify-between mb-4">
          <h1 className="text-xl font-bold text-gray-900">Nädala tunniplaan</h1>
          <span className="text-xs text-gray-400 bg-white border rounded-xl px-3 py-1.5">9.–13. juuni 2026</span>
        </div>
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-auto">
          <div className="grid min-w-[520px]" style={{gridTemplateColumns:"44px repeat(5,1fr)"}}>
            <div className="border-b border-r p-2"/>
            {COLS.map((c,i)=><div key={c} className={`border-b border-r p-2 text-center text-xs font-semibold ${i===4?"bg-blue-50 text-blue-700":"text-gray-400"}`}>{c}</div>)}
            {HOURS.map(h=>[0,1,2,3,4,5].map(col=>(
              <div key={`${h}-${col}`} className={`border-b border-r min-h-11 ${col===5?"bg-blue-50/20":""}`}>
                {col===0?<div className="p-1 text-xs text-gray-200 font-mono">{h}:00</div>:(()=>{
                  const evs=SCH.filter(e=>e.day===col-1&&e.time.startsWith(h));
                  return evs.map((e,i)=>{const st=students.find(s=>s.id===e.sId);return(
                    <div key={i} className={`m-0.5 p-1 rounded text-xs font-medium leading-tight ${cc[e.t]||"bg-gray-100 text-gray-600"}`}>
                      <div className="truncate">{st?.name?.split(" ")[0]||"?"}</div>
                      <div className="opacity-60 truncate text-xs">{e.t}</div>
                    </div>
                  );});
                })()}
              </div>
            )))}
          </div>
        </div>
        <div className="mt-3 bg-amber-50 border border-amber-100 rounded-xl p-3 text-xs text-amber-700">
          <strong>Google Calendar:</strong> täieliku sünkroniseerimiseks lisa Google Calendar API backend. Praegu kuvatakse demo andmed.
        </div>
      </div>
    );
  };

  /* — Kodutöö ülevaade — */
  const HWView=()=>{
    const submitted=homework.filter(h=>h.status==="submitted");
    const pending=homework.filter(h=>h.status==="pending");
    const done=homework.filter(h=>h.status==="done");
    return(
      <div className="p-5 max-w-2xl mx-auto">
        <h1 className="text-xl font-bold text-gray-900 mb-5">Kodutööd</h1>
        <div className="grid grid-cols-3 gap-3 mb-5">
          {[{l:"Ootel",v:pending.length,c:"bg-amber-50 text-amber-700"},{l:"Esitatud",v:submitted.length,c:"bg-blue-50 text-blue-700"},{l:"Tehtud",v:done.length,c:"bg-green-50 text-green-700"}].map(x=>(
            <div key={x.l} className={`rounded-xl p-3 ${x.c}`}><div className="text-xl font-bold">{x.v}</div><div className="text-xs opacity-70">{x.l}</div></div>
          ))}
        </div>
        {submitted.length>0&&(
          <div className="bg-white rounded-xl border border-blue-100 shadow-sm mb-4">
            <div className="px-4 py-3 border-b text-sm font-semibold text-blue-700">🔔 Esitatud — ootel kontrolli</div>
            {submitted.map(h=>{const st=students.find(s=>s.id===h.sId);return(
              <div key={h.id} className="px-4 py-3 border-b last:border-0">
                <div className="flex items-start justify-between gap-2 mb-1">
                  <div>
                    <div className="text-sm font-semibold text-gray-800">{h.title}</div>
                    <div className="text-xs text-gray-400">{st?.name} · tähtaeg {h.due}</div>
                    {h.answer&&<div className="text-xs text-blue-600 bg-blue-50 rounded-xl p-2 mt-1.5">„{h.answer}"</div>}
                  </div>
                  <button onClick={()=>markHWDone(h.id)} className="bg-green-100 text-green-700 text-xs font-semibold px-3 py-1.5 rounded-xl hover:bg-green-200 flex-shrink-0">✓ OK</button>
                </div>
              </div>
            );})}
          </div>
        )}
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm">
          <div className="px-4 py-3 border-b text-sm font-semibold text-gray-700">Kõik kodutööd</div>

            const st=students.find(s=>s.id===h.sId);
            return(
              <div key={h.id} className="px-4 py-3 border-b last:border-0 flex items-center justify-between">
                <div><div className="text-sm font-medium text-gray-800">{h.title}</div><div className="text-xs text-gray-400">{st?.name} · {h.due} · {h.by}</div></div>
                <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${h.status==="done"?"bg-green-100 text-green-700":h.status==="submitted"?"bg-blue-100 text-blue-700":"bg-amber-100 text-amber-700"}`}>
                  {h.status==="done"?"Tehtud":h.status==="submitted"?"Esitatud":"Ootel"}
                </span>
              </div>
            );
          })}
        </div>
      </div>

  /* — Arved — */
  const InvView=()=>{
    const t={unpaid:invoices.filter(i=>i.status==="unpaid").reduce((a,i)=>a+i.amount,0),overdue:invoices.filter(i=>i.status==="overdue").reduce((a,i)=>a+i.amount,0),paid:invoices.filter(i=>i.status==="paid").reduce((a,i)=>a+i.amount,0)};

                  <div className="font-bold text-gray-800 text-sm">{inv.amount}€</div>
                  <div className="flex items-center gap-1.5 mt-1 justify-end">
                    <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${inv.status==="paid"?"bg-green-100 text-green-700":inv.status==="overdue"?"bg-red-100 text-red-600":"bg-amber-100 text-amber-700"}`}>
                      {inv.status==="paid"?"Makstud":inv.status==="overdue"?"Hilinenud":"Ootel"}

                  </div>
                </div>
              </div>

          })}
        </div>
      </div>
    );

    <div className="flex h-screen bg-gray-50 overflow-hidden text-sm" style={{fontFamily:"IBM Plex Sans,system-ui,sans-serif"}}>
      <aside className="w-48 bg-white border-r border-gray-100 flex flex-col flex-shrink-0 shadow-sm">
        <div className="px-4 py-4 border-b">
          <div className="font-bold text-base" style={{fontFamily:"Georgia,serif"}}>Keele<span className="text-amber-500">Sepp</span></div>

        </div>
        <nav className="flex-1 p-2.5 space-y-1">
          {NAV.map(({id,l,icon,badge})=>(
            <button key={id} onClick={()=>{setTab(id);setSel(null);}} className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${tab===id?"bg-gray-900 text-white":"text-gray-500 hover:bg-gray-100"}`}>

            </button>

        <div className="px-4 py-3 border-t">
          <div className="flex items-center gap-2 mb-2">
            <div className="w-7 h-7 rounded-full bg-amber-100 flex items-center justify-center text-amber-700 font-bold text-xs">{user.name[0]}</div>
            <div><div className="text-xs font-semibold text-gray-700">{user.name}</div><div className="text-xs text-gray-400">Õpetaja</div></div>
          </div>
          <button onClick={doLogout} className="w-full flex items-center justify-center gap-1.5 text-xs text-gray-400 hover:text-red-500 border border-gray-100 rounded-xl py-1.5 transition-colors">

          </button>
        </div>

        {tab==="dashboard"&&<Dashboard/>}
        {tab==="students"&&!sel&&<StudentsList/>}

        {tab==="calendar"&&<CalView/>}
        {tab==="homework"&&<HWView/>}
        {tab==="invoices"&&<InvView/>}

      {mL&&<Modal title={`Lisa tund — ${sel?.name}`} onClose={()=>setML(false)} onSave={doAddLesson} saveLabel="Lisa tund">
        <Fld label="TEEMA *"><input value={nl.topic} onChange={e=>setNl({...nl,topic:e.target.value})} placeholder="nt. Käänded — omastav" className={inp}/></Fld>
        <div className="grid grid-cols-2 gap-3">
          <Fld label="KESTUS (min)"><select value={nl.dur} onChange={e=>setNl({...nl,dur:parseInt(e.target.value)})} className={inp}>{[30,45,60,90].map(v=><option key={v}>{v}</option>)}</select></Fld>

        <Fld label="HINNE">
          <div className="flex gap-2">{[1,2,3,4,5].map(g=><button key={g} onClick={()=>setNl({...nl,grade:g})} className={`flex-1 py-2 rounded-xl text-sm font-bold ${nl.grade===g?"bg-amber-400 text-white":"bg-gray-100 text-gray-400 hover:bg-gray-200"}`}>{g}</button>)}</div>
        </Fld>
        <Fld label="MÄRKUSED"><textarea value={nl.notes} onChange={e=>setNl({...nl,notes:e.target.value})} placeholder="Kommentaar…" className={`${inp} resize-none h-16`}/></Fld>
        <Fld label="MAKSTUD?"><select value={nl.paid?"yes":"no"} onChange={e=>setNl({...nl,paid:e.target.value==="yes"})} className={inp}><option value="no">Ei ole makstud</option><option value="yes">Makstud</option></select></Fld>
      </Modal>}

      {mS&&<Modal title="Lisa uus õpilane" onClose={()=>setMS(false)} onSave={doAddStudent} saveLabel="Lisa õpilane">

        </div>
        <Fld label="E-POST"><input value={ns.email} onChange={e=>setNs({...ns,email:e.target.value})} type="email" className={inp}/></Fld>
        <Fld label="TELEFON"><input value={ns.phone} onChange={e=>setNs({...ns,phone:e.target.value})} className={inp}/></Fld>
        <Fld label="VANEMA NIMI"><input value={ns.parent} onChange={e=>setNs({...ns,parent:e.target.value})} className={inp}/></Fld>
        <Fld label="PAROOL"><input value={ns.pass} onChange={e=>setNs({...ns,pass:e.target.value})} placeholder="1234" className={inp}/></Fld>
      </Modal>}

      {mI&&<Modal title="Loo arve" onClose={()=>setMI(false)} onSave={doAddInv} saveLabel="Loo arve">
        <Fld label="ÕPILANE *"><select value={ni.sId} onChange={e=>setNi({...ni,sId:e.target.value})} className={inp}><option value="">Vali õpilane…</option>{students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></Fld>
        <Fld label="SUMMA (€) *"><input value={ni.amount} onChange={e=>setNi({...ni,amount:e.target.value})} type="number" className={inp}/></Fld>
        <Fld label="KIRJELDUS"><input value={ni.desc} onChange={e=>setNi({...ni,desc:e.target.value})} placeholder="Keeletunnid juuni 2026" className={inp}/></Fld>
      </Modal>}

      {mH&&<Modal title={`Lisa kodutöö — ${sel?.name}`} onClose={()=>setMH(false)} onSave={doAddHW} saveLabel="Määra kodutöö">
        <Fld label="PEALKIRI *"><input value={nh.title} onChange={e=>setNh({...nh,title:e.target.value})} placeholder="nt. Käänded — kordamine" className={inp}/></Fld>
        <Fld label="ÜLESANDE KIRJELDUS"><textarea value={nh.desc} onChange={e=>setNh({...nh,desc:e.target.value})} placeholder="Mida täpselt teha?" className={`${inp} resize-none h-20`}/></Fld>
        <Fld label="TÄHTAEG *"><input type="date" value={nh.due} onChange={e=>setNh({...nh,due:e.target.value})} className={inp}/></Fld>
      </Modal>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('r'));
root.render(React.createElement(App,null));
</script>
</body>
</html>
