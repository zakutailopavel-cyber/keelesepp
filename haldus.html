<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;
const db   = window._db;
const auth = window._auth;

// ─── KONSTANTID ───────────────────────────────────────────────
const TEACHERS = ['Pavel','Jelena','Elizaveta','Angelina'];
const LEVELS   = ['A1','A2','B1','B2','C1'];
const DAYS = [{id:'Mon',n:'Esmaspäev'},{id:'Tue',n:'Teisipäev'},{id:'Wed',n:'Kolmapäev'},
              {id:'Thu',n:'Neljapäev'},{id:'Fri',n:'Reede'},{id:'Sat',n:'Laupäev'},{id:'Sun',n:'Pühapäev'}];
const TIMES = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];

// ─── ABIFUNKTSIOONID ──────────────────────────────────────────
const levelPct = (cur,tgt) => {
  const ci=LEVELS.indexOf(cur), ti=LEVELS.indexOf(tgt);
  if(ci<0||ti<=0||ci>=ti) return 100;
  return Math.round((ci/ti)*100);
};
const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : '—';
const fmtDate = d => d ? new Date(d).toLocaleDateString('et-EE') : '—';

// ─── PROGRESSI GRAAFIK ────────────────────────────────────────
function ProgressChart({data}) {
  const ref = useRef(null);
  useEffect(()=>{
    if(!ref.current||!data.length) return;
    const sorted=[...data].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const ch=new Chart(ref.current.getContext('2d'),{
      type:'line',
      data:{
        labels:sorted.map(d=>fmtDate(d.date)),
        datasets:[{
          label:'Hinne',data:sorted.map(d=>d.grade),
          borderColor:'#C9882A',backgroundColor:'rgba(201,136,42,0.06)',
          borderWidth:3,tension:0.4,fill:true,
          pointBackgroundColor:'#2F5D50',pointRadius:5,pointHoverRadius:7
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{min:1,max:5,ticks:{stepSize:1,callback:v=>['','★','★★','★★★','★★★★','★★★★★'][v]||v}}}
      }
    });
    return ()=>ch.destroy();
  },[data]);
  return <div style={{height:220}}><canvas ref={ref}/></div>;
}

// ─── LOGIN / REGISTER ─────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [mode,  setMode]  = useState('login'); // login | register | forgot
  const [rtype, setRtype] = useState('email'); // email | google
  const [role,  setRole]  = useState('teacher');
  const [name,  setName]  = useState('');
  const [email, setEmail] = useState('');
  const [pass,  setPass]  = useState('');
  const [pass2, setPass2] = useState('');
  const [childName, setChildName] = useState('');
  const [err,   setErr]   = useState('');
  const [info,  setInfo]  = useState('');
  const [loading,setLoading]=useState(false);

  // Demo login (без Firebase Auth — по имени)
  const demoLogin = () => {
    setErr('');
    const demos = {
      Pavel:'teacher',Jelena:'teacher',Elizaveta:'teacher',Angelina:'teacher',
      Marina:'student',Aleksei:'student',Olga:'student',Dmitri:'student',Natalia:'student'
    };
    if(demos[name] && pass==='1234'){
      onLogin({uid:'demo_'+name,displayName:name,email:name+'@demo.ks',role:demos[name],isDemo:true});
    } else { setErr('Vale nimi/parool. Demo: nimi + parool 1234'); }
  };

  // Google Sign-In
  const googleLogin = async () => {
    setErr(''); setLoading(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const res = await auth.signInWithPopup(provider);
      const u = res.user;
      // Контролируем роль из Firestore
      const snap = await db.collection('users').doc(u.uid).get();
      if(snap.exists){
        const data = snap.data();
        onLogin({uid:u.uid,displayName:u.displayName,email:u.email,...data});
      } else {
        // Новый пользователь через Google — создаём как родитель
        const userData = {role:'parent',displayName:u.displayName,email:u.email,childName:'',createdAt:new Date().toISOString()};
        await db.collection('users').doc(u.uid).set(userData);
        onLogin({uid:u.uid,displayName:u.displayName,email:u.email,...userData});
      }
    } catch(e){ setErr('Google sisselogimine ebaõnnestus: '+e.message); }
    setLoading(false);
  };

  // Email register
  const register = async () => {
    setErr('');
    if(!name.trim()||!email.trim()||!pass.trim()){ setErr('Täida kõik väljad'); return; }
    if(pass!==pass2){ setErr('Paroolid ei ühti'); return; }
    if(pass.length<6){ setErr('Parool peab olema vähemalt 6 tähemärki'); return; }
    setLoading(true);
    try {
      const res = await auth.createUserWithEmailAndPassword(email,pass);
      await res.user.updateProfile({displayName:name});
      const userData = {role,displayName:name,email,childName: role==='parent'?childName:'',createdAt:new Date().toISOString()};
      await db.collection('users').doc(res.user.uid).set(userData);
      onLogin({uid:res.user.uid,displayName:name,email,...userData});
    } catch(e){
      const msgs={'auth/email-already-in-use':'See e-post on juba registreeritud','auth/invalid-email':'Vigane e-posti aadress'};
      setErr(msgs[e.code]||e.message);
    }
    setLoading(false);
  };

  // Email login
  const emailLogin = async () => {
    setErr(''); setLoading(true);
    try {
      const res = await auth.signInWithEmailAndPassword(email,pass);
      const snap = await db.collection('users').doc(res.user.uid).get();
      if(snap.exists){
        onLogin({uid:res.user.uid,displayName:res.user.displayName||email,...snap.data()});
      } else {
        onLogin({uid:res.user.uid,displayName:res.user.displayName||email,email,role:'parent'});
      }
    } catch(e){
      const msgs={'auth/user-not-found':'Kasutaja ei leitud','auth/wrong-password':'Vale parool','auth/invalid-credential':'Vale e-post või parool'};
      setErr(msgs[e.code]||e.message);
    }
    setLoading(false);
  };

  // Forgot password
  const forgot = async () => {
    if(!email){ setErr('Sisesta e-posti aadress'); return; }
    setLoading(true);
    try {
      await auth.sendPasswordResetEmail(email);
      setInfo('Parooli taastamise link saadetud e-postile '+email);
      setErr('');
    } catch(e){ setErr(e.message); }
    setLoading(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'linear-gradient(135deg,#1C2B3A 0%,#2F5D50 100%)'}}>
      <div style={{background:'#FBFAF8',borderRadius:24,padding:'40px 36px',width:'100%',maxWidth:420,boxShadow:'0 24px 60px rgba(0,0,0,0.25)'}}>
        
        {/* Logo */}
        <div className="text-center mb-8">
          <div style={{fontSize:'2rem',fontFamily:'Fraunces,Georgia,serif',fontWeight:600,marginBottom:4}}>
            Keele<span style={{color:'#C9882A'}}>Sepp</span>
          </div>
          <div style={{fontSize:'.8rem',color:'#42536A'}}>
            {mode==='login'?'Sisselogimine':mode==='register'?'Uue konto loomine':'Parooli taastamine'}
          </div>
        </div>

        {/* Demo login box */}
        {mode==='login' && (
          <div style={{background:'#EFEDE7',borderRadius:14,padding:'14px 16px',marginBottom:20}}>
            <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:8}}>⚡ Demo sisselogimine</div>
            <div className="flex gap-2">
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nimi (nt. Pavel)"
                onKeyDown={e=>e.key==='Enter'&&demoLogin()} style={{flex:1}}/>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="1234"
                onKeyDown={e=>e.key==='Enter'&&demoLogin()} style={{width:80}}/>
            </div>
            <button onClick={demoLogin} className="btn btn-dark" style={{width:'100%',marginTop:10,borderRadius:10}}>
              Sisene demo kontoga
            </button>
            <div style={{fontSize:'.72rem',color:'#42536A',marginTop:8,textAlign:'center'}}>
              Õpetajad: Pavel·Jelena·Elizaveta | Õpilased: Marina·Aleksei | Parool: 1234
            </div>
          </div>
        )}

        {/* Divider */}
        {mode==='login' && (
          <div className="flex items-center gap-3 mb-5">
            <div style={{flex:1,height:1,background:'rgba(28,43,58,.12)'}}/>
            <span style={{fontSize:'.78rem',color:'#42536A'}}>või päris kontoga</span>
            <div style={{flex:1,height:1,background:'rgba(28,43,58,.12)'}}/>
          </div>
        )}

        {/* Register role selector */}
        {mode==='register' && (
          <div className="flex mb-5" style={{background:'#EFEDE7',borderRadius:12,padding:4}}>
            {[{id:'parent',l:'Lapsevanem'},{id:'student',l:'Õpilane'}].map(r=>(
              <button key={r.id} onClick={()=>setRole(r.id)}
                style={{flex:1,padding:'9px 0',borderRadius:9,border:'none',cursor:'pointer',fontWeight:600,fontSize:'.88rem',transition:'all .15s',
                  background:role===r.id?'#1C2B3A':'transparent',color:role===r.id?'#fff':'#42536A'}}>
                {r.l}
              </button>
            ))}
          </div>
        )}

        {/* Form fields */}
        <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:16}}>
          {mode==='register' && (
            <input value={name} onChange={e=>setName(e.target.value)} placeholder={role==='parent'?'Teie täisnimi *':'Teie täisnimi *'}/>
          )}
          {mode!=='login' || rtype==='email' ? (
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-posti aadress *"/>
          ):null}
          {mode==='login' && rtype==='email' && (
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&emailLogin()} placeholder="Parool *"/>
          )}
          {mode==='register' && <>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Parool (min 6 tähemärki) *"/>
            <input type="password" value={pass2} onChange={e=>setPass2(e.target.value)} placeholder="Korda parooli *"/>
            {role==='parent' && (
              <input value={childName} onChange={e=>setChildName(e.target.value)} placeholder="Lapse nimi (õpilane KeeleSepis)"/>
            )}
          </>}
          {mode==='forgot' && (
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-posti aadress *"/>
          )}
        </div>

        {err  && <div style={{background:'#fee2e2',color:'#991b1b',borderRadius:10,padding:'10px 14px',fontSize:'.85rem',marginBottom:14}}>{err}</div>}
        {info && <div style={{background:'#dcfce7',color:'#166534',borderRadius:10,padding:'10px 14px',fontSize:'.85rem',marginBottom:14}}>{info}</div>}

        {/* Main action */}
        {mode==='login' && rtype==='email' && (
          <button onClick={emailLogin} disabled={loading} className="btn btn-dark" style={{width:'100%',borderRadius:12}}>
            {loading?'Laeb…':'Sisene e-postiga'}
          </button>
        )}
        {mode==='register' && (
          <button onClick={register} disabled={loading} className="btn btn-dark" style={{width:'100%',borderRadius:12}}>
            {loading?'Laeb…':'Loo konto'}
          </button>
        )}
        {mode==='forgot' && (
          <button onClick={forgot} disabled={loading} className="btn btn-pine" style={{width:'100%',borderRadius:12}}>
            {loading?'Laeb…':'Saada taastamislink'}
          </button>
        )}

        {/* Google */}
        {(mode==='login'||mode==='register') && (
          <button onClick={googleLogin} disabled={loading}
            style={{width:'100%',marginTop:10,padding:'11px',borderRadius:12,border:'1.5px solid rgba(28,43,58,.15)',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontWeight:600,fontSize:'.9rem'}}>
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
            {mode==='register'?'Registreeru Google\'iga':'Sisene Google\'iga'}
          </button>
        )}

        {/* Footer links */}
        <div style={{marginTop:20,textAlign:'center',fontSize:'.82rem',color:'#42536A'}}>
          {mode==='login' && <>
            <span>Pole kontot? </span>
            <button onClick={()=>{setMode('register');setErr('');setInfo('');}} style={{color:'#C9882A',fontWeight:600,background:'none',border:'none',cursor:'pointer'}}>Registreeru</button>
            <span> · </span>
            <button onClick={()=>{setMode('forgot');setErr('');setInfo('');}} style={{color:'#42536A',background:'none',border:'none',cursor:'pointer'}}>Unustasid parooli?</button>
          </>}
          {mode!=='login' && (
            <button onClick={()=>{setMode('login');setErr('');setInfo('');}} style={{color:'#C9882A',fontWeight:600,background:'none',border:'none',cursor:'pointer'}}>
              ← Tagasi sisselogimisele
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── PÕHIRAKENDUS ─────────────────────────────────────────────
function App() {
  const [user,    setUser]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab,     setTab]     = useState('dashboard');
  const [selStu,  setSelStu]  = useState(null);
  const [filterT, setFilterT] = useState('Pavel');
  const [modalEv, setModalEv] = useState(null);
  const [search,  setSearch]  = useState('');
  const [notif,   setNotif]   = useState('');

  // Firestore data
  const [students,  setStu]  = useState([]);
  const [lessons,   setLes]  = useState([]);
  const [homework,  setHw]   = useState([]);
  const [schedule,  setSch]  = useState([]);
  const [invoices,  setInv]  = useState([]);

  // Forms — uus õpilane
  const [nName,  setNName]  = useState('');
  const [nLevel, setNLevel] = useState('A1');
  const [nTarget,setNTarget]= useState('B1');
  const [nTeach, setNTeach] = useState('Pavel');
  const [nPhone, setNPhone] = useState('');
  const [nEmail, setNEmail] = useState('');

  // Forms — tund
  const [lTopic,   setLTopic]   = useState('');
  const [lGrade,   setLGrade]   = useState('5');
  const [lStatus,  setLStatus]  = useState('Toimunud');
  const [lComment, setLComment] = useState('');
  const [lDur,     setLDur]     = useState('60');

  // Forms — kodutöö
  const [hwTask, setHwTask] = useState('');
  const [hwDue,  setHwDue]  = useState('');

  // Forms — tunniplaan
  const [schStu,   setSchStu]   = useState('');
  const [schDay,   setSchDay]   = useState('Mon');
  const [schTime,  setSchTime]  = useState('09:00');
  const [schTeach, setSchTeach] = useState('Pavel');

  // Forms — arve
  const [invAmt,  setInvAmt]  = useState('');
  const [invDesc, setInvDesc] = useState('');
  const [invStu,  setInvStu]  = useState('');

  // ── AUTH STATE ─────────────────────────────────────────────
  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        const snap = await db.collection('users').doc(fbUser.uid).get();
        if(snap.exists){
          setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,...snap.data()});
        }
      }
      setLoading(false);
    });
    return unsub;
  },[]);

  // ── FIRESTORE KUULAMINE ────────────────────────────────────
  useEffect(()=>{
    if(!user) return;
    const u1=db.collection('students').onSnapshot(s=>setStu(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=db.collection('lessons').onSnapshot(s=>setLes(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3=db.collection('homework').onSnapshot(s=>setHw(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u4=db.collection('schedule').onSnapshot(s=>setSch(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u5=db.collection('invoices').onSnapshot(s=>setInv(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();u4();u5();};
  },[user]);

  const notify = msg=>{ setNotif(msg); setTimeout(()=>setNotif(''),3000); };

  // ── TEGEVUSED ──────────────────────────────────────────────
  const addStudent = async()=>{
    if(!nName.trim()) return;
    const t = user.role==='teacher'&&user.displayName==='Pavel' ? nTeach : user.displayName;
    await db.collection('students').add({
      name:nName,level:nLevel,targetLevel:nTarget,teacher:t,
      phone:nPhone,email:nEmail,active:true,createdAt:new Date().toISOString()
    });
    setNName('');setNPhone('');setNEmail('');
    notify('✓ Õpilane '+nName+' lisatud!');
  };

  const addSchedule = async()=>{
    if(!schStu) return;
    const t = user.displayName==='Pavel' ? schTeach : user.displayName;
    await db.collection('schedule').add({teacher:t,studentName:schStu,day:schDay,time:schTime});
    setSchStu(''); notify('✓ Tund broneeritud!');
  };

  const saveLesson = async()=>{
    if(!modalEv||!lTopic.trim()) return;
    const stu=students.find(s=>s.name.toLowerCase()===modalEv.studentName.toLowerCase());

          {/* Kodutöö */}
          <div className="card" style={{padding:24}}>
            <h3 style={{marginBottom:16}}>📝 Kodutööd</h3>
            {user.role==='teacher'&&(
              <div style={{marginBottom:14,display:'flex',flexDirection:'column',gap:8}}>
                <input value={hwTask} onChange={e=>setHwTask(e.target.value)} placeholder="Ülesanne *"/>
                <div style={{display:'flex',gap:8}}>
                  <input type="date" value={hwDue} onChange={e=>setHwDue(e.target.value)} style={{flex:1}}/>
                  <button onClick={addHw} className="btn btn-pine">Saada</button>
                </div>
              </div>
            )}
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {stuHw.length===0&&<p style={{color:'#42536A',fontSize:'.88rem'}}>Kodutöid pole.</p>}
              {stuHw.map(hw=>(
                <div key={hw.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'#FBFAF8',borderRadius:10,border:'1px solid rgba(28,43,58,.08)'}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:'.9rem'}}>{hw.task}</div>
                    {hw.due&&<div style={{fontSize:'.75rem',color:'#42536A'}}>Tähtaeg: {fmtDate(hw.due)}</div>}
                  </div>
                  <button onClick={()=>toggleHw(hw.id,hw.status)}
                    className="badge" style={{cursor:'pointer',border:'none',
                      background:hw.status==='Tehtud'?'#dcfce7':'#fef3c7',
                      color:hw.status==='Tehtud'?'#166534':'#92400e'}}>
                    {hw.status==='Tehtud'?'✓ Tehtud':'Ootel'}
                  </button>
                </div>
              ))}
            </div>
          </div>

          {/* Tunni päevik */}
          <div className="card" style={{padding:24}}>
            <h3 style={{marginBottom:16}}>📚 Tunni päevik</h3>
            <div className="scroll" style={{maxHeight:340,overflowY:'auto',display:'flex',flexDirection:'column',gap:12}}>
              {stuLessons.length===0&&<p style={{color:'#42536A',fontSize:'.88rem'}}>Tunnid puuduvad.</p>}
              {[...stuLessons].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l=>{
                const bmap={
                  Toimunud:{bg:'#dcfce7',c:'#166534',t:'Toimunud'},
                  Puudus_p:{bg:'#dbeafe',c:'#1e40af',t:'Puudus (põhjusega)'},
                  Puudus_eta:{bg:'#fee2e2',c:'#991b1b',t:'Puudus (põhjuseta)'},
                };
                const b=bmap[l.status]||bmap.Toimunud;
                return(
                  <div key={l.id} style={{display:'flex',gap:12,paddingBottom:12,borderBottom:'1px solid rgba(28,43,58,.07)'}}>
                    <div style={{width:40,height:40,borderRadius:10,background:'rgba(201,136,42,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:'#C9882A',flexShrink:0,fontSize:'1.1rem'}}>
                      {l.status==='Toimunud'?l.grade:'—'}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
                        <div style={{fontWeight:600,fontSize:'.9rem'}}>{l.topic}</div>
                        <span className="badge" style={{background:b.bg,color:b.c}}>{b.t}</span>
                      </div>
                      {l.comment&&<div style={{fontSize:'.8rem',color:'#42536A',marginTop:3}}>{l.comment}</div>}
                      <div style={{fontSize:'.75rem',color:'#42536A',marginTop:4,display:'flex',gap:10}}>
                        <span>Õp. {l.teacher}</span>
                        <span>{fmtDate(l.date)}{l.duration?' · '+l.duration+' min':''}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* Arved õpilasele */}
        {(user.role==='teacher'||user.role==='parent')&&(
          <div className="card" style={{padding:24}}>
            <h3 style={{marginBottom:16}}>💳 Arved</h3>
            {user.role==='teacher'&&(
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10,marginBottom:14}}>
                <input type="number" value={invAmt} onChange={e=>setInvAmt(e.target.value)} placeholder="Summa (€) *"
                  defaultValue="" style={{}} data-stuId={currentStu.id}/>
                <input value={invDesc} onChange={e=>setInvDesc(e.target.value)} placeholder="Kirjeldus"/>
                <button onClick={()=>{setInvStu(currentStu.id);addInvoice();}} className="btn btn-amber">
                  <i className="fa-solid fa-file-invoice"/> Loo arve
                </button>
              </div>
            )}
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {stuInv.length===0&&<p style={{color:'#42536A',fontSize:'.88rem'}}>Arveid pole.</p>}
              {stuInv.map(inv=>(
                <div key={inv.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:'#FBFAF8',borderRadius:10,border:'1px solid rgba(28,43,58,.08)'}}>
                  <div>
                    <div style={{fontWeight:600}}>{inv.num}</div>
                    <div style={{fontSize:'.8rem',color:'#42536A'}}>{inv.desc} · Tähtaeg: {fmtDate(inv.due)}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontWeight:700,fontSize:'1.1rem'}}>{inv.amount}€</span>
                    {inv.status==='Makstud'
                      ? <span className="badge" style={{background:'#dcfce7',color:'#166534'}}>✓ Makstud</span>
                      : <>{<span className="badge" style={{background:'#fef3c7',color:'#92400e'}}>Ootel</span>}
                         {user.role==='teacher'&&<button onClick={()=>markInvPaid(inv.id)} className="btn btn-pine" style={{padding:'6px 14px',fontSize:'.8rem'}}>Märgi makstud</button>}
                        </>
                    }
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── ARVED (üldvaade) ───────────────────────────────────────
  const Invoices=()=>{
    const unpaid=invoices.filter(i=>i.status==='Ootel');
    const paid=invoices.filter(i=>i.status==='Makstud');
    return(
      <div style={{display:'flex',flexDirection:'column',gap:20}}>
        <h1>Arved</h1>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:14}}>
          <div className="stat-card" style={{borderColor:'#fcd34d'}}>
            <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',textTransform:'uppercase',letterSpacing:'.06em'}}>Maksmata kokku</div>
            <div style={{fontSize:'2rem',fontWeight:700,color:'#C9882A',marginTop:6}}>{unpaidInv}€</div>
            <div style={{fontSize:'.8rem',color:'#42536A'}}>{unpaid.length} arvet</div>
          </div>
          <div className="stat-card">
            <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',textTransform:'uppercase',letterSpacing:'.06em'}}>Makstud kokku</div>
            <div style={{fontSize:'2rem',fontWeight:700,color:'#2F5D50',marginTop:6}}>{paid.reduce((a,i)=>a+i.amount,0)}€</div>
            <div style={{fontSize:'.8rem',color:'#42536A'}}>{paid.length} arvet</div>
          </div>
        </div>

        {/* Loo arve */}
        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>➕ Loo uus arve</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10,marginBottom:12}}>
            <select value={invStu} onChange={e=>setInvStu(e.target.value)}>
              <option value="">Vali õpilane *</option>
              {myStudents.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
            <input type="number" value={invAmt} onChange={e=>setInvAmt(e.target.value)} placeholder="Summa (€) *"/>
            <input value={invDesc} onChange={e=>setInvDesc(e.target.value)} placeholder="Kirjeldus (nt. Tunnid juuni)"/>
            <button onClick={addInvoice} className="btn btn-amber">
              <i className="fa-solid fa-file-invoice"/> Loo arve
            </button>
          </div>
        </div>

        {/* Arvete nimekiri */}
        <div className="card" style={{overflow:'hidden'}}>
          <div style={{padding:'16px 20px',borderBottom:'1px solid rgba(28,43,58,.08)',fontWeight:600}}>Kõik arved ({invoices.length})</div>
          {invoices.length===0
            ? <div style={{padding:40,textAlign:'center',color:'#42536A'}}>Arveid pole.</div>
            : [...invoices].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(inv=>(
              <div key={inv.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px',borderBottom:'1px solid rgba(28,43,58,.05)',flexWrap:'wrap',gap:10}}>
                <div>
                  <div style={{fontWeight:600}}>{inv.num} · {inv.studentName}</div>
                  <div style={{fontSize:'.8rem',color:'#42536A'}}>{inv.desc} · Tähtaeg: {fmtDate(inv.due)}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontWeight:700,fontSize:'1.1rem'}}>{inv.amount}€</span>
                  {inv.status==='Makstud'
                    ? <span className="badge" style={{background:'#dcfce7',color:'#166534'}}>✓ Makstud</span>
                    : <>{<span className="badge" style={{background:'#fef3c7',color:'#92400e'}}>Ootel</span>}
                       <button onClick={()=>markInvPaid(inv.id)} className="btn btn-pine" style={{padding:'6px 14px',fontSize:'.8rem'}}>Märgi makstud</button>
                      </>
                  }
                </div>
              </div>
            ))
          }
        </div>
      </div>
    );
  };

  // ── TUNNI MODAL ────────────────────────────────────────────
  const LessonModal=()=>(
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.5)',display:'flex',alignItems:'center',justifyContent:'center',padding:16,zIndex:100}}>
      <div className="card" style={{padding:28,maxWidth:500,width:'100%',position:'relative',maxHeight:'90vh',overflowY:'auto'}}>
        <button onClick={()=>setModalEv(null)}
          style={{position:'absolute',top:16,right:16,background:'none',border:'none',cursor:'pointer',fontSize:'1.1rem',color:'#42536A'}}>✕</button>
        <h2 style={{marginBottom:4}}>Tunni aruanne</h2>
        <p style={{color:'#42536A',fontSize:'.88rem',marginBottom:20}}>
          <strong>{modalEv.studentName}</strong> · {modalEv.time}
        </p>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <input value={lTopic} onChange={e=>setLTopic(e.target.value)} placeholder="Tunni teema *"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <select value={lStatus} onChange={e=>setLStatus(e.target.value)}>
              <option value="Toimunud">✓ Toimunud</option>
              <option value="Puudus_p">Puudus (põhjusega)</option>
              <option value="Puudus_eta">Puudus (põhjuseta)</option>
            </select>
            <select value={lGrade} onChange={e=>setLGrade(e.target.value)} disabled={lStatus!=='Toimunud'}>
              <option value="5">5 ★★★★★ Suurepärane</option>
              <option value="4">4 ★★★★ Hea</option>
              <option value="3">3 ★★★ Rahuldav</option>
              <option value="2">2 ★★ Puudulik</option>
            </select>
          </div>
          <select value={lDur} onChange={e=>setLDur(e.target.value)}>
            {['30','45','60','90','120'].map(d=><option key={d} value={d}>{d} minutit</option>)}
          </select>
          <textarea value={lComment} onChange={e=>setLComment(e.target.value)}
            placeholder="Õpetaja kommentaar…" rows={3}/>
          <button onClick={saveLesson} className="btn btn-dark" style={{width:'100%',borderRadius:12}}>
            <i className="fa-solid fa-floppy-disk"/> Salvesta päevikusse
          </button>
        </div>
      </div>
    </div>
  );

  // ── PEAMINE RENDER ─────────────────────────────────────────
  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar/>
      <main style={{flex:1,padding:'28px 32px',overflowY:'auto',background:'#FBFAF8'}} className="scroll">
        {/* Teavitus */}
        {notif&&(
          <div style={{position:'fixed',top:20,right:20,background:'#1C2B3A',color:'#fff',padding:'12px 20px',borderRadius:12,zIndex:200,fontWeight:600,boxShadow:'0 8px 24px rgba(0,0,0,.2)'}}>
            {notif}
          </div>
        )}
        {tab==='dashboard'&&<Dashboard/>}
        {tab==='calendar' &&<Calendar/>}
        {tab==='students' &&user.role==='teacher'&&!selStu&&<StudentsList/>}
        {tab==='students' &&user.role==='teacher'&&selStu &&<StudentCard/>}
        {tab==='students' &&user.role!=='teacher'         &&<StudentCard/>}
        {tab==='invoices' &&user.role==='teacher'         &&<Invoices/>}
      </main>
      {modalEv&&<LessonModal/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
