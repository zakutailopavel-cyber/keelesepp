            <div style={{marginBottom:14,display:'flex',flexDirection:'column',gap:8}}>
              <input value={hwTask} onChange={e=>setHwTask(e.target.value)} placeholder="Ülesande kirjeldus *"/>
              <label style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,padding:'9px 12px',borderRadius:10,border:'1px solid rgba(28,43,58,.12)',background:'#fff',cursor:'pointer',fontSize:'.82rem',color:'#42536A'}}>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  <i className="fa-solid fa-paperclip" style={{marginRight:6}}/>
                  {hwFile ? hwFile.name : 'Lisa fail kodutööle'}
                </span>
                <input type="file" onChange={e=>setHwFile(e.target.files?.[0]||null)} style={{display:'none'}}/>
              </label>
              <div style={{display:'flex',gap:8}}>
                <input type="date" value={hwDue} onChange={e=>setHwDue(e.target.value)} style={{flex:1}}/>
                <button onClick={addHw} className="btn btn-pine btn-sm">Saada</button>
              </div>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:280,overflowY:'auto'}} className="scroll">
            {stuHw.length===0&&<p style={{color:'#42536A',fontSize:'.85rem',textAlign:'center',padding:'16px 0'}}>Kodutöid pole. 📝</p>}
            {stuHw.map(hw=>(
              <div key={hw.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'10px 12px',background:'#F9F8F6',borderRadius:10,border:'1px solid rgba(28,43,58,.07)'}}>
                <div style={{flex:1,marginRight:10}}>
                  <div style={{fontWeight:500,fontSize:'.88rem'}}>{hw.task}</div>
                  {hw.due&&<div style={{fontSize:'.72rem',color:'#42536A',marginTop:2}}>📅 {fmtDate(hw.due)}</div>}
                  {hw.fileUrl&&(
                    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginTop:6}}>
                      <a href={hw.fileUrl} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm" style={{padding:'5px 9px',fontSize:'.72rem'}}>
                        <i className="fa-solid fa-paperclip"/> {hw.fileName||'Ava fail'}
                      </a>
                      {canManage&&(
                        <button onClick={()=>removeHwFile(hw)} className="btn btn-ghost btn-sm" style={{padding:'5px 9px',fontSize:'.72rem',color:'#991b1b'}}>

                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  <button onClick={()=>toggleHw(hw.id,hw.status)} className="badge" style={{cursor:'pointer',border:'none',flexShrink:0,

                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>

              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:8}}>
                <input type="date" value={schDate} onChange={e=>setSchDate(e.target.value)}/>
                <select value={schTime} onChange={e=>setSchTime(e.target.value)}>
                  {TIMES.map(t=><option key={t}>{t}</option>)}
                </select>
                {canAssignTeacher&&(
                  <select value={schTeach} onChange={e=>setSchTeach(e.target.value)}>
                    {TEACHERS.map(t=><option key={t}>{t}</option>)}
                  </select>
                )}
              </div>
              <label style={{display:'flex',alignItems:'center',gap:8,fontSize:'.82rem',color:'#42536A',marginTop:10}}>
                <input type="checkbox" checked={schRecurring} onChange={e=>setSchRecurring(e.target.checked)}/>

              </label>
              <button onClick={()=>addStudentSchedule(currentStu)} className="btn btn-amber btn-sm" style={{width:'100%',marginTop:10}}>
                <i className="fa-solid fa-calendar-plus"/> Lisa tund kalendrisse

          <div style={{maxHeight:320,overflowY:'auto',display:'flex',flexDirection:'column',gap:12}} className="scroll">
            {stuLessons.length===0&&<p style={{color:'#42536A',fontSize:'.85rem',textAlign:'center',padding:'16px 0'}}>Tunnid puuduvad. 🎓</p>}
            {[...stuLessons].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l=>{
              const bmap={Toimunud:{bg:'#dcfce7',c:'#166534',t:'✓ Toimunud'},Puudus_p:{bg:'#dbeafe',c:'#1e40af',t:'Puudus (põhj.)'},Puudus_eta:{bg:'#fee2e2',c:'#991b1b',t:'Puudus'}};
              const b=bmap[l.status]||bmap.Toimunud;

                <div key={l.id} style={{display:'flex',gap:12,paddingBottom:12,borderBottom:'1px solid rgba(28,43,58,.06)'}}>
                  <div style={{width:38,height:38,borderRadius:10,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
                    fontWeight:700,background:l.status==='Toimunud'?'rgba(201,136,42,.1)':'rgba(239,68,68,.08)',color:l.status==='Toimunud'?'#C9882A':'#dc2626'}}>

                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',gap:6,marginBottom:3}}>
                      <span style={{fontWeight:600,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.topic}</span>
                      <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>

                    </div>
                    {l.comment&&<div style={{fontSize:'.78rem',color:'#42536A',marginBottom:3}}>{l.comment}</div>}

                      <a href={l.fileUrl} target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:6,marginBottom:3,fontSize:'.74rem',fontWeight:700,color:'#2F5D50',textDecoration:'none'}}>
                        <i className="fa-solid fa-paperclip"/> {l.fileName||'Tunni fail'}
                      </a>
                    )}
                    <div style={{fontSize:'.72rem',color:'#9ca3af'}}>{fmtDate(l.date)}{l.duration?' · '+l.duration+' min':''} · Õp. {l.teacher}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {canManage&&(
        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>💳 Arved ({stuInv.length})</h3>

            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:10,marginBottom:14}}>
              <input type="number" value={invAmt} onChange={e=>setInvAmt(e.target.value)} placeholder="Summa (€) *"/>
              <input value={invDesc} onChange={e=>setInvDesc(e.target.value)} placeholder="Kirjeldus"/>
              <button onClick={()=>addInvoice(currentStu.id)} className="btn btn-amber btn-sm">
                <i className="fa-solid fa-plus"/> Loo arve
              </button>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>

// ── TUNNI MODAL ───────────────────────────────────────────────
function LessonModal({modalEv,setModalEv,lTopic,setLTopic,lGrade,setLGrade,
  lStatus,setLStatus,lComment,setLComment,lDur,setLDur,lessonFile,setLessonFile,saveLesson,deleteLesson,db,user,notify,students,markAttendance}) {

  const [moveDate,setMoveDate] = React.useState(modalEv.occurrenceDate||modalEv.date||new Date().toISOString().split("T")[0]);
  const [moveTime,setMoveTime] = React.useState(modalEv.time||"09:00");
  const [saving,setSaving]     = React.useState(false);

  const fmtDate = d => d?new Date(d).toLocaleDateString("et-EE",{day:"2-digit",month:"2-digit",year:"numeric"}):"—";
  const hasDate = Boolean(modalEv.date||modalEv.occurrenceDate);
  const st = modalEv.status||"Planeeritud";
  const isJournalEdit = Boolean(modalEv.lessonEntryId);
  const lessonDate = modalEv.occurrenceDate||modalEv.date||today();
  const assignedGroupStudents = React.useMemo(()=>{
    if(!modalEv.isGroup) return [];
    const ids = new Set([...(modalEv.students||[]),...(modalEv.groupMembers||[])]);
    return (students||[]).filter(student=>ids.has(student.id));
  },[modalEv,students]);
  const attendanceText = status => status==='coming'?'Tuli':status==='absent'?'Puudus':status==='warned'?'Hoiatas':'Märkimata';
  const setGroupAttendance = async(student,status)=>{
    if(!student?.id||!markAttendance) return;
    const key = `${student.id}_${lessonDate}`;
    await markAttendance(modalEv,key,status);
    setModalEv(prev=>{
      const nextAttendance = {...(prev.attendance||{})};
      if(status==='clear') delete nextAttendance[key];
      else nextAttendance[key] = {
        status,
        by:user.uid||'',
        byName:user.displayName||user.email||'',
        byRole:user.role||'',
        updatedAt:new Date().toISOString()
      };
      return {...prev,attendance:nextAttendance};
    });
  };

  const STATUS_COLOR = {
    Planeeritud:"#2F5D50",Nihutatud:"#A96E1A",Tühistatud:"#991b1b",Toimunud:"#42536A"
  };
  const STATUS_BG = {
    Planeeritud:"rgba(47,93,80,.1)",Nihutatud:"rgba(201,136,42,.1)",
    Tühistatud:"rgba(239,68,68,.08)",Toimunud:"rgba(28,43,58,.07)"
  };

  const cancelLesson = async()=>{
    if(!modalEv.id) return;
    await db.collection("schedule").doc(modalEv.id).update({status:"Tühistatud",canceledAt:new Date().toISOString().split("T")[0]});
    notify("✓ Tund tühistatud");
    setModalEv(prev=>({...prev,status:"Tühistatud"}));
  };

  const restoreLesson = async()=>{
    if(!modalEv.id) return;
    await db.collection("schedule").doc(modalEv.id).update({status:"Planeeritud"});
    notify("✓ Tund taastatud");
    setModalEv(prev=>({...prev,status:"Planeeritud"}));
  };

  const hardDeleteSchedule = async()=>{
    if(!modalEv.id) return;
    if(!window.confirm("Kustuta tund kalendrist täielikult?")) return;
    const linkedLessonSnap = await db.collection("lessons").where("scheduleId","==",modalEv.id).limit(1).get();
    if(!linkedLessonSnap.empty){
      const linkedLessonDoc = linkedLessonSnap.docs[0];
      const linkedLessonData = linkedLessonDoc.data();
      await linkedLessonDoc.ref.delete();
      if(linkedLessonData.studentId && linkedLessonData.studentId!=="ext" && linkedLessonData.status==="Toimunud"){
        await db.collection("students").doc(linkedLessonData.studentId).update({packageUsed:firebase.firestore.FieldValue.increment(-1)});
      }
    }
    await db.collection("schedule").doc(modalEv.id).delete();
    notify("✓ Tund kustutatud kalendrist");
    setModalEv(null);
  };

  const hardDeleteJournalEntry = async()=>{
    if(!modalEv.lessonEntryId) return;
    await deleteLesson({
      id: modalEv.lessonEntryId,
      studentId: modalEv.studentId||'',
      status: modalEv.status||lStatus,
      scheduleId: modalEv.scheduleId||modalEv.id||''
    });
    setModalEv(null);
  };

  const rescheduleLesson = async()=>{
    if(!modalEv.id||!moveDate){notify("⚠ Vali uus kuupäev");return;}
    setSaving(true);
    const jsDay = new Date(moveDate).getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    await db.collection("schedule").doc(modalEv.id).update({
      date:moveDate, day:dayId, time:moveTime,
      status:"Nihutatud",
      originalDate: modalEv.originalDate||modalEv.date||modalEv.occurrenceDate||null,
      originalTime: modalEv.originalTime||modalEv.time||null,
      rescheduledAt: new Date().toISOString().split("T")[0]
    });
    notify("✓ Tund tõsteti ümber: "+fmtDate(moveDate)+" "+moveTime);
    setModalEv(prev=>({...prev,date:moveDate,time:moveTime,status:"Nihutatud"}));
    setSaving(false);
  };

  const exportIcs = ()=>{
    const isoDate = moveDate||modalEv.occurrenceDate||modalEv.date;
    if(!isoDate){notify("⚠ Mallikirjet ei saa eksportida. Tõsta tund kuupäevale.");return;}
    const [y,m,d] = isoDate.split("-").map(Number);
    const [hh,mm] = (moveTime||modalEv.time||"09:00").split(":").map(Number);
    const start = new Date(y,m-1,d,hh,mm,0);
    const end   = new Date(start.getTime()+(parseInt(lDur)||60)*60000);
    const fmt   = dt => dt.getFullYear()+String(dt.getMonth()+1).padStart(2,"0")+String(dt.getDate()).padStart(2,"0")
                  +"T"+String(dt.getHours()).padStart(2,"0")+String(dt.getMinutes()).padStart(2,"0")+"00";
    const ics = [
      "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//KeeleSepp//Haldus//ET",
      "BEGIN:VEVENT",
      "UID:"+(modalEv.id||Date.now())+"@keelesepp",
      "DTSTART:"+fmt(start),"DTEND:"+fmt(end),
      "SUMMARY:KeeleSepp – "+modalEv.studentName,
      "DESCRIPTION:Õpetaja: "+(modalEv.teacher||user.displayName)+"\nStaatus: "+st,
      "END:VEVENT","END:VCALENDAR"
    ].join("\n");
    const blob = new Blob([ics],{type:"text/calendar;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download="keelesepp-"+modalEv.studentName.split(" ")[0].toLowerCase()+".ics";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    notify("✓ .ics fail allalaaditud!");
  };

  const makeRecurring = async()=>{
    if(!modalEv.id) return;
    const baseDate = modalEv.occurrenceDate||modalEv.date;
    if(!baseDate){notify("⚠ Vali konkreetne kuupäev");return;}
    const jsDay = new Date(baseDate).getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    await db.collection("schedule").doc(modalEv.id).update({
      recurring:true,
      startDate:baseDate,
      day:dayId,
      date:firebase.firestore.FieldValue.delete()
    });
    notify("✓ Tund kordub nüüd igal nädalal");
    setModalEv(prev=>({...prev,recurring:true,startDate:baseDate,day:dayId,date:null,occurrenceDate:baseDate}));
  };

  const makeSingle = async()=>{
    if(!modalEv.id) return;
    const baseDate = modalEv.occurrenceDate||modalEv.date||modalEv.startDate;
    if(!baseDate){notify("⚠ Vali konkreetne kuupäev");return;}
    const jsDay = new Date(baseDate).getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    await db.collection("schedule").doc(modalEv.id).update({
      recurring:false,
      startDate:firebase.firestore.FieldValue.delete(),
      day:dayId,
      date:baseDate
    });
    notify("✓ Tund on nüüd ühekordne");
    setModalEv(prev=>({...prev,recurring:false,startDate:null,day:dayId,date:baseDate,occurrenceDate:baseDate}));
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(28,43,58,.6)",display:"flex",alignItems:"center",
      justifyContent:"center",padding:16,zIndex:200,backdropFilter:"blur(4px)"}}>
      <div className="card scroll" style={{padding:0,maxWidth:540,width:"100%",maxHeight:"92vh",overflowY:"auto",position:"relative"}}>

        {/* Шапка модалки */}
        <div style={{padding:"20px 24px 16px",borderBottom:"1px solid rgba(28,43,58,.08)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h2 style={{fontSize:"1.2rem",marginBottom:4}}>📋 Tunni aruanne</h2>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:".88rem",color:"#42536A"}}>
                <strong>{modalEv.studentName}</strong> · {fmtDate(modalEv.occurrenceDate||modalEv.date)} · {modalEv.time}
              </span>
              <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:999,
                fontSize:".73rem",fontWeight:700,background:STATUS_BG[st]||"rgba(47,93,80,.1)",color:STATUS_COLOR[st]||"#2F5D50"}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:STATUS_COLOR[st]||"#2F5D50"}}/>
                {st}
              </span>
              {!modalEv.date&&<span style={{fontSize:".7rem",padding:"2px 8px",borderRadius:999,background:"rgba(201,136,42,.1)",color:"#A96E1A",fontWeight:700}}>korduv mall</span>}
            </div>
          </div>
          <button onClick={()=>{setLessonFile(null);setModalEv(null);}}
            style={{background:"rgba(28,43,58,.07)",border:"none",cursor:"pointer",borderRadius:9,
              width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",color:"#42536A",flexShrink:0}}>✕</button>
        </div>

        <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>

          {/* Блок управления календарём */}
          {!isJournalEdit&&<div style={{background:"#F9F8F6",borderRadius:12,padding:16,border:"1px solid rgba(28,43,58,.07)"}}>
            <div style={{fontSize:".76rem",fontWeight:700,color:"#42536A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>
              📅 Kalendri haldus
            </div>

            {modalEv.id&&hasDate&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:".78rem",fontWeight:600,color:"#42536A",marginBottom:6}}>Tunni tüüp:</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <button
                    onClick={makeSingle}
                    className={`btn btn-sm ${modalEv.recurring?'btn-ghost':'btn-dark'}`}
                    disabled={!modalEv.recurring}
                    style={{opacity:modalEv.recurring?1:.9}}>
                    <i className="fa-solid fa-calendar-day"/> Ühekordne
                  </button>
                  <button
                    onClick={makeRecurring}
                    className={`btn btn-sm ${modalEv.recurring?'btn-dark':'btn-ghost'}`}
                    disabled={!!modalEv.recurring}
                    style={{opacity:modalEv.recurring?.9:1}}>
                    <i className="fa-solid fa-repeat"/> Korduv
                  </button>
                </div>
              </div>
            )}

            {/* Кнопки отмены/восстановления */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <button onClick={cancelLesson} className="btn btn-red btn-sm"
                disabled={!modalEv.id||st==="Tühistatud"}
                style={{opacity:st==="Tühistatud"?.4:1}}>
                <i className="fa-solid fa-ban"/> Tühista tund
              </button>
              <button onClick={restoreLesson} className="btn btn-pine btn-sm"
                disabled={!modalEv.id||st!=="Tühistatud"}
                style={{opacity:st!=="Tühistatud"?.4:1}}>
                <i className="fa-solid fa-rotate-left"/> Taasta tund
              </button>
            </div>

            {modalEv.id&&(
              <button onClick={hardDeleteSchedule} className="btn btn-ghost btn-sm" style={{width:"100%",marginBottom:12,color:"#991b1b",borderColor:"rgba(239,68,68,.25)"}}>
                <i className="fa-solid fa-trash"/> Kustuta tund täielikult
              </button>
            )}

            {/* Перенос */}
            <div style={{fontSize:".78rem",fontWeight:600,color:"#42536A",marginBottom:6}}>Tõsta tund ümber:</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <input type="date" value={moveDate} onChange={e=>setMoveDate(e.target.value)}
                disabled={!hasDate} style={{opacity:!hasDate?.5:1}}/>
              <select value={moveTime} onChange={e=>setMoveTime(e.target.value)} disabled={!hasDate} style={{opacity:!hasDate?.5:1}}>
                {TIMES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={rescheduleLesson} className="btn btn-amber btn-sm" disabled={!hasDate||saving} style={{flex:1,opacity:!hasDate?.5:1}}>
                <i className="fa-solid fa-calendar-days"/> {saving?"Salvestab…":"Salvesta uus aeg"}
              </button>
              <button onClick={exportIcs} className="btn btn-ghost btn-sm" disabled={!hasDate} style={{opacity:!hasDate?.5:1}} title="Ekspordi .ics faili (avab Google/Apple Calendar)">
                <i className="fa-solid fa-calendar-arrow-up"/> .ics
              </button>
            </div>
            {!hasDate&&<div style={{fontSize:".72rem",color:"#9ca3af",marginTop:8}}>Mallikirjet ei saa ümber tõsta. Loo uus konkreetse kuupäevaga tund.</div>}
            {modalEv.originalDate&&(
              <div style={{fontSize:".72rem",color:"#42536A",marginTop:8,display:"flex",gap:4}}>
                <span>Algne aeg:</span>
                <span style={{color:"#A96E1A",fontWeight:600}}>{fmtDate(modalEv.originalDate)} {modalEv.originalTime||""}</span>
              </div>
            )}
            {modalEv.recurring&&(
              <div style={{fontSize:".72rem",color:"#2F5D50",marginTop:8,fontWeight:600}}>
                See tund on korduv ja ilmub automaatselt ka järgmiste nädalate kalendrisse.
              </div>
            )}
          </div>}

          {modalEv.isGroup&&assignedGroupStudents.length>0&&st!=="Tühistatud"&&(
            <div style={{background:"#F9F8F6",borderRadius:12,padding:16,border:"1px solid rgba(28,43,58,.07)"}}>
              <div style={{fontSize:".76rem",fontWeight:700,color:"#42536A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>
                👥 Grupi kohalolu
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {assignedGroupStudents.map(student=>{
                  const key = `${student.id}_${lessonDate}`;
                  const saved = modalEv.attendance?.[key]?.status || '';
                  return (
                    <div key={student.id} style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,alignItems:"center",padding:"10px 12px",borderRadius:10,background:"#fff",border:"1px solid rgba(28,43,58,.08)"}}>
                      <div>
                        <div style={{fontWeight:800,color:"#1C2B3A",fontSize:".9rem"}}>{student.name}</div>
                        <div style={{fontSize:".74rem",color:saved?"#2F5D50":"#991b1b",fontWeight:700}}>
                          {attendanceText(saved)}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
                        <button type="button" onClick={()=>setGroupAttendance(student,'coming')} className={`btn btn-sm ${saved==='coming'?'btn-pine':'btn-ghost'}`} style={{padding:"7px 9px"}}>
                          Tuli
                        </button>
                        <button type="button" onClick={()=>setGroupAttendance(student,'absent')} className={`btn btn-sm ${saved==='absent'?'btn-red':'btn-ghost'}`} style={{padding:"7px 9px"}}>
                          Puudus
                        </button>
                        <button type="button" onClick={()=>setGroupAttendance(student,'warned')} className={`btn btn-sm ${saved==='warned'?'btn-amber':'btn-ghost'}`} style={{padding:"7px 9px"}}>
                          Hoiatas
                        </button>
                        {saved&&(
                          <button type="button" onClick={()=>setGroupAttendance(student,'clear')} className="btn btn-ghost btn-sm" style={{padding:"7px 9px",color:"#42536A"}}>
                            Tühjenda
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Блок записи урока */}
          {st!=="Tühistatud"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{fontSize:".76rem",fontWeight:700,color:"#42536A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:2}}>
                📝 Päeviku kanne
              </div>
              <input value={lTopic} onChange={e=>setLTopic(e.target.value)} placeholder="Tunni teema *"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <select value={lStatus} onChange={e=>setLStatus(e.target.value)}>
                  <option value="Toimunud">✓ Toimunud</option>
                  <option value="Puudus_p">Puudus (põhjusega)</option>
                  <option value="Puudus_eta">Puudus (põhjuseta)</option>
                </select>
                <select value={lGrade} onChange={e=>setLGrade(e.target.value)} disabled={lStatus!=="Toimunud"}>
                  <option value="5">5 ★★★★★</option>
                  <option value="4">4 ★★★★</option>
                  <option value="3">3 ★★★</option>
                  <option value="2">2 ★★</option>
                </select>
              </div>
              <select value={lDur} onChange={e=>setLDur(e.target.value)}>
                {LESSON_DURATIONS.map(d=><option key={d} value={d}>{d} minutit</option>)}
              </select>
              <textarea value={lComment} onChange={e=>setLComment(e.target.value)} placeholder="Õpetaja kommentaar…" rows={3}/>
              <label style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,padding:'10px 12px',borderRadius:10,border:'1.5px solid rgba(28,43,58,.15)',background:'#fff',cursor:'pointer',fontSize:'.86rem',color:'#42536A'}}>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  <i className="fa-solid fa-paperclip" style={{marginRight:7}}/>
                  {lessonFile ? lessonFile.name : (modalEv.fileName||modalEv.attachmentName) ? `Olemas: ${modalEv.fileName||modalEv.attachmentName}` : 'Lisa fail tunni juurde'}
                </span>
                <input type="file" onChange={e=>setLessonFile(e.target.files?.[0]||null)} style={{display:'none'}}/>
              </label>
              {(modalEv.fileUrl||modalEv.attachmentUrl)&&(
                <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                  <a href={modalEv.fileUrl||modalEv.attachmentUrl} target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:7,fontSize:'.8rem',fontWeight:700,color:'#2F5D50',textDecoration:'none'}}>
                    <i className="fa-solid fa-paperclip"/> Ava olemasolev fail
                  </a>
                  <button type="button" onClick={()=>{
                    setLessonFile(null);
                    setModalEv({...modalEv,fileUrl:'',fileName:'',attachmentUrl:'',attachmentName:'',attachmentType:'',attachmentSize:0,attachment:null,attachmentRemoved:true});
                  }} className="btn btn-ghost" style={{padding:'7px 10px',fontSize:'.76rem',color:'#991b1b',borderColor:'rgba(239,68,68,.25)'}}>
                    <i className="fa-solid fa-trash"/> Eemalda fail
                  </button>
                </div>
              )}
              <button onClick={saveLesson} className="btn btn-dark" style={{width:"100%",padding:13}}>
                <i className="fa-solid fa-floppy-disk"/> Salvesta päevikusse
              </button>
              {isJournalEdit&&(
                <button onClick={hardDeleteJournalEntry} className="btn btn-ghost" style={{width:"100%",padding:13,color:"#991b1b",borderColor:"rgba(239,68,68,.25)"}}>
                  <i className="fa-solid fa-trash"/> Kustuta päeviku kanne
                </button>
              )}
            </div>
          )}
          {st==="Tühistatud"&&(
            <div style={{textAlign:"center",padding:"16px 0",color:"#42536A",fontSize:".88rem"}}>
              Tühistatud tundi ei saa päevikusse kanda. Taasta tund enne.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── РЕДАКТИРОВАНИЕ И УДАЛЕНИЕ УЧЕНИКА ────────────────────────
function EditStudentModal({student,onClose,onSave,onDelete,db,notify,isAdmin,groupOptions=[]}) {
  const [name,    setName]    = React.useState(student.name||'');
  const [parentName,setParentName] = React.useState(student.parentName||'');
  const [email,   setEmail]   = React.useState(student.email||'');
  const [phone,   setPhone]   = React.useState(student.phone||'');
  const [level,   setLevel]   = React.useState(student.level||'A1');
  const [target,  setTarget]  = React.useState(student.targetLevel||'B1');
  const [subject, setSubject] = React.useState(student.subject||'Eesti keel');
  const [grade,   setGrade]   = React.useState(student.grade||'');
  const [group,   setGroup]   = React.useState(student.group||'');
  const [teacher, setTeacher] = React.useState(student.teacher||'Pavel');
  const [contactStatus,setContactStatus] = React.useState(student.contactStatus||'new');
  const [contactOwner,setContactOwner] = React.useState(student.contactOwner||'');
  const [contactLastAt,setContactLastAt] = React.useState(student.contactLastAt||'');
  const [contactNotes,setContactNotes] = React.useState(student.contactNotes||'');
  const [pkg,     setPkg]     = React.useState(String(student.packageTotal||0));
  const [used,    setUsed]    = React.useState(String(student.packageUsed||0));
  const [saving,  setSaving]  = React.useState(false);
  const [confirm, setConfirm] = React.useState(false);
  const modalGroupOptions = React.useMemo(()=>
    [...new Set([...(groupOptions||[]),group].map(g=>(g||'').trim()).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b,'et'))
  ,[groupOptions,group]);

  const save = async()=>{
    if(!name.trim()){notify('⚠ Sisesta nimi');return;}
    setSaving(true);
    await db.collection('students').doc(student.id).update({
      name,parentName,email,phone,level,targetLevel:target,
      subject,grade,group,teacher,
      contactStatus,contactOwner,contactLastAt,contactNotes,
      packageTotal:parseInt(pkg)||0,
      packageUsed:parseInt(used)||0,
      updatedAt: new Date().toISOString().split('T')[0]
    });
    notify('✓ Muudatused salvestatud!');
    onSave();
    setSaving(false);
  };

  const deleteStudent = async()=>{
    setSaving(true);
    // Кудалем ученика и связанные данные
    await db.collection('students').doc(student.id).delete();
    // Удаляем уроки
    const lessons = await db.collection('lessons').where('studentId','==',student.id).get();
    for(const doc of lessons.docs) await doc.ref.delete();
    // Удаляем домашние задания
    const hw = await db.collection('homework').where('studentId','==',student.id).get();
    for(const doc of hw.docs) await doc.ref.delete();
    // Удаляем счета
    const inv = await db.collection('invoices').where('studentId','==',student.id).get();
    for(const doc of inv.docs) await doc.ref.delete();
    notify('✓ Õpilane kustutatud');
    onDelete();
    setSaving(false);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.6)',display:'flex',alignItems:'center',
      justifyContent:'center',padding:16,zIndex:210,backdropFilter:'blur(4px)'}}>
      <div className="card scroll" style={{padding:0,maxWidth:520,width:'100%',maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{padding:'20px 24px 16px',borderBottom:'1px solid rgba(28,43,58,.08)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:'1.2rem'}}>✏️ Muuda õpilase andmeid</h2>
          <button onClick={onClose} style={{background:'rgba(28,43,58,.07)',border:'none',cursor:'pointer',borderRadius:9,
            width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',color:'#42536A'}}>✕</button>
        </div>

        <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div style={{gridColumn:'1/-1'}}>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Lapse nimi *</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Lapse nimi *"/>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Vanema nimi</div>
              <input value={parentName} onChange={e=>setParentName(e.target.value)} placeholder="Vanema nimi"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>E-post</div>
              <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="E-post"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Telefon</div>
              <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+372…"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Õppeaine</div>
              <select value={subject} onChange={e=>setSubject(e.target.value)}>
                {SUBJECTS.map(subject=><option key={subject}>{subject}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Klass / vanus</div>
              <select value={grade} onChange={e=>setGrade(e.target.value)}>
                <option value="">Määramata</option>
                {GRADES.map(g=><option key={g}>{g}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Grupp</div>
              <select value={group} onChange={e=>setGroup(e.target.value)}>
                <option value="">Grupp: määramata</option>
                {modalGroupOptions.map(groupName=><option key={groupName} value={groupName}>{groupName}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Hetketase</div>
              <select value={level} onChange={e=>setLevel(e.target.value)}>
                {LEVELS.map(l=><option key={l}>{l}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Eesmärk</div>
              <select value={target} onChange={e=>setTarget(e.target.value)}>
                {LEVELS.slice(1).map(l=><option key={l}>{l}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Õpetaja</div>
              {isAdmin
                ? <select value={teacher} onChange={e=>setTeacher(e.target.value)}>
                    {[...new Set([...TEACHERS, teacher].filter(Boolean))].map(t=><option key={t}>{t}</option>)}
                  </select>
                : <input value={teacher} readOnly style={{opacity:.7}}/>
              }
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Kontaktistaatus</div>
              <select value={contactStatus} onChange={e=>setContactStatus(e.target.value)}>
                {CONTACT_STATUSES.map(status=><option key={status.id} value={status.id}>{status.label}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Kes suhtleb</div>
              <input value={contactOwner} onChange={e=>setContactOwner(e.target.value)} placeholder="Nt. Pavel / Admin"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Viimane kontakt</div>
              <input value={contactLastAt} onChange={e=>setContactLastAt(e.target.value)} type="date"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Paketi maht</div>
              <input value={pkg} onChange={e=>setPkg(e.target.value)} type="number" placeholder="10"/>
            </div>
            <div>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Kasutatud tunde</div>
              <input value={used} onChange={e=>setUsed(e.target.value)} type="number" placeholder="0"/>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <div style={{fontSize:'.78rem',fontWeight:600,color:'#42536A',marginBottom:4}}>Kontaktimärkmed</div>
              <textarea value={contactNotes} onChange={e=>setContactNotes(e.target.value)} placeholder="Mida lapsevanem ütles, millal tagasi helistada, mis huvi tundis…" rows={4}/>
            </div>
          </div>

          <button onClick={save} disabled={saving} className="btn btn-pine" style={{width:'100%',marginTop:4}}>
            {saving?'Salvestab…':'✓ Salvesta muudatused'}
          </button>

          {isAdmin&&(
            <div style={{borderTop:'1px solid rgba(239,68,68,.15)',paddingTop:14,marginTop:4}}>
              {!confirm
                ? <button onClick={()=>setConfirm(true)} className="btn btn-red" style={{width:'100%'}}>
                    <i className="fa-solid fa-trash"/> Kustuta õpilane jäädavalt
                  </button>
                : <div style={{background:'#fee2e2',borderRadius:12,padding:16}}>
                    <div style={{fontWeight:600,color:'#991b1b',marginBottom:8,fontSize:'.9rem'}}>
                      ⚠ Oled kindel? See kustutab ka kõik tunnid, kodutööd ja arved!
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={deleteStudent} disabled={saving} className="btn btn-red" style={{flex:1}}>
                        {saving?'Kustutab…':'Jah, kustuta'}
                      </button>
                      <button onClick={()=>setConfirm(false)} className="btn btn-ghost" style={{flex:1}}>Tühista</button>
                    </div>
                  </div>
              }
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── PEAMINE APP ───────────────────────────────────────────────
function App() {
  const [user,setUser]         = useState(null);

  const [bootError,setBootError] = useState('');

  const [editStu,setEditStu]   = useState(null);

  const [modalEv,setModalEv]   = useState(null);
  const [search,setSearch]     = useState('');
  const [stuFilter,setStuFilter]= useState('active');
  const [groupFilter,setGroupFilter]= useState('all');
  const [contactFilter,setContactFilter]= useState('all');
  const [notif,setNotif]       = useState('');
  const [mobileNav,setMobileNav]=useState(false);

  const [students,setStu] = useState([]);
  const [lessons,setLes]  = useState([]);
  const [homework,setHw]  = useState([]);
  const [schedule,setSch] = useState([]);
  const [invoices,setInv] = useState([]);
  const [messages,setMessages] = useState([]);
  const [groups,setGroups] = useState([]);
  const [tasks,setTasks] = useState([]);
  const [allUsers,setAllUsers] = useState([]);
  const [staffMembers,setStaffMembers] = useState([]);
  const [activityLog,setActivityLog] = useState([]);

  // Add student
  const [nName,setNName]   = useState('');
  const [nParentName,setNParentName] = useState('');
  const [nEmail,setNEmail] = useState('');
  const [nPhone,setNPhone] = useState('');
  const [nLevel,setNLevel] = useState('A1');
  const [nTarget,setNTarget]=useState('B1');
  const [nPkg,setNPkg]     = useState('10');
  const [nSubject,setNSubject] = useState('Eesti keel');
  const [nGrade,setNGrade] = useState('');
  const [nGroup,setNGroup] = useState('');
  const [nTeach,setNTeach] = useState('Pavel');
  // Lesson
  const [lTopic,setLTopic]   = useState('');
  const [lGrade,setLGrade]   = useState('5');
  const [lStatus,setLStatus] = useState('Toimunud');
  const [lComment,setLComment]=useState('');
  const [lDur,setLDur]       = useState('60');
  const [lessonFile,setLessonFile] = useState(null);
  // Homework
  const [hwTask,setHwTask] = useState('');
  const [hwDue,setHwDue]   = useState('');
  const [hwFile,setHwFile] = useState(null);
  const [teacherMessage,setTeacherMessage] = useState('');
  // Staff tasks
  const [taskTitle,setTaskTitle] = useState('');
  const [taskAssignee,setTaskAssignee] = useState('Pavel');
  const [taskDue,setTaskDue] = useState(today());
  const [taskPriority,setTaskPriority] = useState('normal');
  const [taskCategory,setTaskCategory] = useState('general');
  // Schedule
  const [schStu,setSchStu]   = useState('');
  const [schDate,setSchDate] = useState(today());
  const [schTime,setSchTime] = useState('09:00');
  const [schTeach,setSchTeach]=useState('Pavel');
  const [schRecurring,setSchRecurring]=useState(false);
  // Invoice
  const [invAmt,setInvAmt]   = useState('');
  const [invDesc,setInvDesc] = useState('');
  const [invStu,setInvStu]   = useState('');
  const [studentSort,setStudentSort] = useState('name_asc');

  // AUTH
  useEffect(()=>{
    if(!auth || !db){
      console.error('Firebase init missing', { hasAuth: !!auth, hasDb: !!db });
      setBootError('Firebase ei laaditud. Kontrolli internetiuhendust ja proovi lehte uuesti avada.');
      setLoading(false);
      return;
    }

    const unsub=auth.onAuthStateChanged(async fbUser=>{
      try{
        if(fbUser){
          const snap=await db.collection('users').doc(fbUser.uid).get();
          if(snap.exists){
            const d=snap.data();
            const profile = {uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,...d};
            try{
              await ensureStudentRecord(fbUser, profile);
              await ensureParentStudentRecords(fbUser, profile);
            }catch(syncErr){
              console.warn('Profile sync during auth bootstrap failed:', syncErr);
            }
            setUser(profile);
            if(d.role==='teacher') setFilterT(canonicalTeacherName(fbUser.displayName||''));
            if(d.role==='admin') setFilterT('Kõik');
          }else{
            setUser({uid:fbUser.uid,displayName:fbUser.displayName||fbUser.email,email:fbUser.email,role:'parent'});
          }
        }else{
          setUser(null);
        }
      }catch(err){
        console.error('Auth bootstrap failed:', err);
        setBootError('Sisselogimise andmeid ei olnud voimalik laadida. Proovi lehte uuendada.');
      }finally{
        setLoading(false);
      }
    });
    return unsub;
  },[]);

  // FIRESTORE
  useEffect(()=>{
    if(!user) return;
    const u1=db.collection('students').onSnapshot(s=>setStu(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=db.collection('lessons').onSnapshot(s=>setLes(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3=db.collection('homework').onSnapshot(s=>setHw(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u4=db.collection('schedule').onSnapshot(s=>setSch(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u5=db.collection('invoices').onSnapshot(s=>setInv(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u6=db.collection('messages').onSnapshot(s=>setMessages(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u7=db.collection('groups').onSnapshot(
      s=>setGroups(s.docs.map(d=>({id:d.id,...d.data()}))),
      err=>{console.warn('Groups listener failed:',err);setGroups([]);}
    );
    const u8=db.collection('tasks').onSnapshot(
      s=>setTasks(s.docs.map(d=>({id:d.id,...d.data()}))),
      err=>{console.warn('Tasks listener failed:',err);setTasks([]);}
    );
    const u9=db.collection('users').onSnapshot(
      s=>{
        const usersList = s.docs.map(d=>({id:d.id,...d.data()}));
        setAllUsers(usersList);
        setStaffMembers(usersList.filter(member=>member.role==='teacher'||member.role==='admin'));
      },
      err=>{console.warn('Users listener failed:',err);setAllUsers([]);setStaffMembers([]);}
    );
    const u10=db.collection('activityLog').onSnapshot(
      s=>setActivityLog(s.docs.map(d=>({id:d.id,...d.data()}))),
      err=>{console.warn('Activity log listener failed:',err);setActivityLog([]);}
    );
    return()=>{u1();u2();u3();u4();u5();u6();u7();u8();u9();u10();};
  },[user]);

  const notify=msg=>{setNotif(msg);setTimeout(()=>setNotif(''),3500);};
  const goTab=t=>{setTab(t);setSelStu(null);setMobileNav(false);};

  const isAdmin = user?.role==='admin' || normalizeText(user?.email)==='zakutailo.pavel@gmail.com';
  const isStaff = user?.role==='teacher' || user?.role==='admin';
  const canAssignTeacher = isAdmin;

  useEffect(()=>{
    if(user?.role==='teacher'&&!canAssignTeacher) setNTeach(user.displayName||'');
    if(user?.displayName) setTaskAssignee(canonicalTeacherName(user.displayName));
  },[user,canAssignTeacher]);

  const myStudents = useMemo(()=>{
    if(!user) return [];
    if(user.role==='teacher') return isAdmin?students:students.filter(s=>canonicalTeacherName(s.teacher)===canonicalTeacherName(user.displayName));
    if(user.role==='admin')   return students;
    if(user.role==='parent'){
      const linkedNames = parseLinkedNames(user.childName);
      const userEmail = normalizeText(user.email);
      return students.filter(s=>{
        const studentName = normalizeText(s.name);
        const studentEmail = normalizeText(s.email);
        const parentEmail = normalizeText(s.parentEmail || s.contactEmail || s.guardianEmail);
        const linkedParentId = s.linkedParentId || s.parentUid || s.guardianUid || '';
        return linkedParentId===user.uid || linkedNames.includes(studentName) || (!!userEmail && (studentEmail===userEmail || parentEmail===userEmail));
      });
    }
    return students.filter(s=>s.name?.toLowerCase()===user.displayName?.toLowerCase());
  },[user,students,isAdmin]);

  const parentAlerts = useMemo(()=>{
    if(!isAdmin) return [];
    return allUsers
      .filter(parent=>{
        if(parent.role!=='parent') return false;
        const childKey = parseLinkedNames(parent.childName).join('|');
        if(!childKey) return false;
        return !(parent.parentReviewStatus==='checked' && parent.parentReviewKey===childKey);
      })
      .map(parent=>{
        const rawChildNames = String(parent.childName||'')
          .split(/[,\n;|]+/)
          .map(name=>name.trim())
          .filter(Boolean);
        const childNames = rawChildNames.length ? rawChildNames : parseLinkedNames(parent.childName);
        const parentEmail = normalizeText(parent.email);
        const parentName = normalizeText(parent.displayName);
        const missingNames = childNames.filter(childName=>{
          const childKey = normalizeText(childName);
          return !students.some(student=>{
            const studentName = normalizeText(student.name);
            const studentParentEmail = normalizeText(student.parentEmail || student.contactEmail || student.guardianEmail);
            const studentParentName = normalizeText(student.parentName || student.guardianName);
            const linkedParentId = student.linkedParentId || student.parentUid || student.guardianUid || '';
            return linkedParentId===parent.id ||
              (studentName===childKey && !!parentEmail && studentParentEmail===parentEmail) ||
              (studentName===childKey && !!parentName && studentParentName===parentName);
          });
        });
        if(missingNames.length===0) return null;
        return {parent,childNames:missingNames};
      })
      .filter(Boolean);
  },[allUsers,students,isAdmin]);

  const groupOptions = useMemo(()=>
    [...new Set([
      ...myStudents.map(s=>(s.group||'').trim()).filter(Boolean),
      ...groups.map(g=>(g.name||'').trim()).filter(Boolean)
    ])].sort((a,b)=>a.localeCompare(b,'et'))
  ,[myStudents,groups]);

  const filteredStudents = useMemo(()=>{
    const levelRank = LEVELS.reduce((acc,level,index)=>{acc[level]=index;return acc;},{});
    const textValue = value => normalizeText(value||'');
    const base = myStudents
      .filter(s=>stuFilter==='active'?s.active!==false:stuFilter==='inactive'?s.active===false:true)
      .filter(s=>groupFilter==='all'?true:(s.group||'').trim()===groupFilter)
      .filter(s=>contactFilter==='all'?true:((s.contactStatus||'new')===contactFilter))
      .filter(s=>{
        const q=search.toLowerCase();
        return (s.name||'').toLowerCase().includes(q)
          || (s.parentName||'').toLowerCase().includes(q)
          || (s.teacher||'').toLowerCase().includes(q)
          || (s.email||'').toLowerCase().includes(q)
          || (s.phone||'').toLowerCase().includes(q)
          || (s.subject||'').toLowerCase().includes(q)
          || (s.grade||'').toLowerCase().includes(q)
          || (s.group||'').toLowerCase().includes(q)
          || (s.contactOwner||'').toLowerCase().includes(q)
          || (s.contactNotes||'').toLowerCase().includes(q);
      });
    return [...base].sort((a,b)=>{
      if(studentSort==='name_desc') return textValue(b.name).localeCompare(textValue(a.name),'et');
      if(studentSort==='level_asc') return (levelRank[a.level]??99)-(levelRank[b.level]??99) || textValue(a.name).localeCompare(textValue(b.name),'et');
      if(studentSort==='level_desc') return (levelRank[b.level]??99)-(levelRank[a.level]??99) || textValue(a.name).localeCompare(textValue(b.name),'et');
      if(studentSort==='subject_asc') return textValue(a.subject).localeCompare(textValue(b.subject),'et') || textValue(a.name).localeCompare(textValue(b.name),'et');
      if(studentSort==='group_asc') return textValue(a.group).localeCompare(textValue(b.group),'et') || textValue(a.name).localeCompare(textValue(b.name),'et');
      if(studentSort==='teacher_asc') return textValue(a.teacher).localeCompare(textValue(b.teacher),'et') || textValue(a.name).localeCompare(textValue(b.name),'et');
      return textValue(a.name).localeCompare(textValue(b.name),'et');
    });
  },[myStudents,stuFilter,groupFilter,contactFilter,search,studentSort]);

  const currentStu = useMemo(()=>{
    if(selStu){
      const resolved = students.find(s=>s.id===selStu.id)||selStu;
      if(user?.role==='teacher' && !isAdmin){
        return myStudents.find(s=>s.id===resolved.id) || null;
      }
      return resolved;
    }
    return user?.role!=='teacher' ? myStudents[0] : null;
  },[selStu,students,user,myStudents,isAdmin]);

  useEffect(()=>{
    if(!isStaff) return;
    if(schStu) return;
    const firstActiveStudent = myStudents.find(s=>s.active!==false);
    if(firstActiveStudent) setSchStu(firstActiveStudent.name);
  },[isStaff,myStudents,schStu]);

  const stuLessons = useMemo(()=>currentStu?lessons.filter(l=>{
    const matchesStudent = l.studentId===currentStu.id || normalizeText(l.studentName)===normalizeText(currentStu.name);
    if(!matchesStudent) return false;
    if(user?.role==='admin' || user?.role==='parent' || user?.role==='student') return true;
    return canonicalTeacherName(l.teacher)===canonicalTeacherName(user.displayName);
  }):[]
  ,[currentStu,lessons,user]);
  const stuHw  = useMemo(()=>currentStu?homework.filter(h=>h.studentId===currentStu.id):[]  ,[currentStu,homework]);
  const stuInv = useMemo(()=>currentStu?invoices.filter(i=>i.studentId===currentStu.id):[] ,[currentStu,invoices]);
  const stuMessages = useMemo(()=>currentStu?messages.filter(m=>
    m.studentId===currentStu.id || normalizeText(m.studentName)===normalizeText(currentStu.name)
  ):[],[currentStu,messages]);
  const scopedInvoices = useMemo(()=>{
    if(user?.role==='admin') return invoices;
    const myStudentIds = new Set(myStudents.map(s=>s.id));
    const myStudentNames = new Set(myStudents.map(s=>normalizeText(s.name)));
    return invoices.filter(inv=>myStudentIds.has(inv.studentId) || myStudentNames.has(normalizeText(inv.studentName)));
  },[invoices,myStudents,user]);
  const scopedParents = useMemo(()=>{
    const parentUsers = allUsers.filter(member=>member.role==='parent');
    if(isAdmin) return parentUsers;
    const myStudentIds = new Set(myStudents.map(s=>s.linkedParentId || s.parentUid || s.guardianUid).filter(Boolean));
    const myStudentNames = new Set(myStudents.map(s=>normalizeText(s.name)).filter(Boolean));
    const myParentEmails = new Set(myStudents.map(s=>normalizeText(s.parentEmail || s.contactEmail || s.guardianEmail || s.email)).filter(Boolean));
    const myParentNames = new Set(myStudents.map(s=>normalizeText(s.parentName || s.guardianName)).filter(Boolean));
    return parentUsers.filter(parent=>{
      const parentChildNames = parseLinkedNames(parent.childName);
      return myStudentIds.has(parent.id) ||
        myParentEmails.has(normalizeText(parent.email)) ||
        myParentNames.has(normalizeText(parent.displayName)) ||
        parentChildNames.some(childName=>myStudentNames.has(childName));
    });
  },[allUsers,myStudents,isAdmin]);
  const scopedTasks = useMemo(()=>{
    if(user?.role==='admin' || isAdmin) return tasks;
    const teacherName = canonicalTeacherName(user?.displayName||'');
    return tasks.filter(task=>
      canonicalTeacherName(task.assignedTo||'')===teacherName ||
      canonicalTeacherName(task.createdByName||'')===teacherName ||
      task.createdByUid===user?.uid
    );
  },[tasks,user,isAdmin]);
  const scopedActivityLog = useMemo(()=>{
    if(user?.role==='admin' || isAdmin) return activityLog;
    const myStudentIds = new Set(myStudents.map(s=>s.id));
    const myStudentNames = new Set(myStudents.map(s=>normalizeText(s.name)));
    return activityLog.filter(item=>
      item.byUid===user?.uid ||
      myStudentIds.has(item.studentId) ||
      myStudentNames.has(normalizeText(item.studentName))
    );
  },[activityLog,user,isAdmin,myStudents]);

  const logActivity=useCallback(async(type,label,meta={})=>{
    if(!user) return;
    try{
      await db.collection('activityLog').add({
        type,
        label,
        meta,
        studentId:meta.studentId||'',
        studentName:meta.studentName||'',
        byUid:user.uid||'',
        byName:user.displayName||user.email||'',
        byRole:user.role||'',
        createdAt:new Date().toISOString(),
        date:today()
      });
    }catch(err){
      console.warn('Activity log failed:',err);
    }
  },[user]);

  const createMissingParentStudents=useCallback(async(parent)=>{
    if(!parent?.id){notify('⚠ Lapsevanema konto puudub');return;}
    try{
      await ensureParentStudentRecords(
        {uid:parent.id,displayName:parent.displayName,email:parent.email},
        {...parent,uid:parent.id,role:'parent'}
      );
      await logActivity('parent.student_sync','Lapsevanema õpilase kaart kontrolliti',{
        parentUid:parent.id,
        parentName:parent.displayName||'',
        parentEmail:parent.email||'',
        childName:parent.childName||''
      });
      await db.collection('users').doc(parent.id).set({
        parentReviewStatus:'checked',
        parentReviewKey:parseLinkedNames(parent.childName).join('|'),
        parentReviewedAt:new Date().toISOString(),
        parentReviewedBy:user?.displayName||user?.email||''
      },{merge:true});
      notify('✓ Õpilase kaart kontrollitud / loodud');
    }catch(err){
      console.error('Parent student sync failed:',err);
      notify('⚠ Õpilast ei saanud luua');
    }
  },[logActivity,user]);

  const markParentChecked=useCallback(async(parent)=>{
    if(!parent?.id){notify('⚠ Lapsevanema konto puudub');return;}
    try{
      await db.collection('users').doc(parent.id).set({
        parentReviewStatus:'checked',
        parentReviewKey:parseLinkedNames(parent.childName).join('|'),
        parentReviewedAt:new Date().toISOString(),
        parentReviewedBy:user?.displayName||user?.email||''
      },{merge:true});
      await logActivity('parent.review_checked','Lapsevanema registreering märgiti kontrollituks',{
        parentUid:parent.id,
        parentName:parent.displayName||'',
        parentEmail:parent.email||'',
        childName:parent.childName||''
      });
      notify('✓ Lapsevanem märgitud kontrollituks');
    }catch(err){
      console.error('Parent review failed:',err);
      notify('⚠ Kontrolli märget ei saanud salvestada');
    }
  },[logActivity,user]);

  // ACTIONS
  const addStudent=useCallback(async()=>{
    if(!nName.trim()){notify('⚠ Sisesta õpilase nimi');return;}
    const t=canAssignTeacher?nTeach:canonicalTeacherName(user.displayName);
    const ref = await db.collection('students').add({name:nName,parentName:nParentName,level:nLevel,targetLevel:nTarget,teacher:t,phone:nPhone,email:nEmail,active:true,packageTotal:parseInt(nPkg)||0,packageUsed:0,subject:nSubject,grade:nGrade,group:nGroup,contactStatus:'new',contactOwner:user?.displayName||'',contactLastAt:'',contactNotes:'',createdAt:today()});
    await logActivity('student.created','Lisati õpilane',{studentId:ref.id,studentName:nName,teacher:t});
    setNName('');setNParentName('');setNPhone('');setNEmail('');setNGroup('');
    notify('✓ Õpilane '+nName+' lisatud!');
  },[nName,nParentName,nLevel,nTarget,nTeach,nPhone,nEmail,nPkg,nSubject,nGrade,nGroup,canAssignTeacher,user,logActivity]);

  const addTask=useCallback(async()=>{
    if(!taskTitle.trim()){notify('⚠ Sisesta ülesande pealkiri');return;}
    const ref = await db.collection('tasks').add({
      title:taskTitle.trim(),
      assignedTo:canonicalTeacherName(taskAssignee||user.displayName),
      dueDate:taskDue||'',
      priority:taskPriority||'normal',
      category:taskCategory||'general',
      status:'open',
      createdByUid:user.uid||'',
      createdByName:user.displayName||user.email||'',
      createdByRole:user.role||'',
      createdAt:today()
    });
    await logActivity('task.created','Lisati ülesanne',{taskId:ref.id,taskTitle:taskTitle.trim(),assignedTo:canonicalTeacherName(taskAssignee||user.displayName)});
    setTaskTitle('');
    setTaskPriority('normal');
    setTaskCategory('general');
    notify('✓ Ülesanne lisatud!');
  },[taskTitle,taskAssignee,taskDue,taskPriority,taskCategory,user,logActivity]);

  const toggleTask=useCallback(async(task)=>{
    if(!task?.id) return;
    const done = task.status==='done';
    await db.collection('tasks').doc(task.id).update({
      status:done?'open':'done',
      doneAt:done?'':today(),
      doneByUid:done?'':(user.uid||''),
      doneByName:done?'':(user.displayName||user.email||'')
    });
    await logActivity(done?'task.reopened':'task.done',done?'Ülesanne avati uuesti':'Ülesanne märgiti tehtuks',{taskId:task.id,taskTitle:task.title||''});
    notify(done?'✓ Ülesanne avatud':'✓ Ülesanne tehtud');
  },[user,logActivity]);

  const replyTask=useCallback(async(task,text)=>{
    if(!task?.id) return;
    const cleanText = String(text||'').trim();
    if(!cleanText){notify('⚠ Kirjuta vastus');return;}
    const reply = {
      id:`${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
      text:cleanText,
      byUid:user.uid||'',

    if(!event||!attendanceKey){notify('⚠ Tundi ei leitud');return;}
    const shouldClear = status==='clear';
    const attendance = {
        status,
        by:user.uid||'',
        byName:user.displayName||user.email||'',
        byRole:user.role||'',
        updatedAt:new Date().toISOString()
      };
    if(event.isGroup){
      const group = groups.find(g=>g.id===event.groupId);
      if(!group){notify('⚠ Gruppi ei leitud');return;}
      const lessons = (group.lessons||[]).map(lesson=>{
        if(lesson.id!==event.groupLessonId) return lesson;
        const nextAttendance = {...(lesson.attendance||{})};
        if(shouldClear) delete nextAttendance[attendanceKey];
        else nextAttendance[attendanceKey] = attendance;
        return {...lesson,attendance:nextAttendance};
      });
      await db.collection('groups').doc(group.id).update({lessons,updatedAt:new Date().toISOString()});
    }else{
      if(shouldClear){
        await db.collection('schedule').doc(event.id).update({
          [`attendance.${attendanceKey}`]: firebase.firestore.FieldValue.delete()
        });
      }else{
        await db.collection('schedule').doc(event.id).update({
          [`attendance.${attendanceKey}`]: attendance
        });
      }
    }

        reader.readAsDataURL(lessonFile);
      });
      try{

        if(lessonFile.size <= 650*1024){
          fileUrl = await saveInlineFile();
          fileName = lessonFile.name;
        }else{
          notify('⚠ Faili üleslaadimine ei õnnestunud. Kontrolli Firebase Storage õiguseid või vali väiksem fail.');

        type:lessonPayload.attachmentType,
        size:lessonPayload.attachmentSize,
        uploadedAt:existingLessonData.attachment?.uploadedAt || ''
      } : null;
    }
    const wasExistingLesson = !!existingLessonRef;
    let savedLessonId = existingLessonRef?.id || '';

      await existingLessonRef.update(lessonPayload);
    }else{
      const createdLessonRef = await db.collection('lessons').add({
        ...lessonPayload,
        createdAt: today()

    try{

      },{merge:true});
