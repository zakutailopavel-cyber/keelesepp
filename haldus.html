<!DOCTYPE html>
<html lang="et" style="color-scheme: light only;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KeeleSepp — Haldussüsteem</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        input, select, textarea { font-size: 16px !important; }
        .fc { background: white; padding: 16px; border-radius: 12px; border: 1px solid #f3f4f6; }
        .fc-theme-standard td, .fc-theme-standard th { border-color: #f3f4f6 !important; }
        .fc-button-primary { background-color: #f59e0b !important; border-color: #f59e0b !important; }
        .fc-button-primary:hover { background-color: #d97706 !important; border-color: #d97706 !important; }
        .fc-button-active { background-color: #b45309 !important; border-color: #b45309 !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">

    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-500"></div>
        </div>
    </div>

    <script type="text/babel">
        // === 1. ВАШИ РЕАЛЬНЫЕ КЛЮЧИ FIREBASE (Уже подставлены!) ===
        const firebaseConfig = {
            apiKey: "AIzaSyAp8emB0h1fIqv72k_05hkLkXVkfBt1al4",
            authDomain: "keelesepp-5136b.firebaseapp.com",
            projectId: "keelesepp-5136b",
            storageBucket: "keelesepp-5136b.appspot.com",
            messagingSenderId: "674098517935",
            appId: "1:674098517935:web:e73d04a4ada67874da015a"
        };

        // === 2. НАСТРОЙКА УНИКАЛЬНЫХ КАЛЕНДАРЕЙ ДЛЯ КАЖДОГО УЧИТЕЛЯ ===
        const TEACHER_CALENDARS = {
            "Pavel": "3f08fbae1919c9265a778775dcde5ab6e357d75d3b7b82a4eb0de3bee7c92c27@group.calendar.google.com",
            "Jelena": "95b9c475421fcf2cc0e4457073cb2849b18b9096520448d0e007f73867c9499b@group.calendar.google.com",
            "Elizaveta": "423bbfdf10ba74ab137238e1fdef0460fd8a553e57965e8619bfd99fda3451ab@group.calendar.google.com",
            "Angelina": "42823b2b40d5e1a07556fce2870789ffc55e534f677b97e3cda2a3f709769dfd@group.calendar.google.com"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        function App() {
            const [user, setUser] = React.useState(null);
            const [role, setRole] = React.useState(null);
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            
            const [students, setStudents] = React.useState([]);
            const [activeTab, setActiveTab] = React.useState('dashboard');

            const [newStudentName, setNewStudentName] = React.useState('');
            const [newStudentLevel, setNewStudentLevel] = React.useState('A1');

            const handleLogin = (e) => {
                e.preventDefault();
                setError('');
                if (!username || !password) {
                    setError('Palun täitke kõik väljad');
                    return;
                }

                const teachers = ['Pavel', 'Jelena', 'Elizaveta', 'Angelina'];
                const demoStudents = ['Marina', 'Aleksei', 'Olga', 'Dmitri', 'Natalia'];

                if (teachers.includes(username) && password === '1234') {
                    setUser(username);
                    setRole('teacher');
                } else if (demoStudents.includes(username) && password === '1234') {
                    setUser(username);
                    setRole('student');
                } else {
                    setError('Vale kasutajatunnus või parool');
                }
            };

            React.useEffect(() => {
                if (!user || role !== 'teacher') return;

                setLoading(true);
                const unsubscribe = db.collection("students").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                    const studentData = [];
                    snapshot.forEach((doc) => studentData.push({ id: doc.id, ...doc.data() }));
                    setStudents(studentData);
                    setLoading(false);
                }, (err) => {
                    console.error("Firestore viga:", err);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user, role]);

            React.useEffect(() => {
                if (activeTab === 'calendar') {
                    const calendarEl = document.getElementById('calendar-render-area');
                    if (!calendarEl) return;

                    const currentTeacherCalendar = TEACHER_CALENDARS[user];

                    const calendar = new FullCalendar.Calendar(calendarEl, {
                        initialView: window.innerWidth < 768 ? 'timeGridDay' : 'timeGridWeek',
                        locale: 'et',
                        firstDay: 1, 
                        slotMinTime: "08:00:00",
                        slotMaxTime: "21:00:00",
                        headerToolbar: {
                            left: 'prev,next today',
                            center: 'title',
                            right: window.innerWidth < 768 ? '' : 'dayGridMonth,timeGridWeek,timeGridDay'
                        },
                        events: currentTeacherCalendar ? {
                            googleCalendarId: currentTeacherCalendar,
                            className: 'bg-amber-500 text-white border-none rounded p-1 text-xs font-medium'
                        } : [],
                        dateClick: function(info) {
                            if (role === 'teacher') {
                                const title = prompt('Lisa uue tunni kirjeldus (nt: Aleksei - Eesti keel B1):');
                                if (title) {
                                    alert('Tund "' + title + '" on märgitud kuupäevale: ' + info.dateStr);
                                }
                            }
                        }
                    });
                    calendar.render();
                }
            }, [activeTab, user]);

            const addStudent = async (e) => {
                e.preventDefault();
                if (!newStudentName.trim()) return;

                try {
                    await db.collection("students").add({
                        name: newStudentName,
                        level: newStudentLevel,
                        teacher: user,
                        progress: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setNewStudentName('');
                    alert('Õpilane edukalt lisatud!');
                } catch (err) {
                    alert('Andmebaasi viga õpilase lisamisel.');
                }
            };

            if (!user) {
                return (
                    <div class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-amber-50 to-orange-100">
                        <div class="max-w-md w-full space-y-8 bg-white p-6 sm:p-8 rounded-2xl shadow-xl">
                            <div class="text-center">
                                <h2 class="text-3xl font-extrabold text-gray-900">KeeleSepp 🛠️</h2>
                                <p class="mt-2 text-sm text-gray-600">Õppesüsteemi sisselogimine</p>
                            </div>
                            <form class="mt-8 space-y-4" onSubmit={handleLogin}>
                                {error && <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm text-center font-medium">{error}</div>}
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Kasutajatunnus</label>
                                    <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} class="rounded-lg relative block w-full px-3 py-2.5 border border-gray-300 text-gray-900 focus:ring-amber-500 focus:border-amber-500 sm:text-sm" placeholder="Teie nimi (nt Pavel)" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Parool</label>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} class="rounded-lg relative block w-full px-3 py-2.5 border border-gray-300 text-gray-900 focus:ring-amber-500 focus:border-amber-500 sm:text-sm" placeholder="••••" />
                                </div>
                                <button type="submit" class="w-full flex justify-center py-3 px-4 text-sm font-medium rounded-lg text-white bg-amber-500 hover:bg-amber-600 transition-colors mt-6">
                                    Logi sisse
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div class="min-h-screen flex flex-col md:flex-row bg-gray-50">
                    <aside class="w-full md:w-64 bg-slate-900 text-white flex flex-col p-4 space-y-6">
                        <div class="flex items-center justify-between">
                            <span class="text-xl font-bold tracking-wider text-amber-400">KeeleSepp</span>
                            <span class="text-xs bg-slate-800 px-2 py-1 rounded text-slate-400">{role === 'teacher' ? 'Õpetaja' : 'Õpilane'}</span>
                        </div>
                        <div class="text-sm border-b border-slate-800 pb-4">
                            <p class="text-slate-400">Kasutaja: <span class="font-semibold text-amber-100">{user}</span></p>
                        </div>
                        <nav class="flex-1 space-y-1">
                            <button onClick={() => setActiveTab('dashboard')} class={`w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors ${activeTab === 'dashboard' ? 'bg-amber-500 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                <i class="fa-solid fa-chart-pie mr-2 w-5"></i> Töölaud
                            </button>
                            <button onClick={() => setActiveTab('calendar')} class={`w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors ${activeTab === 'calendar' ? 'bg-amber-500 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                <i class="fa-solid fa-calendar-days mr-2 w-5"></i> Tunniplaan / Kalender
                            </button>
                            <button onClick={() => setActiveTab('students')} class={`w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors ${activeTab === 'students' ? 'bg-amber-500 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                <i class="fa-solid fa-graduation-cap mr-2 w-5"></i> {role === 'teacher' ? 'Õpilased' : 'Minu progress'}
                            </button>
                        </nav>
                        <button onClick={() => { setUser(null); setRole(null); }} class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-red-400 hover:bg-slate-800 transition-colors">
                            <i class="fa-solid fa-right-from-bracket mr-2"></i> Logi välja
                        </button>
                    </aside>

                    <main class="flex-1 p-4 md:p-8 overflow-y-auto">
                        {activeTab === 'dashboard' && (
                            <div class="space-y-6">
                                <h1 class="text-2xl font-bold text-gray-900">Tere, {user}!</h1>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                        <p class="text-sm font-medium text-gray-400 uppercase">Aktiivsed õpilased baasis</p>
                                        <p class="text-3xl font-bold text-gray-900 mt-2">{students.length}</p>
                                    </div>
                                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                        <p class="text-sm font-medium text-gray-400 uppercase">Sünkroonimine</p>
                                        <p class="text-base text-emerald-600 mt-2 font-medium">Google Multi-Calendar moodul aktiivne</p>
                                    </div>
                                </div>

                                {role === 'teacher' && (
                                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mt-6">
                                        <h3 class="text-lg font-bold mb-4">Lisa uus õpilane reaalajas baasi</h3>
                                        <form onSubmit={addStudent} class="flex flex-col sm:flex-row gap-4">
                                            <input type="text" value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)} placeholder="Õpilase täisnimi" class="flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm" required />
                                            <select value={newStudentLevel} onChange={(e) => setNewStudentLevel(e.target.value)} class="rounded-lg border border-gray-300 px-3 py-2 text-sm">
                                                <option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option>
                                            </select>
                                            <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                                                + Lisa õpilane
                                            </button>
                                        </form>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'calendar' && (
                            <div class="space-y-6">
                                <div class="flex items-center justify-between flex-wrap gap-4">
                                    <h1 class="text-2xl font-bold text-gray-900">Õpetaja {user} tunniplaan</h1>
                                    <span class="text-xs text-gray-500 bg-white border px-3 py-1.5 rounded-lg">Google Sync: OK</span>
                                </div>
                                <div id="calendar-render-area"></div>
                            </div>
                        )}

                        {activeTab === 'students' && (
                            <div class="space-y-6">
                                <h1 class="text-2xl font-bold text-gray-900">{role === 'teacher' ? 'Õpilaste nimekiri (Firebase)' : 'Minu progress'}</h1>
                                <div class="bg-white shadow-sm rounded-xl border border-gray-100 overflow-hidden">
                                    {role === 'teacher' ? (
                                        <div class="overflow-x-auto">
                                            <table class="w-full text-left border-collapse">
                                                <thead>
                                                    <tr class="bg-gray-50 border-b border-gray-100 text-xs font-semibold text-gray-500 uppercase">
                                                        <th class="p-4">Nimi</th>
                                                        <th class="p-4">Tase</th>
                                                        <th class="p-4">Õpetaja</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="divide-y divide-gray-100 text-sm">
                                                    {students.length === 0 ? (
                                                        <tr>
                                                            <td colspan="3" class="p-4 text-center text-gray-400">Õpilasi pole ещё добавлены. Добавьте первого ученика со страницы «Тöölaud»!</td>
                                                        </tr>
                                                    ) : (
                                                        students.map((student) => (
                                                            <tr key={student.id}>
                                                                <td class="p-4 font-medium text-gray-900">{student.name}</td>
                                                                <td class="p-4"><span class="px-2 py-1 bg-amber-50 text-amber-700 text-xs font-bold rounded">{student.level}</span></td>
                                                                <td class="p-4 text-gray-500">{student.teacher}</td>
                                                            </tr>
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : (
                                        <div class="p-6 text-gray-500 text-sm">Teie individuaalne õppekava.</div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
