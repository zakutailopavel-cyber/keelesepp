window.addEventListener('error', function(event){
  var message = event && event.message ? event.message : 'Unknown error';
  var source = event && event.filename ? event.filename : '';
  window.__haldusLastError = source ? (message + ' @ ' + source) : message;
});
window.addEventListener('unhandledrejection', function(event){
  var reason = event && event.reason;
  if(!reason){
    window.__haldusLastError = 'Unhandled promise rejection';
    return;
  }
  if(typeof reason === 'string'){
    window.__haldusLastError = reason;
    return;
  }
  if(reason && reason.message){
    window.__haldusLastError = reason.message;
    return;
  }
  try{
    window.__haldusLastError = JSON.stringify(reason);
  }catch(e){
    window.__haldusLastError = 'Unhandled promise rejection';
  }
});

// ── TEACHER MATCH HELPER ──────────────────────────────────────
const teacherMatches = (a, b) => {
  if(!a || !b) return false;
  return canonicalTeacherName(a) === canonicalTeacherName(b);
};
const isOwnStudentRecord = (student, profile) => {
  if(!student || !profile) return false;
  const uid = profile.uid || profile.id || '';
  const linkedUid = student.linkedUserId || student.studentUid || '';
  const linkedParentUid = student.linkedParentId || student.parentUid || student.guardianUid || '';
  if(uid && linkedUid===uid) return true;
  if(student.isSelfStudent && normalizeText(student.email) && normalizeText(student.email)===normalizeText(profile.email)) return true;
  if(uid && linkedParentUid===uid && normalizeText(student.name)===normalizeText(profile.displayName)) return true;
  return false;
};
const money = value => {
  const n = Number(value)||0;
  return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/\.?0+$/,'');
};
const invoiceDraftForStudent = (student, amountInput='', descInput='') => {
  const lessons = Math.max(0, Number(student?.lessonsSinceInvoice)||0);
  const lessonPrice = Math.max(0, Number(student?.lessonPrice)||0);
  const autoAmount = lessons>0&&lessonPrice>0 ? Math.round(lessons*lessonPrice*100)/100 : 0;
  const manualAmount = Number(String(amountInput||'').replace(',','.'))||0;
  const amount = manualAmount||autoAmount;
  const autoDesc = lessons>0&&lessonPrice>0
    ? `${lessons} keeletundi x ${money(lessonPrice)}€`
    : 'Keeletunnid';
  const desc = String(descInput||'').trim()||autoDesc;
  return {lessons,lessonPrice,autoAmount,manualAmount,amount,desc,hasAuto:autoAmount>0};
};
const getLessonAttachments = lesson => {
  const list = Array.isArray(lesson?.attachments) ? lesson.attachments.filter(att=>att&&(att.url||att.name)) : [];
  const legacyUrl = lesson?.fileUrl || lesson?.attachmentUrl || lesson?.attachment?.url || '';
  const legacyName = lesson?.fileName || lesson?.attachmentName || lesson?.attachment?.name || '';
  const legacy = legacyUrl ? [{url:legacyUrl,name:legacyName||'Tunni fail'}] : [];
  const urls = new Set(list.map(att=>att.url).filter(Boolean));
  return [...list,...legacy.filter(att=>!urls.has(att.url))];
};

          <div style={{fontSize:'.78rem',color:'#42536A',marginTop:3}}>Õp. {lesson.teacher||'—'} · {fmtDate(lesson.date)}</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',justifyContent:'flex-end'}}>
          <span className="badge" style={{background:'#dcfce7',color:'#166534'}}>{statusLabel}</span>
          {lesson.status==='Toimunud'&&lesson.grade>0&&<span className="badge" style={{background:'rgba(201,136,42,.12)',color:'#A96E1A'}}>Hinne {lesson.grade}</span>}
          {lesson.duration&&<span className="badge" style={{background:'#e0f2fe',color:'#075985'}}>{lesson.duration} min</span>}

      {detailRows.length===0&&attachments.length===0&&relatedHomework.length===0&&(
        <div style={{fontSize:'.82rem',color:'#42536A'}}>Õpetaja ei ole selle tunni kohta veel detailset päevikukannet lisanud.</div>
      )}
      {detailRows.map(row=>(

        </div>
      ))}
      {relatedHomework.length>0&&(
        <div style={{padding:'10px 12px',borderRadius:12,background:'#fff',border:'1px solid rgba(124,58,237,.14)',display:'flex',flexDirection:'column',gap:8}}>

              <span className="badge" style={{background:hw.status==='Tehtud'?'#dcfce7':'#f3e8ff',color:hw.status==='Tehtud'?'#166534':'#7c3aed',flexShrink:0}}>
                {hw.due?`tähtaeg ${fmtDate(hw.due)}`:(hw.status||'ootel')}
              </span>
            </div>
          ))}
        </div>
      )}
      {attachments.length>0&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',paddingTop:2}}>
          {attachments.map((att,idx)=>(
            <a key={`${att.url||att.name}-${idx}`} href={att.url||'#'} target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:'.78rem',fontWeight:800,color:'#2F5D50',textDecoration:'none',padding:'7px 10px',borderRadius:10,background:'#fff',border:'1px solid rgba(47,93,80,.16)'}}>
              <i className="fa-solid fa-paperclip"/> {att.name||'Tunni fail'}

      )}

}

// ── PROGRESSIGRAAFIK ─────────────────────────────────────────
function ProgressChart({data}) {
  const ref = useRef(null);
  useEffect(()=>{
    if(!ref.current||data.length<2) return;
    const sorted=[...data].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const ch=new Chart(ref.current.getContext('2d'),{
      type:'line',
      data:{labels:sorted.map(d=>fmtDate(d.date)),datasets:[{
        data:sorted.map(d=>d.grade),borderColor:'#C9882A',backgroundColor:'rgba(201,136,42,0.07)',
        borderWidth:2.5,tension:0.4,fill:true,pointBackgroundColor:'#2F5D50',pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:5
      }]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{min:1,max:5,ticks:{stepSize:1}},x:{grid:{display:false}}}}
    });
    return ()=>ch.destroy();
  },[data]);
  if(data.length<2) return <div style={{textAlign:'center',padding:'30px 0',color:'#42536A',fontSize:'.88rem'}}>Graafiku jaoks vajatakse vähemalt 2 tundi ✨</div>;
  return <div style={{height:200}}><canvas ref={ref}/></div>;
}

// ── AUTH SCREEN ───────────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [mode,setMode]   = useState(()=>{
    try{
      const params = new URLSearchParams(window.location.search);
      const route = (params.get('mode') || window.location.hash.replace('#','')).toLowerCase();
      return ['register','registreeru','signup','loo-konto'].includes(route) ? 'register' : 'login';
    }catch(e){
      return 'login';
    }
  });
  const [role,setRole]   = useState('parent');
  const [name,setName]   = useState('');
  const [email,setEmail] = useState('');
  const [pass,setPass]   = useState('');
  const [pass2,setPass2] = useState('');
  const [child,setChild] = useState('');
  const [parentTeacher,setParentTeacher] = useState('Pavel');
  const [code,setCode]   = useState('');
  const [studentCardId,setStudentCardId] = useState('');
  const [err,setErr]     = useState('');
  const [info,setInfo]   = useState('');
  const [busy,setBusy]   = useState(false);
  const reset = m=>{setMode(m);setErr('');setInfo('');setPass('');setPass2('');};

  const googleLogin = async()=>{
    setErr('');setBusy(true);
    try{
      const res=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      const u=res.user;
      const snap=await db.collection('users').doc(u.uid).get();
      if(snap.exists){
        const profile = {uid:u.uid,displayName:u.displayName,email:u.email,...snap.data()};
        try{
          await ensureStudentRecord(u, profile);
          await ensureParentStudentRecords(u, profile);
        }catch(syncErr){
          console.warn('Profile sync after Google login failed:', syncErr);
        }
        onLogin(profile);
      }
      else{
        const ud={role:'parent',displayName:u.displayName,email:u.email,childName:'',preferredTeacher:'Pavel',createdAt:today()};
        await db.collection('users').doc(u.uid).set(ud);
        try{
          await ensureParentStudentRecords(u, {uid:u.uid,...ud});
        }catch(syncErr){
          console.warn('Parent student bootstrap after Google signup failed:', syncErr);
        }
        onLogin({uid:u.uid,...ud});
      }
    }catch(e){setErr('Google sisselogimine ebaõnnestus.');}
    setBusy(false);
  };

  const emailLogin = async()=>{
    if(!email||!pass){setErr('Täida kõik väljad');return;}
    setErr('');setBusy(true);
    try{
      const res=await auth.signInWithEmailAndPassword(email,pass);
      const snap=await db.collection('users').doc(res.user.uid).get();
      if(snap.exists){
        const profile = {uid:res.user.uid,displayName:res.user.displayName||email,...snap.data()};
        try{
          await ensureStudentRecord(res.user, profile);
          await ensureParentStudentRecords(res.user, profile);
        }catch(syncErr){
          console.warn('Profile sync after email login failed:', syncErr);
        }
        onLogin(profile);
      }
      else onLogin({uid:res.user.uid,displayName:res.user.displayName||email,email,role:'parent'});
    }catch(e){
      const m={'auth/user-not-found':'Kasutajat ei leitud','auth/wrong-password':'Vale parool','auth/invalid-credential':'Vale e-post või parool'};
      setErr(m[e.code]||e.message);
    }
    setBusy(false);
  };

  const register = async()=>{
    if(!name.trim()||!email.trim()||!pass){setErr('Täida kõik kohustuslikud väljad');return;}
    if(pass!==pass2){setErr('Paroolid ei ühti');return;}
    if(pass.length<6){setErr('Parool peab olema vähemalt 6 tähemärki');return;}
    if(!['parent','student'].includes(role)){setErr('Õpetaja ja administraatori kontod loob administraator.');return;}
    setErr('');setBusy(true);
    try{
      const res=await auth.createUserWithEmailAndPassword(email,pass);
      await res.user.updateProfile({displayName:name});
      const ud={role,displayName:name,email,childName:role==='parent'?child:'',preferredTeacher:role==='parent'?parentTeacher:'',createdAt:today()};
      await db.collection('users').doc(res.user.uid).set(ud);
      try{
        if(ud.role==='student'){
          // 1. If student provided their card ID — link directly
          if(studentCardId){
            const cardSnap = await db.collection('students').doc(studentCardId).get();
            if(cardSnap.exists){
              await db.collection('students').doc(studentCardId).update({
                studentUid: res.user.uid,
                linkedUserId: res.user.uid,
                email: email||cardSnap.data().email||'',
                updatedAt: today()
              });
              console.log('Linked by ID to card:', studentCardId);
            } else {
              // ID not found — create new
              await ensureStudentRecord(res.user, ud);
            }
          } else {
            // 2. Try to find existing card by email or name
            const existingByEmail = email ? await db.collection('students').where('email','==',email).limit(1).get() : {empty:true};
            const existingByName = name ? await db.collection('students').where('name','==',name.trim()).limit(1).get() : {empty:true};
            const existingDoc = (!existingByEmail.empty && existingByEmail.docs[0])
              || (!existingByName.empty && existingByName.docs[0])
              || null;
            if(existingDoc){
              await db.collection('students').doc(existingDoc.id).update({
                studentUid: res.user.uid,
                linkedUserId: res.user.uid,
                email: email||existingDoc.data().email||'',
                updatedAt: today()
              });
              console.log('Auto-linked to existing card:', existingDoc.id);
            } else {
              await ensureStudentRecord(res.user, ud);
            }
          }
        } else {
          await ensureStudentRecord(res.user, ud);
          await ensureParentStudentRecords(res.user, ud);
        }
      }catch(syncErr){
        console.warn('Profile sync after registration failed:', syncErr);
      }
      onLogin({uid:res.user.uid,...ud});
    }catch(e){
      const m={'auth/email-already-in-use':'See e-post on juba registreeritud','auth/invalid-email':'Vigane e-post'};
      setErr(m[e.code]||e.message);
    }
    setBusy(false);
  };

  const forgot = async()=>{
    if(!email){setErr('Sisesta oma e-posti aadress');return;}
    setBusy(true);
    try{await auth.sendPasswordResetEmail(email);setInfo('Taastamislink saadetud aadressile '+email);setErr('');}
    catch(e){setErr(e.message);}
    setBusy(false);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16,
      background:'linear-gradient(135deg,#1C2B3A 0%,#2F5D50 100%)'}}>
      <div style={{background:'#FBFAF8',borderRadius:24,padding:'40px 36px',width:'100%',maxWidth:420,boxShadow:'0 32px 80px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'2rem',fontWeight:600}}>
            Keele<span style={{color:'#C9882A'}}>Sepp</span>
          </div>
          <div style={{fontSize:'.82rem',color:'#42536A',marginTop:4}}>
            {mode==='login'?'Sisselogimine':mode==='register'?'Uue konto loomine':'Parooli taastamine'}
          </div>
        </div>

        {mode==='register'&&(
          <div style={{display:'flex',background:'#EFEDE7',borderRadius:12,padding:4,marginBottom:20,gap:3}}>
            {[{id:'parent',l:'Lapsevanem'},{id:'student',l:'Õpilane'}].map(r=>(
              <button key={r.id} onClick={()=>setRole(r.id)}
                style={{flex:1,padding:'8px 4px',borderRadius:9,border:'none',cursor:'pointer',fontWeight:600,fontSize:'.78rem',
                  background:role===r.id?'#1C2B3A':'transparent',color:role===r.id?'#fff':'#42536A'}}>
                {r.l}
              </button>
            ))}
          </div>
        )}

        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
          {mode==='register'&&<input value={name} onChange={e=>setName(e.target.value)} placeholder="Täisnimi *"/>}
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&mode==='login'&&emailLogin()}
            placeholder="E-posti aadress *"/>
          {mode!=='forgot'&&<input type="password" value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&mode==='login'&&emailLogin()}
            placeholder="Parool *"/>}
          {mode==='register'&&<>
            <input type="password" value={pass2} onChange={e=>setPass2(e.target.value)} placeholder="Korda parooli *"/>
            {role==='parent'&&<>

}

  const teacherScope = canonicalTeacherName(user.displayName);

  const currentStu= !isStaff?myStudents[0]:null;

  const stuLessons= currentStu?lessons.filter(l=>l.studentId===currentStu.id||l.studentName?.toLowerCase()===currentStu.name?.toLowerCase()):[];
  const linkedStudentNames = myStudents.map(s=>normalizeText(s.name));
  const visibleLessons = isStaff
    ? (isAdmin ? lessons : lessons.filter(l=>canonicalTeacherName(l.teacher)===teacherScope))

        myStudents.some(s=>s.id===l.studentId) ||
        linkedStudentNames.includes(normalizeText(l.studentName))

  const parentOwnStudyStudents = hasUserRole(user,'parent') ? myStudents.filter(student=>isOwnStudentRecord(student,user)) : [];
  const parentFamilyStudents = parentOwnStudyStudents.length
    ? myStudents.filter(student=>!isOwnStudentRecord(student,user))
    : myStudents;
  const parentFocusStudents = parentDashboardMode==='self' && parentOwnStudyStudents.length
    ? parentOwnStudyStudents
    : (parentFamilyStudents.length ? parentFamilyStudents : myStudents);
  const parentFocusIds = new Set(parentFocusStudents.map(student=>student.id));
  const parentFocusNames = new Set(parentFocusStudents.map(student=>normalizeText(student.name)));
  const dashboardVisibleLessons = hasUserRole(user,'parent')
    ? visibleLessons.filter(lesson=>parentFocusIds.has(lesson.studentId)||parentFocusNames.has(normalizeText(lesson.studentName)))
    : visibleLessons;
  const attendance= stuLessons.length?Math.round(doneLess.length/stuLessons.length*100):0;
  const unassignedStudents = isAdmin ? myStudents.filter(student=>student.active!==false && !canonicalTeacherName(student.teacher||'') && !student.hiddenFields?.teacher) : [];
  const newContactStudents = isAdmin ? myStudents.filter(student=>student.active!==false && (student.contactStatus||'new')==='new' && !student.hiddenFields?.contactStatus) : [];

  const overdueTasks = isAdmin ? openTasks.filter(task=>task.dueDate && task.dueDate<today()) : [];
  const unreadTaskReplies = isStaff ? tasks.filter(task=>

  return(

        <div style={{color:'#42536A',fontSize:'.88rem',marginTop:4}}>
          {new Date().toLocaleDateString('et-EE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
        </div>
      </div>

      {(unreadMessages||[]).length>0&&(
        <div className="card" style={{padding:20,border:'1px solid rgba(47,93,80,.25)',background:'#f0fdf9'}}>
          <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <i className="fa-solid fa-envelope" style={{color:'#2F5D50'}}/>
              <strong style={{color:'#2F5D50'}}>Uued sõnumid</strong>
              <span className="badge" style={{background:'#2F5D50',color:'#fff'}}>{(unreadMessages||[]).length}</span>
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {[...(unreadMessages||[])].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5).map(msg=>(
              <div key={msg.id} style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,alignItems:'center',padding:'10px 12px',borderRadius:10,background:'#fff',border:'1px solid rgba(47,93,80,.12)'}}>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:'.86rem'}}>{msg.fromName||'—'} <span style={{fontWeight:400,color:'#42536A'}}>· {msg.studentName}</span></div>
                  <div style={{fontSize:'.78rem',color:'#42536A',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{msg.text}</div>
                  <div style={{fontSize:'.7rem',color:'#9ca3af',marginTop:2}}>{msg.createdAt?new Date(msg.createdAt).toLocaleString('et-EE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}</div>

                  Loetud

      {isStaff&&(newWsResults||[]).length>0&&(

          ? ownStudyStudents
          : parentFocusStudents;

          ? 'Sinu enda tunnid, kodutööd, progress ja arved.'
          : 'Laste tunnid, kodutööd, progress ja arved ühes kohas.';

		        // Upcoming lessons for all children
		        const childIds = new Set(dashboardStudents.map(s=>s.id));
		        const childNames = new Set(dashboardStudents.map(s=>normalizeText(s.name)));
	        const parentHasStudent = (studentId,studentName) =>
	          childIds.has(studentId)||childNames.has(normalizeText(studentName));
	        const upcomingLessons = [];
	        (schedule||[]).forEach(ev=>{
	          if(ev.status==='Tühistatud') return;
	          const isChild = parentHasStudent(ev.studentId,ev.studentName);
	          if(!isChild) return;
          if(ev.date && ev.date>=todayIso && ev.date<=nextTwoWeeksIso){
            upcomingLessons.push({...ev,_date:ev.date});
          } else if(ev.recurring && ev.startDate && ev.day){
            const dayMap={Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
            const target=dayMap[ev.day];
            const d=new Date(Math.max(new Date(ev.startDate),new Date(todayIso)));
            while(d.getDay()!==target) d.setDate(d.getDate()+1);
            const dIso=d.toISOString().split('T')[0];
            if(dIso<=nextTwoWeeksIso) upcomingLessons.push({...ev,_date:dIso});
          }
        });
        upcomingLessons.sort((a,b)=>a._date.localeCompare(b._date)||(a.time||'').localeCompare(b.time||''));

	        const pendingHomeworkItems = homework.filter(h=>h.status==='Ootel'&&parentHasStudent(h.studentId,h.studentName));
	        const unpaid = invoices.filter(i=>i.status==='Ootel'&&parentHasStudent(i.studentId,i.studentName));

	        // Feed: unread messages + pending homework merged and sorted

	        ].sort((a,b)=>new Date(b._ts)-new Date(a._ts)).slice(0,8);

	        const unpaidAmount = unpaid.reduce((sum,i)=>sum+(Number(i.amount)||0),0);
		        const latestLesson = [...visibleLessons]

	        const nextLesson = upcomingLessons[0]||null;
	        const studentByIdentity = (studentId,studentName) =>

	        const openStudentByIdentity = (studentId,studentName) => {

	        const focusAction = (()=>{
		          if(unpaidAmount>0) return {
		            title:'Tasumata arve vajab tähelepanu',
		            text:`Ootel on ${unpaid.length} arvet summas ${unpaidAmount}€. Märgi makse, kui ülekanne on tehtud.`,

		              title:'Kodutöö ootab tegemist',

		              action:'Ava kodutöö',
		              studentId:hw.studentId,
		              studentName:hw.studentName,
		              onClick:()=>openStudentByIdentity(hw.studentId,hw.studentName)
		            };
		          }
		          if(nextLesson) return {
		            title:'Järgmine tund on plaanis',
		            text:`${nextLesson.studentName||'Õpilane'} · ${fmtDate(nextLesson._date)} ${nextLesson.time||''} · Õp. ${nextLesson.teacher||'—'}`,
		            icon:'fa-calendar-check',
		            tone:'#C9882A',
		            action:'Ava tund',
		            studentId:nextLesson.studentId,
		            studentName:nextLesson.studentName,
		            onClick:()=>_setTab&&_setTab('calendar')
		          };
		          if(latestLesson) return {
		            title:'Vaata viimase tunni kokkuvõtet',
		            text:`${latestLesson.studentName||'Õpilane'} · ${fmtDate(latestLesson.date)} · ${latestLesson.topic||'Tund'}`,
		            icon:'fa-clock-rotate-left',

      {isAdmin&&parentAlerts?.length>0&&(

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {parentAlerts.slice(0,6).map(alert=>(
              <div key={alert.parent.id} style={{display:'grid',gridTemplateColumns:'1fr auto',gap:12,alignItems:'center',padding:'12px 14px',borderRadius:12,background:'#fff',border:'1px solid rgba(153,27,27,.18)'}}>
                <div>
                  <div style={{fontWeight:800}}>{alert.parent.displayName||'Lapsevanem'} <span style={{fontWeight:500,color:'#42536A'}}>· {alert.parent.email||'e-post puudub'}</span></div>
                  <div style={{fontSize:'.82rem',color:'#42536A',marginTop:3}}>
                    Laps: <strong>{alert.childNames.join(', ')||'nimi puudub'}</strong> · loodud: {fmtDate(alert.parent.createdAt)}
                  </div>
                </div>
                <div style={{display:'flex',gap:8,justifyContent:'flex-end',flexWrap:'wrap'}}>
                  <button onClick={()=>markParentChecked(alert.parent)} className="btn btn-ghost btn-sm">
                    Kontrollitud
                  </button>
                  <button onClick={()=>createMissingParentStudents(alert.parent)} className="btn btn-red btn-sm">
                    Loo / seo õpilane
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {isStaff&&(
        <div className="card" style={{padding:24}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,flexWrap:'wrap',marginBottom:16}}>
            <div>
              <h3>✅ Ülesanded</h3>
              <div style={{fontSize:'.82rem',color:'#42536A',marginTop:4}}>
                Määra töökaaslasele tegevus, pane tähtaeg ja märgi tehtuks.
              </div>
            </div>
            <span className="badge" style={{background:openTasks.length?'#dbeafe':'#dcfce7',color:openTasks.length?'#1d4ed8':'#166534'}}>
              {openTasks.length} aktiivset
            </span>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:10,marginBottom:14}}>
            <input value={taskTitle} onChange={e=>setTaskTitle(e.target.value)} placeholder="Mida on vaja teha?"/>
            <select value={taskAssignee} onChange={e=>setTaskAssignee(e.target.value)}>
              {taskStaffOptions.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
            <input value={taskDue} onChange={e=>setTaskDue(e.target.value)} type="date"/>
            <select value={taskPriority} onChange={e=>setTaskPriority(e.target.value)}>
              <option value="normal">Tavaline</option>
              <option value="high">Kiire</option>
              <option value="low">Madal</option>
            </select>
            <select value={taskCategory} onChange={e=>setTaskCategory(e.target.value)}>
              <option value="general">Üldine</option>
              <option value="parent">Lapsevanem</option>
              <option value="payment">Arved</option>
              <option value="lesson">Tunnid</option>
              <option value="technical">Tehniline</option>
            </select>
          </div>
          <button onClick={addTask} className="btn btn-pine" style={{width:'100%',marginBottom:14}}>
            <i className="fa-solid fa-plus"/> Lisa ülesanne
          </button>

          {unreadTaskReplies.length>0&&(
            <div style={{padding:14,borderRadius:14,background:'#eff6ff',border:'1px solid #bfdbfe',marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:8}}>
                <strong style={{color:'#1d4ed8'}}>💬 Uued vastused ülesannetele</strong>
                <span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>{unreadTaskReplies.length} uut</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {unreadTaskReplies.slice(0,3).map(task=>(
                  <div key={task.id} style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,alignItems:'center',padding:'10px 12px',borderRadius:12,background:'#fff'}}>
                    <div style={{minWidth:0}}>
                      <div style={{fontWeight:800,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.title}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {task.lastReplyBy||'—'}: {task.lastReplyText||''}
                      </div>
                    </div>
                    <button onClick={()=>markTaskRepliesSeen(task)} className="btn btn-ghost btn-sm">
                      Loetud
                    </button>
                  </div>
                ))}
              </div>
              {unreadTaskReplies.length>3&&(
                <button onClick={()=>setTab&&setTab('tasks')} className="btn btn-ghost btn-sm" style={{marginTop:10}}>
                  Ava kõik vastused
                </button>
              )}
            </div>
          )}

          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {tasks.length===0&&(
              <div style={{textAlign:'center',padding:'18px 0',color:'#42536A',fontSize:'.88rem'}}>
                Ülesandeid veel pole.
              </div>
            )}
            {[...tasks].sort((a,b)=>{
              if((a.status==='done') !== (b.status==='done')) return a.status==='done'?1:-1;
              return String(a.dueDate||'9999-12-31').localeCompare(String(b.dueDate||'9999-12-31'));
            }).slice(0,8).map(task=>{
              const done = task.status==='done';
              const overdue = task.dueDate && task.dueDate<today() && !done;
              const priorityColor = task.priority==='high' ? '#991b1b' : task.priority==='low' ? '#42536A' : '#1d4ed8';
              const priorityBg = task.priority==='high' ? '#fee2e2' : task.priority==='low' ? '#f3f4f6' : '#dbeafe';
              const categoryLabels = {general:'Üldine',parent:'Lapsevanem',payment:'Arved',lesson:'Tunnid',technical:'Tehniline'};
              return(
                <div key={task.id} style={{
                  display:'grid',gridTemplateColumns:'auto 1fr auto',gap:12,alignItems:'center',
                  padding:'11px 12px',borderRadius:12,border:'1px solid rgba(28,43,58,.08)',
                  background:done?'rgba(243,244,246,.55)':overdue?'#fff7ed':'#fff'
                }}>
                  <button onClick={()=>toggleTask(task)} title={done?'Märgi aktiivseks':'Märgi tehtuks'} style={{
                    width:30,height:30,borderRadius:999,border:'1.5px solid rgba(28,43,58,.16)',
                    background:done?'#2F5D50':'#fff',color:done?'#fff':'#42536A',cursor:'pointer'
                  }}>
                    <i className={`fa-solid ${done?'fa-check':'fa-circle'}`} style={{fontSize:done?'.8rem':'.55rem'}}/>
                  </button>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:700,textDecoration:done?'line-through':'none',opacity:done ? .65 : 1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {task.title}
                    </div>
                    <div style={{fontSize:'.76rem',color:'#42536A',marginTop:4}}>
                      {task.assignedTo||'Määramata'} · {categoryLabels[task.category]||'Üldine'} · tähtaeg: {task.dueDate?fmtDate(task.dueDate):'puudub'} · lisas {task.createdByName||'—'}
                    </div>
                    {(task.replies||[]).length>0&&(
                      <div style={{fontSize:'.74rem',color:'#1d4ed8',marginTop:4}}>
                        💬 {task.replies.length} vastust · viimane: {task.lastReplyBy||'—'}
                      </div>
                    )}
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'flex-end',flexWrap:'wrap'}}>
                    <span className="badge" style={{background:priorityBg,color:priorityColor}}>
                      {task.priority==='high'?'Kiire':task.priority==='low'?'Madal':'Tavaline'}
                    </span>
                    {overdue&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b'}}>Hilinenud</span>}
                    {(isAdmin||task.createdByUid===user.uid)&&(
                      <button onClick={()=>deleteTask(task)} className="btn btn-ghost btn-sm" title="Kustuta">
                        <i className="fa-solid fa-trash"/>
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {isStaff&&(
        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>➕ Lisa uus õpilane</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(185px,1fr))',gap:10,marginBottom:12}}>
            <input value={nName}  onChange={e=>setNName(e.target.value)}  placeholder="Lapse nimi *"/>
            <input value={nParentName} onChange={e=>setNParentName(e.target.value)} placeholder="Vanema nimi"/>
            <input value={nEmail} onChange={e=>setNEmail(e.target.value)} type="email" placeholder="E-post"/>
            <input value={nPhone} onChange={e=>setNPhone(e.target.value)} placeholder="Telefon +372…"/>
            <select value={nLevel}  onChange={e=>setNLevel(e.target.value)}>{LEVELS.map(l=><option key={l} value={l}>Tase: {l}</option>)}</select>
            <select value={nTarget} onChange={e=>setNTarget(e.target.value)}>{LEVELS.slice(1).map(l=><option key={l} value={l}>Siht: {l}</option>)}</select>
            <select value={nSubject} onChange={e=>setNSubject(e.target.value)}>
              {SUBJECTS.map(subject=><option key={subject} value={subject}>{subject}</option>)}
            </select>
            <select value={nGrade} onChange={e=>setNGrade(e.target.value)}>
              <option value="">Klass / vanus (valikuline)</option>
              {GRADES.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
            <select value={nGroup} onChange={e=>setNGroup(e.target.value)}>
              <option value="">Grupp: määramata</option>
              {groupOptions.map(group=><option key={group} value={group}>{group}</option>)}
            </select>
            <input value={nPkg} onChange={e=>setNPkg(e.target.value)} type="number" placeholder="Paketi maht (nt. 10)"/>
            {(isAdmin||user.role==='admin')&&<select value={nTeach} onChange={e=>setNTeach(e.target.value)}>{TEACHERS.map(t=><option key={t} value={t}>Õp: {t}</option>)}</select>}
          </div>
          <button onClick={addStudent} className="btn btn-pine" style={{width:'100%'}}>
            <i className="fa-solid fa-user-plus"/> Lisa õpilane
          </button>
        </div>
      )}

      <div className="card" style={{padding:24}}>
        <h3 style={{marginBottom:16}}>🕐 Viimased tunnid</h3>
        {dashboardVisibleLessons.length===0
          ?<div style={{textAlign:'center',padding:'24px 0',color:'#42536A',fontSize:'.88rem'}}>Tunnid puuduvad.</div>
          :[...dashboardVisibleLessons].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).map(l=>{
            const isOpen = expandedLessonId===l.id;
            const lessonHomework = homework.filter(hw=>
              (hw.lessonId&&hw.lessonId===l.id) ||
              (hw.studentId&&hw.studentId===l.studentId) ||
              normalizeText(hw.studentName)===normalizeText(l.studentName)
            ).slice(0,3);
            return (
              <div key={l.id} style={{borderBottom:'1px solid rgba(28,43,58,.06)'}}>
                <button
                  onClick={()=>{
                    if(isStaff&&openLessonEditor){openLessonEditor(l);return;}
                    setExpandedLessonId(isOpen?'':l.id);
                  }}
                  aria-expanded={isOpen}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'11px 0',border:'none',background:'transparent',textAlign:'left',cursor:'pointer'}}>
                  <div style={{width:38,height:38,borderRadius:10,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
                    fontWeight:700,background:l.status==='Toimunud'?'rgba(201,136,42,.1)':'rgba(239,68,68,.08)',
                    color:l.status==='Toimunud'?'#C9882A':'#dc2626'}}>
                    {l.status==='Toimunud'?l.grade:'—'}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.topic}</div>
                    <div style={{fontSize:'.75rem',color:'#42536A'}}>{l.studentName} · {fmtDate(l.date)}</div>
                  </div>
                  <div style={{fontSize:'.75rem',color:'#42536A',flexShrink:0}}>{l.teacher}</div>
                  {!isStaff&&<i className={`fa-solid ${isOpen?'fa-chevron-up':'fa-chevron-down'}`} style={{fontSize:'.72rem',color:'#42536A',flexShrink:0}}/>}
                </button>
                {!isStaff&&isOpen&&<LessonDetailsPanel lesson={l} homeworkItems={lessonHomework}/>}
              </div>
            );
          })
        }
      </div>
    </div>
  );
}

// ── ÜLESANDED ────────────────────────────────────────────────
function TasksView({user,tasks,staffMembers,taskTitle,setTaskTitle,taskAssignee,setTaskAssignee,
  taskDue,setTaskDue,taskPriority,setTaskPriority,taskCategory,setTaskCategory,addTask,toggleTask,deleteTask,replyTask,markTaskRepliesSeen,isAdmin}) {
  const [taskFilter,setTaskFilter] = React.useState('open');
  const [taskSearch,setTaskSearch] = React.useState('');
  const [taskReplies,setTaskReplies] = React.useState({});
  const taskStaffOptions = [...new Set([
    ...TEACHERS,
    ...(staffMembers||[]).map(member=>member.displayName||member.email),
    user.displayName
  ].filter(Boolean).map(canonicalTeacherName))];
  const categoryLabels = {general:'Üldine',parent:'Lapsevanem',payment:'Arved',lesson:'Tunnid',technical:'Tehniline'};
  const openTasks = tasks.filter(t=>t.status!=='done');
  const overdueTasks = tasks.filter(t=>t.status!=='done' && t.dueDate && t.dueDate<today());
  const filteredTasks = tasks.filter(task=>{
    if(taskFilter==='open' && task.status==='done') return false;
    if(taskFilter==='overdue' && !(task.status!=='done' && task.dueDate && task.dueDate<today())) return false;
    if(taskFilter==='done' && task.status!=='done') return false;
    if(taskFilter==='created' && task.createdByUid!==user.uid) return false;
    if(taskFilter.startsWith('cat:') && (task.category||'general')!==taskFilter.slice(4)) return false;
    const q = normalizeText(taskSearch);
    if(!q) return true;
    return normalizeText(task.title).includes(q)
      || normalizeText(task.assignedTo).includes(q)
      || normalizeText(task.createdByName).includes(q)
      || normalizeText(categoryLabels[task.category]||'').includes(q);
  });

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:24}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:14,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontSize:'1.7rem'}}>Ülesanded</h1>
          <div style={{color:'#42536A',fontSize:'.88rem',marginTop:4}}>Tööde nimekiri õpetajatele ja administraatoritele.</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>{openTasks.length} aktiivset</span>
          <span className="badge" style={{background:overdueTasks.length?'#fee2e2':'#dcfce7',color:overdueTasks.length?'#991b1b':'#166534'}}>{overdueTasks.length} hilinenud</span>
        </div>
      </div>

      <div className="card" style={{padding:24}}>
        <h3 style={{marginBottom:14}}>Lisa ülesanne</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:10,marginBottom:14}}>
          <input value={taskTitle} onChange={e=>setTaskTitle(e.target.value)} placeholder="Mida on vaja teha?"/>
          <select value={taskAssignee} onChange={e=>setTaskAssignee(e.target.value)}>
            {taskStaffOptions.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
          <input value={taskDue} onChange={e=>setTaskDue(e.target.value)} type="date"/>
          <select value={taskPriority} onChange={e=>setTaskPriority(e.target.value)}>
            <option value="normal">Tavaline</option>
            <option value="high">Kiire</option>
            <option value="low">Madal</option>
          </select>
          <select value={taskCategory} onChange={e=>setTaskCategory(e.target.value)}>
            <option value="general">Üldine</option>
            <option value="parent">Lapsevanem</option>
            <option value="payment">Arved</option>
            <option value="lesson">Tunnid</option>
            <option value="technical">Tehniline</option>
          </select>
        </div>
        <button onClick={addTask} className="btn btn-pine" style={{width:'100%'}}><i className="fa-solid fa-plus"/> Lisa ülesanne</button>
      </div>

      <div className="card" style={{padding:24}}>
        <div style={{display:'flex',gap:10,alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',marginBottom:16}}>
          <input value={taskSearch} onChange={e=>setTaskSearch(e.target.value)} placeholder="Otsi ülesannet, inimest või kategooriat..." style={{maxWidth:360}}/>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {[['open','Aktiivsed'],['overdue','Hilinenud'],['done','Tehtud'],['created','Minu loodud'],['all','Kõik']].map(([id,label])=>(
              <button key={id} onClick={()=>setTaskFilter(id)} className={`btn btn-sm ${taskFilter===id?'btn-dark':'btn-ghost'}`}>{label}</button>
            ))}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          {Object.entries(categoryLabels).map(([id,label])=>(
            <button key={id} onClick={()=>setTaskFilter('cat:'+id)} className={`btn btn-sm ${taskFilter==='cat:'+id?'btn-amber':'btn-ghost'}`}>{label}</button>
          ))}
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filteredTasks.length===0&&<div style={{textAlign:'center',padding:'28px 10px',color:'#42536A'}}>Ülesandeid ei leitud.</div>}
          {[...filteredTasks].sort((a,b)=>{
            if((a.status==='done') !== (b.status==='done')) return a.status==='done'?1:-1;
            return String(a.dueDate||'9999-12-31').localeCompare(String(b.dueDate||'9999-12-31'));
          }).map(task=>{
            const done = task.status==='done';
            const overdue = task.dueDate && task.dueDate<today() && !done;
            const replies = task.replies||[];
            const unread = task.lastReplyAt && task.lastReplyByUid!==user.uid && !(task.lastReplySeenBy||[]).includes(user.uid);
            const priorityColor = task.priority==='high' ? '#991b1b' : task.priority==='low' ? '#42536A' : '#1d4ed8';
            const priorityBg = task.priority==='high' ? '#fee2e2' : task.priority==='low' ? '#f3f4f6' : '#dbeafe';
            return(
              <div key={task.id} style={{padding:'13px 14px',borderRadius:12,border:unread?'1px solid #bfdbfe':'1px solid rgba(28,43,58,.08)',background:done?'rgba(243,244,246,.55)':unread?'#eff6ff':overdue?'#fff7ed':'#fff'}}>
                <div style={{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:12,alignItems:'center'}}>
                  <button onClick={()=>toggleTask(task)} title={done?'Märgi aktiivseks':'Märgi tehtuks'} style={{width:32,height:32,borderRadius:999,border:'1.5px solid rgba(28,43,58,.16)',background:done?'#2F5D50':'#fff',color:done?'#fff':'#42536A',cursor:'pointer'}}>
                    <i className={`fa-solid ${done?'fa-check':'fa-circle'}`} style={{fontSize:done?'.8rem':'.55rem'}}/>
                  </button>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:800,textDecoration:done?'line-through':'none',opacity:done ? .65 : 1}}>{task.title}</div>
                    <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                      {task.assignedTo||'Määramata'} · {categoryLabels[task.category]||'Üldine'} · tähtaeg: {task.dueDate?fmtDate(task.dueDate):'puudub'} · lisas {task.createdByName||'—'}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'flex-end',flexWrap:'wrap'}}>
                    {unread&&<span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>Uus vastus</span>}
                    <span className="badge" style={{background:priorityBg,color:priorityColor}}>{task.priority==='high'?'Kiire':task.priority==='low'?'Madal':'Tavaline'}</span>
                    {overdue&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b'}}>Hilinenud</span>}
                    {done&&<span className="badge" style={{background:'#dcfce7',color:'#166534'}}>Tehtud</span>}
                    {(isAdmin||task.createdByUid===user.uid)&&(
                      <button onClick={()=>deleteTask(task)} className="btn btn-ghost btn-sm" title="Kustuta"><i className="fa-solid fa-trash"/></button>
                    )}
                  </div>
                </div>

                {replies.length>0&&(
                  <div style={{marginLeft:44,marginTop:10,display:'flex',flexDirection:'column',gap:6}}>
                    {replies.slice(-3).map(reply=>(
                      <div key={reply.id||reply.createdAt} style={{padding:'8px 10px',borderRadius:10,background:'#fff',border:'1px solid rgba(28,43,58,.08)'}}>
                        <div style={{fontSize:'.74rem',fontWeight:800,color:'#42536A',marginBottom:3}}>
                          {reply.byName||'—'} · {reply.createdAt?new Date(reply.createdAt).toLocaleString('et-EE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}
                        </div>
                        <div style={{fontSize:'.84rem',color:'#1C2B3A',whiteSpace:'pre-wrap'}}>{reply.text}</div>
                      </div>
                    ))}
                  </div>
                )}

                <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:8,marginLeft:44,marginTop:10}}>
                  <input
                    value={taskReplies[task.id]||''}
                    onFocus={()=>markTaskRepliesSeen(task)}
                    onChange={e=>setTaskReplies(prev=>({...prev,[task.id]:e.target.value}))}
                    placeholder="Vasta ülesandele..."
                  />
                  <button onClick={async()=>{
                    const text = taskReplies[task.id]||'';
                    await replyTask(task,text);
                    setTaskReplies(prev=>({...prev,[task.id]:''}));
                  }} className="btn btn-pine btn-sm">
                    Vasta
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── ÕPPEKAVAD ────────────────────────────────────────────────
function ProgramsView() {
  const programs = window.HaldusPrograms || [];
  const [levelFilter,setLevelFilter] = React.useState('all');
  const [subjectFilter,setSubjectFilter] = React.useState('all');
  const visiblePrograms = programs.filter(program=>
    (levelFilter==='all' || program.level===levelFilter) &&
    (subjectFilter==='all' || (program.subjects||[]).includes(subjectFilter))
  );

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:22}}>

function ActivityLogView({logs,isAdmin}) {
  const [query,setQuery] = React.useState('');
  const [typeFilter,setTypeFilter] = React.useState('all');
  const typeLabels = {
    student:'Õpilased',
    homework:'Kodutööd',
    invoice:'Arved',
    task:'Ülesanded',
    lesson:'Tunnid',
    group:'Grupid'
  };
  const visibleLogs = logs.filter(item=>{
    const baseType = String(item.type||'').split('.')[0] || 'other';
    if(typeFilter!=='all' && baseType!==typeFilter) return false;
    const q=normalizeText(query);
    if(!q) return true;
    return normalizeText(item.label).includes(q)
      || normalizeText(item.byName).includes(q)
      || normalizeText(item.studentName).includes(q)
      || normalizeText(baseType).includes(q);
  });

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:14,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontSize:'1.7rem'}}>Tegevused</h1>
          <div style={{fontSize:'.88rem',color:'#42536A',marginTop:4}}>
            {isAdmin?'Administraator näeb kõiki süsteemi tegevusi.':'Õpetaja näeb enda tegevusi ja oma õpilastega seotud muudatusi.'}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Otsi tegevust..." style={{width:260}}/>
          <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={{width:'auto'}}>
            <option value="all">Kõik tüübid</option>
            {Object.entries(typeLabels).map(([id,label])=><option key={id} value={id}>{label}</option>)}
          </select>
        </div>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {[...visibleLogs].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,120).map(item=>{
          const baseType = String(item.type||'').split('.')[0] || 'other';
          const when = item.createdAt ? new Date(item.createdAt).toLocaleString('et-EE') : fmtDate(item.date);
          return(
            <div key={item.id} style={{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:12,alignItems:'center',padding:'14px 16px',borderBottom:'1px solid rgba(28,43,58,.06)'}}>
              <span className="badge" style={{background:'rgba(47,93,80,.1)',color:'#2F5D50'}}>
                {typeLabels[baseType]||baseType}
              </span>
              <div style={{minWidth:0}}>
                <div style={{fontWeight:800,color:'#1C2B3A'}}>{item.label}</div>
                <div style={{fontSize:'.78rem',color:'#42536A',marginTop:3}}>
                  {item.studentName&&<span>{item.studentName} · </span>}
                  {item.byName||'—'}
                </div>
              </div>
              <div style={{fontSize:'.74rem',color:'#42536A',whiteSpace:'nowrap'}}>{when}</div>
            </div>
          );
        })}
        {visibleLogs.length===0&&(
          <div style={{textAlign:'center',padding:'34px 12px',color:'#42536A'}}>Tegevusi ei leitud.</div>
        )}
      </div>
    </div>
  );
}

const TEACHER_COLORS = {
  'Pavel':      {bg:'rgba(47,93,80,.13)',  border:'rgba(47,93,80,.35)',  hover:'rgba(47,93,80,.22)',  dot:'#2F5D50', text:'#1a3d30'},
  'Jelena':     {bg:'rgba(124,58,237,.1)', border:'rgba(124,58,237,.3)', hover:'rgba(124,58,237,.2)', dot:'#7c3aed', text:'#4c1d95'},
  'Elizaveta':  {bg:'rgba(37,99,235,.1)',  border:'rgba(37,99,235,.3)',  hover:'rgba(37,99,235,.2)',  dot:'#2563eb', text:'#1e3a8a'},
  'Angelina':   {bg:'rgba(219,39,119,.1)', border:'rgba(219,39,119,.3)', hover:'rgba(219,39,119,.2)', dot:'#db2777', text:'#831843'},
};
const DEFAULT_TEACHER_COLOR = {bg:'rgba(201,136,42,.09)',border:'rgba(201,136,42,.25)',hover:'rgba(201,136,42,.18)',dot:'#C9882A',text:'#92400e'};
function teacherColor(teacher) {
  if(!teacher) return DEFAULT_TEACHER_COLOR;
  const key = Object.keys(TEACHER_COLORS).find(k=>normalizeText(k)===normalizeText(teacher));
  return key ? TEACHER_COLORS[key] : DEFAULT_TEACHER_COLOR;
}

// ── ÕPILASE OTSING (autocomplete) ────────────────────────────
function StuSearch({value, onChange, students, placeholder}) {
  const [query, setQuery] = React.useState('');
  const [open, setOpen] = React.useState(false);
  const blurTimer = React.useRef(null);

  React.useEffect(()=>{ setQuery(value||''); },[value]);

  const matches = React.useMemo(()=>{
    const sorted = [...students].sort((a,b)=>normalizeText(a.name).localeCompare(normalizeText(b.name),'et'));
    const q = normalizeText(query);
    if(!q) return sorted;
    return sorted.filter(s=>
      normalizeText(s.name).includes(q)||normalizeText(s.group||'').includes(q)||normalizeText(s.subject||'').includes(q)
    );
  },[query,students]);

  const pick = student => {
    clearTimeout(blurTimer.current);
    setQuery(student.name);
    onChange(student.name);
    setOpen(false);
  };

  return(
    <div style={{position:'relative'}}>
      <input value={query}
        onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        onBlur={()=>{blurTimer.current=setTimeout(()=>setOpen(false),200);}}
        placeholder={placeholder||'Otsi õpilast…'}
        style={{width:'100%'}} autoComplete="off"/>
      {open&&matches.length>0&&(
        <div onMouseDown={e=>e.preventDefault()} style={{
          position:'absolute',top:'calc(100% + 4px)',left:0,right:0,zIndex:200,
          background:'#fff',border:'1px solid rgba(28,43,58,.12)',borderRadius:10,
          boxShadow:'0 8px 24px rgba(28,43,58,.14)',maxHeight:240,overflowY:'auto'
        }} className="scroll">
          {matches.map(s=>(
            <button key={s.id} onMouseDown={()=>pick(s)}
              style={{width:'100%',textAlign:'left',padding:'8px 12px',border:'none',
                borderBottom:'1px solid rgba(28,43,58,.05)',background:'transparent',cursor:'pointer'}}
              onMouseEnter={e=>e.currentTarget.style.background='#F9F8F6'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{fontWeight:700,fontSize:'.84rem',color:'#1C2B3A'}}>{s.name}</div>
              <div style={{fontSize:'.7rem',color:'#42536A',marginTop:1}}>
                {[s.subject,s.level&&s.targetLevel?`${s.level}→${s.targetLevel}`:null,s.group].filter(Boolean).join(' · ')}
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── TUNNIPLAAN ────────────────────────────────────────────────
function CalendarView({user,myStudents,schedule,groups,isAdmin,filterT,setFilterT,
  schStu,setSchStu,schDate,setSchDate,schTime,setSchTime,schTeach,setSchTeach,
  schRecurring,setSchRecurring,addSchedule,openScheduleEditor,delSchedule,markAttendance,openStudent,
  db,notify,students,setSelStu,setTab}) {

  const [showCanceled,setShowCanceled] = React.useState(true);
  const [weekOffset,setWeekOffset]     = React.useState(0);
  const [viewMode,setViewMode]         = React.useState('week'); // 'week' | 'day'
  const [selectedDay,setSelectedDay]   = React.useState(null);  // iso string for day view
  // Popup creation (Google-style)
  const [createPopup,setCreatePopup]   = React.useState(null);  // {x,y,day,slot,anchorEl}
  const [popupStu,setPopupStu]         = React.useState('');
  const [popupTeach,setPopupTeach]     = React.useState('Pavel');
  const [popupDur,setPopupDur]         = React.useState(60);
  const [popupRecurring,setPopupRecurring] = React.useState(false);
  const [popupSaving,setPopupSaving]   = React.useState(false);
  // Sidebar
  const [plannerSearch,setPlannerSearch] = React.useState('');
  const [plannerFilter,setPlannerFilter] = React.useState('all');
  // Drag & drop
  const [dragEv,setDragEv]   = React.useState(null);
  const [dragOver,setDragOver] = React.useState(null);
  const [dragging,setDragging] = React.useState(false);

  const canManage = user.role==='teacher' || user.role==='admin';

  // ── Week computation ─────────────────────────────────────────
  const weekStart = React.useMemo(()=>{
    const now = new Date();
    const day = now.getDay();
    const diff = day===0 ? -6 : 1-day;
    const mon = new Date(now);
    mon.setDate(now.getDate()+diff+(weekOffset*7));
    mon.setHours(0,0,0,0);
    return mon;
  },[weekOffset]);

  const weekDays = React.useMemo(()=>
    Array.from({length:7},(_,i)=>{
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate()+i);
      const iso = toLocalISODate(d);
      const jsDay = d.getDay();
      const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
      return {
        short:["P","E","T","K","N","R","L"][jsDay],
        full: ["Pühapäev","Esmaspäev","Teisipäev","Kolmapäev","Neljapäev","Reede","Laupäev"][jsDay],
        iso, dayId,
        label: d.toLocaleDateString("et-EE",{day:"2-digit",month:"2-digit"}),
        isToday: iso===today()
      };
    })
  ,[weekStart]);

  const weekLabel = React.useMemo(()=>{
    const e = new Date(weekStart); e.setDate(weekStart.getDate()+6);
    return weekStart.toLocaleDateString("et-EE",{day:"2-digit",month:"short"})
      +" – "+e.toLocaleDateString("et-EE",{day:"2-digit",month:"short",year:"numeric"});
  },[weekStart]);

  // ── Day view date ─────────────────────────────────────────────
  const dayViewDate = React.useMemo(()=>{
    if(selectedDay) return selectedDay;
    return today();
  },[selectedDay]);

  const dayViewObj = React.useMemo(()=>{
    const d = new Date(dayViewDate);
    const jsDay = d.getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    return {
      iso:dayViewDate, dayId,
      label:d.toLocaleDateString("et-EE",{weekday:'long',day:"2-digit",month:"long"}),
      isToday:dayViewDate===today()
    };
  },[dayViewDate]);

  // ── Filter schedule ───────────────────────────────────────────
  const filteredSch = React.useMemo(()=>{
    const linkedStudentNames = myStudents.map(s=>normalizeText(s.name));
    const linkedGroups = myStudents.map(s=>normalizeText(s.group)).filter(Boolean);
    const myStudentIds = new Set(myStudents.map(s=>s.id));
    const groupEvents = (groups||[]).flatMap(group=>
      (group.lessons||[]).map(lesson=>{
        const assignedStudents=(group.students||[]).filter(studentId=>{
          const saved=group.studentLessonMap?.[studentId];
          return Array.isArray(saved)?saved.includes(lesson.id):true;
        });
        return {
          id:`group-${group.id}-${lesson.id}`,groupId:group.id,groupLessonId:lesson.id,isGroup:true,
          teacher:group.teacher||'Kõik',studentName:group.name,date:lesson.date||'',
          day:lesson.day||'Mon',time:lesson.time||'09:00',duration:lesson.duration||60,
          status:lesson.status||'Planeeritud',recurring:lesson.recurring!==false,
          startDate:lesson.startDate||today(),attendance:lesson.attendance||{},
          students:assignedStudents,groupMembers:assignedStudents
        };
      })
    );
    let list = canManage
      ?(isAdmin
          ?(filterT==="Kõik"||!filterT?[...schedule,...groupEvents]:[
              ...schedule.filter(s=>canonicalTeacherName(s.teacher)===canonicalTeacherName(filterT)),
              ...groupEvents.filter(s=>canonicalTeacherName(s.teacher)===canonicalTeacherName(filterT)||s.teacher==='Kõik')
            ])
          :[...schedule.filter(s=>teacherMatches(s.teacher,user.displayName)),...groupEvents]
        )
      :schedule.filter(s=>{
          const target=normalizeText(s.studentName);
          return linkedStudentNames.includes(target)||linkedGroups.includes(target);
        }).concat(groupEvents.filter(ev=>
          (ev.students||[]).some(id=>myStudentIds.has(id))||
          (!(ev.students||[]).length&&linkedGroups.includes(normalizeText(ev.studentName)))
        ));
    if(!showCanceled) list=list.filter(s=>s.status!=="Tühistatud");
    return list;
  },[schedule,groups,myStudents,filterT,showCanceled,canManage,isAdmin,user]);

  const eventsForDaySlot = (slot, dayIso, dayId) =>
    filteredSch.filter(s=>{
      if(s.time!==slot) return false;
      if(s.recurring&&s.startDate&&dayIso<s.startDate) return false;
      if(s.date) return s.date===dayIso;
      return s.day===dayId;
    });

  // ── Occupied slots (week view) ────────────────────────────────
  const occupiedSlots = React.useMemo(()=>{
    const has = slot=>weekDays.some(d=>eventsForDaySlot(slot,d.iso,d.dayId).length>0);
    return TIMES.filter(has);
  },[filteredSch,weekDays]);

  // ── All slots for day view ────────────────────────────────────
  const occupiedSlotsDay = React.useMemo(()=>{
    return TIMES.filter(slot=>eventsForDaySlot(slot,dayViewObj.iso,dayViewObj.dayId).length>0);
  },[filteredSch,dayViewObj]);

  // ── Week stats ────────────────────────────────────────────────
  const weekStats = React.useMemo(()=>{
    let total=0,done=0,canceled=0,planned=0,revenue=0;
    occupiedSlots.forEach(slot=>{
      weekDays.forEach(day=>{
        eventsForDaySlot(slot,day.iso,day.dayId).forEach(ev=>{
          total++;
          if(ev.status==='Toimunud') done++;
          else if(ev.status==='Tühistatud') canceled++;
          else planned++;
          const stu=students.find(s=>s.id===ev.studentId||normalizeText(s.name)===normalizeText(ev.studentName));
          if(stu?.lessonPrice) revenue+=stu.lessonPrice;
        });
      });
    });
    return {total,done,canceled,planned,revenue};
  },[occupiedSlots,weekDays,students]);

  // ── Planner rows ──────────────────────────────────────────────
  const weekEventList = React.useMemo(()=>filteredSch.filter(ev=>
    weekDays.some(day=>{
      if(ev.recurring&&ev.startDate&&day.iso<ev.startDate) return false;
      if(ev.date) return ev.date===day.iso;
      return ev.day===day.dayId;
    })
  ),[filteredSch,weekDays]);

  const plannerTeacher = React.useMemo(()=>{
    if(isAdmin&&filterT&&filterT!=="Kõik") return canonicalTeacherName(filterT);
    return canonicalTeacherName(user.displayName||'');
  },[isAdmin,filterT,user]);

  const plannerRows = React.useMemo(()=>{
    const match=(ev,s)=>{
      const en=normalizeText(ev.studentName),sn=normalizeText(s.name),sg=normalizeText(s.group);
      return ev.studentId===s.id||(ev.students||[]).includes(s.id)||en===sn||(!!sg&&en===sg);
    };
    const q=normalizeText(plannerSearch);
    return myStudents
      .filter(s=>s.active!==false)
      .filter(s=>!plannerTeacher||teacherMatches(s.teacher,plannerTeacher))
      .map(s=>{
        const tw=weekEventList.filter(ev=>match(ev,s)&&ev.status!=="Tühistatud");
        const target=parseInt(s.weeklyLessons||s.lessonsPerWeek||0,10)||0;
        return {student:s,lessonsThisWeek:tw,target,left:target?Math.max(target-tw.length,0):null};
      })
      .filter(row=>{
        if(q&&!normalizeText(row.student.name).includes(q)) return false;
        if(plannerFilter==="empty") return row.lessonsThisWeek.length===0;
        if(plannerFilter==="under") return row.target>0&&row.lessonsThisWeek.length<row.target;
        return true;
      })
      .sort((a,b)=>{
        const am=a.target>0?(a.left||0):(a.lessonsThisWeek.length===0?1:0);
        const bm=b.target>0?(b.left||0):(b.lessonsThisWeek.length===0?1:0);
        return bm-am||normalizeText(a.student.name).localeCompare(normalizeText(b.student.name),'et');
      });
  },[myStudents,plannerTeacher,weekEventList,plannerSearch,plannerFilter]);

  // ── Drag & drop ───────────────────────────────────────────────
  const handleDragStart = React.useCallback((e,ev,dayIso,slot)=>{
    if(!canManage) return;
    e.dataTransfer.effectAllowed='move';
    setDragEv({ev,sourceDay:dayIso,sourceSlot:slot});
    setDragging(true);
  },[canManage]);
  const handleDragEnd = React.useCallback(()=>{setDragging(false);setDragEv(null);setDragOver(null);},[]);
  const handleDrop = React.useCallback(async(e,targetIso,targetSlot)=>{
    e.preventDefault();setDragOver(null);setDragging(false);
    if(!dragEv?.ev?.id) return;
    const {ev}=dragEv;
    const jsDay=new Date(targetIso).getDay();
    const dayId=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    try{
      const patch=ev.date
        ?{date:targetIso,day:dayId,time:targetSlot,status:ev.status==='Tühistatud'?ev.status:'Planeeritud'}
        :{day:dayId,time:targetSlot};
      await window._db.collection('schedule').doc(ev.id).update(patch);
      notify(`✓ ${ev.studentName} → ${targetSlot}`);
    }catch{notify('⚠ Liigutamine ebaõnnestus');}
    setDragEv(null);
  },[dragEv,notify]);

  // ── Popup create (Google-style) ───────────────────────────────
  const openCreatePopup = React.useCallback((e,dayIso,slot)=>{
    e.stopPropagation();
    setCreatePopup({dayIso,slot});
    setPopupStu('');
    setPopupTeach(isAdmin?(filterT&&filterT!=='Kõik'?filterT:'Pavel'):canonicalTeacherName(user.displayName)||'Pavel');
    setPopupDur(60);
    setPopupRecurring(false);
  },[isAdmin,filterT,user]);

  const saveFromPopup = React.useCallback(async()=>{
    if(!createPopup||!popupStu) return;
    setPopupSaving(true);
    const {dayIso,slot}=createPopup;
    const jsDay=new Date(dayIso).getDay();
    const dayId=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    const payload=popupRecurring
      ?{teacher:popupTeach,studentName:popupStu,day:dayId,time:slot,status:'Planeeritud',
        recurring:true,startDate:dayIso,duration:popupDur,createdAt:today()}
      :{teacher:popupTeach,studentName:popupStu,date:dayIso,day:dayId,time:slot,
        status:'Planeeritud',duration:popupDur,createdAt:today()};
    try{
      await window._db.collection('schedule').add(payload);
      notify(`✓ Tund lisatud: ${popupStu} ${slot}`);
      setCreatePopup(null);
    }catch{notify('⚠ Lisamine ebaõnnestus');}
    setPopupSaving(false);
  },[createPopup,popupStu,popupTeach,popupDur,popupRecurring,notify]);

  // ── Teacher color ─────────────────────────────────────────────
  const tColor=t=>{
    if(!t) return DEFAULT_TEACHER_COLOR;
    const key=Object.keys(TEACHER_COLORS).find(k=>normalizeText(k)===normalizeText(t));
    return key?TEACHER_COLORS[key]:DEFAULT_TEACHER_COLOR;
  };

  // ── Duration → row height (px) ────────────────────────────────
  // Base row height ~52px = 60min. 90min = 78px, 120min = 104px
  const ROW_BASE = 52;
  const durToHeight = dur => Math.max(ROW_BASE, Math.round((dur/60)*ROW_BASE));

  // ── Event card renderer ───────────────────────────────────────
  const renderEvent = (ev, dayIso, slot, isDayView=false) => {
    const st=ev.status||'Planeeritud';
    const tc=tColor(ev.teacher);
    const isDraggingThis=dragEv?.ev?.id===ev.id;
    const dur=ev.duration||60;
    const height=isDayView?durToHeight(dur):undefined;
    const linkedStu=!canManage?myStudents.find(s=>{
      const target=normalizeText(ev.studentName);
      return normalizeText(s.name)===target||normalizeText(s.group)===target||(ev.students||[]).includes(s.id);
    }):null;
    const attendanceKey=linkedStu?`${linkedStu.id}_${dayIso}`:'';
    const attendanceStatus=attendanceKey?ev.attendance?.[attendanceKey]?.status:'';

    return(
      <div key={ev.id+dayIso}
        draggable={canManage}

        onDragEnd={handleDragEnd}
        onClick={e=>{e.stopPropagation();canManage&&openScheduleEditor({...ev,occurrenceDate:dayIso});}}

          fontSize:".73rem",
          padding:isDayView?"6px 10px":"3px 6px",

          border:`0.5px solid ${st==='Tühistatud'?'rgba(239,68,68,.15)':tc.border}`,

            textDecoration:st==="Tühistatud"?"line-through":"none",

          </span>
          {canManage&&(
            <button onClick={e=>{e.stopPropagation();delSchedule(ev.id,e);}}
              style={{background:"none",border:"none",cursor:"pointer",

                width:12,height:12,display:"flex",alignItems:"center",justifyContent:"center"}}
              className="ev-del-btn"
              onMouseEnter={e=>{e.currentTarget.style.color="#ef4444";e.stopPropagation();}}

        <div style={{fontSize:".6rem",color:tc.dot,display:"flex",gap:3,alignItems:'center',lineHeight:1.2}}>

          {isDayView&&<span>{slot}{dur>60?` – ${slot.split(':')[0]}:${String(parseInt(slot.split(':')[1]||0)+dur%60).padStart(2,'0')}`:''}  · {dur}min</span>}

          {st==="Toimunud"&&<span style={{color:'#166534',fontWeight:700}}>✓</span>}
          {st==='Nihutatud'&&<span style={{color:'#C9882A',fontWeight:600}}>Nihut.</span>}
          {st==='Tühistatud'&&<span style={{color:'#dc2626',fontWeight:600}}>Tüh.</span>}
        </div>

        {isDayView&&(
          <div style={{marginTop:2,fontSize:".72rem",color:"#42536A"}}>

        {!canManage&&linkedStu&&ev.id&&st!=="Tühistatud"&&(
          <div style={{display:"flex",gap:3,marginTop:4,flexWrap:"wrap"}}>
            <button onClick={e=>{e.stopPropagation();markAttendance(ev,attendanceKey,"coming");}}
              className="btn btn-pine btn-sm"
              style={{padding:"2px 5px",fontSize:".58rem",opacity:attendanceStatus==="coming"?1:.8}}>Tuleb</button>
            <button onClick={e=>{e.stopPropagation();markAttendance(ev,attendanceKey,"absent");}}

              style={{padding:"2px 5px",fontSize:".58rem",opacity:attendanceStatus==="absent"?1:.8}}>Ei tule</button>
          </div>
        )}
      </div>
    );
  };

  // ── Slot cell renderer ────────────────────────────────────────
  const renderSlotCell = (slot, dayIso, dayId, isDayView=false) => {
    const evs=eventsForDaySlot(slot,dayIso,dayId);
    const isDropTarget=dragOver&&dragOver.day===dayIso&&dragOver.slot===slot;
    return(
      <div
        onDragOver={e=>{if(canManage&&dragging){e.preventDefault();setDragOver({day:dayIso,slot});}}}
        onDragLeave={()=>setDragOver(null)}
        onDrop={e=>handleDrop(e,dayIso,slot)}
        onClick={evs.length===0&&canManage?(e)=>openCreatePopup(e,dayIso,slot):undefined}
        style={{
          padding:3,borderLeft:"0.5px solid rgba(28,43,58,.05)",
          minHeight:isDayView?48:38,
          display:"flex",flexDirection:"column",gap:2,
          background:isDropTarget?"rgba(47,93,80,.1)":(dayIso===today()?"rgba(201,136,42,.02)":"transparent"),
          outline:isDropTarget?"1.5px dashed #2F5D50":"none",
          cursor:evs.length===0&&canManage?"pointer":"default",
          transition:"background .1s",position:"relative"
        }}>
        {evs.length===0&&canManage&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
            color:"rgba(47,93,80,.0)",fontSize:".65rem",fontWeight:600,transition:"color .15s",borderRadius:3,pointerEvents:"none"}}
            className="slot-add-hint">+</div>
        )}
        {evs.map(ev=>renderEvent(ev,dayIso,slot,isDayView))}
      </div>
    );
  };

  const missingCount=plannerRows.filter(r=>r.lessonsThisWeek.length===0).length;

  // ── Day navigation ────────────────────────────────────────────
  const goToPrevDay=()=>{const d=new Date(dayViewDate);d.setDate(d.getDate()-1);setSelectedDay(toLocalISODate(d));};
  const goToNextDay=()=>{const d=new Date(dayViewDate);d.setDate(d.getDate()+1);setSelectedDay(toLocalISODate(d));};

  return(
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* ── Header ── */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{fontSize:"1.7rem"}}>Tunniplaan</h1>

            {viewMode==='week'&&<>
              <span>{weekLabel}</span>
              <span style={{color:"#d1d5db"}}>·</span>
              <strong>{weekStats.total} tundi</strong>
              {weekStats.done>0&&<span style={{color:'#166534'}}>· {weekStats.done} toimunud</span>}
              {weekStats.canceled>0&&<span style={{color:'#dc2626'}}>· {weekStats.canceled} tüh.</span>}
              {weekStats.revenue>0&&<span style={{color:'#2F5D50',fontWeight:600}}>· {weekStats.revenue}€</span>}
            </>}
            {viewMode==='day'&&<span style={{fontWeight:600,color:dayViewObj.isToday?'#C9882A':'#1C2B3A'}}>{dayViewObj.label}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {/* View toggle */}
          <div style={{display:"flex",background:"rgba(28,43,58,.07)",borderRadius:10,padding:3,gap:2}}>
            {[['week','Nädal'],['day','Päev']].map(([v,l])=>(
              <button key={v} onClick={()=>setViewMode(v)}
                style={{padding:"5px 14px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",
                  fontSize:".8rem",fontWeight:600,
                  background:viewMode===v?"#fff":"transparent",
                  color:viewMode===v?"#1C2B3A":"#42536A",
                  boxShadow:viewMode===v?"0 1px 4px rgba(0,0,0,.1)":"none",transition:"all .12s"}}>
                {l}
              </button>
            ))}
          </div>
          {viewMode==='week'&&<>
            <button onClick={()=>setWeekOffset(w=>w-1)} className="btn btn-ghost btn-sm">← Eelmine</button>
            <button onClick={()=>setWeekOffset(0)} className="btn btn-sm"
              style={{background:weekOffset===0?"#1C2B3A":"#fff",color:weekOffset===0?"#fff":"#1C2B3A",
                border:"1.5px solid "+(weekOffset===0?"#1C2B3A":"rgba(28,43,58,.15)")}}>Täna</button>
            <button onClick={()=>setWeekOffset(w=>w+1)} className="btn btn-ghost btn-sm">Järgmine →</button>
          </>}

                border:"1.5px solid "+(dayViewDate===today()?"#1C2B3A":"rgba(28,43,58,.15)")}}>Täna</button>
            <button onClick={goToNextDay} className="btn btn-ghost btn-sm">Järgmine päev →</button>
          </>}
        </div>
      </div>

      {/* ── Teacher pills ── */}
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        {isAdmin&&(
          <>
            <span style={{fontSize:".7rem",fontWeight:700,color:"#9ca3af"}}>Õpetaja:</span>
            {[...Object.keys(TEACHER_COLORS),'Kõik'].map(t=>{
              const col=tColor(t);
              const active=(t==='Kõik'&&(!filterT||filterT==='Kõik'))||canonicalTeacherName(filterT)===canonicalTeacherName(t);
              return(
                <button key={t} onClick={()=>setFilterT(t)}
                  style={{padding:'3px 11px',borderRadius:999,
                    border:'1.5px solid '+(active?col.dot:'rgba(28,43,58,.1)'),
                    background:active?col.bg:'transparent',color:active?col.text:'#42536A',
                    cursor:'pointer',fontFamily:'inherit',fontSize:'.74rem',fontWeight:active?700:400,transition:'all .12s'}}>
                  {t}
                </button>
              );
            })}
            <div style={{width:1,height:14,background:'rgba(28,43,58,.12)'}}/>
          </>
        )}
        {!isAdmin&&<span style={{padding:'3px 11px',borderRadius:999,
          background:tColor(user.displayName).bg,color:tColor(user.displayName).text,
          border:'1.5px solid '+tColor(user.displayName).dot,fontSize:'.74rem',fontWeight:700}}>
          {user.displayName}

        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:".74rem",color:"#42536A",cursor:"pointer"}}>
          <input type="checkbox" checked={showCanceled} onChange={e=>setShowCanceled(e.target.checked)} style={{width:"auto"}}/>

      {canManage&&<GCalSettings user={user} notify={notify}/>}

      {/* ── Create popup (Google-style) ── */}

        <>
          <div style={{position:'fixed',inset:0,zIndex:299}} onClick={()=>setCreatePopup(null)}/>
          <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
            zIndex:300,background:'#fff',borderRadius:16,padding:20,width:320,
            boxShadow:'0 8px 40px rgba(0,0,0,.18)',border:'1px solid rgba(28,43,58,.1)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontWeight:700,fontSize:'.9rem'}}>📅 Lisa tund</div>
                <div style={{fontSize:'.76rem',color:'#42536A',marginTop:2}}>
                  {new Date(createPopup.dayIso).toLocaleDateString('et-EE',{weekday:'short',day:'2-digit',month:'short'})} · {createPopup.slot}
                </div>
              </div>
              <button onClick={()=>setCreatePopup(null)}
                style={{background:'rgba(28,43,58,.07)',border:'none',borderRadius:8,width:28,height:28,
                  cursor:'pointer',fontSize:'.9rem',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <StuSearch value={popupStu} onChange={setPopupStu}
