<!DOCTYPE html>
<html lang="et" style="color-scheme: light only;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KeeleSepp — Haldussüsteem</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --ink: #1C2B3A;
            --ink-s: #42536A;
            --paper: #FBFAF8;
            --mist: #EFEDE7;
            --amber: #C9882A;
            --amber-d: #A96E1A;
            --pine: #2F5D50;
            --sh: 0 10px 32px rgba(28,43,58,.08);
            --r: 14px;
        }
        body { 
            font-family: "IBM Plex Sans", system-ui, sans-serif; 
            background-color: var(--paper);
            color: var(--ink);
        }
        h1, h2, h3 { font-family: "Fraunces", Georgia, serif; font-weight: 600; }
        
        input, select, textarea { 
            font-size: 16px !important; 
            background-color: #fff !important;
            border: 1.5px solid rgba(28,43,58,.13) !important;
            border-radius: 10px !important;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--amber) !important; outline: none; }
    </style>
</head>
<body class="antialiased">

    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-600"></div>
        </div>
    </div>

    <script type="text/babel">
        // === 1. ВАШИ РЕАЛЬНЫЕ КЛЮЧИ FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyAp8emB0h1fIqv72k_05hkLkXVkfBt1al4",
            authDomain: "keelesepp-5136b.firebaseapp.com",
            projectId: "keelesepp-5136b",
            storageBucket: "keelesepp-5136b.appspot.com",
            messagingSenderId: "674098517935",
            appId: "1:674098517935:web:e73d04a4ada67874da015a"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Компонент прогресса (Кривая)
        function ProgressChart({ data }) {
            const chartRef = React.useRef(null);
            React.useEffect(() => {
                if (!chartRef.current || data.length === 0) return;
                const ctx = chartRef.current.getContext('2d');
                const sortedData = [...data].sort((a,b) => new Date(a.date) - new Date(b.date));
                const labels = sortedData.map(item => item.date);
                const scores = sortedData.map(item => item.grade);

                const chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Hinnete kõver (Оценки развития)',
                            data: scores,
                            borderColor: '#C9882A',
                            backgroundColor: 'rgba(201, 136, 42, 0.05)',
                            borderWidth: 3,
                            tension: 0.3,
                            fill: true,
                            pointBackgroundColor: '#2F5D50',
                            pointRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { min: 1, max: 5, ticks: { stepSize: 1 } } }
                    }
                });
                return () => { chartInstance.destroy(); };
            }, [data]);

            return <div class="h-64 w-full"><canvas ref={chartRef}></canvas></div>;
        }

        function App() {
            const [user, setUser] = React.useState(null);
            const [role, setRole] = React.useState(null); 
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            
            const [students, setStudents] = React.useState([]);
            const [lessons, setLessons] = React.useState([]);
            const [homeworks, setHomeworks] = React.useState([]);
            const [schedule, setSchedule] = React.useState([]); // Наше независимое расписание
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [selectedStudent, setSelectedStudent] = React.useState(null);

            // Поля форм
            const [newStudentName, setNewStudentName] = React.useState('');
            const [newStudentLevel, setNewStudentLevel] = React.useState('A1');
            const [targetLevel, setTargetLevel] = React.useState('B1');

            const [lessonTopic, setLessonTopic] = React.useState('');
            const [lessonGrade, setLessonGrade] = React.useState('5');
            const [lessonComment, setLessonComment] = React.useState('');
            const [hwTask, setHwTask] = React.useState('');

            // Поля для создания нового события в расписании
            const [schStudent, setSchStudent] = React.useState('');
            const [schDate, setSchDate] = React.useState('');
            const [schTime, setSchTime] = React.useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                setError('');
                const teachers = ['Pavel', 'Jelena', 'Elizaveta', 'Angelina'];
                const demoStudents = ['Marina', 'Aleksei', 'Olga', 'Dmitri', 'Natalia'];

                if (teachers.includes(username) && password === '1234') {
                    setUser(username); setRole('teacher');
                } else if (demoStudents.includes(username) && password === '1234') {
                    setUser(username); setRole('student');
                } else {
                    setError('Vale kasutajatunnus või parool');
                }
            };

            React.useEffect(() => {
                if (!user) return;
                const unsubStudents = db.collection("students").onSnapshot(snap => {
                    let list = []; snap.forEach(doc => list.push({id: doc.id, ...doc.data()}));
                    setStudents(list);
                });
                const unsubLessons = db.collection("lessons").onSnapshot(snap => {
                    let list = []; snap.forEach(doc => list.push({id: doc.id, ...doc.data()}));
                    setLessons(list);
                });
                const unsubHw = db.collection("homework").onSnapshot(snap => {
                    let list = []; snap.forEach(doc => list.push({id: doc.id, ...doc.data()}));
                    setHomeworks(list);
                });
                const unsubSch = db.collection("schedule").onSnapshot(snap => {
                    let list = []; snap.forEach(doc => list.push({id: doc.id, ...doc.data()}));
                    setSchedule(list);
                });
                return () => { unsubStudents(); unsubLessons(); unsubHw(); unsubSch(); };
            }, [user]);

            const addStudent = async (e) => {
                e.preventDefault();
                await db.collection("students").add({
                    name: newStudentName, level: newStudentLevel, targetLevel: targetLevel,
                    teacher: user, createdAt: new Date().toISOString()
                });
                setNewStudentName(''); alert('Õpilane lisatud!');
            };

            const addLessonReport = async (e) => {
                e.preventDefault();
                if (!selectedStudent) return;
                await db.collection("lessons").add({
                    studentId: selectedStudent.id, studentName: selectedStudent.name,
                    topic: lessonTopic, grade: parseInt(lessonGrade), comment: lessonComment,
                    date: new Date().toISOString().split('T')[0], teacher: user
                });
                setLessonTopic(''); setLessonComment(''); alert('Tagasiside salvestatud!');
            };

            const addHomework = async (e) => {
                e.preventDefault();
                if (!selectedStudent) return;
                await db.collection("homework").add({
                    studentId: selectedStudent.id, task: hwTask, status: "Ootel", date: new Date().toISOString().split('T')[0]
                });
                setHwTask(''); alert('Kodutöö saadetud!');
            };

            const toggleHwStatus = async (id, currentStatus) => {
                const next = currentStatus === "Tehtud" ? "Ootel" : "Tehtud";
                await db.collection("homework").doc(id).update({ status: next });
            };

            // Добавление занятия в собственную базу расписания KeeleSepp
            const addScheduleEvent = async (e) => {
                e.preventDefault();
                if (!schStudent || !schDate || !schTime) return;
                await db.collection("schedule").add({
                    teacher: user,
                    studentName: schStudent,
                    date: schDate,
                    time: schTime
                });
                setSchStudent(''); setSchDate(''); setSchTime('');
                alert('Tund edukalt tunniplaani lisatud!');
            };

            const deleteScheduleEvent = async (id) => {
                if(confirm('Kas soovite tunni tühistada?')) {
                    await db.collection("schedule").doc(id).delete();
                }
            };

            if (!user) {
                return (
                    <div class="min-h-screen flex items-center justify-center px-4" style={{background: 'linear-gradient(135deg, #FBFAF8, #EFEDE7)'}}>
                        <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-[rgba(28,43,58,0.1)]">
                            <div class="text-center">
                                <h2 class="text-4xl font-semibold text-slate-900 tracking-tight">Keele<span class="text-[#C9882A]">Sepp</span></h2>
                                <p class="mt-3 text-sm text-gray-500 font-medium">Õppesüsteemi sisselogimine</p>
                            </div>
                            <form class="mt-8 space-y-5" onSubmit={handleLogin}>
                                {error && <div class="bg-red-50 text-red-600 p-3 rounded-xl text-sm text-center border border-red-100">{error}</div>}
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Kasutajatunnus</label>
                                    <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} class="w-full px-4 py-3 text-gray-900" placeholder="Teie nimi" />
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Parool</label>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} class="w-full px-4 py-3 text-gray-900" placeholder="••••" />
                                </div>
                                <button type="submit" class="w-full py-3.5 text-sm font-semibold rounded-full text-white bg-[#1C2B3A] hover:bg-[#2F5D50] transition-all shadow-md cursor-pointer mt-6">
                                    Logi sisse
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const myStudentProfile = role === 'student' ? students.find(s => s.name.toLowerCase().includes(user.toLowerCase())) : null;
            const currentStudentData = role === 'student' ? myStudentProfile : selectedStudent;
            const studentLessons = currentStudentData ? lessons.filter(l => l.studentId === currentStudentData.id) : [];
            const studentHw = currentStudentData ? homeworks.filter(h => h.studentId === currentStudentData.id) : [];
            
            // Фильтрация расписания по конкретному пользователю
            const currentSchedule = role === 'teacher' 
                ? schedule.filter(s => s.teacher === user)
                : schedule.filter(s => s.studentName.toLowerCase().includes(user.toLowerCase()));

            return (
                <div class="min-h-screen flex flex-col md:flex-row">
                    <aside class="w-full md:w-64 text-white flex flex-col p-5 space-y-6" style={{backgroundColor: 'var(--ink)'}}>
                        <div class="flex items-center justify-between border-b border-gray-800 pb-4">
                            <span class="text-2xl font-semibold tracking-tight">Keele<span class="text-amber-400">Sepp</span></span>
                            <span class="text-[10px] uppercase font-bold tracking-widest bg-gray-800 px-2 py-1 rounded text-amber-400">{role === 'teacher' ? 'Õpetaja' : 'Õpilane / lapsevanem'}</span>
                        </div>
                        <div class="text-xs text-gray-400">Aktiivne konto: <span class="font-semibold text-white text-sm block mt-0.5">{user}</span></div>
                        <nav class="flex-1 space-y-1">
                            <button onClick={() => { setActiveTab('dashboard'); setSelectedStudent(null); }} class={`w-full flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'dashboard' ? 'bg-[#C9882A] text-white shadow-md' : 'text-gray-300 hover:bg-slate-800'}`}>
                                <i class="fa-solid fa-chart-pie mr-3 w-5"></i> Töölaud
                            </button>
                            <button onClick={() => setActiveTab('calendar')} class={`w-full flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'calendar' ? 'bg-[#C9882A] text-white shadow-md' : 'text-gray-300 hover:bg-slate-800'}`}>
                                <i class="fa-solid fa-calendar-days mr-3 w-5"></i> Tunniplaan
                            </button>
                            <button onClick={() => setActiveTab('students')} class={`w-full flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'students' ? 'bg-[#C9882A] text-white shadow-md' : 'text-gray-300 hover:bg-slate-800'}`}>
                                <i class="fa-solid fa-graduation-cap mr-3 w-5"></i> {role === 'teacher' ? 'Õpilaspäevikud' : 'Minu progress & päevik'}
                            </button>
                        </nav>
                        <button onClick={() => { setUser(null); }} class="w-full flex items-center px-4 py-3 rounded-xl text-sm font-medium text-red-400 hover:bg-slate-800 transition-colors">
                            <i class="fa-solid fa-right-from-bracket mr-3 w-5"></i> Logi välja
                        </button>
                    </aside>

                    <main class="flex-1 p-5 md:p-8 overflow-y-auto" style={{backgroundColor: 'var(--paper)'}}>
                        {activeTab === 'dashboard' && !selectedStudent && (
                            <div class="space-y-6">
                                <h1 class="text-3xl font-semibold text-slate-900">Tere tulemast, {user}!</h1>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                                    <div class="bg-white p-6 rounded-2xl border border-gray-200/60 shadow-sm">
                                        <p class="text-sm font-medium text-gray-400 uppercase">Õpilased süsteemis</p>
                                        <p class="text-4xl font-bold text-slate-900 mt-2">{role === 'teacher' ? students.filter(s => s.teacher === user).length : 1}</p>
                                    </div>
                                    <div class="bg-white p-6 rounded-2xl border border-gray-200/60 shadow-sm">
                                        <p class="text-sm font-medium text-gray-400 uppercase">Keeletase</p>
                                        <p class="text-2xl font-bold text-[#2F5D50] mt-3">
                                            {role === 'teacher' ? "Kõik tasemed A1-C1" : `${myStudentProfile?.level || 'A1'} ➔ Siht: ${myStudentProfile?.targetLevel || 'B1'}`}
                                        </p>
                                    </div>
                                </div>

                                {role === 'teacher' && (
                                    <div class="bg-white p-6 rounded-2xl border border-gray-200/60 shadow-sm mt-6">
                                        <h3 class="text-xl font-semibold text-slate-900 mb-4">Registreeri uus rühm / õpilane</h3>
                                        <form onSubmit={addStudent} class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                            <input type="text" value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)} placeholder="Õpilase nimi" class="px-4 py-2.5 text-sm" required />
                                            <select value={newStudentLevel} onChange={(e) => setNewStudentLevel(e.target.value)} class="px-4 py-2.5 text-sm">
                                                <option value="A1">Hetketase: A1</option><option value="A2">A2</option><option value="B1">B1</option><option value="B2">B2</option>
                                            </select>
                                            <select value={targetLevel} onChange={(e) => setTargetLevel(e.target.value)} class="px-4 py-2.5 text-sm">
                                                <option value="B1">Eesmärk: B1</option><option value="B2">B2</option><option value="C1">C1</option>
                                            </select>
                                            <button type="submit" class="sm:col-span-3 bg-[#2F5D50] hover:bg-[#1C2B3A] text-white py-3 rounded-full text-sm font-semibold transition-all">
                                                + Lisa õpilane andmebaasi
                                            </button>
                                        </form>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'calendar' && (
                            <div class="space-y-6">
                                <h1 class="text-3xl font-semibold text-slate-900">KeeleSepp Tunniplaan (Внутреннее расписание)</h1>
                                
                                {role === 'teacher' && (
                                    <div class="bg-white p-5 rounded-2xl border border-gray-200/60 shadow-sm">
                                        <h3 class="text-lg font-bold mb-3">Määra uus tund graafikusse</h3>
                                        <form onSubmit={addScheduleEvent} class="grid grid-cols-1 sm:grid-cols-4 gap-4">
                                            <input type="text" value={schStudent} onChange={(e) => setSchStudent(e.target.value)} placeholder="Õpilase / rühma nimi" class="px-4 py-2 text-sm" required />
                                            <input type="date" value={schDate} onChange={(e) => setSchDate(e.target.value)} class="px-4 py-2 text-sm" required />
                                            <input type="time" value={schTime} onChange={(e) => setSchTime(e.target.value)} class="px-4 py-2 text-sm" required />
                                            <button type="submit" class="bg-[#2F5D50] hover:bg-[#1C2B3A] text-white font-semibold rounded-xl text-sm transition-all cursor-pointer">
                                                + Lisa kalendrisse
                                            </button>
                                        </form>
                                    </div>
                                )}

                                <div class="bg-white p-6 rounded-2xl border border-gray-200/60 shadow-sm">
                                    <h3 class="text-xl font-bold mb-4 text-slate-800"><i class="fa-regular fa-clock mr-2 text-[#C9882A]"></i>Tulevased tunnid</h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {currentSchedule.length === 0 ? (
                                            <p class="text-gray-400 text-sm col-span-full py-4">Sellesse tunniplaani pole veel tunde märgitud.</p>
                                        ) : (
                                            [...currentSchedule].sort((a,b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time)).map(event => (
                                                <div key={event.id} class="p-4 bg-gray-50/70 border border-gray-200 rounded-xl flex justify-between items-start transition-all hover:shadow-sm">
                                                    <div>
                                                        <span class="block font-bold text-slate-900 text-base">{event.studentName}</span>
                                                        <span class="inline-block text-xs font-semibold bg-amber-50 text-[#A96E1A] px-2 py-0.5 rounded-md mt-1.5">
                                                            <i class="fa-regular fa-calendar-days mr-1"></i> {event.date} kell {event.time}
                                                        </span>
                                                        {role === 'student' && <span class="block text-[11px] text-gray-400 mt-1">Õpetaja: {event.teacher}</span>}
                                                    </div>
                                                    {role === 'teacher' && (
                                                        <button onClick={() => deleteScheduleEvent(event.id)} class="text-red-400 hover:text-red-600 p-1 text-sm transition-colors cursor-pointer" title="Tühista tund">
                                                            <i class="fa-solid fa-trash-can"></i>
                                                        </button>
                                                    )}
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {(activeTab === 'students' || selectedStudent) && (
                            <div class="space-y-6">
                                {role === 'teacher' && !selectedStudent ? (
                                    <div>
                                        <h1 class="text-3xl font-semibold text-slate-900 mb-6">Vali õpilase päevik progressi vaatamiseks</h1>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {students.filter(s => s.teacher === user).map(student => (
                                                <div key={student.id} onClick={() => setSelectedStudent(student)} class="bg-white p-5 rounded-2xl border border-gray-200/60 shadow-sm hover:border-[#C9882A] cursor-pointer transition-all">
                                                    <h3 class="text-lg font-bold text-slate-900">{student.name}</h3>
                                                    <p class="text-xs text-gray-400 mt-1">Tase: {student.level} ➔ Siht: {student.targetLevel}</p>
                                                    <span class="inline-block text-xs font-semibold text-[#C9882A] mt-3">Ava õpikaart ➔</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div class="space-y-6">
                                        <div class="flex justify-between items-center bg-white p-6 rounded-2xl border border-gray-200/60 shadow-sm">
                                            <div>
                                                <h2 class="text-2xl font-bold text-slate-900">{currentStudentData?.name} päevik</h2>
                                                <p class="text-sm text-gray-500 mt-1">Kõver arengutasemest {currentStudentData?.level} kuni tasemeni {currentStudentData?.targetLevel}</p>
                                            </div>
                                            {role === 'teacher' && (
                                                <button onClick={() => setSelectedStudent(null)} class="text-sm bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-full font-medium cursor-pointer">Tagasi</button>
                                            )}
                                        </div>

                                        <div class="bg-white p-6 rounded-2xl border border-gray-200/60 shadow-sm">
                                            <h3 class="text-lg font-bold mb-4">Õppimise progressi kõver (Кривая успеваемости)</h3>
                                            {studentLessons.length > 0 ? (
                                                <ProgressChart data={studentLessons} />
                                            ) : (
                                                <p class="text-sm text-gray-400 text-center py-8">Graafiku jaoks pole veel piisavalt hindeid.</p>
                                            )}
                                        </div>

                                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                            <div class="bg-white p-6 rounded-2xl border border-gray-200/60 shadow-sm space-y-4">
                                                <h3 class="text-lg font-bold text-slate-900 border-b border-gray-100 pb-2"><i class="fa-solid fa-book mr-2 text-[#C9882A]"></i>Kodutööd</h3>
                                                {role === 'teacher' && (
                                                    <form onSubmit={addHomework} class="flex gap-2">
                                                        <input type="text" value={hwTask} onChange={(e) => setHwTask(e.target.value)} placeholder="Uus ülesanne..." class="flex-1 px-4 py-2 text-sm" required />
                                                        <button type="submit" class="bg-[#2F5D50] hover:bg-[#1C2B3A] text-white px-4 py-2 rounded-xl text-sm font-semibold cursor-pointer">Saada</button>
                                                    </form>
                                                )}
                                                <div class="space-y-2">
                                                    {studentHw.map(hw => (
                                                        <div key={hw.id} class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
                                                            <div>
                                                                <p class="text-sm font-medium text-slate-900">{hw.task}</p>
                                                                <span class="text-[10px] text-gray-400">{hw.date}</span>
                                                            </div>
                                                            <button onClick={() => toggleHwStatus(hw.id, hw.status)} class={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer ${hw.status === 'Tehtud' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-[#A96E1A]'}`}>
                                                                {hw.status === 'Tehtud' ? '✓ Tehtud' : 'Ootel'}
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div class="bg-white p-6 rounded-2xl border border-gray-200/60 shadow-sm space-y-4">
                                                <h3 class="text-lg font-bold text-slate-900 border-b border-gray-100 pb-2"><i class="fa-solid fa-pen-to-square mr-2 text-[#2F5D50]"></i>Журнал уроков и оценки</h3>
                                                {role === 'teacher' && (
                                                    <form onSubmit={addLessonReport} class="space-y-3 bg-gray-50/50 p-4 rounded-xl border">
                                                        <input type="text" value={lessonTopic} onChange={(e) => setLessonTopic(e.target.value)} placeholder="Tunni teema" class="w-full px-3 py-2 text-sm" required />
                                                        <div class="flex gap-4 items-center">
                                                            <label class="text-xs font-bold text-gray-500">Hinne:</label>
                                                            <select value={lessonGrade} onChange={(e) => setLessonGrade(e.target.value)} class="px-3 py-1.5 text-sm font-bold text-[#C9882A]">
                                                                <option value="5">5 (Suurepärane)</option><option value="4">4 (Hea)</option><option value="3">3 (Rahuldav)</option>
                                                            </select>
                                                        </div>
                                                        <textarea value={lessonComment} onChange={(e) => setLessonComment(e.target.value)} placeholder="Õpetaja kommentaar..." rows="2" class="w-full px-3 py-2 text-sm"></textarea>
                                                        <button type="submit" class="w-full bg-[#1C2B3A] text-white py-2 rounded-xl text-sm font-semibold hover:bg-[#2F5D50] cursor-pointer">Pane hinne</button>
                                                    </form>
                                                )}
                                                <div class="space-y-3 max-h-96 overflow-y-auto">
                                                    {studentLessons.map(lesson => (
                                                        <div key={lesson.id} class="border-b border-gray-100 pb-2 flex gap-4 items-start">
                                                            <span class="w-10 h-10 flex items-center justify-center bg-amber-50 rounded-xl text-[#A96E1A] font-bold text-lg border border-amber-100">{lesson.grade}</span>
                                                            <div class="flex-1">
                                                                <h4 class="text-sm font-semibold text-slate-900">{lesson.topic}</h4>
                                                                <p class="text-xs text-gray-500 mt-0.5">{lesson.comment}</p>
                                                                <span class="text-[10px] text-gray-400 block mt-1">{lesson.date} · Õp. {lesson.teacher}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
