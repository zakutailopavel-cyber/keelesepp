// ── TEGEVUSTE AJALUGU ───────────────────────────────────────
function ActivityLogView({logs,isAdmin}) {
  const [query,setQuery] = React.useState('');
  const [typeFilter,setTypeFilter] = React.useState('all');
  const typeLabels = {
    student:'Õpilased',
    homework:'Kodutööd',
    invoice:'Arved',
    task:'Ülesanded',
    lesson:'Tunnid',
    group:'Grupid'
  };
  const visibleLogs = logs.filter(item=>{
    const baseType = String(item.type||'').split('.')[0] || 'other';
    if(typeFilter!=='all' && baseType!==typeFilter) return false;
    const q=normalizeText(query);
    if(!q) return true;
    return normalizeText(item.label).includes(q)
      || normalizeText(item.byName).includes(q)
      || normalizeText(item.studentName).includes(q)
      || normalizeText(baseType).includes(q);
  });

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:14,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontSize:'1.7rem'}}>Tegevused</h1>
          <div style={{fontSize:'.88rem',color:'#42536A',marginTop:4}}>
            {isAdmin?'Administraator näeb kõiki süsteemi tegevusi.':'Õpetaja näeb enda tegevusi ja oma õpilastega seotud muudatusi.'}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Otsi tegevust..." style={{width:260}}/>
          <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={{width:'auto'}}>
            <option value="all">Kõik tüübid</option>
            {Object.entries(typeLabels).map(([id,label])=><option key={id} value={id}>{label}</option>)}
          </select>
        </div>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {[...visibleLogs].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,120).map(item=>{
          const baseType = String(item.type||'').split('.')[0] || 'other';
          const when = item.createdAt ? new Date(item.createdAt).toLocaleString('et-EE') : fmtDate(item.date);
          return(
            <div key={item.id} style={{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:12,alignItems:'center',padding:'14px 16px',borderBottom:'1px solid rgba(28,43,58,.06)'}}>
              <span className="badge" style={{background:'rgba(47,93,80,.1)',color:'#2F5D50'}}>
                {typeLabels[baseType]||baseType}
              </span>
              <div style={{minWidth:0}}>
                <div style={{fontWeight:800,color:'#1C2B3A'}}>{item.label}</div>
                <div style={{fontSize:'.78rem',color:'#42536A',marginTop:3}}>
                  {item.studentName&&<span>{item.studentName} · </span>}
                  {item.byName||'—'}
                </div>
              </div>
              <div style={{fontSize:'.74rem',color:'#42536A',whiteSpace:'nowrap'}}>{when}</div>
            </div>
          );
        })}
        {visibleLogs.length===0&&(
          <div style={{textAlign:'center',padding:'34px 12px',color:'#42536A'}}>Tegevusi ei leitud.</div>
        )}
      </div>
    </div>
  );
}

// ── TUNNIPLAAN ────────────────────────────────────────────────
function CalendarView({user,myStudents,schedule,groups,isAdmin,filterT,setFilterT,
  schStu,setSchStu,schDate,setSchDate,schTime,setSchTime,schTeach,setSchTeach,
  schRecurring,setSchRecurring,addSchedule,openScheduleEditor,delSchedule,markAttendance}) {

  const [showCanceled,setShowCanceled] = React.useState(true);
  const [weekOffset,setWeekOffset]     = React.useState(0);
  const canManage = user.role==="teacher" || user.role==="admin";

  // Вычисляем начало недели
  const weekStart = React.useMemo(()=>{
    const now = new Date();
    const day = now.getDay();
    const diff = day===0 ? -6 : 1-day;
    const mon = new Date(now);
    mon.setDate(now.getDate()+diff+(weekOffset*7));
    mon.setHours(0,0,0,0);
    return mon;
  },[weekOffset]);

  const weekDays = React.useMemo(()=>
    Array.from({length:7},(_,i)=>{
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate()+i);
      const iso = toLocalISODate(d);
      const jsDay = d.getDay();
      const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
      return {
        short: ["P","E","T","K","N","R","L"][jsDay],
        full:  ["Pühapäev","Esmaspäev","Teisipäev","Kolmapäev","Neljapäev","Reede","Laupäev"][jsDay],
        iso, dayId,
        label: d.toLocaleDateString("et-EE",{day:"2-digit",month:"2-digit"}),
        isToday: iso===today()
      };
    })
  ,[weekStart]);

  const weekLabel = React.useMemo(()=>{
    const e = new Date(weekStart); e.setDate(weekStart.getDate()+6);
    return weekStart.toLocaleDateString("et-EE",{day:"2-digit",month:"short"})
      +" – "+e.toLocaleDateString("et-EE",{day:"2-digit",month:"short",year:"numeric"});
  },[weekStart]);

  const STATUS_META = {
    Planeeritud: {bg:"rgba(47,93,80,.09)",border:"rgba(47,93,80,.2)",hover:"rgba(47,93,80,.18)",pill:"rgba(47,93,80,.14)",pillC:"#2F5D50",dot:"#2F5D50"},
    Nihutatud:   {bg:"rgba(201,136,42,.09)",border:"rgba(201,136,42,.25)",hover:"rgba(201,136,42,.18)",pill:"rgba(201,136,42,.14)",pillC:"#A96E1A",dot:"#C9882A"},
    Tühistatud:  {bg:"rgba(239,68,68,.07)",border:"rgba(239,68,68,.18)",hover:"rgba(239,68,68,.12)",pill:"rgba(239,68,68,.1)",pillC:"#991b1b",dot:"#ef4444"},
    Toimunud:    {bg:"rgba(28,43,58,.06)",border:"rgba(28,43,58,.14)",hover:"rgba(28,43,58,.1)",pill:"rgba(28,43,58,.08)",pillC:"#42536A",dot:"#1C2B3A"},
  };

  const filteredSch = React.useMemo(()=>{
    const linkedStudentNames = myStudents.map(s=>normalizeText(s.name));
    const linkedGroups = myStudents.map(s=>normalizeText(s.group)).filter(Boolean);
    const myStudentIds = new Set(myStudents.map(s=>s.id));
    const groupEvents = (groups||[]).flatMap(group=>
      (group.lessons||[]).map(lesson=>{
        const assignedStudents = (group.students||[]).filter(studentId=>{
          const saved = group.studentLessonMap?.[studentId];
          return Array.isArray(saved) ? saved.includes(lesson.id) : true;
        });
        return {
          id:`group-${group.id}-${lesson.id}`,
          groupId:group.id,
          groupLessonId:lesson.id,
          isGroup:true,
          teacher:group.teacher||'Kõik',
          studentName:group.name,
          date:lesson.date||'',
          day:lesson.day||'Mon',
          time:lesson.time||'09:00',
          status:lesson.status||'Planeeritud',
          recurring:lesson.recurring!==false,
          startDate:lesson.startDate||today(),
          attendance:lesson.attendance||{},
          students:assignedStudents,
          groupMembers:assignedStudents
        };
      })
    );
    let list = canManage
      ?(
          isAdmin
            ? (filterT==="Kõik"||!filterT?[...schedule,...groupEvents]:[
                ...schedule.filter(s=>canonicalTeacherName(s.teacher)===canonicalTeacherName(filterT)),
                ...groupEvents.filter(s=>canonicalTeacherName(s.teacher)===canonicalTeacherName(filterT) || s.teacher==='Kõik')
              ])
            : [...schedule.filter(s=>canonicalTeacherName(s.teacher)===canonicalTeacherName(user.displayName)),...groupEvents]
        )
      :schedule.filter(s=>{
        const target = normalizeText(s.studentName);
        return linkedStudentNames.includes(target) || linkedGroups.includes(target);
      }).concat(groupEvents.filter(event=>
        (event.students||[]).some(studentId=>myStudentIds.has(studentId)) ||
        (!(event.students||[]).length && linkedGroups.includes(normalizeText(event.studentName)))
      ));
    if(!showCanceled) list=list.filter(s=>s.status!=="Tühistatud");
    return list;
  },[schedule,groups,myStudents,filterT,showCanceled,canManage,isAdmin,user]);

  const getEventsForSlot = (slot, day) =>
    filteredSch.filter(s=>{
      if(s.time!==slot) return false;
      if(s.recurring && s.startDate && day.iso < s.startDate) return false;
      if(s.date) return s.date===day.iso;
      return s.day===day.dayId;
    });

  return(
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Заголовок */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:"1.7rem"}}>Tunniplaan</h1>
          <div style={{fontSize:".85rem",color:"#42536A",marginTop:4}}>Nädal: {weekLabel}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {isAdmin&&(
            <select value={filterT} onChange={e=>setFilterT(e.target.value)} style={{width:"auto",minWidth:160}}>
              {TEACHERS.map(t=><option key={t}>{t}</option>)}
              <option value="Kõik">Kõik õpetajad</option>
            </select>
          )}
          <label style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:"#fff",borderRadius:10,border:"1px solid rgba(28,43,58,.12)",cursor:"pointer",fontSize:".82rem",fontWeight:500}}>
            <input type="checkbox" checked={showCanceled} onChange={e=>setShowCanceled(e.target.checked)} style={{width:"auto",padding:0,border:"none!important",boxShadow:"none!important"}}/>
            Näita tühistatud
          </label>
          <button onClick={()=>setWeekOffset(w=>w-1)} className="btn btn-ghost btn-sm">← Eelmine</button>
          <button onClick={()=>setWeekOffset(0)} className="btn btn-ghost btn-sm">See nädal</button>
          <button onClick={()=>setWeekOffset(w=>w+1)} className="btn btn-ghost btn-sm">Järgmine →</button>
        </div>
      </div>

      {/* Легенда статусов */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:".76rem",color:"#42536A",fontWeight:600}}>Staatus:</span>
        {Object.entries(STATUS_META).map(([k,m])=>(
          <span key={k} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:999,
            background:m.pill,color:m.pillC,fontSize:".76rem",fontWeight:600}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:m.dot,flexShrink:0}}/>
            {k}
          </span>
        ))}
        <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:999,
          background:"rgba(201,136,42,.09)",color:"#A96E1A",fontSize:".76rem",fontWeight:600}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#C9882A",flexShrink:0}}/>
          Korduv mall
        </span>
      </div>

      {/* Форма бронирования */}
      {canManage&&(
        <div className="card" style={{padding:20}}>
          <div style={{fontSize:".78rem",fontWeight:700,color:"#42536A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>
            Broneeri uus tund
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:10,marginBottom:12}}>
            <select value={schStu} onChange={e=>setSchStu(e.target.value)}>
              <option value="">Vali õpilane…</option>
              {myStudents.filter(s=>s.active!==false).map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
            </select>
            <input type="date" value={schDate} onChange={e=>setSchDate(e.target.value)}/>
            <select value={schTime} onChange={e=>setSchTime(e.target.value)}>
              {TIMES.map(t=><option key={t}>{t}</option>)}
            </select>
            {isAdmin&&<select value={schTeach} onChange={e=>setSchTeach(e.target.value)}>
              {TEACHERS.map(t=><option key={t}>{t}</option>)}
            </select>}
          </div>
          <label style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#F9F8F6",borderRadius:10,border:"1px solid rgba(28,43,58,.08)",cursor:"pointer",fontSize:".84rem",fontWeight:500,marginBottom:12,width:"fit-content"}}>
            <input type="checkbox" checked={schRecurring} onChange={e=>setSchRecurring(e.target.checked)} style={{width:"auto",padding:0,border:"none!important",boxShadow:"none!important"}}/>
            Korda igal nädalal automaatselt
          </label>
          <button onClick={addSchedule} className="btn btn-pine" style={{width:"100%"}}>
            <i className="fa-solid fa-calendar-plus"/> {schRecurring?'Loo korduv tund':'Kinnita tund'}
          </button>
        </div>
      )}

      {/* Сетка календаря */}
      <div className="card" style={{overflow:"hidden"}}>
        <div className="scroll" style={{overflowX:"auto"}}>
          <div style={{minWidth:720}}>
            {/* Заголовок дней */}
            <div style={{display:"grid",gridTemplateColumns:"64px repeat(7,1fr)",background:"#EFEDE7",borderBottom:"1px solid rgba(28,43,58,.1)"}}>
              <div style={{padding:"10px 8px",textAlign:"center",fontSize:".72rem",fontWeight:700,color:"#42536A"}}>Kell</div>
              {weekDays.map(d=>(
                <div key={d.iso} style={{padding:"10px 4px",textAlign:"center",borderLeft:"1px solid rgba(28,43,58,.08)",
                  background:d.isToday?"rgba(201,136,42,.06)":"transparent"}}>
                  <div style={{fontSize:".78rem",fontWeight:700,color:d.isToday?"#C9882A":"#1C2B3A"}}>{d.short}</div>
                  <div style={{fontSize:".7rem",fontWeight:600,color:d.isToday?"#C9882A":"#42536A",marginTop:1}}>{d.label}</div>
                </div>
              ))}
            </div>
            {/* Строки времени */}
            {TIMES.map(slot=>(
              <div key={slot} style={{display:"grid",gridTemplateColumns:"64px repeat(7,1fr)",minHeight:64,borderBottom:"1px solid rgba(28,43,58,.04)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",fontSize:".72rem",fontFamily:"monospace",fontWeight:700,color:"#9ca3af",background:"rgba(239,237,231,.3)",borderRight:"1px solid rgba(28,43,58,.06)"}}>
                  {slot}
                </div>
                {weekDays.map(day=>{
                  const evs = getEventsForSlot(slot, day);
                  return(
                    <div key={day.iso} style={{padding:3,borderLeft:"1px solid rgba(28,43,58,.05)",display:"flex",flexDirection:"column",gap:2,
                      background:day.isToday?"rgba(201,136,42,.02)":"transparent"}}>
                      {evs.map(ev=>{
                        const isLegacy = !ev.date;
                        const st = ev.status||"Planeeritud";
                        const m = isLegacy
                          ? {bg:"rgba(201,136,42,.09)",border:"rgba(201,136,42,.25)",hover:"rgba(201,136,42,.18)"}
                          : (STATUS_META[st]||STATUS_META.Planeeritud);
                        const linkedStu = !canManage
                          ? myStudents.find(stu=>{
                              const target = normalizeText(ev.studentName);
                              return normalizeText(stu.name)===target || normalizeText(stu.group)===target || (ev.students||[]).includes(stu.id);
                            })
                          : null;
                        const attendanceKey = linkedStu ? `${linkedStu.id}_${day.iso}` : "";
                        const attendanceStatus = attendanceKey ? ev.attendance?.[attendanceKey]?.status : "";
                        return(
                          <div key={ev.id+day.iso}
                            onClick={()=>canManage&&openScheduleEditor({...ev,occurrenceDate:day.iso})}
                            style={{fontSize:".72rem",padding:"5px 7px",borderRadius:7,cursor:canManage?"pointer":"default",
                              background:m.bg,border:`1px solid ${m.border}`,transition:"background .12s",
                              opacity:st==="Tühistatud"?.55:1}}
                            onMouseEnter={e=>{if(canManage)e.currentTarget.style.background=m.hover}}
                            onMouseLeave={e=>e.currentTarget.style.background=m.bg}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:3}}>
                              <span style={{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                                textDecoration:st==="Tühistatud"?"line-through":"none"}}>
                                {ev.studentName}
                              </span>
                              <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
                                {isLegacy&&<span style={{fontSize:".6rem",padding:"1px 5px",borderRadius:999,background:"rgba(201,136,42,.2)",color:"#A96E1A",fontWeight:700}}>mall</span>}
                                {canManage&&(
                                  <button onClick={e=>delSchedule(ev.id,e)}
                                    style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:".72rem",padding:0,lineHeight:1}}
                                    onMouseEnter={e=>{e.currentTarget.style.color="#ef4444";e.stopPropagation();}}
                                    onMouseLeave={e=>e.currentTarget.style.color="#9ca3af"}>✕</button>
                                )}
                              </div>
                            </div>
                            <div style={{fontSize:".64rem",color:"#9ca3af",marginTop:1,display:"flex",gap:4}}>
                              {filterT==="Kõik"&&<span>{ev.teacher}</span>}
                              {!isLegacy&&st!=="Planeeritud"&&<span style={{color:STATUS_META[st]?.pillC}}>{st}</span>}
                            </div>
                            {!canManage&&linkedStu&&ev.id&&st!=="Tühistatud"&&(
                              <div style={{display:"flex",gap:4,marginTop:5,flexWrap:"wrap"}}>
                                <button onClick={e=>{e.stopPropagation();markAttendance(ev,attendanceKey,"coming");}}
                                  className="btn btn-pine btn-sm"
                                  style={{padding:"3px 7px",fontSize:".62rem",opacity:attendanceStatus==="coming"?1:.86}}>
                                  Tuleb
                                </button>
                                <button onClick={e=>{e.stopPropagation();markAttendance(ev,attendanceKey,"absent");}}
                                  className="btn btn-red btn-sm"
                                  style={{padding:"3px 7px",fontSize:".62rem",opacity:attendanceStatus==="absent"?1:.86}}>
                                  Ei tule
                                </button>
                                {attendanceStatus&&(
                                  <span style={{fontSize:".62rem",fontWeight:700,color:attendanceStatus==="coming"?"#166534":"#991b1b",alignSelf:"center"}}>
                                    {attendanceStatus==="coming"?"✓ märgitud":"puudumine märgitud"}
                                  </span>
                                )}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ÕPILASTE NIMEKIRI ─────────────────────────────────────────
function StudentsList({filteredStudents,lessons,isAdmin,search,setSearch,stuFilter,setStuFilter,setSelStu}) {
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <h1 style={{fontSize:'1.7rem'}}>Minu õpilased <span style={{fontSize:'1rem',fontFamily:'IBM Plex Sans',fontWeight:400,color:'#42536A'}}>({filteredStudents.length})</span></h1>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Otsi…" style={{width:200,padding:'9px 14px'}}/>
          <select value={stuFilter} onChange={e=>setStuFilter(e.target.value)} style={{width:'auto'}}>
            <option value="active">Aktiivsed</option>
            <option value="all">Kõik</option>
            <option value="inactive">Arhiveeritud</option>
          </select>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:14}}>
        {filteredStudents.map(s=>{
          const done=lessons.filter(l=>{
            const matchesStudent = (l.studentId===s.id||l.studentName?.toLowerCase()===s.name?.toLowerCase())&&l.status==='Toimunud';
            if(!matchesStudent) return false;
            if(isAdmin) return true;
            return canonicalTeacherName(l.teacher)===canonicalTeacherName(s.teacher);
          });
          const pct=levelPct(s.level,s.targetLevel);
          const rem=pkgLeft(s);
          return(
            <div key={s.id} className="card" style={{padding:20,cursor:'pointer',transition:'all .18s',opacity:s.active===false?.6:1,position:'relative'}}
              onClick={()=>setSelStu(s)}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#C9882A';e.currentTarget.style.transform='translateY(-2px)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(28,43,58,.07)';e.currentTarget.style.transform='translateY(0)';}}>
              {s.active===false&&<span className="badge" style={{position:'absolute',top:10,right:10,background:'#f3f4f6',color:'#6b7280'}}>Arhiveeritud</span>}
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
                <div>
                  <div style={{fontWeight:700,fontSize:'.98rem'}}>{s.name}</div>
                  <div style={{fontSize:'.75rem',color:'#42536A',marginTop:2}}>{s.level} → {s.targetLevel}{isAdmin&&<span style={{color:'#2F5D50',marginLeft:6}}>· {s.teacher}</span>}{s.subject&&<span style={{color:'#42536A',marginLeft:6}}>· {s.subject}</span>}{s.grade&&<span style={{color:'#C9882A',marginLeft:6}}>· {s.grade}</span>}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:'1.2rem',fontWeight:700,color:'#C9882A'}}>{done.length?avg(done.map(l=>l.grade))+'★':'—'}</div>
                  <div style={{fontSize:'.72rem',color:'#42536A'}}>{done.length} tundi</div>
                </div>
              </div>
              <div className="level-bar" style={{marginBottom:6}}><div className="level-fill" style={{width:pct+'%'}}/></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',color:'#42536A'}}>
                <span>{s.level}</span><span style={{color:'#2F5D50',fontWeight:600}}>{pct}%</span><span>{s.targetLevel}</span>
              </div>
              {s.packageTotal>0&&(
                <div style={{marginTop:12,padding:'8px 12px',borderRadius:9,display:'flex',justifyContent:'space-between',
                  background:rem<=2?'#fee2e2':rem<=5?'#fef3c7':'#f0fdf4'}}>
                  <span style={{fontSize:'.75rem',fontWeight:600,color:rem<=2?'#991b1b':rem<=5?'#92400e':'#166534'}}>📦 Paketi jääk</span>
                  <span style={{fontSize:'.82rem',fontWeight:700,color:rem<=2?'#991b1b':rem<=5?'#92400e':'#166534'}}>{rem}/{s.packageTotal}</span>
                </div>
              )}
            </div>
          );
        })}
        {filteredStudents.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:'48px 0',color:'#42536A'}}>{search?`"${search}" ei leitud`:'Õpilasi pole lisatud.'}</div>}
      </div>
    </div>
  );
}

// ── LAPSEVANEMAD ─────────────────────────────────────────────
function ParentsView({parents,students,invoices,isAdmin,parentAlerts,setSelStu,setTab,createMissingParentStudents,markParentChecked,notify}) {
  const [search,setSearch] = React.useState('');
  const [statusFilter,setStatusFilter] = React.useState('all');
  const parentStatusMeta = {
    new:{t:'Uus',bg:'#dbeafe',c:'#1d4ed8'},
    written:{t:'Kirjutatud',bg:'#ede9fe',c:'#6d28d9'},
    called:{t:'Helistatud',bg:'#fef3c7',c:'#92400e'},
    waiting:{t:'Ootab vastust',bg:'#fee2e2',c:'#991b1b'},
    agreed:{t:'Kokkulepitud',bg:'#dcfce7',c:'#166534'},
    problem:{t:'Probleem',bg:'#fee2e2',c:'#991b1b'},
    active:{t:'Aktiivne',bg:'#dcfce7',c:'#166534'}
  };
  const noData = (
    <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'3px 8px',borderRadius:999,background:'#fee2e2',border:'1px solid #fecaca',color:'#991b1b',fontWeight:800,fontSize:'.72rem'}}>
      Нет данных
    </span>
  );
  const updateParent = async(parent,patch)=>{
    if(!parent?.id) return;
    try{
      await db.collection('users').doc(parent.id).update({
        ...patch,
        parentCrmUpdatedAt:new Date().toISOString()
      });
      notify?.('✓ Lapsevanema info salvestatud');
    }catch(err){
      console.error('Parent update failed:',err);
      notify?.('⚠ Lapsevanema infot ei saanud salvestada');
    }
  };
  const parentRows = React.useMemo(()=>{
    const q = normalizeText(search);
    return parents.map(parent=>{
      const rawNames = String(parent.childName||'')
        .split(/[,\n;|]+/)
        .map(name=>name.trim())
        .filter(Boolean);
      const childNameKeys = new Set((rawNames.length?rawNames:parseLinkedNames(parent.childName)).map(name=>normalizeText(name)));
      const parentEmail = normalizeText(parent.email);
      const parentName = normalizeText(parent.displayName);
      const linkedChildren = students.filter(student=>{
        const linkedParentId = student.linkedParentId || student.parentUid || student.guardianUid || '';
        const studentName = normalizeText(student.name);
        const studentParentEmail = normalizeText(student.parentEmail || student.contactEmail || student.guardianEmail || student.email);
        const studentParentName = normalizeText(student.parentName || student.guardianName);
        return linkedParentId===parent.id ||
          (!!parentEmail && studentParentEmail===parentEmail) ||
          (!!parentName && studentParentName===parentName) ||
          childNameKeys.has(studentName);
      });
      const childGroups = Object.values(linkedChildren.reduce((acc,student)=>{
        const key = normalizeText(student.name) || student.id;
        if(!acc[key]) acc[key] = {name:student.name||'',items:[]};
        acc[key].items.push(student);
        return acc;
      },{}));
      const unpaid = invoices.filter(inv=>
        inv.status==='Ootel' && linkedChildren.some(student=>student.id===inv.studentId || normalizeText(student.name)===normalizeText(inv.studentName))
      );
      return {parent,rawNames,linkedChildren,childGroups,unpaid};
    }).filter(row=>{
      if(statusFilter!=='all' && (row.parent.parentContactStatus||'new')!==statusFilter) return false;
      if(!q) return true;
      return normalizeText(row.parent.displayName).includes(q) ||
        normalizeText(row.parent.email).includes(q) ||
        normalizeText(row.parent.parentContactNotes).includes(q) ||
        normalizeText(row.parent.parentContactOwner).includes(q) ||
        row.rawNames.some(name=>normalizeText(name).includes(q)) ||
        row.linkedChildren.some(student=>
          normalizeText(student.name).includes(q) ||
          normalizeText(student.teacher).includes(q) ||
          normalizeText(student.subject).includes(q) ||
          normalizeText(student.group).includes(q)
        );
    }).sort((a,b)=>(a.parent.displayName||a.parent.email||'').localeCompare(b.parent.displayName||b.parent.email||'','et'));
  },[parents,students,invoices,search,statusFilter]);
  const linkedCount = parentRows.filter(row=>row.linkedChildren.length>0).length;
  const missingCount = parentRows.filter(row=>row.rawNames.length>0&&row.linkedChildren.length===0).length;
  const unpaidTotal = parentRows.reduce((sum,row)=>sum+row.unpaid.reduce((a,inv)=>a+(parseFloat(inv.amount)||0),0),0);
  const todayCalls = parentRows.filter(row=>row.parent.parentNextContactAt===today()).length;
  const openStudent = student => {
    setSelStu(student);
    setTab('students');
  };
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:'1.7rem'}}>Lapsevanemad</h1>
          <div style={{fontSize:'.9rem',color:'#42536A',marginTop:4}}>
            Eraldi vanemate baas: seotud lapsed, õppeained, õpetajad ja maksed.
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Otsi vanemat, last, õpetajat…" style={{width:310,padding:'9px 14px'}}/>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{width:'auto'}}>
            <option value="all">Kõik staatused</option>
            {Object.entries(parentStatusMeta).map(([key,meta])=><option key={key} value={key}>{meta.t}</option>)}
          </select>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12}}>
        <div className="stat-card"><div className="stat-label">Lapsevanemaid</div><div className="stat-value">{parents.length}</div></div>
        <div className="stat-card"><div className="stat-label">Seotud lastega</div><div className="stat-value" style={{color:'#2F5D50'}}>{linkedCount}</div></div>
        <div className="stat-card"><div className="stat-label">Vajab sidumist</div><div className="stat-value" style={{color:missingCount?'#991b1b':'#2F5D50'}}>{missingCount}</div></div>
        <div className="stat-card"><div className="stat-label">Ootel arved</div><div className="stat-value" style={{color:unpaidTotal?'#991b1b':'#2F5D50'}}>{unpaidTotal}€</div></div>
        <div className="stat-card"><div className="stat-label">Täna ühendust</div><div className="stat-value" style={{color:todayCalls?'#C9882A':'#2F5D50'}}>{todayCalls}</div></div>
      </div>

      {isAdmin&&parentAlerts?.length>0&&(
        <div className="card" style={{padding:18,border:'1px solid #fecaca',background:'#fff7f7'}}>
          <div style={{fontWeight:800,color:'#991b1b',marginBottom:8}}>Uued lapsevanema registreeringud vajavad kontrolli</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {parentAlerts.map(alert=>(
              <div key={alert.parent.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap',borderTop:'1px solid #fecaca',paddingTop:8}}>
                <div>
                  <strong>{alert.parent.displayName||alert.parent.email}</strong>
                  <span style={{color:'#42536A'}}> · {alert.childNames.join(', ')}</span>
                </div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  <button onClick={()=>markParentChecked(alert.parent)} className="btn btn-ghost btn-sm">
                    Kontrollitud
                  </button>
                  <button onClick={()=>createMissingParentStudents(alert.parent)} className="btn btn-red btn-sm">
                    Loo / seo õpilane
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(360px,1fr))',gap:16}}>
        {parentRows.map(row=>(
          <div key={row.parent.id} className="card" style={{padding:20,display:'flex',flexDirection:'column',gap:14,border:row.parent.parentNextContactAt===today()?'1px solid #C9882A':'1px solid rgba(28,43,58,.07)'}}>
            <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start'}}>
              <div>
                <h2 style={{fontSize:'1.15rem',marginBottom:4}}>{row.parent.displayName||noData}</h2>
                <div style={{fontSize:'.82rem',color:'#42536A'}}>{row.parent.email||noData}</div>
                <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Lisatud: {row.parent.createdAt||noData}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                <span className="badge" style={{background:row.linkedChildren.length?'#dcfce7':'#fee2e2',color:row.linkedChildren.length?'#166534':'#991b1b'}}>
                  {row.linkedChildren.length?`${row.linkedChildren.length} kirjet`:'sidumata'}
                </span>
                <span className="badge" style={{
                  background:(parentStatusMeta[row.parent.parentContactStatus||'new']||parentStatusMeta.new).bg,
                  color:(parentStatusMeta[row.parent.parentContactStatus||'new']||parentStatusMeta.new).c
                }}>
                  {(parentStatusMeta[row.parent.parentContactStatus||'new']||parentStatusMeta.new).t}
                </span>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <label style={{fontSize:'.76rem',fontWeight:800,color:'#42536A'}}>
                Kontakti staatus
                <select defaultValue={row.parent.parentContactStatus||'new'} onChange={e=>updateParent(row.parent,{parentContactStatus:e.target.value})}>
                  {Object.entries(parentStatusMeta).map(([key,meta])=><option key={key} value={key}>{meta.t}</option>)}
                </select>
              </label>
              <label style={{fontSize:'.76rem',fontWeight:800,color:'#42536A'}}>
                Suhtluskanal
                <select defaultValue={row.parent.parentContactChannel||'phone'} onChange={e=>updateParent(row.parent,{parentContactChannel:e.target.value})}>
                  <option value="phone">Telefon</option>
                  <option value="email">E-post</option>
                  <option value="whatsapp">WhatsApp</option>
                  <option value="telegram">Telegram</option>
                  <option value="other">Muu</option>
                </select>
              </label>
              <label style={{fontSize:'.76rem',fontWeight:800,color:'#42536A'}}>
                Järgmine kontakt
                <input type="date" defaultValue={row.parent.parentNextContactAt||''} onBlur={e=>updateParent(row.parent,{parentNextContactAt:e.target.value})}/>
              </label>
              <label style={{fontSize:'.76rem',fontWeight:800,color:'#42536A'}}>
                Vastutaja
                <input defaultValue={row.parent.parentContactOwner||''} placeholder="Kes suhtleb?" onBlur={e=>updateParent(row.parent,{parentContactOwner:e.target.value})}/>
              </label>
            </div>

            <div>
              <div style={{fontSize:'.72rem',fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',color:'#42536A',marginBottom:8}}>Lapsed</div>
              {row.childGroups.length===0&&(
                <div style={{padding:12,borderRadius:12,background:'#fff7f7',border:'1px solid #fecaca',color:'#991b1b',fontWeight:800}}>
                  Нет данных
                  {row.rawNames.length>0&&<div style={{fontSize:'.78rem',fontWeight:600,marginTop:4}}>Registreerimisel sisestatud: {row.rawNames.join(', ')}</div>}
                </div>
              )}
              {row.childGroups.map(child=>(
                <div key={normalizeText(child.name)||child.items[0]?.id} style={{border:'1px solid #e5e7eb',borderRadius:12,padding:10,marginBottom:8}}>
                  <div style={{fontWeight:800,marginBottom:7}}>{child.name||noData}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {child.items.map(student=>(
                      <div key={student.id} style={{display:'grid',gridTemplateColumns:'1.1fr .8fr .9fr auto',gap:8,alignItems:'center',fontSize:'.8rem',color:'#42536A'}}>
                        <span>{student.subject||noData}</span>
                        <span>{student.level||'—'} → {student.targetLevel||'—'}</span>
                        <span>{student.teacher||noData}</span>
                        <button onClick={()=>openStudent(student)} className="btn btn-ghost btn-sm">Ava</button>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:'.82rem',color:'#42536A'}}>
              <div><strong>Telefon:</strong><br/>{row.parent.phone||row.parent.parentPhone||noData}</div>
              <div><strong>Ootel arved:</strong><br/>{row.unpaid.length?`${row.unpaid.reduce((a,inv)=>a+(parseFloat(inv.amount)||0),0)} €`:'0 €'}</div>
            </div>
            <textarea defaultValue={row.parent.parentContactNotes||''} placeholder="Mida lapsevanem ütles, millal tagasi helistada, kokkulepped..." onBlur={e=>updateParent(row.parent,{parentContactNotes:e.target.value})} style={{minHeight:74}}/>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {(row.parent.phone||row.parent.parentPhone)&&<a className="btn btn-ghost btn-sm" href={`tel:${row.parent.phone||row.parent.parentPhone}`}><i className="fa-solid fa-phone"/> Helista</a>}
              {row.parent.email&&<a className="btn btn-ghost btn-sm" href={`mailto:${row.parent.email}`}><i className="fa-solid fa-envelope"/> E-post</a>}
              {isAdmin&&row.rawNames.length>0&&row.linkedChildren.length===0&&(
                <button onClick={()=>createMissingParentStudents(row.parent)} className="btn btn-red btn-sm">
                  Loo / seo õpilane
                </button>
              )}
            </div>
          </div>
        ))}
        {parentRows.length===0&&(
          <div className="card" style={{gridColumn:'1/-1',padding:32,textAlign:'center',color:'#42536A'}}>
            Lapsevanemaid ei leitud.
          </div>
        )}
      </div>
    </div>
  );
}

// ── ÕPILASTE ANDMEBAAS ───────────────────────────────────────
function StudentsDatabaseView({
  filteredStudents,lessons,invoices,isAdmin,search,setSearch,stuFilter,setStuFilter,
  groupFilter,setGroupFilter,groupOptions,contactFilter,setContactFilter,studentSort,setStudentSort,openStudent,setEditStu,user,
  nName,setNName,nParentName,setNParentName,nEmail,setNEmail,nPhone,setNPhone,nLevel,setNLevel,nTarget,setNTarget,
  nSubject,setNSubject,nGrade,setNGrade,nGroup,setNGroup,nPkg,setNPkg,nTeach,setNTeach,addStudent
}) {
  const [showAddForm,setShowAddForm] = React.useState(false);
  const [groupMode,setGroupMode] = React.useState('table');
  const [teacherFocus,setTeacherFocus] = React.useState('');
  const teacherScope = canonicalTeacherName(user?.displayName);
  const NoData = ({inline=false}) => (
    <span style={{
      display:inline?'inline-flex':'flex',alignItems:'center',justifyContent:'center',
      minHeight:inline?24:34,padding:inline?'3px 8px':'7px 10px',borderRadius:10,
      background:'#fee2e2',border:'1px solid #fecaca',color:'#991b1b',
      fontWeight:800,fontSize:inline?'.72rem':'.78rem',boxShadow:'0 0 0 3px rgba(239,68,68,.08)'
    }}>Нет данных</span>
  );
  const teacherStudents = React.useMemo(()=>{
    if(!teacherFocus) return [];
    return filteredStudents.filter(s=>canonicalTeacherName(s.teacher)===teacherFocus);
  },[filteredStudents,teacherFocus]);
  const groupedStudents = React.useMemo(()=>{
    const titleFor = student => {
      if(groupMode==='group') return student.group || 'Grupita';
      if(groupMode==='level') return `${student.level||'Tase puudub'} → ${student.targetLevel||'Siht puudub'}`;
      if(groupMode==='subject') return student.subject || 'Õppeaine puudub';
      if(groupMode==='teacher') return student.teacher || 'Õpetaja puudub';
      return 'Kõik õpilased';
    };
    return Object.entries(filteredStudents.reduce((acc,student)=>{
      const title = titleFor(student);
      if(!acc[title]) acc[title]=[];
      acc[title].push(student);
      return acc;
    },{})).sort((a,b)=>a[0].localeCompare(b[0],'et'));
  },[filteredStudents,groupMode]);
  const contactMeta = {
    new:{bg:'#dbeafe',c:'#1d4ed8',t:'Uus'},
    contacted:{bg:'#fef3c7',c:'#92400e',t:'Võetud ühendust'},
    waiting:{bg:'#fee2e2',c:'#991b1b',t:'Ootab vastust'},
    scheduled:{bg:'#ede9fe',c:'#6d28d9',t:'Tund kokku lepitud'},
    active:{bg:'#dcfce7',c:'#166534',t:'Aktiivne õpilane'}
  };
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:'1.7rem'}}>Õpilaste andmebaas</h1>
          <div style={{fontSize:'.9rem',color:'#42536A',marginTop:4}}>
            Tabelivaade kiireks otsimiseks, filtreerimiseks ja profiili muutmiseks.
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
          <button onClick={()=>setShowAddForm(v=>!v)} className="btn btn-pine">
            <i className="fa-solid fa-user-plus"/> Lisa õpilane
          </button>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Otsi nime, õpetajat, e-posti…" style={{width:280,padding:'9px 14px'}}/>
          <select value={studentSort} onChange={e=>setStudentSort(e.target.value)} style={{width:'auto'}}>
            <option value="name_asc">Sort: nimi A-Z</option>
            <option value="name_desc">Sort: nimi Z-A</option>
            <option value="level_asc">Sort: tase A1-C1</option>
            <option value="level_desc">Sort: tase C1-A1</option>
            <option value="subject_asc">Sort: õppeaine</option>
            <option value="group_asc">Sort: grupp</option>
            <option value="teacher_asc">Sort: õpetaja</option>
          </select>
          <select value={groupMode} onChange={e=>setGroupMode(e.target.value)} style={{width:'auto'}}>
            <option value="table">Vaade: tabel</option>
            <option value="group">Vaade: grupid</option>
            <option value="level">Vaade: tasemed</option>
            <option value="subject">Vaade: õppeained</option>
            <option value="teacher">Vaade: õpetajad</option>
          </select>
          <select value={groupFilter} onChange={e=>setGroupFilter(e.target.value)} style={{width:'auto'}}>
            <option value="all">Kõik grupid</option>
            {groupOptions.map(group=><option key={group} value={group}>{group}</option>)}
          </select>
          <select value={contactFilter} onChange={e=>setContactFilter(e.target.value)} style={{width:'auto'}}>
            <option value="all">Kõik kontaktid</option>
            {CONTACT_STATUSES.map(status=><option key={status.id} value={status.id}>{status.label}</option>)}
          </select>
          <select value={stuFilter} onChange={e=>setStuFilter(e.target.value)} style={{width:'auto'}}>
            <option value="active">Aktiivsed</option>
            <option value="all">Kõik</option>
            <option value="inactive">Arhiveeritud</option>
          </select>
        </div>
      </div>

      {showAddForm&&(
        <div className="card" style={{padding:24}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,marginBottom:16,flexWrap:'wrap'}}>
            <h3>➕ Lisa uus õpilane</h3>
            <div style={{fontSize:'.82rem',color:'#42536A'}}>Siin lisatud õpilane ilmub kohe valitud õpetaja nimekirja.</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(185px,1fr))',gap:10,marginBottom:12}}>
            <input value={nName} onChange={e=>setNName(e.target.value)} placeholder="Lapse nimi *"/>
            <input value={nParentName} onChange={e=>setNParentName(e.target.value)} placeholder="Vanema nimi"/>
            <input value={nEmail} onChange={e=>setNEmail(e.target.value)} type="email" placeholder="E-post"/>
            <input value={nPhone} onChange={e=>setNPhone(e.target.value)} placeholder="Telefon +372…"/>
            <select value={nLevel} onChange={e=>setNLevel(e.target.value)}>{LEVELS.map(l=><option key={l} value={l}>Tase: {l}</option>)}</select>
            <select value={nTarget} onChange={e=>setNTarget(e.target.value)}>{LEVELS.slice(1).map(l=><option key={l} value={l}>Siht: {l}</option>)}</select>
            <select value={nSubject} onChange={e=>setNSubject(e.target.value)}>
              {SUBJECTS.map(subject=><option key={subject} value={subject}>{subject}</option>)}
            </select>
            <select value={nGrade} onChange={e=>setNGrade(e.target.value)}>
              <option value="">Klass / vanus (valikuline)</option>
              {GRADES.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
            <select value={nGroup} onChange={e=>setNGroup(e.target.value)}>
              <option value="">Grupp: määramata</option>
              {groupOptions.map(group=><option key={group} value={group}>{group}</option>)}
            </select>
            <input value={nPkg} onChange={e=>setNPkg(e.target.value)} type="number" placeholder="Paketi maht (nt. 10)"/>
            {(isAdmin||user?.role==='admin')
              ? <select value={nTeach} onChange={e=>setNTeach(e.target.value)}>{TEACHERS.map(t=><option key={t} value={t}>Õp: {t}</option>)}</select>
              : <input value={nTeach} readOnly style={{opacity:.7}}/>
            }
          </div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button onClick={addStudent} className="btn btn-pine">
              <i className="fa-solid fa-user-plus"/> Lisa õpilane
            </button>
            <button onClick={()=>setShowAddForm(false)} className="btn btn-ghost">Sulge</button>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12}}>
        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Õpilasi kokku</div>
          <div style={{fontSize:'1.6rem',fontWeight:700,marginTop:8}}>{filteredStudents.length}</div>
        </div>
        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Aktiivsed</div>
          <div style={{fontSize:'1.6rem',fontWeight:700,marginTop:8,color:'#2F5D50'}}>{filteredStudents.filter(s=>s.active!==false).length}</div>
        </div>
        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Paketid lõppemas</div>
          <div style={{fontSize:'1.6rem',fontWeight:700,marginTop:8,color:'#C9882A'}}>{filteredStudents.filter(s=>(s.packageTotal||0)>0&&pkgLeft(s)<=3).length}</div>
        </div>
        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Tasumata arved</div>
          <div style={{fontSize:'1.6rem',fontWeight:700,marginTop:8,color:'#991b1b'}}>{invoices.filter(i=>i.status==='Ootel').length}</div>
        </div>
      </div>

      {teacherFocus&&(
        <div className="card" style={{padding:20,border:'1px solid rgba(47,93,80,.2)'}}>
          <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em'}}>Õpetaja õpilased</div>
              <h3 style={{marginTop:4}}>{teacherFocus}</h3>
            </div>
            <button onClick={()=>setTeacherFocus('')} className="btn btn-ghost btn-sm">Sulge</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:10}}>
            {teacherStudents.map(student=>(
              <button key={student.id} onClick={()=>openStudent(student)} style={{textAlign:'left',background:'#fff',border:'1px solid rgba(28,43,58,.1)',borderRadius:12,padding:12,cursor:'pointer'}}>
                <div style={{fontWeight:800,color:'#1C2B3A'}}>{student.name||<NoData inline/>}</div>
                <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>{student.subject||'—'} · {student.level||'—'} → {student.targetLevel||'—'}</div>
                <div style={{fontSize:'.74rem',color:'#42536A',marginTop:4}}>Grupp: {student.group||'—'}</div>
              </button>
            ))}
            {teacherStudents.length===0&&<NoData/>}
          </div>
        </div>
      )}

      {groupMode!=='table'&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}}>
          {groupedStudents.map(([title,items])=>(
            <div key={title} className="card" style={{padding:18}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:12}}>
                <div>
                  <h3 style={{fontSize:'1.05rem'}}>{title}</h3>
                  <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>{items.length} õpilast</div>
                </div>
                <span className="badge" style={{background:'rgba(47,93,80,.12)',color:'#2F5D50'}}>{items.length}</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {items.map(student=>(
                  <div key={student.id} style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,alignItems:'center',padding:12,border:'1px solid rgba(28,43,58,.08)',borderRadius:12,background:'#fff'}}>
                    <div style={{minWidth:0}}>
                      <div style={{fontWeight:800,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{student.name||<NoData inline/>}</div>
                      <div style={{fontSize:'.75rem',color:'#42536A',marginTop:4}}>
                        {student.parentName ? `Vanem: ${student.parentName}` : <NoData inline/>}
                      </div>
                      <div style={{fontSize:'.75rem',color:'#42536A',marginTop:4}}>
                        {student.subject||'—'} · {student.level||'—'} → {student.targetLevel||'—'} · {student.group||'—'}
                      </div>
                      <button onClick={()=>setTeacherFocus(canonicalTeacherName(student.teacher||''))} style={{marginTop:6,background:'none',border:'none',padding:0,cursor:'pointer',color:'#2F5D50',fontWeight:700,fontSize:'.76rem'}}>
                        {student.teacher||'Õpetaja puudub'}
                      </button>
                    </div>
                    <button onClick={()=>openStudent(student)} className="btn btn-ghost btn-sm">Ava</button>
                  </div>
                ))}
              </div>
            </div>
          ))}
          {groupedStudents.length===0&&<div className="card" style={{padding:24}}><NoData/></div>}
        </div>
      )}

      {groupMode==='table'&&<div className="card scroll" style={{padding:0,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}} className="scroll">
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:1180}}>
            <thead>
              <tr style={{background:'#F9F8F6',borderBottom:'1px solid rgba(28,43,58,.08)'}}>
                {['Õpilane','Kontakt','Kontaktistaatus','Õpe','Grupp','Õpetaja','Paketid','Tunnid','Arved','Staatus','Tegevused'].map(head=>(
                  <th key={head} style={{textAlign:'left',padding:'14px 16px',fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em'}}>
                    {head}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filteredStudents.map(student=>{
                const studentLessons = lessons.filter(l=>{
                  const matchesStudent = l.studentId===student.id || normalizeText(l.studentName)===normalizeText(student.name);
                  if(!matchesStudent) return false;
                  if(isAdmin) return true;
                  return canonicalTeacherName(l.teacher)===teacherScope;
                });
                const completedLessons = studentLessons.filter(l=>l.status==='Toimunud');
                const unpaidInvoices = invoices.filter(i=>i.studentId===student.id&&i.status==='Ootel');
                const remaining = pkgLeft(student);
                const avgGrade = completedLessons.length ? avg(completedLessons.map(l=>l.grade)) : '—';
                const lastLesson = [...studentLessons].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
                const contact = contactMeta[student.contactStatus||'new'] || contactMeta.new;
                const statusBadge = student.active===false
                  ? {bg:'#f3f4f6',c:'#6b7280',t:'Arhiveeritud'}
                  : remaining<=2 && (student.packageTotal||0)>0
                    ? {bg:'#fef3c7',c:'#92400e',t:'Jääk madal'}
                    : {bg:'#dcfce7',c:'#166534',t:'Aktiivne'};

                return(
                  <tr key={student.id} style={{borderBottom:'1px solid rgba(28,43,58,.06)',background:student.active===false?'rgba(243,244,246,.45)':'#fff'}}>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700}}>{student.name||<NoData inline/>}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        Vanem: {student.parentName||<NoData inline/>}
                      </div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {student.grade||<NoData inline/>}{student.subject&&<span> · {student.subject}</span>}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top',fontSize:'.84rem',color:'#42536A'}}>
                      <div>{student.email||<NoData inline/>}</div>
                      <div style={{marginTop:4}}>{student.phone||<NoData inline/>}</div>
                      {(student.email||student.phone)&&(
                        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>
                          {student.phone&&<a href={`tel:${student.phone}`} className="btn btn-ghost btn-sm">Helista</a>}
                          {student.email&&<a href={`mailto:${student.email}`} className="btn btn-ghost btn-sm">E-post</a>}
                        </div>
                      )}
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <span className="badge" style={{background:contact.bg,color:contact.c}}>
                        {contact.t}
                      </span>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:8}}>
                        {student.contactOwner?`Vastutaja: ${student.contactOwner}`:'Vastutaja puudub'}
                      </div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {student.contactLastAt?`Viimane kontakt: ${fmtDate(student.contactLastAt)}`:'Kontakti veel pole'}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:600}}>{student.level||<NoData inline/>} → {student.targetLevel||<NoData inline/>}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>{levelPct(student.level,student.targetLevel)}% eesmärgini</div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:600}}>{student.group||<NoData inline/>}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>{student.group?'Õppegrupp':'Määramata'}</div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      {student.teacher
                        ? <button onClick={()=>setTeacherFocus(canonicalTeacherName(student.teacher))} style={{background:'none',border:'none',padding:0,cursor:'pointer',fontWeight:700,color:'#2F5D50',textAlign:'left'}}>
                            {student.teacher}
                          </button>
                        : <NoData inline/>
                      }
                      {isAdmin&&lastLesson?.teacher&&<div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Viimane tund: {lastLesson.teacher}</div>}
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700,color:remaining<=2&&student.packageTotal>0?'#b45309':'#1C2B3A'}}>
                        {remaining}/{student.packageTotal||0}
                      </div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Kasutatud: {student.packageUsed||0}</div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700}}>{completedLessons.length}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Keskmine: {avgGrade==='—'?'—':avgGrade+'★'}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {lastLesson?.date ? `Viimane: ${fmtDate(lastLesson.date)}` : 'Veel pole'}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700,color:unpaidInvoices.length?'#991b1b':'#1C2B3A'}}>{unpaidInvoices.length}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {unpaidInvoices.length ? unpaidInvoices.reduce((sum,inv)=>sum+(inv.amount||0),0)+' € ootel' : 'Kõik makstud'}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <span className="badge" style={{background:statusBadge.bg,color:statusBadge.c}}>
                        {statusBadge.t}
                      </span>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                        <button onClick={()=>openStudent(student)} className="btn btn-ghost btn-sm">Ava</button>
                        <button onClick={()=>setEditStu(student)} className="btn btn-dark btn-sm">Muuda</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
              {filteredStudents.length===0&&(
                <tr>
                  <td colSpan="11" style={{textAlign:'center',padding:'40px 20px',color:'#42536A'}}>
                    {search?`"${search}" ei leitud`:'Õpilasi pole veel lisatud.'}
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
      }
    </div>
  );
}

// ── GRUPID ────────────────────────────────────────────────────
function GroupsView({groups,students,isAdmin,setSelStu,setTab,addGroup,deleteGroup,addGroupLesson,deleteGroupLesson,toggleGroupStudent,toggleGroupStudentLesson}) {
  const [showForm,setShowForm] = React.useState(false);
  const [groupName,setGroupName] = React.useState('');
  const [groupTeacher,setGroupTeacher] = React.useState('Pavel');
  const [groupSubject,setGroupSubject] = React.useState('Eesti keel');
  const [groupLevel,setGroupLevel] = React.useState('A1');
  const [lessonDrafts,setLessonDrafts] = React.useState({});
  const [studentSearch,setStudentSearch] = React.useState('');

  const activeStudents = React.useMemo(()=>students.filter(s=>s.active!==false),[students]);
  const visibleGroups = React.useMemo(()=>
    [...(groups||[])].sort((a,b)=>(a.name||'').localeCompare(b.name||'','et'))
  ,[groups]);

  const createGroup = async()=>{
    const ok = await addGroup({
      name:groupName,
      teacher:groupTeacher,
      subject:groupSubject,
      level:groupLevel
    });
    if(ok){
      setGroupName('');
      setGroupTeacher('Pavel');
      setGroupSubject('Eesti keel');
      setGroupLevel('A1');
      setShowForm(false);
    }
  };

  const setDraft = (groupId, patch)=>{
    setLessonDrafts(prev=>({
      ...prev,
      [groupId]: {
        day: 'Mon',
        time: '16:00',
        startDate: today(),
        ...(prev[groupId]||{}),
        ...patch
      }
    }));
  };

  const submitGroupLesson = async(group)=>{
    const draft = {day:'Mon',time:'16:00',startDate:today(),...(lessonDrafts[group.id]||{})};
    await addGroupLesson(group,draft);
    setLessonDrafts(prev=>({...prev,[group.id]:{day:'Mon',time:'16:00',startDate:today()}}));
  };

  const dayLabel = day=>{
    const idx = DAYS_ID.indexOf(day);
    return idx>=0 ? DAYS_FULL[idx] : day;
  };
  const shortDayLabel = day=>{
    const idx = DAYS_ID.indexOf(day);
    return idx>=0 ? DAYS_SHORT[idx] : day;
  };
  const groupLessonIds = group=>(group.lessons||[]).map(lesson=>lesson.id);
  const assignedLessonIds = (group,studentId)=>{
    const saved = group.studentLessonMap?.[studentId];
    return Array.isArray(saved) ? saved : groupLessonIds(group);
  };
  const attendsGroupLesson = (group,studentId,lessonId)=>assignedLessonIds(group,studentId).includes(lessonId);

  const openStudent = student=>{
    setSelStu(student);
    setTab('students');
  };

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontSize:'1.7rem'}}>Grupid</h1>
          <div style={{fontSize:'.9rem',color:'#42536A',marginTop:4}}>
            Eraldi grupid: koosseis, õpetaja ja iganädalane tunniplaan.
          </div>
        </div>
        {isAdmin&&(
          <button onClick={()=>setShowForm(v=>!v)} className="btn btn-pine">
            <i className="fa-solid fa-plus"/> Lisa grupp
          </button>
        )}
      </div>

      {showForm&&isAdmin&&(
        <div className="card" style={{padding:22}}>
          <div style={{fontSize:'.78rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>
            Uus grupp
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
            <input value={groupName} onChange={e=>setGroupName(e.target.value)} placeholder="Grupi nimi *"/>
            <select value={groupTeacher} onChange={e=>setGroupTeacher(e.target.value)}>
              {TEACHERS.map(t=><option key={t}>{t}</option>)}
            </select>
            <select value={groupSubject} onChange={e=>setGroupSubject(e.target.value)}>
              {SUBJECTS.map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={groupLevel} onChange={e=>setGroupLevel(e.target.value)}>
              {LEVELS.map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
          <button onClick={createGroup} className="btn btn-pine" style={{width:'100%',marginTop:12}}>
            Salvesta grupp
          </button>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(360px,1fr))',gap:16}}>
        {visibleGroups.map(group=>{
          const memberIds = new Set(group.students||[]);
          const members = activeStudents.filter(student=>memberIds.has(student.id));
          const available = activeStudents
            .filter(student=>!memberIds.has(student.id))
            .filter(student=>{
              const q = normalizeText(studentSearch);
              if(!q) return true;
              return normalizeText(student.name).includes(q) || normalizeText(student.email).includes(q) || normalizeText(student.group).includes(q);
            })
            .slice(0,12);
          const draft = {day:'Mon',time:'16:00',startDate:today(),...(lessonDrafts[group.id]||{})};
          return(
            <div key={group.id} className="card" style={{padding:22,display:'flex',flexDirection:'column',gap:16}}>
              <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'flex-start'}}>
                <div>
                  <h2 style={{fontSize:'1.16rem'}}>{group.name}</h2>
                  <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                    {members.length} õpilast · {group.teacher||'Õpetaja määramata'} · {group.subject||'Õppeaine määramata'} · {group.level||'Tase määramata'}
                  </div>
                </div>
                {isAdmin&&<button onClick={()=>deleteGroup(group)} className="btn btn-red btn-sm">Kustuta</button>}
              </div>

              <div>
                <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>
                  Tunniajad
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:7}}>
                  {(group.lessons||[]).length===0&&<div style={{fontSize:'.84rem',color:'#42536A'}}>Tunde pole veel lisatud.</div>}
                  {(group.lessons||[]).map(lesson=>(
                    <div key={lesson.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,padding:'9px 11px',borderRadius:10,background:'#F9F8F6',border:'1px solid rgba(28,43,58,.08)'}}>
                      <div>
                        <div style={{fontWeight:650,fontSize:'.86rem'}}>{dayLabel(lesson.day)} · {lesson.time}</div>
                        <div style={{fontSize:'.72rem',color:'#42536A'}}>alates {fmtDate(lesson.startDate)} · kordub igal nädalal</div>
                      </div>
                      {isAdmin&&<button onClick={()=>deleteGroupLesson(group,lesson.id)} className="btn btn-ghost btn-sm">Eemalda</button>}
                    </div>
                  ))}
                </div>
                {isAdmin&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:8,marginTop:10}}>
                    <select value={draft.day} onChange={e=>setDraft(group.id,{day:e.target.value})}>
                      {DAYS_ID.map((day,i)=><option key={day} value={day}>{DAYS_FULL[i]}</option>)}
                    </select>
                    <select value={draft.time} onChange={e=>setDraft(group.id,{time:e.target.value})}>
                      {TIMES.map(t=><option key={t}>{t}</option>)}
                    </select>
                    <input type="date" value={draft.startDate} onChange={e=>setDraft(group.id,{startDate:e.target.value})}/>
                    <button onClick={()=>submitGroupLesson(group)} className="btn btn-amber btn-sm">Lisa aeg</button>
                  </div>
                )}
              </div>

              <div>
                <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>
                  Grupi õpilased
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {members.length===0&&<div style={{fontSize:'.84rem',color:'#42536A'}}>Õpilasi pole veel lisatud.</div>}
                  {members.map(student=>(
                    <div key={student.id} style={{display:'flex',flexDirection:'column',gap:8,padding:'9px 11px',borderRadius:10,border:'1px solid rgba(28,43,58,.08)',background:'#fff'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                        <button onClick={()=>openStudent(student)} style={{border:'none',background:'transparent',padding:0,cursor:'pointer',textAlign:'left',fontWeight:650,color:'#1C2B3A'}}>
                          {student.name}
                        </button>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <span style={{fontSize:'.76rem',color:'#42536A'}}>{student.level} → {student.targetLevel}</span>
                          {isAdmin&&<button onClick={()=>toggleGroupStudent(group,student,false)} className="btn btn-ghost btn-sm">Eemalda</button>}
                        </div>
                      </div>
                      {isAdmin&&(group.lessons||[]).length>0&&(
                        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                          {(group.lessons||[]).map(lesson=>{
                            const checked = attendsGroupLesson(group,student.id,lesson.id);
                            return(
                              <label key={lesson.id} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'5px 8px',borderRadius:999,border:`1px solid ${checked?'rgba(47,93,80,.28)':'rgba(28,43,58,.12)'}`,background:checked?'rgba(47,93,80,.08)':'#F9F8F6',fontSize:'.72rem',fontWeight:700,color:checked?'#2F5D50':'#42536A',cursor:'pointer'}}>
                                <input type="checkbox" checked={checked} onChange={e=>toggleGroupStudentLesson(group,student,lesson,e.target.checked)} style={{width:14,height:14}}/>
                                {shortDayLabel(lesson.day)} {lesson.time}
                              </label>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              {isAdmin&&(
                <div>
                  <div style={{fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>
                    Lisa õpilane gruppi
                  </div>
                  <input value={studentSearch} onChange={e=>setStudentSearch(e.target.value)} placeholder="Otsi õpilast..." style={{marginBottom:8}}/>
                  <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:220,overflowY:'auto'}} className="scroll">
                    {available.map(student=>(
                      <button key={student.id} onClick={()=>toggleGroupStudent(group,student,true)}
                        style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,padding:'9px 11px',borderRadius:10,border:'1px solid rgba(28,43,58,.08)',background:'#F9F8F6',cursor:'pointer',textAlign:'left'}}>
                        <span style={{fontWeight:650,color:'#1C2B3A'}}>{student.name}</span>
                        <span style={{fontSize:'.76rem',color:'#42536A'}}>Lisa</span>
                      </button>
                    ))}
                    {available.length===0&&<div style={{fontSize:'.84rem',color:'#42536A',padding:'8px 0'}}>Sobivaid õpilasi ei leitud.</div>}
                  </div>
                </div>
              )}
            </div>
          );
        })}

        {visibleGroups.length===0&&(
          <div className="card" style={{gridColumn:'1/-1',padding:42,textAlign:'center',color:'#42536A'}}>
            Gruppe pole veel lisatud. Vajuta “Lisa grupp”, määra tunniajad ja lisa õpilased.
          </div>
        )}
      </div>
    </div>
  );
}

// ── ÕPILASE KAART ─────────────────────────────────────────────
function StudentCard({user,currentStu,stuLessons,stuHw,stuInv,isAdmin,setSelStu,setEditStu,toggleStudentActive,convertStudentToParent,
  hwTask,setHwTask,hwDue,setHwDue,hwFile,setHwFile,addHw,toggleHw,deleteHw,removeHwFile,
  invAmt,setInvAmt,invDesc,setInvDesc,addInvoice,markPaid,unmarkPaid,deleteInvoice,printInvoice,submitParentPayment,resetParentPayment,deleteLesson,openLessonEditor,
  schDate,setSchDate,schTime,setSchTime,schTeach,setSchTeach,schRecurring,setSchRecurring,addStudentSchedule,canAssignTeacher,
  stuMessages,teacherMessage,setTeacherMessage,sendTeacherMessage}) {
  if(!currentStu) return <div style={{textAlign:'center',padding:60,color:'#42536A'}}>Õpilane ei leitud.</div>;
  const done=stuLessons.filter(l=>l.status==='Toimunud');
  const pct=levelPct(currentStu.level,currentStu.targetLevel);
  const rem=pkgLeft(currentStu);
  const attendance=stuLessons.length?Math.round(done.length/stuLessons.length*100):0;
  const canManage = user.role==='teacher' || user.role==='admin';
  const [paymentChoices,setPaymentChoices] = React.useState({});
  const [copiedPaymentKey,setCopiedPaymentKey] = React.useState('');

  const copyPaymentValue = async(key,value)=>{
    const ok = await copyText(value);
    if(!ok) return;
    setCopiedPaymentKey(key);
    setTimeout(()=>setCopiedPaymentKey(''),1600);
  };

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div className="card" style={{padding:24}}>
        <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:14}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
              <h2 style={{fontSize:'1.5rem'}}>{currentStu.name}</h2>
              {currentStu.active===false&&<span className="badge" style={{background:'#f3f4f6',color:'#6b7280'}}>Arhiveeritud</span>}
            </div>
            <div style={{fontSize:'.85rem',color:'#42536A',marginBottom:12}}>
              Õpetaja: <strong>{currentStu.teacher}</strong>
              {currentStu.email&&<> · {currentStu.email}</>}
              {currentStu.phone&&<> · {currentStu.phone}</>}
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
              {[{l:'Hinne',v:avg(done.map(l=>l.grade))+'★',c:'#C9882A',bg:'rgba(201,136,42,.08)'},
                {l:'Kohalolu',v:attendance+'%',c:'#2F5D50',bg:'rgba(47,93,80,.08)'},
                {l:'Tunnid',v:done.length,c:'#1C2B3A',bg:'rgba(28,43,58,.05)'}].map(x=>(
                <div key={x.l} style={{borderRadius:10,padding:'10px 16px',textAlign:'center',background:x.bg,minWidth:80}}>
                  <div style={{fontWeight:700,fontSize:'1.2rem',color:x.c}}>{x.v}</div>
                  <div style={{fontSize:'.72rem',color:'#42536A'}}>{x.l}</div>
                </div>
              ))}
              {currentStu.packageTotal>0&&(
                <div style={{borderRadius:10,padding:'10px 16px',textAlign:'center',minWidth:80,
                  background:rem<=2?'#fee2e2':rem<=5?'#fef3c7':'rgba(47,93,80,.08)'}}>
                  <div style={{fontWeight:700,fontSize:'1.2rem',color:rem<=2?'#dc2626':rem<=5?'#d97706':'#2F5D50'}}>{rem}</div>
                  <div style={{fontSize:'.72rem',color:'#42536A'}}>Jäänud tunde</div>
                </div>
              )}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'.78rem',fontWeight:600,marginBottom:6}}>
              <span>{currentStu.level}</span><span style={{color:'#2F5D50'}}>{pct}% eesmärgini</span><span>{currentStu.targetLevel}</span>
            </div>
            <div className="level-bar"><div className="level-fill" style={{width:pct+'%'}}/></div>
          </div>
          {canManage&&(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <button onClick={()=>setSelStu(null)} className="btn btn-ghost btn-sm">← Tagasi</button>
              <button onClick={()=>setEditStu(currentStu)} className="btn btn-dark btn-sm">✏️ Muuda profiili</button>
              {isAdmin&&(
                <button onClick={()=>convertStudentToParent(currentStu)} className="btn btn-amber btn-sm">
                  <i className="fa-solid fa-user-shield"/> Tee lapsevanemaks
                </button>
              )}
              <button onClick={()=>toggleStudentActive(currentStu.id,currentStu.active!==false)}
                className={`btn btn-sm ${currentStu.active===false?'btn-pine':'btn-red'}`}>
                {currentStu.active===false?'Aktiveeri':'Arhiveeri'}
              </button>
            </div>
          )}
        </div>
      </div>

      {done.length>=2&&(
        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>📈 Progressi kõver</h3>
          <ProgressChart data={done}/>
        </div>
      )}

      <div className="card" style={{padding:24}}>
        <h3 style={{marginBottom:14}}>✉️ Vestlus</h3>
        <div style={{fontSize:'.84rem',color:'#42536A',marginBottom:12}}>
          {!canManage
            ? <>Sõnum läheb õpetajale: <strong>{currentStu.teacher||'määramata'}</strong></>
            : <>Vastus läheb perele/õpilasele: <strong>{currentStu.name}</strong></>}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:260,overflowY:'auto',marginBottom:12}} className="scroll">
          {(!stuMessages||stuMessages.length===0)&&(
            <div style={{padding:'18px 14px',borderRadius:12,background:'#fff7f7',border:'1px solid #fecaca',color:'#991b1b',fontWeight:700,textAlign:'center'}}>
              Sõnumeid veel pole
            </div>
          )}
          {[...(stuMessages||[])].sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)).map(msg=>{
            const mine = msg.fromUid===user.uid;
            return(
              <div key={msg.id} style={{alignSelf:mine?'flex-end':'flex-start',maxWidth:'86%',padding:'12px 14px',borderRadius:14,
                background:mine?'#2F5D50':'#F9F8F6',color:mine?'#fff':'#1C2B3A',border:mine?'none':'1px solid rgba(28,43,58,.07)'}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:10,flexWrap:'wrap',marginBottom:5}}>
                  <strong style={{fontSize:'.82rem'}}>{msg.fromName||'Kasutaja'}</strong>
                  <span style={{fontSize:'.7rem',color:mine?'rgba(255,255,255,.7)':'#42536A'}}>{msg.createdAt?new Date(msg.createdAt).toLocaleString('et-EE'):'—'}</span>
                </div>
                <div style={{fontSize:'.86rem',whiteSpace:'pre-wrap',lineHeight:1.45}}>{msg.text}</div>
              </div>
            );
          })}
        </div>
        <textarea value={teacherMessage||''} onChange={e=>setTeacherMessage(e.target.value)}
          placeholder={canManage?'Kirjuta vastus perele või õpilasele...':'Kirjuta küsimus, puudumisinfo või muu oluline teade...'}
          style={{minHeight:92,resize:'vertical',marginBottom:10}}/>
        <button onClick={()=>sendTeacherMessage(currentStu,teacherMessage)} className="btn btn-pine">
          <i className="fa-solid fa-paper-plane"/> Saada sõnum
        </button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:20}}>
        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>📝 Kodutööd ({stuHw.length})</h3>
