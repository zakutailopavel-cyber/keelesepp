          <button onClick={save} disabled={saving||!sel.length||(isPicker&&!pickedLesson)}
            style={{padding:'8px 18px',borderRadius:9,border:'none',background:'#2F5D50',color:'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.82rem',opacity:(saving||!sel.length||(isPicker&&!pickedLesson))?.5:1}}>
            {saving?'Salvestab…':'✓ Määra'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── WORKSHEET PLAYER ───────────────────────────────────────────
function WorksheetPlayer({assignment, onClose, onSubmit, canAnnotate=false, canDismissAnnotations=false, notify}) {
  const ws = assignment.worksheetData;
  const blocks = ws?.blocks||[];
  const meta = ws?.meta||{};
  const [answers, setAnswers] = React.useState(assignment.answers||{});
  const [submitted, setSubmitted] = React.useState(assignment.status==='done');
  const [submitting, setSubmitting] = React.useState(false);
  const [score, setScore] = React.useState(assignment.score||null);
  const [showSelfAssess, setShowSelfAssess] = React.useState(false);
  const [selfDifficulty, setSelfDifficulty] = React.useState(null); // 1-5
  const [selfComment, setSelfComment] = React.useState('');
  const [selfSaving, setSelfSaving] = React.useState(false);
  const [selfSaved, setSelfSaved] = React.useState(!!(assignment.selfAssessment));
  const [annotations, setAnnotations] = React.useState(assignment.annotations||[]);
  const [annotationDraft, setAnnotationDraft] = React.useState(null);
  const [annotationView, setAnnotationView] = React.useState(null);
  const setAns = (k,v) => setAnswers(p=>({...p,[k]:v}));
  React.useEffect(()=>{
    setAnnotations(assignment.annotations||[]);
    if(assignment.status==='done'){
      setSubmitted(true);
      setAnswers(assignment.answers||{});
      setScore(assignment.score||null);
    }
    setSelfSaved(!!assignment.selfAssessment);
  },[assignment.id]);
  React.useEffect(()=>{
    if(!assignment.id) return;
    const unsub = db.collection('worksheetAssignments').doc(assignment.id).onSnapshot(doc=>{
      if(!doc.exists) return;
      const fresh = doc.data()||{};
      setAnnotations(fresh.annotations||[]);
      setSelfSaved(!!fresh.selfAssessment);
      if(fresh.status==='done'){
        setSubmitted(true);
        setAnswers(fresh.answers||{});
        setScore(fresh.score||null);
      }
    },err=>console.warn('Worksheet live update failed:',err));
    return unsub;
  },[assignment.id]);
  const annotationTools = window.AnnotationsManager||{};
  const annotationsForBlock = blockId => annotations.filter(a=>a.blockId===blockId);
  const splitAnnotatedText = (text, list) => {
    if(annotationTools.splitTextByAnnotations) return annotationTools.splitTextByAnnotations(text, list);
    const active = list.filter(a=>!a.dismissed).sort((a,b)=>a.start-b.start);
    const parts = []; let last = 0;
    active.forEach(annot=>{
      if(annot.start>=text.length) return;
      if(annot.start>last) parts.push({type:'text',text:text.slice(last,annot.start)});
      parts.push({type:'annot',text:text.slice(annot.start,Math.min(annot.end,text.length)),annot});
      last = Math.min(annot.end,text.length);
    });
    if(last<text.length) parts.push({type:'text',text:text.slice(last)});
    return parts;
  };
  const selectionRange = (container, selection) => {
    if(annotationTools.getSelectionRange) return annotationTools.getSelectionRange(container, selection);
    if(!selection || selection.isCollapsed) return null;
    const range = selection.getRangeAt(0);
    const preRange = document.createRange();
    preRange.selectNodeContents(container);
    preRange.setEnd(range.startContainer, range.startOffset);
    const start = preRange.toString().length;
    return {start,end:start+selection.toString().length,text:selection.toString()};
  };
  const selectionAnchor = (selection, event) => {
    try{
      if(selection && !selection.isCollapsed){
        const range = selection.getRangeAt(0);
        const rects = Array.from(range.getClientRects()).filter(r=>r.width||r.height);
        const rect = rects[rects.length-1] || range.getBoundingClientRect();
        if(rect && (rect.width || rect.height)){
          return {x:rect.left, y:rect.bottom};
        }
      }
    }catch(e){}
    return {x:event.clientX, y:event.clientY};
  };
  const localPopupAnchor = (container, anchor, width=310) => {
    const rect = container.getBoundingClientRect();
    return {
      x:Math.max(8, Math.min(anchor.x-rect.left, rect.width-width-8)),
      y:Math.max(8, anchor.y-rect.top+8)
    };
  };
  const localPopupPos = (x, y) => ({
    left:x,
    top:y
  });
  const makeAnnotation = (blockId,start,end,selectedText,parandus,selgitus) => {
    if(annotationTools.createAnnotation) return annotationTools.createAnnotation(blockId,start,end,selectedText,parandus,selgitus);
    return {id:Date.now()+'_'+Math.random().toString(36).slice(2,7),blockId,start,end,selectedText,parandus:parandus||'',selgitus:selgitus||'',createdAt:new Date().toISOString(),dismissed:false};
  };
  const closeAnnotationPopups = () => {
    setAnnotationDraft(null);
    setAnnotationView(null);
  };
  const openAnnotationDraft = (block, event) => {
    if(!canAnnotate || !submitted) return;
    const selection = window.getSelection();
    let range = null;
    try{ range = selectionRange(event.currentTarget, selection); }catch(e){ range = null; }
    if(!range || !range.text.trim()) return;
    const anchor = localPopupAnchor(event.currentTarget, selectionAnchor(selection, event));
    setAnnotationView(null);
    setAnnotationDraft({
      blockId:block.id,
      start:range.start,
      end:range.end,
      selectedText:range.text,
      parandus:'',
      selgitus:'',
      x:anchor.x,
      y:anchor.y
    });
  };
  const saveAnnotation = async() => {
    if(!annotationDraft) return;
    const annot = makeAnnotation(annotationDraft.blockId, annotationDraft.start, annotationDraft.end, annotationDraft.selectedText, annotationDraft.parandus, annotationDraft.selgitus);
    const next = [...annotations, annot];
    setAnnotations(next);
    setAnnotationDraft(null);
    try{
      await db.collection('worksheetAssignments').doc(assignment.id).update({annotations:next});
      notify&&notify('✓ Parandus salvestatud');
      window.getSelection&&window.getSelection().removeAllRanges();
    }catch(err){
      console.error('Annotation save failed:', err);
      setAnnotations(annotations);
      notify&&notify('⚠ Parandust ei salvestatud');
    }
  };
  const dismissAnnotation = async(annot) => {
    if(!annot) return;
    const next = annotations.map(a=>a.id===annot.id?{...a,dismissed:true,dismissedAt:new Date().toISOString()}:a);
    setAnnotations(next);
    setAnnotationView(null);
    try{
      await db.collection('worksheetAssignments').doc(assignment.id).update({annotations:next});
      notify&&notify('✓ Märgitud selgeks');
    }catch(err){
      console.error('Annotation dismiss failed:', err);
      setAnnotations(annotations);
      notify&&notify('⚠ Märget ei salvestatud');
    }
  };
  const parseFill = text => {
    const parts=[]; let bi=0;
    text.split(/\[([^\]]+)\]/g).forEach((c,i)=>{
      if(i%2===0) parts.push({t:'text',v:c});
      else parts.push({t:'blank',answer:c,idx:bi++});
    });
    return parts;
  };
  const calcScore = () => {
    let correct=0,total=0;
    blocks.forEach(b=>{
      if(b.type==='fill'){
        const parts=parseFill(b.text||''); let bi=0;
        parts.forEach(p=>{if(p.t==='blank'){total++;const ans=(answers[b.id+'_'+bi]||'').trim().toLowerCase();if(ans===p.answer.trim().toLowerCase())correct++;bi++;}});
      } else if(b.type==='choice'){
        (b.questions||[]).forEach((q,qi)=>{total++;if(answers[b.id+'_'+qi]===q.correct)correct++;});
      } else if(b.type==='match'){
        (b.pairs||[]).forEach((pair,pi)=>{total++;if(answers[b.id+'_'+pi]===pair.r)correct++;});
      }
    });
    return total>0?{correct,total,pct:Math.round(correct/total*100)}:null;
  };

  // Collect concrete errors for each auto-checkable block
  const calcErrorLog = () => {
    const errors = [];
    blocks.forEach(b=>{
      if(b.type==='fill'){
        const parts=parseFill(b.text||''); let bi=0;
        parts.forEach(p=>{
          if(p.t==='blank'){
            const ans=(answers[b.id+'_'+bi]||'').trim();
            if(ans.toLowerCase()!==p.answer.trim().toLowerCase()){
              errors.push({type:'fill', blockLabel:b.label||b.instruction||'Täida lünk',
                correct:p.answer, given:ans||'(tühi)'});
            }
            bi++;
          }
        });
      } else if(b.type==='choice'){
        (b.questions||[]).forEach((q,qi)=>{
          const sel=answers[b.id+'_'+qi];
          if(sel!==q.correct){
            errors.push({type:'choice', blockLabel:b.label||b.instruction||'Valikvastus',
              question:q.q, correct:q.opts?.[q.correct]||'', given:q.opts?.[sel]||'(vastamata)'});
          }
        });
      } else if(b.type==='match'){
        (b.pairs||[]).forEach((pair,pi)=>{
          const val=answers[b.id+'_'+pi]||'';
          if(val!==pair.r){
            errors.push({type:'match', blockLabel:b.label||b.instruction||'Sobita',
              correct:pair.l+' → '+pair.r, given:pair.l+' → '+(val||'(vastamata)')});
          }
        });
      }
    });
    return errors.slice(0,20); // max 20 errors stored
  };
  const handleSubmit = async()=>{
    setSubmitting(true);
    const sc=calcScore();
    const errorLog=calcErrorLog();
    await onSubmit(assignment.id,answers,sc,errorLog);
    // Auto-update skillMap if assignment has skills_to_update from AI
    if(sc&&assignment.skillsToUpdate?.length) {
      await updateSkillMapFromResult(assignment.studentId, assignment.skillsToUpdate, sc);
    }
    setScore(sc);setSubmitted(true);setSubmitting(false);
  };
  const done = submitted;
  const TYPE_COLORS={fill:'#1d4ed8',choice:'#6d28d9',writing:'#A96E1A',match:'#047857',order:'#2F5D50',text:'#718096',image:'#6d28d9',dialogue:'#0369a1',error_correction:'#dc2626',transformation:'#7c3aed',reading:'#0e7490',table:'#0e7490'};
  const TYPE_LABELS={fill:'Täida lünk',choice:'Vali vastus',writing:'Kirjutamine',match:'Sobita paarid',order:'Järjesta sõnad',text:'Tekst / juhis',image:'Pilt',dialogue:'Dialoog',error_correction:'Leia viga',transformation:'Muuda lauset',reading:'Lugemistekst',table:'Tabel'};
  const renderBlock=(block,gi)=>{
    const num=gi+1;
    return(<div key={block.id} style={{background:'#fff',borderRadius:14,padding:'18px 20px',border:'0.5px solid rgba(28,43,58,.09)'}}>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
        <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:20,height:20,borderRadius:'50%',background:'#1C2B3A',color:'#fff',fontSize:'.6rem',fontWeight:800}}>{num}</span>
        <span style={{fontSize:'.68rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.07em',color:TYPE_COLORS[block.type]||'#718096'}}>{block.label||TYPE_LABELS[block.type]||block.type}</span>
        {block.instruction&&<span style={{fontSize:'.68rem',color:'#B0A898',fontStyle:'italic'}}>— {block.instruction}</span>}
      </div>
      {block.type==='text'&&<p style={{fontSize:'.9rem',lineHeight:1.65,color:'#1C2B3A',fontWeight:block.bold?700:400,whiteSpace:'pre-wrap'}}>{block.content}</p>}
      {block.type==='image'&&block.imageUrl&&<div style={{textAlign:'center'}}><img src={block.imageUrl} style={{maxWidth:'100%',maxHeight:260,objectFit:'contain',borderRadius:8}} alt=""/>{block.caption&&<div style={{fontSize:'.74rem',color:'#718096',marginTop:4,fontStyle:'italic'}}>{block.caption}</div>}</div>}
      {block.type==='fill'&&(()=>{
        const parts=parseFill(block.text||'');
        return<div style={{fontSize:'.95rem',lineHeight:2.8}}>{parts.map((p,pi)=>{
          if(p.t==='text')return<span key={pi}>{p.v}</span>;
          const key=block.id+'_'+p.idx,val=answers[key]||'';
          const isC=done&&val.trim().toLowerCase()===p.answer.trim().toLowerCase();
          const isW=done&&!isC;
          return<span key={pi} style={{display:'inline-flex',alignItems:'center',gap:3}}>
            <input value={val} disabled={done} onChange={e=>setAns(key,e.target.value)}
              style={{border:'none',borderBottom:`2px solid ${done?(isC?'#166534':'#dc2626'):'#C9882A'}`,background:done?(isC?'rgba(22,101,52,.07)':'rgba(220,38,38,.07)'):'transparent',padding:'2px 6px',fontSize:'.9rem',fontFamily:'inherit',minWidth:80,outline:'none',textAlign:'center',borderRadius:done?4:0,color:done?(isC?'#166534':'#dc2626'):'#1C2B3A'}}/>
            {isW&&<span style={{fontSize:'.7rem',color:'#166534',fontWeight:700}}>({p.answer})</span>}
          </span>;
        })}</div>;
      })()}
      {block.type==='choice'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
        {(block.questions||[]).map((q,qi)=>{
          const key=block.id+'_'+qi,sel=answers[key];
          return<div key={qi}><div style={{fontWeight:700,fontSize:'.9rem',marginBottom:7}}>{qi+1}. {q.q}</div>
            {(q.opts||[]).filter(Boolean).map((opt,oi)=>{
              let bg='#fff',border='rgba(28,43,58,.12)',color='#1C2B3A';
              if(done){if(oi===q.correct){bg='rgba(22,101,52,.08)';border='#166534';color='#166534';}else if(oi===sel&&oi!==q.correct){bg='rgba(220,38,38,.07)';border='#dc2626';color='#dc2626';}}
              else if(oi===sel){bg='rgba(201,136,42,.08)';border='#C9882A';}
              return<button key={oi} disabled={done} onClick={()=>setAns(key,oi)}
                style={{display:'block',width:'100%',textAlign:'left',padding:'10px 14px',borderRadius:10,border:`1.5px solid ${border}`,background:bg,color,cursor:done?'default':'pointer',fontFamily:'inherit',fontSize:'.88rem',marginBottom:6,fontWeight:oi===sel?600:400}}>
                {opt}{done&&oi===q.correct?' ✓':''}{done&&oi===sel&&oi!==q.correct?' ✗':''}
              </button>;
            })}
          </div>;
        })}
      </div>}
      {block.type==='match'&&<div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div>{(block.pairs||[]).map((p,i)=><div key={i} style={{padding:'6px 10px',border:'1px solid rgba(28,43,58,.12)',borderRadius:7,fontSize:'.86rem',marginBottom:5,background:'#F9F8F6'}}>{i+1}. {p.l}</div>)}</div>
          <div>{[...(block.pairs||[])].sort(()=>Math.random()-.5).map((p,i)=><div key={i} style={{padding:'6px 10px',border:'1px solid rgba(28,43,58,.12)',borderRadius:7,fontSize:'.86rem',marginBottom:5,background:'#F9F8F6'}}>{String.fromCharCode(65+i)}. {p.r}</div>)}</div>
        </div>
        {(block.pairs||[]).map((pair,pi)=>{
          const key=block.id+'_'+pi,val=answers[key]||'';
          const isC=done&&val===pair.r,isW=done&&val&&!isC;
          return<div key={pi} style={{display:'flex',alignItems:'center',gap:7,marginBottom:6}}>
            <span style={{fontSize:'.82rem',fontWeight:700,minWidth:20,color:'#42536A'}}>{pi+1}.</span>
            <select value={val} disabled={done} onChange={e=>setAns(key,e.target.value)}
              style={{flex:1,padding:'7px 10px',borderRadius:8,border:`1.5px solid ${done?(isC?'#166534':isW?'#dc2626':'rgba(28,43,58,.12)'):'rgba(28,43,58,.12)'}`,background:done?(isC?'rgba(22,101,52,.07)':isW?'rgba(220,38,38,.07)':'#fff'):'#fff',fontFamily:'inherit',fontSize:'.86rem'}}>
              <option value="">— vali —</option>
              {(block.pairs||[]).map((p,i)=><option key={i} value={p.r}>{p.r}</option>)}
            </select>
            {done&&isC&&<span style={{color:'#166534',fontWeight:800}}>✓</span>}
            {done&&isW&&<span style={{color:'#dc2626',fontSize:'.74rem'}}>{pair.r}</span>}
          </div>;
        })}
      </div>}
      {block.type==='writing'&&<div>
        <div style={{fontSize:'.86rem',marginBottom:8,color:'#42536A',lineHeight:1.5}}>{block.task}</div>
        {!done&&<textarea value={answers[block.id]||''} onChange={e=>setAns(block.id,e.target.value)}
          rows={block.lines||4} placeholder="Kirjuta siia..."
          style={{width:'100%',padding:'9px 12px',borderRadius:9,border:'1.5px solid rgba(28,43,58,.12)',fontFamily:'inherit',fontSize:'.88rem',resize:'vertical',lineHeight:1.6}}/>}
        {done&&(()=>{
          const text = answers[block.id]||'';
          const parts = splitAnnotatedText(text, annotationsForBlock(block.id));
          return <div style={{position:'relative'}}>
            <div onMouseUp={e=>openAnnotationDraft(block,e)}
              style={{width:'100%',minHeight:90,padding:'11px 13px',borderRadius:9,border:'1.5px solid rgba(28,43,58,.12)',background:'#F9F8F6',fontSize:'.9rem',lineHeight:1.65,whiteSpace:'pre-wrap',color:'#1C2B3A',userSelect:canAnnotate?'text':'auto',cursor:canAnnotate?'text':'default'}}>
              {text?parts.map((part,pi)=>{
                if(part.type==='text') return <span key={pi}>{part.text}</span>;
                return <span key={part.annot.id} onClick={e=>{
                  e.stopPropagation();
                  const popupHost = e.currentTarget.parentElement?.parentElement;
                  const rect = e.currentTarget.getBoundingClientRect();
                  const anchor = popupHost ? localPopupAnchor(popupHost,{x:rect.left,y:rect.bottom}) : {x:8,y:8};
                  setAnnotationDraft(null);
                  setAnnotationView({annot:part.annot,blockId:block.id,x:anchor.x,y:anchor.y});
                }}
                  title={canAnnotate?'Parandus: '+(part.annot.parandus||''):'Kliki, et näha selgitust'}
                  style={{background:'rgba(220,38,38,.12)',color:'#991b1b',borderBottom:'2px solid #dc2626',borderRadius:3,padding:'0 2px',cursor:'pointer',fontWeight:650}}>
                  {part.text}
                </span>;
              }):<span style={{color:'#B0A898'}}>Vastus puudub.</span>}
            </div>
            {annotationDraft&&annotationDraft.blockId===block.id&&<div onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}
              style={{position:'absolute',...localPopupPos(annotationDraft.x,annotationDraft.y),zIndex:25,width:310,background:'#fff',border:'1px solid rgba(28,43,58,.14)',borderRadius:12,boxShadow:'0 14px 35px rgba(28,43,58,.22)',padding:14}}>
              <div style={{fontSize:'.72rem',fontWeight:800,color:'#dc2626',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8}}>Parandus</div>
              <div style={{fontSize:'.82rem',color:'#42536A',marginBottom:10}}>Valitud: <strong style={{color:'#1C2B3A'}}>{annotationDraft.selectedText}</strong></div>
              <input value={annotationDraft.parandus} onChange={e=>setAnnotationDraft(p=>({...p,parandus:e.target.value}))}
                placeholder="kogred → ahvenad"
                style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1.5px solid rgba(28,43,58,.14)',fontFamily:'inherit',fontSize:'.84rem',marginBottom:8}}/>
              <textarea value={annotationDraft.selgitus} onChange={e=>setAnnotationDraft(p=>({...p,selgitus:e.target.value}))}
                placeholder="viga kirjaviisis" rows={3}
                style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1.5px solid rgba(28,43,58,.14)',fontFamily:'inherit',fontSize:'.84rem',resize:'vertical',marginBottom:10}}/>
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button onClick={()=>setAnnotationDraft(null)}
                  style={{padding:'7px 12px',borderRadius:8,border:'1px solid rgba(28,43,58,.12)',background:'#fff',fontFamily:'inherit',fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>Tühista</button>
                <button onClick={saveAnnotation} disabled={!annotationDraft.parandus.trim()&&!annotationDraft.selgitus.trim()}
                  style={{padding:'7px 13px',borderRadius:8,border:'none',background:'#dc2626',color:'#fff',fontFamily:'inherit',fontWeight:800,fontSize:'.78rem',cursor:'pointer',opacity:(!annotationDraft.parandus.trim()&&!annotationDraft.selgitus.trim())?.5:1}}>Salvesta</button>
              </div>
            </div>}
            {annotationView&&annotationView.blockId===block.id&&<div onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}
              style={{position:'absolute',...localPopupPos(annotationView.x,annotationView.y),zIndex:25,width:310,background:'#fff',border:'1px solid rgba(28,43,58,.14)',borderRadius:12,boxShadow:'0 14px 35px rgba(28,43,58,.22)',padding:14}}>
              <div style={{fontSize:'.72rem',fontWeight:800,color:'#dc2626',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8}}>Õpetaja selgitus</div>
              <div style={{fontSize:'.82rem',color:'#42536A',marginBottom:8}}>Tekst: <strong style={{color:'#1C2B3A'}}>{annotationView.annot.selectedText}</strong></div>
              {annotationView.annot.parandus&&<div style={{padding:'8px 10px',borderRadius:8,background:'rgba(220,38,38,.08)',color:'#991b1b',fontWeight:700,fontSize:'.85rem',marginBottom:8}}>{annotationView.annot.parandus}</div>}
              {annotationView.annot.selgitus&&<div style={{fontSize:'.84rem',lineHeight:1.45,color:'#1C2B3A',marginBottom:10}}>{annotationView.annot.selgitus}</div>}
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button onClick={()=>setAnnotationView(null)}
                  style={{padding:'7px 12px',borderRadius:8,border:'1px solid rgba(28,43,58,.12)',background:'#fff',fontFamily:'inherit',fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>Sulge</button>
                {canDismissAnnotations&&<button onClick={()=>dismissAnnotation(annotationView.annot)}
                  style={{padding:'7px 13px',borderRadius:8,border:'none',background:'#2F5D50',color:'#fff',fontFamily:'inherit',fontWeight:800,fontSize:'.78rem',cursor:'pointer'}}>Selge</button>}
              </div>
            </div>}
          </div>;
        })()}
      </div>}
      {block.type==='dialogue'&&<div style={{border:'1px solid rgba(28,43,58,.1)',borderRadius:10,overflow:'hidden'}}>
        {(block.lines||[]).map((line,li)=>{
          const isA=line.speaker==='A'||line.speaker==='Õpetaja';
          const parts=(line.text||'').split(/(\[[^\]]*\])/g);
          const hasBlank=parts.some(p=>p.startsWith('['));
          let bIdx=0;
          return<div key={li} style={{display:'flex',gap:8,padding:'9px 13px',background:isA?'#F9F8F6':'#fff',borderBottom:li<(block.lines||[]).length-1?'1px solid rgba(28,43,58,.06)':'none'}}>
            <span style={{fontSize:'.72rem',fontWeight:700,color:isA?'#2F5D50':'#1d4ed8',minWidth:65,flexShrink:0,paddingTop:2}}>{line.speaker}:</span>
            <span style={{fontSize:'.9rem',flex:1}}>{hasBlank?parts.map((p,pi)=>{
              if(!p.startsWith('['))return<span key={pi}>{p}</span>;
              const key=block.id+'_'+li+'_'+(bIdx++),val=answers[key]||'';
              return<input key={pi} value={val} disabled={done} onChange={e=>setAns(key,e.target.value)}
                style={{border:'none',borderBottom:'1.5px solid #1C2B3A',background:'transparent',padding:'0 4px',fontSize:'.9rem',fontFamily:'inherit',minWidth:70,outline:'none'}}/>;
            }):line.text}</span>
          </div>;
        })}
      </div>}
      {block.type==='reading'&&<div>
        <div style={{background:'#F9F8F6',border:'1px solid rgba(28,43,58,.1)',borderRadius:8,padding:'12px 14px',marginBottom:12,fontSize:'.88rem',lineHeight:1.65,whiteSpace:'pre-wrap'}}>{block.passage}</div>
        {(block.questions||[]).map((q,qi)=>{
          const key=block.id+'_'+qi,sel=answers[key];
          return<div key={qi} style={{marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:'.9rem',marginBottom:6}}>{qi+1}. {q.q}</div>
            {(q.opts||[]).filter(Boolean).map((opt,oi)=>{
              let bg='#fff',border='rgba(28,43,58,.12)',color='#1C2B3A';
              if(done){if(oi===q.correct){bg='rgba(22,101,52,.08)';border='#166534';color='#166534';}else if(oi===sel&&oi!==q.correct){bg='rgba(220,38,38,.07)';border='#dc2626';color='#dc2626';}}
              else if(oi===sel){bg='rgba(201,136,42,.08)';border='#C9882A';}
              return<button key={oi} disabled={done} onClick={()=>setAns(key,oi)}
                style={{display:'block',width:'100%',textAlign:'left',padding:'9px 13px',borderRadius:9,border:`1.5px solid ${border}`,background:bg,color,cursor:done?'default':'pointer',fontFamily:'inherit',fontSize:'.86rem',marginBottom:5}}>
                {opt}
              </button>;
            })}
          </div>;
        })}
      </div>}
      {block.type==='error_correction'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
        {(block.sentences||[]).map((s,si)=>{
          const key=block.id+'_'+si,val=answers[key]||'';
          const isC=done&&val.trim().toLowerCase()===(s.correct||'').trim().toLowerCase();
          return<div key={si} style={{display:'flex',alignItems:'flex-start',gap:8}}>
            <span style={{fontSize:'.72rem',fontWeight:800,color:'#dc2626',minWidth:20,paddingTop:10}}>{si+1}.</span>
            <div style={{flex:1}}>
              <div style={{fontSize:'.88rem',color:'#7A7167',textDecoration:'line-through',marginBottom:5}}>{s.wrong}</div>
              <input value={val} disabled={done} onChange={e=>setAns(key,e.target.value)} placeholder="Parandus..."
                style={{width:'100%',padding:'7px 10px',borderRadius:8,border:`1.5px solid ${done?(isC?'#166534':'#dc2626'):'rgba(28,43,58,.12)'}`,fontFamily:'inherit',fontSize:'.87rem'}}/>
              {done&&<div style={{fontSize:'.76rem',color:'#2F5D50',marginTop:3}}>✓ {s.correct}</div>}
            </div>
          </div>;
        })}
      </div>}
      {block.type==='transformation'&&<div>
        {block.example&&<div style={{padding:'8px 12px',borderRadius:8,background:'#F0EEE9',border:'1px solid rgba(28,43,58,.1)',marginBottom:12,fontSize:'.86rem',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{color:'#7A7167',fontSize:'.7rem',fontWeight:700}}>NÄIDE:</span>
          <span>{block.example.from}</span><span style={{color:'#C9882A'}}>→</span>
          <span style={{color:'#2F5D50',fontWeight:600}}>{block.example.to}</span>
        </div>}
        {(block.sentences||[]).map((s,si)=>{
          const key=block.id+'_'+si;
          return<div key={si} style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:10}}>
            <span style={{fontSize:'.72rem',fontWeight:700,color:'#718096',minWidth:20,paddingTop:10}}>{si+1}.</span>
            <div style={{flex:1}}>
              <div style={{fontSize:'.88rem',color:'#1C2B3A',marginBottom:5}}>{s}</div>
              <input value={answers[key]||''} disabled={done} onChange={e=>setAns(key,e.target.value)} placeholder="Muudetud lause..."
                style={{width:'100%',padding:'7px 10px',borderRadius:8,border:'1.5px solid rgba(28,43,58,.12)',fontFamily:'inherit',fontSize:'.87rem'}}/>
            </div>
          </div>;
        })}
      </div>}
    </div>);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.65)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'16px',zIndex:310,backdropFilter:'blur(6px)',overflowY:'auto'}}>
      <div style={{background:'#EEECE7',borderRadius:20,maxWidth:760,width:'100%',marginTop:8,marginBottom:24}}>
        <div style={{background:'#1C2B3A',borderRadius:'20px 20px 0 0',padding:'16px 22px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:2}}>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:'.96rem'}}>{meta.title||assignment.lessonTitle}</div>
            <div style={{color:'rgba(255,255,255,.45)',fontSize:'.74rem',marginTop:2}}>{assignment.subject} · {assignment.level} · {assignment.topic}{assignment.dueDate&&<span style={{marginLeft:8}}>📅 {assignment.dueDate}</span>}</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.1)',border:'none',color:'#fff',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.8rem'}}>✕ Sulge</button>
        </div>
        {assignment.note&&<div style={{padding:'10px 22px',background:'rgba(201,136,42,.12)',borderBottom:'1px solid rgba(201,136,42,.15)'}}>
          <div style={{fontSize:'.78rem',color:'#A96E1A',fontWeight:700}}>📝 Õpetaja märkus: {assignment.note}</div>
        </div>}
        {submitted&&score&&<div style={{padding:'14px 22px',background:'rgba(47,93,80,.1)',borderBottom:'1px solid rgba(47,93,80,.15)'}}>
          <div style={{fontSize:'1rem',fontWeight:800,color:'#2F5D50'}}>{score.pct>=80?'🎉 ':score.pct>=50?'👍 ':'💪 '}Tulemus: {score.correct}/{score.total} ({score.pct}%)</div>
          <div style={{fontSize:'.8rem',color:'#2F5D50',marginTop:3}}>{score.pct>=80?'Suurepärane töö!':score.pct>=50?'Tubli! Harjuta veel.':'Proovi uuesti, sa saad hakkama!'}</div>
        </div>}
        <div style={{padding:'20px 22px',display:'flex',flexDirection:'column',gap:14}}>
          {blocks.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'#B0A898'}}>Tööleht on tühi.</div>}
          {blocks.map((b,gi)=>renderBlock(b,gi))}
        </div>
        {!submitted&&blocks.length>0&&<div style={{padding:'14px 22px',borderTop:'1px solid rgba(28,43,58,.1)',background:'#fff',borderRadius:'0 0 20px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',bottom:0}}>
          <div style={{fontSize:'.8rem',color:'#718096'}}>Täida kõik ülesanded ja vajuta "Esita"</div>
          <button onClick={handleSubmit} disabled={submitting}
            style={{padding:'10px 22px',borderRadius:10,border:'none',background:'#2F5D50',color:'#fff',fontFamily:'inherit',fontWeight:800,fontSize:'.86rem',cursor:'pointer',opacity:submitting?.7:1}}>
            {submitting?'Saadan…':'✓ Esita tööleht'}
          </button>
        </div>}
        {submitted&&<div style={{padding:'18px 22px',background:'#fff',borderRadius:'0 0 20px 20px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <span style={{color:'#2F5D50',fontWeight:700,fontSize:'.9rem'}}>✓ Tööleht esitatud</span>
            {score&&<span style={{fontWeight:800,fontSize:'.9rem',color:score.pct>=80?'#166534':score.pct>=50?'#A96E1A':'#dc2626'}}>{score.pct}%</span>}
          </div>
          {!selfSaved&&!showSelfAssess&&<div>
            <div style={{fontSize:'.82rem',color:'#42536A',marginBottom:8}}>Kas soovid anda tagasisidet selle töölehe kohta?</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setShowSelfAssess(true)}
                style={{flex:1,padding:'9px',borderRadius:9,border:'1px solid rgba(47,93,80,.3)',background:'rgba(47,93,80,.06)',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.82rem',color:'#2F5D50'}}>
                📝 Anna tagasiside
              </button>
              <button onClick={onClose}
                style={{flex:1,padding:'9px',borderRadius:9,border:'none',background:'rgba(28,43,58,.07)',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.82rem'}}>
                Sulge
              </button>
            </div>
          </div>}
          {showSelfAssess&&!selfSaved&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{fontSize:'.82rem',fontWeight:700,color:'#1C2B3A'}}>Kui raske see tööleht oli?</div>
            <div style={{display:'flex',gap:6}}>
              {[{v:1,e:'😊',l:'Vaega lihtne'},{v:2,e:'🙂',l:'Lihtne'},{v:3,e:'😐',l:'Paras'},{v:4,e:'😓',l:'Raske'},{v:5,e:'😰',l:'Vaega raske'}].map(({v,e,l})=>(
                <button key={v} onClick={()=>setSelfDifficulty(v)}
                  style={{flex:1,padding:'7px 4px',borderRadius:8,border:'1.5px solid '+(selfDifficulty===v?'#2F5D50':'rgba(28,43,58,.12)'),
                    background:selfDifficulty===v?'rgba(47,93,80,.1)':'#fff',cursor:'pointer',fontFamily:'inherit',
                    fontSize:'.65rem',fontWeight:selfDifficulty===v?700:400,color:selfDifficulty===v?'#2F5D50':'#42536A',
                    textAlign:'center',lineHeight:1.3}}>
                  {l}
                </button>
              ))}
            </div>
            <textarea value={selfComment} onChange={e=>setSelfComment(e.target.value)} rows={2}
              placeholder="Mis oli raske? Mis jäi arusaamatuks? (valikuline)"
              style={{padding:'8px 12px',borderRadius:9,border:'1.5px solid rgba(28,43,58,.12)',fontFamily:'inherit',fontSize:'.84rem',resize:'none'}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={async()=>{
                if(!selfDifficulty) return;
                setSelfSaving(true);
                await db.collection('worksheetAssignments').doc(assignment.id).update({
                  selfAssessment:{difficulty:selfDifficulty,comment:selfComment,submittedAt:new Date().toISOString()}
                });
                setSelfSaved(true);setSelfSaving(false);
              }} disabled={!selfDifficulty||selfSaving}
                style={{flex:1,padding:'9px',borderRadius:9,border:'none',background:'#2F5D50',color:'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.82rem',opacity:(!selfDifficulty||selfSaving)?.5:1}}>
                {selfSaving?'Salvestab…':'✓ Saada tagasiside'}
              </button>
              <button onClick={onClose} style={{padding:'9px 14px',borderRadius:9,border:'none',background:'rgba(28,43,58,.07)',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.82rem'}}>Sulge</button>
            </div>
          </div>}
          {selfSaved&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:'.82rem',color:'#2F5D50',fontWeight:600}}>✓ Tagasiside salvestatud. Aitäh!</div>
            <button onClick={onClose} style={{padding:'8px 14px',borderRadius:9,border:'none',background:'rgba(28,43,58,.07)',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.82rem'}}>Sulge</button>
          </div>}
        </div>}
      </div>
    </div>
  );
}

// ── KABINET VIEW (вкладка ученика) ─────────────────────────────
function KabinetView({user, myStudents, notify}) {
  const [assignments, setAssignments] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [openWs, setOpenWs] = React.useState(null);
  React.useEffect(()=>{
    if(!user?.uid) return;
    const ids=myStudents.map(s=>s.id).filter(Boolean);
    if(!ids.length){setLoading(false);return;}
    const unsubs=ids.map(sid=>
      db.collection('worksheetAssignments').where('studentId','==',sid)
        .onSnapshot(snap=>{
          setAssignments(prev=>{
            const others=prev.filter(a=>a.studentId!==sid);
            return [...others,...snap.docs.map(d=>({id:d.id,...d.data()}))].sort((a,b)=>(b.assignedAt||'').localeCompare(a.assignedAt||''));
          });
          setLoading(false);
        },()=>setLoading(false))
    );
    return()=>unsubs.forEach(u=>u());
  },[user?.uid,myStudents.map(s=>s.id).join(',')]);
  const submitAssignment=async(assignmentId,answers,score,errorLog)=>{
    await db.collection('worksheetAssignments').doc(assignmentId).update({
      status:'done', answers, score, errorLog:errorLog||[],
      completedAt:new Date().toISOString()
    });
    notify('✓ Tööleht esitatud!');
  };
  const STATUS={new:{l:'Uus',c:'#1d4ed8',bg:'rgba(29,78,216,.1)'},started:{l:'Pooleli',c:'#A96E1A',bg:'rgba(201,136,42,.1)'},done:{l:'✓ Esitatud',c:'#166534',bg:'rgba(22,101,52,.1)'}};
  const fmtDate=d=>d?new Date(d).toLocaleDateString('et-EE',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
  const todo=assignments.filter(a=>a.status!=='done');
  const done=assignments.filter(a=>a.status==='done');
  if(loading)return<div style={{display:'flex',justifyContent:'center',padding:60}}><div className="spinner"/></div>;
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div>
        <h1 style={{fontSize:'1.7rem'}}>📋 Minu töölehed</h1>
        <div style={{color:'#42536A',fontSize:'.88rem',marginTop:4}}>Õpetaja poolt määratud töölehed. Täida ja esita otse siin.</div>
      </div>
      {assignments.length===0&&<div className="card" style={{padding:48,textAlign:'center',color:'#B0A898'}}>
        <div style={{fontSize:'2.5rem',marginBottom:12}}>📋</div>
        <div style={{fontSize:'1rem',fontWeight:600,color:'#1C2B3A',marginBottom:6}}>Töölehti pole veel määratud</div>
        <div style={{fontSize:'.84rem'}}>Õpetaja määrab sulle töölehti, mis ilmuvad siia.</div>
      </div>}
      {todo.length>0&&<div>
        <div style={{fontSize:'.75rem',fontWeight:800,color:'#718096',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:12}}>Täitmata ({todo.length})</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
          {todo.map(a=>{
            const st=STATUS[a.status]||STATUS.new;
            const hasWs=!!(a.worksheetData?.blocks?.length);
            const overdue=a.dueDate&&a.dueDate<new Date().toISOString().split('T')[0];
            return<div key={a.id} className="card" style={{padding:20,border:overdue?'1px solid rgba(220,38,38,.2)':'0.5px solid rgba(28,43,58,.09)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,marginBottom:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:'.96rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.lessonTitle}</div>
                  <div style={{fontSize:'.74rem',color:'#718096',marginTop:3}}>{a.subject} · {a.level} · {a.topic}</div>
                </div>
                <span style={{padding:'3px 9px',borderRadius:6,fontSize:'.68rem',fontWeight:800,background:st.bg,color:st.c,flexShrink:0}}>{st.l}</span>
              </div>
              {a.note&&<div style={{padding:'7px 10px',borderRadius:8,background:'rgba(201,136,42,.08)',fontSize:'.78rem',color:'#A96E1A',marginBottom:8}}>📝 {a.note}</div>}

// ── ASSIGNED WORKSHEETS WIDGET (в карточке ученика) ───────────
function AssignedWorksheetsWidget({student, canManage, notify}) {
  const [assignments, setAssignments] = React.useState([]);
  const [openWs, setOpenWs] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    if(!student?.id) return;
    const unsub = db.collection('worksheetAssignments')
      .where('studentId','==',student.id)
      .onSnapshot(snap=>{
        const list = snap.docs.map(d=>({id:d.id,...d.data()}));
        list.sort((a,b)=>(b.assignedAt||'').localeCompare(a.assignedAt||''));
        setAssignments(list.slice(0,10));
        setLoading(false);
      }, ()=>setLoading(false));
    return unsub;
  },[student?.id]);

  const submitAssignment = async(assignmentId, answers, score, errorLog) => {
    await db.collection('worksheetAssignments').doc(assignmentId).update({
      status:'done', answers, score, errorLog:errorLog||[], completedAt:new Date().toISOString(), seenByTeacher:false
    });
    notify('✓ Tööleht esitatud!');
  };
  const markSeen = async(assignmentId) => {
    await db.collection('worksheetAssignments').doc(assignmentId).update({seenByTeacher:true});
  };

  const deleteAssignment = async(id) => {
    if(!window.confirm('Kustuta määramine?')) return;
    await db.collection('worksheetAssignments').doc(id).delete();
    notify('✓ Kustutatud');
  };

  if(loading || assignments.length===0) return null;

  const STATUS = {new:{l:'Uus',c:'#1d4ed8',bg:'rgba(29,78,216,.1)'},started:{l:'Pooleli',c:'#A96E1A',bg:'rgba(201,136,42,.1)'},done:{l:'✓ Esitatud',c:'#166534',bg:'rgba(22,101,52,.1)'}};
  const fmtDate = d => d?new Date(d).toLocaleDateString('et-EE',{day:'2-digit',month:'2-digit'}):'—';

  return (
    <div className="card" style={{padding:22}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <h3>📋 Määratud töölehed ({assignments.length})</h3>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:'.76rem',color:'#2F5D50',fontWeight:700}}>{assignments.filter(a=>a.status==='done').length} esitatud</span>
          <span style={{fontSize:'.76rem',color:'#1d4ed8',fontWeight:700}}>{assignments.filter(a=>a.status!=='done').length} ootel</span>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {assignments.map(a=>{
          const st=STATUS[a.status]||STATUS.new;
          const hasWs=!!(a.worksheetData?.blocks?.length);
          const isUnseen=a.status==='done'&&a.seenByTeacher===false&&canManage;
          return(
            <div key={a.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:11,background:isUnseen?'rgba(220,38,38,.05)':'#F9F8F6',border:isUnseen?'1px solid rgba(220,38,38,.25)':'0.5px solid rgba(28,43,58,.08)'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}}>
                  {a.lessonTitle}
                  {isUnseen&&<span style={{fontSize:'.62rem',fontWeight:800,padding:'1px 7px',borderRadius:999,background:'#dc2626',color:'#fff',flexShrink:0}}>UUS!</span>}
                </div>
                <div style={{fontSize:'.72rem',color:'#718096',marginTop:2}}>
                  {a.subject} · {a.level}
                  {a.dueDate&&<span style={{marginLeft:6}}>📅 {fmtDate(a.dueDate)}</span>}
                  {a.score&&<span style={{marginLeft:6,color:a.score.pct>=80?'#166534':a.score.pct>=50?'#A96E1A':'#dc2626',fontWeight:700}}>{a.score.pct}%</span>}
                </div>
              </div>
              <span style={{padding:'2px 8px',borderRadius:5,fontSize:'.68rem',fontWeight:800,background:st.bg,color:st.c,flexShrink:0}}>{st.l}</span>
              {a.selfAssessment&&canManage&&(()=>{
                const diffLabels=['','Vaega lihtne','Lihtne','Paras','Raske','Vaega raske'];
                const emoji=['','😊','🙂','😐','😓','😰'];
                const d=a.selfAssessment.difficulty||0;
                const tip='Enesehinang: '+diffLabels[d]+(a.selfAssessment.comment?' | '+a.selfAssessment.comment:'');
                return<span title={tip} style={{fontSize:'.8rem',cursor:'help',flexShrink:0}}>{emoji[d]}</span>;
              })()}
              {hasWs&&<button onClick={()=>{setOpenWs(a);if(isUnseen)markSeen(a.id);}}
                style={{padding:'6px 12px',borderRadius:8,border:'none',background:a.status==='done'?(isUnseen?'#dc2626':'rgba(28,43,58,.07)'):'#2F5D50',color:a.status==='done'?(isUnseen?'#fff':'#42536A'):'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.76rem',flexShrink:0}}>
                {a.status==='done'?'Vaata':'Täida'}
              </button>}
              {canManage&&<button onClick={()=>deleteAssignment(a.id)}
                style={{background:'none',border:'none',color:'#dc2626',cursor:'pointer',fontSize:'.8rem',padding:'4px',flexShrink:0}}>
                <i className="fa-solid fa-trash"/>
              </button>}
            </div>
          );
        })}
      </div>
      {openWs&&<WorksheetPlayer assignment={openWs} onClose={()=>setOpenWs(null)} onSubmit={submitAssignment} canAnnotate={canManage&&openWs.status==='done'} notify={notify}/>}
    </div>
  );
}

const AI_METHODOLOGY_PROMPT = `Ты — методический ИИ-ассистент для сайта KeeleSepp.
Твоя задача — строить персонализированную систему обучения эстонскому языку, не просто создавать рабочие листы.
Каждый рабочий лист должен быть связан с уровнем ученика, темой урока, конкретными навыками, слабыми местами, целью урока.
Ученик не должен получать случайные задания.

ОСНОВНЫЕ ПРИНЦИПЫ:
1. Не перегружай ученика. Материал соответствует указанному уровню.
2. Двигайся от простого к сложному.
3. В каждом комплекте: 30% повторение уже изученного, 50% тренировка слабых навыков, 20% новый материал.
4. Слабые навыки повторяй через разные типы заданий.
5. Все задания для ученика на эстонском языке. Пояснения учителю — на русском.

СТРУКТУРА КОМПЛЕКТА — 3 рабочих листа:
Лист 1: Введение в тему и говорение (словарный блок, matching, модели фраз, вопросы, парное задание)
Лист 2: Письменная практика (повторение слов, порядок слов, грамматика, подстановка, текст 6-8 предложений)
Лист 3: Закрепление и мини-контроль (текст для чтения, вопросы, лексика, грамматика, итоговое задание)

Отвечай СТРОГО в формате JSON без markdown fences, без пояснений до или после:
{
  "kit_title": "название комплекта на русском для учителя",
  "kit_goal": "цель комплекта на русском",
  "sheets": [
    {
      "title": "название листа на эстонском",
      "blocks": [
        {"id":"b1","type":"text","content":"...","instruction":"..."},

        {"id":"b4","type":"choice","questions":[{"q":"...","opts":["a","b","c"],"correct":0}],"instruction":"..."},
        {"id":"b5","type":"writing","task":"...","lines":6,"instruction":"..."},
        {"id":"b6","type":"order","sentence":"...","instruction":"..."},
        {"id":"b7","type":"dialogue","lines":[{"speaker":"A","text":"..."},{"speaker":"B","text":"[vastus]"}],"instruction":"..."}
      ]
    }
  ],
  "teacher_recommendations": "рекомендации учителю на русском"
}
Используй block id формата b1,b2,b3... уникальные внутри каждого листа. Block types: text, match, fill, choice, writing, order, dialogue, reading, error_correction, transformation.`;

function AIGeneratorModal({student, skillMap, level, skills, onClose, user}) {
  const [topic, setTopic] = React.useState('');
  const [lessonGoal, setLessonGoal] = React.useState('');
  const [generating, setGenerating] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState('');
  const [assigning, setAssigning] = React.useState(false);
  const [assignedSheets, setAssignedSheets] = React.useState([]);
  const [recentErrors, setRecentErrors] = React.useState([]);
  const [prevTopics, setPrevTopics] = React.useState([]);

  // Load recent error history from last 5 submitted worksheets
  React.useEffect(()=>{
    if(!student?.id) return;
    db.collection('worksheetAssignments')
      .where('studentId','==',student.id)
      .where('status','==','done')
      .get()
      .then(snap=>{
        const docs = snap.docs.map(d=>d.data())
          .sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''))
          .slice(0,5);
        // Aggregate errors across last 5 worksheets
        const allErrors = docs.flatMap(d=>d.errorLog||[]);
        // Count frequency of each error pattern
        const freq = {};
        allErrors.forEach(e=>{
          const key = e.correct||e.question||'';
          if(!freq[key]) freq[key] = {...e, count:0};
          freq[key].count++;
        });
        const topErrors = Object.values(freq)
          .sort((a,b)=>b.count-a.count)
          .slice(0,8)
          .map(e=>`${e.type==='fill'?`"${e.correct}" (дал: "${e.given}")`:e.type==='choice'?`"${e.question}" — правильно: "${e.correct}", дал: "${e.given}"`:e.type==='match'?`"${e.correct}" (дал: "${e.given}")`:''}${e.count>1?' ('+e.count+'x)':''}`);
        setRecentErrors(topErrors);
        // Collect previous topics
        const topics = [...new Set(docs.map(d=>d.topic).filter(Boolean))];
        setPrevTopics(topics);
      })
      .catch(()=>{});
  },[student?.id]);

  const strongSkills = skills.filter(s=>(skillMap[s.id]||0)>=80).map(s=>s.name);
  const weakSkills = skills.filter(s=>skillMap[s.id]!==undefined&&skillMap[s.id]!==null&&skillMap[s.id]<50).map(s=>s.name);

  const generate = async () => {
    if(!topic.trim()){ alert('Sisesta teema'); return; }
    setGenerating(true); setError(''); setResult(null);
    try {
      const userMsg = `Имя ученика: ${student.name}
Уровень: ${level}
Тема: ${topic}
Цель урока: ${lessonGoal || 'не указана, выбери сам исходя из темы'}
Сильные навыки: ${strongSkills.join(', ')||'нет данных'}
Слабые навыки: ${weakSkills.join(', ')||'нет данных'}
Последние ошибки ученика: ${recentErrors.length?recentErrors.join('; '):'нет данных — ученик ещё не выполнял листы'}
Предыдущие темы: ${prevTopics.length?prevTopics.join(', '):'нет данных'}
Создай комплект из 3 рабочих листов согласно методике. Учти последние ошибки и избегай повторения предыдущих тем.`;

      const res = await authFetch('/api/anthropic-proxy', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 8000,
          system: AI_METHODOLOGY_PROMPT,
          messages: [{role:'user', content: userMsg}]
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
      const raw = (data.content?.[0]?.text||'').trim();
      const clean = raw.replace(/^[\s]*```[a-z]*\s*/i,'').replace(/\s*```[\s]*$/,'').trim();
      let parsed;
      try { parsed = JSON.parse(clean); }
      catch(e) {
        const m = clean.match(/\{[\s\S]*\}/);
        if(m) parsed = JSON.parse(m[0]);
        else throw new Error('AI vastust ei õnnestunud lugeda');
      }
      setResult(parsed);
    } catch(e) {
      console.error('AI generation failed:', e);
      setError(e.message||'Genereerimine ebaõnnestus');
    }
    setGenerating(false);
  };

  const assignSheet = async (sheet, idx) => {
    setAssigning(true);
    try {
      const lessonRef = await db.collection('curriculumLessons').add({
        title: sheet.title||result.kit_title+' #'+(idx+1),
        type: 'material', description: '',
        subject: 'Eesti keel', level, topic,
        examPart: null,
        worksheetData: { meta:{title:sheet.title,subject:'Eesti keel',level,topic}, blocks: sheet.blocks||[] },
        files: [], order: 0,
        authorUid: user?.uid||'', authorName: (user?.displayName||user?.email||'AI Generator')+' (AI)',
        createdAt: new Date().toISOString().split('T')[0],
        updatedAt: new Date().toISOString(),
        aiGenerated: true
      });
      await db.collection('worksheetAssignments').add({
        lessonId: lessonRef.id,
        lessonTitle: sheet.title||'',
        subject: 'Eesti keel', level, topic,
        worksheetData: { meta:{title:sheet.title,subject:'Eesti keel',level,topic}, blocks: sheet.blocks||[] },
        studentId: student.id, studentName: student.name,
        assignedBy: user?.uid||'', assignedByName: (user?.displayName||user?.email||'AI Generator')+' (AI)',
        assignedAt: new Date().toISOString(),
        dueDate: '', note: result.teacher_recommendations||'',
        status:'new', score:null, completedAt:null, answers:{},
        skillsToUpdate: result.skills_to_update||[]
      });
      setAssignedSheets(p=>[...p, idx]);
    } catch(e) {
      console.error('Assign sheet failed:', e);
      alert('Määramine ebaõnnestus: '+e.message);
    }
    setAssigning(false);
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.65)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:16,zIndex:320,backdropFilter:'blur(6px)',overflowY:'auto'}}>
      <div style={{background:'#FBFAF8',borderRadius:20,maxWidth:680,width:'100%',marginTop:20,marginBottom:24}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid rgba(28,43,58,.08)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:800,fontSize:'1rem'}}>🤖 Genereeri õppekomplekt — {student.name}</div>
            <div style={{fontSize:'.76rem',color:'#7A7167',marginTop:2}}>Tase {level} · {strongSkills.length} tugevat, {weakSkills.length} nõrka oskust</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(28,43,58,.07)',border:'none',borderRadius:8,width:28,height:28,cursor:'pointer'}}>✕</button>
        </div>

        <div style={{padding:'18px 22px',display:'flex',flexDirection:'column',gap:12}}>
          {!result&&<>
            <div>
              <div style={{fontSize:'.7rem',fontWeight:800,color:'#718096',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5}}>Teema *</div>
              <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="nt. Minu pere, Igapäevaelu, Reisimine..."
                style={{width:'100%',padding:'9px 12px',borderRadius:9,border:'1.5px solid rgba(28,43,58,.12)',fontFamily:'inherit',fontSize:'.86rem'}}/>
            </div>
            <div>
              <div style={{fontSize:'.7rem',fontWeight:800,color:'#718096',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5}}>Tunni eesmärk (valikuline)</div>
              <input value={lessonGoal} onChange={e=>setLessonGoal(e.target.value)} placeholder="nt. Õpetada minevikuvormi kasutama..."
                style={{width:'100%',padding:'9px 12px',borderRadius:9,border:'1.5px solid rgba(28,43,58,.12)',fontFamily:'inherit',fontSize:'.86rem'}}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {(strongSkills.length>0||weakSkills.length>0)&&<div style={{padding:'10px 13px',borderRadius:10,background:'rgba(47,93,80,.06)',fontSize:'.78rem',color:'#42536A',lineHeight:1.6}}>
                {strongSkills.length>0&&<div><strong style={{color:'#166534'}}>💪 Tugevad:</strong> {strongSkills.join(', ')}</div>}
                {weakSkills.length>0&&<div><strong style={{color:'#dc2626'}}>🎯 Nõrgad:</strong> {weakSkills.join(', ')}</div>}
              </div>}
              {recentErrors.length>0&&<div style={{padding:'10px 13px',borderRadius:10,background:'rgba(220,38,38,.05)',border:'1px solid rgba(220,38,38,.15)',fontSize:'.78rem',color:'#42536A',lineHeight:1.6}}>
                <div style={{fontWeight:700,color:'#dc2626',marginBottom:4}}>🔴 Частые ошибки (из последних работ):</div>
                {recentErrors.slice(0,5).map((e,i)=><div key={i} style={{marginBottom:2,paddingLeft:8,borderLeft:'2px solid rgba(220,38,38,.3)'}}>• {e}</div>)}
                <div style={{fontSize:'.72rem',color:'#9ca3af',marginTop:4}}>AI учтёт эти ошибки при генерации</div>
              </div>}
              {prevTopics.length>0&&<div style={{padding:'8px 13px',borderRadius:10,background:'rgba(28,43,58,.04)',fontSize:'.74rem',color:'#718096'}}>
                <strong>Предыдущие темы:</strong> {prevTopics.join(', ')}
              </div>}
            </div>
            {error&&<div style={{padding:'10px 13px',borderRadius:9,background:'rgba(220,38,38,.08)',color:'#dc2626',fontSize:'.82rem'}}>{error}</div>}
            <button onClick={generate} disabled={generating} className="btn btn-pine" style={{justifyContent:'center',padding:'11px'}}>
              {generating?'⏳ Genereerin 3 töölehte...':'✨ Genereeri 3 töölehte'}
            </button>
          </>}

          {result&&<>
            <div style={{padding:'12px 14px',borderRadius:10,background:'rgba(201,136,42,.08)',border:'1px solid rgba(201,136,42,.2)'}}>
              <div style={{fontWeight:800,fontSize:'.92rem',color:'#A96E1A'}}>{result.kit_title}</div>
              <div style={{fontSize:'.8rem',color:'#7A7167',marginTop:3}}>{result.kit_goal}</div>
            </div>
            {(result.sheets||[]).map((sheet,idx)=>{
              const isAssigned = assignedSheets.includes(idx);
              return(
                <div key={idx} style={{padding:'14px 16px',borderRadius:12,border:'1px solid rgba(28,43,58,.1)',background:'#fff'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:'.88rem'}}>Tööleht {idx+1}: {sheet.title}</div>
                      <div style={{fontSize:'.74rem',color:'#718096',marginTop:2}}>{(sheet.blocks||[]).length} plokki</div>
                    </div>
                    {isAssigned
                      ?<span style={{color:'#166534',fontWeight:700,fontSize:'.82rem'}}>✓ Määratud</span>
                      :<button onClick={()=>assignSheet(sheet,idx)} disabled={assigning} className="btn btn-pine btn-sm">
                        {assigning?'…':'📤 Määra'}
                      </button>}
                  </div>
                </div>
              );
            })}
            {result.teacher_recommendations&&<div style={{padding:'12px 14px',borderRadius:10,background:'#F9F8F6',fontSize:'.8rem',color:'#42536A',lineHeight:1.55}}>
              <strong>Soovitused õpetajale:</strong> {result.teacher_recommendations}
            </div>}
            <button onClick={()=>{setResult(null);setAssignedSheets([]);}} className="btn btn-ghost" style={{justifyContent:'center'}}>
              ← Genereeri uus komplekt
            </button>
          </>}
        </div>

function SkillMapWidget({student, isTeacher, user}) {
  const [skillMap, setSkillMap] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const [showAiGen, setShowAiGen] = React.useState(false);
  const level = student?.level || 'A2';
  const skills = SM_SKILLS[level] || SM_SKILLS.A2;

  React.useEffect(()=>{
    if(!student?.id) return;
    // Read skillMap from the student document
    const unsub = db.collection('students').doc(student.id).onSnapshot(snap=>{
      setSkillMap(snap.data()?.skillMap || {});
      setLoading(false);
    }, ()=>setLoading(false));
    return unsub;
  },[student?.id]);

  const getStars = score => {
    if(score===null||score===undefined) return 0;
    if(score>=80) return 3; if(score>=50) return 2; if(score>=25) return 1; return 0;
  };
  const getStatus = score => {
    if(score===null||score===undefined) return 'untested';
    if(score>=80) return 'strong'; if(score>=50) return 'normal'; return 'weak';
  };
  const statusColor = {strong:'#166534', normal:'#1d4ed8', weak:'#dc2626', untested:'#B0A898'};

  // Radar chart
  const cats = Object.keys(SM_CATS);
  const N = cats.length;
  const CX=130,CY=130,R=95;
  const getPoint=(i,r)=>{
    const angle=(2*Math.PI*i/N)-Math.PI/2;
    return[CX+r*Math.cos(angle),CY+r*Math.sin(angle)];
  };
  const catScores={};
  cats.forEach(cat=>{
    const cs=skills.filter(s=>s.cat===cat);
    if(!cs.length){catScores[cat]=0;return;}
    const sc=cs.map(s=>skillMap[s.id]??0);
    catScores[cat]=sc.reduce((a,b)=>a+b,0)/sc.length;
  });
  const LEVEL_COLORS={A1:'#047857',A2:'#0e7490',B1:'#1d4ed8',B2:'#6d28d9',C1:'#be185d'};
  const lc=LEVEL_COLORS[level]||'#0e7490';
  const gridPaths=[25,50,75,100].map(gl=>{
    const pts=cats.map((_,i)=>getPoint(i,R*gl/100));
    return pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';
  });
  const dataPts=cats.map((cat,i)=>getPoint(i,R*(catScores[cat]||0)/100));
  const dataPath=dataPts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';

  const tested = skills.filter(s=>skillMap[s.id]!==undefined&&skillMap[s.id]!==null);
  const strong = skills.filter(s=>(skillMap[s.id]||0)>=80);
  const weak   = skills.filter(s=>skillMap[s.id]!==undefined&&skillMap[s.id]!==null&&skillMap[s.id]<50);

  if(loading) return null;

  const hasAnyData = tested.length > 0;

  return(
    <React.Fragment>
    <div style={{background:'linear-gradient(135deg,#1C2B3A 0%,'+lc+' 100%)',borderRadius:18,padding:24,color:'#fff',position:'relative'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <div>
          <div style={{fontSize:'.68rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.45)',marginBottom:4}}>
            Oskuste kaart — {level}
          </div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.6rem',fontWeight:800,color:strong.length?'#4ade80':'rgba(255,255,255,.3)'}}>{strong.length}</div>
              <div style={{fontSize:'.62rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em'}}>💪 Tugevad</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.6rem',fontWeight:800,color:weak.length?'#fca5a5':'rgba(255,255,255,.3)'}}>{weak.length}</div>
              <div style={{fontSize:'.62rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em'}}>🎯 Arendada</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.6rem',fontWeight:800,color:'rgba(255,255,255,.6)'}}>{tested.length}/{skills.length}</div>
              <div style={{fontSize:'.62rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em'}}>📊 Testitud</div>
            </div>
          </div>
        </div>
        {isTeacher&&(
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button onClick={()=>window.open('/haldus-skillmap/?student='+student.id,'_blank')}
              style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',color:'#fff',
                borderRadius:9,padding:'7px 13px',cursor:'pointer',fontSize:'.76rem',fontWeight:700,
                display:'flex',alignItems:'center',gap:6}}>
              ✏️ Muuda hindeid
            </button>
            <button onClick={()=>setShowAiGen(true)}
              style={{background:'#C9882A',border:'1px solid rgba(255,255,255,.2)',color:'#fff',
                borderRadius:9,padding:'7px 13px',cursor:'pointer',fontSize:'.76rem',fontWeight:700,
                display:'flex',alignItems:'center',gap:6}}>
              🤖 Genereeri komplekt
            </button>
          </div>
        )}
      </div>

      {!hasAnyData?(
        <div style={{textAlign:'center',padding:'20px 0',color:'rgba(255,255,255,.35)',fontSize:'.84rem'}}>
          {isTeacher?'Ava "Muuda hindeid" et lisada oskuste tulemused':'Oskuste hinded lisab õpetaja'}
        </div>
      ):(
        <div style={{display:'flex',gap:20,alignItems:'flex-start',flexWrap:'wrap'}}>
          {/* Radar */}
          <div style={{flexShrink:0}}>
            <svg width={260} height={260} viewBox="0 0 260 260">
              {gridPaths.map((d,gi)=><path key={gi} d={d} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="1"/>)}
              {cats.map((_,i)=>{const[x,y]=getPoint(i,R);return<line key={i} x1={CX} y1={CY} x2={x.toFixed(1)} y2={y.toFixed(1)} stroke="rgba(255,255,255,.07)" strokeWidth="1"/>;})};
              <path d={dataPath} fill={lc} fillOpacity=".3" stroke={lc} strokeWidth="2.5"/>
              {cats.map((cat,i)=>{
                const[x,y]=getPoint(i,R+18);
                const c=SM_CATS[cat];
                const anchor=x<CX-8?'end':x>CX+8?'start':'middle';
                return(
                  <g key={cat}>
                    <text x={x} y={y} fontSize="11" textAnchor={anchor} fill="rgba(255,255,255,.7)" fontFamily="IBM Plex Sans">{c.icon}</text>
                    <text x={x} y={y+12} fontSize="7.5" textAnchor={anchor} fill="rgba(255,255,255,.4)" fontFamily="IBM Plex Sans">{c.label}</text>
                  </g>
                );
              })}
              {dataPts.map(([x,y],i)=><circle key={i} cx={x.toFixed(1)} cy={y.toFixed(1)} r="4" fill={lc} stroke="rgba(255,255,255,.6)" strokeWidth="2"/>)}
            </svg>
          </div>
          {/* Skills list */}
          <div style={{flex:1,minWidth:180,display:'flex',flexDirection:'column',gap:6}}>
            {skills.map(sk=>{
              const score=skillMap[sk.id]??null;
              const stars=getStars(score);
              const st=getStatus(score);
              const cat=SM_CATS[sk.cat];
              const barW=score??0;
              return(
                <div key={sk.id} style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:'.72rem',minWidth:16}}>{cat.icon}</span>
                  <span style={{fontSize:'.76rem',fontWeight:600,color:'rgba(255,255,255,.8)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sk.name}</span>
                  <div style={{width:60,height:4,background:'rgba(255,255,255,.1)',borderRadius:2,flexShrink:0}}>
                    <div style={{width:barW+'%',height:'100%',borderRadius:2,background:statusColor[st]}}/>
                  </div>
                  <div style={{display:'flex',gap:1,flexShrink:0}}>
                    {[0,1,2].map(i=><span key={i} style={{fontSize:'.65rem',opacity:i<stars?1:.2}}>⭐</span>)}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Encouragement for student/parent */}
      {!isTeacher&&hasAnyData&&(
        <div style={{marginTop:14,display:'flex',gap:10,flexWrap:'wrap'}}>
          {strong.length>0&&(
            <div style={{flex:1,minWidth:140,padding:'10px 12px',background:'rgba(74,222,128,.1)',borderRadius:10,border:'1px solid rgba(74,222,128,.2)'}}>
              <div style={{fontSize:'.68rem',fontWeight:700,color:'#4ade80',marginBottom:5}}>💪 Tugevad oskused</div>
              {strong.slice(0,3).map(s=><div key={s.id} style={{fontSize:'.74rem',color:'rgba(255,255,255,.7)',marginBottom:2}}>✓ {s.name}</div>)}
            </div>
          )}
          {weak.length>0&&(
            <div style={{flex:1,minWidth:140,padding:'10px 12px',background:'rgba(251,146,60,.1)',borderRadius:10,border:'1px solid rgba(251,146,60,.2)'}}>
              <div style={{fontSize:'.68rem',fontWeight:700,color:'#fb923c',marginBottom:5}}>🎯 Harjuta rohkem</div>
              {weak.slice(0,3).map(s=><div key={s.id} style={{fontSize:'.74rem',color:'rgba(255,255,255,.7)',marginBottom:2}}>→ {s.name}</div>)}
            </div>
          )}
        </div>
      )}
    </div>
    {showAiGen&&<AIGeneratorModal student={student} skillMap={skillMap} level={level} skills={skills} user={user} onClose={()=>setShowAiGen(false)}/>}
    </React.Fragment>
  );
}
