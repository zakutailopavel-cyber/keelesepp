<body class="antialiased">
<div id="root">
    <div class="flex items-center justify-center min-h-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-600"></div>
    </div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const db = window._db;

const DAYS = [
    {id:'Mon',name:'Esmaspäev'},{id:'Tue',name:'Teisipäev'},{id:'Wed',name:'Kolmapäev'},
    {id:'Thu',name:'Neljapäev'},{id:'Fri',name:'Reede'},{id:'Sat',name:'Laupäev'},{id:'Sun',name:'Pühapäev'}
];
const TIMES = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];
const TEACHERS = ['Pavel','Jelena','Elizaveta','Angelina'];
const STUDENTS_DEMO = ['Marina','Aleksei','Olga','Dmitri','Natalia'];

// ── PROGRESSI GRAAFIK ────────────────────────────────────────
function ProgressChart({ data }) {
    const ref = useRef(null);
    useEffect(() => {
        if (!ref.current || !data.length) return;
        const sorted = [...data].sort((a,b) => new Date(a.date)-new Date(b.date));
        const ch = new Chart(ref.current.getContext('2d'), {
            type: 'line',
            data: {
                labels: sorted.map(d => d.date),
                datasets: [{
                    label: 'Hinne', data: sorted.map(d => d.grade),
                    borderColor:'#C9882A', backgroundColor:'rgba(201,136,42,0.05)',
                    borderWidth:3, tension:0.3, fill:true,
                    pointBackgroundColor:'#2F5D50', pointRadius:5
                }]
            },
            options: { responsive:true, maintainAspectRatio:false, scales:{ y:{ min:1, max:5, ticks:{stepSize:1} } } }
        });
        return () => ch.destroy();
    }, [data]);
    return <div className="h-64 w-full"><canvas ref={ref}></canvas></div>;
}

// ── PEAMINE APP ───────────────────────────────────────────────
function App() {
    const [user, setUser]       = useState(null);
    const [role, setRole]       = useState(null);
    const [uname, setUname]     = useState('');
    const [pass, setPass]       = useState('');
    const [err, setErr]         = useState('');
    const [tab, setTab]         = useState('dashboard');
    const [selStudent, setSelStudent] = useState(null);
    const [filterT, setFilterT] = useState('Pavel');
    const [modalEv, setModalEv] = useState(null);

    // Firestore data
    const [students,  setStudents]  = useState([]);
    const [lessons,   setLessons]   = useState([]);
    const [homeworks, setHomeworks] = useState([]);
    const [schedule,  setSchedule]  = useState([]);

    // Forms
    const [newName,  setNewName]  = useState('');
    const [newLevel, setNewLevel] = useState('A1');
    const [newTarget,setNewTarget]= useState('B1');
    const [newTeach, setNewTeach] = useState('Pavel');
    const [lTopic,   setLTopic]   = useState('');
    const [lGrade,   setLGrade]   = useState('5');
    const [lStatus,  setLStatus]  = useState('Toimunud');
    const [lComment, setLComment] = useState('');
    const [hwTask,   setHwTask]   = useState('');
    const [schSt,    setSchSt]    = useState('');
    const [schDay,   setSchDay]   = useState('Mon');
    const [schTime,  setSchTime]  = useState('09:00');
    const [schTeach, setSchTeach] = useState('Pavel');

    // ── SISSELOGIMINE ────────────────────────────────────────
    const login = () => {
        setErr('');
        if (TEACHERS.includes(uname) && pass === '1234') {
            setUser(uname); setRole('teacher');
            setFilterT(uname); setSchTeach(uname); setNewTeach(uname);
        } else if (STUDENTS_DEMO.includes(uname) && pass === '1234') {
            setUser(uname); setRole('student');
        } else {
            setErr('Vale kasutajatunnus või parool. Demo parool: 1234');
        }
    };

    // ── FIRESTORE KUULAMINE ──────────────────────────────────
    useEffect(() => {
        if (!user || !db) return;
        const u1 = db.collection('students').onSnapshot(s => {
            setStudents(s.docs.map(d => ({id:d.id,...d.data()})));
        });
        const u2 = db.collection('lessons').onSnapshot(s => {
            setLessons(s.docs.map(d => ({id:d.id,...d.data()})));
        });
        const u3 = db.collection('homework').onSnapshot(s => {
            setHomeworks(s.docs.map(d => ({id:d.id,...d.data()})));
        });
        const u4 = db.collection('schedule').onSnapshot(s => {
            setSchedule(s.docs.map(d => ({id:d.id,...d.data()})));
        });
        return () => { u1(); u2(); u3(); u4(); };
    }, [user]);

    // ── TEGEVUSED ────────────────────────────────────────────
    const addStudent = async () => {
        if (!newName.trim()) return;
        const teacher = user === 'Pavel' ? newTeach : user;
        await db.collection('students').add({
            name:newName, level:newLevel, targetLevel:newTarget,
            teacher, createdAt: new Date().toISOString()
        });
        setNewName('');
        alert('Õpilane lisatud!');
    };

    const addSchedule = async () => {
        if (!schSt) return;
        const teacher = user === 'Pavel' ? schTeach : user;
        await db.collection('schedule').add({ teacher, studentName:schSt, day:schDay, time:schTime });
        setSchSt('');
        alert('Tund märgitud!');
    };

    const saveLesson = async () => {
        if (!modalEv || !lTopic.trim()) return;
        const stu = students.find(s => s.name.toLowerCase() === modalEv.studentName.toLowerCase());
        const now = new Date();
        await db.collection('lessons').add({
            studentId: stu ? stu.id : 'ext',
            studentName: modalEv.studentName,
            topic: lTopic,
            grade: lStatus === 'Toimunud' ? parseInt(lGrade) : 0,
            status: lStatus,
            comment: lComment,
            date: now.toISOString().split('T')[0],
            submittedAt: now.toLocaleString('et-EE'),
            teacher: user
        });
        if (window.confirm('Kustuta see tund tunniplaanist?')) {
            await db.collection('schedule').doc(modalEv.id).delete();
        }
        setLTopic(''); setLComment(''); setModalEv(null);
        alert('Salvestatud!');
    };

    const addHw = async () => {
        if (!selStudent || !hwTask.trim()) return;
        await db.collection('homework').add({
            studentId: selStudent.id, task:hwTask,
            status:'Ootel', date: new Date().toISOString().split('T')[0]
        });
        setHwTask('');
        alert('Kodutöö saadetud!');
    };

    const toggleHw = async (id, cur) => {
        await db.collection('homework').doc(id).update({ status: cur === 'Tehtud' ? 'Ootel' : 'Tehtud' });
    };

    const delSchedule = async (id, e) => {
        e.stopPropagation();
        if (window.confirm('Kustuta tund?')) await db.collection('schedule').doc(id).delete();
    };

    // ── FILTRID ──────────────────────────────────────────────
    const myStudents = user === 'Pavel' ? students : students.filter(s => s.teacher === user);
    const filteredSch = role === 'teacher'
        ? (filterT === 'Kõik' ? schedule : schedule.filter(s => s.teacher === filterT))
        : schedule.filter(s => s.studentName.toLowerCase().includes(user?.toLowerCase() || ''));

    const currentStu = selStudent
        ? students.find(s => s.id === selStudent.id) || selStudent
        : role === 'student' ? students.find(s => s.name.toLowerCase() === user?.toLowerCase()) : null;

    const stuLessons  = currentStu ? lessons.filter(l => l.studentId === currentStu.id || l.studentName?.toLowerCase() === currentStu.name?.toLowerCase()) : [];
    const stuHw       = currentStu ? homeworks.filter(h => h.studentId === currentStu.id) : [];

    // ── LOGIN EKRAAN ─────────────────────────────────────────
    if (!user) return (
        <div className="min-h-screen flex items-center justify-center bg-[#FBFAF8] p-4">
            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8">
                <div className="text-center mb-7">
                    <div className="text-3xl font-bold mb-1" style={{fontFamily:"Fraunces,Georgia,serif"}}>
                        Keele<span style={{color:'#C9882A'}}>Sepp</span>
                    </div>
                    <div className="text-xs text-gray-400">Haldussüsteem</div>
                </div>

                <div className="space-y-3 mb-4">
                    <div>
                        <label className="text-xs font-semibold text-gray-400 block mb-1">KASUTAJANIMI</label>
                        <input value={uname} onChange={e=>setUname(e.target.value)}
                            onKeyDown={e=>e.key==='Enter'&&login()}
                            placeholder="nt. Pavel või Marina" />
                    </div>
                    <div>
                        <label className="text-xs font-semibold text-gray-400 block mb-1">PAROOL</label>
                        <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
                            onKeyDown={e=>e.key==='Enter'&&login()}
                            placeholder="••••" />
                    </div>
                    {err && <div className="text-xs text-red-500 bg-red-50 rounded-xl p-2.5">{err}</div>}
                </div>

                <button onClick={login}
                    className="w-full py-3 rounded-xl font-semibold text-white text-sm"
                    style={{background:'#1C2B3A'}}>
                    Sisene
                </button>
                <div className="mt-4 text-xs text-center text-gray-300">
                    Õpetajad: Pavel / Jelena / Elizaveta · Parool: <strong>1234</strong><br/>
                    Õpilane: Marina / Aleksei · Parool: <strong>1234</strong>
                </div>
            </div>
        </div>
    );

    // ── SIDEBAR ──────────────────────────────────────────────
    const Sidebar = () => (
        <aside className="w-full md:w-64 flex flex-col p-5 space-y-4" style={{background:'#1C2B3A',color:'#fff'}}>
            <div className="flex items-center justify-between border-b border-gray-700 pb-4">
                <span className="text-2xl font-bold" style={{fontFamily:"Fraunces,Georgia,serif"}}>
                    Keele<span style={{color:'#C9882A'}}>Sepp</span>
                </span>
                <span className="text-xs bg-gray-800 px-2 py-1 rounded text-amber-400 font-bold uppercase">
                    {role === 'teacher' ? 'Õpetaja' : 'Õpilane'}
                </span>
            </div>
            <div className="text-xs text-gray-400">
                Konto: <span className="font-semibold text-white block mt-0.5">{user}</span>
            </div>
            <nav className="flex-1 space-y-1">
                {[
                    {id:'dashboard', icon:'fa-chart-pie',     label:'Töölaud'},
                    {id:'calendar',  icon:'fa-calendar-days', label:'Tunniplaan'},
                    {id:'students',  icon:'fa-graduation-cap',label: role==='teacher' ? 'Õpilased' : 'Minu progress'},
                ].map(item => (
                    <button key={item.id}
                        onClick={() => { setTab(item.id); setSelStudent(null); }}
                        className={`w-full flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all text-left ${tab===item.id ? 'text-white shadow-md' : 'text-gray-300 hover:bg-slate-800'}`}
                        style={tab===item.id ? {background:'#C9882A'} : {}}>
                        <i className={`fa-solid ${item.icon} mr-3 w-5`}></i> {item.label}
                    </button>
                ))}
            </nav>
            <button onClick={() => { setUser(null); setRole(null); setTab('dashboard'); }}
                className="flex items-center px-4 py-3 rounded-xl text-sm text-red-400 hover:bg-slate-800 transition-colors">
                <i className="fa-solid fa-right-from-bracket mr-3"></i> Logi välja
            </button>
        </aside>
    );

    // ── TÖÖLAUD ──────────────────────────────────────────────
    const Dashboard = () => (
        <div className="space-y-6">
            <h1 className="text-3xl font-semibold">Tere, {user}!</h1>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <p className="text-xs font-semibold text-gray-400 uppercase mb-2">
                        {role==='teacher' ? 'Minu õpilased' : 'Minu tase'}
                    </p>
                    <p className="text-4xl font-bold" style={{color:'#1C2B3A'}}>
                        {role==='teacher' ? myStudents.length : (currentStu?.level || '—')}
                    </p>
                </div>
                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <p className="text-xs font-semibold text-gray-400 uppercase mb-2">Tunnid kokku</p>
                    <p className="text-4xl font-bold" style={{color:'#1C2B3A'}}>{lessons.length}</p>
                </div>
            </div>

            {role === 'teacher' && (
                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <h3 className="text-lg font-semibold mb-4">Lisa uus õpilane</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                        <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Õpilase täisnimi" />
                        <select value={newLevel} onChange={e=>setNewLevel(e.target.value)}>
                            {['A1','A2','B1','B2','C1'].map(l=><option key={l}>Hetketase: {l}</option>)}
                        </select>
                        <select value={newTarget} onChange={e=>setNewTarget(e.target.value)}>
                            {['A2','B1','B2','C1'].map(l=><option key={l}>Eesmärk: {l}</option>)}
                        </select>
                        {user === 'Pavel' && (
                            <select value={newTeach} onChange={e=>setNewTeach(e.target.value)}>
                                {TEACHERS.map(t=><option key={t}>Õpetaja: {t}</option>)}
                            </select>
                        )}
                    </div>
                    <button onClick={addStudent}
                        className="w-full py-3 rounded-xl text-white font-semibold text-sm"
                        style={{background:'#2F5D50'}}>
                        + Lisa õpilane andmebaasi
                    </button>
                </div>
            )}
        </div>
    );

    // ── TUNNIPLAAN ───────────────────────────────────────────
    const Calendar = () => (
        <div className="space-y-5">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <h1 className="text-3xl font-semibold">Tunniplaan</h1>
                {user === 'Pavel' && (
                    <select value={filterT} onChange={e=>setFilterT(e.target.value)}
                        className="w-auto">
                        {TEACHERS.map(t=><option key={t}>{t}</option>)}
                        <option value="Kõik">Kõik õpetajad</option>
                    </select>
                )}
            </div>

            {role === 'teacher' && (
                <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                    <p className="text-xs font-bold text-gray-400 uppercase mb-3">Broneeri uus tund</p>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                        <select value={schSt} onChange={e=>setSchSt(e.target.value)}>
                            <option value="">Vali õpilane…</option>
                            {myStudents.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
                        </select>
                        <select value={schDay} onChange={e=>setSchDay(e.target.value)}>
                            {DAYS.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
                        </select>
                        <select value={schTime} onChange={e=>setSchTime(e.target.value)}>
                            {TIMES.map(t=><option key={t} value={t}>{t}</option>)}
                        </select>
                        {user === 'Pavel' && (
                            <select value={schTeach} onChange={e=>setSchTeach(e.target.value)}>
                                {TEACHERS.map(t=><option key={t}>{t}</option>)}
                            </select>
                        )}
                    </div>
                    <button onClick={addSchedule}
                        className="w-full py-2.5 rounded-xl text-white font-semibold text-sm"
                        style={{background:'#2F5D50'}}>
                        + Kinnita tund
                    </button>
                </div>
            )}

            {/* Kalender grid */}
            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <div className="overflow-x-auto scroll">
                    <div className="min-w-[700px]">
                        {/* Header */}
                        <div className="grid border-b" style={{gridTemplateColumns:'70px repeat(7,1fr)',background:'#EFEDE7'}}>
                            <div className="p-3 text-xs font-bold text-center text-gray-500">Kell</div>
                            {DAYS.map(d=>(
                                <div key={d.id} className="p-3 text-xs font-bold text-center border-l border-gray-200">{d.name.slice(0,4)}</div>
                            ))}
                        </div>
                        {/* Rows */}
                        {TIMES.map(slot => (
                            <div key={slot} className="grid border-b border-gray-50" style={{gridTemplateColumns:'70px repeat(7,1fr)',minHeight:'60px'}}>
                                <div className="flex items-center justify-center text-xs font-mono text-gray-400 border-r border-gray-100 bg-gray-50/50">{slot}</div>
                                {DAYS.map(day => {
                                    const evs = filteredSch.filter(s => s.day===day.id && s.time===slot);
                                    return (
                                        <div key={day.id} className="p-1 border-l border-gray-100 flex flex-col gap-1">
                                            {evs.map(ev => (
                                                <div key={ev.id}
                                                    onClick={() => role==='teacher' && setModalEv(ev)}
                                                    className="text-xs p-1.5 rounded-lg cursor-pointer hover:opacity-80 transition-all"
                                                    style={{background:'rgba(47,93,80,0.08)',border:'1px solid rgba(47,93,80,0.2)'}}>
                                                    <div className="flex justify-between items-start">
                                                        <span className="font-semibold truncate">{ev.studentName}</span>
                                                        {role==='teacher' && (
                                                            <button onClick={e=>delSchedule(ev.id,e)}
                                                                className="text-gray-400 hover:text-red-500 ml-1 text-xs">✕</button>
                                                        )}
                                                    </div>
                                                    {filterT==='Kõik' && <span className="text-xs" style={{color:'#A96E1A'}}>{ev.teacher}</span>}
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </div>
    );

    // ── ÕPILASTE NIMEKIRI ────────────────────────────────────
    const StudentsList = () => (
        <div>
            <h1 className="text-3xl font-semibold mb-6">Minu õpilased</h1>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {myStudents.map(s => (
                    <div key={s.id} onClick={() => setSelStudent(s)}
                        className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm cursor-pointer hover:border-amber-400 transition-all">
                        <h3 className="text-lg font-semibold">{s.name}</h3>
                        <p className="text-xs text-gray-400 mt-1">{s.level} → {s.targetLevel}</p>
                        {user==='Pavel' && <p className="text-xs mt-1" style={{color:'#2F5D50'}}>Õp. {s.teacher}</p>}
                        <span className="text-xs font-semibold mt-3 inline-block" style={{color:'#C9882A'}}>Ava õpikaart →</span>
                    </div>
                ))}
                {myStudents.length === 0 && (
                    <div className="col-span-3 text-center py-12 text-gray-400 text-sm">
                        Õpilasi pole veel lisatud. Lisa töölaualt.
                    </div>
                )}
            </div>
        </div>
    );

    // ── ÕPILASE KAART ────────────────────────────────────────
    const StudentCard = () => {
        if (!currentStu) return <div className="text-gray-400 text-sm py-10 text-center">Õpilane ei leitud.</div>;
        const doneLessons = stuLessons.filter(l => l.status==='Toimunud');

        return (
            <div className="space-y-6">
                <div className="flex justify-between items-center bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <div>
                        <h2 className="text-2xl font-semibold">{currentStu.name}</h2>
                        <p className="text-sm text-gray-500 mt-1">
                            Õp. {currentStu.teacher} · {currentStu.level} → {currentStu.targetLevel}
                        </p>
                    </div>
                    {role==='teacher' && (
                        <button onClick={() => setSelStudent(null)}
                            className="text-sm bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-full font-medium">
                            ← Tagasi
                        </button>
                    )}
                </div>

                {/* Graafik */}
                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <h3 className="text-lg font-semibold mb-4">Progressi kõver</h3>
                    {doneLessons.length > 0
                        ? <ProgressChart data={doneLessons} />
                        : <p className="text-sm text-gray-400 text-center py-8">Tunnid puuduvad veel.</p>
                    }
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    {/* Kodutöö */}
                    <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <h3 className="text-lg font-semibold mb-4">
                            <i className="fa-solid fa-book mr-2" style={{color:'#C9882A'}}></i>Kodutööd
                        </h3>
                        {role==='teacher' && (
                            <div className="flex gap-2 mb-4">
                                <input value={hwTask} onChange={e=>setHwTask(e.target.value)} placeholder="Uus ülesanne…" className="flex-1" />
                                <button onClick={addHw}
                                    className="px-4 py-2 rounded-xl text-white text-sm font-semibold"
                                    style={{background:'#2F5D50'}}>
                                    Saada
                                </button>
                            </div>
                        )}
                        <div className="space-y-2">
                            {stuHw.map(hw => (
                                <div key={hw.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
                                    <div>
                                        <p className="text-sm font-medium">{hw.task}</p>
                                        <span className="text-xs text-gray-400">{hw.date}</span>
                                    </div>
                                    <button onClick={() => toggleHw(hw.id, hw.status)}
                                        className={`px-3 py-1.5 rounded-lg text-xs font-bold ${hw.status==='Tehtud' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100'}`}
                                        style={hw.status!=='Tehtud' ? {color:'#A96E1A'} : {}}>
                                        {hw.status==='Tehtud' ? '✓ Tehtud' : 'Ootel'}
                                    </button>
                                </div>
                            ))}
                            {stuHw.length===0 && <p className="text-xs text-gray-400 text-center py-4">Kodutöid pole.</p>}
                        </div>
                    </div>

                    {/* Tunni päevik */}
                    <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <h3 className="text-lg font-semibold mb-4">
                            <i className="fa-solid fa-pen-to-square mr-2" style={{color:'#2F5D50'}}></i>Tunni päevik
                        </h3>
                        <div className="space-y-3 max-h-96 overflow-y-auto scroll">
                            {stuLessons.length===0
                                ? <p className="text-xs text-gray-400 text-center py-4">Tunnid puuduvad.</p>
                                : [...stuLessons].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l => {
                                    const badgeMap = {
                                        Toimunud:   {cls:'bg-emerald-50 text-emerald-800 border-emerald-100', txt:'Toimunud'},
                                        Puudus_p:   {cls:'bg-blue-50 text-blue-800 border-blue-100',          txt:'Puudus (põhjusega)'},
                                        Puudus_eta: {cls:'bg-red-50 text-red-800 border-red-100',             txt:'Puudus (põhjuseta)'},
                                    };
                                    const b = badgeMap[l.status] || badgeMap.Toimunud;
                                    return (
                                        <div key={l.id} className="border-b border-gray-100 pb-3 flex gap-3 last:border-0">
                                            <span className="w-10 h-10 flex items-center justify-center rounded-xl font-bold text-lg border"
                                                style={{background:'#FBFAF8',color:'#A96E1A',borderColor:'#f0e4cc'}}>
                                                {l.status==='Toimunud' ? l.grade : '—'}
                                            </span>
                                            <div className="flex-1">
                                                <div className="flex items-center justify-between gap-2">
                                                    <span className="text-sm font-semibold">{l.topic}</span>
                                                    <span className={`text-xs font-bold px-2 py-0.5 rounded border ${b.cls}`}>{b.txt}</span>
                                                </div>
                                                {l.comment && <p className="text-xs text-gray-500 mt-0.5">{l.comment}</p>}
                                                <div className="flex justify-between text-xs text-gray-400 mt-1">
                                                    <span>Õp. {l.teacher}</span>
                                                    <span>{l.submittedAt || l.date}</span>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })
                            }
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // ── TUNNI MODAL ──────────────────────────────────────────
    const LessonModal = () => (
        <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50">
            <div className="bg-white p-6 rounded-2xl border max-w-lg w-full shadow-2xl relative">
                <button onClick={() => setModalEv(null)}
                    className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-lg">✕</button>
                <h2 className="text-xl font-semibold mb-1">Tunni aruanne</h2>
                <p className="text-sm text-gray-500 mb-4">
                    Õpilane: <strong>{modalEv.studentName}</strong> · {modalEv.time}
                </p>
                <div className="space-y-3">
                    <input value={lTopic} onChange={e=>setLTopic(e.target.value)} placeholder="Tunni teema *" />
                    <div className="grid grid-cols-2 gap-3">
                        <select value={lGrade} onChange={e=>setLGrade(e.target.value)} disabled={lStatus!=='Toimunud'}>
                            <option value="5">5 — Suurepärane</option>
                            <option value="4">4 — Hea</option>
                            <option value="3">3 — Rahuldav</option>
                            <option value="2">2 — Puudulik</option>
                        </select>
                        <select value={lStatus} onChange={e=>setLStatus(e.target.value)}>
                            <option value="Toimunud">Toimunud</option>
                            <option value="Puudus_p">Puudus põhjusega</option>
                            <option value="Puudus_eta">Puudus põhjuseta</option>
                        </select>
                    </div>
                    <textarea value={lComment} onChange={e=>setLComment(e.target.value)}
                        placeholder="Õpetaja kommentaar…" rows={3} />
                    <button onClick={saveLesson}
                        className="w-full py-3 rounded-xl text-white font-semibold"
                        style={{background:'#1C2B3A'}}>
                        Salvesta päevikusse
                    </button>
                </div>
            </div>
        </div>
    );

    // ── PEAMINE RENDER ───────────────────────────────────────
    return (
        <div className="min-h-screen flex flex-col md:flex-row">
            <Sidebar />
            <main className="flex-1 p-5 md:p-8 overflow-y-auto scroll" style={{background:'#FBFAF8'}}>
                {tab==='dashboard' && <Dashboard />}
                {tab==='calendar'  && <Calendar />}
                {tab==='students'  && role==='teacher' && !selStudent && <StudentsList />}
                {tab==='students'  && role==='teacher' && selStudent  && <StudentCard />}
                {tab==='students'  && role==='student'               && <StudentCard />}
            </main>
            {modalEv && <LessonModal />}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
