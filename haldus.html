window.__haldusLastError = '';
window.addEventListener('error', function(event){
  var message = event && event.message ? event.message : 'Unknown error';
  var source = event && event.filename ? event.filename : '';
  window.__haldusLastError = source ? (message + ' @ ' + source) : message;
});
window.addEventListener('unhandledrejection', function(event){
  var reason = event && event.reason;
  if(!reason){
    window.__haldusLastError = 'Unhandled promise rejection';
    return;
  }
  if(typeof reason === 'string'){
    window.__haldusLastError = reason;
    return;
  }
  if(reason && reason.message){
    window.__haldusLastError = reason.message;
    return;
  }
  try{
    window.__haldusLastError = JSON.stringify(reason);
  }catch(e){
    window.__haldusLastError = 'Unhandled promise rejection';
  }
});

<script type="text/babel" data-presets="haldus-react">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const db   = window._db;
const auth = window._auth;

// ── KONSTANTID ───────────────────────────────────────────────
const TEACHER_CODE = 'KS2026';
const ADMIN_CODE   = 'KSADMIN2026';
const LEVELS   = ['A1','A2','B1','B2','C1'];
const TEACHERS = ['Pavel','Jelena','Elizaveta','Angelina'];
const PAYMENT_METHODS = [
  {id:'bank', label:'Pangaülekanne'},
  {id:'cash', label:'Sularaha'},
  {id:'other', label:'Kokkuleppel'}
];
const PAYMENT_DETAILS = {
  company:'E&P Kooitus OÜ',
  regCode:'17270880',
  address:'Harju maakond, Saue vald, Laagri alevik, Nõlvaku põik 3b, 76401',
  iban:'EE917700771011885682',
  bank:'LHV Pank AS',
  swift:'LHVBEE22',
  paymentTermDays:5,
  lateFeePerDay:'0.0%',
  issuer:'Pavel Zakutailo'
};
const CONTACT_STATUSES = [
  {id:'new', label:'Uus'},
  {id:'contacted', label:'Võetud ühendust'},
  {id:'waiting', label:'Ootab vastust'},
  {id:'scheduled', label:'Tund kokku lepitud'},
  {id:'active', label:'Aktiivne õpilane'},
];
const normalizeText = value => (value || '').trim().toLowerCase();
const parseLinkedNames = value =>
  String(value || '')
    .split(/[,\n;|]+/)
    .map(part => normalizeText(part))
    .filter(Boolean);
const canonicalTeacherName = value => {
  const name = (value || '').trim();
  if(!name) return '';
  const lower = name.toLowerCase();
  const matched = TEACHERS.find(t => lower === t.toLowerCase() || lower.startsWith(t.toLowerCase() + ' '));
  return matched || name;
};
const DAYS_SHORT = ['E','T','K','N','R','L','P'];
const DAYS_ID    = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_FULL  = ['Esmaspäev','Teisipäev','Kolmapäev','Neljapäev','Reede','Laupäev','Pühapäev'];
const TIMES = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];

// ── UTIL ─────────────────────────────────────────────────────
const levelPct = (cur,tgt) => { const c=LEVELS.indexOf(cur),t=LEVELS.indexOf(tgt); return t>0&&c<t?Math.round(c/t*100):c>=t?100:0; };
const avg = arr => arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):'—';
const fmtDate = d => d?new Date(d).toLocaleDateString('et-EE',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
const toLocalISODate = value => {
  const d = value ? new Date(value) : new Date();
  const year = d.getFullYear();
  const month = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${year}-${month}-${day}`;
};
const today = () => toLocalISODate();
const pkgLeft = s => (s.packageTotal||0)-(s.packageUsed||0);
const copyText = async text => {
  try{
    if(navigator.clipboard?.writeText){
      await navigator.clipboard.writeText(String(text));
      return true;
    }
  }catch(e){}
  try{
    const area = document.createElement('textarea');
    area.value = String(text);
    area.setAttribute('readonly','');
    area.style.position = 'absolute';
    area.style.left = '-9999px';
    document.body.appendChild(area);
    area.select();
    document.execCommand('copy');
    document.body.removeChild(area);
    return true;
  }catch(e){
    return false;
  }
};

async function ensureStudentRecord(authUser, profile){
  if(!authUser || profile?.role!=='student') return;
  const name = profile.displayName || authUser.displayName || authUser.email || 'Õpilane';
  const email = profile.email || authUser.email || '';
  const existing = await db.collection('students').where('linkedUserId','==',authUser.uid).limit(1).get();
  if(!existing.empty) return;
  await db.collection('students').add({
    linkedUserId: authUser.uid,
    name,
    email,
    phone:'',
    level:'A1',
    targetLevel:'A2',
    teacher:'',
    active:true,
    packageTotal:0,
    packageUsed:0,
    subject:'Eesti keel',
    grade:'',
    group:'',
    registrationSource:'self-service',
    profileStatus:'new',
    contactStatus:'new',
    contactOwner:'',
    contactLastAt:'',
    contactNotes:'',
    createdAt:today()
  });
}

async function ensureParentStudentRecords(authUser, profile){
  if(!authUser || profile?.role!=='parent') return;
  const linkedNames = parseLinkedNames(profile.childName);
  if(linkedNames.length===0) return;

  const existingSnap = await db.collection('students').where('linkedParentId','==',authUser.uid).get();
  const existingNames = new Set(existingSnap.docs.map(doc => normalizeText(doc.data().name)));
  const parentDisplayName = profile.displayName || authUser.displayName || profile.email || authUser.email || 'Lapsevanem';
  const parentEmail = profile.email || authUser.email || '';
  const preferredTeacher = canonicalTeacherName(profile.preferredTeacher || 'Pavel');

  for(const childName of linkedNames){
    if(existingNames.has(childName)) continue;
    const label = childName
      .split(' ')
      .filter(Boolean)
      .map(part => part.charAt(0).toUpperCase() + part.slice(1))
      .join(' ');

    await db.collection('students').add({
      linkedParentId: authUser.uid,
      parentName: parentDisplayName,
      parentEmail,
      name: label || 'Õpilane',
      email:'',
      phone:'',
      level:'A1',
      targetLevel:'A2',
      teacher:preferredTeacher,
      active:true,
      packageTotal:0,
      packageUsed:0,
      subject:'Eesti keel',
      grade:'',
      group:'',
      registrationSource:'parent-self-service',
      profileStatus:'new',
      contactStatus:'new',
      contactOwner:preferredTeacher,
      contactLastAt:'',
      contactNotes:'Loodud lapsevanema konto registreerimisel',
      createdAt:today()
    });
  }
}

// ── PROGRESSIGRAAFIK ─────────────────────────────────────────
function ProgressChart({data}) {
  const ref = useRef(null);
  useEffect(()=>{
    if(!ref.current||data.length<2) return;
    const sorted=[...data].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const ch=new Chart(ref.current.getContext('2d'),{
      type:'line',
      data:{labels:sorted.map(d=>fmtDate(d.date)),datasets:[{
        data:sorted.map(d=>d.grade),borderColor:'#C9882A',backgroundColor:'rgba(201,136,42,0.07)',
        borderWidth:2.5,tension:0.4,fill:true,pointBackgroundColor:'#2F5D50',pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:5
      }]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{min:1,max:5,ticks:{stepSize:1}},x:{grid:{display:false}}}}
    });
    return ()=>ch.destroy();
  },[data]);
  if(data.length<2) return <div style={{textAlign:'center',padding:'30px 0',color:'#42536A',fontSize:'.88rem'}}>Graafiku jaoks vajatakse vähemalt 2 tundi ✨</div>;
  return <div style={{height:200}}><canvas ref={ref}/></div>;
}

// ── AUTH SCREEN ───────────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [mode,setMode]   = useState('login');
  const [role,setRole]   = useState('parent');
  const [name,setName]   = useState('');
  const [email,setEmail] = useState('');
  const [pass,setPass]   = useState('');
  const [pass2,setPass2] = useState('');
  const [child,setChild] = useState('');
  const [parentTeacher,setParentTeacher] = useState('Pavel');
  const [code,setCode]   = useState('');
  const [err,setErr]     = useState('');
  const [info,setInfo]   = useState('');
  const [busy,setBusy]   = useState(false);
  const reset = m=>{setMode(m);setErr('');setInfo('');setPass('');setPass2('');};

  const googleLogin = async()=>{
    setErr('');setBusy(true);
    try{
      const res=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      const u=res.user;
      const snap=await db.collection('users').doc(u.uid).get();
      if(snap.exists){
        const profile = {uid:u.uid,displayName:u.displayName,email:u.email,...snap.data()};
        await ensureStudentRecord(u, profile);
        await ensureParentStudentRecords(u, profile);
        onLogin(profile);
      }
      else{
        const ud={role:'parent',displayName:u.displayName,email:u.email,childName:'',preferredTeacher:'Pavel',createdAt:today()};
        await db.collection('users').doc(u.uid).set(ud);
        await ensureParentStudentRecords(u, {uid:u.uid,...ud});
        onLogin({uid:u.uid,...ud});
      }
    }catch(e){setErr('Google sisselogimine ebaõnnestus.');}
    setBusy(false);
  };

  const emailLogin = async()=>{
    if(!email||!pass){setErr('Täida kõik väljad');return;}
    setErr('');setBusy(true);
    try{
      const res=await auth.signInWithEmailAndPassword(email,pass);
      const snap=await db.collection('users').doc(res.user.uid).get();
      if(snap.exists){
        const profile = {uid:res.user.uid,displayName:res.user.displayName||email,...snap.data()};
        await ensureStudentRecord(res.user, profile);
        await ensureParentStudentRecords(res.user, profile);
        onLogin(profile);
      }
      else onLogin({uid:res.user.uid,displayName:res.user.displayName||email,email,role:'parent'});
    }catch(e){
      const m={'auth/user-not-found':'Kasutajat ei leitud','auth/wrong-password':'Vale parool','auth/invalid-credential':'Vale e-post või parool'};
      setErr(m[e.code]||e.message);
    }
    setBusy(false);
  };

  const register = async()=>{
    if(!name.trim()||!email.trim()||!pass){setErr('Täida kõik kohustuslikud väljad');return;}
    if(pass!==pass2){setErr('Paroolid ei ühti');return;}
    if(pass.length<6){setErr('Parool peab olema vähemalt 6 tähemärki');return;}
    if(role==='teacher'&&code!==TEACHER_CODE){setErr('Vale õpetaja kutse-kood.');return;}
    if(role==='admin'&&code!==ADMIN_CODE){setErr('Vale administraatori kutse-kood.');return;}
    setErr('');setBusy(true);
    try{
      const res=await auth.createUserWithEmailAndPassword(email,pass);
      await res.user.updateProfile({displayName:name});
      const ud={role,displayName:name,email,childName:role==='parent'?child:'',preferredTeacher:role==='parent'?parentTeacher:'',createdAt:today()};
      await db.collection('users').doc(res.user.uid).set(ud);
      await ensureStudentRecord(res.user, ud);
      await ensureParentStudentRecords(res.user, ud);
      onLogin({uid:res.user.uid,...ud});
    }catch(e){
      const m={'auth/email-already-in-use':'See e-post on juba registreeritud','auth/invalid-email':'Vigane e-post'};
      setErr(m[e.code]||e.message);
    }
    setBusy(false);
  };

  const forgot = async()=>{
    if(!email){setErr('Sisesta oma e-posti aadress');return;}
    setBusy(true);
    try{await auth.sendPasswordResetEmail(email);setInfo('Taastamislink saadetud aadressile '+email);setErr('');}
    catch(e){setErr(e.message);}
    setBusy(false);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16,
      background:'linear-gradient(135deg,#1C2B3A 0%,#2F5D50 100%)'}}>
      <div style={{background:'#FBFAF8',borderRadius:24,padding:'40px 36px',width:'100%',maxWidth:420,boxShadow:'0 32px 80px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'2rem',fontWeight:600}}>
            Keele<span style={{color:'#C9882A'}}>Sepp</span>
          </div>
          <div style={{fontSize:'.82rem',color:'#42536A',marginTop:4}}>
            {mode==='login'?'Sisselogimine':mode==='register'?'Uue konto loomine':'Parooli taastamine'}
          </div>
        </div>

        {mode==='register'&&(
          <div style={{display:'flex',background:'#EFEDE7',borderRadius:12,padding:4,marginBottom:20,gap:3}}>
            {[{id:'parent',l:'👨‍👩‍👧 Lapsevanem'},{id:'student',l:'🎓 Õpilane'},{id:'teacher',l:'📚 Õpetaja'},{id:'admin',l:'🛠️ Admin'}].map(r=>(
              <button key={r.id} onClick={()=>setRole(r.id)}
                style={{flex:1,padding:'8px 4px',borderRadius:9,border:'none',cursor:'pointer',fontWeight:600,fontSize:'.78rem',
                  background:role===r.id?'#1C2B3A':'transparent',color:role===r.id?'#fff':'#42536A'}}>
                {r.l}
              </button>
            ))}
          </div>
        )}

        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
          {mode==='register'&&<input value={name} onChange={e=>setName(e.target.value)} placeholder="Täisnimi *"/>}
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&mode==='login'&&emailLogin()}
            placeholder="E-posti aadress *"/>
          {mode!=='forgot'&&<input type="password" value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&mode==='login'&&emailLogin()}
            placeholder="Parool *"/>}
          {mode==='register'&&<>
            <input type="password" value={pass2} onChange={e=>setPass2(e.target.value)} placeholder="Korda parooli *"/>
            {role==='parent'&&<>
              <input value={child} onChange={e=>setChild(e.target.value)} placeholder="Lapse nimi"/>
              <select value={parentTeacher} onChange={e=>setParentTeacher(e.target.value)}>
                {TEACHERS.map(t=><option key={t} value={t}>Õpetaja: {t}</option>)}
              </select>
            </>}
            {(role==='teacher'||role==='admin')&&<input value={code} onChange={e=>setCode(e.target.value)} placeholder={role==='admin'?'Administraatori kutse-kood *':'Õpetaja kutse-kood *'}/>}
          </>}
        </div>

        {err&&<div style={{background:'#fee2e2',color:'#991b1b',borderRadius:10,padding:'10px 14px',fontSize:'.84rem',marginBottom:14}}>{err}</div>}
        {info&&<div style={{background:'#dcfce7',color:'#166534',borderRadius:10,padding:'10px 14px',fontSize:'.84rem',marginBottom:14}}>{info}</div>}

        {mode==='login'&&<button onClick={emailLogin} disabled={busy} className="btn btn-dark" style={{width:'100%',marginBottom:10,borderRadius:12,padding:'13px'}}>{busy?'Laeb…':'Sisene e-postiga'}</button>}
        {mode==='register'&&<button onClick={register} disabled={busy} className="btn btn-dark" style={{width:'100%',marginBottom:10,borderRadius:12,padding:'13px'}}>{busy?'Laeb…':'Loo konto'}</button>}
        {mode==='forgot'&&<button onClick={forgot} disabled={busy} className="btn btn-pine" style={{width:'100%',marginBottom:10,borderRadius:12,padding:'13px'}}>{busy?'Laeb…':'Saada taastamislink'}</button>}

        <button onClick={googleLogin} disabled={busy}
          style={{width:'100%',padding:'12px',borderRadius:12,border:'1.5px solid rgba(28,43,58,.15)',background:'#fff',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontWeight:600,fontSize:'.9rem'}}>
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
            <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
            <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
            <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
          </svg>
          {mode==='register'?'Registreeru Google\'iga':'Sisene Google\'iga'}
        </button>

        <div style={{marginTop:20,textAlign:'center',fontSize:'.82rem',color:'#42536A'}}>
          {mode==='login'&&<>
            <span>Pole kontot? </span>
            <button onClick={()=>reset('register')} style={{color:'#C9882A',fontWeight:700,background:'none',border:'none',cursor:'pointer'}}>Registreeru</button>
            <span style={{color:'#d1d5db'}}> · </span>
            <button onClick={()=>reset('forgot')} style={{color:'#42536A',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Unustasid parooli?</button>
          </>}
          {mode!=='login'&&<button onClick={()=>reset('login')} style={{color:'#C9882A',fontWeight:700,background:'none',border:'none',cursor:'pointer'}}>← Tagasi sisselogimisele</button>}
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD ────────────────────────────────────────────────
// TÄHTIS: kõik komponendid on App-ist VÄLJAS — see lahendab "iga täht uuendab lehte" probleemi
function Dashboard({user,myStudents,lessons,schedule,invoices,homework,
  nName,setNName,nEmail,setNEmail,nPhone,setNPhone,
  nLevel,setNLevel,nTarget,setNTarget,nPkg,setNPkg,
  nSubject,setNSubject,nGrade,setNGrade,nGroup,setNGroup,
  nTeach,setNTeach,addStudent,isAdmin,isStaff}) {
  const unpaidAmt = invoices.filter(i=>i.status==='Ootel').reduce((a,i)=>a+i.amount,0);
  const pendingHw = homework.filter(h=>h.status==='Ootel'&&myStudents.some(s=>s.id===h.studentId)).length;
  const todaySch  = schedule.filter(s=>canonicalTeacherName(s.teacher)===canonicalTeacherName(user.displayName)).length;
  const currentStu= !isStaff?myStudents[0]:null;
  const doneLess  = currentStu?lessons.filter(l=>(l.studentId===currentStu.id||l.studentName?.toLowerCase()===currentStu.name?.toLowerCase())&&l.status==='Toimunud'):[];
  const stuLessons= currentStu?lessons.filter(l=>l.studentId===currentStu.id||l.studentName?.toLowerCase()===currentStu.name?.toLowerCase()):[];
  const linkedStudentNames = myStudents.map(s=>normalizeText(s.name));
  const visibleLessons = isStaff
    ? lessons
    : lessons.filter(l=>
        myStudents.some(s=>s.id===l.studentId) ||
        linkedStudentNames.includes(normalizeText(l.studentName))
      );
  const attendance= stuLessons.length?Math.round(doneLess.length/stuLessons.length*100):0;

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:24}}>
      <div>
        <h1 style={{fontSize:'1.7rem'}}>Tere, {user.displayName}! 👋</h1>
        <div style={{color:'#42536A',fontSize:'.88rem',marginTop:4}}>
          {new Date().toLocaleDateString('et-EE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(155px,1fr))',gap:12}}>
        {isStaff?
          [{l:'Õpilased',v:myStudents.filter(s=>s.active!==false).length,icon:'fa-users',c:'#2F5D50'},
           {l:'Tunde täna',v:todaySch,icon:'fa-clock',c:'#C9882A'},
           {l:'Maksmata',v:unpaidAmt+'€',icon:'fa-euro-sign',c:'#dc2626'},
           {l:'Kodutööd ootel',v:pendingHw,icon:'fa-book-open',c:'#7c3aed'}].map(s=>(
            <div key={s.l} className="card" style={{padding:'18px 20px'}}>
              <div style={{width:34,height:34,borderRadius:10,background:s.c+'18',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:8}}>
                <i className={`fa-solid ${s.icon}`} style={{color:s.c,fontSize:'.85rem'}}/>
              </div>
              <div style={{fontSize:'1.8rem',fontWeight:700,color:'#1C2B3A',lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:'.75rem',color:'#42536A',marginTop:4}}>{s.l}</div>
            </div>
          )):
          currentStu?
          [{l:'Keeletase',v:currentStu.level,c:'#1C2B3A'},
           {l:'Ksk hinne',v:avg(doneLess.map(l=>l.grade))+'★',c:'#C9882A'},
           {l:'Kohalolu',v:attendance+'%',c:'#2F5D50'},
           {l:'Tunnid kokku',v:doneLess.length,c:'#7c3aed'}].map(s=>(
            <div key={s.l} className="card" style={{padding:'18px 20px'}}>
              <div style={{fontSize:'1.8rem',fontWeight:700,color:s.c,lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:'.75rem',color:'#42536A',marginTop:4}}>{s.l}</div>
            </div>
          )):null
        }
      </div>

      {isStaff&&(
        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>➕ Lisa uus õpilane</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(185px,1fr))',gap:10,marginBottom:12}}>
            <input value={nName}  onChange={e=>setNName(e.target.value)}  placeholder="Täisnimi *"/>
            <input value={nEmail} onChange={e=>setNEmail(e.target.value)} type="email" placeholder="E-post"/>
            <input value={nPhone} onChange={e=>setNPhone(e.target.value)} placeholder="Telefon +372…"/>
            <select value={nLevel}  onChange={e=>setNLevel(e.target.value)}>{LEVELS.map(l=><option key={l} value={l}>Tase: {l}</option>)}</select>
            <select value={nTarget} onChange={e=>setNTarget(e.target.value)}>{LEVELS.slice(1).map(l=><option key={l} value={l}>Siht: {l}</option>)}</select>
            <select value={nSubject} onChange={e=>setNSubject(e.target.value)}>
              <option value="Eesti keel">Eesti keel</option>
              <option value="Inglise keel">Inglise keel</option>
              <option value="Muu">Muu</option>
            </select>
            <select value={nGrade} onChange={e=>setNGrade(e.target.value)}>
              <option value="">Klass / vanus (valikuline)</option>
              {["1. klass","2. klass","3. klass","4. klass","5. klass","6. klass","7. klass","8. klass","9. klass","10. klass","11. klass","12. klass","Täiskasvanu"].map(g=><option key={g} value={g}>{g}</option>)}
            </select>
            <input value={nGroup} onChange={e=>setNGroup(e.target.value)} placeholder="Grupp (nt. A2 õhtu / 7. klass)"/>
            <input value={nPkg} onChange={e=>setNPkg(e.target.value)} type="number" placeholder="Paketi maht (nt. 10)"/>
            {(isAdmin||user.role==='admin')&&<select value={nTeach} onChange={e=>setNTeach(e.target.value)}>{TEACHERS.map(t=><option key={t} value={t}>Õp: {t}</option>)}</select>}
          </div>
          <button onClick={addStudent} className="btn btn-pine" style={{width:'100%'}}>
            <i className="fa-solid fa-user-plus"/> Lisa õpilane
          </button>
        </div>
      )}

      <div className="card" style={{padding:24}}>
        <h3 style={{marginBottom:16}}>🕐 Viimased tunnid</h3>
        {visibleLessons.length===0
          ?<div style={{textAlign:'center',padding:'24px 0',color:'#42536A',fontSize:'.88rem'}}>Tunnid puuduvad.</div>
          :[...visibleLessons].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).map(l=>(
            <div key={l.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 0',borderBottom:'1px solid rgba(28,43,58,.06)'}}>
              <div style={{width:38,height:38,borderRadius:10,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
                fontWeight:700,background:l.status==='Toimunud'?'rgba(201,136,42,.1)':'rgba(239,68,68,.08)',
                color:l.status==='Toimunud'?'#C9882A':'#dc2626'}}>
                {l.status==='Toimunud'?l.grade:'—'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.topic}</div>
                <div style={{fontSize:'.75rem',color:'#42536A'}}>{l.studentName} · {fmtDate(l.date)}</div>
              </div>
              <div style={{fontSize:'.75rem',color:'#42536A',flexShrink:0}}>{l.teacher}</div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── TUNNIPLAAN ────────────────────────────────────────────────
function CalendarView({user,myStudents,schedule,isAdmin,filterT,setFilterT,
  schStu,setSchStu,schDate,setSchDate,schTime,setSchTime,schTeach,setSchTeach,
  schRecurring,setSchRecurring,addSchedule,setModalEv,delSchedule}) {

  const [showCanceled,setShowCanceled] = React.useState(true);
  const [weekOffset,setWeekOffset]     = React.useState(0);
  const canManage = user.role==="teacher" || user.role==="admin";

  // Вычисляем начало недели
  const weekStart = React.useMemo(()=>{
    const now = new Date();
    const day = now.getDay();
    const diff = day===0 ? -6 : 1-day;
    const mon = new Date(now);
    mon.setDate(now.getDate()+diff+(weekOffset*7));
    mon.setHours(0,0,0,0);
    return mon;
  },[weekOffset]);

  const weekDays = React.useMemo(()=>
    Array.from({length:7},(_,i)=>{
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate()+i);
      const iso = toLocalISODate(d);
      const jsDay = d.getDay();
      const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
      return {
        short: ["P","E","T","K","N","R","L"][jsDay],
        full:  ["Pühapäev","Esmaspäev","Teisipäev","Kolmapäev","Neljapäev","Reede","Laupäev"][jsDay],
        iso, dayId,
        label: d.toLocaleDateString("et-EE",{day:"2-digit",month:"2-digit"}),
        isToday: iso===today()
      };
    })
  ,[weekStart]);

  const weekLabel = React.useMemo(()=>{
    const e = new Date(weekStart); e.setDate(weekStart.getDate()+6);
    return weekStart.toLocaleDateString("et-EE",{day:"2-digit",month:"short"})
      +" – "+e.toLocaleDateString("et-EE",{day:"2-digit",month:"short",year:"numeric"});
  },[weekStart]);

  const STATUS_META = {
    Planeeritud: {bg:"rgba(47,93,80,.09)",border:"rgba(47,93,80,.2)",hover:"rgba(47,93,80,.18)",pill:"rgba(47,93,80,.14)",pillC:"#2F5D50",dot:"#2F5D50"},
    Nihutatud:   {bg:"rgba(201,136,42,.09)",border:"rgba(201,136,42,.25)",hover:"rgba(201,136,42,.18)",pill:"rgba(201,136,42,.14)",pillC:"#A96E1A",dot:"#C9882A"},
    Tühistatud:  {bg:"rgba(239,68,68,.07)",border:"rgba(239,68,68,.18)",hover:"rgba(239,68,68,.12)",pill:"rgba(239,68,68,.1)",pillC:"#991b1b",dot:"#ef4444"},
    Toimunud:    {bg:"rgba(28,43,58,.06)",border:"rgba(28,43,58,.14)",hover:"rgba(28,43,58,.1)",pill:"rgba(28,43,58,.08)",pillC:"#42536A",dot:"#1C2B3A"},
  };

  const filteredSch = React.useMemo(()=>{
    const linkedStudentNames = myStudents.map(s=>normalizeText(s.name));
    let list = canManage
      ?(filterT==="Kõik"||!filterT?schedule:schedule.filter(s=>canonicalTeacherName(s.teacher)===canonicalTeacherName(filterT)))
      :schedule.filter(s=>linkedStudentNames.includes(normalizeText(s.studentName)));
    if(!showCanceled) list=list.filter(s=>s.status!=="Tühistatud");
    return list;
  },[schedule,myStudents,filterT,showCanceled,canManage]);

  const getEventsForSlot = (slot, day) =>
    filteredSch.filter(s=>{
      if(s.time!==slot) return false;
      if(s.recurring && s.startDate && day.iso < s.startDate) return false;
      if(s.date) return s.date===day.iso;
      return s.day===day.dayId;
    });

  return(
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Заголовок */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:"1.7rem"}}>Tunniplaan</h1>
          <div style={{fontSize:".85rem",color:"#42536A",marginTop:4}}>Nädal: {weekLabel}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {isAdmin&&(
            <select value={filterT} onChange={e=>setFilterT(e.target.value)} style={{width:"auto",minWidth:160}}>
              {["Pavel","Jelena","Elizaveta","Angelina"].map(t=><option key={t}>{t}</option>)}
              <option value="Kõik">Kõik õpetajad</option>
            </select>
          )}
          <label style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:"#fff",borderRadius:10,border:"1px solid rgba(28,43,58,.12)",cursor:"pointer",fontSize:".82rem",fontWeight:500}}>
            <input type="checkbox" checked={showCanceled} onChange={e=>setShowCanceled(e.target.checked)} style={{width:"auto",padding:0,border:"none!important",boxShadow:"none!important"}}/>
            Näita tühistatud
          </label>
          <button onClick={()=>setWeekOffset(w=>w-1)} className="btn btn-ghost btn-sm">← Eelmine</button>
          <button onClick={()=>setWeekOffset(0)} className="btn btn-ghost btn-sm">See nädal</button>
          <button onClick={()=>setWeekOffset(w=>w+1)} className="btn btn-ghost btn-sm">Järgmine →</button>
        </div>
      </div>

      {/* Легенда статусов */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:".76rem",color:"#42536A",fontWeight:600}}>Staatus:</span>
        {Object.entries(STATUS_META).map(([k,m])=>(
          <span key={k} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:999,
            background:m.pill,color:m.pillC,fontSize:".76rem",fontWeight:600}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:m.dot,flexShrink:0}}/>
            {k}
          </span>
        ))}
        <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:999,
          background:"rgba(201,136,42,.09)",color:"#A96E1A",fontSize:".76rem",fontWeight:600}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#C9882A",flexShrink:0}}/>
          Korduv mall
        </span>
      </div>

      {/* Форма бронирования */}
      {canManage&&(
        <div className="card" style={{padding:20}}>
          <div style={{fontSize:".78rem",fontWeight:700,color:"#42536A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>
            Broneeri uus tund
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:10,marginBottom:12}}>
            <select value={schStu} onChange={e=>setSchStu(e.target.value)}>
              <option value="">Vali õpilane…</option>
              {myStudents.filter(s=>s.active!==false).map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
            </select>
            <input type="date" value={schDate} onChange={e=>setSchDate(e.target.value)}/>
            <select value={schTime} onChange={e=>setSchTime(e.target.value)}>
              {["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"].map(t=><option key={t}>{t}</option>)}
            </select>
            {isAdmin&&<select value={schTeach} onChange={e=>setSchTeach(e.target.value)}>
              {["Pavel","Jelena","Elizaveta","Angelina"].map(t=><option key={t}>{t}</option>)}
            </select>}
          </div>
          <label style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#F9F8F6",borderRadius:10,border:"1px solid rgba(28,43,58,.08)",cursor:"pointer",fontSize:".84rem",fontWeight:500,marginBottom:12,width:"fit-content"}}>
            <input type="checkbox" checked={schRecurring} onChange={e=>setSchRecurring(e.target.checked)} style={{width:"auto",padding:0,border:"none!important",boxShadow:"none!important"}}/>
            Korda igal nädalal automaatselt
          </label>
          <button onClick={addSchedule} className="btn btn-pine" style={{width:"100%"}}>
            <i className="fa-solid fa-calendar-plus"/> {schRecurring?'Loo korduv tund':'Kinnita tund'}
          </button>
        </div>
      )}

      {/* Сетка календаря */}
      <div className="card" style={{overflow:"hidden"}}>
        <div className="scroll" style={{overflowX:"auto"}}>
          <div style={{minWidth:720}}>
            {/* Заголовок дней */}
            <div style={{display:"grid",gridTemplateColumns:"64px repeat(7,1fr)",background:"#EFEDE7",borderBottom:"1px solid rgba(28,43,58,.1)"}}>
              <div style={{padding:"10px 8px",textAlign:"center",fontSize:".72rem",fontWeight:700,color:"#42536A"}}>Kell</div>
              {weekDays.map(d=>(
                <div key={d.iso} style={{padding:"10px 4px",textAlign:"center",borderLeft:"1px solid rgba(28,43,58,.08)",
                  background:d.isToday?"rgba(201,136,42,.06)":"transparent"}}>
                  <div style={{fontSize:".78rem",fontWeight:700,color:d.isToday?"#C9882A":"#1C2B3A"}}>{d.short}</div>
                  <div style={{fontSize:".7rem",fontWeight:600,color:d.isToday?"#C9882A":"#42536A",marginTop:1}}>{d.label}</div>
                </div>
              ))}
            </div>
            {/* Строки времени */}
            {["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"].map(slot=>(
              <div key={slot} style={{display:"grid",gridTemplateColumns:"64px repeat(7,1fr)",minHeight:64,borderBottom:"1px solid rgba(28,43,58,.04)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",fontSize:".72rem",fontFamily:"monospace",fontWeight:700,color:"#9ca3af",background:"rgba(239,237,231,.3)",borderRight:"1px solid rgba(28,43,58,.06)"}}>
                  {slot}
                </div>
                {weekDays.map(day=>{
                  const evs = getEventsForSlot(slot, day);
                  return(
                    <div key={day.iso} style={{padding:3,borderLeft:"1px solid rgba(28,43,58,.05)",display:"flex",flexDirection:"column",gap:2,
                      background:day.isToday?"rgba(201,136,42,.02)":"transparent"}}>
                      {evs.map(ev=>{
                        const isLegacy = !ev.date;
                        const st = ev.status||"Planeeritud";
                        const m = isLegacy
                          ? {bg:"rgba(201,136,42,.09)",border:"rgba(201,136,42,.25)",hover:"rgba(201,136,42,.18)"}
                          : (STATUS_META[st]||STATUS_META.Planeeritud);
                        return(
                          <div key={ev.id+day.iso}
                            onClick={()=>canManage&&setModalEv({...ev,occurrenceDate:day.iso})}
                            style={{fontSize:".72rem",padding:"5px 7px",borderRadius:7,cursor:canManage?"pointer":"default",
                              background:m.bg,border:`1px solid ${m.border}`,transition:"background .12s",
                              opacity:st==="Tühistatud"?.55:1}}
                            onMouseEnter={e=>{if(canManage)e.currentTarget.style.background=m.hover}}
                            onMouseLeave={e=>e.currentTarget.style.background=m.bg}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:3}}>
                              <span style={{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                                textDecoration:st==="Tühistatud"?"line-through":"none"}}>
                                {ev.studentName}
                              </span>
                              <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
                                {isLegacy&&<span style={{fontSize:".6rem",padding:"1px 5px",borderRadius:999,background:"rgba(201,136,42,.2)",color:"#A96E1A",fontWeight:700}}>mall</span>}
                                {canManage&&(
                                  <button onClick={e=>delSchedule(ev.id,e)}
                                    style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:".72rem",padding:0,lineHeight:1}}
                                    onMouseEnter={e=>{e.currentTarget.style.color="#ef4444";e.stopPropagation();}}
                                    onMouseLeave={e=>e.currentTarget.style.color="#9ca3af"}>✕</button>
                                )}
                              </div>
                            </div>
                            <div style={{fontSize:".64rem",color:"#9ca3af",marginTop:1,display:"flex",gap:4}}>
                              {filterT==="Kõik"&&<span>{ev.teacher}</span>}
                              {!isLegacy&&st!=="Planeeritud"&&<span style={{color:STATUS_META[st]?.pillC}}>{st}</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ÕPILASTE NIMEKIRI ─────────────────────────────────────────
function StudentsList({filteredStudents,lessons,isAdmin,search,setSearch,stuFilter,setStuFilter,setSelStu}) {
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <h1 style={{fontSize:'1.7rem'}}>Õpilased <span style={{fontSize:'1rem',fontFamily:'IBM Plex Sans',fontWeight:400,color:'#42536A'}}>({filteredStudents.length})</span></h1>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Otsi…" style={{width:200,padding:'9px 14px'}}/>
          <select value={stuFilter} onChange={e=>setStuFilter(e.target.value)} style={{width:'auto'}}>
            <option value="active">Aktiivsed</option>
            <option value="all">Kõik</option>
            <option value="inactive">Arhiveeritud</option>
          </select>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:14}}>
        {filteredStudents.map(s=>{
          const done=lessons.filter(l=>(l.studentId===s.id||l.studentName?.toLowerCase()===s.name?.toLowerCase())&&l.status==='Toimunud');
          const pct=levelPct(s.level,s.targetLevel);
          const rem=pkgLeft(s);
          return(
            <div key={s.id} className="card" style={{padding:20,cursor:'pointer',transition:'all .18s',opacity:s.active===false?.6:1,position:'relative'}}
              onClick={()=>setSelStu(s)}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#C9882A';e.currentTarget.style.transform='translateY(-2px)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(28,43,58,.07)';e.currentTarget.style.transform='translateY(0)';}}>
              {s.active===false&&<span className="badge" style={{position:'absolute',top:10,right:10,background:'#f3f4f6',color:'#6b7280'}}>Arhiveeritud</span>}
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
                <div>
                  <div style={{fontWeight:700,fontSize:'.98rem'}}>{s.name}</div>
                  <div style={{fontSize:'.75rem',color:'#42536A',marginTop:2}}>{s.level} → {s.targetLevel}{isAdmin&&<span style={{color:'#2F5D50',marginLeft:6}}>· {s.teacher}</span>}{s.subject&&<span style={{color:'#42536A',marginLeft:6}}>· {s.subject}</span>}{s.grade&&<span style={{color:'#C9882A',marginLeft:6}}>· {s.grade}</span>}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:'1.2rem',fontWeight:700,color:'#C9882A'}}>{done.length?avg(done.map(l=>l.grade))+'★':'—'}</div>
                  <div style={{fontSize:'.72rem',color:'#42536A'}}>{done.length} tundi</div>
                </div>
              </div>
              <div className="level-bar" style={{marginBottom:6}}><div className="level-fill" style={{width:pct+'%'}}/></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',color:'#42536A'}}>
                <span>{s.level}</span><span style={{color:'#2F5D50',fontWeight:600}}>{pct}%</span><span>{s.targetLevel}</span>
              </div>
              {s.packageTotal>0&&(
                <div style={{marginTop:12,padding:'8px 12px',borderRadius:9,display:'flex',justifyContent:'space-between',
                  background:rem<=2?'#fee2e2':rem<=5?'#fef3c7':'#f0fdf4'}}>
                  <span style={{fontSize:'.75rem',fontWeight:600,color:rem<=2?'#991b1b':rem<=5?'#92400e':'#166534'}}>📦 Paketi jääk</span>
                  <span style={{fontSize:'.82rem',fontWeight:700,color:rem<=2?'#991b1b':rem<=5?'#92400e':'#166534'}}>{rem}/{s.packageTotal}</span>
                </div>
              )}
            </div>
          );
        })}
        {filteredStudents.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:'48px 0',color:'#42536A'}}>{search?`"${search}" ei leitud`:'Õpilasi pole lisatud.'}</div>}
      </div>
    </div>
  );
}

            <select value={nSubject} onChange={e=>setNSubject(e.target.value)}>

              <option value="Inglise keel">Inglise keel</option>
              <option value="Muu">Muu</option>
            </select>
            <select value={nGrade} onChange={e=>setNGrade(e.target.value)}>

            <input value={nPkg} onChange={e=>setNPkg(e.target.value)} type="number" placeholder="Paketi maht (nt. 10)"/>
            {(isAdmin||user?.role==='admin')
              ? <select value={nTeach} onChange={e=>setNTeach(e.target.value)}>{TEACHERS.map(t=><option key={t} value={t}>Õp: {t}</option>)}</select>
              : <input value={nTeach} readOnly style={{opacity:.7}}/>
            }
          </div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button onClick={addStudent} className="btn btn-pine">
              <i className="fa-solid fa-user-plus"/> Lisa õpilane
            </button>
            <button onClick={()=>setShowAddForm(false)} className="btn btn-ghost">Sulge</button>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12}}>
        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Õpilasi kokku</div>

        </div>
        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Aktiivsed</div>
          <div style={{fontSize:'1.6rem',fontWeight:700,marginTop:8,color:'#2F5D50'}}>{filteredStudents.filter(s=>s.active!==false).length}</div>
        </div>
        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Paketid lõppemas</div>

        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Tasumata arved</div>

              <tr style={{background:'#F9F8F6',borderBottom:'1px solid rgba(28,43,58,.08)'}}>
                {['Õpilane','Kontakt','Kontaktistaatus','Õpe','Grupp','Õpetaja','Paketid','Tunnid','Arved','Staatus','Tegevused'].map(head=>(
                  <th key={head} style={{textAlign:'left',padding:'14px 16px',fontSize:'.76rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em'}}>
                    {head}
                  </th>
                ))}
              </tr>
            </thead>

              {filteredStudents.map(student=>{
                const studentLessons = lessons.filter(l=>l.studentId===student.id||l.studentName?.toLowerCase()===student.name?.toLowerCase());

                const unpaidInvoices = invoices.filter(i=>i.studentId===student.id&&i.status==='Ootel');
                const remaining = pkgLeft(student);
                const avgGrade = completedLessons.length ? avg(completedLessons.map(l=>l.grade)) : '—';
                const lastLesson = [...studentLessons].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
                const contact = contactMeta[student.contactStatus||'new'] || contactMeta.new;
                const statusBadge = student.active===false
                  ? {bg:'#f3f4f6',c:'#6b7280',t:'Arhiveeritud'}
                  : remaining<=2 && (student.packageTotal||0)>0
                    ? {bg:'#fef3c7',c:'#92400e',t:'Jääk madal'}
                    : {bg:'#dcfce7',c:'#166534',t:'Aktiivne'};

                return(
                  <tr key={student.id} style={{borderBottom:'1px solid rgba(28,43,58,.06)',background:student.active===false?'rgba(243,244,246,.45)':'#fff'}}>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700}}>{student.name}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>

                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top',fontSize:'.84rem',color:'#42536A'}}>
                      <div>{student.email||'—'}</div>
                      <div style={{marginTop:4}}>{student.phone||'—'}</div>
                      {(student.email||student.phone)&&(
                        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>
                          {student.phone&&<a href={`tel:${student.phone}`} className="btn btn-ghost btn-sm">Helista</a>}
                          {student.email&&<a href={`mailto:${student.email}`} className="btn btn-ghost btn-sm">E-post</a>}
                        </div>
                      )}
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <span className="badge" style={{background:contact.bg,color:contact.c}}>
                        {contact.t}
                      </span>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:8}}>
                        {student.contactOwner?`Vastutaja: ${student.contactOwner}`:'Vastutaja puudub'}
                      </div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {student.contactLastAt?`Viimane kontakt: ${fmtDate(student.contactLastAt)}`:'Kontakti veel pole'}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:600}}>{student.level} → {student.targetLevel}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>{levelPct(student.level,student.targetLevel)}% eesmärgini</div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:600}}>{student.group||'—'}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>{student.group?'Õppegrupp':'Määramata'}</div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:600}}>{student.teacher||'—'}</div>
                      {isAdmin&&lastLesson?.teacher&&<div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Viimane tund: {lastLesson.teacher}</div>}
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700,color:remaining<=2&&student.packageTotal>0?'#b45309':'#1C2B3A'}}>
                        {remaining}/{student.packageTotal||0}
                      </div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Kasutatud: {student.packageUsed||0}</div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700}}>{completedLessons.length}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Keskmine: {avgGrade==='—'?'—':avgGrade+'★'}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {lastLesson?.date ? `Viimane: ${fmtDate(lastLesson.date)}` : 'Veel pole'}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700,color:unpaidInvoices.length?'#991b1b':'#1C2B3A'}}>{unpaidInvoices.length}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {unpaidInvoices.length ? unpaidInvoices.reduce((sum,inv)=>sum+(inv.amount||0),0)+' € ootel' : 'Kõik makstud'}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <span className="badge" style={{background:statusBadge.bg,color:statusBadge.c}}>
                        {statusBadge.t}
                      </span>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                        <button onClick={()=>openStudent(student)} className="btn btn-ghost btn-sm">Ava</button>
                        <button onClick={()=>setEditStu(student)} className="btn btn-dark btn-sm">Muuda</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
              {filteredStudents.length===0&&(
                <tr>
                  <td colSpan="11" style={{textAlign:'center',padding:'40px 20px',color:'#42536A'}}>
                    {search?`"${search}" ei leitud`:'Õpilasi pole veel lisatud.'}
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── ÕPILASE KAART ─────────────────────────────────────────────
function StudentCard({user,currentStu,stuLessons,stuHw,stuInv,isAdmin,setSelStu,setEditStu,toggleStudentActive,
  hwTask,setHwTask,hwDue,setHwDue,addHw,toggleHw,
  invAmt,setInvAmt,invDesc,setInvDesc,addInvoice,markPaid,unmarkPaid,printInvoice,submitParentPayment,resetParentPayment,deleteLesson,openLessonEditor}) {
  if(!currentStu) return <div style={{textAlign:'center',padding:60,color:'#42536A'}}>Õpilane ei leitud.</div>;
  const done=stuLessons.filter(l=>l.status==='Toimunud');
  const pct=levelPct(currentStu.level,currentStu.targetLevel);
  const rem=pkgLeft(currentStu);
  const attendance=stuLessons.length?Math.round(done.length/stuLessons.length*100):0;
  const canManage = user.role==='teacher' || user.role==='admin';
  const [paymentChoices,setPaymentChoices] = React.useState({});
  const [copiedPaymentKey,setCopiedPaymentKey] = React.useState('');

  const copyPaymentValue = async(key,value)=>{
    const ok = await copyText(value);
    if(!ok) return;
    setCopiedPaymentKey(key);
    setTimeout(()=>setCopiedPaymentKey(''),1600);
  };

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div className="card" style={{padding:24}}>
        <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:14}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
              <h2 style={{fontSize:'1.5rem'}}>{currentStu.name}</h2>
              {currentStu.active===false&&<span className="badge" style={{background:'#f3f4f6',color:'#6b7280'}}>Arhiveeritud</span>}
            </div>
            <div style={{fontSize:'.85rem',color:'#42536A',marginBottom:12}}>
              Õpetaja: <strong>{currentStu.teacher}</strong>
              {currentStu.email&&<> · {currentStu.email}</>}
              {currentStu.phone&&<> · {currentStu.phone}</>}
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
              {[{l:'Hinne',v:avg(done.map(l=>l.grade))+'★',c:'#C9882A',bg:'rgba(201,136,42,.08)'},
                {l:'Kohalolu',v:attendance+'%',c:'#2F5D50',bg:'rgba(47,93,80,.08)'},
                {l:'Tunnid',v:done.length,c:'#1C2B3A',bg:'rgba(28,43,58,.05)'}].map(x=>(
                <div key={x.l} style={{borderRadius:10,padding:'10px 16px',textAlign:'center',background:x.bg,minWidth:80}}>
                  <div style={{fontWeight:700,fontSize:'1.2rem',color:x.c}}>{x.v}</div>
                  <div style={{fontSize:'.72rem',color:'#42536A'}}>{x.l}</div>
                </div>
              ))}
              {currentStu.packageTotal>0&&(
                <div style={{borderRadius:10,padding:'10px 16px',textAlign:'center',minWidth:80,
                  background:rem<=2?'#fee2e2':rem<=5?'#fef3c7':'rgba(47,93,80,.08)'}}>
                  <div style={{fontWeight:700,fontSize:'1.2rem',color:rem<=2?'#dc2626':rem<=5?'#d97706':'#2F5D50'}}>{rem}</div>
                  <div style={{fontSize:'.72rem',color:'#42536A'}}>Jäänud tunde</div>
                </div>
              )}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'.78rem',fontWeight:600,marginBottom:6}}>
              <span>{currentStu.level}</span><span style={{color:'#2F5D50'}}>{pct}% eesmärgini</span><span>{currentStu.targetLevel}</span>
            </div>
            <div className="level-bar"><div className="level-fill" style={{width:pct+'%'}}/></div>
          </div>
          {canManage&&(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <button onClick={()=>setSelStu(null)} className="btn btn-ghost btn-sm">← Tagasi</button>
              <button onClick={()=>setEditStu(currentStu)} className="btn btn-dark btn-sm">✏️ Muuda profiili</button>
              <button onClick={()=>toggleStudentActive(currentStu.id,currentStu.active!==false)}
                className={`btn btn-sm ${currentStu.active===false?'btn-pine':'btn-red'}`}>
                {currentStu.active===false?'Aktiveeri':'Arhiveeri'}
              </button>
            </div>
          )}
        </div>
      </div>

      {done.length>=2&&(
        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>📈 Progressi kõver</h3>
          <ProgressChart data={done}/>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:20}}>
        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>📝 Kodutööd ({stuHw.length})</h3>
          {canManage&&(
            <div style={{marginBottom:14,display:'flex',flexDirection:'column',gap:8}}>
              <input value={hwTask} onChange={e=>setHwTask(e.target.value)} placeholder="Ülesande kirjeldus *"/>
              <div style={{display:'flex',gap:8}}>
                <input type="date" value={hwDue} onChange={e=>setHwDue(e.target.value)} style={{flex:1}}/>
                <button onClick={addHw} className="btn btn-pine btn-sm">Saada</button>
              </div>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:280,overflowY:'auto'}} className="scroll">
            {stuHw.length===0&&<p style={{color:'#42536A',fontSize:'.85rem',textAlign:'center',padding:'16px 0'}}>Kodutöid pole. 📝</p>}
            {stuHw.map(hw=>(
              <div key={hw.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'10px 12px',background:'#F9F8F6',borderRadius:10,border:'1px solid rgba(28,43,58,.07)'}}>
                <div style={{flex:1,marginRight:10}}>
                  <div style={{fontWeight:500,fontSize:'.88rem'}}>{hw.task}</div>
                  {hw.due&&<div style={{fontSize:'.72rem',color:'#42536A',marginTop:2}}>📅 {fmtDate(hw.due)}</div>}
                </div>
                <button onClick={()=>toggleHw(hw.id,hw.status)} className="badge" style={{cursor:'pointer',border:'none',flexShrink:0,
                  background:hw.status==='Tehtud'?'#dcfce7':'#fef3c7',color:hw.status==='Tehtud'?'#166534':'#92400e'}}>
                  {hw.status==='Tehtud'?'✓ Tehtud':'Ootel'}
                </button>
              </div>
            ))}
          </div>
        </div>

        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>📚 Tunni päevik ({stuLessons.length})</h3>
          <div style={{maxHeight:320,overflowY:'auto',display:'flex',flexDirection:'column',gap:12}} className="scroll">
            {stuLessons.length===0&&<p style={{color:'#42536A',fontSize:'.85rem',textAlign:'center',padding:'16px 0'}}>Tunnid puuduvad. 🎓</p>}
            {[...stuLessons].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l=>{
              const bmap={Toimunud:{bg:'#dcfce7',c:'#166534',t:'✓ Toimunud'},Puudus_p:{bg:'#dbeafe',c:'#1e40af',t:'Puudus (põhj.)'},Puudus_eta:{bg:'#fee2e2',c:'#991b1b',t:'Puudus'}};
              const b=bmap[l.status]||bmap.Toimunud;
              return(
                <div key={l.id} style={{display:'flex',gap:12,paddingBottom:12,borderBottom:'1px solid rgba(28,43,58,.06)'}}>
                  <div style={{width:38,height:38,borderRadius:10,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
                    fontWeight:700,background:l.status==='Toimunud'?'rgba(201,136,42,.1)':'rgba(239,68,68,.08)',color:l.status==='Toimunud'?'#C9882A':'#dc2626'}}>
                    {l.status==='Toimunud'?l.grade:'—'}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',gap:6,marginBottom:3}}>
                      <span style={{fontWeight:600,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.topic}</span>
                      <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                        <span className="badge" style={{background:b.bg,color:b.c,fontSize:'.68rem'}}>{b.t}</span>
                        {canManage&&<button onClick={()=>openLessonEditor(l)} className="btn btn-dark btn-sm" style={{padding:'4px 8px'}}>Muuda</button>}
                        {canManage&&<button onClick={()=>deleteLesson(l)} className="btn btn-ghost btn-sm" style={{padding:'4px 8px'}}>Kustuta</button>}
                      </div>
                    </div>
                    {l.comment&&<div style={{fontSize:'.78rem',color:'#42536A',marginBottom:3}}>{l.comment}</div>}
                    <div style={{fontSize:'.72rem',color:'#9ca3af'}}>{fmtDate(l.date)}{l.duration?' · '+l.duration+' min':''} · Õp. {l.teacher}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {(canManage||user.role==='parent')&&(
        <div className="card" style={{padding:24}}>
          <h3 style={{marginBottom:16}}>💳 Arved ({stuInv.length})</h3>
          {canManage&&(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:10,marginBottom:14}}>
              <input type="number" value={invAmt} onChange={e=>setInvAmt(e.target.value)} placeholder="Summa (€) *"/>
              <input value={invDesc} onChange={e=>setInvDesc(e.target.value)} placeholder="Kirjeldus"/>
              <button onClick={()=>addInvoice(currentStu.id)} className="btn btn-amber btn-sm">
                <i className="fa-solid fa-plus"/> Loo arve
              </button>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {stuInv.length===0&&<p style={{color:'#42536A',fontSize:'.85rem',textAlign:'center',padding:'12px 0'}}>Arveid pole.</p>}
            {stuInv.map(inv=>(
              <div key={inv.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:'#F9F8F6',borderRadius:10,border:'1px solid rgba(28,43,58,.07)',flexWrap:'wrap',gap:10}}>
                <div>
                  <div style={{fontWeight:600,fontSize:'.9rem'}}>{inv.num}</div>
                  <div style={{fontSize:'.78rem',color:'#42536A'}}>{inv.desc} · Tähtaeg: {fmtDate(inv.due)}</div>
                  {!canManage&&inv.status!=='Makstud'&&(
                    <div style={{marginTop:10,padding:'14px 14px',borderRadius:12,background:'#fff',border:'1px solid rgba(28,43,58,.08)',display:'flex',flexDirection:'column',gap:10,maxWidth:460,boxShadow:'0 1px 4px rgba(28,43,58,.04)'}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap'}}>
                        <div style={{fontSize:'.78rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em'}}>Maksmise info</div>
                        <span className="badge" style={{background:'rgba(201,136,42,.1)',color:'#A96E1A'}}>Arve {inv.num}</span>
                      </div>

                      <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:'6px 10px',alignItems:'center'}}>
                        <div style={{fontSize:'.78rem',color:'#42536A'}}>Saaja: <strong style={{color:'#1C2B3A'}}>{PAYMENT_DETAILS.company}</strong></div>
                        <div />
                        <div style={{fontSize:'.78rem',color:'#42536A'}}>Registrikood: <strong style={{color:'#1C2B3A'}}>{PAYMENT_DETAILS.regCode}</strong></div>
                        <div />
                        <div style={{fontSize:'.78rem',color:'#42536A'}}>IBAN: <strong style={{color:'#1C2B3A'}}>{PAYMENT_DETAILS.iban}</strong></div>
                        <button onClick={()=>copyPaymentValue(`iban-${inv.id}`,PAYMENT_DETAILS.iban)} className="btn btn-ghost btn-sm">{copiedPaymentKey===`iban-${inv.id}`?'Kopeeritud':'Kopeeri'}</button>
                        <div style={{fontSize:'.78rem',color:'#42536A'}}>Pank: <strong style={{color:'#1C2B3A'}}>{PAYMENT_DETAILS.bank}</strong></div>
                        <div />
                        <div style={{fontSize:'.78rem',color:'#42536A'}}>SWIFT: <strong style={{color:'#1C2B3A'}}>{PAYMENT_DETAILS.swift}</strong></div>
                        <div />
                        <div style={{fontSize:'.78rem',color:'#42536A'}}>Selgitus: <strong style={{color:'#1C2B3A'}}>{inv.paymentReference||inv.num}</strong></div>
                        <button onClick={()=>copyPaymentValue(`ref-${inv.id}`,inv.paymentReference||inv.num)} className="btn btn-ghost btn-sm">{copiedPaymentKey===`ref-${inv.id}`?'Kopeeritud':'Kopeeri'}</button>
                        <div style={{fontSize:'.78rem',color:'#42536A'}}>Summa: <strong style={{color:'#1C2B3A'}}>{inv.amount} €</strong></div>
                        <button onClick={()=>copyPaymentValue(`sum-${inv.id}`,String(inv.amount))} className="btn btn-ghost btn-sm">{copiedPaymentKey===`sum-${inv.id}`?'Kopeeritud':'Kopeeri'}</button>
                      </div>

                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:8,padding:'10px 12px',borderRadius:10,background:'#F9F8F6'}}>
                        <div style={{fontSize:'.78rem',color:'#42536A'}}>Maksetähtaeg: <strong style={{color:'#1C2B3A'}}>{fmtDate(inv.due)}</strong></div>
                        <div style={{fontSize:'.78rem',color:'#42536A'}}>Viivis: <strong style={{color:'#1C2B3A'}}>{PAYMENT_DETAILS.lateFeePerDay} päevas</strong></div>
                      </div>

                      <select value={paymentChoices[inv.id]||inv.parentPaymentMethod||'bank'} onChange={e=>setPaymentChoices(prev=>({...prev,[inv.id]:e.target.value}))}>
                        {PAYMENT_METHODS.map(method=><option key={method.id} value={method.id}>{method.label}</option>)}
                      </select>
                      {inv.parentPaymentStatus==='submitted'
                        ? <div style={{fontSize:'.78rem',color:'#166534',fontWeight:600}}>✓ Maksest on teavitatud {fmtDate(inv.parentPaymentSubmittedAt)}</div>
                        : <button onClick={()=>submitParentPayment(inv.id,paymentChoices[inv.id]||inv.parentPaymentMethod||'bank')} className="btn btn-pine btn-sm">Teavita maksest</button>
                      }
                    </div>
                  )}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontWeight:700}}>{inv.amount}€</span>
                  {inv.status==='Makstud'
                    ?<span className="badge" style={{background:'#dcfce7',color:'#166534'}}>✓ Makstud</span>
                    :<span className="badge" style={{background:'#fef3c7',color:'#92400e'}}>Ootel</span>}
                  {inv.parentPaymentStatus==='submitted'&&inv.status!=='Makstud'&&<span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>Maksest teavitatud</span>}
                  {canManage&&inv.status!=='Makstud'&&<button onClick={()=>markPaid(inv.id)} className="btn btn-pine btn-sm">Märgi makstud</button>}
                  {canManage&&inv.status==='Makstud'&&<button onClick={()=>unmarkPaid(inv.id)} className="btn btn-red btn-sm">Tühista makse</button>}
                  {canManage&&inv.parentPaymentStatus==='submitted'&&inv.status!=='Makstud'&&<button onClick={()=>resetParentPayment(inv.id)} className="btn btn-ghost btn-sm">Lähtesta teavitus</button>}
                  <button onClick={()=>printInvoice(inv)} className="btn btn-ghost btn-sm"><i className="fa-solid fa-print"/> Prindi</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

        {[{l:'Maksmata',v:unpaidAmt+'€',c:'#dc2626',bg:'#fee2e2',n:invoices.filter(i=>i.status==='Ootel').length+' arvet'},
          {l:'Makstud',v:paid.reduce((a,i)=>a+i.amount,0)+'€',c:'#166534',bg:'#dcfce7',n:paid.length+' arvet'}].map(s=>(

            <div style={{fontSize:'.75rem',color:s.c+'99',marginTop:4}}>{s.l}</div>
            <div style={{fontSize:'.72rem',color:s.c+'88',marginTop:2}}>{s.n}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{padding:24}}>
        <h3 style={{marginBottom:16}}>Loo uus arve</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10,marginBottom:12}}>
          <select value={invStu} onChange={e=>setInvStu(e.target.value)}>
            <option value="">Vali õpilane *</option>
            {myStudents.filter(s=>s.active!==false).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}

          <input type="number" value={invAmt} onChange={e=>setInvAmt(e.target.value)} placeholder="Summa (€) *"/>
          <input value={invDesc} onChange={e=>setInvDesc(e.target.value)} placeholder="Kirjeldus"/>

        <div style={{padding:'16px 20px',borderBottom:'1px solid rgba(28,43,58,.07)',fontWeight:700,fontSize:'.9rem'}}>Kõik arved ({invoices.length})</div>

          ?<div style={{padding:40,textAlign:'center',color:'#42536A'}}>Arveid pole.</div>

            <div key={inv.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px',borderBottom:'1px solid rgba(28,43,58,.05)',flexWrap:'wrap',gap:10}}>
              <div>
                <div style={{fontWeight:600,fontSize:'.9rem'}}>{inv.num} · {inv.studentName}</div>
                <div style={{fontSize:'.78rem',color:'#42536A'}}>{inv.desc} · {fmtDate(inv.date)} · tähtaeg {fmtDate(inv.due)}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{fontWeight:700}}>{inv.amount}€</span>
                {inv.status==='Makstud'
                  ?<>
                    <span className="badge" style={{background:'#dcfce7',color:'#166534'}}>✓ Makstud</span>
                    <button onClick={()=>unmarkPaid(inv.id)} className="btn btn-red btn-sm">Tühista makse</button>
                  </>
                  :<><span className="badge" style={{background:'#fef3c7',color:'#92400e'}}>Ootel</span>

// ── TUNNI MODAL ───────────────────────────────────────────────
function LessonModal({modalEv,setModalEv,lTopic,setLTopic,lGrade,setLGrade,
  lStatus,setLStatus,lComment,setLComment,lDur,setLDur,saveLesson,schedule,students,db,user,notify}) {

  const [moveDate,setMoveDate] = React.useState(modalEv.occurrenceDate||modalEv.date||new Date().toISOString().split("T")[0]);
  const [moveTime,setMoveTime] = React.useState(modalEv.time||"09:00");
  const [saving,setSaving]     = React.useState(false);

  const fmtDate = d => d?new Date(d).toLocaleDateString("et-EE",{day:"2-digit",month:"2-digit",year:"numeric"}):"—";
  const hasDate = Boolean(modalEv.date||modalEv.occurrenceDate);
  const st = modalEv.status||"Planeeritud";
  const isJournalEdit = Boolean(modalEv.lessonEntryId);

  const STATUS_COLOR = {
    Planeeritud:"#2F5D50",Nihutatud:"#A96E1A",Tühistatud:"#991b1b",Toimunud:"#42536A"
  };
  const STATUS_BG = {
    Planeeritud:"rgba(47,93,80,.1)",Nihutatud:"rgba(201,136,42,.1)",
    Tühistatud:"rgba(239,68,68,.08)",Toimunud:"rgba(28,43,58,.07)"
  };

  const cancelLesson = async()=>{
    if(!modalEv.id) return;
    await db.collection("schedule").doc(modalEv.id).update({status:"Tühistatud",canceledAt:new Date().toISOString().split("T")[0]});
    notify("✓ Tund tühistatud");
    setModalEv(prev=>({...prev,status:"Tühistatud"}));
  };

  const restoreLesson = async()=>{
    if(!modalEv.id) return;
    await db.collection("schedule").doc(modalEv.id).update({status:"Planeeritud"});
    notify("✓ Tund taastatud");
    setModalEv(prev=>({...prev,status:"Planeeritud"}));
  };

  const rescheduleLesson = async()=>{
    if(!modalEv.id||!moveDate){notify("⚠ Vali uus kuupäev");return;}
    setSaving(true);
    const jsDay = new Date(moveDate).getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    await db.collection("schedule").doc(modalEv.id).update({
      date:moveDate, day:dayId, time:moveTime,
      status:"Nihutatud",
      originalDate: modalEv.originalDate||modalEv.date||modalEv.occurrenceDate||null,
      originalTime: modalEv.originalTime||modalEv.time||null,
      rescheduledAt: new Date().toISOString().split("T")[0]
    });
    notify("✓ Tund tõsteti ümber: "+fmtDate(moveDate)+" "+moveTime);
    setModalEv(prev=>({...prev,date:moveDate,time:moveTime,status:"Nihutatud"}));
    setSaving(false);
  };

  const exportIcs = ()=>{
    const isoDate = moveDate||modalEv.occurrenceDate||modalEv.date;
    if(!isoDate){notify("⚠ Mallikirjet ei saa eksportida. Tõsta tund kuupäevale.");return;}
    const [y,m,d] = isoDate.split("-").map(Number);
    const [hh,mm] = (moveTime||modalEv.time||"09:00").split(":").map(Number);
    const start = new Date(y,m-1,d,hh,mm,0);
    const end   = new Date(start.getTime()+(parseInt(lDur)||60)*60000);
    const fmt   = dt => dt.getFullYear()+String(dt.getMonth()+1).padStart(2,"0")+String(dt.getDate()).padStart(2,"0")
                  +"T"+String(dt.getHours()).padStart(2,"0")+String(dt.getMinutes()).padStart(2,"0")+"00";
    const ics = [
      "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//KeeleSepp//Haldus//ET",
      "BEGIN:VEVENT",
      "UID:"+(modalEv.id||Date.now())+"@keelesepp",
      "DTSTART:"+fmt(start),"DTEND:"+fmt(end),
      "SUMMARY:KeeleSepp – "+modalEv.studentName,
      "DESCRIPTION:Õpetaja: "+(modalEv.teacher||user.displayName)+"\nStaatus: "+st,
      "END:VEVENT","END:VCALENDAR"
    ].join("\n");
    const blob = new Blob([ics],{type:"text/calendar;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download="keelesepp-"+modalEv.studentName.split(" ")[0].toLowerCase()+".ics";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    notify("✓ .ics fail allalaaditud!");
  };

  const makeRecurring = async()=>{
    if(!modalEv.id) return;
    const baseDate = modalEv.occurrenceDate||modalEv.date;
    if(!baseDate){notify("⚠ Vali konkreetne kuupäev");return;}
    const jsDay = new Date(baseDate).getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    await db.collection("schedule").doc(modalEv.id).update({
      recurring:true,
      startDate:baseDate,
      day:dayId,
      date:firebase.firestore.FieldValue.delete()
    });
    notify("✓ Tund kordub nüüd igal nädalal");
    setModalEv(prev=>({...prev,recurring:true,startDate:baseDate,day:dayId,date:null,occurrenceDate:baseDate}));
  };

  const makeSingle = async()=>{
    if(!modalEv.id) return;
    const baseDate = modalEv.occurrenceDate||modalEv.date||modalEv.startDate;
    if(!baseDate){notify("⚠ Vali konkreetne kuupäev");return;}
    const jsDay = new Date(baseDate).getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    await db.collection("schedule").doc(modalEv.id).update({
      recurring:false,
      startDate:firebase.firestore.FieldValue.delete(),
      day:dayId,
      date:baseDate
    });
    notify("✓ Tund on nüüd ühekordne");
    setModalEv(prev=>({...prev,recurring:false,startDate:null,day:dayId,date:baseDate,occurrenceDate:baseDate}));
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(28,43,58,.6)",display:"flex",alignItems:"center",
      justifyContent:"center",padding:16,zIndex:200,backdropFilter:"blur(4px)"}}>
      <div className="card scroll" style={{padding:0,maxWidth:540,width:"100%",maxHeight:"92vh",overflowY:"auto",position:"relative"}}>

        {/* Шапка модалки */}
        <div style={{padding:"20px 24px 16px",borderBottom:"1px solid rgba(28,43,58,.08)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h2 style={{fontSize:"1.2rem",marginBottom:4}}>📋 Tunni aruanne</h2>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:".88rem",color:"#42536A"}}>
                <strong>{modalEv.studentName}</strong> · {fmtDate(modalEv.occurrenceDate||modalEv.date)} · {modalEv.time}
              </span>
              <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:999,
                fontSize:".73rem",fontWeight:700,background:STATUS_BG[st]||"rgba(47,93,80,.1)",color:STATUS_COLOR[st]||"#2F5D50"}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:STATUS_COLOR[st]||"#2F5D50"}}/>
                {st}
              </span>
              {!modalEv.date&&<span style={{fontSize:".7rem",padding:"2px 8px",borderRadius:999,background:"rgba(201,136,42,.1)",color:"#A96E1A",fontWeight:700}}>korduv mall</span>}
            </div>
          </div>
          <button onClick={()=>setModalEv(null)}
            style={{background:"rgba(28,43,58,.07)",border:"none",cursor:"pointer",borderRadius:9,
              width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",color:"#42536A",flexShrink:0}}>✕</button>
        </div>

        <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>

          {/* Блок управления календарём */}
          {!isJournalEdit&&<div style={{background:"#F9F8F6",borderRadius:12,padding:16,border:"1px solid rgba(28,43,58,.07)"}}>
            <div style={{fontSize:".76rem",fontWeight:700,color:"#42536A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>
              📅 Kalendri haldus
            </div>

            {modalEv.id&&hasDate&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:".78rem",fontWeight:600,color:"#42536A",marginBottom:6}}>Tunni tüüp:</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <button
                    onClick={makeSingle}
                    className={`btn btn-sm ${modalEv.recurring?'btn-ghost':'btn-dark'}`}
                    disabled={!modalEv.recurring}
                    style={{opacity:modalEv.recurring?1:.9}}>
                    <i className="fa-solid fa-calendar-day"/> Ühekordne
                  </button>
                  <button

            <div style={{display:"flex",gap:8}}>

          {/* Блок записи урока */}
          {st!=="Tühistatud"&&(
