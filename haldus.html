function SkillMapWidget({student, isTeacher}) {
  const [skillMap, setSkillMap] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const level = student?.level || 'A2';
  const skills = SM_SKILLS[level] || SM_SKILLS.A2;

  React.useEffect(()=>{
    if(!student?.id) return;
    // Read skillMap from the student document
    const unsub = db.collection('students').doc(student.id).onSnapshot(snap=>{
      setSkillMap(snap.data()?.skillMap || {});
      setLoading(false);
    }, ()=>setLoading(false));
    return unsub;
  },[student?.id]);

  const getStars = score => {
    if(score===null||score===undefined) return 0;
    if(score>=80) return 3; if(score>=50) return 2; if(score>=25) return 1; return 0;
  };
  const getStatus = score => {
    if(score===null||score===undefined) return 'untested';
    if(score>=80) return 'strong'; if(score>=50) return 'normal'; return 'weak';
  };
  const statusColor = {strong:'#166534', normal:'#1d4ed8', weak:'#dc2626', untested:'#B0A898'};

  // Radar chart
  const cats = Object.keys(SM_CATS);
  const N = cats.length;
  const CX=130,CY=130,R=95;
  const getPoint=(i,r)=>{
    const angle=(2*Math.PI*i/N)-Math.PI/2;
    return[CX+r*Math.cos(angle),CY+r*Math.sin(angle)];
  };
  const catScores={};
  cats.forEach(cat=>{
    const cs=skills.filter(s=>s.cat===cat);
    if(!cs.length){catScores[cat]=0;return;}
    const sc=cs.map(s=>skillMap[s.id]??0);
    catScores[cat]=sc.reduce((a,b)=>a+b,0)/sc.length;
  });
  const LEVEL_COLORS={A1:'#047857',A2:'#0e7490',B1:'#1d4ed8',B2:'#6d28d9',C1:'#be185d'};
  const lc=LEVEL_COLORS[level]||'#0e7490';
  const gridPaths=[25,50,75,100].map(gl=>{
    const pts=cats.map((_,i)=>getPoint(i,R*gl/100));
    return pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';
  });
  const dataPts=cats.map((cat,i)=>getPoint(i,R*(catScores[cat]||0)/100));
  const dataPath=dataPts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';

  const tested = skills.filter(s=>skillMap[s.id]!==undefined&&skillMap[s.id]!==null);
  const strong = skills.filter(s=>(skillMap[s.id]||0)>=80);
  const weak   = skills.filter(s=>skillMap[s.id]!==undefined&&skillMap[s.id]!==null&&skillMap[s.id]<50);

  if(loading) return null;

  const hasAnyData = tested.length > 0;

  return(
    <div style={{background:'linear-gradient(135deg,#1C2B3A 0%,'+lc+' 100%)',borderRadius:18,padding:24,color:'#fff',position:'relative'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <div>
          <div style={{fontSize:'.68rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.45)',marginBottom:4}}>
            Oskuste kaart — {level}
          </div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.6rem',fontWeight:800,color:strong.length?'#4ade80':'rgba(255,255,255,.3)'}}>{strong.length}</div>
              <div style={{fontSize:'.62rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em'}}>💪 Tugevad</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.6rem',fontWeight:800,color:weak.length?'#fca5a5':'rgba(255,255,255,.3)'}}>{weak.length}</div>
              <div style={{fontSize:'.62rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em'}}>🎯 Arendada</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.6rem',fontWeight:800,color:'rgba(255,255,255,.6)'}}>{tested.length}/{skills.length}</div>
              <div style={{fontSize:'.62rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em'}}>📊 Testitud</div>
            </div>
          </div>
        </div>
        {isTeacher&&(
          <button onClick={()=>window.open('/haldus-skillmap/?student='+student.id,'_blank')}
            style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',color:'#fff',
              borderRadius:9,padding:'7px 13px',cursor:'pointer',fontSize:'.76rem',fontWeight:700,
              display:'flex',alignItems:'center',gap:6}}>
            ✏️ Muuda hindeid
          </button>
        )}
      </div>

      {!hasAnyData?(
        <div style={{textAlign:'center',padding:'20px 0',color:'rgba(255,255,255,.35)',fontSize:'.84rem'}}>
          {isTeacher?'Ava "Muuda hindeid" et lisada oskuste tulemused':'Oskuste hinded lisab õpetaja'}
        </div>
      ):(
        <div style={{display:'flex',gap:20,alignItems:'flex-start',flexWrap:'wrap'}}>
          {/* Radar */}
          <div style={{flexShrink:0}}>
            <svg width={260} height={260} viewBox="0 0 260 260">
              {gridPaths.map((d,gi)=><path key={gi} d={d} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="1"/>)}
              {cats.map((_,i)=>{const[x,y]=getPoint(i,R);return<line key={i} x1={CX} y1={CY} x2={x.toFixed(1)} y2={y.toFixed(1)} stroke="rgba(255,255,255,.07)" strokeWidth="1"/>;})};
              <path d={dataPath} fill={lc} fillOpacity=".3" stroke={lc} strokeWidth="2.5"/>
              {cats.map((cat,i)=>{
                const[x,y]=getPoint(i,R+18);
                const c=SM_CATS[cat];
                const anchor=x<CX-8?'end':x>CX+8?'start':'middle';
                return(
                  <g key={cat}>
                    <text x={x} y={y} fontSize="11" textAnchor={anchor} fill="rgba(255,255,255,.7)" fontFamily="IBM Plex Sans">{c.icon}</text>
                    <text x={x} y={y+12} fontSize="7.5" textAnchor={anchor} fill="rgba(255,255,255,.4)" fontFamily="IBM Plex Sans">{c.label}</text>
                  </g>
                );
              })}
              {dataPts.map(([x,y],i)=><circle key={i} cx={x.toFixed(1)} cy={y.toFixed(1)} r="4" fill={lc} stroke="rgba(255,255,255,.6)" strokeWidth="2"/>)}
            </svg>
          </div>
          {/* Skills list */}
          <div style={{flex:1,minWidth:180,display:'flex',flexDirection:'column',gap:6}}>
            {skills.map(sk=>{
              const score=skillMap[sk.id]??null;
              const stars=getStars(score);
              const st=getStatus(score);
              const cat=SM_CATS[sk.cat];
              const barW=score??0;
              return(
                <div key={sk.id} style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:'.72rem',minWidth:16}}>{cat.icon}</span>
                  <span style={{fontSize:'.76rem',fontWeight:600,color:'rgba(255,255,255,.8)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sk.name}</span>
                  <div style={{width:60,height:4,background:'rgba(255,255,255,.1)',borderRadius:2,flexShrink:0}}>
                    <div style={{width:barW+'%',height:'100%',borderRadius:2,background:statusColor[st]}}/>
                  </div>
                  <div style={{display:'flex',gap:1,flexShrink:0}}>
                    {[0,1,2].map(i=><span key={i} style={{fontSize:'.65rem',opacity:i<stars?1:.2}}>⭐</span>)}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Encouragement for student/parent */}
      {!isTeacher&&hasAnyData&&(
        <div style={{marginTop:14,display:'flex',gap:10,flexWrap:'wrap'}}>
          {strong.length>0&&(
            <div style={{flex:1,minWidth:140,padding:'10px 12px',background:'rgba(74,222,128,.1)',borderRadius:10,border:'1px solid rgba(74,222,128,.2)'}}>
              <div style={{fontSize:'.68rem',fontWeight:700,color:'#4ade80',marginBottom:5}}>💪 Tugevad oskused</div>
              {strong.slice(0,3).map(s=><div key={s.id} style={{fontSize:'.74rem',color:'rgba(255,255,255,.7)',marginBottom:2}}>✓ {s.name}</div>)}
            </div>
          )}
          {weak.length>0&&(
            <div style={{flex:1,minWidth:140,padding:'10px 12px',background:'rgba(251,146,60,.1)',borderRadius:10,border:'1px solid rgba(251,146,60,.2)'}}>
              <div style={{fontSize:'.68rem',fontWeight:700,color:'#fb923c',marginBottom:5}}>🎯 Harjuta rohkem</div>
              {weak.slice(0,3).map(s=><div key={s.id} style={{fontSize:'.74rem',color:'rgba(255,255,255,.7)',marginBottom:2}}>→ {s.name}</div>)}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                    <select value={paymentChoices[inv.id]||inv.parentPaymentMethod||'bank'} onChange={e=>setPaymentChoices(prev=>({...prev,[inv.id]:e.target.value}))} style={{maxWidth:220}}>
                      {PAYMENT_METHODS.map(method=><option key={method.id} value={method.id}>{method.label}</option>)}
                    </select>
                    {inv.parentPaymentStatus==='submitted'
                      ? <span style={{fontSize:'.82rem',color:'#166534',fontWeight:700}}>✓ Maksest on teavitatud {fmtDate(inv.parentPaymentSubmittedAt)}</span>
                      : <button onClick={()=>submitParentPayment(inv.id,paymentChoices[inv.id]||inv.parentPaymentMethod||'bank')} className="btn btn-pine btn-sm">Teavita maksest</button>}
                  </div>
                </div>
              )}

              <div>
                <button onClick={()=>printInvoice(inv)} className="btn btn-ghost btn-sm"><i className="fa-solid fa-print"/> Prindi</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── ARVED ÜLDVAADE ────────────────────────────────────────────
function InvoicesView({invoices,myStudents,schedule,students,isAdmin,invStu,setInvStu,invAmt,setInvAmt,invDesc,setInvDesc,addInvoice,markPaid,unmarkPaid,deleteInvoice,printInvoice}) {
  const unpaidAmt=invoices.filter(i=>i.status==='Ootel').reduce((a,i)=>a+i.amount,0);
  const paid=invoices.filter(i=>i.status==='Makstud');
  const [statsPeriod,setStatsPeriod] = React.useState('current');

  // Period boundaries
  const now = new Date();
  const periodStart = React.useMemo(()=>{
    if(statsPeriod==='current'){
      return new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];
    }else if(statsPeriod==='next'){
      return new Date(now.getFullYear(),now.getMonth()+1,1).toISOString().split('T')[0];
    }else{ // both
      return new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];
    }
  },[statsPeriod]);
  const periodEnd = React.useMemo(()=>{
    if(statsPeriod==='current'){
      return new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];
    }else if(statsPeriod==='next'){
      return new Date(now.getFullYear(),now.getMonth()+2,0).toISOString().split('T')[0];
    }else{
      return new Date(now.getFullYear(),now.getMonth()+2,0).toISOString().split('T')[0];
    }
  },[statsPeriod]);

  // Helper: get all dates for a schedule event in period
  const getEventDatesInPeriod = React.useCallback((ev)=>{
    const dates = [];
    if(ev.date){
      if(ev.date>=periodStart && ev.date<=periodEnd) dates.push(ev.date);
    } else if(ev.recurring && ev.startDate && ev.day){
      // Weekly recurring — enumerate weeks in period
      const dayMap = {Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
      const targetDay = dayMap[ev.day];
      const start = new Date(Math.max(new Date(ev.startDate),new Date(periodStart)));
      const end = new Date(periodEnd);
      const d = new Date(start);
      // Advance to first occurrence of targetDay
      while(d.getDay()!==targetDay && d<=end) d.setDate(d.getDate()+1);
      while(d<=end){
        dates.push(d.toISOString().split('T')[0]);
        d.setDate(d.getDate()+7);
      }
    }
    return dates;
  },[periodStart,periodEnd]);

  // Expected income: scheduled lessons × lessonPrice per student
  const expectedIncome = React.useMemo(()=>{
    if(!isAdmin) return null;
    let total = 0;
    const byStudent = {};
    (schedule||[]).forEach(ev=>{
      if(ev.status==='Tühistatud') return;
      const stu = (students||[]).find(s=>
        s.id===ev.studentId ||
        (s.name||'').toLowerCase()===(ev.studentName||'').toLowerCase()
      );
      if(!stu || !stu.lessonPrice) return;
      const dates = getEventDatesInPeriod(ev);
      const price = (stu.lessonPrice||0)*dates.length;
      total += price;
      if(!byStudent[stu.id]) byStudent[stu.id]={name:stu.name,count:0,price:stu.lessonPrice,teacher:stu.teacher||'—',total:0};
      byStudent[stu.id].count += dates.length;
      byStudent[stu.id].total += price;
    });
    return {total, byStudent:Object.values(byStudent).sort((a,b)=>b.total-a.total)};
  },[schedule,students,isAdmin,getEventDatesInPeriod]);

  // Teacher stats
  const teacherStats = React.useMemo(()=>{
    if(!isAdmin) return null;
    const byTeacher = {};
    (schedule||[]).forEach(ev=>{
      if(ev.status==='Tühistatud') return;
      const teacher = ev.teacher||'Määramata';
      if(!byTeacher[teacher]) byTeacher[teacher]={teacher,planned:0,done:0,revenue:0};
      const dates = getEventDatesInPeriod(ev);
      if(ev.status==='Toimunud') byTeacher[teacher].done += dates.length;
      else byTeacher[teacher].planned += dates.length;
      // revenue
      const stu = (students||[]).find(s=>
        s.id===ev.studentId ||
        (s.name||'').toLowerCase()===(ev.studentName||'').toLowerCase()
      );
      if(stu?.lessonPrice) byTeacher[teacher].revenue += (stu.lessonPrice||0)*dates.length;
    });
    return Object.values(byTeacher).sort((a,b)=>b.planned+b.done-(a.planned+a.done));
  },[schedule,students,isAdmin,getEventDatesInPeriod]);

  const periodLabel = statsPeriod==='current'
    ? now.toLocaleDateString('et-EE',{month:'long',year:'numeric'})
    : statsPeriod==='next'
      ? new Date(now.getFullYear(),now.getMonth()+1,1).toLocaleDateString('et-EE',{month:'long',year:'numeric'})
      : now.toLocaleDateString('et-EE',{month:'long',year:'numeric'})+' + '+new Date(now.getFullYear(),now.getMonth()+1,1).toLocaleDateString('et-EE',{month:'long',year:'numeric'});

  const [invoiceFilter,setInvoiceFilter] = React.useState('all');
  const visibleInvoices = React.useMemo(()=>{
    if(invoiceFilter==='pending') return invoices.filter(i=>i.status==='Ootel');
    if(invoiceFilter==='paid') return invoices.filter(i=>i.status==='Makstud');
    if(invoiceFilter==='reported') return invoices.filter(i=>i.parentPaymentStatus==='submitted'&&i.status!=='Makstud');
    return invoices;
  },[invoiceFilter,invoices]);
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <h1 style={{fontSize:'1.7rem'}}>Arved</h1>

      {/* Main invoice stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:12}}>
        {[{l:'Maksmata',v:unpaidAmt+'€',c:'#dc2626',bg:'#fee2e2',n:invoices.filter(i=>i.status==='Ootel').length+' arvet'},
          {l:'Makstud',v:paid.reduce((a,i)=>a+i.amount,0)+'€',c:'#166534',bg:'#dcfce7',n:paid.length+' arvet'},
          ...(isAdmin&&expectedIncome?[{l:'Oodatav tulu',v:expectedIncome.total+'€',c:'#1d4ed8',bg:'#dbeafe',n:periodLabel}]:[])
        ].map(s=>(
          <div key={s.l} className="card" style={{padding:'18px 20px',background:s.bg,borderColor:'transparent'}}>
            <div style={{fontSize:'1.8rem',fontWeight:700,color:s.c}}>{s.v}</div>
            <div style={{fontSize:'.75rem',color:s.c+'99',marginTop:4}}>{s.l}</div>
            <div style={{fontSize:'.72rem',color:s.c+'88',marginTop:2}}>{s.n}</div>
          </div>
        ))}
      </div>

      {/* Period stats for admin */}
      {isAdmin&&(
        <div className="card" style={{padding:22}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap',marginBottom:18}}>
            <div>
              <h3>📊 Statistika: {periodLabel}</h3>
              <div style={{fontSize:'.82rem',color:'#42536A',marginTop:4}}>Planeeritud tunnid ja oodatav tulu kalendri põhjal.</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              {[['current','See kuu'],['next','Järgmine kuu'],['both','Mõlemad']].map(([id,label])=>(
                <button key={id} onClick={()=>setStatsPeriod(id)}
                  className={`btn btn-sm ${statsPeriod===id?'btn-dark':'btn-ghost'}`}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            {/* Expected income by student */}
            <div>
              <div style={{fontSize:'.74rem',fontWeight:800,color:'#42536A',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:10}}>
                Oodatav tulu õpilase kaupa
              </div>
              {(expectedIncome?.byStudent||[]).length===0&&(
                <div style={{color:'#42536A',fontSize:'.84rem'}}>Tunni hindu pole määratud.</div>
              )}
              <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:280,overflowY:'auto'}} className="scroll">
                {(expectedIncome?.byStudent||[]).map(s=>(
                  <div key={s.name} style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:10,alignItems:'center',padding:'8px 12px',borderRadius:10,background:'#F9F8F6',border:'1px solid rgba(28,43,58,.07)'}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:'.84rem'}}>{s.name}</div>
                      <div style={{fontSize:'.72rem',color:'#42536A'}}>{s.teacher} · {s.price}€/tund</div>
                    </div>
                    <span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>{s.count} tk</span>
                    <span style={{fontWeight:700,color:'#1d4ed8',minWidth:45,textAlign:'right'}}>{s.total}€</span>
                  </div>
                ))}
              </div>
              {(expectedIncome?.byStudent||[]).length>0&&(
                <div style={{display:'flex',justifyContent:'flex-end',marginTop:10,paddingTop:10,borderTop:'1px solid rgba(28,43,58,.08)'}}>
                  <span style={{fontWeight:800,color:'#1d4ed8',fontSize:'1rem'}}>{expectedIncome?.total||0}€ kokku</span>
                </div>
              )}
            </div>

            {/* Teacher stats */}
            <div>
              <div style={{fontSize:'.74rem',fontWeight:800,color:'#42536A',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:10}}>
                Tunnid õpetaja kaupa
              </div>
              {(teacherStats||[]).length===0&&(
                <div style={{color:'#42536A',fontSize:'.84rem'}}>Andmed puuduvad.</div>
              )}
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {(teacherStats||[]).map(t=>(
                  <div key={t.teacher} style={{padding:'10px 14px',borderRadius:10,background:'#F9F8F6',border:'1px solid rgba(28,43,58,.07)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',gap:10,marginBottom:6}}>
                      <div style={{fontWeight:700,fontSize:'.86rem'}}>{t.teacher}</div>
                      {t.revenue>0&&<span style={{fontWeight:700,color:'#2F5D50'}}>{t.revenue}€</span>}
                    </div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      <span className="badge" style={{background:'rgba(47,93,80,.1)',color:'#2F5D50'}}>
                        {t.planned} planeeritud
                      </span>
                      {t.done>0&&<span className="badge" style={{background:'rgba(28,43,58,.08)',color:'#42536A'}}>
                        {t.done} toimunud
                      </span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
      <div className="card" style={{padding:24}}>
        <h3 style={{marginBottom:16}}>Loo uus arve</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10,marginBottom:12}}>
          <select value={invStu} onChange={e=>setInvStu(e.target.value)}>
            <option value="">Vali õpilane *</option>
            {myStudents.filter(s=>s.active!==false).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <input type="number" value={invAmt} onChange={e=>setInvAmt(e.target.value)} placeholder="Summa (€) *"/>
          <input value={invDesc} onChange={e=>setInvDesc(e.target.value)} placeholder="Kirjeldus"/>
          <button onClick={()=>addInvoice()} className="btn btn-amber"><i className="fa-solid fa-plus"/> Loo arve</button>
        </div>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid rgba(28,43,58,.07)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
          <div style={{fontWeight:700,fontSize:'.9rem'}}>Kõik arved ({visibleInvoices.length}/{invoices.length})</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {[
              {id:'all',label:'Kõik'},
              {id:'pending',label:'Maksmata'},
              {id:'reported',label:'Teavitatud'},
              {id:'paid',label:'Makstud'}
            ].map(item=>(
              <button
                key={item.id}
                onClick={()=>setInvoiceFilter(item.id)}
                className="btn btn-ghost btn-sm"
                style={{
                  background:invoiceFilter===item.id?'#1C2B3A':'#fff',
                  color:invoiceFilter===item.id?'#fff':'#42536A',
                  borderColor:invoiceFilter===item.id?'#1C2B3A':'rgba(28,43,58,.12)'
                }}
              >
                {item.label}
              </button>
            ))}
          </div>
        </div>
        {visibleInvoices.length===0
          ?<div style={{padding:40,textAlign:'center',color:'#42536A'}}>Arveid pole.</div>
          :[...visibleInvoices].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(inv=>(
            <div key={inv.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px',borderBottom:'1px solid rgba(28,43,58,.05)',flexWrap:'wrap',gap:10}}>
              <div>
                <div style={{fontWeight:600,fontSize:'.9rem'}}>{inv.num} · {inv.studentName}</div>
                <div style={{fontSize:'.78rem',color:'#42536A'}}>{inv.desc} · {fmtDate(inv.date)} · tähtaeg {fmtDate(inv.due)}</div>
                {inv.parentPaymentStatus==='submitted'&&inv.status!=='Makstud'&&(
                  <div style={{fontSize:'.78rem',color:'#1d4ed8',marginTop:4}}>
                    Vanem teavitas maksest {fmtDate(inv.parentPaymentSubmittedAt)} · {PAYMENT_METHODS.find(method=>method.id===(inv.parentPaymentMethod||'bank'))?.label || 'Pangaülekanne'}
                  </div>
                )}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{fontWeight:700}}>{inv.amount}€</span>
                {inv.status==='Makstud'
                  ?<>
                    <span className="badge" style={{background:'#dcfce7',color:'#166534'}}>✓ Makstud</span>
                    <button onClick={()=>unmarkPaid(inv.id)} className="btn btn-red btn-sm">Tühista makse</button>
                  </>
                  :<><span className="badge" style={{background:'#fef3c7',color:'#92400e'}}>Ootel</span>
                    <button onClick={()=>markPaid(inv.id)} className="btn btn-pine btn-sm">Märgi makstud</button>
                  </>}
                {inv.parentPaymentStatus==='submitted'&&inv.status!=='Makstud'&&<span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>Vanem teavitas maksest</span>}
                <button onClick={()=>deleteInvoice(inv)} className="btn btn-red btn-sm">Kustuta</button>
                <button onClick={()=>printInvoice(inv)} className="btn btn-ghost btn-sm"><i className="fa-solid fa-print"/> Prindi</button>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── TUNNI MODAL ───────────────────────────────────────────────
function LessonModal({modalEv,setModalEv,lTopic,setLTopic,lGrade,setLGrade,
  lStatus,setLStatus,lComment,setLComment,
  lNewWords,setLNewWords,lGrammar,setLGrammar,lCovered,setLCovered,lNextNotes,setLNextNotes,
  lDur,setLDur,lessonFile,setLessonFile,saveLesson,deleteLesson,db,user,notify,students,markAttendance}) {

  const [moveDate,setMoveDate] = React.useState(modalEv.occurrenceDate||modalEv.date||new Date().toISOString().split("T")[0]);
  const [moveTime,setMoveTime] = React.useState(modalEv.time||"09:00");
  const [saving,setSaving]     = React.useState(false);
  const [savingDiary,setSavingDiary] = React.useState(false);

  const fmtDate = d => d?new Date(d).toLocaleDateString("et-EE",{day:"2-digit",month:"2-digit",year:"numeric"}):"—";
  const hasDate = Boolean(modalEv.date||modalEv.occurrenceDate);
  const st = modalEv.status||"Planeeritud";
  const isJournalEdit = Boolean(modalEv.lessonEntryId);
  const lessonDate = modalEv.occurrenceDate||modalEv.date||today();
  const assignedGroupStudents = React.useMemo(()=>{
    if(!modalEv.isGroup) return [];
    const ids = new Set([...(modalEv.students||[]),...(modalEv.groupMembers||[])]);
    return (students||[]).filter(student=>ids.has(student.id));
  },[modalEv,students]);
  const attendanceText = status => status==='coming'?'Tuli':status==='absent'?'Puudus':status==='warned'?'Hoiatas':'Märkimata';
  const setGroupAttendance = async(student,status)=>{
    if(!student?.id||!markAttendance) return;
    const key = `${student.id}_${lessonDate}`;
    await markAttendance(modalEv,key,status);
    setModalEv(prev=>{
      const nextAttendance = {...(prev.attendance||{})};
      if(status==='clear') delete nextAttendance[key];
      else nextAttendance[key] = {
        status,
        by:user.uid||'',
        byName:user.displayName||user.email||'',
        byRole:user.role||'',
        updatedAt:new Date().toISOString()
      };
      return {...prev,attendance:nextAttendance};
    });
  };
  const selectedLessonFiles = Array.isArray(lessonFile) ? lessonFile : (lessonFile ? [lessonFile] : []);
  const existingLessonAttachments = React.useMemo(()=>{
    if(modalEv.attachmentRemoved) return [];
    const list = Array.isArray(modalEv.attachments) ? modalEv.attachments.filter(att=>att&&(att.url||att.name)) : [];
    const legacyUrl = modalEv.fileUrl || modalEv.attachmentUrl || modalEv.attachment?.url || '';
    const legacyName = modalEv.fileName || modalEv.attachmentName || modalEv.attachment?.name || '';
    const legacy = legacyUrl ? [{
      url:legacyUrl,
      name:legacyName||'Tunni fail',
      type:modalEv.attachmentType || modalEv.attachment?.type || '',
      size:modalEv.attachmentSize || modalEv.attachment?.size || 0,
      uploadedAt:modalEv.attachment?.uploadedAt || ''
    }] : [];
    const urls = new Set(list.map(att=>att.url).filter(Boolean));
    return [...list,...legacy.filter(att=>!urls.has(att.url))];
  },[modalEv]);
  const removeExistingAttachment = index=>{
    const nextAttachments = existingLessonAttachments.filter((_,idx)=>idx!==index);
    const primary = nextAttachments[0] || null;
    setModalEv({
      ...modalEv,
      attachments:nextAttachments,
      fileUrl:primary?.url||'',
      fileName:primary?.name||'',
      attachmentUrl:primary?.url||'',
      attachmentName:primary?.name||'',
      attachmentType:primary?.type||'',
      attachmentSize:primary?.size||0,
      attachment:primary,
      attachmentRemoved:nextAttachments.length===0
    });
  };
  const removeSelectedAttachment = index=>{
    const nextFiles = selectedLessonFiles.filter((_,idx)=>idx!==index);
    setLessonFile(nextFiles);
  };
  const handleSaveLesson = async()=>{
    if(savingDiary) return;
    setSavingDiary(true);
    if(selectedLessonFiles.length) notify(`⏳ Laen üles ${selectedLessonFiles.length} faili...`);
    try{
      await saveLesson();
    }catch(err){
      console.error('Lesson save failed:',err);
      notify('⚠ Päeviku salvestamine ei õnnestunud. Proovi uuesti või eemalda failid.');
    }finally{
      setSavingDiary(false);
    }
  };

  const STATUS_COLOR = {
    Planeeritud:"#2F5D50",Nihutatud:"#A96E1A",Tühistatud:"#991b1b",Toimunud:"#42536A"
  };
  const STATUS_BG = {
    Planeeritud:"rgba(47,93,80,.1)",Nihutatud:"rgba(201,136,42,.1)",
    Tühistatud:"rgba(239,68,68,.08)",Toimunud:"rgba(28,43,58,.07)"
  };

  const cancelLesson = async()=>{
    if(!modalEv.id) return;
    await db.collection("schedule").doc(modalEv.id).update({status:"Tühistatud",canceledAt:new Date().toISOString().split("T")[0]});
    notify("✓ Tund tühistatud");
    setModalEv(prev=>({...prev,status:"Tühistatud"}));
  };

  const restoreLesson = async()=>{
    if(!modalEv.id) return;
    await db.collection("schedule").doc(modalEv.id).update({status:"Planeeritud"});
    notify("✓ Tund taastatud");
    setModalEv(prev=>({...prev,status:"Planeeritud"}));
  };

  const hardDeleteSchedule = async()=>{
    if(!modalEv.id) return;
    if(!window.confirm("Kustuta tund kalendrist täielikult?")) return;
    const linkedLessonSnap = await db.collection("lessons").where("scheduleId","==",modalEv.id).limit(1).get();
    if(!linkedLessonSnap.empty){
      const linkedLessonDoc = linkedLessonSnap.docs[0];
      const linkedLessonData = linkedLessonDoc.data();
      await linkedLessonDoc.ref.delete();
      if(linkedLessonData.studentId && linkedLessonData.studentId!=="ext" && linkedLessonData.status==="Toimunud"){
        await db.collection("students").doc(linkedLessonData.studentId).update({packageUsed:firebase.firestore.FieldValue.increment(-1)});
      }
    }
    await db.collection("schedule").doc(modalEv.id).delete();
    notify("✓ Tund kustutatud kalendrist");
    setModalEv(null);
  };

  const hardDeleteJournalEntry = async()=>{
    if(!modalEv.lessonEntryId) return;
    await deleteLesson({
      id: modalEv.lessonEntryId,
      studentId: modalEv.studentId||'',
      status: modalEv.status||lStatus,
      scheduleId: modalEv.scheduleId||modalEv.id||''
    });
    setModalEv(null);
  };

  const rescheduleLesson = async()=>{
    if(!modalEv.id||!moveDate){notify("⚠ Vali uus kuupäev");return;}
    setSaving(true);
    const jsDay = new Date(moveDate).getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    await db.collection("schedule").doc(modalEv.id).update({
      date:moveDate, day:dayId, time:moveTime,
      status:"Nihutatud",
      originalDate: modalEv.originalDate||modalEv.date||modalEv.occurrenceDate||null,
      originalTime: modalEv.originalTime||modalEv.time||null,
      rescheduledAt: new Date().toISOString().split("T")[0]
    });
    notify("✓ Tund tõsteti ümber: "+fmtDate(moveDate)+" "+moveTime);
    setModalEv(prev=>({...prev,date:moveDate,time:moveTime,status:"Nihutatud"}));
    setSaving(false);
  };

  const exportIcs = ()=>{
    const isoDate = moveDate||modalEv.occurrenceDate||modalEv.date;
    if(!isoDate){notify("⚠ Mallikirjet ei saa eksportida. Tõsta tund kuupäevale.");return;}
    const [y,m,d] = isoDate.split("-").map(Number);
    const [hh,mm] = (moveTime||modalEv.time||"09:00").split(":").map(Number);
    const start = new Date(y,m-1,d,hh,mm,0);
    const end   = new Date(start.getTime()+(parseInt(lDur)||60)*60000);
    const fmt   = dt => dt.getFullYear()+String(dt.getMonth()+1).padStart(2,"0")+String(dt.getDate()).padStart(2,"0")
                  +"T"+String(dt.getHours()).padStart(2,"0")+String(dt.getMinutes()).padStart(2,"0")+"00";
    const ics = [
      "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//KeeleSepp//Haldus//ET",
      "BEGIN:VEVENT",
      "UID:"+(modalEv.id||Date.now())+"@keelesepp",
      "DTSTART:"+fmt(start),"DTEND:"+fmt(end),
      "SUMMARY:KeeleSepp – "+modalEv.studentName,
      "DESCRIPTION:Õpetaja: "+(modalEv.teacher||user.displayName)+"\nStaatus: "+st,
      "END:VEVENT","END:VCALENDAR"
    ].join("\n");
    const blob = new Blob([ics],{type:"text/calendar;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download="keelesepp-"+modalEv.studentName.split(" ")[0].toLowerCase()+".ics";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    notify("✓ .ics fail allalaaditud!");
  };

  const makeRecurring = async()=>{
    if(!modalEv.id) return;
    const baseDate = modalEv.occurrenceDate||modalEv.date;
    if(!baseDate){notify("⚠ Vali konkreetne kuupäev");return;}
    const jsDay = new Date(baseDate).getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    await db.collection("schedule").doc(modalEv.id).update({
      recurring:true,
      startDate:baseDate,
      day:dayId,
      date:firebase.firestore.FieldValue.delete()
    });
    notify("✓ Tund kordub nüüd igal nädalal");
    setModalEv(prev=>({...prev,recurring:true,startDate:baseDate,day:dayId,date:null,occurrenceDate:baseDate}));
  };

  const makeSingle = async()=>{
    if(!modalEv.id) return;
    const baseDate = modalEv.occurrenceDate||modalEv.date||modalEv.startDate;
    if(!baseDate){notify("⚠ Vali konkreetne kuupäev");return;}
    const jsDay = new Date(baseDate).getDay();
    const dayId = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][jsDay];
    await db.collection("schedule").doc(modalEv.id).update({
      recurring:false,
      startDate:firebase.firestore.FieldValue.delete(),
      day:dayId,
      date:baseDate
    });
    notify("✓ Tund on nüüd ühekordne");
    setModalEv(prev=>({...prev,recurring:false,startDate:null,day:dayId,date:baseDate,occurrenceDate:baseDate}));
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(28,43,58,.6)",display:"flex",alignItems:"center",
      justifyContent:"center",padding:16,zIndex:200,backdropFilter:"blur(4px)"}}>
      <div className="card scroll" style={{padding:0,maxWidth:540,width:"100%",maxHeight:"92vh",overflowY:"auto",position:"relative"}}>

        {/* Шапка модалки */}
        <div style={{padding:"20px 24px 16px",borderBottom:"1px solid rgba(28,43,58,.08)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h2 style={{fontSize:"1.2rem",marginBottom:4}}>📋 Tunni aruanne</h2>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:".88rem",color:"#42536A"}}>
                <strong>{modalEv.studentName}</strong> · {fmtDate(modalEv.occurrenceDate||modalEv.date)} · {modalEv.time}
              </span>
              <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:999,
                fontSize:".73rem",fontWeight:700,background:STATUS_BG[st]||"rgba(47,93,80,.1)",color:STATUS_COLOR[st]||"#2F5D50"}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:STATUS_COLOR[st]||"#2F5D50"}}/>
                {st}
              </span>
              {!modalEv.date&&<span style={{fontSize:".7rem",padding:"2px 8px",borderRadius:999,background:"rgba(201,136,42,.1)",color:"#A96E1A",fontWeight:700}}>korduv mall</span>}
            </div>
          </div>
          <button onClick={()=>{setLessonFile([]);setModalEv(null);}}
            style={{background:"rgba(28,43,58,.07)",border:"none",cursor:"pointer",borderRadius:9,
              width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",color:"#42536A",flexShrink:0}}>✕</button>
        </div>

        <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>

          {/* Блок управления календарём */}
          {!isJournalEdit&&<div style={{background:"#F9F8F6",borderRadius:12,padding:16,border:"1px solid rgba(28,43,58,.07)"}}>
            <div style={{fontSize:".76rem",fontWeight:700,color:"#42536A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>
              📅 Kalendri haldus
            </div>

            {modalEv.id&&hasDate&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:".78rem",fontWeight:600,color:"#42536A",marginBottom:6}}>Tunni tüüp:</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <button
                    onClick={makeSingle}
                    className={`btn btn-sm ${modalEv.recurring?'btn-ghost':'btn-dark'}`}
                    disabled={!modalEv.recurring}
                    style={{opacity:modalEv.recurring?1:.9}}>
                    <i className="fa-solid fa-calendar-day"/> Ühekordne
                  </button>
                  <button
                    onClick={makeRecurring}
                    className={`btn btn-sm ${modalEv.recurring?'btn-dark':'btn-ghost'}`}
                    disabled={!!modalEv.recurring}
                    style={{opacity:modalEv.recurring?.9:1}}>
                    <i className="fa-solid fa-repeat"/> Korduv
                  </button>
                </div>
              </div>
            )}

            {/* Кнопки отмены/восстановления */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <button onClick={cancelLesson} className="btn btn-red btn-sm"
                disabled={!modalEv.id||st==="Tühistatud"}
                style={{opacity:st==="Tühistatud"?.4:1}}>
                <i className="fa-solid fa-ban"/> Tühista tund
              </button>
              <button onClick={restoreLesson} className="btn btn-pine btn-sm"
                disabled={!modalEv.id||st!=="Tühistatud"}

              </button>
            </div>

            {modalEv.id&&(
              <button onClick={hardDeleteSchedule} className="btn btn-ghost btn-sm" style={{width:"100%",marginBottom:12,color:"#991b1b",borderColor:"rgba(239,68,68,.25)"}}>

              </button>

            {/* Перенос */}
            <div style={{fontSize:".78rem",fontWeight:600,color:"#42536A",marginBottom:6}}>Tõsta tund ümber:</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <input type="date" value={moveDate} onChange={e=>setMoveDate(e.target.value)}

              <select value={moveTime} onChange={e=>setMoveTime(e.target.value)} disabled={!hasDate} style={{opacity:!hasDate?.5:1}}>

            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={rescheduleLesson} className="btn btn-amber btn-sm" disabled={!hasDate||saving} style={{flex:1,opacity:!hasDate?.5:1}}>

              <button onClick={exportIcs} className="btn btn-ghost btn-sm" disabled={!hasDate} style={{opacity:!hasDate?.5:1}} title="Ekspordi .ics faili (avab Google/Apple Calendar)">

            </div>
            {!hasDate&&<div style={{fontSize:".72rem",color:"#9ca3af",marginTop:8}}>Mallikirjet ei saa ümber tõsta. Loo uus konkreetse kuupäevaga tund.</div>}
            {modalEv.originalDate&&(
              <div style={{fontSize:".72rem",color:"#42536A",marginTop:8,display:"flex",gap:4}}>
                <span>Algne aeg:</span>
                <span style={{color:"#A96E1A",fontWeight:600}}>{fmtDate(modalEv.originalDate)} {modalEv.originalTime||""}</span>
              </div>
            )}
            {modalEv.recurring&&(
              <div style={{fontSize:".72rem",color:"#2F5D50",marginTop:8,fontWeight:600}}>
                See tund on korduv ja ilmub automaatselt ka järgmiste nädalate kalendrisse.
              </div>
            )}
          </div>}

          {modalEv.isGroup&&assignedGroupStudents.length>0&&st!=="Tühistatud"&&(
            <div style={{background:"#F9F8F6",borderRadius:12,padding:16,border:"1px solid rgba(28,43,58,.07)"}}>
              <div style={{fontSize:".76rem",fontWeight:700,color:"#42536A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>
                👥 Grupi kohalolu
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {assignedGroupStudents.map(student=>{
                  const key = `${student.id}_${lessonDate}`;
                  const saved = modalEv.attendance?.[key]?.status || '';
                  return (
                    <div key={student.id} style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,alignItems:"center",padding:"10px 12px",borderRadius:10,background:"#fff",border:"1px solid rgba(28,43,58,.08)"}}>
                      <div>
                        <div style={{fontWeight:800,color:"#1C2B3A",fontSize:".9rem"}}>{student.name}</div>
                        <div style={{fontSize:".74rem",color:saved?"#2F5D50":"#991b1b",fontWeight:700}}>
                          {attendanceText(saved)}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
                        <button type="button" onClick={()=>setGroupAttendance(student,'coming')} className={`btn btn-sm ${saved==='coming'?'btn-pine':'btn-ghost'}`} style={{padding:"7px 9px"}}>
                          Tuli
                        </button>
                        <button type="button" onClick={()=>setGroupAttendance(student,'absent')} className={`btn btn-sm ${saved==='absent'?'btn-red':'btn-ghost'}`} style={{padding:"7px 9px"}}>
                          Puudus
                        </button>
                        <button type="button" onClick={()=>setGroupAttendance(student,'warned')} className={`btn btn-sm ${saved==='warned'?'btn-amber':'btn-ghost'}`} style={{padding:"7px 9px"}}>
                          Hoiatas
                        </button>
                        {saved&&(
                          <button type="button" onClick={()=>setGroupAttendance(student,'clear')} className="btn btn-ghost btn-sm" style={{padding:"7px 9px",color:"#42536A"}}>
                            Tühjenda
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Блок записи урока */}
          {st!=="Tühistatud"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{fontSize:".76rem",fontWeight:700,color:"#42536A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:2}}>
                📝 Päeviku kanne
              </div>
              <input value={lTopic} onChange={e=>setLTopic(e.target.value)} placeholder="Tunni teema *"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <select value={lStatus} onChange={e=>setLStatus(e.target.value)}>
                  <option value="Toimunud">✓ Toimunud</option>
                  <option value="Puudus_p">Puudus (põhjusega)</option>
                  <option value="Puudus_eta">Puudus (põhjuseta)</option>
                </select>
                <select value={lGrade} onChange={e=>setLGrade(e.target.value)} disabled={lStatus!=="Toimunud"}>
                  <option value="5">5 ★★★★★</option>
                  <option value="4">4 ★★★★</option>
                  <option value="3">3 ★★★</option>
                  <option value="2">2 ★★</option>
                </select>
              </div>
              <select value={lDur} onChange={e=>setLDur(e.target.value)}>
                {LESSON_DURATIONS.map(d=><option key={d} value={d}>{d} minutit</option>)}
              </select>
              <textarea value={lComment} onChange={e=>setLComment(e.target.value)} placeholder="Õpetaja kommentaar…" rows={2} style={{resize:"vertical"}}/>
              <label style={{fontSize:".76rem",fontWeight:700,color:"#42536A",display:"flex",flexDirection:"column",gap:4}}>
                <span>📖 Uued sõnad ja väljendid <span style={{fontWeight:400,color:"#9ca3af"}}>(õpilane näeb)</span></span>
                <textarea value={lNewWords} onChange={e=>setLNewWords(e.target.value)}
                  placeholder="nt. sisse elama, kohalik kogukond…" rows={2} style={{resize:"vertical"}}/>
              </label>
              <label style={{fontSize:".76rem",fontWeight:700,color:"#42536A",display:"flex",flexDirection:"column",gap:4}}>
                <span>📐 Grammatika teema <span style={{fontWeight:400,color:"#9ca3af"}}>(õpilane näeb)</span></span>
                <textarea value={lGrammar} onChange={e=>setLGrammar(e.target.value)}
                  placeholder="nt. kuhu? vs kus? – suunaverbid…" rows={2} style={{resize:"vertical"}}/>
              </label>
              <label style={{fontSize:".76rem",fontWeight:700,color:"#42536A",display:"flex",flexDirection:"column",gap:4}}>
                <span>✅ Mida tegime tunnis <span style={{fontWeight:400,color:"#9ca3af"}}>(õpilane näeb)</span></span>
                <textarea value={lCovered} onChange={e=>setLCovered(e.target.value)}
                  placeholder="nt. Lugusime teksti, arutasime kultuuri teemal…" rows={2} style={{resize:"vertical"}}/>
              </label>
              <label style={{fontSize:".76rem",fontWeight:700,color:"#42536A",display:"flex",flexDirection:"column",gap:4}}>
                <span>🎯 Järgmiseks korraks <span style={{fontWeight:400,color:"#9ca3af"}}>(õpilane näeb)</span></span>
                <textarea value={lNextNotes} onChange={e=>setLNextNotes(e.target.value)}
                  placeholder="nt. Kordame sõnavara, lahendame harjutuse 3…" rows={2} style={{resize:"vertical"}}/>
              </label>
              <label style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,padding:'10px 12px',borderRadius:10,border:'1.5px solid rgba(28,43,58,.15)',background:'#fff',cursor:'pointer',fontSize:'.86rem',color:'#42536A'}}>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  <i className="fa-solid fa-paperclip" style={{marginRight:7}}/>
                  {selectedLessonFiles.length ? `${selectedLessonFiles.length} faili valitud` : existingLessonAttachments.length ? `Olemas: ${existingLessonAttachments.length} faili` : 'Lisa failid tunni juurde'}
                </span>
                <input type="file" multiple accept="image/*,.heic,.heif,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv" onChange={e=>setLessonFile(Array.from(e.target.files||[]))} style={{display:'none'}}/>
              </label>
              {selectedLessonFiles.length>0&&(
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {selectedLessonFiles.map((file,idx)=>(
                    <div key={`${file.name}-${idx}`} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'8px 10px',borderRadius:9,background:'#F9F8F6',border:'1px solid rgba(28,43,58,.07)'}}>
                      <span style={{fontSize:'.78rem',fontWeight:700,color:'#42536A',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        <i className="fa-solid fa-paperclip" style={{marginRight:7}}/>{file.name}
                      </span>
                      <button type="button" onClick={()=>removeSelectedAttachment(idx)} disabled={savingDiary} className="btn btn-ghost" style={{padding:'5px 8px',fontSize:'.72rem',color:'#991b1b',borderColor:'rgba(239,68,68,.25)',opacity:savingDiary?.45:1}}>
                        <i className="fa-solid fa-xmark"/> Eemalda
                      </button>
                    </div>
                  ))}
                </div>
              )}
              {existingLessonAttachments.length>0&&(
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {existingLessonAttachments.map((att,idx)=>(
                    <div key={`${att.url||att.name}-${idx}`} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'8px 10px',borderRadius:9,background:'#F9F8F6',border:'1px solid rgba(28,43,58,.07)'}}>
                      {att.url?(
                        <a href={att.url} target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:7,minWidth:0,fontSize:'.78rem',fontWeight:700,color:'#2F5D50',textDecoration:'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          <i className="fa-solid fa-paperclip"/> {att.name||'Tunni fail'}
                        </a>
                      ):(
                        <span style={{fontSize:'.78rem',fontWeight:700,color:'#42536A',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          <i className="fa-solid fa-paperclip" style={{marginRight:7}}/>{att.name||'Tunni fail'}
                        </span>
                      )}
                      <button type="button" onClick={()=>removeExistingAttachment(idx)} disabled={savingDiary} className="btn btn-ghost" style={{padding:'5px 8px',fontSize:'.72rem',color:'#991b1b',borderColor:'rgba(239,68,68,.25)',opacity:savingDiary?.45:1}}>
                        <i className="fa-solid fa-trash"/> Eemalda
                      </button>
                    </div>
                  ))}
                </div>
              )}
              <button onClick={handleSaveLesson} disabled={savingDiary} className="btn btn-dark" style={{width:"100%",padding:13,opacity:savingDiary?.75:1}}>
                <i className={`fa-solid ${savingDiary?'fa-spinner fa-spin':'fa-floppy-disk'}`}/> {savingDiary?'Salvestan...':'Salvesta päevikusse'}
              </button>
              {isJournalEdit&&(
                <button onClick={hardDeleteJournalEntry} disabled={savingDiary} className="btn btn-ghost" style={{width:"100%",padding:13,color:"#991b1b",borderColor:"rgba(239,68,68,.25)",opacity:savingDiary?.45:1}}>
                  <i className="fa-solid fa-trash"/> Kustuta päeviku kanne
                </button>
              )}
            </div>
          )}
          {st==="Tühistatud"&&(
            <div style={{textAlign:"center",padding:"16px 0",color:"#42536A",fontSize:".88rem"}}>
              Tühistatud tundi ei saa päevikusse kanda. Taasta tund enne.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── РЕДАКТИРОВАНИЕ И УДАЛЕНИЕ УЧЕНИКА ────────────────────────
function EditStudentModal({student,onClose,onSave,onDelete,db,notify,isAdmin,groupOptions=[]}) {
  const [name,    setName]    = React.useState(student.name||'');
  const [parentName,setParentName] = React.useState(student.parentName||'');
  const [email,   setEmail]   = React.useState(student.email||'');
  const [phone,   setPhone]   = React.useState(student.phone||'');
  const [level,   setLevel]   = React.useState(student.level||'A1');
  const [target,  setTarget]  = React.useState(student.targetLevel||'B1');
  const [subject, setSubject] = React.useState(student.subject||'Eesti keel');
  const [grade,   setGrade]   = React.useState(student.grade||'');
  const [group,   setGroup]   = React.useState(student.group||'');
  const [teacher, setTeacher] = React.useState(student.teacher||'Pavel');
  const [contactStatus,setContactStatus] = React.useState(student.contactStatus||'new');
  const [contactOwner,setContactOwner] = React.useState(student.contactOwner||'');
  const [contactLastAt,setContactLastAt] = React.useState(student.contactLastAt||'');
  const [contactNotes,setContactNotes] = React.useState(student.contactNotes||'');
  const [pkg,     setPkg]     = React.useState(String(student.packageTotal||0));
  const [used,    setUsed]    = React.useState(String(student.packageUsed||0));
  const [lessonPrice,setLessonPrice] = React.useState(String(student.lessonPrice||''));
  const [hiddenFields,setHiddenFields] = React.useState(student.hiddenFields||{});
  const toggleHide = field => setHiddenFields(prev=>({...prev,[field]:!prev[field]}));
  const HideToggle = ({field,label='Ei ole vaja'}) => (
    <label style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:'.7rem',color:hiddenFields[field]?'#991b1b':'#9ca3af',cursor:'pointer',marginTop:4,userSelect:'none'}}>
      <input type="checkbox" checked={!!hiddenFields[field]} onChange={()=>toggleHide(field)}
        style={{width:12,height:12,accentColor:'#dc2626'}}/>
      {hiddenFields[field]?'Peidetud':'Peida'}
    </label>
  );
  const [saving,  setSaving]  = React.useState(false);
  const [confirm, setConfirm] = React.useState(false);
  const modalGroupOptions = React.useMemo(()=>
    [...new Set([...(groupOptions||[]),group].map(g=>(g||'').trim()).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b,'et'))
  ,[groupOptions,group]);

  const save = async()=>{
    if(!name.trim()){notify('⚠ Sisesta nimi');return;}
    setSaving(true);
    await db.collection('students').doc(student.id).update({
      name,parentName,email,phone,level,targetLevel:target,
      subject,grade,group,teacher,
      contactStatus,contactOwner,contactLastAt,contactNotes,
      packageTotal:parseInt(pkg)||0,
      packageUsed:parseInt(used)||0,
      lessonPrice:parseFloat(lessonPrice)||0,
      hiddenFields,
      updatedAt: new Date().toISOString().split('T')[0]
    });
    notify('✓ Muudatused salvestatud!');
    onSave();
    setSaving(false);
  };

  const deleteStudent = async()=>{
    setSaving(true);
    // Кудалем ученика и связанные данные
    await db.collection('students').doc(student.id).delete();
    // Удаляем уроки
    const lessons = await db.collection('lessons').where('studentId','==',student.id).get();
    for(const doc of lessons.docs) await doc.ref.delete();
    // Удаляем домашние задания
    const hw = await db.collection('homework').where('studentId','==',student.id).get();
    for(const doc of hw.docs) await doc.ref.delete();
    // Удаляем счета
    const inv = await db.collection('invoices').where('studentId','==',student.id).get();
    for(const doc of inv.docs) await doc.ref.delete();
    notify('✓ Õpilane kustutatud');
    onDelete();
    setSaving(false);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.6)',display:'flex',alignItems:'center',
      justifyContent:'center',padding:16,zIndex:210,backdropFilter:'blur(4px)'}}>
      <div className="card scroll" style={{padding:0,maxWidth:520,width:'100%',maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{padding:'20px 24px 16px',borderBottom:'1px solid rgba(28,43,58,.08)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

// ── GOOGLE CALENDAR SETTINGS ──────────────────────────────────
function GCalSettings({user,notify}) {
  const [status,setStatus] = React.useState(null); // null | 'connected' | 'disconnected'
  const [lastSync,setLastSync] = React.useState(null);
  const [syncing,setSyncing] = React.useState(false);
  const FUNCTIONS_BASE = 'https://us-central1-keelesepp-5136b.cloudfunctions.net/gcalApi';

  React.useEffect(()=>{
    if(!user?.uid) return;
    fetch(`${FUNCTIONS_BASE}/gcal/status?uid=${user.uid}`)
      .then(r=>r.json())
      .then(d=>{
        setStatus(d.connected?'connected':'disconnected');
        setLastSync(d.connectedAt||null);
      })
      .catch(()=>setStatus('disconnected'));
  },[user?.uid]);

  const connect = async()=>{
    const r = await fetch(`${FUNCTIONS_BASE}/gcal/auth-url?uid=${user.uid}`);
    const d = await r.json();
    window.location.href = d.url;
  };

  const sync = async()=>{
    setSyncing(true);
    try{
      const r = await fetch(`${FUNCTIONS_BASE}/gcal/sync`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({uid:user.uid})
      });
      const d = await r.json();
      notify(`✓ Sünkroonitud: ${d.synced} sündmust`);
      setLastSync(new Date().toISOString());
    }catch(e){
      notify('⚠ Sünkroonimine ebaõnnestus');
    }
    setSyncing(false);
  };

  const disconnect = async()=>{
    if(!window.confirm('Eemalda Google Calendar ühendus?')) return;
    await fetch(`${FUNCTIONS_BASE}/gcal/disconnect`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({uid:user.uid})
    });
    setStatus('disconnected');
    notify('✓ Google Calendar ühendus eemaldatud');
  };

  return(
    <div className="card" style={{padding:22,marginTop:16}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <div style={{width:32,height:32,borderRadius:8,background:'rgba(66,133,244,.12)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="4" width="18" height="17" rx="2" stroke="#4285f4" strokeWidth="2"/>
            <path d="M3 9h18" stroke="#4285f4" strokeWidth="2"/>
            <path d="M8 2v4M16 2v4" stroke="#4285f4" strokeWidth="2" strokeLinecap="round"/>
          </svg>
        </div>
        <div>
          <div style={{fontWeight:700}}>Google Calendar</div>
          <div style={{fontSize:'.76rem',color:'#42536A'}}>
            {status==='connected'
              ? <span style={{color:'#166534'}}>✓ Ühendatud{lastSync&&` · Viimane sync: ${new Date(lastSync).toLocaleDateString('et-EE')}`}</span>
              : 'Ühenda oma Google Calendar tunniplaan'}
          </div>
        </div>
      </div>

      {status===null&&<div style={{color:'#9ca3af',fontSize:'.84rem'}}>Kontrollin staatust…</div>}

      {status==='disconnected'&&(
        <button onClick={connect} className="btn btn-pine" style={{gap:8}}>
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12.545 10.239v3.821h5.445c-.712 2.315-2.647 3.972-5.445 3.972a6.033 6.033 0 110-12.064 5.95 5.95 0 014.131 1.619l2.921-2.921A10 10 0 1022 12c0-.637-.057-1.266-.166-1.878H12.545z" fill="#fff"/></svg>
          Ühenda Google Calendar
        </button>
      )}

      {status==='connected'&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick={sync} disabled={syncing} className="btn btn-pine">
            {syncing?'Sünkroonimine…':'🔄 Sünkrooni kohe'}
          </button>
          <button onClick={disconnect} className="btn btn-ghost" style={{color:'#dc2626'}}>
            Eemalda ühendus
          </button>
        </div>
      )}

      {status==='connected'&&(
        <div style={{marginTop:14,padding:'10px 14px',background:'#F9F8F6',borderRadius:10,fontSize:'.78rem',color:'#42536A'}}>
          <strong>Kuidas toimib:</strong> Sündmused sünkroonitakse automaatselt iga tund.
          Õpilase nimi peab olema sündmuse pealkirjas, nt: <em>"Занятие — Hanna Skoryk"</em> või <em>"Tund - Maria Mägi"</em>.
          Sündmused kuvatakse tunniplaanis ja õpilase isiklikul lehel.
        </div>
      )}
    </div>
  );
}

  const mergeParentDuplicates=useCallback(async(row)=>{
    if(!isAdmin){notify('⚠ Ainult administraator saab duplikaate ühendada');return;}
    const primary = row?.parent;
    if(!primary?.id){notify('⚠ Põhikonto puudub');return;}
    const duplicateParents = (row.duplicateParents||[]).filter(parent=>parent?.id&&parent.id!==primary.id);
    const allParents = [primary,...duplicateParents];
    const parentIds = new Set(allParents.map(parent=>parent.id).filter(Boolean));
    const parentEmails = new Set(allParents.map(parent=>normalizeText(parent.email)).filter(Boolean));
    const parentNames = new Set(allParents.map(parent=>normalizeText(parent.displayName)).filter(Boolean));
    const childNames = new Set([
      ...allParents.flatMap(parent=>parseLinkedNames(parent.childName)),
      ...(row.rawNames||[]).map(name=>normalizeText(name)),
      ...(row.linkedChildren||[]).map(student=>normalizeText(student.name))
    ].filter(Boolean));
    const hiddenParentCards = students.filter(student=>{
      if(student.active===false || student.convertedToParent) return false;
      const studentName = normalizeText(student.name);
      const studentEmail = normalizeText(student.email);
      const studentParentEmail = normalizeText(student.parentEmail || student.contactEmail || student.guardianEmail);
      const studentParentName = normalizeText(student.parentName || student.guardianName);
      return parentNames.has(studentName) || parentEmails.has(studentEmail) ||
        (!!studentParentEmail && parentEmails.has(studentParentEmail)) ||
        (!!studentParentName && parentNames.has(studentParentName));
    });
    if(!duplicateParents.length && !hiddenParentCards.length){
      notify('Duplikaate pole ühendada');
      return;
    }
    if(!window.confirm(`Ühendada ${duplicateParents.length} lapsevanema duplikaati ja ${hiddenParentCards.length} vale õpilase kaarti profiiliga ${primary.displayName||primary.email}?`)) return;
    try{
      const best = field => allParents.map(parent=>parent?.[field]).filter(Boolean).sort((a,b)=>String(b).length-String(a).length)[0] || '';
      const bestName = best('displayName') || primary.displayName || '';
      const bestEmail = best('email') || primary.email || '';
      const bestPhone = best('phone') || best('parentPhone') || primary.phone || primary.parentPhone || '';
      const batch = db.batch();
      batch.set(db.collection('users').doc(primary.id),{
        displayName:bestName,
        email:bestEmail,
        phone:bestPhone,
        parentPhone:bestPhone,
        childName:[...childNames].join(', '),
        parentReviewStatus:'checked',
        parentReviewKey:[...childNames].join('|'),
        mergedDuplicateParentIds:duplicateParents.map(parent=>parent.id),
        parentMergedAt:new Date().toISOString(),
        parentMergedBy:user?.displayName||user?.email||''
      },{merge:true});
      duplicateParents.forEach(parent=>{
        batch.set(db.collection('users').doc(parent.id),{
          active:false,
          mergedIntoParentId:primary.id,
          mergedIntoParentName:bestName,
          parentReviewStatus:'merged',
          parentMergedAt:new Date().toISOString(),
          parentMergedBy:user?.displayName||user?.email||''
        },{merge:true});
      });
      students.forEach(student=>{
        if(!student?.id || student.active===false) return;
        const linkedParentId = student.linkedParentId || student.parentUid || student.guardianUid || '';
        const studentName = normalizeText(student.name);
        const studentEmail = normalizeText(student.email);
        const studentParentEmail = normalizeText(student.parentEmail || student.contactEmail || student.guardianEmail);
        const studentParentName = normalizeText(student.parentName || student.guardianName);
        const looksLikeParentCard = parentNames.has(studentName) || parentEmails.has(studentEmail);
        const belongsToParent = parentIds.has(linkedParentId) ||
          (!!studentParentEmail && parentEmails.has(studentParentEmail)) ||
          (!!studentParentName && parentNames.has(studentParentName)) ||
          childNames.has(studentName);
        if(looksLikeParentCard){
          batch.set(db.collection('students').doc(student.id),{
            active:false,
            convertedToParent:true,
            mergedIntoParentId:primary.id,
            archivedAt:new Date().toISOString()
          },{merge:true});
          return;
        }
        if(belongsToParent){
          batch.set(db.collection('students').doc(student.id),{
            linkedParentId:primary.id,
            parentUid:primary.id,
            parentName:bestName,
            parentEmail:bestEmail,
            phone:student.phone || bestPhone,
            updatedAt:new Date().toISOString()
          },{merge:true});
        }

  const mergeStudentDuplicates=useCallback(async(group)=>{
    if(!isAdmin){notify('⚠ Ainult administraator saab duplikaate ühendada');return;}
    const candidates = (group||[]).filter(student=>student?.id);
    if(candidates.length<2){notify('Duplikaate pole ühendada');return;}
    const lessonCount = student => lessons.filter(lesson=>lesson.studentId===student.id || normalizeText(lesson.studentName)===normalizeText(student.name)).length;
    const invoiceCount = student => invoices.filter(inv=>inv.studentId===student.id || normalizeText(inv.studentName)===normalizeText(student.name)).length;
    const score = student =>
      lessonCount(student)*4 + invoiceCount(student)*3 +
      ['parentName','parentEmail','phone','group','grade','contactNotes'].reduce((sum,field)=>sum+(student[field]?1:0),0) +
      (parseInt(student.packageTotal)||0) + (parseInt(student.packageUsed)||0);
    const primary = [...candidates].sort((a,b)=>score(b)-score(a))[0];
    const duplicates = candidates.filter(student=>student.id!==primary.id);
    if(!window.confirm(`Ühendada ${duplicates.length} duplikaati õpilasega ${primary.name}?`)) return;
    try{
      const best = field => candidates.map(student=>student?.[field]).filter(Boolean).sort((a,b)=>String(b).length-String(a).length)[0] || '';
      const duplicateIds = new Set(duplicates.map(student=>student.id));
      const duplicateNames = new Set(duplicates.map(student=>normalizeText(student.name)).filter(Boolean));
      const primaryName = best('name') || primary.name || '';
      const batch = db.batch();
      batch.set(db.collection('students').doc(primary.id),{
        name:primaryName,
        parentName:best('parentName') || best('guardianName') || primary.parentName || '',
        parentEmail:best('parentEmail') || best('contactEmail') || best('guardianEmail') || primary.parentEmail || '',
        phone:best('phone') || primary.phone || '',
        group:best('group') || primary.group || '',
        grade:best('grade') || primary.grade || '',
        subject:best('subject') || primary.subject || 'Eesti keel',
        teacher:best('teacher') || primary.teacher || '',
        level:best('level') || primary.level || 'A1',
        targetLevel:best('targetLevel') || primary.targetLevel || 'B1',
        packageTotal:Math.max(...candidates.map(student=>parseInt(student.packageTotal)||0),0),
        packageUsed:Math.max(...candidates.map(student=>parseInt(student.packageUsed)||0),0),
        mergedDuplicateIds:[...new Set([...(primary.mergedDuplicateIds||[]),...duplicates.map(student=>student.id)])],
        mergedAt:new Date().toISOString(),
        mergedBy:user?.displayName||user?.email||'',
        active:true
      },{merge:true});
      lessons.forEach(lesson=>{
        if(!lesson?.id) return;
        if(duplicateIds.has(lesson.studentId) || duplicateNames.has(normalizeText(lesson.studentName))){
          batch.set(db.collection('lessons').doc(lesson.id),{
            studentId:primary.id,
            studentName:primaryName,
            mergedStudentAt:new Date().toISOString()
          },{merge:true});
        }
      });
      homework.forEach(item=>{
        if(!item?.id) return;
        if(duplicateIds.has(item.studentId) || duplicateNames.has(normalizeText(item.studentName))){
          batch.set(db.collection('homework').doc(item.id),{
            studentId:primary.id,
            studentName:primaryName,
            mergedStudentAt:new Date().toISOString()
          },{merge:true});
        }
      });
      invoices.forEach(inv=>{
        if(!inv?.id) return;
        if(duplicateIds.has(inv.studentId) || duplicateNames.has(normalizeText(inv.studentName))){
          batch.set(db.collection('invoices').doc(inv.id),{
            studentId:primary.id,
            studentName:primaryName,
            mergedStudentAt:new Date().toISOString()
          },{merge:true});
        }
      });
      duplicates.forEach(student=>{
        batch.set(db.collection('students').doc(student.id),{
          active:false,
          mergedIntoStudentId:primary.id,
          mergedIntoStudentName:primaryName,
          mergedAt:new Date().toISOString(),
          mergedBy:user?.displayName||user?.email||''
        },{merge:true});
      });
      await batch.commit();
      await logActivity('student.duplicates_merged','Õpilase duplikaadid ühendati',{
        studentId:primary.id,
        studentName:primaryName,
        duplicateCount:duplicates.length
      });
      notify('✓ Õpilase duplikaadid ühendatud');
    }catch(err){
      console.error('Student merge failed:',err);
      notify('⚠ Õpilaste duplikaate ei saanud ühendada');

  const saveLesson=useCallback(async()=>{
    if(!modalEv||!lTopic.trim()){notify('⚠ Sisesta tunni teema');return;}
    const stu=students.find(s=>s.name.toLowerCase()===modalEv.studentName.toLowerCase());
    const now=new Date();
    const selectedLessonFiles = Array.isArray(lessonFile) ? lessonFile : (lessonFile ? [lessonFile] : []);
    const inferFileType = file=>{
      if(file?.type) return file.type;
      const name = String(file?.name||'').toLowerCase();
      if(name.endsWith('.heic')) return 'image/heic';
      if(name.endsWith('.heif')) return 'image/heif';
      if(name.endsWith('.pdf')) return 'application/pdf';
      if(name.endsWith('.doc')) return 'application/msword';
      if(name.endsWith('.docx')) return 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
      if(name.endsWith('.xls')) return 'application/vnd.ms-excel';
      if(name.endsWith('.xlsx')) return 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
      if(name.endsWith('.ppt')) return 'application/vnd.ms-powerpoint';
      if(name.endsWith('.pptx')) return 'application/vnd.openxmlformats-officedocument.presentationml.presentation';
      if(name.endsWith('.txt')) return 'text/plain';
      if(name.endsWith('.csv')) return 'text/csv';
      return 'application/octet-stream';
    };
    const collectAttachments = source=>{
      if(!source || source.attachmentRemoved) return [];
      const list = Array.isArray(source.attachments) ? source.attachments.filter(att=>att&&(att.url||att.name)) : [];
      const legacyUrl = source.fileUrl || source.attachmentUrl || source.attachment?.url || '';
      const legacyName = source.fileName || source.attachmentName || source.attachment?.name || '';
      const legacy = legacyUrl ? [{
        url:legacyUrl,
        name:legacyName||'Tunni fail',
        type:source.attachmentType || source.attachment?.type || '',
        size:source.attachmentSize || source.attachment?.size || 0,
        uploadedAt:source.attachment?.uploadedAt || ''
      }] : [];
      const urls = new Set(list.map(att=>att.url).filter(Boolean));
      return [...list,...legacy.filter(att=>!urls.has(att.url))];
    };
    const saveInlineFile = file => new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
    const withUploadTimeout = (promise,fileName,timeoutMs=30000) => Promise.race([
      promise,
      new Promise((_,reject)=>setTimeout(()=>reject(new Error(`Faili laadimine võttis liiga kaua: ${fileName}`)),timeoutMs))
    ]);
    const uploadLessonFile = async file=>{
      const fileType = inferFileType(file);
      const safeName = (file.name||'fail').replace(/[^\w.\-]+/g,'_') || 'fail';
      try{
        if(!storage) throw new Error('Firebase Storage pole saadaval');
        const fileRef = storage.ref().child(`lessons/${stu?.id||'external'}/${Date.now()}_${safeName}`);
        await withUploadTimeout(fileRef.put(file,{contentType:fileType}),safeName);
        const url = await withUploadTimeout(fileRef.getDownloadURL(),safeName,15000);
        return {url,name:file.name||safeName,type:fileType,size:file.size||0,uploadedAt:now.toISOString()};
      }catch(uploadErr){
        console.warn('Lesson file upload failed:',uploadErr);
        if((file.size||0) <= 650*1024){
          const url = await saveInlineFile(file);
          return {url,name:file.name||safeName,type:fileType,size:file.size||0,uploadedAt:now.toISOString(),inline:true};
        }
        throw uploadErr;
      }
    };
    let attachments = collectAttachments(modalEv);
    let primaryAttachment = attachments[0] || null;
    const lessonPayload = {
      studentId:stu?stu.id:'ext',studentName:modalEv.studentName,
      scheduleId: modalEv.id||'',
      scheduleTime: modalEv.time||'',
      topic:lTopic,grade:lStatus==='Toimunud'?parseInt(lGrade):0,
      duration:parseInt(lDur),status:lStatus,comment:lComment,
      newWords:lNewWords||'',grammar:lGrammar||'',covered:lCovered||'',nextNotes:lNextNotes||'',
      date:modalEv.occurrenceDate||modalEv.date||today(),submittedAt:now.toLocaleString('et-EE'),teacher:user.displayName,
      updatedAt: now.toISOString(),
      fileUrl:primaryAttachment?.url||'',
      fileName:primaryAttachment?.name||'',
      attachmentUrl:primaryAttachment?.url||'',
      attachmentName:primaryAttachment?.name||'',
      attachmentType:primaryAttachment?.type||'',
      attachmentSize:primaryAttachment?.size||0,
      attachment:primaryAttachment,
      attachments
    };

    let existingLessonDoc = null;
    let existingLessonRef = null;
    let existingLessonData = null;
    if(modalEv.lessonEntryId){
      existingLessonRef = db.collection('lessons').doc(modalEv.lessonEntryId);
      const existingSnap = await existingLessonRef.get();
      if(existingSnap.exists) existingLessonData = existingSnap.data();
      if(existingSnap.exists) existingLessonDoc = existingSnap;
    }else{
      const lessonDate = modalEv.occurrenceDate||modalEv.date||today();
      const existingLocal = lessons.find(l=>
        (
          (modalEv.id && l.scheduleId===modalEv.id && String(l.date||'')===String(lessonDate)) ||
          (
            normalizeText(l.studentName)===normalizeText(modalEv.studentName) &&
            String(l.date||'')===String(lessonDate) &&
            (!modalEv.time || !l.scheduleTime || String(l.scheduleTime)===String(modalEv.time))
          )
        )
      );
      if(existingLocal?.id){
        existingLessonRef = db.collection('lessons').doc(existingLocal.id);
        existingLessonData = existingLocal;
      }
    }

    if(existingLessonData && selectedLessonFiles.length===0 && attachments.length===0 && !modalEv.attachmentRemoved){
      const preservedAttachments = collectAttachments(existingLessonData);
      const preservedPrimary = preservedAttachments[0] || null;
      lessonPayload.fileUrl = preservedPrimary?.url || '';
      lessonPayload.fileName = preservedPrimary?.name || '';
      lessonPayload.attachmentUrl = preservedPrimary?.url || '';
      lessonPayload.attachmentName = preservedPrimary?.name || '';
      lessonPayload.attachmentType = preservedPrimary?.type || '';
      lessonPayload.attachmentSize = preservedPrimary?.size || 0;
      lessonPayload.attachment = preservedPrimary;
      lessonPayload.attachments = preservedAttachments;
    }
    const wasExistingLesson = !!existingLessonRef;
    let savedLessonId = existingLessonRef?.id || '';
    if(existingLessonRef){
      await existingLessonRef.update(lessonPayload);
    }else{
      const createdLessonRef = await db.collection('lessons').add({
        ...lessonPayload,
        createdAt: today()
      });
      savedLessonId = createdLessonRef.id;
    }
    const savedLesson = {id:savedLessonId,...lessonPayload};
    setLes(prev=>[savedLesson,...prev.filter(l=>l.id!==savedLessonId)]);
    await logActivity(wasExistingLesson?'lesson.updated':'lesson.created', wasExistingLesson?'Tunni kanne uuendati':'Tunni kanne lisati', {
      studentId:stu?.id||'',
      studentName:modalEv.studentName,
      lessonId:savedLessonId,
      hasFile:Array.isArray(lessonPayload.attachments)&&lessonPayload.attachments.length>0
    });

    if(modalEv.id){
      const scheduleStatus = lStatus==='Toimunud' ? 'Toimunud' : 'Planeeritud';
      await db.collection('schedule').doc(modalEv.id).update({status:scheduleStatus});
    }

    if(stu){
      const wasCounted = existingLessonData?.status==='Toimunud';
      const isCounted = lStatus==='Toimunud';
      if(!existingLessonRef && isCounted){
        await db.collection('students').doc(stu.id).update({
          packageUsed:firebase.firestore.FieldValue.increment(1),
          lessonsSinceInvoice:firebase.firestore.FieldValue.increment(1)
        });
      }else if(existingLessonRef && !wasCounted && isCounted){
        await db.collection('students').doc(stu.id).update({
          packageUsed:firebase.firestore.FieldValue.increment(1),
          lessonsSinceInvoice:firebase.firestore.FieldValue.increment(1)
        });
      }else if(existingLessonRef && wasCounted && !isCounted){
        await db.collection('students').doc(stu.id).update({
          packageUsed:firebase.firestore.FieldValue.increment(-1),
          lessonsSinceInvoice:firebase.firestore.FieldValue.increment(-1)
        });
      }
    }

    setLTopic('');setLComment('');setLNewWords('');setLGrammar('');setLCovered('');setLNextNotes('');setLessonFile([]);setModalEv(null);
    notify(existingLessonRef?'✓ Aruanne uuendatud!':'✓ Aruanne salvestatud!');
    if(selectedLessonFiles.length){
      const filesToUpload = [...selectedLessonFiles];
      const baseAttachments = [...(lessonPayload.attachments||[])];
      const targetLessonId = savedLessonId;
      notify(`⏳ ${filesToUpload.length} faili laetakse taustal...`);
      setTimeout(async()=>{
        const uploadedResults = await Promise.allSettled(filesToUpload.map(file=>uploadLessonFile(file)));
        const uploadedAttachments = uploadedResults.filter(result=>result.status==='fulfilled').map(result=>result.value);
        const failedUploads = uploadedResults.filter(result=>result.status==='rejected');
        if(failedUploads.length){
          console.error('Lesson attachments upload failed:',failedUploads.map(result=>result.reason));
          notify(`⚠ ${failedUploads.length} faili ei õnnestunud lisada. Päevik ise on salvestatud.`);
        }
        if(!uploadedAttachments.length) return;
        const nextAttachments = [...baseAttachments,...uploadedAttachments];
        const nextPrimary = nextAttachments[0] || null;
        const attachmentUpdate = {
          fileUrl:nextPrimary?.url||'',
          fileName:nextPrimary?.name||'',
          attachmentUrl:nextPrimary?.url||'',
          attachmentName:nextPrimary?.name||'',
          attachmentType:nextPrimary?.type||'',
          attachmentSize:nextPrimary?.size||0,
          attachment:nextPrimary,
          attachments:nextAttachments,
          updatedAt:new Date().toISOString()
        };
        try{
          await db.collection('lessons').doc(targetLessonId).update(attachmentUpdate);
          setLes(prev=>prev.map(lesson=>lesson.id===targetLessonId?{...lesson,...attachmentUpdate}:lesson));
          notify(`✓ ${uploadedAttachments.length} faili lisatud päevikusse`);
        }catch(err){
          console.error('Lesson attachment save failed:',err);
          notify('⚠ Failid laeti üles, aga neid ei õnnestunud päevikuga siduda.');
        }
      },0);
    }
  },[modalEv,lTopic,lGrade,lStatus,lComment,lDur,lessonFile,students,lessons,user,logActivity,notify]);

  const addHw=useCallback(async()=>{

      notify(`⏳ Laen üles ${hwFiles.length} faili...`);
      for(const file of hwFiles){
        try{
          const safeName = file.name.replace(/[^\w.\-]+/g,'_');
          const fileRef = storage.ref().child(`homework/${selStu.id}/${Date.now()}_${safeName}`);
          await fileRef.put(file);
          const url = await fileRef.getDownloadURL();
          attachments.push({url, name:file.name, size:file.size||0});
        }catch(err){
          console.warn('HW file upload failed:', err);
          notify(`⚠ Faili "${file.name}" üleslaadmine ebaõnnestus`);
        }
      }
    }
