      await db.collection('schedule').doc(lesson.scheduleId).update({status:'Planeeritud'});
    }
    notify('✓ Tunni sissekanne kustutatud');
  },[]);

  const openLessonEditor=useCallback(async(lesson)=>{
    if(!lesson) return;
    let freshLesson = lesson;
    if(lesson.id){
      try{
        const freshSnap = await db.collection('lessons').doc(lesson.id).get();
        if(freshSnap.exists) freshLesson = {id:freshSnap.id,...freshSnap.data()};
      }catch(err){
        console.warn('Fresh lesson load failed:',err);
      }
    }
    const lessonFileUrl = freshLesson.fileUrl || freshLesson.attachmentUrl || freshLesson.attachment?.url || '';
    const lessonFileName = freshLesson.fileName || freshLesson.attachmentName || freshLesson.attachment?.name || '';
    setLTopic(freshLesson.topic||'');
    setLGrade(String(freshLesson.grade||'5'));
    setLStatus(freshLesson.status||'Toimunud');
    setLComment(freshLesson.comment||'');
    setLDur(String(freshLesson.duration||'60'));
    setLessonFile(null);
    setModalEv({
      lessonEntryId: freshLesson.id,
      id: freshLesson.scheduleId||'',
      scheduleId: freshLesson.scheduleId||'',
      studentId: freshLesson.studentId||'',
      studentName: freshLesson.studentName,
      teacher: freshLesson.teacher||user.displayName,
      date: freshLesson.date||today(),
      occurrenceDate: freshLesson.date||today(),
      time: freshLesson.scheduleTime||'09:00',
      status: freshLesson.status||'Toimunud',
      fileUrl: lessonFileUrl,
      fileName: lessonFileName,
      attachmentUrl: lessonFileUrl,
      attachmentName: lessonFileName,
      attachmentType: freshLesson.attachmentType || freshLesson.attachment?.type || '',
      attachmentSize: freshLesson.attachmentSize || freshLesson.attachment?.size || 0,
      attachment: freshLesson.attachment || null,
      attachmentRemoved:false
    });
  },[user]);

  const openScheduleEditor=useCallback((event)=>{
    if(!event) return;
    const lessonDate = event.occurrenceDate||event.date||today();
    const existingLesson = lessons.find(l=>{
      const sameDate = String(l.date||'')===String(lessonDate);
      const sameSchedule = event.id && l.scheduleId===event.id && sameDate;
      const sameStudent = normalizeText(l.studentName)===normalizeText(event.studentName);
      const sameTime = !event.time || !l.scheduleTime || String(l.scheduleTime)===String(event.time);
      return sameSchedule || (sameStudent && sameDate && sameTime);
    });
    if(existingLesson){
      openLessonEditor({
        ...existingLesson,
        scheduleId:existingLesson.scheduleId||event.id||'',
        scheduleTime:existingLesson.scheduleTime||event.time||'',
        date:existingLesson.date||lessonDate
      });
      return;
    }
    setLTopic('');
    setLGrade('5');
    setLStatus(event.status==='Tühistatud'?'Puudus_eta':'Toimunud');
    setLComment('');
    setLDur('60');
    setLessonFile(null);
    setModalEv({...event,occurrenceDate:lessonDate,date:event.date||lessonDate,fileUrl:'',fileName:'',attachmentUrl:'',attachmentName:''});
  },[lessons,openLessonEditor]);

  const addInvoice=useCallback(async(stuId)=>{
    const sid=stuId||invStu;
    if(!invAmt||!sid){notify('⚠ Vali õpilane ja sisesta summa');return;}
    const stu=students.find(s=>s.id===sid);
    const num=`KS-${new Date().getFullYear()}-${String(invoices.length+1).padStart(3,'0')}`;
    const due=new Date(Date.now()+PAYMENT_DETAILS.paymentTermDays*864e5).toISOString().split('T')[0];
    const ref = await db.collection('invoices').add({
      studentId:sid,
      studentName:stu?.name||'—',
      amount:parseInt(invAmt),
      desc:invDesc||'Keeletunnid',
      num,
      status:'Ootel',
      date:today(),
      due,
      parentPaymentStatus:'pending',
      parentPaymentMethod:'',
      parentPaymentSubmittedAt:'',
      paymentReference:num
    });
    await logActivity('invoice.created','Loodi arve',{invoiceId:ref.id,studentId:sid,studentName:stu?.name||'—',amount:parseInt(invAmt),num});
    setInvAmt('');setInvDesc('');setInvStu('');
    notify('✓ Arve '+num+' loodud!');
  },[invStu,invAmt,invDesc,invoices,students,logActivity]);

  const markPaid=useCallback(async id=>{
    await db.collection('invoices').doc(id).update({status:'Makstud',paidAt:today(),parentPaymentStatus:'confirmed'});
    await logActivity('invoice.paid','Arve märgiti makstuks',{invoiceId:id});
    notify('✓ Märgitud makstud!');
  },[logActivity]);

  const unmarkPaid=useCallback(async id=>{
    await db.collection('invoices').doc(id).update({
      status:'Ootel',
      paidAt:firebase.firestore.FieldValue.delete(),
      parentPaymentStatus:'pending',
      parentPaymentSubmittedAt:'',
      parentPaymentMethod:''
    });
    await logActivity('invoice.unpaid','Arve makse tühistati',{invoiceId:id});
    notify('✓ Makse tühistatud');
  },[logActivity]);

  const deleteInvoice=useCallback(async(inv)=>{
    if(!inv?.id) return;
    if(!window.confirm(`Kustuta arve ${inv.num}?`)) return;
    await db.collection('invoices').doc(inv.id).delete();
    await logActivity('invoice.deleted','Arve kustutati',{invoiceId:inv.id,studentId:inv.studentId||'',studentName:inv.studentName||'',num:inv.num||''});
    notify(`✓ Arve ${inv.num} kustutatud`);
  },[logActivity]);

  const submitParentPayment=useCallback(async(id,method)=>{
    await db.collection('invoices').doc(id).update({
      parentPaymentStatus:'submitted',
      parentPaymentMethod:method||'bank',
      parentPaymentSubmittedAt:today()
    });
    notify('✓ Maksest teatatud!');
  },[]);

  const resetParentPayment=useCallback(async(id)=>{
    await db.collection('invoices').doc(id).update({
      parentPaymentStatus:'pending',
      parentPaymentSubmittedAt:'',
      parentPaymentMethod:''
    });
    notify('✓ Makseteavitus lähtestatud');
  },[]);

  const printInvoice=useCallback(inv=>{
    const stu=students.find(s=>s.id===inv.studentId);
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Arve ${inv.num}</title>
    <style>body{font-family:Georgia,serif;padding:60px;color:#1C2B3A;max-width:700px;margin:0 auto}
    .logo{font-size:2rem;font-weight:700}b{color:#C9882A}
    h1{font-size:1.4rem;border-bottom:2px solid #C9882A;padding-bottom:12px;margin:30px 0 20px}
    .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
    .total{font-size:1.3rem;font-weight:700;color:#2F5D50}
    .footer{margin-top:50px;font-size:.8rem;color:#666;text-align:center}
    </style></head><body>
    <div class="logo">Keele<b>Sepp</b></div>
    <div style="font-size:.85rem;color:#666">${PAYMENT_DETAILS.company} · Reg. kood ${PAYMENT_DETAILS.regCode}</div>
    <div style="font-size:.85rem;color:#666">${PAYMENT_DETAILS.address}</div>
    <div style="font-size:.85rem;color:#666">${PAYMENT_DETAILS.iban} · ${PAYMENT_DETAILS.bank} · SWIFT ${PAYMENT_DETAILS.swift}</div>
    <h1>ARVE ${inv.num}</h1>
    <div class="row"><span>Arve number:</span><span>${inv.num}</span></div>
    <div class="row"><span>Kuupäev:</span><span>${fmtDate(inv.date)}</span></div>
    <div class="row"><span>Tähtaeg:</span><span>${fmtDate(inv.due)}</span></div>
    <div class="row"><span>Maksetingimus:</span><span>${PAYMENT_DETAILS.paymentTermDays} kalendripäeva</span></div>
    <div class="row"><span>Viivis:</span><span>${PAYMENT_DETAILS.lateFeePerDay} päevas</span></div>
    <div class="row"><span>Õpilane:</span><span>${inv.studentName}</span></div>
    ${stu?.email?`<div class="row"><span>E-post:</span><span>${stu.email}</span></div>`:''}
    <div class="row"><span>Kirjeldus:</span><span>${inv.desc}</span></div>
    <div class="row"><span>Selgitus:</span><span>${inv.paymentReference||inv.num}</span></div>
    <div class="row total"><span>KOKKU:</span><span>${inv.amount} €</span></div>
    <p style="margin-top:30px;font-size:.85rem;color:#666">Palun tasuda arve tähtajaks ${fmtDate(inv.due)}.</p>
    <div class="footer">Koostaja: ${PAYMENT_DETAILS.issuer}</div>
    </body></html>`);
    w.document.close();setTimeout(()=>w.print(),500);
  },[students]);

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}><div className="spinner"/></div>;
  if(bootError) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'#F4F2EE'}}>
      <div className="card" style={{maxWidth:520,padding:28,textAlign:'center'}}>
        <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.8rem',marginBottom:12}}>Keele<span style={{color:'#C9882A'}}>Sepp</span></div>
        <div style={{fontWeight:600,fontSize:'1.05rem',marginBottom:10}}>Haldussusteemi ei saanud kaivitada</div>
        <p style={{color:'#42536A',marginBottom:18}}>{bootError}</p>
        <button className="btn btn-dark" onClick={()=>window.location.reload()}>Proovi uuesti</button>
      </div>
    </div>
  );
  if(!user) return <AuthScreen onLogin={u=>{setUser(u);if(u.role==='teacher')setFilterT(canonicalTeacherName(u.displayName||''));if(u.role==='admin')setFilterT('Kõik');}}/>;

  const navItems=[
    {id:'dashboard',icon:'fa-chart-pie',label:'Töölaud'},
    {id:'calendar', icon:'fa-calendar-days',label:'Tunniplaan'},
    ...(isStaff?[{id:'tasks',icon:'fa-list-check',label:'Ülesanded',
      badge:scopedTasks.filter(t=>t.status!=='done').length}]:[]),
    ...(isStaff?[{id:'programs',icon:'fa-book-open-reader',label:'Õppekavad'}]:[]),
    {id:'students', icon:'fa-graduation-cap',label:isStaff?'Minu õpilased':'Minu progress',
      badge:isStaff&&homework.filter(h=>h.status==='Ootel'&&myStudents.some(s=>s.id===h.studentId)).length>0?
        homework.filter(h=>h.status==='Ootel'&&myStudents.some(s=>s.id===h.studentId)).length:0},
    ...(isStaff?[{id:'groups',icon:'fa-layer-group',label:'Grupid'}]:[]),
    ...(isStaff?[{id:'parents',icon:'fa-people-roof',label:'Lapsevanemad',badge:isAdmin?parentAlerts.length:0}]:[]),
    ...(isStaff?[{id:'database',icon:'fa-table',label:'Andmebaas'}]:[]),
    ...(isStaff?[{id:'invoices',icon:'fa-file-invoice',label:'Arved',
      badge:scopedInvoices.filter(i=>i.status==='Ootel').reduce((a,i)=>a+i.amount,0)>0?scopedInvoices.filter(i=>i.status==='Ootel').reduce((a,i)=>a+i.amount,0)+'€':0}]:[]),
    ...(isStaff?[{id:'activity',icon:'fa-clock-rotate-left',label:'Tegevused'}]:[]),
    ...(!isStaff?[{id:'invoices',icon:'fa-file-invoice',label:'Arved',
      badge:scopedInvoices.filter(i=>i.status==='Ootel').reduce((a,i)=>a+i.amount,0)>0?scopedInvoices.filter(i=>i.status==='Ootel').reduce((a,i)=>a+i.amount,0)+'€':0}]:[]),
  ];

  const Sidebar=()=>(
    <>
      <div style={{borderBottom:'1px solid rgba(255,255,255,.1)',paddingBottom:16,marginBottom:8}}>
        <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.55rem',fontWeight:600,color:'#fff'}}>
          Keele<span style={{color:'#C9882A'}}>Sepp</span>
        </div>
        <div style={{fontSize:'.7rem',color:'rgba(255,255,255,.35)',marginTop:2,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase'}}>
          {user.role==='teacher'?'Õpetaja':user.role==='admin'?'Administraator':user.role==='parent'?'Lapsevanem':'Õpilane'}
        </div>
      </div>
      <div style={{fontSize:'.82rem',color:'rgba(255,255,255,.45)',padding:'0 14px 12px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        {user.displayName}
      </div>
      <nav style={{flex:1,display:'flex',flexDirection:'column',gap:2}}>
        {navItems.map(item=>(
          <button key={item.id} onClick={()=>goTab(item.id)} className={`sidebar-link ${tab===item.id?'active':''}`}>
            <i className={`fa-solid ${item.icon}`} style={{width:18,textAlign:'center'}}/>
            <span style={{flex:1}}>{item.label}</span>
            {item.badge>0&&<span style={{background:tab===item.id?'rgba(255,255,255,.25)':'#C9882A',color:'#fff',borderRadius:999,fontSize:'.7rem',fontWeight:700,padding:'1px 7px'}}>{item.badge}</span>}
          </button>
        ))}
      </nav>
      <div style={{borderTop:'1px solid rgba(255,255,255,.08)',paddingTop:12,marginTop:8}}>
        <button onClick={async()=>{await auth.signOut();setUser(null);}} className="sidebar-link" style={{color:'#fca5a5'}}>
          <i className="fa-solid fa-right-from-bracket" style={{width:18,textAlign:'center'}}/>
          Logi välja
        </button>
      </div>
    </>
  );

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <aside id="desktop-sidebar" style={{width:234,background:'#1C2B3A',display:'flex',flexDirection:'column',padding:'20px 12px',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}}>
        <Sidebar/>
      </aside>
      <aside id="mobile-sidebar" style={{position:'fixed',left:mobileNav?0:-240,top:0,width:234,height:'100vh',background:'#1C2B3A',display:'none',flexDirection:'column',padding:'20px 12px',zIndex:50,transition:'left .25s ease',overflowY:'auto',boxShadow:mobileNav?'4px 0 24px rgba(0,0,0,.3)':'none'}} className="scroll">
        <Sidebar/>
      </aside>

      <main style={{flex:1,overflowY:'auto',background:'#F4F2EE'}} className="scroll">
        <div id="mobile-header" style={{display:'none',alignItems:'center',justifyContent:'space-between',padding:'14px 20px',background:'#fff',borderBottom:'1px solid rgba(28,43,58,.08)',position:'sticky',top:0,zIndex:30}}>
          <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:'1.3rem',fontWeight:600}}>Keele<span style={{color:'#C9882A'}}>Sepp</span></div>
          <button onClick={()=>setMobileNav(!mobileNav)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'1.3rem',color:'#1C2B3A',padding:'4px 8px'}}>{mobileNav?'✕':'☰'}</button>
        </div>

        <div style={{position:'sticky',top:0,zIndex:40,display:'flex',justifyContent:'center',padding:'10px 16px 0',pointerEvents:'none'}}>
          <div style={{background:'#C9882A',color:'#fff',padding:'8px 14px',borderRadius:999,fontSize:'.78rem',fontWeight:800,letterSpacing:'.04em',boxShadow:'0 10px 24px rgba(201,136,42,.28)'}}>
            {APP_VERSION}
          </div>
        </div>

        <div style={{position:'fixed',right:18,bottom:18,zIndex:120,background:'rgba(28,43,58,.92)',color:'#fff',padding:'8px 12px',borderRadius:999,fontSize:'.72rem',fontWeight:700,letterSpacing:'.04em',boxShadow:'0 10px 24px rgba(0,0,0,.18)'}}>
          {APP_VERSION}
        </div>

        <div style={{padding:'28px',maxWidth:1100,margin:'0 auto'}}>
          {notif&&<div style={{position:'fixed',top:20,right:20,background:'#1C2B3A',color:'#fff',padding:'12px 20px',borderRadius:12,zIndex:300,fontWeight:600,fontSize:'.9rem',boxShadow:'0 8px 28px rgba(0,0,0,.25)'}}>{notif}</div>}

          {tab==='dashboard'&&<Dashboard user={user} myStudents={myStudents} lessons={lessons} schedule={schedule} invoices={scopedInvoices} homework={homework} tasks={scopedTasks} staffMembers={staffMembers}
            nName={nName} setNName={setNName} nParentName={nParentName} setNParentName={setNParentName} nEmail={nEmail} setNEmail={setNEmail} nPhone={nPhone} setNPhone={setNPhone}
            nLevel={nLevel} setNLevel={setNLevel} nTarget={nTarget} setNTarget={setNTarget}
            nPkg={nPkg} setNPkg={setNPkg} nSubject={nSubject} setNSubject={setNSubject} nGrade={nGrade} setNGrade={setNGrade} nGroup={nGroup} setNGroup={setNGroup} nTeach={nTeach} setNTeach={setNTeach}
            groupOptions={groupOptions}
            taskTitle={taskTitle} setTaskTitle={setTaskTitle} taskAssignee={taskAssignee} setTaskAssignee={setTaskAssignee}
            taskDue={taskDue} setTaskDue={setTaskDue} taskPriority={taskPriority} setTaskPriority={setTaskPriority} taskCategory={taskCategory} setTaskCategory={setTaskCategory}
            addTask={addTask} toggleTask={toggleTask} deleteTask={deleteTask} replyTask={replyTask} markTaskRepliesSeen={markTaskRepliesSeen}
            addStudent={addStudent} openLessonEditor={openLessonEditor} isAdmin={isAdmin} isStaff={isStaff}
            parentAlerts={parentAlerts} createMissingParentStudents={createMissingParentStudents} markParentChecked={markParentChecked} setTab={setTab} setSelStu={setSelStu}/>}

          {tab==='calendar'&&<CalendarView user={user} myStudents={myStudents} schedule={schedule} groups={groups} isAdmin={canAssignTeacher}
            filterT={filterT} setFilterT={setFilterT}
            schStu={schStu} setSchStu={setSchStu} schDate={schDate} setSchDate={setSchDate}
            schTime={schTime} setSchTime={setSchTime} schTeach={schTeach} setSchTeach={setSchTeach}
            schRecurring={schRecurring} setSchRecurring={setSchRecurring}
            addSchedule={addSchedule} openScheduleEditor={openScheduleEditor} delSchedule={delSchedule} markAttendance={markAttendance}/>}

          {tab==='tasks'&&isStaff&&<TasksView user={user} tasks={scopedTasks} staffMembers={staffMembers}
            taskTitle={taskTitle} setTaskTitle={setTaskTitle} taskAssignee={taskAssignee} setTaskAssignee={setTaskAssignee}
            taskDue={taskDue} setTaskDue={setTaskDue} taskPriority={taskPriority} setTaskPriority={setTaskPriority}
            taskCategory={taskCategory} setTaskCategory={setTaskCategory}
            addTask={addTask} toggleTask={toggleTask} deleteTask={deleteTask} replyTask={replyTask} markTaskRepliesSeen={markTaskRepliesSeen} isAdmin={isAdmin}/>}

          {tab==='programs'&&isStaff&&<ProgramsView/>}

          {tab==='students'&&isStaff&&!selStu&&<StudentsList filteredStudents={filteredStudents} lessons={lessons} isAdmin={canAssignTeacher}
            search={search} setSearch={setSearch} stuFilter={stuFilter} setStuFilter={setStuFilter} setSelStu={setSelStu}/>}

          {tab==='students'&&(!isStaff||(isStaff&&selStu))&&<StudentCard
            setEditStu={setEditStu}
            user={user} currentStu={currentStu} stuLessons={stuLessons} stuHw={stuHw} stuInv={stuInv}
            isAdmin={canAssignTeacher} setSelStu={setSelStu} toggleStudentActive={toggleStudentActive}
            convertStudentToParent={convertStudentToParent}
            hwTask={hwTask} setHwTask={setHwTask} hwDue={hwDue} setHwDue={setHwDue} hwFile={hwFile} setHwFile={setHwFile} addHw={addHw} toggleHw={toggleHw} deleteHw={deleteHw} removeHwFile={removeHwFile}
            invAmt={invAmt} setInvAmt={setInvAmt} invDesc={invDesc} setInvDesc={setInvDesc}
            addInvoice={addInvoice} markPaid={markPaid} unmarkPaid={unmarkPaid} deleteInvoice={deleteInvoice} printInvoice={printInvoice} submitParentPayment={submitParentPayment} resetParentPayment={resetParentPayment} deleteLesson={deleteLesson} openLessonEditor={openLessonEditor}
            schDate={schDate} setSchDate={setSchDate} schTime={schTime} setSchTime={setSchTime} schTeach={schTeach} setSchTeach={setSchTeach}
            schRecurring={schRecurring} setSchRecurring={setSchRecurring} addStudentSchedule={addStudentSchedule} canAssignTeacher={canAssignTeacher}
            stuMessages={stuMessages} teacherMessage={teacherMessage} setTeacherMessage={setTeacherMessage} sendTeacherMessage={sendTeacherMessage}/>}

          {tab==='groups'&&isStaff&&<GroupsView groups={groups} students={canAssignTeacher?students:myStudents} isAdmin={canAssignTeacher}
            setSelStu={setSelStu} setTab={setTab}
            addGroup={addGroup} deleteGroup={deleteGroup} addGroupLesson={addGroupLesson}
            deleteGroupLesson={deleteGroupLesson} toggleGroupStudent={toggleGroupStudent}
            toggleGroupStudentLesson={toggleGroupStudentLesson}/>}

          {tab==='parents'&&isStaff&&<ParentsView
            parents={scopedParents}
            students={canAssignTeacher?students:myStudents}
            invoices={scopedInvoices}
            isAdmin={isAdmin}
            parentAlerts={parentAlerts}
            setSelStu={setSelStu}
            setTab={setTab}
            createMissingParentStudents={createMissingParentStudents}
            markParentChecked={markParentChecked}
            notify={notify}/>}

          {tab==='database'&&isStaff&&<StudentsDatabaseView
            filteredStudents={filteredStudents}
            lessons={lessons}
            invoices={scopedInvoices}
            isAdmin={canAssignTeacher}
            search={search}
            setSearch={setSearch}
            stuFilter={stuFilter}
            setStuFilter={setStuFilter}
            groupFilter={groupFilter}
            setGroupFilter={setGroupFilter}
            groupOptions={groupOptions}
            contactFilter={contactFilter}
            setContactFilter={setContactFilter}
            studentSort={studentSort}
            setStudentSort={setStudentSort}
            openStudent={student=>{setSelStu(student);setTab('students');}}
            setEditStu={setEditStu}
            user={user}
            nName={nName}
            setNName={setNName}
            nParentName={nParentName}
            setNParentName={setNParentName}
            nEmail={nEmail}
            setNEmail={setNEmail}
            nPhone={nPhone}
            setNPhone={setNPhone}
            nLevel={nLevel}
            setNLevel={setNLevel}
            nTarget={nTarget}
            setNTarget={setNTarget}
            nSubject={nSubject}
            setNSubject={setNSubject}
            nGrade={nGrade}
            setNGrade={setNGrade}
            nGroup={nGroup}
            setNGroup={setNGroup}
            nPkg={nPkg}
            setNPkg={setNPkg}
            nTeach={nTeach}
            setNTeach={setNTeach}
            addStudent={addStudent}
          />}

          {tab==='invoices'&&!isStaff&&<ParentInvoicesView invoices={scopedInvoices} printInvoice={printInvoice} submitParentPayment={submitParentPayment}/>}

          {tab==='invoices'&&isStaff&&<InvoicesView invoices={scopedInvoices} myStudents={myStudents}
            invStu={invStu} setInvStu={setInvStu} invAmt={invAmt} setInvAmt={setInvAmt}
            invDesc={invDesc} setInvDesc={setInvDesc} addInvoice={addInvoice} markPaid={markPaid} unmarkPaid={unmarkPaid} deleteInvoice={deleteInvoice} printInvoice={printInvoice}/>}

          {tab==='activity'&&isStaff&&<ActivityLogView logs={scopedActivityLog} isAdmin={isAdmin}/>}
        </div>
      </main>

      {editStu&&<EditStudentModal student={editStu} onClose={()=>setEditStu(null)} onSave={()=>{setEditStu(null);}} onDelete={()=>{setEditStu(null);setSelStu(null);}} db={db} notify={notify} isAdmin={isAdmin} groupOptions={groupOptions}/>}
      {modalEv&&<LessonModal modalEv={modalEv} setModalEv={setModalEv}
        lTopic={lTopic} setLTopic={setLTopic} lGrade={lGrade} setLGrade={setLGrade}
        lStatus={lStatus} setLStatus={setLStatus}        lComment={lComment} setLComment={setLComment}
        lDur={lDur} setLDur={setLDur} lessonFile={lessonFile} setLessonFile={setLessonFile}
        saveLesson={saveLesson} deleteLesson={deleteLesson} db={db} user={user} notify={notify}
        students={students} markAttendance={markAttendance}/>}
    </div>
  );
}

window.__haldusBooted = true;
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
