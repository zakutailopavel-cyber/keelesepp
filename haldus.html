function ParentsView({parents,students,invoices,isAdmin,parentAlerts,setSelStu,setTab,createMissingParentStudents,markParentChecked,mergeParentDuplicates,assignStudentToParent,changeParentToStudent,notify}) {
  const [search,setSearch] = React.useState('');
  const [statusFilter,setStatusFilter] = React.useState('all');
  const parentStatusMeta = {
    new:{t:'Uus',bg:'#dbeafe',c:'#1d4ed8'},
    written:{t:'Kirjutatud',bg:'#ede9fe',c:'#6d28d9'},
    called:{t:'Helistatud',bg:'#fef3c7',c:'#92400e'},
    waiting:{t:'Ootab vastust',bg:'#fee2e2',c:'#991b1b'},
    agreed:{t:'Kokkulepitud',bg:'#dcfce7',c:'#166534'},
    problem:{t:'Probleem',bg:'#fee2e2',c:'#991b1b'},
    active:{t:'Aktiivne',bg:'#dcfce7',c:'#166534'}
  };
  const noData = (
    <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'3px 8px',borderRadius:999,background:'#fee2e2',border:'1px solid #fecaca',color:'#991b1b',fontWeight:800,fontSize:'.72rem'}}>
      Нет данных
    </span>
  );
  const updateParent = async(parent,patch)=>{
    if(!parent?.id) return;
    try{
      await db.collection('users').doc(parent.id).update({
        ...patch,
        parentCrmUpdatedAt:new Date().toISOString()
      });
      notify?.('✓ Lapsevanema info salvestatud');
    }catch(err){
      console.error('Parent update failed:',err);
      notify?.('⚠ Lapsevanema infot ei saanud salvestada');
    }
  };
  const parentRows = React.useMemo(()=>{
    const q = normalizeText(search);
    const uniqBy = (items,keyFn)=>{
      const seen = new Set();
      return items.filter(item=>{
        const key = keyFn(item);
        if(!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    };
    const parentMergeKey = parent => {
      const email = normalizeText(parent.email);
      if(email) return `email:${email}`;
      const phone = normalizeText(parent.phone || parent.parentPhone).replace(/[^0-9]/g,'');
      if(phone) return `phone:${phone}`;
      const childKey = parseLinkedNames(parent.childName).join('|');
      return `name:${normalizeText(parent.displayName)}|children:${childKey}`;
    };
    const buildChildGroups = linkedChildren => Object.values(linkedChildren.reduce((acc,student)=>{
      const key = studentIdentityKey(student) || normalizeText(student.name) || student.id;
      if(!acc[key]) acc[key] = {name:student.name||'',items:[]};
      acc[key].items.push(student);
      return acc;
    },{}));
    const buildParentRow = parent => {
      const rawNames = String(parent.childName||'')
        .split(/[,\n;|]+/)
        .map(name=>name.trim())
        .filter(Boolean);
      const childNameKeys = new Set((rawNames.length?rawNames:parseLinkedNames(parent.childName)).map(name=>normalizeText(name)));
      const parentEmail = normalizeText(parent.email);
      const parentName = normalizeText(parent.displayName);
      const linkedChildren = students.filter(student=>{
        if(student.active===false || student.convertedToParent) return false;
        const linkedParentId = student.linkedParentId || student.parentUid || student.guardianUid || '';
        const studentName = normalizeText(student.name);
        const studentParentEmail = normalizeText(student.parentEmail || student.contactEmail || student.guardianEmail || student.email);
        const studentParentName = normalizeText(student.parentName || student.guardianName);
        const parentMatched = linkedParentId===parent.id ||
          (!!parentEmail && studentParentEmail===parentEmail) ||
          (!!parentName && studentParentName===parentName);
        return parentMatched || (childNameKeys.has(studentName) && parentMatched);
      });
      const uniqueChildren = uniqBy(linkedChildren,student=>studentProfileKey(student)||student.id);
      const childGroups = buildChildGroups(uniqueChildren);
      const unpaid = invoices.filter(inv=>
        inv.status==='Ootel' && uniqueChildren.some(student=>student.id===inv.studentId || normalizeText(student.name)===normalizeText(inv.studentName))
      );
      return {key:parentMergeKey(parent),parent,parents:[parent],duplicateParents:[],rawNames,linkedChildren:uniqueChildren,childGroups,unpaid};
    };
    const rowsByKey = parents.reduce((acc,parent)=>{
      const row = buildParentRow(parent);
      if(!acc[row.key]){
        acc[row.key]=row;
        return acc;
      }
      const target = acc[row.key];
      target.parents.push(parent);
      target.duplicateParents.push(parent);
      target.rawNames = uniqBy([...target.rawNames,...row.rawNames],name=>normalizeText(name));
      target.linkedChildren = uniqBy([...target.linkedChildren,...row.linkedChildren],student=>studentProfileKey(student)||student.id);
      target.childGroups = buildChildGroups(target.linkedChildren);
      target.unpaid = uniqBy([...target.unpaid,...row.unpaid],inv=>inv.id || `${inv.studentId}|${inv.studentName}|${inv.amount}|${inv.createdAt}`);
      return acc;
    },{});
    const mergedRows = Object.values(rowsByKey).map(row=>{
      const allParents = row.parents || [row.parent];
      const pick = field => allParents.map(parent=>parent?.[field]).find(Boolean) || '';
      const bestName = allParents
        .map(parent=>parent?.displayName)
        .filter(Boolean)
        .sort((a,b)=>String(b).length-String(a).length)[0] || '';
      const bestStatusParent = allParents.find(parent=>parent?.parentContactStatus && parent.parentContactStatus!=='new') || row.parent;
      const parentNameKeys = new Set(allParents.map(parent=>normalizeText(parent?.displayName)).filter(Boolean));
      const hasRealChild = row.linkedChildren.some(student=>!parentNameKeys.has(normalizeText(student.name)));
      const cleanChildren = hasRealChild
        ? row.linkedChildren.filter(student=>!parentNameKeys.has(normalizeText(student.name)))
        : row.linkedChildren;
      const childGroups = buildChildGroups(cleanChildren);
      return {
        ...row,
        displayName:bestName,
        email:pick('email'),
        phone:pick('phone') || pick('parentPhone'),
        createdAt:pick('createdAt'),
        linkedChildren:cleanChildren,
        childGroups,
        statusValue:bestStatusParent?.parentContactStatus || row.parent.parentContactStatus || 'new',
        duplicateCount:Math.max(0,allParents.length-1),
        hiddenStudentCount:Math.max(0,row.linkedChildren.length-cleanChildren.length)
      };
    });
    return mergedRows.filter(row=>{
      if(statusFilter!=='all' && row.statusValue!==statusFilter) return false;
      if(!q) return true;
      return row.parents.some(parent=>
          normalizeText(parent.displayName).includes(q) ||
          normalizeText(parent.email).includes(q) ||
          normalizeText(parent.parentContactNotes).includes(q) ||
          normalizeText(parent.parentContactOwner).includes(q)
        ) ||
        row.rawNames.some(name=>normalizeText(name).includes(q)) ||
        row.linkedChildren.some(student=>
          normalizeText(student.name).includes(q) ||
          normalizeText(student.teacher).includes(q) ||
          normalizeText(student.subject).includes(q) ||
          normalizeText(student.group).includes(q)
        );
    }).sort((a,b)=>(a.displayName||a.email||'').localeCompare(b.displayName||b.email||'','et'));
  },[parents,students,invoices,search,statusFilter]);
  const linkedCount = parentRows.filter(row=>row.linkedChildren.length>0).length;
  const missingCount = parentRows.filter(row=>row.rawNames.length>0&&row.linkedChildren.length===0).length;
  const unpaidTotal = parentRows.reduce((sum,row)=>sum+row.unpaid.reduce((a,inv)=>a+(parseFloat(inv.amount)||0),0),0);
  const todayCalls = parentRows.filter(row=>row.parent.parentNextContactAt===today()).length;
  const openStudent = student => {
    setSelStu(student);
    setTab('students');
  };
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:'1.7rem'}}>Lapsevanemad</h1>
          <div style={{fontSize:'.9rem',color:'#42536A',marginTop:4}}>
            Eraldi vanemate baas: seotud lapsed, õppeained, õpetajad ja maksed.
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Otsi vanemat, last, õpetajat…" style={{width:310,padding:'9px 14px'}}/>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{width:'auto'}}>
            <option value="all">Kõik staatused</option>
            {Object.entries(parentStatusMeta).map(([key,meta])=><option key={key} value={key}>{meta.t}</option>)}
          </select>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12}}>
        <div className="stat-card"><div className="stat-label">Lapsevanemaid</div><div className="stat-value">{parentRows.length}</div></div>
        <div className="stat-card"><div className="stat-label">Seotud lastega</div><div className="stat-value" style={{color:'#2F5D50'}}>{linkedCount}</div></div>
        <div className="stat-card"><div className="stat-label">Vajab sidumist</div><div className="stat-value" style={{color:missingCount?'#991b1b':'#2F5D50'}}>{missingCount}</div></div>
        <div className="stat-card"><div className="stat-label">Ootel arved</div><div className="stat-value" style={{color:unpaidTotal?'#991b1b':'#2F5D50'}}>{unpaidTotal}€</div></div>
        <div className="stat-card"><div className="stat-label">Täna ühendust</div><div className="stat-value" style={{color:todayCalls?'#C9882A':'#2F5D50'}}>{todayCalls}</div></div>
      </div>

      {isAdmin&&parentAlerts?.length>0&&(
        <div className="card" style={{padding:18,border:'1px solid #fecaca',background:'#fff7f7'}}>
          <div style={{fontWeight:800,color:'#991b1b',marginBottom:8}}>Uued lapsevanema registreeringud vajavad kontrolli</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {parentAlerts.map(alert=>(
              <div key={alert.parent.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap',borderTop:'1px solid #fecaca',paddingTop:8}}>
                <div>
                  <strong>{alert.parent.displayName||alert.parent.email}</strong>
                  <span style={{color:'#42536A'}}> · {alert.childNames.join(', ')}</span>
                </div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  <button onClick={()=>markParentChecked(alert.parent)} className="btn btn-ghost btn-sm">
                    Kontrollitud
                  </button>
                  <button onClick={()=>createMissingParentStudents(alert.parent)} className="btn btn-red btn-sm">
                    Loo / seo õpilane
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(360px,1fr))',gap:16}}>
        {parentRows.map(row=>(
          <div key={row.key||row.parent.id} className="card" style={{padding:20,display:'flex',flexDirection:'column',gap:14,border:row.parent.parentNextContactAt===today()?'1px solid #C9882A':'1px solid rgba(28,43,58,.07)'}}>
            <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start'}}>
              <div>
                <h2 style={{fontSize:'1.15rem',marginBottom:4}}>{row.displayName||noData}</h2>
                <div style={{fontSize:'.82rem',color:'#42536A'}}>{row.email||noData}</div>
                <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Lisatud: {row.createdAt||noData}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                <span className="badge" style={{background:row.linkedChildren.length?'#dcfce7':'#fee2e2',color:row.linkedChildren.length?'#166534':'#991b1b'}}>
                  {row.linkedChildren.length?`${row.linkedChildren.length} kirjet`:'sidumata'}
                </span>
                {row.duplicateCount>0&&(
                  <span className="badge" style={{background:'#fef3c7',color:'#92400e'}}>
                    {row.duplicateCount} duplikaat peidetud
                  </span>
                )}
                {row.hiddenStudentCount>0&&(
                  <span className="badge" style={{background:'#fee2e2',color:'#991b1b'}}>
                    {row.hiddenStudentCount} vale kaart peidetud
                  </span>
                )}
                <span className="badge" style={{
                  background:(parentStatusMeta[row.statusValue||'new']||parentStatusMeta.new).bg,
                  color:(parentStatusMeta[row.statusValue||'new']||parentStatusMeta.new).c
                }}>
                  {(parentStatusMeta[row.statusValue||'new']||parentStatusMeta.new).t}
                </span>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <label style={{fontSize:'.76rem',fontWeight:800,color:'#42536A'}}>
                Kontakti staatus
                <select defaultValue={row.parent.parentContactStatus||'new'} onChange={e=>updateParent(row.parent,{parentContactStatus:e.target.value})}>
                  {Object.entries(parentStatusMeta).map(([key,meta])=><option key={key} value={key}>{meta.t}</option>)}
                </select>
              </label>
              <label style={{fontSize:'.76rem',fontWeight:800,color:'#42536A'}}>
                Suhtluskanal
                <select defaultValue={row.parent.parentContactChannel||'phone'} onChange={e=>updateParent(row.parent,{parentContactChannel:e.target.value})}>
                  <option value="phone">Telefon</option>
                  <option value="email">E-post</option>
                  <option value="whatsapp">WhatsApp</option>
                  <option value="telegram">Telegram</option>
                  <option value="other">Muu</option>
                </select>
              </label>
              <label style={{fontSize:'.76rem',fontWeight:800,color:'#42536A'}}>
                Järgmine kontakt
                <input type="date" defaultValue={row.parent.parentNextContactAt||''} onBlur={e=>updateParent(row.parent,{parentNextContactAt:e.target.value})}/>
              </label>
              <label style={{fontSize:'.76rem',fontWeight:800,color:'#42536A'}}>
                Vastutaja
                <input defaultValue={row.parent.parentContactOwner||''} placeholder="Kes suhtleb?" onBlur={e=>updateParent(row.parent,{parentContactOwner:e.target.value})}/>
              </label>
            </div>

            <div>
              <div style={{fontSize:'.72rem',fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',color:'#42536A',marginBottom:8}}>Lapsed</div>
              {row.childGroups.length===0&&(
                <div style={{padding:12,borderRadius:12,background:'#fff7f7',border:'1px solid #fecaca',color:'#991b1b',fontWeight:800}}>
                  Нет данных
                  {row.rawNames.length>0&&<div style={{fontSize:'.78rem',fontWeight:600,marginTop:4}}>Registreerimisel sisestatud: {row.rawNames.join(', ')}</div>}
                </div>
              )}
              {row.childGroups.map(child=>(
                <div key={normalizeText(child.name)||child.items[0]?.id} style={{border:'1px solid #e5e7eb',borderRadius:12,padding:10,marginBottom:8}}>
                  <div style={{fontWeight:800,marginBottom:7}}>{child.name||noData}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {child.items.map(student=>(
                      <div key={student.id} style={{display:'grid',gridTemplateColumns:'1.1fr .8fr .9fr auto',gap:8,alignItems:'center',fontSize:'.8rem',color:'#42536A'}}>
                        <span>{student.subject||noData}</span>
                        <span>{student.level||'—'} → {student.targetLevel||'—'}</span>
                        <span>{student.teacher||noData}</span>
                        <button onClick={()=>openStudent(student)} className="btn btn-ghost btn-sm">Ava</button>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:'.82rem',color:'#42536A'}}>
              <div><strong>Telefon:</strong><br/>{row.phone||noData}</div>
              <div><strong>Ootel arved:</strong><br/>{row.unpaid.length?`${row.unpaid.reduce((a,inv)=>a+(parseFloat(inv.amount)||0),0)} €`:'0 €'}</div>
            </div>
            <textarea defaultValue={row.parent.parentContactNotes||''} placeholder="Mida lapsevanem ütles, millal tagasi helistada, kokkulepped..." onBlur={e=>updateParent(row.parent,{parentContactNotes:e.target.value})} style={{minHeight:74}}/>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {row.phone&&<a className="btn btn-ghost btn-sm" href={`tel:${row.phone}`}><i className="fa-solid fa-phone"/> Helista</a>}
              {row.email&&<a className="btn btn-ghost btn-sm" href={`mailto:${row.email}`}><i className="fa-solid fa-envelope"/> E-post</a>}
              {isAdmin&&(
                <button onClick={()=>assignStudentToParent(row.parent,students)} className="btn btn-amber btn-sm">
                  <i className="fa-solid fa-link"/> Määra õpilane
                </button>
              )}
              {isAdmin&&(
                <button onClick={()=>changeParentToStudent(row.parent)} className="btn btn-ghost btn-sm" style={{color:'#2563eb'}}>
                  <i className="fa-solid fa-user-graduate"/> Tee õpilaseks
                </button>
              )}
              {isAdmin&&row.rawNames.length>0&&row.linkedChildren.length===0&&(
                <button onClick={()=>createMissingParentStudents(row.parent)} className="btn btn-red btn-sm">
                  Loo / seo õpilane
                </button>
              )}
              {isAdmin&&(row.duplicateCount>0||row.hiddenStudentCount>0)&&(
                <button onClick={()=>mergeParentDuplicates(row)} className="btn btn-amber btn-sm">
                  Ühenda duplikaadid
                </button>
              )}
            </div>
          </div>
        ))}
        {parentRows.length===0&&(
          <div className="card" style={{gridColumn:'1/-1',padding:32,textAlign:'center',color:'#42536A'}}>
            Lapsevanemaid ei leitud.
          </div>
        )}
      </div>
    </div>
  );
}

// ── ÕPILASTE ANDMEBAAS ───────────────────────────────────────
function StudentsDatabaseView({
  filteredStudents,lessons,invoices,isAdmin,search,setSearch,stuFilter,setStuFilter,
  groupFilter,setGroupFilter,groupOptions,contactFilter,setContactFilter,studentSort,setStudentSort,openStudent,setEditStu,user,
  nName,setNName,nParentName,setNParentName,nEmail,setNEmail,nPhone,setNPhone,nLevel,setNLevel,nTarget,setNTarget,
  nSubject,setNSubject,nGrade,setNGrade,nGroup,setNGroup,nPkg,setNPkg,nTeach,setNTeach,addStudent,mergeStudentDuplicates,groupStudents,ungroupStudent
}) {
  const [showAddForm,setShowAddForm] = React.useState(false);
  const [groupMode,setGroupMode] = React.useState('table');
  const [teacherFocus,setTeacherFocus] = React.useState('');
  const [groupingMode,setGroupingMode] = React.useState(false);
  const [selectedForGroup,setSelectedForGroup] = React.useState([]);

  const toggleSelectForGroup = (student) => {
    setSelectedForGroup(prev=>
      prev.find(s=>s.id===student.id)
        ? prev.filter(s=>s.id!==student.id)
        : [...prev, student]
    );
  };

  // Build grouped view: students with same groupId shown together
  const studentGroups = React.useMemo(()=>{
    const groups = {};
    const ungrouped = [];
    filteredStudents.forEach(s=>{
      if(s.groupId){
        if(!groups[s.groupId]) groups[s.groupId]=[];
        groups[s.groupId].push(s);
      } else {
        ungrouped.push(s);
      }
    });
    // Return flat list but mark group members
    const result = [];
    const seenGroups = new Set();
    filteredStudents.forEach(s=>{
      if(!s.groupId){
        result.push({...s,_isGroup:false});
      } else if(!seenGroups.has(s.groupId)){
        seenGroups.add(s.groupId);
        const members = groups[s.groupId];
        result.push({...members[0],_isGroup:true,_groupMembers:members});
      }
    });
    return result;
  },[filteredStudents]);
  const teacherScope = canonicalTeacherName(user?.displayName);
  const NoData = ({inline=false}) => (
    <span style={{
      display:inline?'inline-flex':'flex',alignItems:'center',justifyContent:'center',
      minHeight:inline?24:34,padding:inline?'3px 8px':'7px 10px',borderRadius:10,
      background:'#fee2e2',border:'1px solid #fecaca',color:'#991b1b',
      fontWeight:800,fontSize:inline?'.72rem':'.78rem',boxShadow:'0 0 0 3px rgba(239,68,68,.08)'
    }}>Нет данных</span>
  );
  const teacherStudents = React.useMemo(()=>{
    if(!teacherFocus) return [];
    return filteredStudents.filter(s=>canonicalTeacherName(s.teacher)===teacherFocus);
  },[filteredStudents,teacherFocus]);
  const groupedStudents = React.useMemo(()=>{
    const titleFor = student => {
      if(groupMode==='group') return student.group || 'Grupita';
      if(groupMode==='level') return `${student.level||'Tase puudub'} → ${student.targetLevel||'Siht puudub'}`;
      if(groupMode==='subject') return student.subject || 'Õppeaine puudub';
      if(groupMode==='teacher') return student.teacher || 'Õpetaja puudub';
      return 'Kõik õpilased';
    };
    return Object.entries(filteredStudents.reduce((acc,student)=>{
      const title = titleFor(student);
      if(!acc[title]) acc[title]=[];
      acc[title].push(student);
      return acc;
    },{})).sort((a,b)=>a[0].localeCompare(b[0],'et'));
  },[filteredStudents,groupMode]);
  const contactMeta = {
    new:{bg:'#dbeafe',c:'#1d4ed8',t:'Uus'},
    contacted:{bg:'#fef3c7',c:'#92400e',t:'Võetud ühendust'},
    waiting:{bg:'#fee2e2',c:'#991b1b',t:'Ootab vastust'},
    scheduled:{bg:'#ede9fe',c:'#6d28d9',t:'Tund kokku lepitud'},
    active:{bg:'#dcfce7',c:'#166534',t:'Aktiivne õpilane'}
  };
  const duplicateGroups = React.useMemo(()=>{
    const grouped = filteredStudents.reduce((acc,student)=>{
      if(student.active===false) return acc;
      if(student.convertedToParent) return acc;
      if(student.mergedIntoStudentId) return acc;
      if(student.mergedAt && student.mergedIntoStudentName) return acc;
      if(student.groupId) return acc; // already grouped with other subjects — not a duplicate
      if(!normalizeText(student.name)) return acc;
      const key = studentProfileKey(student);
      if(!key) return acc;
      if(!acc[key]) acc[key]=[];
      acc[key].push(student);
      return acc;
    },{});
    return Object.values(grouped).filter(group=>group.length>1);
  },[filteredStudents]);
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:'1.7rem'}}>Õpilaste andmebaas</h1>
          <div style={{fontSize:'.9rem',color:'#42536A',marginTop:4}}>
            Tabelivaade kiireks otsimiseks, filtreerimiseks ja profiili muutmiseks.
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
          <button onClick={()=>setShowAddForm(v=>!v)} className="btn btn-pine">
            <i className="fa-solid fa-user-plus"/> Lisa õpilane
          </button>
          {isAdmin&&(
            groupingMode
              ? <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{fontSize:'.8rem',color:'#42536A',fontWeight:600}}>Valitud: {selectedForGroup.length}</span>
                  <button
                    disabled={selectedForGroup.length<2}
                    onClick={async()=>{await groupStudents(selectedForGroup);setGroupingMode(false);setSelectedForGroup([]);}}
                    className="btn btn-pine">
                    ✓ Grupeeri ({selectedForGroup.length})
                  </button>
                  <button onClick={()=>{setGroupingMode(false);setSelectedForGroup([]);}} className="btn btn-ghost">Tühista</button>
                </div>
              : <button onClick={()=>setGroupingMode(true)} className="btn btn-ghost">
                  <i className="fa-solid fa-layer-group"/> Grupeeri
                </button>
          )}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Otsi nime, õpetajat, e-posti…" style={{width:280,padding:'9px 14px'}}/>
          <select value={studentSort} onChange={e=>setStudentSort(e.target.value)} style={{width:'auto'}}>
            <option value="name_asc">Sort: nimi A-Z</option>
            <option value="name_desc">Sort: nimi Z-A</option>
            <option value="level_asc">Sort: tase A1-C1</option>
            <option value="level_desc">Sort: tase C1-A1</option>
            <option value="subject_asc">Sort: õppeaine</option>
            <option value="group_asc">Sort: grupp</option>
            <option value="teacher_asc">Sort: õpetaja</option>
          </select>
          <select value={groupMode} onChange={e=>setGroupMode(e.target.value)} style={{width:'auto'}}>
            <option value="table">Vaade: tabel</option>
            <option value="group">Vaade: grupid</option>
            <option value="level">Vaade: tasemed</option>
            <option value="subject">Vaade: õppeained</option>
            <option value="teacher">Vaade: õpetajad</option>
          </select>
          <select value={groupFilter} onChange={e=>setGroupFilter(e.target.value)} style={{width:'auto'}}>
            <option value="all">Kõik grupid</option>
            {groupOptions.map(group=><option key={group} value={group}>{group}</option>)}
          </select>
          <select value={contactFilter} onChange={e=>setContactFilter(e.target.value)} style={{width:'auto'}}>
            <option value="all">Kõik kontaktid</option>
            {CONTACT_STATUSES.map(status=><option key={status.id} value={status.id}>{status.label}</option>)}
          </select>
          <select value={stuFilter} onChange={e=>setStuFilter(e.target.value)} style={{width:'auto'}}>
            <option value="active">Aktiivsed</option>
            <option value="all">Kõik</option>
            <option value="inactive">Arhiveeritud</option>
          </select>
        </div>
      </div>

      {showAddForm&&(
        <div className="card" style={{padding:24}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,marginBottom:16,flexWrap:'wrap'}}>
            <h3>➕ Lisa uus õpilane</h3>
            <div style={{fontSize:'.82rem',color:'#42536A'}}>Siin lisatud õpilane ilmub kohe valitud õpetaja nimekirja.</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(185px,1fr))',gap:10,marginBottom:12}}>
            <input value={nName} onChange={e=>setNName(e.target.value)} placeholder="Lapse nimi *"/>
            <input value={nParentName} onChange={e=>setNParentName(e.target.value)} placeholder="Vanema nimi"/>
            <input value={nEmail} onChange={e=>setNEmail(e.target.value)} type="email" placeholder="E-post"/>
            <input value={nPhone} onChange={e=>setNPhone(e.target.value)} placeholder="Telefon +372…"/>
            <select value={nLevel} onChange={e=>setNLevel(e.target.value)}>{LEVELS.map(l=><option key={l} value={l}>Tase: {l}</option>)}</select>
            <select value={nTarget} onChange={e=>setNTarget(e.target.value)}>{LEVELS.slice(1).map(l=><option key={l} value={l}>Siht: {l}</option>)}</select>
            <select value={nSubject} onChange={e=>setNSubject(e.target.value)}>
              {SUBJECTS.map(subject=><option key={subject} value={subject}>{subject}</option>)}
            </select>
            <select value={nGrade} onChange={e=>setNGrade(e.target.value)}>
              <option value="">Klass / vanus (valikuline)</option>
              {GRADES.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
            <select value={nGroup} onChange={e=>setNGroup(e.target.value)}>
              <option value="">Grupp: määramata</option>
              {groupOptions.map(group=><option key={group} value={group}>{group}</option>)}
            </select>
            <input value={nPkg} onChange={e=>setNPkg(e.target.value)} type="number" placeholder="Paketi maht (nt. 10)"/>
            {(isAdmin||user?.role==='admin')
              ? <select value={nTeach} onChange={e=>setNTeach(e.target.value)}>{TEACHERS.map(t=><option key={t} value={t}>Õp: {t}</option>)}</select>
              : <input value={nTeach} readOnly style={{opacity:.7}}/>
            }
          </div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button onClick={addStudent} className="btn btn-pine">
              <i className="fa-solid fa-user-plus"/> Lisa õpilane
            </button>
            <button onClick={()=>setShowAddForm(false)} className="btn btn-ghost">Sulge</button>
          </div>

      )}

        </div>
        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Aktiivsed</div>
          <div style={{fontSize:'1.6rem',fontWeight:700,marginTop:8,color:'#2F5D50'}}>{filteredStudents.filter(s=>s.active!==false).length}</div>

          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Paketid lõppemas</div>
          <div style={{fontSize:'1.6rem',fontWeight:700,marginTop:8,color:'#C9882A'}}>{filteredStudents.filter(s=>(s.packageTotal||0)>0&&pkgLeft(s)<=3).length}</div>
        </div>
        <div className="card" style={{padding:'16px 18px'}}>
          <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Tasumata arved</div>
          <div style={{fontSize:'1.6rem',fontWeight:700,marginTop:8,color:'#991b1b'}}>{invoices.filter(i=>i.status==='Ootel').length}</div>
        </div>
      </div>

      {isAdmin&&duplicateGroups.length>0&&(
        <div className="card" style={{padding:18,border:'1px solid #fbbf24',background:'#fffbeb'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <div>
              <div style={{fontWeight:900,color:'#92400e'}}>Võimalikud õpilaste duplikaadid</div>
              <div style={{fontSize:'.82rem',color:'#42536A',marginTop:4}}>
                Ühenda sama lapse korduvad kaardid, et tunnid, kodutööd ja arved oleksid ühes kohas.
              </div>
            </div>
            <span className="badge" style={{background:'#fef3c7',color:'#92400e'}}>{duplicateGroups.length} gruppi</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:12}}>

                <div>
                  <strong>{group[0].name||'Nimi puudub'}</strong>

      {teacherFocus&&(

            <div>
              <div style={{fontSize:'.74rem',color:'#42536A',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em'}}>Õpetaja õpilased</div>

            </div>
            <button onClick={()=>setTeacherFocus('')} className="btn btn-ghost btn-sm">Sulge</button>

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:10}}>
            {teacherStudents.map(student=>(

                <div style={{fontWeight:800,color:'#1C2B3A'}}>{student.name||<NoData inline/>}</div>
                <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>{student.subject||'—'} · {student.level||'—'} → {student.targetLevel||'—'}</div>
                <div style={{fontSize:'.74rem',color:'#42536A',marginTop:4}}>Grupp: {student.group||'—'}</div>
              </button>
            ))}

        </div>

      {groupMode!=='table'&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}}>
          {groupedStudents.map(([title,items])=>(
            <div key={title} className="card" style={{padding:18}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:12}}>

                  <h3 style={{fontSize:'1.05rem'}}>{title}</h3>

                <span className="badge" style={{background:'rgba(47,93,80,.12)',color:'#2F5D50'}}>{items.length}</span>

                    <div style={{minWidth:0}}>
                      <div style={{fontWeight:800,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{student.name||<NoData inline/>}</div>

        <div style={{overflowX:'auto'}} className="scroll">
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:1180}}>

              </tr>
            </thead>

              {studentGroups.map(item=>{

                const studentLessons = lessons.filter(l=>{
                  const matchesStudent = l.studentId===student.id || normalizeText(l.studentName)===normalizeText(student.name);

                  if(isAdmin) return true;
                  return canonicalTeacherName(l.teacher)===teacherScope;
                });
                const completedLessons = studentLessons.filter(l=>l.status==='Toimunud');
                const unpaidInvoices = invoices.filter(i=>i.studentId===student.id&&i.status==='Ootel');
                const remaining = pkgLeft(student);
                const avgGrade = completedLessons.length ? avg(completedLessons.map(l=>l.grade)) : '—';
                const lastLesson = [...studentLessons].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
                const contact = contactMeta[student.contactStatus||'new'] || contactMeta.new;
                const statusBadge = student.active===false
                  ? {bg:'#f3f4f6',c:'#6b7280',t:'Arhiveeritud'}

                const isSelected = selectedForGroup.find(s=>s.id===student.id);
                if(item._isGroup){
                  // Render grouped row with all subjects
                  return(
                    <tr key={student.id} style={{background:'rgba(47,93,80,.04)',borderLeft:'3px solid #2F5D50'}}>

                        <input type="checkbox" checked={!!isSelected} onChange={()=>toggleSelectForGroup(student)}/>

                      <td style={{padding:'14px 16px',verticalAlign:'top'}}>

                        <div style={{fontSize:'.75rem',color:'#42536A',marginTop:4}}>
                          <i className="fa-solid fa-layer-group" style={{color:'#2F5D50',marginRight:4}}/>
                          {item._groupMembers.map((m,i)=>(
                            <span key={m.id}>
                              <button onClick={()=>openStudent(m)} style={{background:'none',border:'none',padding:0,cursor:'pointer',color:'#2F5D50',fontWeight:600,fontSize:'.75rem'}}>
                                {m.subject||'—'}
                              </button>
                              {isAdmin&&<button onClick={()=>ungroupStudent(m)} title="Eemalda grupist" style={{background:'none',border:'none',padding:'0 2px',cursor:'pointer',color:'#9ca3af',fontSize:'.65rem'}}>✕</button>}
                              {i<item._groupMembers.length-1&&' · '}
                            </span>
                          ))}
                        </div>
                      </td>
                      <td colSpan={7} style={{padding:'14px 16px',verticalAlign:'middle',color:'#42536A',fontSize:'.84rem'}}>
                        {item._groupMembers.map(m=>(
                          <div key={m.id} style={{display:'flex',gap:12,alignItems:'center',marginBottom:4}}>
                            <span style={{minWidth:100,fontWeight:600,color:'#2F5D50'}}>{m.subject||'—'}</span>
                            <span>{m.teacher||'—'}</span>
                            <span className="badge" style={{background:'rgba(201,136,42,.1)',color:'#A96E1A'}}>{m.level}→{m.targetLevel}</span>
                          </div>
                        ))}
                      </td>
                    </tr>
                  );
                }
                return(
                  <tr key={student.id} style={{borderBottom:'1px solid rgba(28,43,58,.06)',
                    background:isSelected?'rgba(47,93,80,.07)':student.active===false?'rgba(243,244,246,.45)':'#fff'}}>
                    {groupingMode&&<td style={{padding:'8px 10px',verticalAlign:'middle'}} onClick={e=>{e.stopPropagation();toggleSelectForGroup(student);}}>
                      <input type="checkbox" checked={!!isSelected} onChange={()=>toggleSelectForGroup(student)} style={{cursor:'pointer'}}/>
                    </td>}
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700}}>{student.name||<NoData inline/>}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        Vanem: {student.hiddenFields?.parentName
                          ? <span style={{color:'#9ca3af',fontStyle:'italic',fontSize:'.72rem'}}>peidetud</span>
                          : (student.parentName||<NoData inline/>)}
                      </div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {student.grade||<NoData inline/>}{student.subject&&<span> · {student.subject}</span>}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top',fontSize:'.84rem',color:'#42536A'}}>
                      <div>{student.hiddenFields?.email
                        ? <span style={{color:'#9ca3af',fontStyle:'italic',fontSize:'.72rem'}}>peidetud</span>
                        : (student.email||<NoData inline/>)}</div>
                      <div style={{marginTop:4}}>{student.hiddenFields?.phone
                        ? <span style={{color:'#9ca3af',fontStyle:'italic',fontSize:'.72rem'}}>peidetud</span>
                        : (student.phone||<NoData inline/>)}</div>
                      {(student.email||student.phone)&&(
                        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>
                          {student.phone&&<a href={`tel:${student.phone}`} className="btn btn-ghost btn-sm">Helista</a>}
                          {student.email&&<a href={`mailto:${student.email}`} className="btn btn-ghost btn-sm">E-post</a>}
                        </div>
                      )}
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <span className="badge" style={{background:contact.bg,color:contact.c}}>
                        {contact.t}
                      </span>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:8}}>
                        {student.contactOwner?`Vastutaja: ${student.contactOwner}`:'Vastutaja puudub'}
                      </div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {student.contactLastAt?`Viimane kontakt: ${fmtDate(student.contactLastAt)}`:'Kontakti veel pole'}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:600}}>{student.level||<NoData inline/>} → {student.targetLevel||<NoData inline/>}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>{levelPct(student.level,student.targetLevel)}% eesmärgini</div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:600}}>{student.group||<NoData inline/>}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>{student.group?'Õppegrupp':'Määramata'}</div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      {student.hiddenFields?.teacher
                        ? <span style={{color:'#9ca3af',fontStyle:'italic',fontSize:'.78rem'}}>peidetud</span>
                        : student.teacher
                          ? <button onClick={()=>setTeacherFocus(canonicalTeacherName(student.teacher))} style={{background:'none',border:'none',padding:0,cursor:'pointer',fontWeight:700,color:'#2F5D50',textAlign:'left'}}>
                              {student.teacher}
                            </button>
                          : <NoData inline/>
                      }
                      {isAdmin&&lastLesson?.teacher&&<div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Viimane tund: {lastLesson.teacher}</div>}
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700,color:remaining<=2&&student.packageTotal>0?'#b45309':'#1C2B3A'}}>
                        {remaining}/{student.packageTotal||0}
                      </div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Kasutatud: {student.packageUsed||0}</div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700}}>{completedLessons.length}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>Keskmine: {avgGrade==='—'?'—':avgGrade+'★'}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {lastLesson?.date ? `Viimane: ${fmtDate(lastLesson.date)}` : 'Veel pole'}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{fontWeight:700,color:unpaidInvoices.length?'#991b1b':'#1C2B3A'}}>{unpaidInvoices.length}</div>
                      <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                        {unpaidInvoices.length ? unpaidInvoices.reduce((sum,inv)=>sum+(inv.amount||0),0)+' € ootel' : 'Kõik makstud'}
                      </div>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <span className="badge" style={{background:statusBadge.bg,color:statusBadge.c}}>
                        {statusBadge.t}
                      </span>
                    </td>
                    <td style={{padding:'14px 16px',verticalAlign:'top'}}>
                      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                        <button onClick={()=>openStudent(student)} className="btn btn-ghost btn-sm">Ava</button>
                        <button onClick={()=>setEditStu(student)} className="btn btn-dark btn-sm">Muuda</button>
                      </div>
                      {isAdmin&&(
                        <div style={{marginTop:6}}>
                          <span onClick={()=>{navigator.clipboard.writeText(student.id);notify('✓ ID kopeeritud');}}
                            title="Kliki kopeerimiseks"
                            style={{fontSize:'.65rem',color:'#9ca3af',fontFamily:'monospace',background:'#F3F4F6',
                              padding:'2px 6px',borderRadius:5,cursor:'pointer',userSelect:'all'}}>
                            {student.id.slice(0,10)}…
                          </span>
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })}
              {filteredStudents.length===0&&(
                <tr>
                  <td colSpan="11" style={{textAlign:'center',padding:'40px 20px',color:'#42536A'}}>
                    {search?`"${search}" ei leitud`:'Õpilasi pole veel lisatud.'}
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
      }
    </div>
  );
}

// ── GRUPID ────────────────────────────────────────────────────
function GroupsView({groups,students,isAdmin,setSelStu,setTab,addGroup,deleteGroup,addGroupLesson,deleteGroupLesson,toggleGroupStudent,toggleGroupStudentLesson}) {
  const [showForm,setShowForm] = React.useState(false);
  const [groupName,setGroupName] = React.useState('');
  const [groupTeacher,setGroupTeacher] = React.useState('Pavel');
  const [groupSubject,setGroupSubject] = React.useState('Eesti keel');
  const [groupLevel,setGroupLevel] = React.useState('A1');
  const [lessonDrafts,setLessonDrafts] = React.useState({});
  const [studentSearch,setStudentSearch] = React.useState('');

  const activeStudents = React.useMemo(()=>students.filter(s=>s.active!==false),[students]);
  const visibleGroups = React.useMemo(()=>
    [...(groups||[])].sort((a,b)=>(a.name||'').localeCompare(b.name||'','et'))
  ,[groups]);

  const createGroup = async()=>{
    const ok = await addGroup({
      name:groupName,
      teacher:groupTeacher,
      subject:groupSubject,
      level:groupLevel
    });
    if(ok){
      setGroupName('');
      setGroupTeacher('Pavel');
      setGroupSubject('Eesti keel');
      setGroupLevel('A1');
      setShowForm(false);
    }
  };

  const setDraft = (groupId, patch)=>{
    setLessonDrafts(prev=>({
      ...prev,
      [groupId]: {
        day: 'Mon',
        time: '16:00',
        startDate: today(),
        ...(prev[groupId]||{}),
        ...patch
      }
    }));
  };

  const submitGroupLesson = async(group)=>{
    const draft = {day:'Mon',time:'16:00',startDate:today(),...(lessonDrafts[group.id]||{})};
    await addGroupLesson(group,draft);
    setLessonDrafts(prev=>({...prev,[group.id]:{day:'Mon',time:'16:00',startDate:today()}}));
  };

  const dayLabel = day=>{
    const idx = DAYS_ID.indexOf(day);
    return idx>=0 ? DAYS_FULL[idx] : day;
  };
  const shortDayLabel = day=>{
    const idx = DAYS_ID.indexOf(day);
    return idx>=0 ? DAYS_SHORT[idx] : day;
  };
  const groupLessonIds = group=>(group.lessons||[]).map(lesson=>lesson.id);
  const assignedLessonIds = (group,studentId)=>{
    const saved = group.studentLessonMap?.[studentId];
    return Array.isArray(saved) ? saved : groupLessonIds(group);
  };
  const attendsGroupLesson = (group,studentId,lessonId)=>assignedLessonIds(group,studentId).includes(lessonId);

  const openStudent = student=>{
    setSelStu(student);
    setTab('students');
  };

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontSize:'1.7rem'}}>Grupid</h1>
          <div style={{fontSize:'.9rem',color:'#42536A',marginTop:4}}>
            Eraldi grupid: koosseis, õpetaja ja iganädalane tunniplaan.
          </div>
        </div>
        {isAdmin&&(
          <button onClick={()=>setShowForm(v=>!v)} className="btn btn-pine">
            <i className="fa-solid fa-plus"/> Lisa grupp
          </button>
        )}
      </div>

      {showForm&&isAdmin&&(
        <div className="card" style={{padding:22}}>
          <div style={{fontSize:'.78rem',fontWeight:700,color:'#42536A',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>
            Uus grupp
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
            <input value={groupName} onChange={e=>setGroupName(e.target.value)} placeholder="Grupi nimi *"/>
            <select value={groupTeacher} onChange={e=>setGroupTeacher(e.target.value)}>
              {TEACHERS.map(t=><option key={t}>{t}</option>)}
            </select>
            <select value={groupSubject} onChange={e=>setGroupSubject(e.target.value)}>
              {SUBJECTS.map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={groupLevel} onChange={e=>setGroupLevel(e.target.value)}>
              {LEVELS.map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
          <button onClick={createGroup} className="btn btn-pine" style={{width:'100%',marginTop:12}}>
            Salvesta grupp
          </button>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(360px,1fr))',gap:16}}>
        {visibleGroups.map(group=>{
          const memberIds = new Set(group.students||[]);
          const members = activeStudents.filter(student=>memberIds.has(student.id));
          const available = activeStudents
            .filter(student=>!memberIds.has(student.id))
            .filter(student=>{
              const q = normalizeText(studentSearch);
              if(!q) return true;
              return normalizeText(student.name).includes(q) || normalizeText(student.email).includes(q) || normalizeText(student.group).includes(q);
            })
            .slice(0,12);
          const draft = {day:'Mon',time:'16:00',startDate:today(),...(lessonDrafts[group.id]||{})};
          return(
            <div key={group.id} className="card" style={{padding:22,display:'flex',flexDirection:'column',gap:16}}>
              <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'flex-start'}}>
                <div>
                  <h2 style={{fontSize:'1.16rem'}}>{group.name}</h2>
                  <div style={{fontSize:'.78rem',color:'#42536A',marginTop:4}}>
                    {members.length} õpilast · {group.teacher||'Õpetaja määramata'} · {group.subject||'Õppeaine määramata'} · {group.level||'Tase määramata'}
                  </div>
                </div>

// ── WORKSHEET PLAYER ───────────────────────────────────────────
function WorksheetPlayer({assignment, onClose, onSubmit}) {
  const ws = assignment.worksheetData;
  const blocks = ws?.blocks||[];
  const meta = ws?.meta||{};
  const [answers, setAnswers] = React.useState(assignment.answers||{});
  const [submitted, setSubmitted] = React.useState(assignment.status==='done');
  const [submitting, setSubmitting] = React.useState(false);
  const [score, setScore] = React.useState(assignment.score||null);
  const setAns = (k,v) => setAnswers(p=>({...p,[k]:v}));
  const parseFill = text => {
    const parts=[]; let bi=0;
    text.split(/\[([^\]]+)\]/g).forEach((c,i)=>{
      if(i%2===0) parts.push({t:'text',v:c});
      else parts.push({t:'blank',answer:c,idx:bi++});
    });
    return parts;
  };
  const calcScore = () => {
    let correct=0,total=0;
    blocks.forEach(b=>{
      if(b.type==='fill'){
        const parts=parseFill(b.text||''); let bi=0;
        parts.forEach(p=>{if(p.t==='blank'){total++;const ans=(answers[b.id+'_'+bi]||'').trim().toLowerCase();if(ans===p.answer.trim().toLowerCase())correct++;bi++;}});
      } else if(b.type==='choice'){
        (b.questions||[]).forEach((q,qi)=>{total++;if(answers[b.id+'_'+qi]===q.correct)correct++;});
      } else if(b.type==='match'){
        (b.pairs||[]).forEach((pair,pi)=>{total++;if(answers[b.id+'_'+pi]===pair.r)correct++;});
      }
    });
    return total>0?{correct,total,pct:Math.round(correct/total*100)}:null;
  };
  const handleSubmit = async()=>{
    setSubmitting(true);
    const sc=calcScore();
    await onSubmit(assignment.id,answers,sc);
    setScore(sc);setSubmitted(true);setSubmitting(false);
  };
  const done = submitted;
  const TYPE_COLORS={fill:'#1d4ed8',choice:'#6d28d9',writing:'#A96E1A',match:'#047857',order:'#2F5D50',text:'#718096',image:'#6d28d9',dialogue:'#0369a1',error_correction:'#dc2626',transformation:'#7c3aed',reading:'#0e7490',table:'#0e7490'};
  const TYPE_LABELS={fill:'Täida lünk',choice:'Vali vastus',writing:'Kirjutamine',match:'Sobita paarid',order:'Järjesta sõnad',text:'Tekst / juhis',image:'Pilt',dialogue:'Dialoog',error_correction:'Leia viga',transformation:'Muuda lauset',reading:'Lugemistekst',table:'Tabel'};
  const renderBlock=(block,gi)=>{
    const num=gi+1;
    return(<div key={block.id} style={{background:'#fff',borderRadius:14,padding:'18px 20px',border:'0.5px solid rgba(28,43,58,.09)'}}>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
        <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:20,height:20,borderRadius:'50%',background:'#1C2B3A',color:'#fff',fontSize:'.6rem',fontWeight:800}}>{num}</span>
        <span style={{fontSize:'.68rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.07em',color:TYPE_COLORS[block.type]||'#718096'}}>{block.label||TYPE_LABELS[block.type]||block.type}</span>
        {block.instruction&&<span style={{fontSize:'.68rem',color:'#B0A898',fontStyle:'italic'}}>— {block.instruction}</span>}
      </div>
      {block.type==='text'&&<p style={{fontSize:'.9rem',lineHeight:1.65,color:'#1C2B3A',fontWeight:block.bold?700:400,whiteSpace:'pre-wrap'}}>{block.content}</p>}
      {block.type==='image'&&block.imageUrl&&<div style={{textAlign:'center'}}><img src={block.imageUrl} style={{maxWidth:'100%',maxHeight:260,objectFit:'contain',borderRadius:8}} alt=""/>{block.caption&&<div style={{fontSize:'.74rem',color:'#718096',marginTop:4,fontStyle:'italic'}}>{block.caption}</div>}</div>}
      {block.type==='fill'&&(()=>{
        const parts=parseFill(block.text||'');
        return<div style={{fontSize:'.95rem',lineHeight:2.8}}>{parts.map((p,pi)=>{
          if(p.t==='text')return<span key={pi}>{p.v}</span>;
          const key=block.id+'_'+p.idx,val=answers[key]||'';
          const isC=done&&val.trim().toLowerCase()===p.answer.trim().toLowerCase();
          const isW=done&&!isC;
          return<span key={pi} style={{display:'inline-flex',alignItems:'center',gap:3}}>
            <input value={val} disabled={done} onChange={e=>setAns(key,e.target.value)}
              style={{border:'none',borderBottom:`2px solid ${done?(isC?'#166534':'#dc2626'):'#C9882A'}`,background:done?(isC?'rgba(22,101,52,.07)':'rgba(220,38,38,.07)'):'transparent',padding:'2px 6px',fontSize:'.9rem',fontFamily:'inherit',minWidth:80,outline:'none',textAlign:'center',borderRadius:done?4:0,color:done?(isC?'#166534':'#dc2626'):'#1C2B3A'}}/>
            {isW&&<span style={{fontSize:'.7rem',color:'#166534',fontWeight:700}}>({p.answer})</span>}
          </span>;
        })}</div>;
      })()}
      {block.type==='choice'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
        {(block.questions||[]).map((q,qi)=>{
          const key=block.id+'_'+qi,sel=answers[key];
          return<div key={qi}><div style={{fontWeight:700,fontSize:'.9rem',marginBottom:7}}>{qi+1}. {q.q}</div>
            {(q.opts||[]).filter(Boolean).map((opt,oi)=>{
              let bg='#fff',border='rgba(28,43,58,.12)',color='#1C2B3A';
              if(done){if(oi===q.correct){bg='rgba(22,101,52,.08)';border='#166534';color='#166534';}else if(oi===sel&&oi!==q.correct){bg='rgba(220,38,38,.07)';border='#dc2626';color='#dc2626';}}
              else if(oi===sel){bg='rgba(201,136,42,.08)';border='#C9882A';}
              return<button key={oi} disabled={done} onClick={()=>setAns(key,oi)}
                style={{display:'block',width:'100%',textAlign:'left',padding:'10px 14px',borderRadius:10,border:`1.5px solid ${border}`,background:bg,color,cursor:done?'default':'pointer',fontFamily:'inherit',fontSize:'.88rem',marginBottom:6,fontWeight:oi===sel?600:400}}>
                {opt}{done&&oi===q.correct?' ✓':''}{done&&oi===sel&&oi!==q.correct?' ✗':''}
              </button>;
            })}
          </div>;
        })}
      </div>}
      {block.type==='match'&&<div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div>{(block.pairs||[]).map((p,i)=><div key={i} style={{padding:'6px 10px',border:'1px solid rgba(28,43,58,.12)',borderRadius:7,fontSize:'.86rem',marginBottom:5,background:'#F9F8F6'}}>{i+1}. {p.l}</div>)}</div>
          <div>{[...(block.pairs||[])].sort(()=>Math.random()-.5).map((p,i)=><div key={i} style={{padding:'6px 10px',border:'1px solid rgba(28,43,58,.12)',borderRadius:7,fontSize:'.86rem',marginBottom:5,background:'#F9F8F6'}}>{String.fromCharCode(65+i)}. {p.r}</div>)}</div>
        </div>
        {(block.pairs||[]).map((pair,pi)=>{
          const key=block.id+'_'+pi,val=answers[key]||'';
          const isC=done&&val===pair.r,isW=done&&val&&!isC;
          return<div key={pi} style={{display:'flex',alignItems:'center',gap:7,marginBottom:6}}>
            <span style={{fontSize:'.82rem',fontWeight:700,minWidth:20,color:'#42536A'}}>{pi+1}.</span>
            <select value={val} disabled={done} onChange={e=>setAns(key,e.target.value)}
              style={{flex:1,padding:'7px 10px',borderRadius:8,border:`1.5px solid ${done?(isC?'#166534':isW?'#dc2626':'rgba(28,43,58,.12)'):'rgba(28,43,58,.12)'}`,background:done?(isC?'rgba(22,101,52,.07)':isW?'rgba(220,38,38,.07)':'#fff'):'#fff',fontFamily:'inherit',fontSize:'.86rem'}}>
              <option value="">— vali —</option>
              {(block.pairs||[]).map((p,i)=><option key={i} value={p.r}>{p.r}</option>)}
            </select>
            {done&&isC&&<span style={{color:'#166534',fontWeight:800}}>✓</span>}
            {done&&isW&&<span style={{color:'#dc2626',fontSize:'.74rem'}}>{pair.r}</span>}
          </div>;
        })}
      </div>}
      {block.type==='writing'&&<div>
        <div style={{fontSize:'.86rem',marginBottom:8,color:'#42536A',lineHeight:1.5}}>{block.task}</div>
        <textarea value={answers[block.id]||''} disabled={done} onChange={e=>setAns(block.id,e.target.value)}
          rows={block.lines||4} placeholder="Kirjuta siia..."
          style={{width:'100%',padding:'9px 12px',borderRadius:9,border:'1.5px solid rgba(28,43,58,.12)',fontFamily:'inherit',fontSize:'.88rem',resize:'vertical',lineHeight:1.6}}/>
      </div>}
      {block.type==='dialogue'&&<div style={{border:'1px solid rgba(28,43,58,.1)',borderRadius:10,overflow:'hidden'}}>
        {(block.lines||[]).map((line,li)=>{
          const isA=line.speaker==='A'||line.speaker==='Õpetaja';
          const parts=(line.text||'').split(/(\[[^\]]*\])/g);
          const hasBlank=parts.some(p=>p.startsWith('['));
          let bIdx=0;
          return<div key={li} style={{display:'flex',gap:8,padding:'9px 13px',background:isA?'#F9F8F6':'#fff',borderBottom:li<(block.lines||[]).length-1?'1px solid rgba(28,43,58,.06)':'none'}}>
            <span style={{fontSize:'.72rem',fontWeight:700,color:isA?'#2F5D50':'#1d4ed8',minWidth:65,flexShrink:0,paddingTop:2}}>{line.speaker}:</span>
            <span style={{fontSize:'.9rem',flex:1}}>{hasBlank?parts.map((p,pi)=>{
              if(!p.startsWith('['))return<span key={pi}>{p}</span>;
              const key=block.id+'_'+li+'_'+(bIdx++),val=answers[key]||'';
              return<input key={pi} value={val} disabled={done} onChange={e=>setAns(key,e.target.value)}
                style={{border:'none',borderBottom:'1.5px solid #1C2B3A',background:'transparent',padding:'0 4px',fontSize:'.9rem',fontFamily:'inherit',minWidth:70,outline:'none'}}/>;
            }):line.text}</span>
          </div>;
        })}
      </div>}
      {block.type==='reading'&&<div>
        <div style={{background:'#F9F8F6',border:'1px solid rgba(28,43,58,.1)',borderRadius:8,padding:'12px 14px',marginBottom:12,fontSize:'.88rem',lineHeight:1.65,whiteSpace:'pre-wrap'}}>{block.passage}</div>
        {(block.questions||[]).map((q,qi)=>{
          const key=block.id+'_'+qi,sel=answers[key];
          return<div key={qi} style={{marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:'.9rem',marginBottom:6}}>{qi+1}. {q.q}</div>
            {(q.opts||[]).filter(Boolean).map((opt,oi)=>{
              let bg='#fff',border='rgba(28,43,58,.12)',color='#1C2B3A';
              if(done){if(oi===q.correct){bg='rgba(22,101,52,.08)';border='#166534';color='#166534';}else if(oi===sel&&oi!==q.correct){bg='rgba(220,38,38,.07)';border='#dc2626';color='#dc2626';}}
              else if(oi===sel){bg='rgba(201,136,42,.08)';border='#C9882A';}
              return<button key={oi} disabled={done} onClick={()=>setAns(key,oi)}
                style={{display:'block',width:'100%',textAlign:'left',padding:'9px 13px',borderRadius:9,border:`1.5px solid ${border}`,background:bg,color,cursor:done?'default':'pointer',fontFamily:'inherit',fontSize:'.86rem',marginBottom:5}}>
                {opt}
              </button>;
            })}
          </div>;
        })}
      </div>}
      {block.type==='error_correction'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
        {(block.sentences||[]).map((s,si)=>{
          const key=block.id+'_'+si,val=answers[key]||'';
          const isC=done&&val.trim().toLowerCase()===(s.correct||'').trim().toLowerCase();
          return<div key={si} style={{display:'flex',alignItems:'flex-start',gap:8}}>
            <span style={{fontSize:'.72rem',fontWeight:800,color:'#dc2626',minWidth:20,paddingTop:10}}>{si+1}.</span>
            <div style={{flex:1}}>
              <div style={{fontSize:'.88rem',color:'#7A7167',textDecoration:'line-through',marginBottom:5}}>{s.wrong}</div>
              <input value={val} disabled={done} onChange={e=>setAns(key,e.target.value)} placeholder="Parandus..."
                style={{width:'100%',padding:'7px 10px',borderRadius:8,border:`1.5px solid ${done?(isC?'#166534':'#dc2626'):'rgba(28,43,58,.12)'}`,fontFamily:'inherit',fontSize:'.87rem'}}/>
              {done&&<div style={{fontSize:'.76rem',color:'#2F5D50',marginTop:3}}>✓ {s.correct}</div>}
            </div>
          </div>;
        })}
      </div>}
      {block.type==='transformation'&&<div>
        {block.example&&<div style={{padding:'8px 12px',borderRadius:8,background:'#F0EEE9',border:'1px solid rgba(28,43,58,.1)',marginBottom:12,fontSize:'.86rem',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{color:'#7A7167',fontSize:'.7rem',fontWeight:700}}>NÄIDE:</span>
          <span>{block.example.from}</span><span style={{color:'#C9882A'}}>→</span>
          <span style={{color:'#2F5D50',fontWeight:600}}>{block.example.to}</span>
        </div>}
        {(block.sentences||[]).map((s,si)=>{
          const key=block.id+'_'+si;
          return<div key={si} style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:10}}>
            <span style={{fontSize:'.72rem',fontWeight:700,color:'#718096',minWidth:20,paddingTop:10}}>{si+1}.</span>
            <div style={{flex:1}}>
              <div style={{fontSize:'.88rem',color:'#1C2B3A',marginBottom:5}}>{s}</div>
              <input value={answers[key]||''} disabled={done} onChange={e=>setAns(key,e.target.value)} placeholder="Muudetud lause..."
                style={{width:'100%',padding:'7px 10px',borderRadius:8,border:'1.5px solid rgba(28,43,58,.12)',fontFamily:'inherit',fontSize:'.87rem'}}/>
            </div>
          </div>;
        })}
      </div>}
    </div>);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,43,58,.65)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'16px',zIndex:310,backdropFilter:'blur(6px)',overflowY:'auto'}}>
      <div style={{background:'#EEECE7',borderRadius:20,maxWidth:760,width:'100%',marginTop:8,marginBottom:24}}>
        <div style={{background:'#1C2B3A',borderRadius:'20px 20px 0 0',padding:'16px 22px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:2}}>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:'.96rem'}}>{meta.title||assignment.lessonTitle}</div>
            <div style={{color:'rgba(255,255,255,.45)',fontSize:'.74rem',marginTop:2}}>{assignment.subject} · {assignment.level} · {assignment.topic}{assignment.dueDate&&<span style={{marginLeft:8}}>📅 {assignment.dueDate}</span>}</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.1)',border:'none',color:'#fff',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.8rem'}}>✕ Sulge</button>
        </div>
        {assignment.note&&<div style={{padding:'10px 22px',background:'rgba(201,136,42,.12)',borderBottom:'1px solid rgba(201,136,42,.15)'}}>
          <div style={{fontSize:'.78rem',color:'#A96E1A',fontWeight:700}}>📝 Õpetaja märkus: {assignment.note}</div>
        </div>}
        {submitted&&score&&<div style={{padding:'14px 22px',background:'rgba(47,93,80,.1)',borderBottom:'1px solid rgba(47,93,80,.15)'}}>
          <div style={{fontSize:'1rem',fontWeight:800,color:'#2F5D50'}}>{score.pct>=80?'🎉 ':score.pct>=50?'👍 ':'💪 '}Tulemus: {score.correct}/{score.total} ({score.pct}%)</div>
          <div style={{fontSize:'.8rem',color:'#2F5D50',marginTop:3}}>{score.pct>=80?'Suurepärane töö!':score.pct>=50?'Tubli! Harjuta veel.':'Proovi uuesti, sa saad hakkama!'}</div>
        </div>}
        <div style={{padding:'20px 22px',display:'flex',flexDirection:'column',gap:14}}>
          {blocks.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'#B0A898'}}>Tööleht on tühi.</div>}
          {blocks.map((b,gi)=>renderBlock(b,gi))}
        </div>
        {!submitted&&blocks.length>0&&<div style={{padding:'14px 22px',borderTop:'1px solid rgba(28,43,58,.1)',background:'#fff',borderRadius:'0 0 20px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',bottom:0}}>
          <div style={{fontSize:'.8rem',color:'#718096'}}>Täida kõik ülesanded ja vajuta "Esita"</div>
          <button onClick={handleSubmit} disabled={submitting}
            style={{padding:'10px 22px',borderRadius:10,border:'none',background:'#2F5D50',color:'#fff',fontFamily:'inherit',fontWeight:800,fontSize:'.86rem',cursor:'pointer',opacity:submitting?.7:1}}>
            {submitting?'Saadan…':'✓ Esita tööleht'}
          </button>
        </div>}
        {submitted&&<div style={{padding:'14px 22px',background:'#fff',borderRadius:'0 0 20px 20px',textAlign:'center'}}>
          <div style={{color:'#2F5D50',fontWeight:700,fontSize:'.9rem'}}>✓ Tööleht esitatud</div>
          <button onClick={onClose} style={{marginTop:10,padding:'8px 18px',borderRadius:9,border:'none',background:'rgba(28,43,58,.08)',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.82rem'}}>Sulge</button>
        </div>}
      </div>
    </div>
  );
}

// ── KABINET VIEW (вкладка ученика) ─────────────────────────────
function KabinetView({user, myStudents, notify}) {
  const [assignments, setAssignments] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [openWs, setOpenWs] = React.useState(null);
  React.useEffect(()=>{
    if(!user?.uid) return;
    const ids=myStudents.map(s=>s.id).filter(Boolean);
    if(!ids.length){setLoading(false);return;}
    const unsubs=ids.map(sid=>
      db.collection('worksheetAssignments').where('studentId','==',sid).orderBy('assignedAt','desc')
        .onSnapshot(snap=>{
          setAssignments(prev=>{
            const others=prev.filter(a=>a.studentId!==sid);
            return [...others,...snap.docs.map(d=>({id:d.id,...d.data()}))].sort((a,b)=>(b.assignedAt||'').localeCompare(a.assignedAt||''));
          });
          setLoading(false);
        },()=>setLoading(false))
    );
    return()=>unsubs.forEach(u=>u());
  },[user?.uid,myStudents.map(s=>s.id).join(',')]);
  const submitAssignment=async(assignmentId,answers,score)=>{
    await db.collection('worksheetAssignments').doc(assignmentId).update({status:'done',answers,score,completedAt:new Date().toISOString()});
    notify('✓ Tööleht esitatud!');
  };
  const STATUS={new:{l:'Uus',c:'#1d4ed8',bg:'rgba(29,78,216,.1)'},started:{l:'Pooleli',c:'#A96E1A',bg:'rgba(201,136,42,.1)'},done:{l:'✓ Esitatud',c:'#166534',bg:'rgba(22,101,52,.1)'}};
  const fmtDate=d=>d?new Date(d).toLocaleDateString('et-EE',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
  const todo=assignments.filter(a=>a.status!=='done');
  const done=assignments.filter(a=>a.status==='done');
  if(loading)return<div style={{display:'flex',justifyContent:'center',padding:60}}><div className="spinner"/></div>;
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div>
        <h1 style={{fontSize:'1.7rem'}}>📋 Minu töölehed</h1>
        <div style={{color:'#42536A',fontSize:'.88rem',marginTop:4}}>Õpetaja poolt määratud töölehed. Täida ja esita otse siin.</div>
      </div>
      {assignments.length===0&&<div className="card" style={{padding:48,textAlign:'center',color:'#B0A898'}}>
        <div style={{fontSize:'2.5rem',marginBottom:12}}>📋</div>
        <div style={{fontSize:'1rem',fontWeight:600,color:'#1C2B3A',marginBottom:6}}>Töölehti pole veel määratud</div>
        <div style={{fontSize:'.84rem'}}>Õpetaja määrab sulle töölehti, mis ilmuvad siia.</div>
      </div>}
      {todo.length>0&&<div>
        <div style={{fontSize:'.75rem',fontWeight:800,color:'#718096',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:12}}>Täitmata ({todo.length})</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
          {todo.map(a=>{
            const st=STATUS[a.status]||STATUS.new;
            const hasWs=!!(a.worksheetData?.blocks?.length);
            const overdue=a.dueDate&&a.dueDate<new Date().toISOString().split('T')[0];
            return<div key={a.id} className="card" style={{padding:20,border:overdue?'1px solid rgba(220,38,38,.2)':'0.5px solid rgba(28,43,58,.09)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,marginBottom:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:'.96rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.lessonTitle}</div>
                  <div style={{fontSize:'.74rem',color:'#718096',marginTop:3}}>{a.subject} · {a.level} · {a.topic}</div>
                </div>
                <span style={{padding:'3px 9px',borderRadius:6,fontSize:'.68rem',fontWeight:800,background:st.bg,color:st.c,flexShrink:0}}>{st.l}</span>
              </div>
              {a.note&&<div style={{padding:'7px 10px',borderRadius:8,background:'rgba(201,136,42,.08)',fontSize:'.78rem',color:'#A96E1A',marginBottom:8}}>📝 {a.note}</div>}
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'.74rem',color:overdue?'#dc2626':'#718096',marginBottom:12}}>
                <span>Määratud: {fmtDate(a.assignedAt)}</span>
                {a.dueDate&&<span style={{fontWeight:overdue?700:400}}>{overdue?'⚠ Hilinenud! ':'📅 '}{fmtDate(a.dueDate)}</span>}
              </div>
              <button onClick={()=>setOpenWs(a)} disabled={!hasWs}
                style={{width:'100%',padding:'10px',borderRadius:10,border:'none',background:hasWs?'#2F5D50':'rgba(28,43,58,.08)',color:hasWs?'#fff':'#B0A898',cursor:hasWs?'pointer':'not-allowed',fontFamily:'inherit',fontWeight:700,fontSize:'.86rem'}}>
                {hasWs?'▶ Alusta töölehte':'Tööleht puudub'}
              </button>
            </div>;
          })}
        </div>
      </div>}
      {done.length>0&&<div>
        <div style={{fontSize:'.75rem',fontWeight:800,color:'#718096',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:12}}>Esitatud ({done.length})</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {done.map(a=><div key={a.id} className="card" style={{padding:'12px 18px',display:'flex',alignItems:'center',gap:14,opacity:.85}}>
            <div style={{width:34,height:34,borderRadius:10,background:'rgba(22,101,52,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',flexShrink:0}}>✓</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.lessonTitle}</div>
              <div style={{fontSize:'.72rem',color:'#718096',marginTop:2}}>{a.subject} · {a.level} · Esitatud {fmtDate(a.completedAt)}</div>
            </div>
            {a.score&&<div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontWeight:800,color:a.score.pct>=80?'#166634':a.score.pct>=50?'#A96E1A':'#dc2626'}}>{a.score.pct}%</div>
              <div style={{fontSize:'.7rem',color:'#718096'}}>{a.score.correct}/{a.score.total}</div>
            </div>}
            <button onClick={()=>setOpenWs(a)} style={{padding:'6px 12px',borderRadius:8,border:'1px solid rgba(28,43,58,.12)',background:'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.76rem',flexShrink:0}}>Vaata</button>
          </div>)}
        </div>
      </div>}
      {openWs&&<WorksheetPlayer assignment={openWs} onClose={()=>setOpenWs(null)} onSubmit={submitAssignment}/>}
    </div>
  );
}

// ── ASSIGNED WORKSHEETS WIDGET (в карточке ученика) ───────────
function AssignedWorksheetsWidget({student, canManage, notify}) {
  const [assignments, setAssignments] = React.useState([]);
  const [openWs, setOpenWs] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    if(!student?.id) return;
    const unsub = db.collection('worksheetAssignments')
      .where('studentId','==',student.id)
      .orderBy('assignedAt','desc')
      .limit(10)
      .onSnapshot(snap=>{
        setAssignments(snap.docs.map(d=>({id:d.id,...d.data()})));
        setLoading(false);
      }, ()=>setLoading(false));
    return unsub;
  },[student?.id]);

  const submitAssignment = async(assignmentId, answers, score) => {
    await db.collection('worksheetAssignments').doc(assignmentId).update({
      status:'done', answers, score, completedAt:new Date().toISOString()
    });
    notify('✓ Tööleht esitatud!');
  };

  const deleteAssignment = async(id) => {
    if(!window.confirm('Kustuta määramine?')) return;
    await db.collection('worksheetAssignments').doc(id).delete();
    notify('✓ Kustutatud');
  };

  if(loading || assignments.length===0) return null;

  const STATUS = {new:{l:'Uus',c:'#1d4ed8',bg:'rgba(29,78,216,.1)'},started:{l:'Pooleli',c:'#A96E1A',bg:'rgba(201,136,42,.1)'},done:{l:'✓ Esitatud',c:'#166534',bg:'rgba(22,101,52,.1)'}};
  const fmtDate = d => d?new Date(d).toLocaleDateString('et-EE',{day:'2-digit',month:'2-digit'}):'—';

  return (
    <div className="card" style={{padding:22}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <h3>📋 Määratud töölehed ({assignments.length})</h3>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:'.76rem',color:'#2F5D50',fontWeight:700}}>{assignments.filter(a=>a.status==='done').length} esitatud</span>
          <span style={{fontSize:'.76rem',color:'#1d4ed8',fontWeight:700}}>{assignments.filter(a=>a.status!=='done').length} ootel</span>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {assignments.map(a=>{
          const st=STATUS[a.status]||STATUS.new;
          const hasWs=!!(a.worksheetData?.blocks?.length);
          return(
            <div key={a.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:11,background:'#F9F8F6',border:'0.5px solid rgba(28,43,58,.08)'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.lessonTitle}</div>
                <div style={{fontSize:'.72rem',color:'#718096',marginTop:2}}>
                  {a.subject} · {a.level}
                  {a.dueDate&&<span style={{marginLeft:6}}>📅 {fmtDate(a.dueDate)}</span>}
                  {a.score&&<span style={{marginLeft:6,color:a.score.pct>=80?'#166534':a.score.pct>=50?'#A96E1A':'#dc2626',fontWeight:700}}>{a.score.pct}%</span>}
                </div>
              </div>
              <span style={{padding:'2px 8px',borderRadius:5,fontSize:'.68rem',fontWeight:800,background:st.bg,color:st.c,flexShrink:0}}>{st.l}</span>
              {hasWs&&<button onClick={()=>setOpenWs(a)}
                style={{padding:'6px 12px',borderRadius:8,border:'none',background:a.status==='done'?'rgba(28,43,58,.07)':'#2F5D50',color:a.status==='done'?'#42536A':'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'.76rem',flexShrink:0}}>
                {a.status==='done'?'Vaata':'Täida'}
              </button>}
              {canManage&&<button onClick={()=>deleteAssignment(a.id)}
                style={{background:'none',border:'none',color:'#dc2626',cursor:'pointer',fontSize:'.8rem',padding:'4px',flexShrink:0}}>
                <i className="fa-solid fa-trash"/>
              </button>}
            </div>
          );
        })}
      </div>
      {openWs&&<WorksheetPlayer assignment={openWs} onClose={()=>setOpenWs(null)} onSubmit={submitAssignment}/>}
    </div>
  );
}
