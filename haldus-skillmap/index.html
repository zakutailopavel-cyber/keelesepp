<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:#EEECE7;color:#1C2B3A;min-height:100vh;}
.top-header{background:#1C2B3A;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.logo{font-family:'Fraunces',serif;font-size:1.45rem;font-weight:700;color:#fff;letter-spacing:-.01em;}
.logo span{color:#C9882A;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:10px;font-family:inherit;font-weight:700;font-size:.83rem;cursor:pointer;border:none;transition:all .14s;}
.btn-pine{background:#2F5D50;color:#fff;}
.btn-pine:hover{background:#265048;}
.btn-ghost{background:rgba(28,43,58,.07);color:#42536A;border:1px solid rgba(28,43,58,.1);}
.btn-ghost:hover{background:rgba(28,43,58,.12);}
.btn-sm{padding:6px 12px;font-size:.77rem;}
.spinner{width:30px;height:30px;border:3px solid rgba(28,43,58,.1);border-top-color:#2F5D50;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Layout */
.page{max-width:1200px;margin:0 auto;padding:28px;}
.page-title{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:.85rem;color:#718096;margin-bottom:28px;}

/* Student selector */
.student-sel{background:#fff;border-radius:16px;padding:20px 24px;margin-bottom:24px;border:0.5px solid rgba(28,43,58,.1);display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.student-sel label{font-size:.78rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.08em;}
.student-sel select{padding:9px 14px;border-radius:10px;border:1.5px solid rgba(28,43,58,.12);font-family:inherit;font-size:.9rem;color:#1C2B3A;background:#fff;outline:none;min-width:220px;}
.student-sel select:focus{border-color:#2F5D50;}

/* Level tabs */
.level-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.level-tab{padding:7px 18px;border-radius:20px;border:1.5px solid transparent;font-weight:700;font-size:.83rem;cursor:pointer;transition:all .15s;background:#fff;}
.level-tab:hover{border-color:rgba(28,43,58,.2);}
.level-tab.active{color:#fff;}

/* Skill grid */
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:32px;}

/* Skill card */
.skill-card{background:#fff;border-radius:14px;padding:16px 18px;border:0.5px solid rgba(28,43,58,.09);transition:all .18s;position:relative;overflow:hidden;}
.skill-card:hover{box-shadow:0 4px 18px rgba(28,43,58,.09);transform:translateY(-1px);}
.skill-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.skill-cat{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;}
.skill-name{font-size:.9rem;font-weight:700;color:#1C2B3A;margin-bottom:3px;line-height:1.3;}
.skill-name-et{font-size:.78rem;color:#718096;line-height:1.4;margin-bottom:10px;}
.skill-score-row{display:flex;align-items:center;gap:10px;}
.skill-bar-wrap{flex:1;height:7px;background:rgba(28,43,58,.07);border-radius:4px;overflow:hidden;}
.skill-bar{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.skill-score-num{font-size:.78rem;font-weight:800;min-width:30px;text-align:right;}
.skill-status{font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.07em;margin-top:6px;display:inline-flex;align-items:center;gap:4px;}
.status-strong{background:rgba(22,101,52,.1);color:#166534;}
.status-normal{background:rgba(28,43,58,.07);color:#42536A;}
.status-weak{background:rgba(153,27,27,.1);color:#991b1b;}
.status-untested{background:rgba(201,136,42,.08);color:#92400e;}

/* Score badge editable */
.score-edit{width:44px;padding:4px 6px;border-radius:7px;border:1.5px solid rgba(28,43,58,.12);font-family:inherit;font-size:.82rem;font-weight:700;text-align:center;background:#F9F8F6;}
.score-edit:focus{border-color:#2F5D50;outline:none;}

/* Summary panel */
.summary{background:#1C2B3A;border-radius:18px;padding:24px 28px;margin-bottom:28px;color:#fff;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:16px;margin-top:16px;}
.sum-card{background:rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;text-align:center;}
.sum-num{font-size:2rem;font-weight:800;line-height:1;}
.sum-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.45);margin-top:5px;}

/* Radar chart */
.radar-wrap{background:#fff;border-radius:18px;padding:24px;margin-bottom:24px;border:0.5px solid rgba(28,43,58,.09);display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
.radar-svg-wrap{flex-shrink:0;}

/* Legend */
.legend{flex:1;min-width:200px;}
.legend-title{font-size:.8rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.84rem;}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}

/* Section header */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#718096;}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:#1C2B3A;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;z-index:50;gap:12px;}
.save-bar-msg{color:rgba(255,255,255,.55);font-size:.82rem;}
.save-bar-msg.changed{color:#C9882A;font-weight:700;}

/* Student view mode */
.student-view{background:linear-gradient(135deg,#1C2B3A 0%,#2F5D50 100%);border-radius:20px;padding:32px;margin-bottom:24px;color:#fff;}
.sv-title{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;margin-bottom:4px;}
.sv-sub{color:rgba(255,255,255,.5);font-size:.84rem;margin-bottom:24px;}
.sv-skill{background:rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.sv-skill-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.sv-skill-name{flex:1;}
.sv-skill-title{font-size:.9rem;font-weight:700;margin-bottom:2px;}
.sv-skill-desc{font-size:.74rem;color:rgba(255,255,255,.45);}
.sv-bar-wrap{width:100px;height:6px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden;flex-shrink:0;}
.sv-bar-fill{height:100%;border-radius:3px;}
.sv-stars{display:flex;gap:3px;flex-shrink:0;}
.sv-star{font-size:.9rem;}

/* Notif */
.notif{position:fixed;top:18px;right:18px;background:#2F5D50;color:#fff;padding:11px 18px;border-radius:12px;z-index:500;font-weight:600;font-size:.86rem;box-shadow:0 8px 28px rgba(0,0,0,.22);animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* Toggle */
.toggle-wrap{display:flex;background:rgba(28,43,58,.07);border-radius:10px;padding:3px;gap:2px;}
.toggle-btn{padding:6px 14px;border-radius:8px;border:none;font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;background:none;color:#718096;}
.toggle-btn.active{background:#fff;color:#1C2B3A;box-shadow:0 1px 4px rgba(28,43,58,.1);}
</style>
</head>

// ── UTILS ──────────────────────────────────────────────────────
const getStatus = score => {
  if(score === null || score === undefined) return 'untested';
  if(score >= 80) return 'strong';
  if(score >= 50) return 'normal';
  return 'weak';
};
const getStars = score => {
  if(score === null || score === undefined) return 0;
  if(score >= 80) return 3;
  if(score >= 50) return 2;
  if(score >= 25) return 1;
  return 0;
};
const LEVEL_COLORS = {
  A1: {main:'#047857', light:'rgba(4,120,87,.12)', text:'#065f46'},
  A2: {main:'#0e7490', light:'rgba(14,116,144,.12)', text:'#164e63'},
  B1: {main:'#1d4ed8', light:'rgba(29,78,216,.12)', text:'#1e3a8a'},
  B2: {main:'#6d28d9', light:'rgba(109,40,217,.12)', text:'#4c1d95'},
  C1: {main:'#be185d', light:'rgba(190,24,93,.12)', text:'#831843'},
};

// ── RADAR CHART ─────────────────────────────────────────────────
function RadarChart({skills, skillMap, level}) {
  const cats = Object.keys(CATEGORIES);
  const N = cats.length;
  const CX = 160, CY = 160, R = 120;
  const getPoint = (i, r) => {
    const angle = (2 * Math.PI * i / N) - Math.PI / 2;
    return [CX + r * Math.cos(angle), CY + r * Math.sin(angle)];
  };
  // Average score per category from skills of this level
  const catScores = {};
  cats.forEach(cat => {
    const catSkills = skills.filter(s => s.cat === cat);
    if(!catSkills.length) { catScores[cat] = 0; return; }
    const scores = catSkills.map(s => skillMap[s.id] ?? 0);
    catScores[cat] = scores.reduce((a,b)=>a+b,0) / scores.length;
  });
  const lc = LEVEL_COLORS[level] || LEVEL_COLORS.A2;
  // Grid circles
  const gridLevels = [25, 50, 75, 100];
  const gridPaths = gridLevels.map(gl => {
    const pts = cats.map((_,i) => getPoint(i, R * gl / 100));
    return pts.map((p,i) => (i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';
  });
  // Data polygon
  const dataPts = cats.map((cat,i) => getPoint(i, R * (catScores[cat] || 0) / 100));
  const dataPath = dataPts.map((p,i) => (i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';
  return (
    <svg width={320} height={320} viewBox="0 0 320 320">
      {/* Grid */}
      {gridPaths.map((d,gi) => <path key={gi} d={d} fill="none" stroke="rgba(28,43,58,.07)" strokeWidth="1"/>)}
      {/* Axes */}
      {cats.map((_,i) => {
        const [x,y] = getPoint(i, R);
        return <line key={i} x1={CX} y1={CY} x2={x.toFixed(1)} y2={y.toFixed(1)} stroke="rgba(28,43,58,.08)" strokeWidth="1"/>;
      })}
      {/* Grid labels */}
      {[25,50,75].map(gl => {
        const [x,y] = getPoint(0, R * gl / 100);
        return <text key={gl} x={x+4} y={y+3} fontSize="8" fill="rgba(28,43,58,.3)" fontFamily="IBM Plex Sans">{gl}%</text>;
      })}
      {/* Data fill */}
      <path d={dataPath} fill={lc.main} fillOpacity=".15" stroke={lc.main} strokeWidth="2.5"/>
      {/* Category labels */}
      {cats.map((cat,i) => {
        const [x,y] = getPoint(i, R + 22);
        const c = CATEGORIES[cat];
        const anchor = x < CX-10 ? 'end' : x > CX+10 ? 'start' : 'middle';
        return (
          <g key={cat}>
            <text x={x} y={y} fontSize="10" fontWeight="700" fill={c.color} textAnchor={anchor} fontFamily="IBM Plex Sans">{c.icon}</text>
            <text x={x} y={y+12} fontSize="8.5" fill="rgba(28,43,58,.6)" textAnchor={anchor} fontFamily="IBM Plex Sans">{c.label}</text>
          </g>
        );
      })}
      {/* Data dots */}
      {dataPts.map(([x,y],i) => (
        <circle key={i} cx={x.toFixed(1)} cy={y.toFixed(1)} r="4" fill={lc.main} stroke="#fff" strokeWidth="2"/>
      ))}
    </svg>
  );
}

// ── SKILL CARD ──────────────────────────────────────────────────
function SkillCard({skill, score, isTeacher, onChange}) {
  const cat = CATEGORIES[skill.cat] || CATEGORIES.sõnavara;
  const status = getStatus(score);
  const stars = getStars(score);
  const lc = LEVEL_COLORS[skill.id.slice(0,2)] || {};
  const barColor = status === 'strong' ? '#166534' : status === 'weak' ? '#dc2626' : '#1d4ed8';
  return (
    <div className="skill-card">
      <div className="skill-card-head">
        <div>
          <span className="skill-cat" style={{background:cat.bg, color:cat.color}}>
            {cat.icon} {cat.label}
          </span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {[0,1,2].map(s => (
            <span key={s} className="sv-star" style={{opacity:s<stars?1:.2}}>⭐</span>
          ))}
        </div>
      </div>
      <div className="skill-name">{skill.name}</div>
      <div className="skill-name-et" style={{fontSize:'.74rem',color:'#7A7167',marginBottom:8}}>{skill.nameRu}</div>
      <div style={{fontSize:'.78rem',color:'#42536A',lineHeight:1.45,marginBottom:10,fontStyle:'italic'}}>{skill.desc}</div>
      <div className="skill-score-row">
        <div className="skill-bar-wrap">
          <div className="skill-bar" style={{width:(score??0)+'%', background:barColor}}/>
        </div>
        {isTeacher
          ? <input
              type="number" min={0} max={100}
              className="score-edit"
              value={score??''}
              placeholder="—"
              onChange={e => onChange(skill.id, e.target.value === '' ? null : Math.min(100, Math.max(0, Number(e.target.value))))}
            />
          : <span className="skill-score-num" style={{color:barColor}}>{score !== null && score !== undefined ? score+'%' : '—'}</span>
        }
      </div>
      <div style={{marginTop:8}}>
        <span className={'skill-status status-'+status}>
          {status === 'strong' ? '✓ Tugev' : status === 'weak' ? '⚠ Nõrk' : status === 'untested' ? '○ Testimata' : '● Areneb'}
        </span>
      </div>
    </div>
  );
}

                {activeLevel} — {levelSkills.length} oskust
              </div>
              <div style={{fontSize:'.76rem',color:'#718096'}}>
                {isTeacher ? 'Sisesta hinne 0–100 iga oskuse jaoks' : 'Vaata oma tulemusi'}
              </div>
            </div>
            <div className="skill-grid">
              {levelSkills.map(skill => (
                <SkillCard
                  key={skill.id}
                  skill={skill}
                  score={skillMap[skill.id] ?? null}
                  isTeacher={isTeacher}
                  onChange={updateScore}
                />
              ))}
            </div>
          </>
        )}
      </div>

      {/* Save bar */}
      {selectedId && isTeacher && viewMode === 'teacher' && (
        <div className="save-bar">
          <div className={'save-bar-msg'+(changed?' changed':'')}>
            {changed ? '● Salvestamata muudatused' : '✓ Kõik salvestatud'}
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            {changed && (
              <button onClick={() => { setSkillMap({...origMap}); setChanged(false); }} className="btn btn-ghost btn-sm" style={{color:'rgba(255,255,255,.6)',borderColor:'rgba(255,255,255,.15)'}}>
                Tühista
              </button>
            )}
            <button onClick={saveSkillMap} disabled={saving || !changed} className="btn btn-pine">
              {saving ? 'Salvestab…' : '✓ Salvesta oskuste kaart'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
