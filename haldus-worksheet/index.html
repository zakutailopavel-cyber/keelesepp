<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><div class="sp-dark"></div></div></div>

<script src="/haldus-shared.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback} = React;
const auth=window._auth, db=window._db, storage=window._storage;
const {authFetch} = window.HaldusShared;

const uid=()=>Math.random().toString(36).slice(2,9);

// ── READ PREFILL FROM LOCALSTORAGE ────────────────────────────
// Called once at module level — reads and immediately clears localStorage
const _prefill=(()=>{
  try{
    const raw=localStorage.getItem('ws_prefill');
    if(raw){localStorage.removeItem('ws_prefill');return JSON.parse(raw);}
  }catch(e){}
  return null;
})();

// ── CONSTANTS ─────────────────────────────────────────────────
const BTYPES=[
  {key:'fill',             label:'Taida lunk',      icon:'fa-pen-line',         color:'#1d4ed8',bg:'rgba(29,78,216,.1)'},
  {key:'choice',           label:'Vali vastus',      icon:'fa-list-check',       color:'#6d28d9',bg:'rgba(109,40,217,.1)'},
  {key:'writing',          label:'Kirjutamine',      icon:'fa-pen-nib',          color:'#A96E1A',bg:'rgba(169,110,26,.1)'},
  {key:'match',            label:'Sobita paarid',    icon:'fa-link',             color:'#047857',bg:'rgba(4,120,87,.1)'},
  {key:'order',            label:'Jarjesta sonad',   icon:'fa-shuffle',          color:'#2F5D50',bg:'rgba(47,93,80,.1)'},
  {key:'table',            label:'Tabel',            icon:'fa-table',            color:'#0e7490',bg:'rgba(14,116,144,.1)'},
  {key:'text',             label:'Tekst / juhis',    icon:'fa-align-left',       color:'#718096',bg:'rgba(113,128,150,.1)'},
  {key:'reading',          label:'Lugemistekst',     icon:'fa-book-open-reader', color:'#be185d',bg:'rgba(190,24,93,.1)'},
  {key:'image',            label:'Pilt',             icon:'fa-image',            color:'#0f766e',bg:'rgba(15,118,110,.1)'},
  {key:'dialogue',         label:'Dialoog',          icon:'fa-comments',         color:'#0369a1',bg:'rgba(3,105,161,.1)'},
  {key:'error_correction', label:'Leia viga',        icon:'fa-spell-check',      color:'#dc2626',bg:'rgba(220,38,38,.1)'},
  {key:'transformation',   label:'Muuda lauset',     icon:'fa-right-left',       color:'#7c3aed',bg:'rgba(124,58,237,.1)'},
];
const BT=Object.fromEntries(BTYPES.map(b=>[b.key,b]));

const mkBlock=type=>{
  const base={id:uid(),type,instruction:'',size:'full',imageUrl:'',imagePos:'top',label:''};
  if(type==='fill')             return{...base,text:'Mina [elan] Tallinnas ja [töötan] koolis.'};
  if(type==='choice')           return{...base,questions:[{q:'Mis on Eesti pealinn?',opts:['Tallinn','Tartu','Pärnu','Narva'],correct:0}]};
  if(type==='writing')          return{...base,task:'Kirjuta lühike tekst teemal "Minu pere" (50-80 sona).',lines:8};
  if(type==='match')            return{...base,pairs:[{l:'koer',r:'собака'},{l:'kass',r:'кошка'},{l:'lind',r:'птица'},{l:'kala',r:'рыба'}]};
  if(type==='order')            return{...base,sentence:'Ma armastan oppida eesti keelt'};
  if(type==='table')            return{...base,headers:['Sona','Tolge','Naite'],rows:4};
  if(type==='text')             return{...base,content:'',bold:false};
  if(type==='reading')          return{...base,passage:'Sisesta lugemistekst...',questions:[{q:'',opts:['','','',''],correct:0}]};
  if(type==='image')            return{...base,caption:''};
  if(type==='dialogue')         return{...base,lines:[{speaker:'A',text:'Tere! Kuidas laheb?'},{speaker:'B',text:'[vastus]'},{speaker:'A',text:'[vastus]'}]};
  if(type==='error_correction') return{...base,sentences:[{wrong:'Ma lahen eile poodi.',correct:'Ma laksin eile poodi.'}]};
  if(type==='transformation')   return{...base,example:{from:'Ma lahen poodi.',to:'Ma ei lahe poodi.'},sentences:['Ta tootab koolis.','Me elame Tallinnas.','Nad raagivad eesti keelt.']};
  return base;
};

// ── IMAGE UPLOADER ────────────────────────────────────────────
function ImgUploader({value,onChange}){
  const ref=useRef();
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState('');
  const handle=async file=>{
    if(!file)return;
    if(file.size>8*1024*1024){setErr('Pilt on liiga suur (max 8MB)');return;}
    setBusy(true);setErr('');
    try{
      const r=storage.ref(`worksheet/${Date.now()}_${file.name}`);
      await r.put(file);
      const url=await r.getDownloadURL();
      onChange(url);
    }catch(e){
      const reader=new FileReader();
      reader.onload=ev=>onChange(ev.target.result);
      reader.onerror=()=>setErr('Pildi laadimine ebaõnnestus');
      reader.readAsDataURL(file);
    }
    setBusy(false);
  };
  return(
    <div>
      <div className="img-upload" onClick={()=>ref.current?.click()}>
        <input ref={ref} type="file" accept="image/*" onChange={e=>handle(e.target.files[0])}/>
        {busy
          ?<div style={{padding:'14px 0',textAlign:'center'}}><div className="sp-dark" style={{margin:'0 auto 6px'}}/><div style={{fontSize:'.72rem',color:'#7A7167'}}>Laeb...</div></div>
          :value
            ?<img src={value} className="img-thumb" alt=""/>
            :<div><i className="fa-solid fa-image" style={{fontSize:'1.4rem',color:'#B0A898',marginBottom:4,display:'block'}}/><div style={{fontSize:'.75rem',color:'#1C2B3A',fontWeight:600}}>Klõpsa pildi lisamiseks</div><div style={{fontSize:'.68rem',color:'#7A7167',marginTop:2}}>JPG, PNG — kuni 8MB</div></div>}
      </div>
      {err&&<div style={{fontSize:'.72rem',color:'#dc2626',marginTop:4,padding:'4px 7px',background:'rgba(220,38,38,.07)',borderRadius:5}}>{err}</div>}
      {value&&<button onClick={()=>{onChange('');setErr('');}} style={{background:'none',border:'none',color:'#dc2626',cursor:'pointer',fontSize:'.72rem',marginTop:4,display:'flex',alignItems:'center',gap:4}}><i className="fa-solid fa-trash" style={{fontSize:'.65rem'}}/> Eemalda pilt</button>}
    </div>
  );
}

// ── BLOCK EDITORS ─────────────────────────────────────────────
function FillEd({b,upd}){return(<><div className="field-lbl">Tekst (vastused nurksulgudes [vastus])</div><textarea value={b.text} onChange={e=>upd({text:e.target.value})} rows={4} placeholder="Ma [elan] Tallinnas."/><div style={{fontSize:'.7rem',color:'#718096',marginTop:4,padding:'5px 7px',background:'rgba(29,78,216,.06)',borderRadius:6}}>Süntaks: <code>Ma [elan] koolis.</code></div></>);}

function ChoiceEd({b,upd}){
  const qs=b.questions||[];
  const uQ=(i,p)=>upd({questions:qs.map((q,j)=>j===i?{...q,...p}:q)});
  return(<>{qs.map((q,i)=>(
    <div key={i} style={{marginBottom:8,padding:9,borderRadius:8,background:'#F9F8F6',border:'0.5px solid rgba(28,43,58,.1)'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:'.7rem',fontWeight:700,color:'#718096'}}>Küsimus {i+1}</span>{qs.length>1&&<button onClick={()=>upd({questions:qs.filter((_,j)=>j!==i)})} style={{background:'none',border:'none',color:'#dc2626',cursor:'pointer',fontSize:'.7rem'}}>✕</button>}</div>
      <input value={q.q} onChange={e=>uQ(i,{q:e.target.value})} placeholder="Küsimus..." style={{marginBottom:5}}/>
      {q.opts.map((o,oi)=>(
        <div key={oi} style={{display:'flex',gap:5,alignItems:'center',marginBottom:4}}>
          <input type="radio" checked={q.correct===oi} onChange={()=>uQ(i,{correct:oi})} style={{width:13,height:13,cursor:'pointer',flexShrink:0}}/>
          <input value={o} onChange={e=>uQ(i,{opts:q.opts.map((x,k)=>k===oi?e.target.value:x)})} placeholder={`Variant ${oi+1}`} style={{borderColor:q.correct===oi?'#2F5D50':'rgba(28,43,58,.12)'}}/>
        </div>
      ))}
    </div>
  ))}
  <button onClick={()=>upd({questions:[...qs,{q:'',opts:['','','',''],correct:0}]})} className="btn btn-ghost btn-sm" style={{width:'100%'}}><i className="fa-solid fa-plus"/> Lisa küsimus</button></>);
}

function WritingEd({b,upd}){return(<><div className="field-lbl">Ülesande kirjeldus</div><textarea value={b.task} onChange={e=>upd({task:e.target.value})} rows={3}/><div className="field-lbl">Ridade arv: {b.lines||6}</div><input type="range" min={2} max={20} value={b.lines||6} onChange={e=>upd({lines:+e.target.value})} style={{width:'100%'}}/></>);}

function MatchEd({b,upd}){
  const p=b.pairs||[];
  return(<>{p.map((pair,i)=>(
    <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:5,marginBottom:5,alignItems:'center'}}>
      <input value={pair.l} onChange={e=>upd({pairs:p.map((x,j)=>j===i?{...x,l:e.target.value}:x)})} placeholder="Vasak"/>
      <input value={pair.r} onChange={e=>upd({pairs:p.map((x,j)=>j===i?{...x,r:e.target.value}:x)})} placeholder="Parem (vene tõlge)"/>
      <button onClick={()=>upd({pairs:p.filter((_,j)=>j!==i)})} disabled={p.length<=2} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'.72rem',padding:'0 3px'}}>✕</button>
    </div>
  ))}
  <button onClick={()=>upd({pairs:[...p,{l:'',r:''}]})} className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:3}}><i className="fa-solid fa-plus"/> Lisa paar</button></>);
}

function OrderEd({b,upd}){return(<><div className="field-lbl">Lause õiges järjekorras</div><input value={b.sentence} onChange={e=>upd({sentence:e.target.value})} placeholder="Ma armastan eesti keelt"/><div style={{fontSize:'.7rem',color:'#718096',marginTop:4}}>Sõnad kuvatakse segamini</div></>);}

function TableEd({b,upd}){
  const hdrs=(b.headers||['','','']).map(h=>h.trim()).filter(Boolean);
  const cellData=b.cellData||{};
  const setCell=(r,c,v)=>upd({cellData:{...cellData,[r+','+c]:v}});
  return(<>
    <div className="field-lbl">Veeru päised (komaga)</div>
    <input value={(b.headers||[]).join(',')} onChange={e=>upd({headers:e.target.value.split(',')})} placeholder="Sõna,Tõlge,Näide" style={{marginBottom:8}}/>
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
      <div className="field-lbl" style={{margin:0}}>Ridade arv: {b.rows||4}</div>
      <input type="range" min={2} max={15} value={b.rows||4} onChange={e=>upd({rows:+e.target.value})} style={{flex:1}}/>
    </div>
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.78rem'}}>
        <thead><tr>{hdrs.map((h,ci)=><th key={ci} style={{padding:'4px 6px',border:'1px solid rgba(28,43,58,.15)',background:'#F0EEE9',fontWeight:700,textAlign:'left'}}>{h}</th>)}</tr></thead>
        <tbody>{Array.from({length:b.rows||4}).map((_,ri)=>(
          <tr key={ri}>{hdrs.map((_,ci)=>(
            <td key={ci} style={{padding:2,border:'1px solid rgba(28,43,58,.12)'}}>
              <input value={cellData[ri+','+ci]||''} onChange={e=>setCell(ri,ci,e.target.value)} style={{width:'100%',padding:'3px 5px',border:'none',background:'transparent',fontSize:'.78rem',borderRadius:0}}/>
            </td>
          ))}</tr>
        ))}</tbody>
      </table>
    </div>
  </>);
}

function TextEd({b,upd}){return(<><div className="field-lbl">Sisu</div><textarea value={b.content} onChange={e=>upd({content:e.target.value})} rows={3} placeholder="Juhis või tekst..."/><label style={{display:'flex',alignItems:'center',gap:7,fontSize:'.78rem',marginTop:6,cursor:'pointer'}}><input type="checkbox" checked={b.bold||false} onChange={e=>upd({bold:e.target.checked})}/> Rasvane (pealkiri)</label></>);}

function ImageEd({b,upd}){return(<><div className="field-lbl">Pilt</div><ImgUploader value={b.imageUrl||''} onChange={url=>upd({imageUrl:url})}/><div className="field-lbl">Pildi asukoht</div><select value={b.imagePos||'top'} onChange={e=>upd({imagePos:e.target.value})}><option value="top">Üleval</option><option value="right">Paremal</option><option value="bottom">Allpool</option></select><div className="field-lbl">Allkiri (valikuline)</div><input value={b.caption||''} onChange={e=>upd({caption:e.target.value})} placeholder="Pildi kirjeldus..."/></>);}


// ── NEW BLOCK TYPE EDITORS ────────────────────────────────────

  const setLine=(i,field,val)=>upd({lines:lines.map((l,j)=>j===i?{...l,[field]:val}:l)});
  return(<>
    <div className="field-lbl">Dialoogi read ([vastus] = opilane taidab)</div>
    {lines.map((line,i)=>(
      <div key={i} style={{display:'grid',gridTemplateColumns:'70px 1fr auto',gap:5,marginBottom:5,alignItems:'center'}}>

function BlockEditor({block,onChange,meta,notify}){
  const upd=p=>onChange({...block,...p});
  const[refineNote,setRefineNote]=useState(block.aiRefineNote||'');
  const[regenerating,setRegenerating]=useState(false);
  const doRegen=async()=>{
    setRegenerating(true);
    try{
      const updated=await regenBlock(block,refineNote,meta);
      onChange({...updated,aiRefineNote:refineNote});
      notify&&notify('✓ Plokk uuendatud!');
    }catch(e){
      console.error('Block regen failed:',e);

  };
  return(
    <div className="block-editor">
      <div className="field-lbl">Nimetus (asendab tüübi nime)</div>

      <div className="field-lbl">Juhis õpilasele</div>
      <input value={block.instruction||''} onChange={e=>upd({instruction:e.target.value})} placeholder="nt. Täida lüngad õigete sõnadega..."/>
      {block.type!=='image'&&(<>
        <div className="field-lbl">Lisa pilt (valikuline)</div>
        <ImgUploader value={block.imageUrl||''} onChange={url=>upd({imageUrl:url})}/>
        {block.imageUrl&&(<><div className="field-lbl">Pildi asukoht</div><select value={block.imagePos||'top'} onChange={e=>upd({imagePos:e.target.value})}><option value="top">Üleval</option><option value="right">Paremal</option><option value="bottom">Allpool</option></select></>)}
      </>)}
      <div className="field-lbl">Laius leheküljel</div>
      <div className="size-btns">{[['full','Täislaius'],['half','Pool'],['third','Kolmandik']].map(([s,l])=>(<button key={s} className={'size-btn'+(block.size===s?' active':'')} onClick={()=>upd({size:s})}>{l}</button>))}</div>
      <div style={{marginTop:8,paddingTop:8,borderTop:'0.5px solid rgba(28,43,58,.07)'}}>
        {block.type==='fill'            &&<FillEd            b={block} upd={upd}/>}
        {block.type==='choice'          &&<ChoiceEd          b={block} upd={upd}/>}
        {block.type==='writing'         &&<WritingEd         b={block} upd={upd}/>}
        {block.type==='match'           &&<MatchEd           b={block} upd={upd}/>}
        {block.type==='order'           &&<OrderEd           b={block} upd={upd}/>}
        {block.type==='table'           &&<TableEd           b={block} upd={upd}/>}
        {block.type==='text'            &&<TextEd            b={block} upd={upd}/>}
        {block.type==='reading'         &&<ReadingEd         b={block} upd={upd}/>}
        {block.type==='image'           &&<ImageEd           b={block} upd={upd}/>}
        {block.type==='dialogue'        &&<DialogueEd        b={block} upd={upd}/>}
        {block.type==='error_correction'&&<ErrorCorrectionEd b={block} upd={upd}/>}
        {block.type==='transformation'  &&<TransformationEd  b={block} upd={upd}/>}
      </div>
      <div style={{marginTop:10,paddingTop:10,borderTop:'1px dashed rgba(124,58,237,.25)',background:'rgba(124,58,237,.04)',borderRadius:8,padding:'10px 11px'}}>
        <div className="field-lbl" style={{color:'#6d28d9',display:'flex',alignItems:'center',gap:5}}>
          <i className="fa-solid fa-wand-magic-sparkles" style={{fontSize:'.7rem'}}/> AI täpsustus selle ploki jaoks
        </div>
        <textarea value={refineNote} onChange={e=>setRefineNote(e.target.value)} rows={2}
          placeholder="nt. Tee lihtsamaks, lisa rohkem sõnu, vaheta teema reisimiseks..."
          style={{marginBottom:7}}/>
        <button onClick={doRegen} disabled={regenerating}
          className="btn btn-sm" style={{background:'#6d28d9',color:'#fff',width:'100%',justifyContent:'center',opacity:regenerating?.7:1}}>

        </button>
      </div>
    </div>
  );
}

// ── PARSE FILL ────────────────────────────────────────────────
function parseFill(text){
  const parts=[];
  text.split(/\[([^\]]+)\]/g).forEach((c,i)=>parts.push(i%2===0?{t:'text',v:c}:{t:'blank',a:c}));
  return parts;
}

// ── RESIZABLE IMAGE ───────────────────────────────────────────
function ResizableImage({src,caption,initWidth,onResize}){
  const[width,setWidth]=useState(initWidth||null);
  const wrapRef=useRef(null);
  const drag=useRef({active:false,startX:0,startW:0});
  useEffect(()=>{
    const onMove=e=>{if(!drag.current.active)return;const delta=e.clientX-drag.current.startX;const newW=Math.max(60,Math.min(740,drag.current.startW+delta));if(wrapRef.current)wrapRef.current.style.width=newW+'px';};
    const onUp=e=>{if(!drag.current.active)return;drag.current.active=false;const delta=e.clientX-drag.current.startX;const newW=Math.max(60,Math.min(740,drag.current.startW+delta));setWidth(newW);onResize&&onResize(newW);document.body.style.cursor='';document.body.style.userSelect='';};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
  },[onResize]);
  if(!src)return<div style={{background:'#F0EEE9',borderRadius:6,height:120,display:'flex',alignItems:'center',justifyContent:'center',color:'#B0A898',fontSize:'.82rem'}}>Pilt puudub</div>;
  return(
    <div>
      <div ref={wrapRef} className="img-resizable-wrap" style={{width:width?width+'px':'100%'}}>
        <img src={src} alt={caption||''} className="img-resizable" style={{width:'100%',height:'auto',objectFit:'contain',display:'block'}} draggable={false}/>
        <div className="img-resize-handle" onMouseDown={e=>{e.preventDefault();e.stopPropagation();drag.current={active:true,startX:e.clientX,startW:wrapRef.current?.offsetWidth||width||300};document.body.style.cursor='se-resize';document.body.style.userSelect='none';}} title="Lohista suuruse muutmiseks"/>
      </div>
      {caption&&<div style={{fontSize:'.72rem',color:'#718096',marginTop:4,fontStyle:'italic',textAlign:'center'}}>{caption}</div>}
    </div>
  );
}

// ── PREVIEW BLOCK ─────────────────────────────────────────────
function PreviewBlock({block,index,onChange}){
  const bt=BT[block.type];if(!bt)return null;
  const renderImg=pos=>{
    if(!block.imageUrl||(block.imagePos||'top')!==pos)return null;
    return<div style={{marginBottom:pos==='bottom'?0:10,marginTop:pos==='bottom'?10:0}}><ResizableImage src={block.imageUrl} caption={block.caption} initWidth={block.imgWidth||null} onResize={w=>onChange&&onChange({...block,imgWidth:w})}/></div>;
  };
  const content=()=>{
    if(block.type==='image')return<ResizableImage src={block.imageUrl} caption={block.caption} initWidth={block.imgWidth||null} onResize={w=>onChange&&onChange({...block,imgWidth:w})}/>;
    if(block.type==='text')return<p className="pb-text" style={{fontWeight:block.bold?700:400,fontSize:block.bold?'1rem':'.9rem',whiteSpace:'pre-wrap'}}>{block.content||<span style={{color:'#C0B8B0',fontStyle:'italic'}}>Tekst puudub</span>}</p>;
    if(block.type==='fill')return<div className="fill-line">{parseFill(block.text||'').map((p,i)=>p.t==='text'?<span key={i}>{p.v}</span>:<span key={i} className="fill-blank">&nbsp;</span>)}</div>;
    if(block.type==='choice')return(block.questions||[]).map((q,qi)=>(<div key={qi} style={{marginBottom:10}}><div className="ch-q">{qi+1}. {q.q||'Küsimus...'}</div><div className="ch-opts">{q.opts.filter(Boolean).map((o,oi)=>(<div key={oi} className="ch-opt"><div className="ch-circle"/><span>{o}</span></div>))}</div></div>));
    if(block.type==='writing')return<div><div className="wr-task">{block.task}</div>{Array.from({length:block.lines||6}).map((_,i)=><div key={i} className="wr-line"/>)}</div>;
    if(block.type==='match'){const shuffledRight=useMemo(()=>[...(block.pairs||[])].sort(()=>Math.random()-.5),[block.id,JSON.stringify((block.pairs||[]).map(p=>p.r))]);return<div><div className="match-cols"><div>{(block.pairs||[]).map((p,i)=><div key={i} className="match-item">{i+1}. {p.l}</div>)}</div><div>{shuffledRight.map((p,i)=><div key={i} className="match-item">{String.fromCharCode(65+i)}. {p.r}</div>)}</div></div><div className="match-answer-row">{(block.pairs||[]).map((_,i)=><span key={i} className="match-ans">{i+1} — ___</span>)}</div></div>;}
    if(block.type==='order'){const words=useMemo(()=>(block.sentence||'').split(' ').filter(Boolean).sort(()=>Math.random()-.5),[block.id,block.sentence]);return<div><div className="order-chips">{words.map((w,i)=><span key={i} className="order-chip">{w}</span>)}</div><div className="order-ans">Kirjuta õige järjestus: ___________________________________________________</div></div>;}
    if(block.type==='table'){const cd=block.cellData||{};return<table className="ws-tbl"><thead><tr>{(block.headers||[]).map((h,i)=><th key={i}>{h||`Veerg ${i+1}`}</th>)}</tr></thead><tbody>{Array.from({length:block.rows||4}).map((_,ri)=>(<tr key={ri}>{(block.headers||[]).filter(Boolean).map((_,ci)=><td key={ci}>{cd[ri+','+ci]||''}</td>)}</tr>))}</tbody></table>;}
    if(block.type==='reading')return<div><div className="pb-passage">{block.passage}</div>{(block.questions||[]).map((q,qi)=>(<div key={qi} style={{marginBottom:10}}><div className="ch-q">{qi+1}. {q.q||'Küsimus...'}</div><div className="ch-opts">{q.opts.filter(Boolean).map((o,oi)=>(<div key={oi} className="ch-opt"><div className="ch-circle"/><span>{o}</span></div>))}</div></div>))}</div>;
    if(block.type==='dialogue'){
      const lns=block.lines||[];
      return(<div style={{border:'1px solid rgba(28,43,58,.1)',borderRadius:8,overflow:'hidden'}}>
        {lns.map((line,i)=>{
          const isA=line.speaker==='A'||line.speaker==='Õpetaja';
          const parts=(line.text||'').split(/(\[[^\]]*\])/g);
          const hasBlank=parts.some(p=>p.startsWith('['));
          return(<div key={i} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'8px 12px',background:isA?'#F9F8F6':'#fff',borderBottom:i<lns.length-1?'1px solid rgba(28,43,58,.06)':'none'}}>
            <span style={{fontSize:'.72rem',fontWeight:700,color:isA?'#2F5D50':'#1d4ed8',minWidth:60,flexShrink:0,paddingTop:2}}>{line.speaker}:</span>
            <span style={{fontSize:'.88rem',color:'#1C2B3A',flex:1}}>

// ── VOCABULARY ────────────────────────────────────────────────
function getVocabForLevel(level){
  const vocab=window._vocab;
  if(!vocab||!vocab[level])return[];
  const words=[];
  Object.entries(vocab[level]||{}).forEach(([type,list])=>{
    [...list].sort(()=>Math.random()-.5).slice(0,15).forEach(w=>words.push({word:w,type}));
  });
  return words.sort(()=>Math.random()-.5);
}

// ── AI GENERATE (IMPROVED) ────────────────────────────────────
function extractJsonObject(raw){
  let text=String(raw||'').trim();
  const fenced=text.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if(fenced) text=fenced[1].trim();
  const start=text.indexOf('{');
  if(start===-1)throw new Error('JSON object not found');

  let depth=0,inString=false,escape=false;
  for(let i=start;i<text.length;i++){
    const ch=text[i];
    if(inString){
      if(escape){escape=false;continue;}
      if(ch==='\\'){escape=true;continue;}
      if(ch==='"')inString=false;
      continue;
    }
    if(ch==='"'){inString=true;continue;}
    if(ch==='{')depth++;
    if(ch==='}'){
      depth--;
      if(depth===0)return text.slice(start,i+1);
    }
  }
  throw new Error('JSON object is incomplete');
}

function parseAIJson(raw,label='AI response'){
  const text=String(raw||'').trim();
  try{return JSON.parse(text);}
  catch(e1){
    try{return JSON.parse(extractJsonObject(text));}
    catch(e2){
      console.error(label+' parse error. Raw:',text.slice(0,1200));
      throw new Error('AI vastuse töötlemine ebaõnnestus: '+e2.message);
    }
  }
}

// ── BUILD HTML FOR EXPORT ─────────────────────────────────────
function buildHTML(meta,blocks){
  const escapeHtml=value=>String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  const safeUrl=value=>{
    const url=String(value||'').trim();
    if(/^https:\/\//i.test(url) || /^http:\/\/localhost(?::\d+)?\//i.test(url) || /^data:image\/(?:png|jpe?g|gif|webp);base64,[a-z0-9+/=]+$/i.test(url)){
      return escapeHtml(url);
    }
    return '';
  };
  const safeWidth=value=>{
    const n=parseInt(value,10);
    return Number.isFinite(n) ? Math.max(80,Math.min(680,n)) : null;
  };
  const parseFillPdf=text=>{const parts=[];text.split(/\[([^\]]+)\]/g).forEach((c,i)=>parts.push(i%2===0?{t:'text',v:c}:{t:'blank'}));return parts;};
  const shuffleArr=arr=>[...arr].sort(()=>Math.random()-.5);
  let num=0;
  const renderBlock=b=>{
    const BT_LABELS={fill:'Täida lünk',choice:'Vali vastus',writing:'Kirjutamine',match:'Sobita paarid',order:'Järjesta sõnad',table:'Tabel',text:'Tekst / juhis',reading:'Lugemistekst',image:'Pilt',dialogue:'Dialoog',error_correction:'Leia viga',transformation:'Muuda lauset'};
    const BT_COLORS={fill:'#1d4ed8',choice:'#6d28d9',writing:'#A96E1A',match:'#047857',order:'#2F5D50',table:'#0e7490',text:'#718096',reading:'#0e7490',image:'#6d28d9',dialogue:'#0369a1',error_correction:'#dc2626',transformation:'#7c3aed'};
    if(!BT_LABELS[b.type])return'';
    num++;
    const color=BT_COLORS[b.type]||'#718096';
    const label=escapeHtml(b.label||BT_LABELS[b.type]);
    let inner='';
    if(b.type==='text'){inner=`<div style="font-size:13px;line-height:1.65;font-weight:${b.bold?700:400};white-space:pre-wrap">${escapeHtml(b.content||'')}</div>`;}
    else if(b.type==='image'){const src=safeUrl(b.imageUrl);const width=safeWidth(b.imgWidth);inner=src?`<div style="text-align:center"><img src="${src}" style="max-width:${width?width+'px':'100%'};max-height:220px;object-fit:contain;border-radius:6px"/>${b.caption?`<div style="font-size:11px;color:#718096;margin-top:4px;font-style:italic">${escapeHtml(b.caption)}</div>`:''}</div>`:'';}
    else if(b.type==='fill'){const parts=parseFillPdf(b.text||'');inner=`<div style="font-size:13px;line-height:2.6">${parts.map(p=>p.t==='text'?escapeHtml(p.v):`<span style="display:inline-block;min-width:80px;border-bottom:1.5px solid #1C2B3A;margin:0 3px">&nbsp;</span>`).join('')}</div>`;}
    else if(b.type==='choice'){inner=(b.questions||[]).map((q,qi)=>`<div style="margin-bottom:10px"><div style="font-weight:700;font-size:13px;margin-bottom:5px">${qi+1}. ${escapeHtml(q.q||'')}</div>${(q.opts||[]).filter(Boolean).map(o=>`<div style="display:flex;align-items:center;gap:8px;margin:3px 0 3px 14px;font-size:12.5px"><span style="width:12px;height:12px;border-radius:50%;border:1.5px solid #1C2B3A;display:inline-block;flex-shrink:0"></span><span>${escapeHtml(o)}</span></div>`).join('')}</div>`).join('');}
    else if(b.type==='writing'){inner=`<div style="font-size:13px;line-height:1.5;margin-bottom:10px">${escapeHtml(b.task||'')}</div>${Array.from({length:b.lines||6}).map(()=>`<div style="height:26px;border-bottom:1px solid #ccc;margin-bottom:2px"></div>`).join('')}`;}
    else if(b.type==='match'){const sh=shuffleArr(b.pairs||[]);inner=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:10px"><div>${(b.pairs||[]).map((p,i)=>`<div style="padding:5px 9px;border:1px solid #ccc;border-radius:5px;font-size:12.5px;margin-bottom:5px">${i+1}. ${escapeHtml(p.l||'')}</div>`).join('')}</div><div>${sh.map((p,i)=>`<div style="padding:5px 9px;border:1px solid #ccc;border-radius:5px;font-size:12.5px;margin-bottom:5px">${String.fromCharCode(65+i)}. ${escapeHtml(p.r||'')}</div>`).join('')}</div></div><div style="display:flex;flex-wrap:wrap;gap:7px">${(b.pairs||[]).map((_,i)=>`<span style="padding:2px 9px;border:1px solid #ccc;border-radius:4px;font-size:12px">${i+1} — ___</span>`).join('')}</div>`;}
    else if(b.type==='order'){const words=shuffleArr((b.sentence||'').split(' ').filter(Boolean));inner=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${words.map(w=>`<span style="padding:5px 11px;border:1.5px solid #999;border-radius:7px;font-size:12.5px">${escapeHtml(w)}</span>`).join('')}</div><div style="border-bottom:1px solid #ccc;padding-top:4px;font-size:11.5px;color:#aaa">Kirjuta õige järjestus: ___________________________________________________</div>`;}
    else if(b.type==='table'){const cd=b.cellData||{};inner=`<table style="width:100%;border-collapse:collapse;font-size:12.5px"><thead><tr>${(b.headers||[]).map(h=>`<th style="background:#f0f0f0;padding:7px 9px;border:1px solid #ccc;text-align:left;font-weight:700">${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>${Array.from({length:b.rows||4}).map((_,ri)=>`<tr>${(b.headers||[]).filter(Boolean).map((_,ci)=>`<td style="padding:6px 9px;border:1px solid #ccc;height:28px">${escapeHtml(cd[ri+','+ci]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;}
    else if(b.type==='reading'){inner=`<div style="background:#f7f7f5;border:1px solid #ddd;border-radius:6px;padding:11px 14px;margin-bottom:12px;font-size:12.5px;line-height:1.65;white-space:pre-wrap">${escapeHtml(b.passage||'')}</div>${(b.questions||[]).map((q,qi)=>`<div style="margin-bottom:10px"><div style="font-weight:700;font-size:13px;margin-bottom:5px">${qi+1}. ${escapeHtml(q.q||'')}</div>${(q.opts||[]).filter(Boolean).map(o=>`<div style="display:flex;align-items:center;gap:8px;margin:3px 0 3px 14px;font-size:12.5px"><span style="width:12px;height:12px;border-radius:50%;border:1.5px solid #1C2B3A;display:inline-block;flex-shrink:0"></span><span>${escapeHtml(o)}</span></div>`).join('')}</div>`).join('')}`;}
    else if(b.type==='dialogue'){const lns=b.lines||[];inner=`<div style="border:1px solid rgba(28,43,58,.15);border-radius:8px;overflow:hidden">${lns.map((line,i)=>{const isA=line.speaker==='A'||line.speaker==='Õpetaja';const parts=(line.text||'').split(/(\[[^\]]*\])/g);const hasBlank=parts.some(p=>p.startsWith('['));return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 13px;background:${isA?'#F9F8F6':'#fff'};border-bottom:${i<lns.length-1?'1px solid rgba(28,43,58,.07)':'none'}"><span style="font-size:11px;font-weight:700;color:${isA?'#2F5D50':'#1d4ed8'};min-width:65px;flex-shrink:0;padding-top:2px">${escapeHtml(line.speaker||'')}:</span><span style="font-size:12.5px;color:#1C2B3A;flex:1">${hasBlank?parts.map(p=>p.startsWith('[')?`<span style="display:inline-block;min-width:80px;border-bottom:1.5px solid #1C2B3A;margin:0 2px">&nbsp;</span>`:escapeHtml(p)).join(''):escapeHtml(line.text||'')}</span></div>`;}).join('')}</div>`;}
    else if(b.type==='error_correction'){inner=(b.sentences||[]).map((s,i)=>`<div style="margin-bottom:12px;display:flex;align-items:flex-start;gap:9px"><span style="font-size:11px;font-weight:800;color:#dc2626;min-width:20px;padding-top:2px">${i+1}.</span><div style="flex:1"><div style="font-size:12.5px;color:#7A7167;text-decoration:line-through;margin-bottom:5px">${escapeHtml(s.wrong||'')}</div><div style="display:flex;align-items:center;gap:7px"><span style="font-size:11px;color:#7A7167;flex-shrink:0">Parandus:</span><div style="flex:1;border-bottom:1.5px solid #1C2B3A;min-height:20px"></div></div></div></div>`).join('');}
    else if(b.type==='transformation'){const ex=b.example;inner=(ex?`<div style="padding:8px 12px;border-radius:7px;background:#F0EEE9;border:1px solid rgba(28,43,58,.12);margin-bottom:14px;font-size:12.5px;display:flex;align-items:center;gap:9px;flex-wrap:wrap"><span style="color:#7A7167;font-size:11px;font-weight:700">NÄIDE:</span><span>${escapeHtml(ex.from||'')}</span><span style="color:#C9882A;font-size:1rem">&#x2192;</span><span style="color:#2F5D50;font-weight:600">${escapeHtml(ex.to||'')}</span></div>`:'')+(b.sentences||[]).map((s,i)=>`<div style="margin-bottom:10px;display:flex;align-items:flex-start;gap:9px"><span style="font-size:11px;font-weight:700;color:#718096;min-width:20px;padding-top:2px;flex-shrink:0">${i+1}.</span><div style="flex:1"><div style="font-size:12.5px;color:#1C2B3A;margin-bottom:5px">${escapeHtml(s)}</div><div style="border-bottom:1px solid rgba(28,43,58,.2);min-height:20px"></div></div></div>`).join('');}
    let imgTop='',imgBot='';
    if(b.imageUrl&&b.type!=='image'){const src=safeUrl(b.imageUrl);const width=safeWidth(b.imgWidth);const pos=b.imagePos||'top';const imgTag=src?`<div style="margin-bottom:${pos==='top'?10:0}px;margin-top:${pos==='bottom'?10:0}px;text-align:center"><img src="${src}" style="max-width:${width?width+'px':'100%'};max-height:180px;object-fit:contain;border-radius:5px"/></div>`:'';if(pos==='top')imgTop=imgTag;else if(pos==='bottom')imgBot=imgTag;}
    const visBlocks=blocks.filter(x=>BT_LABELS[x.type]);
    return`<div style="margin-bottom:22px;page-break-inside:avoid"><div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#1C2B3A;color:#fff;font-size:10px;font-weight:800;flex-shrink:0">${num}</span><span style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:${color}">${label}</span>${b.instruction?`<span style="font-size:11px;font-style:italic;color:#718096"> — ${escapeHtml(b.instruction)}</span>`:''}</div>${imgTop}${inner}${imgBot}${num<visBlocks.length?'<div style="border:none;border-top:1px dashed rgba(28,43,58,.12);margin-top:16px"></div>':''}</div>`;
  };
  const metaRow=[meta.subject?`📚 ${escapeHtml(meta.subject)}`:'',meta.level?`📊 ${escapeHtml(meta.level)}`:'',meta.topic?`💬 ${escapeHtml(meta.topic)}`:'',meta.date?'📅 Kuupäev: ____________':'',meta.name?'Nimi: ___________________________':''].filter(Boolean).map(s=>`<span>${s}</span>`).join('');
  const blocksHtml=blocks.map(renderBlock).join('');
  const css=`@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=IBM+Plex+Sans:wght@400;600;700&display=swap');*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'IBM Plex Sans',Arial,sans-serif;max-width:794px;margin:0 auto;padding:0;color:#1C2B3A;background:#E8E6E1;}.a4{background:#fff;padding:64px 72px 72px;min-height:1123px;}.sheet-hdr{margin-bottom:24px;padding-bottom:14px;border-bottom:2.5px solid #1C2B3A;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}.sheet-title{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:700;margin-bottom:5px;color:#1C2B3A;line-height:1.2;}.sheet-meta{font-size:11.5px;color:#718096;display:flex;gap:14px;flex-wrap:wrap;margin-top:4px;}.score-box{border:1px solid #1C2B3A;border-radius:5px;padding:5px 12px;font-size:11.5px;font-weight:600;white-space:nowrap;flex-shrink:0;}@media print{body{background:#fff;}.a4{box-shadow:none;padding:32px 48px;}@page{size:A4;margin:15mm;}}`;
  return`<!DOCTYPE html><html lang="et"><head><meta charset="UTF-8"><title>${escapeHtml(meta.title||'Tööleht')}</title><style>${css}</style></head><body><div class="a4"><div class="sheet-hdr"><div><div class="sheet-title">${escapeHtml(meta.title||'Tööleht')}</div><div class="sheet-meta">${metaRow}</div></div>${meta.score?'<div class="score-box">Punkte: ___ / ___</div>':''}</div>${blocksHtml||'<div style="text-align:center;padding:60px 0;color:#B0A898;font-size:13px">Tööleht on tühi</div>'}</div></body></html>`;
}

// ── SAVE MODAL ────────────────────────────────────────────────
function SaveModal({meta,blocks,user,onClose,notify}){
  const SUBJECTS=['Eesti keel','Inglise keel','Matemaatika'];
  const LEVELS_BY_SUBJECT={'Eesti keel':['A1','A2','B1','B2','C1'],'Inglise keel':['A1','A2','B1','B2','C1','C2'],'Matemaatika':Array.from({length:12},(_,i)=>i+1+'. klass')};
  const[subject,setSubject]=useState(meta.subject||'Eesti keel');
  const[level,setLevel]=useState(meta.level||'B1');
  const[topic,setTopic]=useState('');
  const[newTopic,setNewTopic]=useState('');
  const[saving,setSaving]=useState(false);
  const[loading,setLoading]=useState(false);
  const[lessons,setLessons]=useState([]);
  const[selectedLessonId,setSelectedLessonId]=useState('');
  const[topicMode,setTopicMode]=useState('existing');
  const[lessonMode,setLessonMode]=useState('existing');
  const[allTopics,setAllTopics]=useState([]);
  const levels=LEVELS_BY_SUBJECT[subject]||[];
  useEffect(()=>{
    if(!subject||!level)return;setLoading(true);setTopic('');setLessons([]);setSelectedLessonId('');
    db.collection('curriculumLessons').where('subject','==',subject).where('level','==',level).get().then(snap=>{
      const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
      const topics=[...new Set(docs.map(d=>d.topic).filter(Boolean))].sort();
      setAllTopics(topics);
      if(topics.length>0){setTopic(topics[0]);setTopicMode('existing');}else setTopicMode('new');
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[subject,level]);
  useEffect(()=>{
    if(!topic||topicMode==='new')return;
    db.collection('curriculumLessons').where('subject','==',subject).where('level','==',level).where('topic','==',topic).get().then(snap=>{
      const docs=snap.docs.map(d=>({id:d.id,...d.data()}));setLessons(docs);
      if(docs.length>0){setSelectedLessonId(docs[0].id);setLessonMode('existing');}else setLessonMode('new');
    });
  },[topic,topicMode,subject,level]);
  const finalTopic=topicMode==='new'?newTopic.trim():topic;
  const[savedLessonId,setSavedLessonId]=useState('');
  const[step,setStep]=useState('save'); // 'save' | 'assign'
  const[students,setStudents]=useState([]);
  const[selStudents,setSelStudents]=useState([]);
  const[assignDue,setAssignDue]=useState('');
  const[assignNote,setAssignNote]=useState('');
  const[assigning,setAssigning]=useState(false);
  const[stuSearch,setStuSearch]=useState('');

  useEffect(()=>{
    if(step!=='assign') return;
    db.collection('students').where('active','!=',false).get()
      .then(snap=>setStudents(snap.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.active!==false)))
      .catch(()=>{});
  },[step]);

  const toggleStu=sid=>setSelStudents(p=>p.includes(sid)?p.filter(x=>x!==sid):[...p,sid]);

  const save=async()=>{
    if(!finalTopic){alert('Vali teema või sisesta uus teema nimi');return;}setSaving(true);
    try{
      let lid=selectedLessonId;
      if(lessonMode==='existing'&&selectedLessonId){
        await db.collection('curriculumLessons').doc(selectedLessonId).update({worksheetData:{meta,blocks},updatedAt:new Date().toISOString()});
        notify('✓ Tööleht lisatud olemasolevale kirjele!');
      }else{
        const ref=await db.collection('curriculumLessons').add({title:meta.title||'Tööleht',type:'material',description:'',subject,level,topic:finalTopic,examPart:null,worksheetData:{meta,blocks},files:[],order:0,authorUid:user?.uid||'',authorName:user?.displayName||user?.email||'',createdAt:new Date().toISOString().split('T')[0],updatedAt:new Date().toISOString()});
        lid=ref.id;
        notify('✓ Tööleht salvestatud uue kirjena!');
      }
      setSavedLessonId(lid);
      setStep('assign');
    }catch(e){notify('Viga: '+(e.message||'Salvestamine ebaõnnestus'));}setSaving(false);
  };

  const assign=async()=>{
    if(!selStudents.length){onClose();return;}
    setAssigning(true);
    const batch=db.batch();
    selStudents.forEach(sid=>{
      const st=students.find(s=>s.id===sid);
      const ref=db.collection('worksheetAssignments').doc();
      batch.set(ref,{
        lessonId:savedLessonId||'',
        lessonTitle:meta.title||'Tööleht',
        subject,level,topic:finalTopic,
        worksheetData:{meta,blocks},
        studentId:sid,
        studentName:st?.name||'',
        assignedBy:user?.uid||'',
        assignedByName:user?.displayName||user?.email||'',
        assignedAt:new Date().toISOString(),
        dueDate:assignDue||'',
        note:assignNote||'',
        status:'new',score:null,completedAt:null,answers:{}
      });
    });
    await batch.commit();
    setAssigning(false);
    notify('✓ Tööleht määratud '+selStudents.length+' õpilasele!');
    onClose();
  };
  return(
    <div className="sav-ov">
      <div className="sav-box">
        <div className="sav-head"><h2 style={{fontSize:'1rem',fontWeight:800}}>💾 Salvesta õppekavasse</h2><button onClick={onClose} className="btn btn-ghost btn-sm">✕</button></div>
        <div className="sav-body">
          <div style={{padding:'10px 13px',borderRadius:10,background:'rgba(47,93,80,.08)',border:'0.5px solid rgba(47,93,80,.2)',fontSize:'.84rem',fontWeight:600,color:'#2F5D50'}}>📄 {meta.title||'Tööleht'} · {blocks.length} plokki</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div><div className="field-lbl">Õppeaine</div><select value={subject} onChange={e=>{setSubject(e.target.value);setLevel(LEVELS_BY_SUBJECT[e.target.value]?.[0]||'');}}>{SUBJECTS.map(s=><option key={s}>{s}</option>)}</select></div>
            <div><div className="field-lbl">Tase</div><select value={level} onChange={e=>setLevel(e.target.value)}>{levels.map(l=><option key={l}>{l}</option>)}</select></div>
          </div>
          <div>
            <div className="field-lbl" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}><span>1. Teema</span>{allTopics.length>0&&<div style={{display:'flex',gap:5}}><button onClick={()=>setTopicMode('existing')} className={'btn btn-sm '+(topicMode==='existing'?'btn-pine':'btn-ghost')} style={{fontSize:'.7rem',padding:'2px 8px'}}>Olemasolev</button><button onClick={()=>{setTopicMode('new');setLessonMode('new');}} className={'btn btn-sm '+(topicMode==='new'?'btn-pine':'btn-ghost')} style={{fontSize:'.7rem',padding:'2px 8px'}}>+ Uus</button></div>}</div>
            {loading?<div style={{fontSize:'.8rem',color:'#7A7167'}}>Laen...</div>
            :topicMode==='existing'&&allTopics.length>0
              ?<div style={{display:'flex',flexWrap:'wrap',gap:5}}>{allTopics.map(t=>(<button key={t} onClick={()=>setTopic(t)} style={{padding:'5px 11px',borderRadius:8,border:'1.5px solid '+(topic===t?'#2F5D50':'rgba(28,43,58,.1)'),background:topic===t?'rgba(47,93,80,.08)':'#fff',cursor:'pointer',fontSize:'.82rem',fontWeight:topic===t?700:400,color:topic===t?'#2F5D50':'#1C2B3A'}}>{t}</button>))}</div>
              :<input value={newTopic} onChange={e=>setNewTopic(e.target.value)} placeholder="Uue teema nimi..." autoFocus/>}
          </div>
          {(topic||newTopic)&&(<div>
            <div className="field-lbl" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}><span>2. Kirje</span>{lessons.length>0&&<div style={{display:'flex',gap:5}}><button onClick={()=>setLessonMode('existing')} className={'btn btn-sm '+(lessonMode==='existing'?'btn-pine':'btn-ghost')} style={{fontSize:'.7rem',padding:'2px 8px'}}>Lisa olemasolevale</button><button onClick={()=>setLessonMode('new')} className={'btn btn-sm '+(lessonMode==='new'?'btn-pine':'btn-ghost')} style={{fontSize:'.7rem',padding:'2px 8px'}}>+ Uus kirje</button></div>}</div>
            {lessonMode==='existing'&&lessons.length>0
              ?<div style={{display:'flex',flexDirection:'column',gap:5,maxHeight:180,overflowY:'auto'}}>{lessons.map(l=>(<label key={l.id} style={{display:'flex',alignItems:'flex-start',gap:9,padding:'9px 12px',borderRadius:9,border:'1.5px solid '+(selectedLessonId===l.id?'#2F5D50':'rgba(28,43,58,.1)'),background:selectedLessonId===l.id?'rgba(47,93,80,.07)':'#fff',cursor:'pointer'}}><input type="radio" name="lesson" checked={selectedLessonId===l.id} onChange={()=>setSelectedLessonId(l.id)} style={{marginTop:3,flexShrink:0}}/><div><div style={{fontSize:'.85rem',fontWeight:700,color:'#1C2B3A'}}>{l.title}</div>{l.worksheetData&&<div style={{fontSize:'.68rem',color:'#C9882A',marginTop:2}}>⚠️ Tööleht olemas — asendatakse</div>}</div></label>))}</div>
              :<div style={{padding:'10px 12px',borderRadius:9,background:'rgba(28,43,58,.04)',border:'1px dashed rgba(28,43,58,.15)',fontSize:'.82rem',color:'#7A7167'}}>Luuakse uus kirje teemasse "{finalTopic}"</div>}
          </div>)}
        </div>
        {step==='assign'&&(
          <div style={{marginTop:12}}>
            <div style={{padding:'10px 13px',borderRadius:10,background:'rgba(47,93,80,.08)',border:'0.5px solid rgba(47,93,80,.2)',fontSize:'.84rem',fontWeight:600,color:'#2F5D50',marginBottom:12}}>
              ✓ Tööleht salvestatud! Kas määrad selle kohe mõnele õpilasele?
            </div>
            <input value={stuSearch} onChange={e=>setStuSearch(e.target.value)}
              placeholder="🔍 Otsi õpilast..."
              style={{width:'100%',padding:'8px 12px',borderRadius:9,border:'1.5px solid rgba(28,43,58,.12)',fontFamily:'inherit',fontSize:'.86rem',marginBottom:8}}/>
            <div style={{border:'1px solid rgba(28,43,58,.1)',borderRadius:10,maxHeight:200,overflowY:'auto',padding:5,display:'flex',flexDirection:'column',gap:3,marginBottom:10}}>

// ── PAGED PREVIEW ─────────────────────────────────────────────
function estimateBlockHeight(block){
  switch(block.type){
    case 'fill':return Math.max(80,(block.text||'').length*0.6+60);
    case 'choice':return 60+(block.questions||[]).length*90;
    case 'match':return 60+(block.pairs||[]).length*40;
    case 'order':return 140;
    case 'writing':return 70+(block.lines||6)*30;
    case 'text':return 60+(block.content||'').length*0.5;
    case 'reading':return 220+(block.questions||[]).length*90;
    case 'table':return 70+(block.rows||4)*34;
    case 'image':return 240;
    default:return 90;
  }
}

function PagedSheet({meta,blocks,onChangeBlock}){
  const HEADER_H=110,PAGE_H=995;
  const pages=[];let cur=[],h=HEADER_H;
  blocks.forEach(b=>{const bh=estimateBlockHeight(b)+28;if(h+bh>PAGE_H&&cur.length>0){pages.push(cur);cur=[b];h=bh;}else{cur.push(b);h+=bh;}});
  if(cur.length>0||pages.length===0)pages.push(cur);
  let gi=0;
  return(<>
    {pages.map((page,pi)=>(
      <React.Fragment key={pi}>
        {pi>0&&<div className="a4-page-break"><span className="a4-page-break-label">Lehekülg {pi+1}</span></div>}
        <div className="a4-sheet">
          {pi===0&&(<div className="sheet-hdr"><div><div className="sheet-title">{meta.title||'Pealkiri puudub'}</div><div className="sheet-meta-row">{meta.subject&&<span>📚 {meta.subject}</span>}{meta.level&&<span>📊 {meta.level}</span>}{meta.topic&&<span>💬 {meta.topic}</span>}{meta.date&&<span>📅 Kuupäev: ____________</span>}{meta.name&&<span>Nimi: ___________________________</span>}</div></div>{meta.score&&<div className="score-box">Punkte: ___ / ___</div>}</div>)}
          {pi===0&&blocks.length===0&&<div style={{textAlign:'center',padding:'56px 0',color:'#C0B8B0'}}><i className="fa-solid fa-layer-group" style={{fontSize:'2rem',opacity:.2,display:'block',marginBottom:10}}/><div style={{fontSize:'.86rem'}}>Lisa plokke vasakult paneelilt</div></div>}
          {page.map(b=>{gi++;return<PreviewBlock key={b.id} block={b} index={gi} onChange={onChangeBlock}/>;;})}
          {pages.length>1&&<div className="a4-page-num">{pi+1} / {pages.length}</div>}
        </div>
      </React.Fragment>
    ))}
  </>);
}

                <div className="meta-box">
                  <div className="meta-lbl">Päise väljad</div>
                  {[['name','Nimi'],['score','Punkte'],['date','Kuupäev']].map(([k,l])=>(
                    <label key={k} style={{display:'flex',alignItems:'center',gap:7,marginBottom:7,fontSize:'.8rem',cursor:'pointer'}}><input type="checkbox" checked={meta[k]||false} onChange={e=>setMeta(m=>({...m,[k]:e.target.checked}))}/> {l}</label>
                  ))}
                </div>
              </div>
            )}

            {/* BUILD TAB */}
            {tab==='build'&&(
              <div>
                <div style={{fontSize:'.66rem',fontWeight:700,color:'#7A7167',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:7}}>Lisa plokk</div>
                <div className="btype-grid">
                  {BTYPES.map(bt=>(<button key={bt.key} className="btype-btn" onClick={()=>addBlock(bt.key)}><div className="btype-icon" style={{background:bt.bg}}><i className={'fa-solid '+bt.icon} style={{color:bt.color}}/></div>{bt.label}</button>))}
                </div>
                {blocks.length===0
                  ?<div className="empty-bld"><i className="fa-solid fa-layer-group"/><p style={{fontSize:'.78rem'}}>Lisa plokke ülal</p></div>
                  :<div>
                    <div style={{fontSize:'.66rem',fontWeight:700,color:'#7A7167',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Plokid ({blocks.length}) — lohista järjekorra muutmiseks</div>
                    {blocks.map((block,idx)=>{
                      const bt=BT[block.type];const isActive=activeId===block.id;
                      return(
                        <div key={block.id} className={'block-item'+(isActive?' active':'')+(dragId===block.id?' dragging':'')+(dragOver===block.id?' drag-over':'')}
                          draggable onDragStart={e=>onDragStart(e,block.id)} onDragOver={e=>onDragOver(e,block.id)} onDrop={e=>onDrop(e,block.id)} onDragEnd={onDragEnd}>
                          <div className="bi-head" onClick={()=>setActiveId(isActive?null:block.id)}>
                            <span className="bi-drag"><i className="fa-solid fa-grip-vertical"/></span>
                            <span className="nbadge" style={{background:bt.color}}>{idx+1}</span>
                            <span className="bi-tag" style={{background:bt.bg,color:bt.color}}><i className={'fa-solid '+bt.icon} style={{fontSize:'.6rem'}}/>{bt.label}</span>
                            <span className="bi-preview">
                              {block.type==='fill'&&(block.text||'').replace(/\[([^\]]+)\]/g,'___')}
                              {block.type==='writing'&&block.task}
                              {block.type==='text'&&block.content}
                              {block.type==='order'&&block.sentence}
                              {block.type==='choice'&&(block.questions?.[0]?.q||'Valikvastus')}
                              {block.type==='match'&&`${block.pairs?.length||0} paari`}
                              {block.type==='table'&&(block.headers||[]).join(', ')}
                              {block.type==='reading'&&(block.passage||'').slice(0,35)+'...'}
                              {block.type==='image'&&(block.caption||'Pilt')}
                            </span>
                            <div className="bi-actions" onClick={e=>e.stopPropagation()}>
                              <button className="bi-btn" onClick={()=>moveBlock(block.id,-1)} title="Üles"><i className="fa-solid fa-chevron-up"/></button>
                              <button className="bi-btn" onClick={()=>moveBlock(block.id,1)} title="Alla"><i className="fa-solid fa-chevron-down"/></button>
                              <button className="bi-btn del" onClick={()=>delBlock(block.id)} title="Kustuta"><i className="fa-solid fa-trash"/></button>
                            </div>
                          </div>
                          {isActive&&<div onClick={e=>e.stopPropagation()}><BlockEditor block={block} onChange={data=>updBlock(block.id,data)} meta={meta} notify={notify}/></div>}
                        </div>
                      );
                    })}
                  </div>
                }
              </div>
            )}
          </div>
        </div>

        {/* RIGHT PANEL — A4 PREVIEW */}
        <div className="right-panel">
          <div className="toolbar-row">
            <span style={{fontSize:'.74rem',color:'#7A7167',marginRight:'auto'}}>{blocks.length} plokki{prefillLessonId?' · muutmisrežiim':''}</span>
            <button onClick={exportPrint} className="btn btn-ghost btn-sm"><i className="fa-solid fa-print"/> Prindi / PDF</button>
            <button onClick={exportDL} className="btn btn-pine btn-sm"><i className="fa-solid fa-download"/> Laadi alla (.html)</button>
          </div>
          <div className="a4-wrap">
            <PagedSheet meta={meta} blocks={blocks} onChangeBlock={data=>updBlock(data.id,data)}/>
          </div>
          <div style={{height:40}}/>
        </div>
      </div>

      {showSave&&<SaveModal meta={meta} blocks={blocks} user={user} onClose={()=>setShowSave(false)} notify={notify}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
