<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:#EEECE7;color:#1C2B3A;min-height:100vh;overflow-x:hidden;}

/* HEADER */
.hdr{background:#1C2B3A;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.logo{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;color:#fff;}
.logo span{color:#C9882A;}

/* LAYOUT */
.workspace{display:grid;grid-template-columns:320px minmax(0,1fr);height:calc(100vh - 56px);overflow:hidden;}

/* LEFT PANEL */
.left-panel{background:#F5F4F0;border-right:1px solid rgba(28,43,58,.1);display:flex;flex-direction:column;overflow:hidden;}
.left-tabs{display:flex;border-bottom:1px solid rgba(28,43,58,.1);background:#fff;}
.ltab{flex:1;padding:11px 6px;font-size:.76rem;font-weight:700;cursor:pointer;border:none;background:none;color:#718096;border-bottom:2px solid transparent;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:5px;}
.ltab.active{color:#1C2B3A;border-bottom-color:#C9882A;}
.left-scroll{flex:1;overflow-y:auto;padding:12px;}

/* BLOCK TYPE GRID */
.btype-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.btype-btn{padding:9px 8px;border-radius:9px;border:0.5px solid rgba(28,43,58,.12);background:#fff;cursor:pointer;font-size:.75rem;font-weight:600;color:#1C2B3A;display:flex;align-items:center;gap:6px;transition:all .13s;}
.btype-btn:hover{border-color:#2F5D50;background:rgba(47,93,80,.05);color:#2F5D50;}
.btype-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.68rem;flex-shrink:0;}

/* BLOCK LIST ITEMS */
.block-item{background:#fff;border:0.5px solid rgba(28,43,58,.1);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .13s;user-select:none;}
.block-item:hover{border-color:rgba(28,43,58,.2);}
.block-item.active{border-color:#2F5D50;box-shadow:0 0 0 2px rgba(47,93,80,.1);}
.block-item.dragging{opacity:.4;border-style:dashed;}
.block-item.drag-over{border-color:#C9882A;background:rgba(201,136,42,.05);}
.bi-head{display:flex;align-items:center;gap:6px;padding:9px 10px 8px;}
.bi-drag{color:rgba(28,43,58,.2);font-size:.6rem;cursor:grab;padding:0 2px;flex-shrink:0;}
.bi-drag:hover{color:#718096;}
.bi-tag{font-size:.67rem;font-weight:700;padding:2px 7px;border-radius:5px;display:flex;align-items:center;gap:3px;}
.bi-preview{font-size:.72rem;color:#7A7167;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.bi-actions{display:flex;gap:2px;flex-shrink:0;}
.bi-btn{background:none;border:none;cursor:pointer;color:#B0A898;font-size:.68rem;padding:3px 4px;border-radius:5px;}
.bi-btn:hover{color:#2F5D50;background:rgba(47,93,80,.1);}
.bi-btn.del:hover{color:#dc2626;background:rgba(220,38,38,.07);}

/* BLOCK EDITOR */
.block-editor{padding:8px 10px 10px;border-top:0.5px solid rgba(28,43,58,.07);}
.field-lbl{font-size:.66rem;font-weight:700;color:#7A7167;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;margin-top:8px;}
.field-lbl:first-child{margin-top:0;}
input[type=text],input[type=number],textarea,select{width:100%;padding:7px 9px;border-radius:8px;border:1px solid rgba(28,43,58,.12);background:#FAFAF8;font-family:inherit;font-size:.82rem;color:#1C2B3A;outline:none;}

textarea{resize:vertical;line-height:1.45;}

/* SIZE SELECTOR */

.size-btn{padding:4px 10px;border-radius:7px;border:1px solid rgba(28,43,58,.12);background:#fff;cursor:pointer;font-size:.72rem;font-weight:600;color:#718096;transition:all .12s;}

/* COLUMN TOGGLE */

/* A4 */

@media(max-width:1150px){.a4-sheet{width:100%;padding:40px 32px;}}

.sheet-hdr{margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid #1C2B3A;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
.sheet-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;margin-bottom:4px;}
.sheet-meta-row{font-size:.77rem;color:#718096;display:flex;gap:14px;flex-wrap:wrap;}
.score-box{border:1px solid #1C2B3A;border-radius:5px;padding:5px 12px;font-size:.78rem;font-weight:600;text-align:center;white-space:nowrap;}

/* PREVIEW BLOCKS */
.pb-wrap{margin-bottom:22px;}
.pb-wrap.half{width:calc(50% - 8px);display:inline-block;vertical-align:top;margin-right:16px;}

/* match */

/* order */
.order-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.order-chip{padding:5px 12px;border:1.5px solid rgba(28,43,58,.18);border-radius:7px;font-size:.86rem;background:#FAFAF8;}
.order-ans{border-bottom:1px solid rgba(28,43,58,.2);padding-bottom:2px;font-size:.8rem;color:#B0A898;margin-top:4px;}

/* table */
.ws-tbl{width:100%;border-collapse:collapse;font-size:.85rem;}
.ws-tbl th{background:#F0EEE9;padding:6px 9px;border:1px solid rgba(28,43,58,.15);text-align:left;font-weight:700;}
.ws-tbl td{padding:6px 9px;border:1px solid rgba(28,43,58,.15);height:28px;}

/* text */
.pb-text{font-size:.9rem;line-height:1.65;}

/* image */
.pb-img{width:100%;max-height:220px;object-fit:contain;border-radius:6px;margin-bottom:8px;border:1px solid rgba(28,43,58,.08);}

/* reading */
.pb-passage{background:#F9F8F6;border:1px solid rgba(28,43,58,.1);border-radius:6px;padding:11px 13px;margin-bottom:12px;font-size:.87rem;line-height:1.65;white-space:pre-wrap;}

/* 2-COL LAYOUT WRAPPER */
.two-col-preview{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

/* DIVIDER */
.pb-divider{border:none;border-top:1px dashed rgba(28,43,58,.12);margin:18px 0;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-family:inherit;font-weight:700;font-size:.8rem;cursor:pointer;border:none;transition:all .13s;}
.btn-pine{background:#2F5D50;color:#fff;}
.btn-pine:hover{background:#265048;}
.btn-pine:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:rgba(28,43,58,.07);color:#42536A;border:1px solid rgba(28,43,58,.1);}
.btn-ghost:hover{background:rgba(28,43,58,.12);}
.btn-gold{background:#C9882A;color:#fff;}
.btn-gold:hover{background:#b37624;}
.btn-sm{padding:5px 10px;font-size:.75rem;}

/* AI PANEL */
.ai-panel{background:linear-gradient(135deg,#1C2B3A,#2F5D50);border-radius:11px;padding:14px;margin-bottom:12px;color:#fff;}
.ai-title{font-size:.82rem;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.ai-textarea{width:100%;padding:8px 10px;border-radius:8px;border:none;background:rgba(255,255,255,.12);color:#fff;font-family:inherit;font-size:.8rem;outline:none;resize:vertical;min-height:60px;}
.ai-textarea::placeholder{color:rgba(255,255,255,.4);}
.ai-textarea:focus{background:rgba(255,255,255,.18);}
.ai-lvl-btns{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.ai-lvl{padding:3px 9px;border-radius:6px;border:1px solid rgba(255,255,255,.22);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;font-size:.72rem;font-weight:700;}
.ai-lvl.active{background:rgba(255,255,255,.2);color:#fff;}

/* META BOX */
.meta-box{background:#fff;border:0.5px solid rgba(28,43,58,.1);border-radius:10px;padding:12px;margin-bottom:10px;}
.meta-lbl{font-size:.66rem;font-weight:700;color:#7A7167;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}

/* SPINNER */
.sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;}
.sp-dark{width:28px;height:28px;border:2.5px solid rgba(28,43,58,.1);border-top-color:#2F5D50;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;top:14px;right:14px;background:#1C2B3A;color:#fff;padding:9px 15px;border-radius:10px;z-index:500;font-weight:600;font-size:.82rem;box-shadow:0 8px 24px rgba(0,0,0,.22);}

/* NUM BADGE */
.nbadge{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:#2F5D50;color:#fff;font-size:.6rem;font-weight:800;}

/* EMPTY */
.empty-bld{text-align:center;padding:32px 12px;color:#B0A898;}
.empty-bld i{font-size:1.8rem;margin-bottom:8px;opacity:.25;display:block;}

/* TOOLBAR ROW above A4 */
.toolbar-row{display:flex;justify-content:flex-end;width:794px;margin-bottom:10px;gap:7px;align-items:center;}
@media(max-width:1150px){.toolbar-row{width:100%;}}

/* SAVE MODAL */
.sav-ov{position:fixed;inset:0;background:rgba(28,43,58,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:300;backdrop-filter:blur(4px);}
.sav-box{background:#FBFAF8;border-radius:18px;max-width:480px;width:100%;padding:0;overflow:hidden;}

.sav-foot{padding:12px 22px;border-top:1px solid rgba(28,43,58,.08);display:flex;gap:8px;justify-content:flex-end;}
.btn-green{background:#16a34a;color:#fff;}

.sav-ov{position:fixed;inset:0;background:rgba(28,43,58,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:300;backdrop-filter:blur(4px);}

<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><div class="sp-dark"></div></div></div>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback} = React;
const auth=window._auth, db=window._db, storage=window._storage;

const uid=()=>Math.random().toString(36).slice(2,9);

// ── CONSTANTS ─────────────────────────────────────────────────
const BTYPES=[
  {key:'fill',    label:'Täida lünk',    icon:'fa-pen-line',          color:'#1d4ed8',bg:'rgba(29,78,216,.1)'},
  {key:'choice',  label:'Vali vastus',   icon:'fa-list-check',        color:'#6d28d9',bg:'rgba(109,40,217,.1)'},
  {key:'writing', label:'Kirjutamine',   icon:'fa-pen-nib',           color:'#A96E1A',bg:'rgba(169,110,26,.1)'},
  {key:'match',   label:'Sobita paarid', icon:'fa-link',              color:'#047857',bg:'rgba(4,120,87,.1)'},
  {key:'order',   label:'Järjesta sõnad',icon:'fa-shuffle',           color:'#2F5D50',bg:'rgba(47,93,80,.1)'},
  {key:'table',   label:'Tabel',         icon:'fa-table',             color:'#0e7490',bg:'rgba(14,116,144,.1)'},
  {key:'text',    label:'Tekst / juhis', icon:'fa-align-left',        color:'#718096',bg:'rgba(113,128,150,.1)'},
  {key:'reading', label:'Lugemistekst',  icon:'fa-book-open-reader',  color:'#be185d',bg:'rgba(190,24,93,.1)'},
  {key:'image',   label:'Pilt',          icon:'fa-image',             color:'#0f766e',bg:'rgba(15,118,110,.1)'},
];
const BT=Object.fromEntries(BTYPES.map(b=>[b.key,b]));

const mkBlock=type=>{
  const base={id:uid(),type,instruction:'',size:'full',cols:1,imageUrl:'',imagePos:'top',label:''};
  if(type==='fill')    return{...base,text:'Mina [elan] Tallinnas ja [töötan] koolis.'};
  if(type==='choice')  return{...base,questions:[{q:'Mis on Eesti pealinn?',opts:['Tallinn','Tartu','Pärnu','Narva'],correct:0}]};
  if(type==='writing') return{...base,task:'Kirjuta lühike tekst teemal "Minu pere" (50–80 sõna).',lines:8};
  if(type==='match')   return{...base,pairs:[{l:'koer',r:'dog'},{l:'kass',r:'cat'},{l:'lind',r:'bird'},{l:'kala',r:'fish'}]};
  if(type==='order')   return{...base,sentence:'Ma armastan õppida eesti keelt'};
  if(type==='table')   return{...base,headers:['Sõna','Tõlge','Näide'],rows:4};
  if(type==='text')    return{...base,content:'',bold:false};
  if(type==='reading') return{...base,passage:'Sisesta lugemistekst...',questions:[{q:'',opts:['','','',''],correct:0}]};
  if(type==='image')   return{...base,caption:'',imageUrl:''};
  return base;
};

// ── IMAGE UPLOADER ────────────────────────────────────────────
function ImgUploader({value,onChange}) {
  const ref=useRef();
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState('');

  const handle=async file=>{
    if(!file)return;
    if(file.size>8*1024*1024){setErr('Pilt on liiga suur (max 8MB)');return;}
    setBusy(true);setErr('');
    try{
      const r=storage.ref(`worksheet/${Date.now()}_${file.name}`);
      await r.put(file);
      const url=await r.getDownloadURL();
      onChange(url);
    }catch(e){
      console.warn('Storage failed, using base64:', e.message);
      const reader=new FileReader();
      reader.onload=ev=>{onChange(ev.target.result);};
      reader.onerror=()=>setErr('Pildi laadimine ebaõnnestus');
      reader.readAsDataURL(file);
    }
    setBusy(false);
  };

  return(
    <div>
      <div className="img-upload" onClick={()=>ref.current?.click()}>
        <input ref={ref} type="file" accept="image/*" onChange={e=>handle(e.target.files[0])}/>
        {busy
          ?<div style={{padding:'14px 0',textAlign:'center'}}>
             <div className="sp-dark" style={{margin:'0 auto 6px'}}/>
             <div style={{fontSize:'.72rem',color:'#7A7167'}}>Laeb pilti...</div>
           </div>
          :value
            ?<img src={value} className="img-thumb" alt=""/>
            :<div>
               <i className="fa-solid fa-image" style={{fontSize:'1.4rem',color:'#B0A898',marginBottom:4,display:'block'}}/>
               <div style={{fontSize:'.75rem',color:'#1C2B3A',fontWeight:600}}>Klõpsa pildi lisamiseks</div>
               <div style={{fontSize:'.68rem',color:'#7A7167',marginTop:2}}>JPG, PNG, GIF — kuni 5MB</div>
             </div>}
      </div>
      {err&&<div style={{fontSize:'.72rem',color:'#dc2626',marginTop:4,padding:'4px 7px',background:'rgba(220,38,38,.07)',borderRadius:5}}>{err}</div>}
      {value&&<button onClick={()=>{onChange('');setErr('');}} style={{background:'none',border:'none',color:'#dc2626',cursor:'pointer',fontSize:'.72rem',marginTop:4,display:'flex',alignItems:'center',gap:4}}>
        <i className="fa-solid fa-trash" style={{fontSize:'.65rem'}}/> Eemalda pilt
      </button>}
    </div>
  );
}

// ── BLOCK EDITORS ─────────────────────────────────────────────
function FillEd({b,upd}) {
  return(<>
    <div className="field-lbl">Tekst (vastused nurksulgudes [vastus])</div>
    <textarea value={b.text} onChange={e=>upd({text:e.target.value})} rows={4} placeholder="Ma [elan] Tallinnas."/>
    <div style={{fontSize:'.7rem',color:'#718096',marginTop:4,padding:'5px 7px',background:'rgba(29,78,216,.06)',borderRadius:6}}>
      Süntaks: <code>Ma [elan] koolis.</code>
    </div>
  </>);
}

function ChoiceEd({b,upd}) {
  const qs=b.questions||[];
  const uQ=(i,p)=>upd({questions:qs.map((q,j)=>j===i?{...q,...p}:q)});
  return(<>
    {qs.map((q,i)=>(
      <div key={i} style={{marginBottom:8,padding:9,borderRadius:8,background:'#F9F8F6',border:'0.5px solid rgba(28,43,58,.1)'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:'.7rem',fontWeight:700,color:'#718096'}}>Küsimus {i+1}</span>

// ── PARSE FILL ────────────────────────────────────────────────
function parseFill(text) {
  const parts=[];
  text.split(/\[([^\]]+)\]/g).forEach((c,i)=>parts.push(i%2===0?{t:'text',v:c}:{t:'blank',a:c}));
  return parts;
}

// ── PREVIEW BLOCK ─────────────────────────────────────────────
function PreviewBlock({block,index}) {
  const bt=BT[block.type]; if(!bt) return null;

  const renderImg=pos=>{
    if(!block.imageUrl||(block.imagePos||'top')!==pos) return null;
    return(
      <div style={{marginBottom:pos==='bottom'?0:10,marginTop:pos==='bottom'?10:0}}>
        <img src={block.imageUrl} alt={block.caption||''} style={{maxWidth:'100%',maxHeight:200,objectFit:'contain',borderRadius:6,border:'1px solid rgba(28,43,58,.08)'}}/>
        {block.caption&&<div style={{fontSize:'.72rem',color:'#718096',marginTop:3,fontStyle:'italic'}}>{block.caption}</div>}
      </div>
    );
  };

  const renderRightImg=()=>{
    if(!block.imageUrl||(block.imagePos||'top')!=='right') return null;
    return <img src={block.imageUrl} alt="" style={{width:120,flexShrink:0,objectFit:'contain',borderRadius:6,marginLeft:12,border:'1px solid rgba(28,43,58,.08)'}}/>;
  };

  const content=()=>{
    if(block.type==='image') return(
      <div>
        {block.imageUrl?<img src={block.imageUrl} alt={block.caption||''} style={{maxWidth:'100%',maxHeight:240,objectFit:'contain',borderRadius:6,border:'1px solid rgba(28,43,58,.08)'}}/>
          :<div style={{background:'#F0EEE9',borderRadius:6,height:120,display:'flex',alignItems:'center',justifyContent:'center',color:'#B0A898',fontSize:'.82rem'}}>Pilt puudub</div>}
        {block.caption&&<div style={{fontSize:'.74rem',color:'#718096',marginTop:4,fontStyle:'italic',textAlign:'center'}}>{block.caption}</div>}
      </div>
    );
    if(block.type==='text') return(
      <p className="pb-text" style={{fontWeight:block.bold?700:400,fontSize:block.bold?'1rem':'.9rem'}}>{block.content||<span style={{color:'#C0B8B0',fontStyle:'italic'}}>Tekst puudub</span>}</p>
    );
    if(block.type==='fill') return(
      <div className="fill-line">{parseFill(block.text||'').map((p,i)=>p.t==='text'?<span key={i}>{p.v}</span>:<span key={i} className="fill-blank">&nbsp;</span>)}</div>
    );
    if(block.type==='choice') return(block.questions||[]).map((q,qi)=>(
      <div key={qi} style={{marginBottom:10}}>
        <div className="ch-q">{qi+1}. {q.q||'Küsimus...'}</div>
        <div className="ch-opts">{q.opts.filter(Boolean).map((o,oi)=>(<div key={oi} className="ch-opt"><div className="ch-circle"/><span>{o}</span></div>))}</div>
      </div>
    ));
    if(block.type==='writing') return(
      <div>
        <div className="wr-task">{block.task}</div>
        {Array.from({length:block.lines||6}).map((_,i)=><div key={i} className="wr-line"/>)}
      </div>
    );
    if(block.type==='match') return(
      <div>
        <div className="match-cols">
          <div>{(block.pairs||[]).map((p,i)=><div key={i} className="match-item">{i+1}. {p.l}</div>)}</div>
          <div>{[...(block.pairs||[])].sort(()=>Math.random()-.5).map((p,i)=><div key={i} className="match-item">{String.fromCharCode(65+i)}. {p.r}</div>)}</div>
        </div>
        <div className="match-answer-row">{(block.pairs||[]).map((_,i)=><span key={i} className="match-ans">{i+1} — ___</span>)}</div>
      </div>
    );
    if(block.type==='order') {
      const words=(block.sentence||'').split(' ').filter(Boolean).sort(()=>Math.random()-.5);
      return(<div><div className="order-chips">{words.map((w,i)=><span key={i} className="order-chip">{w}</span>)}</div><div className="order-ans">Kirjuta õige järjestus: ___________________________________________________</div></div>);
    }
    if(block.type==='table') {
      const cd=block.cellData||{};
      return(
        <table className="ws-tbl">
          <thead><tr>{(block.headers||[]).map((h,i)=><th key={i}>{h||`Veerg ${i+1}`}</th>)}</tr></thead>
          <tbody>{Array.from({length:block.rows||4}).map((_,ri)=>(<tr key={ri}>{(block.headers||[]).filter(Boolean).map((_,ci)=><td key={ci}>{cd[ri+','+ci]||''}</td>)}</tr>))}</tbody>
        </table>
      );
    }
    if(block.type==='reading') return(
      <div>
        <div className="pb-passage">{block.passage}</div>
        {(block.questions||[]).map((q,qi)=>(
          <div key={qi} style={{marginBottom:10}}>
            <div className="ch-q">{qi+1}. {q.q||'Küsimus...'}</div>
            <div className="ch-opts">{q.opts.filter(Boolean).map((o,oi)=>(<div key={oi} className="ch-opt"><div className="ch-circle"/><span>{o}</span></div>))}</div>
          </div>
        ))}
      </div>
    );
    return null;
  };

  // For 'image' type — just render content(), no extra renderImg
  const withImg=(
    block.type==='image'
      ?<div>{content()}</div>
      :block.imageUrl&&(block.imagePos||'top')==='right'
        ?<div style={{display:'flex',alignItems:'flex-start'}}><div style={{flex:1}}>{content()}</div>{renderRightImg()}</div>
        :<div>{renderImg('top')}{content()}{renderImg('bottom')}</div>
  );

  const colStyle=block.size==='half'?{width:'calc(50% - 10px)',display:'inline-block',verticalAlign:'top',marginRight:20}
    :block.size==='third'?{width:'calc(33.33% - 12px)',display:'inline-block',verticalAlign:'top',marginRight:18}
    :{};

  return(
    <div style={colStyle}>
      <div className="pb-wrap">
        <div className="pb-num-row">
          <span className="pb-num">{index}</span>
          <span className="pb-type-lbl" style={{color:bt.color}}>{block.label||bt.label}</span>
          {block.instruction&&<span style={{fontSize:'.73rem',color:'#718096',fontStyle:'italic'}}>— {block.instruction}</span>}
        </div>
        {withImg}
      </div>
      {block.size==='full'&&<hr className="pb-divider"/>}
    </div>
  );
}

// ── AI GENERATE ────────────────────────────────────────────────
async function genAI(prompt,subject,level) {
  const sys=`Sa oled eesti keele õpetaja abiassistent. Genereeri tööleht JSON-ina.
Tagasta AINULT JSON, ilma markdown koodiplokita.
{"title":"...","blocks":[
  {"type":"fill","instruction":"...","text":"tekst [vastus] tekst"},
  {"type":"choice","instruction":"...","questions":[{"q":"?","opts":["a","b","c","d"],"correct":0}]},
  {"type":"writing","instruction":"...","task":"ülesanne","lines":8},
  {"type":"match","instruction":"...","pairs":[{"l":"est","r":"eng"}]},
  {"type":"order","instruction":"...","sentence":"õige lause siin"},
  {"type":"text","content":"tekst","bold":false},
  {"type":"table","instruction":"...","headers":["col1","col2"],"rows":4}
]}
Tase: ${level||'B1'}. Genereeri 4-6 sisukat blokki. Kõik eestikeelne.`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,system:sys,
      messages:[{role:'user',content:`Genereeri tööleht: ${prompt}\nÕppeaine: ${subject||'Eesti keel'}, Tase: ${level||'B1'}`}]})});
  const data=await res.json();
  return JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
}

    .q{font-weight:700;font-size:.88rem;margin:5px 0 3px;} .opt{display:flex;align-items:center;gap:6px;font-size:.84rem;margin:2px 0 2px 12px;}
    .circle{width:12px;height:12px;border-radius:50%;border:1.5px solid #1a1a1a;display:inline-block;flex-shrink:0;}
    .wr-task{font-size:.88rem;margin-bottom:8px;line-height:1.5;} .wr-line{height:24px;border-bottom:1px solid #ccc;}
    .match-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;} .match-item{padding:5px 9px;border:1px solid #ccc;border-radius:4px;font-size:.84rem;margin-bottom:4px;}
    .ans-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;} .ans{padding:2px 7px;border:1px solid #ccc;border-radius:3px;font-size:.8rem;}
    .chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;} .chip{padding:4px 10px;border:1.5px solid #999;border-radius:6px;font-size:.84rem;}
    .order-ans{border-bottom:1px solid #ccc;margin-top:6px;font-size:.78rem;color:#aaa;}
    table{width:100%;border-collapse:collapse;font-size:.84rem;} th{background:#f0f0f0;padding:6px 8px;border:1px solid #ccc;text-align:left;font-weight:700;}
    td{padding:6px 8px;border:1px solid #ccc;height:26px;}

    .pb-text{font-size:.9rem;line-height:1.6;} .pb-img{max-width:100%;max-height:200px;object-fit:contain;border-radius:5px;margin-bottom:6px;}

    .divider{border:none;border-top:1px dashed #ddd;margin:16px 0;}
  </style>`;

  let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${meta.title||'Tööleht'}</title>${css}</head><body>`;

    const imgRight=b.imageUrl&&b.imagePos==='right';

    if(imgTop) html+=`<div><img src="${b.imageUrl}" class="pb-img" alt=""/>${b.caption?`<div class="img-caption">${b.caption}</div>`:''}</div>`;
    if(imgRight) html+=`<div class="img-right"><div style="flex:1">`;

    if(b.type==='text')    html+=`<div class="pb-text" style="font-weight:${b.bold?700:400}">${b.content||''}</div>`;
    else if(b.type==='image') {
      if(b.imageUrl) html+=`<div><img src="${b.imageUrl}" class="pb-img" alt=""/>${b.caption?`<div class="img-caption">${b.caption}</div>`:''}</div>`;
    }
    else if(b.type==='fill') {
      html+=`<div class="fill">`;
      parseFill(b.text||'').forEach(p=>{ html+=p.t==='text'?p.v:`<span class="blank">&nbsp;</span>`; });
      html+=`</div>`;
    }
    else if(b.type==='choice'||b.type==='reading') {
      if(b.type==='reading') html+=`<div class="passage">${b.passage||''}</div>`;
      (b.questions||[]).forEach((q,qi)=>{
        html+=`<div class="q">${qi+1}. ${q.q||''}</div>`;
        q.opts.filter(Boolean).forEach(o=>{ html+=`<div class="opt"><span class="circle"></span><span>${o}</span></div>`; });
      });
    }
    else if(b.type==='writing') {
      html+=`<div class="wr-task">${b.task||''}</div>`;
      Array.from({length:b.lines||6}).forEach(()=>{ html+=`<div class="wr-line"></div>`; });
    }
    else if(b.type==='match') {
      const sh=[...(b.pairs||[])].sort(()=>Math.random()-.5);
      html+=`<div class="match-cols"><div>`;
      (b.pairs||[]).forEach((p,i)=>{ html+=`<div class="match-item">${i+1}. ${p.l}</div>`; });
      html+=`</div><div>`;
      sh.forEach((p,i)=>{ html+=`<div class="match-item">${String.fromCharCode(65+i)}. ${p.r}</div>`; });
      html+=`</div></div><div class="ans-row">`;
      (b.pairs||[]).forEach((_,i)=>{ html+=`<span class="ans">${i+1} — ___</span>`; });
      html+=`</div>`;
    }
    else if(b.type==='order') {
      const w=(b.sentence||'').split(' ').filter(Boolean).sort(()=>Math.random()-.5);
      html+=`<div class="chips">`;
      w.forEach(x=>{ html+=`<span class="chip">${x}</span>`; });
      html+=`</div><div class="order-ans">Kirjuta: ___________________________________________________</div>`;
    }
    else if(b.type==='table') {
      html+=`<table><thead><tr>`;
      (b.headers||[]).forEach(h=>{ html+=`<th>${h}</th>`; });
      html+=`</tr></thead><tbody>`;
      Array.from({length:b.rows||4}).forEach(()=>{
        html+=`<tr>`; (b.headers||[]).forEach(()=>{ html+=`<td></td>`; }); html+=`</tr>`;
      });
      html+=`</tbody></table>`;
    }

    if(imgRight) html+=`</div><img src="${b.imageUrl}" style="width:110px;flex-shrink:0;object-fit:contain;border-radius:4px;" alt=""/></div>`;
    if(imgBot)   html+=`<div style="margin-top:8px"><img src="${b.imageUrl}" class="pb-img" alt=""/>${b.caption?`<div class="img-caption">${b.caption}</div>`:''}</div>`;
    if(b.size==='full') html+=`<hr class="divider"/>`;
    html+=`</div>`;
  });

  html+=`</body></html>`;
  return html;
}

// ── SAVE MODAL ────────────────────────────────────────────────
function SaveModal({meta,blocks,user,onClose,notify}) {
  const SUBJECTS=['Eesti keel','Inglise keel','Matemaatika'];
  const LEVELS_BY_SUBJECT={
    'Eesti keel':['A1','A2','B1','B2','C1'],
    'Inglise keel':['A1','A2','B1','B2','C1','C2'],
    'Matemaatika':Array.from({length:12},(_,i)=>i+1+'. klass'),
  };
  const [subject,setSubject]=useState(meta.subject||'Eesti keel');
  const [level,setLevel]=useState(meta.level||'B1');
  const [topic,setTopic]=useState(meta.topic||'');
  const [description,setDescription]=useState('');
  const [saving,setSaving]=useState(false);

  const levels=LEVELS_BY_SUBJECT[subject]||[];

  const save=async()=>{
    if(!topic.trim()){alert('Vali või sisesta teema');return;}
    setSaving(true);
    try{
      await db.collection('curriculumLessons').add({
        title: meta.title||'Tööleht',
        type: 'material',
        description: description||meta.title||'',
        subject, level, topic: topic.trim(),
        examPart: null,
        worksheetData: {meta, blocks},
        worksheetHtml: '',
        files: [],
        order: 0,
        authorUid: user?.uid||'',
        authorName: user?.displayName||user?.email||'',
        createdAt: new Date().toISOString().split('T')[0],
        updatedAt: new Date().toISOString(),
      });
      notify('✓ Tööleht salvestatud õppekavasse!');
      onClose();
    }catch(e){
      notify('Viga: '+(e.message||'Salvestamine ebaõnnestus'));
    }
    setSaving(false);
  };

  return(
    <div className="sav-ov">
      <div className="sav-box">
        <div className="sav-head">
          <h2 style={{fontSize:'1rem',fontWeight:800}}>💾 Salvesta õppekavasse</h2>
          <button onClick={onClose} className="btn btn-ghost btn-sm">✕</button>
        </div>
        <div className="sav-body">
          <div style={{padding:'10px 13px',borderRadius:10,background:'rgba(47,93,80,.08)',border:'0.5px solid rgba(47,93,80,.2)',fontSize:'.84rem',fontWeight:600,color:'#2F5D50'}}>
            📄 {meta.title||'Tööleht'} · {blocks.length} plokki
          </div>
          <div>
            <div className="field-lbl">Õppeaine</div>
            <select value={subject} onChange={e=>{setSubject(e.target.value);setLevel(LEVELS_BY_SUBJECT[e.target.value]?.[0]||'');}} style={{marginBottom:8}}>
              {SUBJECTS.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div>
              <div className="field-lbl">Tase</div>
              <select value={level} onChange={e=>setLevel(e.target.value)}>
                {levels.map(l=><option key={l}>{l}</option>)}
              </select>
            </div>
            <div>
              <div className="field-lbl">Teema *</div>
              <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="nt. Minu pere"/>
            </div>
          </div>
          <div>
            <div className="field-lbl">Lühike kirjeldus (valikuline)</div>
            <textarea value={description} onChange={e=>setDescription(e.target.value)} rows={2} placeholder="Mida see tööleht harjutab..."/>
          </div>
        </div>
        <div className="sav-foot">
          <button onClick={onClose} className="btn btn-ghost">Tühista</button>
          <button onClick={save} disabled={saving} className="btn btn-green">
            {saving?'Salvestab…':'✓ Salvesta õppekavasse'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────
function App() {
  const[user,setUser]=useState(null);
  const[authDone,setAuthDone]=useState(false);
  const[meta,setMeta]=useState({title:'Uus tööleht',subject:'Eesti keel',level:'B1',topic:'',name:true,score:true,date:true});
  const[blocks,setBlocks]=useState([]);
  const[activeId,setActiveId]=useState(null);
  const[tab,setTab]=useState('build');
  const[aiPrompt,setAiPrompt]=useState('');
  const[aiLoading,setAiLoading]=useState(false);
  const[toast,setToast]=useState('');
  const[dragId,setDragId]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const[showSave,setShowSave]=useState(false);

  const notify=msg=>{setToast(msg);setTimeout(()=>setToast(''),3000);};

  useEffect(()=>{
    const u=auth.onAuthStateChanged(fbUser=>{setUser(fbUser);setAuthDone(true);});
    return u;
  },[]);

  const addBlock=type=>{const b=mkBlock(type);setBlocks(p=>[...p,b]);setActiveId(b.id);setTab('build');};
  const updBlock=(id,data)=>setBlocks(p=>p.map(b=>b.id===id?data:b));
  const delBlock=id=>{setBlocks(p=>p.filter(b=>b.id!==id));if(activeId===id)setActiveId(null);};
  const moveBlock=(id,dir)=>setBlocks(p=>{
    const i=p.findIndex(b=>b.id===id);
    if(dir===-1&&i===0||dir===1&&i===p.length-1) return p;
    const a=[...p];[a[i],a[i+dir]]=[a[i+dir],a[i]];return a;
  });

  // Drag & drop
  const onDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed='move';};
  const onDragOver=(e,id)=>{e.preventDefault();setDragOver(id);};
  const onDrop=(e,targetId)=>{
    e.preventDefault();
    if(!dragId||dragId===targetId)return;
    setBlocks(p=>{
      const from=p.findIndex(b=>b.id===dragId);
      const to=p.findIndex(b=>b.id===targetId);
      const a=[...p];const[item]=a.splice(from,1);a.splice(to,0,item);return a;
    });
    setDragId(null);setDragOver(null);
  };
  const onDragEnd=()=>{setDragId(null);setDragOver(null);};

  const runAI=async()=>{
    if(!aiPrompt.trim()){notify('Kirjuta juhis');return;}
    setAiLoading(true);
    try{
      const r=await genAI(aiPrompt,meta.subject,meta.level);
      if(r.title) setMeta(m=>({...m,title:r.title}));
      const nb=(r.blocks||[]).map(b=>({...mkBlock(b.type),...b,id:uid()}));
      setBlocks(nb);
      if(nb.length) setActiveId(nb[0].id);
      setTab('build');
      notify('✓ Tööleht genereeritud!');
    }catch(e){notify('Viga: '+(e.message||'Genereerimine ebaõnnestus'));}
    setAiLoading(false);
  };

  const exportPrint=()=>{
    const w=window.open('','_blank');
    w.document.write(buildHTML(meta,blocks));
    w.document.close();
    setTimeout(()=>w.print(),400);
  };
  const exportDL=()=>{
    const b=new Blob([buildHTML(meta,blocks)],{type:'text/html'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);a.download=(meta.title||'tööleht')+'.html';a.click();
    notify('✓ Allalaaditud!');
  };

  if(!authDone) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}><div className="sp-dark"/></div>;

  const activeBlock=blocks.find(b=>b.id===activeId);

  return(
    <div>
      {toast&&<div className="toast">{toast}</div>}

      <header className="hdr">
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div className="logo">Keele<span>Sepp</span></div>
          <span style={{color:'rgba(255,255,255,.3)',fontSize:'.76rem'}}>Töölehtede koostaja</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <a href="/haldus-exercises" style={{color:'rgba(255,255,255,.45)',fontSize:'.76rem',textDecoration:'none',padding:'5px 10px',border:'1px solid rgba(255,255,255,.12)',borderRadius:7}}>← Õppekava</a>
          <button onClick={exportPrint} className="btn btn-ghost btn-sm" style={{color:'#fff',borderColor:'rgba(255,255,255,.18)'}}>
            <i className="fa-solid fa-print"/> Prindi / PDF
          </button>
          <button onClick={()=>setShowSave(true)} className="btn btn-green btn-sm">
            <i className="fa-solid fa-floppy-disk"/> Salvesta
          </button>
          <button onClick={exportDL} className="btn btn-gold btn-sm">
            <i className="fa-solid fa-download"/> Laadi alla
          </button>
        </div>
      </header>

      <div className="workspace">
        {/* LEFT */}
        <div className="left-panel">
          <div className="left-tabs">
            <button className={'ltab'+(tab==='build'?' active':'')} onClick={()=>setTab('build')}>
              <i className="fa-solid fa-layer-group"/> Koosta
            </button>
            <button className={'ltab'+(tab==='ai'?' active':'')} onClick={()=>setTab('ai')}>
              <i className="fa-solid fa-wand-magic-sparkles"/> AI
            </button>
            <button className={'ltab'+(tab==='meta'?' active':'')} onClick={()=>setTab('meta')}>
              <i className="fa-solid fa-sliders"/> Seaded
            </button>
          </div>

          <div className="left-scroll">

            {/* AI TAB */}
            {tab==='ai'&&(
              <div>
                <div className="ai-panel">
                  <div className="ai-title"><i className="fa-solid fa-wand-magic-sparkles"/> Genereeri AI-ga</div>
                  <textarea className="ai-textarea" value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)} rows={5}
                    placeholder={"Näiteks:\n\"Tegusõnade pööramine olevikus A2\"\n\"Lugemisharjutus toidust B1\""}/>
                  <div className="ai-lvl-btns">
                    {['A1','A2','B1','B2','C1'].map(l=>(
                      <button key={l} className={'ai-lvl'+(meta.level===l?' active':'')} onClick={()=>setMeta(m=>({...m,level:l}))}>{l}</button>
                    ))}
                  </div>
                  <button onClick={runAI} disabled={aiLoading} className="btn btn-pine" style={{width:'100%',marginTop:10,justifyContent:'center',background:'#C9882A',color:'#fff'}}>
                    {aiLoading?<><div className="sp" style={{marginRight:6}}/> Genereerib...</>:<><i className="fa-solid fa-bolt"/> Genereeri</>}
                  </button>
                </div>
                <button onClick={()=>setTab('build')} className="btn btn-ghost" style={{width:'100%',justifyContent:'center'}}>
                  <i className="fa-solid fa-layer-group"/> Koosta käsitsi
                </button>
              </div>
            )}

            {/* META TAB */}
            {tab==='meta'&&(
              <div>
                <div className="meta-box">
                  <div className="meta-lbl">Tööleht</div>
                  <div className="field-lbl">Pealkiri</div>
                  <input value={meta.title} onChange={e=>setMeta(m=>({...m,title:e.target.value}))} style={{marginBottom:6}}/>
                  <div className="field-lbl">Õppeaine</div>
                  <select value={meta.subject} onChange={e=>setMeta(m=>({...m,subject:e.target.value}))} style={{marginBottom:6}}>
                    <option>Eesti keel</option><option>Inglise keel</option><option>Matemaatika</option>
                  </select>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
                    <div>
                      <div className="field-lbl">Tase</div>
                      <select value={meta.level} onChange={e=>setMeta(m=>({...m,level:e.target.value}))}>
                        {['A1','A2','B1','B2','C1','C2'].map(l=><option key={l}>{l}</option>)}
                      </select>
                    </div>
                    <div>
                      <div className="field-lbl">Teema</div>
                      <input value={meta.topic} onChange={e=>setMeta(m=>({...m,topic:e.target.value}))} placeholder="nt. Pere"/>
                    </div>
                  </div>
                </div>
                <div className="meta-box">
                  <div className="meta-lbl">Päise väljad</div>
                  {[['name','Nimi'],['score','Punkte'],['date','Kuupäev']].map(([k,l])=>(
                    <label key={k} style={{display:'flex',alignItems:'center',gap:7,marginBottom:7,fontSize:'.8rem',cursor:'pointer'}}>
                      <input type="checkbox" checked={meta[k]||false} onChange={e=>setMeta(m=>({...m,[k]:e.target.checked}))}/> {l}
                    </label>
                  ))}
                </div>
              </div>
            )}

            {/* BUILD TAB */}
            {tab==='build'&&(
              <div>
                <div style={{fontSize:'.66rem',fontWeight:700,color:'#7A7167',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:7}}>Lisa plokk</div>
                <div className="btype-grid">
                  {BTYPES.map(bt=>(
                    <button key={bt.key} className="btype-btn" onClick={()=>addBlock(bt.key)}>
                      <div className="btype-icon" style={{background:bt.bg}}><i className={'fa-solid '+bt.icon} style={{color:bt.color}}/></div>
                      {bt.label}
                    </button>
                  ))}
                </div>

                {blocks.length===0
                  ?<div className="empty-bld"><i className="fa-solid fa-layer-group"/><p style={{fontSize:'.78rem'}}>Lisa plokke ülal</p></div>
                  :<div>
                    <div style={{fontSize:'.66rem',fontWeight:700,color:'#7A7167',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>
                      Plokid ({blocks.length}) — lohista järjekorra muutmiseks
                    </div>
                    {blocks.map((block,idx)=>{
                      const bt=BT[block.type];
                      const isActive=activeId===block.id;
                      return(
                        <div key={block.id}
                          className={'block-item'+(isActive?' active':'')+(dragId===block.id?' dragging':'')+(dragOver===block.id?' drag-over':'')}
                          draggable
                          onDragStart={e=>onDragStart(e,block.id)}
                          onDragOver={e=>onDragOver(e,block.id)}
                          onDrop={e=>onDrop(e,block.id)}
                          onDragEnd={onDragEnd}>
                          <div className="bi-head" onClick={()=>setActiveId(isActive?null:block.id)}>
                            <span className="bi-drag"><i className="fa-solid fa-grip-vertical"/></span>
                            <span className="nbadge" style={{background:bt.color}}>{idx+1}</span>
                            <span className="bi-tag" style={{background:bt.bg,color:bt.color}}>
                              <i className={'fa-solid '+bt.icon} style={{fontSize:'.6rem'}}/>
                              {bt.label}
                            </span>
                            <span className="bi-preview">
                              {block.type==='fill'&&(block.text||'').replace(/\[([^\]]+)\]/g,'___')}
                              {block.type==='writing'&&block.task}
                              {block.type==='text'&&block.content}
                              {block.type==='order'&&block.sentence}
                              {block.type==='choice'&&(block.questions?.[0]?.q||'Valikvastus')}
                              {block.type==='match'&&`${block.pairs?.length||0} paari`}
                              {block.type==='table'&&(block.headers||[]).join(', ')}
                              {block.type==='reading'&&(block.passage||'').slice(0,35)+'...'}
                              {block.type==='image'&&(block.caption||'Pilt')}
                            </span>
                            <div className="bi-actions" onClick={e=>e.stopPropagation()}>
                              <button className="bi-btn" onClick={()=>moveBlock(block.id,-1)} title="Üles"><i className="fa-solid fa-chevron-up"/></button>
                              <button className="bi-btn" onClick={()=>moveBlock(block.id,1)} title="Alla"><i className="fa-solid fa-chevron-down"/></button>
                              <button className="bi-btn del" onClick={()=>delBlock(block.id)} title="Kustuta"><i className="fa-solid fa-trash"/></button>
                            </div>
                          </div>
                          {isActive&&(
                            <div onClick={e=>e.stopPropagation()}>
                              <BlockEditor block={block} onChange={data=>updBlock(block.id,data)}/>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                }
              </div>
            )}
          </div>
        </div>

        {/* RIGHT — A4 PREVIEW */}
        <div className="right-panel">
          <div className="toolbar-row">
            <span style={{fontSize:'.74rem',color:'#7A7167',marginRight:'auto'}}>{blocks.length} plokki</span>
            <button onClick={exportPrint} className="btn btn-ghost btn-sm"><i className="fa-solid fa-print"/> Prindi / PDF</button>
            <button onClick={exportDL} className="btn btn-pine btn-sm"><i className="fa-solid fa-download"/> Laadi alla (.html)</button>
          </div>

          <div className="a4-sheet">
            <div className="sheet-hdr">
              <div>
                <div className="sheet-title">{meta.title||'Pealkiri puudub'}</div>
                <div className="sheet-meta-row">
                  {meta.subject&&<span>📚 {meta.subject}</span>}
                  {meta.level&&<span>📊 {meta.level}</span>}
                  {meta.topic&&<span>💬 {meta.topic}</span>}
                  {meta.date&&<span>📅 Kuupäev: ____________</span>}
                  {meta.name&&<span>Nimi: ___________________________</span>}
                </div>
              </div>
              {meta.score&&<div className="score-box">Punkte: ___ / ___</div>}
            </div>

            {blocks.length===0
              ?<div style={{textAlign:'center',padding:'56px 0',color:'#C0B8B0'}}>
                 <i className="fa-solid fa-layer-group" style={{fontSize:'2rem',opacity:.2,display:'block',marginBottom:10}}/>
                 <div style={{fontSize:'.86rem'}}>Lisa plokke vasakult paneelilt</div>
               </div>
              :<div>
                {blocks.map((block,idx)=>(
                  <PreviewBlock key={block.id} block={block} index={idx+1}/>
                ))}
              </div>
            }
          </div>
          <div style={{height:40}}/>
        </div>
      </div>
      {showSave&&<SaveModal meta={meta} blocks={blocks} user={user} onClose={()=>setShowSave(false)} notify={notify}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
